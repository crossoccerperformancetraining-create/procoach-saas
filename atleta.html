<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .tab-active { color: #3b82f6 !important; font-weight: 900; }
        .card-pro { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], days:[], id:null, coachMsg:'' });
            const [idx, setIdx] = useState(null); const [step, setStep] = useState(1);
            const [tab, setTab] = useState('treino');
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1});

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id'); const pIdx = params.get('p');
                if(!uId) return;
                db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ ...d, id: doc.id });
                        if(pIdx !== null && step === 1) { setIdx(parseInt(pIdx)); setStep(2); }
                    }
                });
            }, []);

            const myWorkouts = useMemo(() => {
                if (idx === null || !data.players[idx]) return [];
                const name = data.players[idx].name.toLowerCase();
                return (data.exercises || []).filter(e => e.target?.toLowerCase().includes(name) || e.target?.toLowerCase().includes('geral'));
            }, [data.exercises, idx]);

            const convocacao = useMemo(() => {
                if (idx === null) return null;
                return (data.exercises || []).find(e => e.target?.toLowerCase().includes('convocado') && e.target?.toLowerCase().includes(data.players[idx].name.toLowerCase()));
            }, [data.exercises, idx]);

            if(step===1) return (
                <div className="p-8 flex flex-col items-center justify-center min-h-screen">
                    <h1 className="text-3xl font-black italic mb-10 tracking-tighter uppercase">PROCOACH</h1>
                    <div className="grid grid-cols-3 gap-6 w-full max-w-sm">
                        {data.players.map((p, i) => (
                            <div key={i} onClick={()=>{setIdx(i); setStep(2);}} className="flex flex-col items-center gap-2 cursor-pointer active:scale-90 transition-transform">
                                <div className="w-20 h-20 rounded-full border-2 border-slate-800 overflow-hidden bg-slate-900 shadow-2xl">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <div className="flex h-full items-center justify-center text-2xl">👤</div>}
                                </div>
                                <span className="text-[10px] font-bold text-slate-400 uppercase truncate w-full text-center">{p.name}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const p = data.players[idx];
            return (
                <div className="flex flex-col min-h-screen pb-32">
                    {/* TOPO PREMIUM */}
                    <div className="p-6 rounded-b-[40px] shadow-2xl relative overflow-hidden" style={{ background: 'linear-gradient(135deg, #1e3a8a, #020617)' }}>
                        <div className="flex justify-between items-start mb-4">
                            <div className="flex items-center gap-4">
                                <div className="w-20 h-20 rounded-full border-4 border-white/10 overflow-hidden shrink-0">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <div className="p-6 text-center text-3xl">👤</div>}
                                </div>
                                <div>
                                    <h2 className="text-2xl font-black text-white uppercase italic">{p.name}</h2>
                                    <div className="bg-blue-600/30 text-blue-400 text-[10px] font-black px-2 py-1 rounded-lg uppercase tracking-widest inline-block mt-1">EM EVOLUÇÃO 🌱</div>
                                </div>
                            </div>
                            <button onClick={()=>setStep(1)} className="bg-white/10 px-4 py-2 rounded-full text-[10px] font-black uppercase border border-white/10">← Voltar</button>
                        </div>
                        <p className="text-[11px] text-slate-400 italic font-medium leading-relaxed">"A dedicação supera o talento quando o talento não se dedica."</p>
                    </div>

                    <div className="p-6 space-y-6">
                        {tab === 'treino' && (
                            <div className="space-y-6 animate-fade-in">
                                {/* ESTATÍSTICAS */}
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="card-pro p-4 text-center">
                                        <div className="text-yellow-500 text-[10px] font-black uppercase mb-1">Gols Temporada</div>
                                        <div className="text-3xl font-black text-white">{p.stats?.g || 0}</div>
                                    </div>
                                    <div className="card-pro p-4 text-center">
                                        <div className="text-blue-500 text-[10px] font-black uppercase mb-1">Assistências</div>
                                        <div className="text-3xl font-black text-white">{p.stats?.a || 0}</div>
                                    </div>
                                </div>

                                {/* HIDRATAÇÃO */}
                                <div className="card-pro p-5 border-l-4 border-blue-500">
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-[10px] font-black text-blue-400 uppercase tracking-widest">💧 Hidratação Diária</span>
                                        <span className="text-[10px] font-bold text-slate-500 uppercase">0.00L / 3.0L</span>
                                    </div>
                                    <div className="w-full h-2 bg-slate-800 rounded-full mb-4 overflow-hidden">
                                        <div className="h-full bg-blue-500 w-[10%]"></div>
                                    </div>
                                    <button className="w-full bg-blue-600 text-white font-black py-3 rounded-2xl text-xs uppercase shadow-lg shadow-blue-900/40">+ BEBI 250ML</button>
                                </div>

                                {/* MENSAGEM DO PROFESSOR */}
                                {data.coachMsg && (
                                    <div className="card-pro p-5 border-l-4 border-orange-500 bg-orange-500/5">
                                        <h4 className="text-[10px] font-black text-orange-500 uppercase mb-2">📢 Mensagem do Professor</h4>
                                        <p className="text-sm text-slate-200 font-semibold italic leading-relaxed">{data.coachMsg}</p>
                                    </div>
                                )}

                                {/* QUESTIONÁRIO WELLNESS */}
                                <div className="space-y-6 py-4">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center border-b border-slate-800 pb-2">Diário de Prontidão</h3>
                                    {[{id:'sleep',l:'😴 Sono'},{id:'stress',l:'🤯 Estresse'},{id:'fatigue',l:'🔋 Cansaço'},{id:'soreness',l:'🦵 Dor Muscular'},{id:'mood',l:'🧠 Humor'}].map(m=>(
                                        <div key={m.id} className="card-pro p-4">
                                            <div className="flex justify-between mb-3 font-bold text-white text-[10px] uppercase"><span>{m.l}</span><span className="text-blue-400 bg-blue-400/10 px-2 rounded-lg">{scores[m.id]}</span></div>
                                            <input type="range" min="1" max="7" value={scores[m.id]} onChange={e=>setScores({...scores,[m.id]:parseInt(e.target.value)})} className="hooper-slider" style={{background:'linear-gradient(to right,#22c55e,#eab308,#ef4444)'}}/>
                                        </div>
                                    ))}
                                    
                                    <div className="card-pro p-5 border-red-500/30">
                                        <h3 className="text-red-400 text-xs font-black uppercase mb-3">⚠️ Dores Focais</h3>
                                        <select className="w-full bg-slate-900 text-white text-xs p-3 rounded-xl border border-slate-800 mb-4 outline-none"><option>Nenhuma Dor Localizada</option><option>Tornozelo (Dir)</option><option>Joelho (Esq)</option></select>
                                    </div>

                                    <button onClick={()=>alert("ENVIADO!")} className="w-full bg-blue-600 text-white font-black py-5 rounded-[28px] shadow-2xl uppercase tracking-widest text-sm active:scale-95 transition-all">Enviar Prontidão</button>
                                </div>
                            </div>
                        )}

                        {tab === 'micro' && (
                            <div className="space-y-4 animate-fade-in">
                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Programação da Semana</h3>
                                {data.days?.map((day, di) => (
                                    <div key={di} className="card-pro p-5 space-y-4">
                                        <div className="flex justify-between items-center"><span className="text-lg font-black italic uppercase text-white">{day.name}</span><span className="text-[9px] font-black bg-blue-600 px-2 py-1 rounded text-white uppercase">{day.md || 'Treino'}</span></div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="bg-slate-950 p-3 rounded-xl border border-white/5"><div className="text-[8px] font-black text-blue-500 uppercase mb-1">Manhã</div><div className="text-[11px] font-bold text-slate-300 uppercase">{(day.am || []).map(e=>e.type).join(', ') || 'Folga'}</div></div>
                                            <div className="bg-slate-950 p-3 rounded-xl border border-white/5"><div className="text-[8px] font-black text-orange-500 uppercase mb-1">Tarde</div><div className="text-[11px] font-bold text-slate-300 uppercase">{(day.pm || []).map(e=>e.type).join(', ') || 'Folga'}</div></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'convocacao' && (
                            <div className="space-y-6 animate-fade-in text-center py-10">
                                {convocacao ? (
                                    <div className="bg-yellow-500/10 border-2 border-yellow-500/50 p-10 rounded-[40px] gold-glow">
                                        <div className="text-7xl mb-6">🏆</div>
                                        <h2 className="text-3xl font-black text-white uppercase italic mb-2">CONVOCADO!</h2>
                                        <p className="text-xs text-yellow-500 font-black uppercase tracking-widest">Sua vaga está garantida para o jogo.</p>
                                    </div>
                                ) : (
                                    <div className="card-pro p-10 opacity-40 grayscale">
                                        <div className="text-6xl mb-6">📋</div>
                                        <p className="text-sm font-bold text-slate-500 uppercase tracking-widest">Aguardando Lista Oficial...</p>
                                    </div>
                                )}
                            </div>
                        )}

                        {tab === 'ranking' && (
                            <div className="space-y-4 animate-fade-in">
                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Ranking de Artilharia</h3>
                                {data.players.sort((a,b)=> (b.stats?.g||0) - (a.stats?.g||0)).slice(0,5).map((player, ri) => (
                                    <div key={ri} className="card-pro p-4 flex items-center justify-between">
                                        <div className="flex items-center gap-3"><span className="text-xl font-black text-slate-700">#{ri+1}</span><span className="text-xs font-bold uppercase">{player.name}</span></div>
                                        <span className="bg-yellow-500 text-slate-950 px-3 py-1 rounded-full font-black text-[10px]">{player.stats?.g || 0} GOLS</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* MENU INFERIOR ORIGINAL ✨ */}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-800 p-4 flex justify-around items-center z-[100] rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
                         <div onClick={()=>setTab('treino')} className={`flex flex-col items-center gap-1 cursor-pointer ${tab==='treino'?'tab-active':'text-slate-600'}`}><span className="text-xl">⚽</span><span className="text-[8px] font-black uppercase">Treino</span></div>
                         <div onClick={()=>setTab('micro')} className={`flex flex-col items-center gap-1 cursor-pointer ${tab==='micro'?'tab-active':'text-slate-600'}`}><span className="text-xl">📅</span><span className="text-[8px] font-black uppercase">Micro</span></div>
                         <div onClick={()=>setTab('convocacao')} className={`flex flex-col items-center gap-1 cursor-pointer ${tab==='convocacao'?'text-yellow-500 font-black':'text-slate-600'}`}><span className="text-xl">🏆</span><span className="text-[8px] font-black uppercase">Convocar</span></div>
                         <div onClick={()=>setTab('ranking')} className={`flex flex-col items-center gap-1 cursor-pointer ${tab==='ranking'?'tab-active':'text-slate-600'}`}><span className="text-xl">📊</span><span className="text-[8px] font-black uppercase">Rank</span></div>
                         <div onClick={()=>alert("Em breve")} className="flex flex-col items-center gap-1 text-slate-600 cursor-pointer"><span className="text-xl">👤</span><span className="text-[8px] font-black uppercase">Perfil</span></div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
