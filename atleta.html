<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .special-card { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950 text-slate-100">
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-3 rounded-full shadow-2xl z-[300] text-xs font-bold transition-opacity duration-300 pointer-events-none flex items-center gap-2" style="opacity:0;"></div>
    <div id="root" class="h-full w-full flex flex-col"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], id:null, color:'#1e3a8a' });
            const [idx, setIdx] = useState(null); const [step, setStep] = useState(1); const [loading, setLoading] = useState(true);
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1});

            useEffect(() => {
                const params = new URLSearchParams(window.location.search); const uId = params.get('id'); const pIdx = params.get('p');
                if(!uId) { setLoading(false); return; }
                db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ players: d.players||[], log: d.trainingLog||{}, ex: d.exercises||[], id: doc.id, color: d.themeColor||'#1e3a8a' });
                        if(pIdx !== null) { setIdx(parseInt(pIdx)); setStep(2); }
                    }
                    setLoading(false);
                });
            }, []);

            // FILTRO INTELIGENTE DE EXERCÍCIOS
            const myWorkouts = useMemo(() => {
                if (idx === null) return [];
                const myName = (data.players[idx]?.name || "").toLowerCase();
                return data.ex.filter(e => {
                    const target = (e.target || "").toLowerCase();
                    return target.includes(myName) || target.includes("pdi") || target.includes("transição") || target.includes("geral");
                });
            }, [data.ex, idx]);

            const hasSpecialMission = myWorkouts.some(e => {
                const t = (e.target || "").toLowerCase();
                return t.includes("pdi") || t.includes("transição") || t.includes((data.players[idx]?.name || "").toLowerCase());
            });

            if(loading) return <div className="h-screen flex items-center justify-center bg-slate-950 text-white">Carregando...</div>;

            if(step===1) return (
                <div className="p-6 h-screen flex flex-col items-center justify-center bg-slate-950">
                    <h1 className="text-3xl font-black italic mb-8 text-white">PROCOACH</h1>
                    <div className="grid grid-cols-3 gap-6 w-full max-w-2xl">
                        {data.players.map((p, i) => (
                            <div key={i} onClick={()=>{setIdx(i); setStep(2);}} className="flex flex-col items-center gap-2 cursor-pointer">
                                <div className="w-20 h-20 rounded-full border-2 border-slate-800 overflow-hidden bg-slate-900">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <div className="m-6 text-slate-700">👤</div>}
                                </div>
                                <span className="text-[10px] font-bold text-slate-300">{(p.name || '').split(' ')[0]}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const p = data.players[idx];
            return (
                <div className="h-full flex flex-col bg-slate-950 p-6 overflow-y-auto custom-scroll">
                    <div className="flex items-center gap-4 mb-8">
                        <div className="w-20 h-20 rounded-full border-4 border-white/10 overflow-hidden shrink-0">
                            {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <div className="m-6 text-white">👤</div>}
                        </div>
                        <div>
                            <h1 className="text-2xl font-black uppercase text-white">{p.name}</h1>
                            <div className="text-xs font-bold text-blue-400 uppercase">{p.position || 'Atleta'}</div>
                        </div>
                    </div>

                    {/* DESTAQUE DE MISSÃO ESPECIAL */}
                    {hasSpecialMission && (
                        <div className="mb-6 animate-pulse-slow">
                            <div className="special-card p-4 rounded-3xl flex items-center justify-between shadow-xl">
                                <div>
                                    <div className="text-[10px] font-black text-white/70 uppercase tracking-widest">Missão Individual</div>
                                    <div className="text-sm font-black text-white uppercase">Trabalho PDI / Transição</div>
                                </div>
                                <div className="text-2xl">⚡</div>
                            </div>
                        </div>
                    )}

                    <div className="space-y-6">
                        <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-800 pb-2">Programação do Dia</h3>
                        
                        {myWorkouts.length > 0 ? (
                            myWorkouts.map((ex, i) => (
                                <div key={i} className="bg-slate-900 border border-slate-800 p-4 rounded-2xl flex items-center gap-4">
                                    <div className="w-12 h-12 bg-slate-800 rounded-lg flex items-center justify-center text-xl overflow-hidden">
                                        {ex.gifUrl ? <img src={ex.gifUrl} className="w-full h-full object-cover"/> : "🏋️"}
                                    </div>
                                    <div className="flex-1">
                                        <div className="text-xs font-black text-white uppercase">{ex.title}</div>
                                        <div className="text-[10px] font-bold text-slate-500">{ex.sets}x{ex.reps} - {ex.target}</div>
                                    </div>
                                </div>
                            ))
                        ) : (
                            <div className="text-center p-12 bg-slate-900/50 rounded-[40px] border border-dashed border-slate-800">
                                <div className="text-5xl mb-4">🔋</div>
                                <div className="text-xs font-black text-slate-500 uppercase tracking-widest">Recuperação / Folga</div>
                            </div>
                        )}
                    </div>

                    <div className="mt-10 space-y-6">
                         <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-800 pb-2">Diário de Prontidão</h3>
                         {[{id:'sleep',l:'Sono'},{id:'stress',l:'Estresse'},{id:'fatigue',l:'Cansaço'},{id:'soreness',l:'Dor'},{id:'mood',l:'Humor'}].map(m=>(
                            <div key={m.id} className="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                                <div className="flex justify-between mb-2 font-bold text-white text-sm"><span>{m.l}</span><span className="text-blue-400">{scores[m.id]}</span></div>
                                <input type="range" min="1" max="7" value={scores[m.id]} onChange={e=>setScores({...scores,[m.id]:parseInt(e.target.value)})} className="hooper-slider" style={{background:'linear-gradient(to right,#22c55e,#eab308,#ef4444)'}}/>
                            </div>
                        ))}
                    </div>

                    <button onClick={()=>{
                        const td = new Date().toISOString().split('T')[0];
                        db.collection('coachData').doc(data.id).set({ trainingLog: { [td]: { [idx]: { wellness: scores } } } }, {merge:true})
                        .then(()=>{ alert("Enviado com sucesso!"); });
                    }} className="mt-10 w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase tracking-widest active:scale-95 transition-transform">
                        Enviar Prontidão
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
