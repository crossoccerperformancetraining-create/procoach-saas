<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .tab-active { color: #3b82f6 !important; font-weight: 900; }
        .card-pro { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .nutri-card { background: linear-gradient(135deg, #065f46 0%, #064e3b 100%); border-left: 4px solid #10b981; }
        .gold-glow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.4); border: 2px solid #eab308; }
        .visto-verde { position: absolute; top: 0; right: 0; background: #22c55e; border: 2px solid #020617; border-radius: 50%; padding: 2px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        const getTodayStr = () => new Date().toISOString().split('T')[0];
        const getGreeting = () => { const hour = new Date().getHours(); return hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite'; };
        const getIncentive = () => {
            const messages = ["Vença a si mesmo todos os dias!", "Seu esforço é o seu troféu.", "Trabalhe em silêncio, vença no campo.", "A disciplina é o caminho para o topo.", "Hoje é dia de dar o seu melhor!"];
            return messages[new Date().getDay() % messages.length];
        };

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, exercises:[], days:[], id:null, coachMsg:'' });
            const [idx, setIdx] = useState(null); const [step, setStep] = useState(1);
            const [tab, setTab] = useState('treino');
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1});
            const [water, setWater] = useState(0);
            const [pain, setPain] = useState([]); const [tp, setTp] = useState(''); const [ts, setTs] = useState('');
            const [respondedWellness, setRespondedWellness] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id'); const pIdx = params.get('p');
                if(!uId) return;
                db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ ...d, id: doc.id });
                        if(pIdx !== null && step === 1) { 
                            setIdx(parseInt(pIdx)); setStep(2); 
                            const today = getTodayStr();
                            if(d.trainingLog?.[today]?.[parseInt(pIdx)]?.wellness) setRespondedWellness(true);
                            setWater(Number(d.trainingLog?.[today]?.[parseInt(pIdx)]?.waterIntake) || 0);
                        }
                    }
                });
            }, []);

            const addPain = () => {
                if(tp && ts) {
                    const novaDor = `${tp} (${ts})`;
                    if(!pain.includes(novaDor)) setPain([...pain, novaDor]);
                    setTp(''); setTs('');
                }
            };

            const handleSendWellness = () => {
                const today = getTodayStr();
                db.collection('coachData').doc(data.id).set({ trainingLog: { [today]: { [idx]: { wellness: scores, painZones: pain } } } }, {merge:true})
                .then(()=> { setRespondedWellness(true); alert("PRONTIDÃO ENVIADA! ✅"); });
            };

            if(step===1) return (
                <div className="p-8 flex flex-col items-center justify-center min-h-screen bg-slate-950">
                    <h1 className="text-3xl font-black italic mb-10 text-white uppercase italic">PROCOACH</h1>
                    <div className="grid grid-cols-3 gap-6 w-full max-w-sm">
                        {data.players.map((p, i) => {
                            const jaRespondeu = !!(data.trainingLog?.[getTodayStr()]?.[i]?.wellness);
                            return (
                                <div key={i} onClick={()=>{setIdx(i); setStep(2);}} className="flex flex-col items-center gap-2 cursor-pointer relative">
                                    <div className={`w-20 h-20 rounded-full border-2 overflow-hidden bg-slate-900 shadow-xl ${jaRespondeu ? 'border-green-500' : 'border-slate-800'}`}>
                                        {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <div className="flex h-full items-center justify-center text-2xl">👤</div>}
                                        {jaRespondeu && <div className="visto-verde"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="4"><polyline points="20 6 9 17 4 12"/></svg></div>}
                                    </div>
                                    <span className="text-[10px] font-bold text-slate-400 uppercase truncate w-full text-center">{p.name}</span>
                                </div>
                            )
                        })}
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col min-h-screen pb-32">
                    {/* CABEÇALHO COM MENSAGEM DE INCENTIVO */}
                    <div className="p-6 rounded-b-[40px] shadow-2xl relative overflow-hidden" style={{ background: 'linear-gradient(135deg, #1e3a8a, #020617)' }}>
                        <div className="flex justify-between items-start">
                            <div className="flex items-center gap-4">
                                <div className="w-16 h-16 rounded-full border-2 border-white/20 overflow-hidden shrink-0">
                                    {data.players[idx]?.image ? <img src={data.players[idx].image} className="w-full h-full object-cover"/> : <div className="p-4 text-center">👤</div>}
                                </div>
                                <div>
                                    <div className="text-[10px] font-black text-blue-400 uppercase tracking-widest">{getGreeting()}!</div>
                                    <h2 className="text-xl font-black text-white uppercase italic">{data.players[idx].name.split(' ')[0]}</h2>
                                </div>
                            </div>
                            <button onClick={()=>setStep(1)} className="bg-white/10 px-3 py-1 rounded-full text-[8px] font-black uppercase border border-white/10">Elenco</button>
                        </div>
                        <div className="mt-4 p-3 bg-white/5 rounded-2xl border border-white/5">
                            <p className="text-[11px] text-white font-bold italic">✨ "{getIncentive()}"</p>
                        </div>
                    </div>

                    <div className="p-6 space-y-6 flex-1 overflow-y-auto">
                        {tab === 'treino' && (
                            <div className="space-y-6 animate-fade-in">
                                {!respondedWellness ? (
                                    <div className="space-y-5">
                                        <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center border-b border-slate-800 pb-2">Status do Atleta</h3>
                                        {[
                                            {id:'sleep',l:'Sono', ic:'😴'}, {id:'stress',l:'Estresse', ic:'🤯'},
                                            {id:'fatigue',l:'Cansaço', ic:'🔋'}, {id:'soreness',l:'Dor Muscular', ic:'🦵'}, {id:'mood',l:'Humor', ic:'🧠'}
                                        ].map(m=>(
                                            <div key={m.id} className="card-pro p-4">
                                                <div className="flex justify-between mb-3 font-bold text-white text-[10px] uppercase"><span>{m.ic} {m.l}</span><span className="text-blue-400">{scores[m.id]}</span></div>
                                                <input type="range" min="1" max="7" value={scores[m.id]} onChange={e=>setScores({...scores,[m.id]:parseInt(e.target.value)})} className="hooper-slider" style={{background:'linear-gradient(to right,#22c55e,#eab308,#ef4444)'}}/>
                                            </div>
                                        ))}

                                        {/* LOCAL DA DOR COM LADO DIREITO/ESQUERDO */}
                                        <div className="card-pro p-5 border-red-500/30">
                                            <h3 className="text-red-400 text-[10px] font-black uppercase mb-3">⚠️ Onde dói? (Local e Lado)</h3>
                                            <div className="flex gap-2">
                                                <select className="flex-1 bg-slate-900 text-white text-[10px] p-3 rounded-xl border border-slate-700 outline-none" onChange={e=>setTp(e.target.value)} value={tp}>
                                                    <option value="">Local...</option>
                                                    {["Tornozelo","Joelho","Coxa (Ant)","Coxa (Post)","Adutor","Lombar","Quadril","Pé"].map(x=><option key={x}>{x}</option>)}
                                                </select>
                                                <select className="w-24 bg-slate-900 text-white text-[10px] p-3 rounded-xl border border-slate-700 outline-none" onChange={e=>setTs(e.target.value)} value={ts}>
                                                    <option value="">Lado...</option>
                                                    <option value="Dir">Direito</option><option value="Esq">Esquerdo</option>
                                                </select>
                                                <button onClick={addPain} className="bg-red-600 text-white px-4 rounded-xl font-black">+</button>
                                            </div>
                                            <div className="flex flex-wrap gap-2 mt-3">
                                                {pain.map(z=><span key={z} onClick={()=>setPain(pain.filter(x=>x!==z))} className="bg-red-900/40 text-red-300 text-[9px] font-bold px-2 py-1 rounded border border-red-800">{z} ×</span>)}
                                            </div>
                                        </div>
                                        <button onClick={handleSendWellness} className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase text-xs">Enviar Prontidão</button>
                                    </div>
                                ) : (
                                    <div className="bg-green-500/10 border border-green-500/20 p-4 rounded-2xl text-center">
                                        <p className="text-[10px] font-black text-green-400 uppercase tracking-widest">✅ Questionário diário cumprido</p>
                                    </div>
                                )}
                                {/* HIDRATAÇÃO */}
                                <div className="card-pro p-5 border-l-4 border-blue-500">
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-[10px] font-black text-blue-400 uppercase tracking-widest">💧 Hidratação</span>
                                        <span className="text-[10px] font-bold text-slate-300">{water.toFixed(2)}L / 3.0L</span>
                                    </div>
                                    <button onClick={()=>{const newVal=water+0.25; setWater(newVal); db.collection('coachData').doc(data.id).set({trainingLog:{[getTodayStr()]:{[idx]:{waterIntake:newVal}}}},{merge:true});}} className="w-full bg-blue-600 text-white font-black py-3 rounded-2xl text-xs uppercase shadow-lg shadow-blue-900/40">+ BEBI 250ML</button>
                                </div>
                            </div>
                        )}

                        {/* OUTRAS ABAS MANTIDAS (MICRO, CONVOCA, RANK, PERFIL) */}
                        {tab === 'micro' && <div className="text-center p-10 opacity-50 uppercase text-[10px] font-black tracking-widest">Agenda da Semana em breve</div>}
                        {tab === 'convoca' && <div className="text-center p-10 opacity-50 uppercase text-[10px] font-black tracking-widest">Lista de Convocados em breve</div>}
                        {tab === 'rank' && <div className="text-center p-10 opacity-50 uppercase text-[10px] font-black tracking-widest">Ranking em breve</div>}
                        {tab === 'perfil' && <div className="text-center p-10 opacity-50 uppercase text-[10px] font-black tracking-widest">Perfil em breve</div>}
                    </div>

                    {/* MENU INFERIOR DE 5 ABAS */}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-800 p-4 flex justify-around items-center z-[110] rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
                         <div onClick={()=>setTab('treino')} className={`flex flex-col items-center gap-1 ${tab==='treino'?'tab-active':'text-slate-600'}`}><span className="text-2xl">⚽</span><span className="text-[7px] font-black uppercase">Treino</span></div>
                         <div onClick={()=>setTab('micro')} className={`flex flex-col items-center gap-1 ${tab==='micro'?'tab-active':'text-slate-600'}`}><span className="text-2xl">📅</span><span className="text-[7px] font-black uppercase">Micro</span></div>
                         <div onClick={()=>setTab('convoca')} className={`flex flex-col items-center gap-1 ${tab==='convoca'?'tab-active':'text-slate-600'}`}><span className="text-2xl">🏆</span><span className="text-[7px] font-black uppercase">Convocar</span></div>
                         <div onClick={()=>setTab('rank')} className={`flex flex-col items-center gap-1 ${tab==='rank'?'tab-active':'text-slate-600'}`}><span className="text-2xl">📊</span><span className="text-[7px] font-black uppercase">Rank</span></div>
                         <div onClick={()=>setTab('perfil')} className={`flex flex-col items-center gap-1 ${tab==='perfil'?'tab-active':'text-slate-600'}`}><span className="text-2xl">👤</span><span className="text-[7px] font-black uppercase">Perfil</span></div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
