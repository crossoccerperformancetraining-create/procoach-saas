        const AthletePortal = () => {

            const [idx, setIdx] = useState(null); const [isPriv, setIsPriv] = useState(false); 
            const [tab, setTab] = useState('workout'); const [step, setStep] = useState(1); const [loading, setLoading] = useState(true);

            const getDM = (id) => { const act = safeArray(data.dm).filter(r=>r&&r.playerId==id&&r.status==='Active'); if(act.length>0) return (parseInt(act[0].rtpPhase)||1)>=3 ? 'TRANSIÇÃO' : 'DM'; const rec = safeArray(data.dm).filter(r=>r&&r.playerId==id&&r.status==='Recovered'&&r.dateOut); const td = new Date(getTodayStr()); for(let r of rec) if(!isNaN(new Date(r.dateOut).getTime()) && Math.ceil(Math.abs(td - new Date(r.dateOut))/(1000*60*60*24))<=7) return 'TRANSIÇÃO'; return 'APTO'; };
            const calcBat = (w) => { if(!w || !w.sleep) return { p: 0, c: 'text-slate-500', f: 'bg-slate-500' }; const s = (w.sleep||0)+(w.stress||0)+(w.fatigue||0)+(w.soreness||0)+(w.mood||0); const p = Math.max(0, Math.min(100, Math.round(100 - (((s - 5) / 30) * 100)))); return { p, c: p<40?'text-red-500':p<75?'text-yellow-500':'text-green-500', f: p<40?'bg-red-500':p<75?'bg-yellow-500':'bg-green-500' }; };

                return { act: safeArray(data.act), prev: prevExs, gen: genExs, flat: [...safeArray(data.act), ...prevExs, ...genExs] };

            const goToNextEx = (currentId) => { const all = getOrderedExs().flat; const currentIndex = all.findIndex(e => e.id === currentId); let nextEx = all.slice(currentIndex + 1).find(e => !completed.includes(e.id) && !skippedExs[e.id]); if(nextEx) { setGif(nextEx); setFocusMode('exercise'); } else { setGif(null); showToast("Treino finalizado! 🎉"); } };

                        <div className="absolute inset-0 bg-slate-950/90 backdrop-blur-md z-[100] flex flex-col items-center justify-center p-6 animate-fade-in font-sans">
                            <div className="bg-slate-800 rounded-[32px] border border-slate-700 w-full max-w-sm p-6 shadow-2xl flex flex-col items-center relative">
                                <button onClick={()=>setRpeMod(false)} className="absolute top-4 right-4 text-slate-400 hover:text-white"><Icon name="x" size={20}/></button>
                                <div className="w-16 h-16 bg-blue-500/20 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-3"><Icon name="check" size={32}/></div>
                                <h2 className="text-2xl font-black text-white uppercase text-center mb-2">Muito Bem!</h2>
                                <p className="text-xs text-slate-400 text-center mb-6">Registre seu esforço para finalizar.</p>
                                
                                <div className="w-full mb-6">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase flex justify-between mb-2"><span>Nível de Esforço (PSE)</span><span className="text-blue-400 font-black text-sm">{rpe}/10 {getRpeEmoji(rpe)}</span></label>
                                    <input type="range" min="0" max="10" step="1" value={rpe} onChange={e=>setRpe(parseInt(e.target.value))} className="hooper-slider w-full h-3 mb-2" style={{background:'linear-gradient(to right,#3b82f6,#ef4444)'}}/>
                                    <div className="flex justify-between text-[9px] text-slate-500 font-bold uppercase mt-1"><span>Muito Leve</span><span>Exaustivo</span></div>
                                </div>
                                <div className="w-full mb-4">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Duração Total do Treino (Minutos)</label>
                                    <input type="number" min="0" value={dur} onChange={e=>setDur(parseInt(e.target.value))} className="w-full bg-slate-900 border border-slate-600 text-white text-center font-black text-3xl py-3 rounded-xl outline-none focus:border-blue-500 transition-colors"/>
                                </div>
                                <div className="w-full mb-6">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Feedback Rápido (Opcional)</label>
                                    <div className="flex flex-wrap gap-1.5 mb-2">
                                        {['🦵 Perna Pesada', '🔥 Treino Top', '💪 Me Senti Bem', '🥵 Muito Quente', '😴 Cansado'].map(tag => (
                                            <span key={tag} onClick={()=>setFeedbackMsg(feedbackMsg ? feedbackMsg + ' | ' + tag : tag)} className="bg-slate-700 hover:bg-blue-600 text-[9px] text-white px-2 py-1 rounded cursor-pointer border border-slate-600 transition-colors font-bold">{tag}</span>
                                        ))}
                                    </div>
                                    <textarea className="w-full bg-slate-900 border border-slate-600 text-white text-xs p-3 rounded-xl outline-none h-16 custom-scroll" placeholder="Mais detalhes (Opcional)..." value={feedbackMsg} onChange={e=>setFeedbackMsg(e.target.value)}></textarea>
                                </div>
                                <button onClick={saveRPE} disabled={submitting} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-lg flex justify-center items-center gap-2 transition-transform active:scale-95">
                                    {submitting ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <><Icon name="send"/> ENVIAR DADOS</>}
                                </button>
                            </div>
                        </div>
                    )}

                    {tab === 'workout' && !isFinished && (
                        <div className="fixed bottom-[72px] left-0 w-full p-4 bg-slate-900/95 backdrop-blur-md border-t border-slate-800 z-40">
                            <button onClick={()=>setRpeMod(true)} className={`w-full text-white font-black py-4 rounded-2xl shadow-xl flex items-center justify-center gap-2 text-lg active:scale-95 transition-transform uppercase tracking-widest ${tEx > 0 ? 'bg-green-500 hover:bg-green-600 shadow-green-900/50' : 'bg-blue-600 hover:bg-blue-700 shadow-blue-900/50'}`}>
                                <Icon name="check"/> {tEx > 0 ? 'FINALIZAR TREINO' : 'REGISTRAR DESCANSO'}
                            </button>
                        </div>
                    )}
                    {tab === 'workout' && isFinished && viewMode === 'review' && tEx > 0 && (
                        <div className="fixed bottom-[72px] left-0 w-full p-4 bg-slate-900/95 backdrop-blur-md border-t border-slate-800 z-40">
                            <button onClick={()=>setViewMode('finished')} className="w-full bg-slate-800 border border-slate-700 hover:bg-slate-700 text-white font-black py-4 rounded-2xl shadow-xl flex items-center justify-center gap-2 text-sm active:scale-95 transition-transform uppercase tracking-widest">
                                <Icon name="arrowUp"/> VOLTAR AO RESUMO DO TREINO
                            </button>
                        </div>
                    )}

                    {gif && (
                        <div className="absolute inset-0 bg-slate-950 z-[250] flex flex-col animate-fade-in">
                            <div className="p-4 flex justify-end bg-transparent absolute top-0 w-full z-10"><button onClick={()=>{setGif(null); setRestTimer(null);}} className="text-white bg-black/50 p-2 rounded-full backdrop-blur-sm"><Icon name="x"/></button></div>
                            {focusMode === 'exercise' ? (
                                <div className="flex-1 flex justify-center items-center bg-black relative">
                                    {gif.gifUrl?<img src={gif.gifUrl} className="w-full h-full object-cover opacity-80"/>:<Icon name="image" size={80} className="text-slate-700"/>}
                                    <div className="absolute bottom-0 left-0 w-full bg-gradient-to-t from-slate-950 via-slate-950/80 to-transparent p-6 pt-20">
                                        <h2 className="text-3xl font-black text-white uppercase mb-4 leading-tight">{gif.title}</h2>
                                        <div className="flex gap-4 mb-8">
                                            <div className="bg-slate-800/80 backdrop-blur-sm p-3 rounded-2xl border border-slate-700 text-center flex-1"><span className="text-[10px] text-slate-400 uppercase font-bold">Séries</span><div className="text-2xl font-black text-blue-400">{gif.sets}</div></div>
                                            <div className="bg-slate-800/80 backdrop-blur-sm p-3 rounded-2xl border border-slate-700 text-center flex-1"><span className="text-[10px] text-slate-400 uppercase font-bold">Reps</span><div className="text-2xl font-black text-green-400">{gif.reps}</div></div>
                                            {gif.rest && <div className="bg-slate-800/80 backdrop-blur-sm p-3 rounded-2xl border border-slate-700 text-center flex-1"><span className="text-[10px] text-slate-400 uppercase font-bold">Descanso</span><div className="text-2xl font-black text-yellow-400">{gif.rest}s</div></div>}
                                        </div>
                                        <button onClick={() => {
                                            const id = gif.id; if(!completed.includes(id)) setCompleted([...completed, id]);
                                            activeExRef.current = id;
                                            if(gif.rest && parseInt(gif.rest) > 0) { setRestTimer(parseInt(gif.rest)); setFocusMode('rest'); } else { goToNextEx(id); }
                                        }} className="w-full bg-green-500 hover:bg-green-600 text-white font-black py-5 rounded-[20px] shadow-xl shadow-green-900/50 flex justify-center items-center gap-2 text-lg active:scale-95 transition-transform">
                                            <Icon name="check" size={24}/> CONCLUIR {gif.rest ? 'E DESCANSAR' : 'SÉRIE'}
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex-1 flex flex-col justify-center items-center bg-slate-900 p-6 relative">
                                     <h2 className="text-xl font-bold text-slate-400 uppercase mb-2 tracking-widest">Descanso Ativo</h2>
                                     <div className="text-8xl font-black text-yellow-400 animate-pulse drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]">{restTimer}</div>
                                     <div className="text-slate-500 mt-4 text-xs font-bold uppercase tracking-widest">O celular vai apitar...</div>
                                     <button onClick={()=>{setRestTimer(0);}} className="mt-10 bg-slate-800 text-white border border-slate-700 px-8 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest active:scale-95 transition-transform">Pular Descanso ⏭️</button>
                                </div>
                            )}
                        </div>
                    )}

                    <div className="fixed bottom-0 left-0 w-full bg-slate-900/90 backdrop-blur-2xl border-t border-slate-800 p-4 flex justify-around items-center z-50 rounded-t-3xl">
                         <div onClick={()=>setTab('workout')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='workout'?'text-blue-500':'text-slate-500'}`}><Icon name="play" size={24}/><span className="text-[8px] font-black uppercase mt-1">Treino</span></div>
                         <div onClick={()=>setTab('agenda')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='agenda'?'text-blue-500':'text-slate-500'}`}><Icon name="calendar" size={24}/><span className="text-[8px] font-black uppercase mt-1">Agenda</span></div>
                         <div onClick={()=>setShowStats(true)} className="flex flex-col items-center text-slate-500 cursor-pointer"><Icon name="activity" size={24}/><span className="text-[8px] font-black uppercase mt-1">Histórico</span></div>
                         <div onClick={()=>setTab('ranking')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='ranking'?'text-yellow-500':'text-slate-500'}`}><Icon name="trophy" size={24}/><span className="text-[8px] font-black uppercase mt-1">Ranking</span></div>
                         <div onClick={()=>setShowProfile(true)} className="flex flex-col items-center text-slate-500 cursor-pointer"><Icon name="target" size={24}/><span className="text-[8px] font-black uppercase mt-1">Perfil FIFA</span></div>
                    </div>

                    <div id="share-card" className="fixed z-[-1]" style={{left: '-9999px', top: '-9999px', width: '400px', backgroundColor: '#0f172a'}}>
                        <div className="p-8 border-4 border-slate-800 rounded-[40px] flex flex-col items-center relative overflow-hidden" style={{backgroundColor: '#0f172a'}}>
                            <div className="absolute top-0 left-0 w-full h-40 opacity-40" style={{background: `linear-gradient(to bottom, ${data.color}, transparent)`}}></div>
                            
                            <div className="z-10 w-full flex justify-between items-center mb-6">
                                {data.logo ? <img src={data.logo} className="w-12 h-12 object-contain drop-shadow-lg"/> : <div className="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center border-2 border-slate-700"><Icon name="trophy" size={20} className="text-slate-500"/></div>}
                                <div className="text-right">
                                    <div className="text-[10px] font-black text-slate-400 tracking-widest uppercase truncate max-w-[200px]">{data.teamName}</div>
                                    <div className="text-xs font-black text-white uppercase tracking-widest">PROCOACH ATHLETE</div>
                                </div>
                            </div>

                            <div className="w-40 h-40 rounded-full border-4 overflow-hidden bg-slate-800 shadow-2xl mb-4 z-10 relative" style={{borderColor: data.color}}>
                                {p.image ? <img src={p.image} className="w-full h-full object-cover object-top"/> : <Icon name="user" size={60} className="m-10 text-white/20"/>}
                            </div>
                            
                            <h2 className="text-3xl font-black uppercase text-white mb-1 z-10 text-center leading-tight">{p.name}</h2>
                            <div className="text-sm font-bold text-slate-400 tracking-widest uppercase mb-8 z-10">{p.pos || 'Atleta'} {p.number ? `#${p.number}` : ''} | {streakTitle}</div>

                            <div className="w-full bg-slate-900 rounded-2xl p-4 border border-slate-700 flex justify-between items-center shadow-lg z-10 mb-6">
                                <div className="text-center w-1/2">
                                    <span className="block text-[10px] font-black text-slate-500 uppercase tracking-wider mb-1">Status</span>
                                    <span className="text-xl font-black text-green-500 uppercase">TREINO CONCLUÍDO</span>
                                </div>
                                <div className="h-10 w-px bg-slate-700"></div>
                                <div className="text-center w-1/2">
                                    <span className="block text-[10px] font-black text-slate-500 uppercase tracking-wider mb-1">Duração</span>
                                    <span className="text-2xl font-black text-white">{data.log[getTodayStr()]?.[idx]?.duration || 60}<span className="text-sm text-slate-400">m</span></span>
                                </div>
                            </div>

                            <div className="text-[10px] font-black text-slate-600 tracking-widest uppercase z-10">POWERED BY PROCOACH MAX</div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
