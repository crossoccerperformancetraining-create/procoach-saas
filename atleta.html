<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #334155; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 10px rgba(0,0,0,0.5); border: 2px solid #334155; }
        .animate-fade-in { animation: fadeIn 0.4s ease-in-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-track { background: transparent; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col font-sans">
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-full shadow-2xl z-[100] text-xs font-bold transition-opacity duration-300" style="opacity:0;pointer-events:none;"></div>
    <div id="root" class="h-full w-full"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        
        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const getGreeting = () => { const hour = new Date().getHours(); return hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite'; };
        const showToast = (msg) => { const t = document.getElementById('toast'); if(t){ t.innerText = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); } };
        const safeArray = (arr) => (Array.isArray(arr) && arr.length > 0) ? arr : []; const safeObj = (obj) => (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
        
        const TIPS = [
            "A dor do pós-treino é a fraqueza saindo do corpo. Recupere-se bem!",
            "O jogo de domingo começa com a sua hidratação de hoje. Beba água!",
            "O verdadeiro craque se faz na recuperação invisível.",
            "O descanso de hoje é a velocidade do seu sprint amanhã.",
            "Campeonatos são ganhos nos treinos que ninguém quer fazer."
        ];

        const Icon = ({ name, size=24, className="", onClick }) => {
            const p = { user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>', check: '<polyline points="20 6 9 17 4 12"/>', x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>', send: '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>', alert: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>', activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>', medkit: '<rect x="2" y="6" width="20" height="14" rx="2"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>', image: '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>', play: '<polygon points="5 3 19 12 5 21 5 3"/>', message: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>' };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill={name==='play'?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} onClick={onClick} dangerouslySetInnerHTML={{__html: p[name]}} />;
        };

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], dm:[], ass:{}, color:'#1e3a8a', id:null });
            const [step, setStep] = useState(1); const [idx, setIdx] = useState(null); const [isPriv, setIsPriv] = useState(false);
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1}); const [pain, setPain] = useState([]);
            const [tp, setTp] = useState(''); const [ts, setTs] = useState('');
            const [loading, setLoading] = useState(true); const [submitting, setSubmitting] = useState(false);
            const [gif, setGif] = useState(null); const [completed, setCompleted] = useState([]);
            
            // Controle de Carga e Feedback
            const [rpeMod, setRpeMod] = useState(false); 
            const [rpe, setRpe] = useState(5); 
            const [dur, setDur] = useState(60);
            const [feedbackMsg, setFeedbackMsg] = useState("");

            const randomTip = useMemo(() => TIPS[Math.floor(Math.random() * TIPS.length)], []);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search); const uId = params.get('id'); const pIdx = params.get('p');
                const proc = (d, id) => {
                    setData({ players: d.players||[], log: d.trainingLog||{}, ex: d.exercises||[], dm: d.dmRecords||[], ass: d.assessments||{}, color: d.themeColor||'#1e3a8a', id });
                    if(pIdx !== null && d.players?.[pIdx]) {
                        setIsPriv(true); setIdx(parseInt(pIdx));
                        if(d.trainingLog?.[getTodayStr()]?.[parseInt(pIdx)]?.wellness?.sleep) setStep(3); else setStep(2);
                    }
                    setLoading(false);
                };
                if(uId) db.collection('coachData').doc(uId).get().then(doc => doc.exists ? proc(doc.data(), doc.id) : setLoading(false));
                else db.collection('coachData').limit(1).get().then(snap => !snap.empty ? proc(snap.docs[0].data(), snap.docs[0].id) : setLoading(false));
            }, []);

            const selectP = (i) => { setIdx(i); if(data.log[getTodayStr()]?.[i]?.wellness?.sleep) setStep(3); else { setScores({sleep:1,stress:1,fatigue:1,soreness:1,mood:1}); setPain([]); setStep(2); } };
            const addP = () => { if(tp) { const z = ts ? `${tp} ${ts}` : tp; if(!pain.includes(z)) setPain([...pain, z]); setTp(''); setTs(''); } };
            
            const subData = () => {
                setSubmitting(true); const td = getTodayStr(); const nl = {...data.log}; if(!nl[td]) nl[td]={}; if(!nl[td][idx]) nl[td][idx]={};
                nl[td][idx] = {...nl[td][idx], wellness: scores, painZones: pain};
                db.collection('coachData').doc(data.id).set({trainingLog: nl}, {merge:true}).then(()=>{setData({...data, log:nl}); setStep(3); setSubmitting(false); showToast("Prontidão enviada!");});
            };

            const saveRPE = () => {
                if(submitting) return;
                setSubmitting(true); const td = getTodayStr();
                db.collection('coachData').doc(data.id).update({
                    [`trainingLog.${td}.${idx}.rpe_am`]: rpe, 
                    [`trainingLog.${td}.${idx}.duration`]: dur,
                    [`trainingLog.${td}.${idx}.feedback`]: feedbackMsg,
                    [`trainingLog.${td}.${idx}.rpeSubmitted`]: true
                }).then(()=>{
                    setSubmitting(false); setRpeMod(false); showToast("Treino Concluído! ✅"); 
                    const nl = {...data.log}; if(!nl[td]) nl[td]={}; if(!nl[td][idx]) nl[td][idx]={};
                    nl[td][idx].rpe_am = rpe; nl[td][idx].duration = dur; nl[td][idx].rpeSubmitted = true;
                    setData({...data, log:nl});
                }).catch(()=>{ setSubmitting(false); alert("Erro de conexão."); });
            };

            const getDM = (id) => {
                const act = safeArray(data.dm).filter(r=>r&&r.playerId==id&&r.status==='Active');
                if(act.length>0) return (parseInt(act[0].rtpPhase)||1)>=3 ? 'TRANSIÇÃO' : 'DM';
                const rec = safeArray(data.dm).filter(r=>r&&r.playerId==id&&r.status==='Recovered'&&r.dateOut);
                const td = new Date(getTodayStr());
                for(let r of rec) if(!isNaN(new Date(r.dateOut).getTime()) && Math.ceil(Math.abs(td - new Date(r.dateOut))/(1000*60*60*24))<=7) return 'TRANSIÇÃO';
                return 'APTO';
            };

            const calcBat = (w) => {
                if(!w || !w.sleep) return { p: 0, c: 'text-slate-500', f: 'bg-slate-500' };
                const s = (w.sleep||0)+(w.stress||0)+(w.fatigue||0)+(w.soreness||0)+(w.mood||0);
                const p = Math.max(0, Math.min(100, Math.round(100 - (((s - 5) / 30) * 100))));
                return { p, c: p<40?'text-red-500':p<75?'text-yellow-500':'text-green-500', f: p<40?'bg-red-500':p<75?'bg-yellow-500':'bg-green-500' };
            };

            if(loading) return <div className="h-full flex items-center justify-center text-blue-500 animate-pulse"><div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>;

            if(step===1) return (
                <div className="h-full flex flex-col p-4 animate-fade-in overflow-y-auto custom-scroll">
                    <div className="text-center mt-6 mb-8"><h1 className="text-3xl font-black text-white italic"><span style={{color:data.color}}>PRO</span>COACH</h1><h2 className="text-xl font-bold mt-6 text-slate-100">{getGreeting()}! Quem é você?</h2></div>
                    <div className="grid grid-cols-3 sm:grid-cols-4 gap-4 pb-10">{data.players.map((p,i)=><div key={i} onClick={()=>selectP(i)} className="flex flex-col items-center gap-2 cursor-pointer active:scale-95"><div className="w-20 h-20 rounded-full border-2 border-slate-700 bg-slate-800 overflow-hidden relative">{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="user" size={32} className="m-5 text-slate-500"/>}{data.log[getTodayStr()]?.[i]?.wellness?.sleep && <div className="absolute bottom-1 right-1 w-4 h-4 bg-green-500 rounded-full border-2 border-slate-800"></div>}</div><span className="text-xs font-bold text-slate-300 truncate w-full text-center">{p.name}</span></div>)}</div>
                </div>
            );

            if(step===2) {
                const p = data.players[idx];
                return (
                    <div className="h-full flex flex-col animate-fade-in relative bg-slate-900">
                        <div className="bg-slate-800 p-4 border-b border-slate-700 flex items-center gap-4 shadow-lg shrink-0">{!isPriv && <button onClick={()=>setStep(1)} className="text-white bg-slate-700 p-2 rounded-full"><Icon name="x" size={20}/></button>}<div className="w-14 h-14 rounded-full bg-slate-700 overflow-hidden shrink-0 border-2" style={{borderColor:data.color}}>{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="user"/>}</div><div><div className="text-[10px] font-bold uppercase" style={{color:data.color}}>Prontidão Diária</div><h2 className="text-lg font-black text-white">{getGreeting()}, {p.name.split(' ')[0]}!</h2></div></div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-6 pb-28 custom-scroll">
                            {[{id:'sleep',l:'😴 Sono (1=Ótimo | 7=Ruim)'},{id:'stress',l:'🤯 Estresse (1=Relax | 7=Tenso)'},{id:'fatigue',l:'🔋 Cansaço (1=Energia | 7=Exausto)'},{id:'soreness',l:'🦵 Dor (1=Nenhuma | 7=Muita)'},{id:'mood',l:'🧠 Humor (1=Feliz | 7=Mal)'}].map(m=>(<div key={m.id} className="bg-slate-800/50 p-4 rounded-xl border border-slate-700"><div className="flex justify-between mb-2 font-bold text-white text-sm"><span>{m.l}</span><span className="bg-slate-900 px-2 rounded text-blue-400">{scores[m.id]}</span></div><input type="range" min="1" max="7" value={scores[m.id]} onChange={e=>setScores({...scores,[m.id]:parseInt(e.target.value)})} className="hooper-slider" style={{background:'linear-gradient(to right,#22c55e,#eab308,#ef4444)'}}/></div>))}
                            <div className="bg-slate-800/80 p-5 rounded-xl border border-red-500/30"><h3 className="font-bold text-red-400 flex gap-2"><Icon name="alert"/> Dores Focais</h3><div className="flex gap-2 mt-3"><select className="flex-1 bg-slate-900 text-white text-xs p-2 rounded outline-none border border-slate-600" onChange={e=>setTp(e.target.value)} value={tp}><option value="">Local?</option>{["Pescoço","Ombro","Costas","Lombar","Quadril","Adutor","Joelho","Posterior","Panturrilha","Tornozelo","Pé"].map(x=><option key={x}>{x}</option>)}</select><select className="w-20 bg-slate-900 text-white text-xs p-2 rounded outline-none border border-slate-600" onChange={e=>setTs(e.target.value)} value={ts}><option value="">Lado?</option><option>(Dir)</option><option>(Esq)</option></select><button onClick={addP} className="bg-red-600 text-white px-3 rounded font-bold">+</button></div>{pain.length>0&&<div className="flex flex-wrap gap-2 mt-3">{pain.map(z=><span key={z} onClick={()=>setPain(pain.filter(x=>x!==z))} className="bg-red-900/50 text-red-300 text-xs px-2 py-1 rounded cursor-pointer">{z} x</span>)}</div>}</div>
                        </div>
                        <div className="absolute bottom-0 w-full p-4 bg-slate-900/90 z-20"><button onClick={subData} disabled={submitting} className="w-full text-white font-black py-4 rounded-xl flex justify-center gap-2" style={{backgroundColor:data.color}}>{submitting ? <div className="w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <><Icon name="send"/> ENVIAR PRONTIDÃO</>}</button></div>
                    </div>
                );
            }

            if (step === 3) {
                const p = data.players[idx]; const dm = getDM(idx); const inj = dm==='DM'; const trans = dm==='TRANSIÇÃO';
                const ass = data.ass[idx]?.[0]?.anamnese?.toLowerCase() || '';
                const hasLca = ass.includes('lca'); const hasPub = ass.includes('pubalgia'); const hasPost = ass.includes('posterior')||ass.includes('muscular');
                
                let prev=[], gen=[];
                if(trans) { gen=data.ex.filter(x=>x.target==='Transição (Retorno DM)'); prev=data.ex.filter(x=>x.target==='Manutenção (Histórico Lesão)'); }
                else if(!inj) { gen=data.ex.filter(x=>x.target==='Geral'); prev=data.ex.filter(x=>(x.target==='LCA'&&hasLca)||(x.target==='Pubalgia'&&hasPub)||(x.target==='Posterior'&&hasPost)); }
                
                const tEx = prev.length+gen.length; const pct = tEx>0?Math.round((completed.length/tEx)*100):0;
                const tog = (id) => setCompleted(completed.includes(id)?completed.filter(x=>x!==id):[...completed,id]);
                
                const wl = data.log[getTodayStr()]?.[idx]?.wellness||{}; const bat = calcBat(wl);
                const isFinished = data.log[getTodayStr()]?.[idx]?.rpeSubmitted === true;

                return (
                    <div className="h-full bg-slate-950 flex flex-col relative overflow-hidden">
                        <div className="absolute top-4 right-4 flex gap-2 z-50"><button onClick={()=>window.location.reload()} className="bg-black/40 p-2 rounded-full text-white"><Icon name="refresh" size={18}/></button>{!isPriv&&<button onClick={()=>setStep(1)} className="bg-black/40 p-2 rounded-full text-white"><Icon name="x" size={18}/></button>}</div>
                        
                        <div className="p-6 shrink-0 rounded-b-3xl shadow-xl relative" style={{ background: `linear-gradient(to bottom, ${inj?'#dc2626':trans?'#f97316':data.color}, #020617)` }}>
                            <div className="flex items-center gap-4 mb-4 mt-2">
                                <div className="w-16 h-16 rounded-full border-2 border-white/50 overflow-hidden bg-slate-800 shadow-lg">{p?.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" size={30} className="m-4 text-white/50"/>}</div>
                                <div className="flex-1">
                                    <h1 className="text-xl font-black uppercase text-white tracking-wider">{p?.name}</h1>
                                    <span className="text-[10px] font-bold bg-white/20 text-white px-2 py-1 rounded inline-block mt-1">{inj?'DEPARTAMENTO MÉDICO':trans?'TRANSIÇÃO':'TREINO REGULAR'}</span>
                                </div>
                            </div>
                            {!inj && tEx > 0 && !isFinished && (
                                <div className="mt-6"><div className="flex justify-between text-[10px] font-bold uppercase mb-1 text-white/70"><span>Progresso</span><span>{pct}%</span></div><div className="w-full h-1.5 bg-white/10 rounded-full overflow-hidden"><div className="h-full bg-green-400 transition-all duration-500" style={{width: `${pct}%`}}></div></div></div>
                            )}
                        </div>
                        
                        <div className="p-4 flex flex-col gap-4 flex-1 overflow-y-auto custom-scroll pb-24">
                            <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 flex items-center justify-between"><div className="flex gap-3"><div className="bg-slate-900 p-2 rounded-full"><Icon name="check" size={20} className="text-green-500"/></div><div><h3 className="font-bold text-sm text-white">Wellness Feito</h3><p className="text-[10px] text-slate-400">Prontidão Diária</p></div></div><div className="flex flex-col items-center justify-center"><div className="flex items-center gap-1 border-2 border-slate-600 rounded p-1 w-12 h-6 relative"><div className={`h-full ${bat.f} transition-all`} style={{width: `${bat.p}%`}}></div><div className="absolute -right-1.5 top-1.5 w-1 h-2 bg-slate-600 rounded-r"></div></div><span className={`text-[9px] font-bold mt-1 ${bat.c}`}>{bat.p}% Bateria</span></div></div>

                            {isFinished ? (
                                <div className="bg-green-900/20 border border-green-800 p-8 rounded-xl text-center flex flex-col items-center animate-fade-in mt-4 shadow-lg">
                                    <div className="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-4 shadow-lg shadow-green-500/50"><Icon name="check" size={40} className="text-white"/></div>
                                    <h2 className="text-2xl font-black text-green-500 uppercase mb-2">Treino Concluído!</h2>
                                    <p className="text-xs text-slate-300 font-bold mb-6">Obrigado por registrar seu esforço. Bom descanso!</p>
                                    <div className="w-full bg-slate-900 rounded-lg p-4 border border-slate-800 flex justify-between items-center shadow-inner">
                                        <div className="text-left"><span className="block text-[10px] font-bold text-slate-500 uppercase">Esforço (PSE)</span><span className="text-xl font-black text-white">{data.log[getTodayStr()]?.[idx]?.rpe_am}/10</span></div>
                                        <div className="h-8 w-px bg-slate-700"></div>
                                        <div className="text-right"><span className="block text-[10px] font-bold text-slate-500 uppercase">Duração</span><span className="text-xl font-black text-blue-400">{data.log[getTodayStr()]?.[idx]?.duration} min</span></div>
                                    </div>
                                    <p className="mt-8 text-[10px] text-slate-500 italic max-w-xs text-center px-4">"{randomTip}"</p>
                                </div>
                            ) : (
                                <>
                                    {!inj && prev.length>0 && <div className="bg-yellow-900/20 border border-yellow-800 p-4 rounded-xl relative overflow-hidden"><div className="absolute top-0 right-0 w-2 h-full bg-yellow-500"></div><h3 className="text-xs font-black text-yellow-500 uppercase flex items-center gap-2 mb-3"><Icon name="alert" size={14}/> {trans ? 'Manutenção' : 'Prevenção Específica'}</h3>{prev.map(ex => (<div key={ex.id} className="bg-black/40 p-3 rounded-lg flex gap-3 items-center mb-2"><div className="w-16 h-16 bg-slate-700 rounded overflow-hidden shrink-0 cursor-pointer relative group" onClick={() => setGif(ex)}>{ex.gifUrl ? <img src={ex.gifUrl} className="w-full h-full object-cover opacity-80" onError={(e)=>e.target.style.display='none'}/> : <Icon name="activity" className="m-5 text-slate-500"/>}<div className="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100"><Icon name="play" size={20} className="text-white"/></div></div><div className="flex-1"><div className="font-bold text-xs text-white">{ex.title}</div><div className="text-[10px] text-slate-400 mt-1">{ex.sets}x {ex.reps} {ex.rest && `| Rep: ${ex.rest}s`}</div></div><div onClick={()=>tog(ex.id)} className={`w-8 h-8 rounded-full border-2 flex items-center justify-center cursor-pointer transition-colors ${completed.includes(ex.id) ? 'bg-yellow-500 border-yellow-500 text-white' : 'border-slate-600 text-transparent'}`}><Icon name="check" size={16}/></div></div>))}</div>}
                                    {!inj && <div className="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden"><div className="bg-slate-700/50 p-3 border-b border-slate-700 flex items-center gap-2"><Icon name="activity" size={16} className="text-blue-400"/><h3 className="font-bold text-sm uppercase text-white">{trans ? 'Treino de Transição' : 'Treino Principal'}</h3></div><div className="p-4 flex flex-col gap-3">{gen.length === 0 ? (<div className="text-center text-slate-500 text-xs py-4">A ficha de hoje não possui exercícios.</div>) : gen.map(ex => (<div key={ex.id} className="bg-slate-900/50 p-3 rounded-lg border border-slate-700/50 flex gap-3"><div className="w-20 h-20 bg-slate-800 rounded overflow-hidden shrink-0 cursor-pointer relative group" onClick={() => setGif(ex)}>{ex.gifUrl ? <img src={ex.gifUrl} className="w-full h-full object-cover" onError={(e)=>e.target.style.display='none'}/> : <Icon name="image" className="m-6 text-slate-500"/>}<div className="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100"><Icon name="play" size={24} className="text-white"/></div></div><div className="flex-1 flex flex-col justify-between"><div><div className="font-bold text-xs text-white">{ex.title}</div><div className="text-[10px] text-blue-400 font-bold uppercase mt-1">{ex.sets}x {ex.reps} {ex.rest && `| Rep: ${ex.rest}s`}</div></div></div><div className="flex items-center justify-center"><div onClick={()=>tog(ex.id)} className={`w-8 h-8 rounded-full border-2 flex items-center justify-center cursor-pointer transition-colors ${completed.includes(ex.id) ? 'bg-green-500 border-green-500 text-white' : 'border-slate-600 text-transparent'}`}><Icon name="check" size={16}/></div></div></div>))}</div></div>}
                                </>
                            )}
                            {inj && !isFinished && <div className="bg-red-900/20 p-6 rounded-xl border border-red-800 text-center"><Icon name="medkit" size={30} className="mx-auto text-red-500 mb-2"/><h3 className="text-red-500 font-bold uppercase">Fisioterapia</h3><p className="text-slate-400 text-xs mt-2">Tratamento e reavaliação obrigatória.</p></div>}
                        </div>

                        {!inj && !isFinished && (
                            <div className="absolute bottom-0 left-0 w-full p-4 bg-slate-900/90 backdrop-blur-md border-t border-slate-800 z-20">
                                <button onClick={()=>setRpeMod(true)} className="w-full bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-2xl flex justify-center gap-2 shadow-xl shadow-green-900/50 uppercase text-lg">
                                    <Icon name="check"/> FINALIZAR TREINO
                                </button>
                            </div>
                        )}

                        {rpeMod && (
                            <div className="absolute inset-0 bg-slate-950/90 backdrop-blur-md z-[100] flex flex-col items-center justify-center p-6 animate-fade-in font-sans">
                                <div className="bg-slate-800 rounded-3xl border border-slate-700 w-full max-w-sm p-6 shadow-2xl flex flex-col items-center relative">
                                    <button onClick={()=>setRpeMod(false)} className="absolute top-4 right-4 text-slate-400 hover:text-white"><Icon name="x" size={20}/></button>
                                    <div className="w-16 h-16 bg-blue-500/20 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-3"><Icon name="activity" size={32}/></div>
                                    <h2 className="text-2xl font-black text-white uppercase text-center mb-2">Bom Trabalho!</h2>
                                    <p className="text-xs text-slate-400 text-center mb-6">Registre seu esforço para salvar o treino.</p>
                                    <div className="w-full mb-6">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase flex justify-between mb-2"><span>Esforço (PSE)</span><span className="text-blue-400 font-black text-sm">{rpe}/10</span></label>
                                        <input type="range" min="0" max="10" step="1" value={rpe} onChange={e=>setRpe(parseInt(e.target.value))} className="hooper-slider w-full h-3 mb-2" style={{background:'linear-gradient(to right,#3b82f6,#ef4444)'}}/>
                                        <div className="flex justify-between text-[9px] text-slate-500 font-bold uppercase mt-1"><span>Muito Leve</span><span>Exaustivo</span></div>
                                    </div>
                                    <div className="w-full mb-4">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Duração (Minutos)</label>
                                        <input type="number" min="0" value={dur} onChange={e=>setDur(parseInt(e.target.value))} className="w-full bg-slate-900 border border-slate-600 text-white text-center font-black text-2xl py-3 rounded-xl outline-none"/>
                                    </div>
                                    <div className="w-full mb-6">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase mb-2 flex items-center gap-1"><Icon name="message" size={12}/> Feedback ao Professor (Opcional)</label>
                                        <textarea className="w-full bg-slate-900 border border-slate-600 text-white text-xs p-3 rounded-xl outline-none h-16" placeholder="Ex: Senti dor no adutor na última série..." value={feedbackMsg} onChange={e=>setFeedbackMsg(e.target.value)}></textarea>
                                    </div>
                                    <button onClick={saveRPE} disabled={submitting} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg flex justify-center gap-2">
                                        {submitting ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <><Icon name="send"/> REGISTRAR TREINO</>}
                                    </button>
                                </div>
                            </div>
                        )}

                        {gif && (
                            <div className="absolute inset-0 bg-slate-950 z-[100] flex flex-col"><div className="p-4 flex justify-end bg-slate-900"><button onClick={()=>setGif(null)} className="text-white bg-slate-800 p-2 rounded-full"><Icon name="x"/></button></div><div className="flex-1 flex justify-center items-center bg-black p-4 relative">{gif.gifUrl?<img src={gif.gifUrl} className="w-full max-h-[50vh] object-contain rounded-lg shadow-2xl"/>:<Icon name="image" size={60} className="text-slate-700"/>}</div><div className="bg-slate-900 p-6 rounded-t-3xl border-t border-slate-800 pb-10"><div className="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-6"></div><h2 className="text-2xl font-black text-white uppercase mb-2 text-center">{gif.title}</h2><div className="flex justify-center gap-4 mt-6"><div className="bg-slate-800 p-3 rounded-xl border border-slate-700 text-center w-24"><span className="text-[10px] text-slate-400 uppercase font-bold">Séries</span><div className="text-xl font-black text-blue-400">{gif.sets}</div></div><div className="bg-slate-800 p-3 rounded-xl border border-slate-700 text-center w-24"><span className="text-[10px] text-slate-400 uppercase font-bold">Reps</span><div className="text-xl font-black text-green-400">{gif.reps}</div></div>{gif.rest && (<div className="bg-slate-800 p-3 rounded-xl border border-slate-700 text-center w-24"><span className="text-[10px] text-slate-400 uppercase font-bold">Repouso</span><div className="text-xl font-black text-yellow-400">{gif.rest}s</div></div>)}</div><button onClick={() => setGif(null)} className="w-full mt-8 bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700">FECHAR</button></div></div>
                        )}
                    </div>
                );
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<AthletePortal />);
    </script>
</body>
</html>
