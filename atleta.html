<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .tab-active { color: #3b82f6 !important; font-weight: 900; }
        .card-pro { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .nutri-gradient { background: linear-gradient(135deg, #065f46 0%, #064e3b 100%); border-left: 4px solid #10b981; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        const getGreeting = () => { const hour = new Date().getHours(); return hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite'; };
        const getQuote = () => {
            const quotes = ["O suor de hoje é a vitória de amanhã!", "A disciplina é a ponte entre metas e realizações.", "Não pare até se orgulhar.", "Onde a vontade não falha, o caminho se abre."];
            return quotes[new Date().getDay() % quotes.length];
        };

        const RadarChart = ({ size = 180 }) => {
            const center = size / 2; const radius = (size / 2) * 0.7;
            const points = [ { label: 'FOR', val: 85 }, { label: 'VEL', val: 92 }, { label: 'POT', val: 78 }, { label: 'TEC', val: 88 }, { label: 'RES', val: 82 } ];
            const poly = points.map((p, i) => { const a = (Math.PI * 2 * i) / points.length - Math.PI / 2; return `${center + (radius * (p.val / 100)) * Math.cos(a)},${center + (radius * (p.val / 100)) * Math.sin(a)}`; }).join(' ');
            return (
                <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="mx-auto">
                    {[0.5, 1].map(s => <circle key={s} cx={center} cy={center} r={radius * s} fill="none" stroke="#334155" strokeDasharray="4" />)}
                    <polygon points={poly} fill="rgba(59, 130, 246, 0.4)" stroke="#3b82f6" strokeWidth="2" />
                    {points.map((p, i) => { const a = (Math.PI * 2 * i) / points.length - Math.PI / 2; return <text key={i} x={center + (radius + 15) * Math.cos(a)} y={center + (radius + 15) * Math.sin(a)} fill="#94a3b8" fontSize="10" textAnchor="middle" fontWeight="bold">{p.label}</text> })}
                </svg>
            );
        };

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, exercises:[], days:[], id:null, coachMsg:'' });
            const [idx, setIdx] = useState(null); const [step, setStep] = useState(1);
            const [tab, setTab] = useState('treino');
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1});
            const [water, setWater] = useState(0);
            const [tp, setTp] = useState(''); const [ts, setTs] = useState(''); const [pain, setPain] = useState([]);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id'); const pIdx = params.get('p');
                if(!uId) return;
                db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ ...d, id: doc.id });
                        if(pIdx !== null && step === 1) { 
                            setIdx(parseInt(pIdx)); setStep(2); 
                            const today = new Date().toISOString().split('T')[0];
                            setWater(Number(d.trainingLog?.[today]?.[parseInt(pIdx)]?.waterIntake) || 0);
                        }
                    }
                });
            }, []);

            const addPain = () => { if(tp) { const z = ts ? `${tp} ${ts}` : tp; if(!pain.includes(z)) setPain([...pain, z]); setTp(''); setTs(''); } };

            const handleSendWellness = () => {
                const today = new Date().toISOString().split('T')[0];
                db.collection('coachData').doc(data.id).set({ trainingLog: { [today]: { [idx]: { wellness: scores, painZones: pain } } } }, {merge:true})
                .then(()=> alert("✅ Prontidão enviada!"));
            };

            if(step===1) return (
                <div className="p-8 flex flex-col items-center justify-center min-h-screen">
                    <h1 className="text-3xl font-black italic mb-10 tracking-tighter uppercase text-white">PROCOACH</h1>
                    <div className="grid grid-cols-3 gap-6 w-full max-w-sm">
                        {data.players.map((p, i) => (
                            <div key={i} onClick={()=>{setIdx(i); setStep(2);}} className="flex flex-col items-center gap-2 cursor-pointer active:scale-90">
                                <div className="w-20 h-20 rounded-full border-2 border-slate-800 overflow-hidden bg-slate-900">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <div className="flex h-full items-center justify-center text-2xl">👤</div>}
                                </div>
                                <span className="text-[10px] font-bold text-slate-400 uppercase truncate w-full text-center">{p.name}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const p = data.players[idx];
            return (
                <div className="flex flex-col min-h-screen pb-32">
                    <div className="p-6 rounded-b-[40px] shadow-2xl relative overflow-hidden" style={{ background: 'linear-gradient(135deg, #1e3a8a, #020617)' }}>
                        <div className="flex justify-between items-start mb-4">
                            <div className="flex items-center gap-4">
                                <div className="w-20 h-20 rounded-full border-2 border-white/20 overflow-hidden shrink-0">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <div className="p-4 text-center">👤</div>}
                                </div>
                                <div>
                                    <h2 className="text-lg font-black text-white uppercase italic leading-tight">{p.name}</h2>
                                    <p className="text-[10px] font-bold text-blue-400 uppercase tracking-widest">{p.position || 'ATLETA'}</p>
                                </div>
                            </div>
                            <button onClick={()=>setStep(1)} className="bg-white/10 px-4 py-2 rounded-full text-[9px] font-black uppercase border border-white/10">Mudar</button>
                        </div>
                        <div className="mt-2 text-[10px] text-white/70 italic font-bold">✨ "{getQuote()}"</div>
                    </div>

                    <div className="p-6 space-y-6 flex-1 overflow-y-auto custom-scroll">
                        {tab === 'treino' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="card-pro p-5 border-l-4 border-blue-500">
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-[10px] font-black text-blue-400 uppercase tracking-widest">💧 Hidratação</span>
                                        <span className="text-[10px] font-bold text-slate-300">{water.toFixed(2)}L / 3.0L</span>
                                    </div>
                                    <button onClick={()=>{const newVal = water + 0.25; setWater(newVal); const td = new Date().toISOString().split('T')[0]; db.collection('coachData').doc(data.id).update({ [`trainingLog.${td}.${idx}.waterIntake`]: newVal });}} className="w-full bg-blue-600 text-white font-black py-3 rounded-2xl text-xs uppercase">+ BEBI 250ML</button>
                                </div>

                                <div className="nutri-gradient p-5 rounded-[24px]">
                                    <h4 className="text-[10px] font-black text-emerald-400 uppercase mb-2">🍎 Nutrição Pré-Jogo</h4>
                                    <p className="text-xs text-emerald-50 leading-relaxed font-bold uppercase italic">Macarrão/Arroz Branco + Frango Grelhado (3h antes). Hidrate-se bem.</p>
                                </div>

                                {data.coachMsg && (
                                    <div className="card-pro p-5 border-l-4 border-orange-500">
                                        <h4 className="text-[10px] font-black text-orange-500 uppercase mb-2">📢 Recado do Coach</h4>
                                        <p className="text-sm text-slate-200 font-semibold italic leading-relaxed">{data.coachMsg}</p>
                                    </div>
                                )}

                                <div className="space-y-5">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center border-b border-slate-800 pb-2">Prontidão Diária</h3>
                                    {[{id:'sleep',l:'Sono'},{id:'stress',l:'Estresse'},{id:'fatigue',l:'Cansaço'},{id:'soreness',l:'Dor'},{id:'mood',l:'Humor'}].map(m=>(
                                        <div key={m.id} className="card-pro p-4">
                                            <div className="flex justify-between mb-3 font-bold text-white text-[10px] uppercase"><span>{m.l}</span><span className="text-blue-400">{scores[m.id]}</span></div>
                                            <input type="range" min="1" max="7" value={scores[m.id]} onChange={e=>setScores({...scores,[m.id]:parseInt(e.target.value)})} className="hooper-slider" style={{background:'linear-gradient(to right,#22c55e,#eab308,#ef4444)'}}/>
                                        </div>
                                    ))}
                                    
                                    <div className="card-pro p-5 border-red-500/30">
                                        <h3 className="text-red-400 text-[10px] font-black uppercase mb-3 tracking-widest">⚠️ Registro de Dores</h3>
                                        <div className="flex gap-2 mb-3">
                                            <select className="flex-1 bg-slate-900 text-white text-xs p-3 rounded-xl border border-slate-700 outline-none" onChange={e=>setTp(e.target.value)} value={tp}>
                                                <option value="">Local...</option>
                                                {["Pescoço","Ombro","Costas","Quadril","Adutor","Coxa","Joelho","Panturrilha","Tornozelo","Pé"].map(x=><option key={x}>{x}</option>)}
                                            </select>
                                            <select className="w-20 bg-slate-900 text-white text-xs p-3 rounded-xl border border-slate-700 outline-none" onChange={e=>setTs(e.target.value)} value={ts}>
                                                <option value="">Lado</option><option>(Dir)</option><option>(Esq)</option>
                                            </select>
                                            <button onClick={addPain} className="bg-red-600 text-white px-4 rounded-xl font-black">+</button>
                                        </div>
                                        <div className="flex flex-wrap gap-2">{pain.map(z=><span key={z} onClick={()=>setPain(pain.filter(x=>x!==z))} className="bg-red-900/40 text-red-300 text-[9px] font-bold px-2 py-1 rounded border border-red-800">{z} ×</span>)}</div>
                                    </div>

                                    <button onClick={handleSendWellness} className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase text-xs">Enviar Prontidão</button>
                                </div>
                            </div>
                        )}

                        {tab === 'micro' && (
                            <div className="space-y-4 animate-fade-in">
                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6 text-center">Calendário Semanal</h3>
                                {data.days?.map((day, di) => (
                                    <div key={di} className="card-pro p-5 space-y-4">
                                        <div className="flex justify-between items-center"><span className="text-lg font-black italic uppercase text-white">{day.name}</span><span className="text-[9px] font-bold bg-blue-600 px-2 py-1 rounded text-white">{day.md || 'Treino'}</span></div>
                                        <div className="grid grid-cols-2 gap-3 text-[10px] font-bold uppercase">
                                            <div className="bg-slate-950 p-3 rounded-xl"><div className="text-blue-500 mb-1">Manhã</div>{(day.am || []).map(e=>e.type).join(', ') || 'Folga'}</div>
                                            <div className="bg-slate-950 p-3 rounded-xl"><div className="text-orange-500 mb-1">Tarde</div>{(day.pm || []).map(e=>e.type).join(', ') || 'Folga'}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'rank' && (
                            <div className="space-y-4 animate-fade-in">
                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Artilharia</h3>
                                {data.players.sort((a,b)=> (b.stats?.g||0) - (a.stats?.g||0)).map((pl, ri) => (
                                    <div key={ri} className="card-pro p-4 flex justify-between items-center">
                                        <div className="flex items-center gap-3"><span className="text-lg font-black text-slate-700">#{ri+1}</span><span className="text-xs font-bold uppercase">{pl.name}</span></div>
                                        <div className="bg-yellow-500 text-slate-950 px-3 py-1 rounded-full font-black text-[10px]">{pl.stats?.g || 0} GOLS</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'perfil' && (
                            <div className="animate-fade-in space-y-6">
                                <div className="card-pro p-8 text-center">
                                    <RadarChart />
                                    <h2 className="text-2xl font-black mt-4 uppercase italic">Perfil Performance</h2>
                                    <div className="grid grid-cols-2 gap-3 mt-6">
                                        <div className="bg-slate-950 p-4 rounded-2xl"><div className="text-[9px] text-slate-500 font-black mb-1 uppercase tracking-widest">Nota Geral</div><div className="text-2xl font-black text-white">88</div></div>
                                        <div className="bg-slate-950 p-4 rounded-2xl"><div className="text-[9px] text-slate-500 font-black mb-1 uppercase tracking-widest">Potencial</div><div className="text-2xl font-black text-blue-400">94</div></div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-800 p-4 flex justify-around items-center z-[100] rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
                         <div onClick={()=>setTab('treino')} className={`flex flex-col items-center gap-1 ${tab==='treino'?'text-blue-500':'text-slate-600'}`}><span className="text-xl">⚽</span><span className="text-[8px] font-black uppercase">Treino</span></div>
                         <div onClick={()=>setTab('micro')} className={`flex flex-col items-center gap-1 ${tab==='micro'?'text-blue-500':'text-slate-600'}`}><span className="text-xl">📅</span><span className="text-[8px] font-black uppercase">Semana</span></div>
                         <div onClick={()=>setTab('rank')} className={`flex flex-col items-center gap-1 ${tab==='rank'?'text-blue-500':'text-slate-600'}`}><span className="text-xl">📊</span><span className="text-[8px] font-black uppercase">Rank</span></div>
                         <div onClick={()=>setTab('perfil')} className={`flex flex-col items-center gap-1 ${tab==='perfil'?'text-blue-500':'text-slate-600'}`}><span className="text-xl">👤</span><span className="text-[8px] font-black uppercase">Perfil</span></div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
