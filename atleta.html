<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #334155; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 10px rgba(0,0,0,0.5); border: 2px solid #334155; }
        .animate-fade-in { animation: fadeIn 0.4s; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-track { background: transparent; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .gold-shine { background: linear-gradient(90deg, #eab308, #fef08a, #eab308); background-size: 200% auto; animation: shine 3s linear infinite; color: #422006; } @keyframes shine { to { background-position: 200% center; } }
        .badge-locked { filter: grayscale(100%) opacity(0.4); }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col font-sans bg-slate-950">
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-3 rounded-full shadow-2xl z-[100] text-xs font-bold transition-opacity duration-300 pointer-events-none flex items-center gap-2" style="opacity:0;"></div>
    <div id="root" class="h-full w-full"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        
        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const getGreeting = () => { const hour = new Date().getHours(); return hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite'; };
        const showToast = (msg, icon="✅") => { const t = document.getElementById('toast'); if(t){ t.innerHTML = `<span>${icon}</span> ${msg}`; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); } };
        const safeArray = (arr) => (Array.isArray(arr) && arr.length > 0) ? arr : []; const safeObj = (obj) => (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
        const formatDateBR = (ds) => { if(!ds) return '-'; const [y, m, d] = ds.split('-'); return `${d}/${m}`; };
        const getDatesInRange = (start, days) => { const dates=[]; const end=new Date(start); end.setMinutes(end.getMinutes()-end.getTimezoneOffset()); for(let i=0;i<days;i++){const d=new Date(end); d.setDate(end.getDate()-i); dates.push(d.toISOString().split('T')[0]);} return dates; };
        
        const TIPS = [
            "A dor do pós-treino é a fraqueza saindo do corpo. Recupere-se bem!",
            "O jogo de domingo começa com a sua hidratação de hoje. Beba água!",
            "O verdadeiro craque se faz na recuperação invisível.",
            "O descanso de hoje é a velocidade do seu sprint amanhã.",
            "Campeonatos são ganhos nos treinos que ninguém quer fazer."
        ];

        const Icon = ({ name, size=24, className="", onClick }) => {
            const p = { user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>', check: '<polyline points="20 6 9 17 4 12"/>', x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>', send: '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>', alert: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>', activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>', medkit: '<rect x="2" y="6" width="20" height="14" rx="2"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>', image: '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>', play: '<polygon points="5 3 19 12 5 21 5 3"/>', clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>', trophy: '<path d="M8 21h8m-4-9v9"/><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/><path d="M7 2v16"/><path d="M17 2v16"/>', refresh: '<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 0 20.49 15"/>', barChart: '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>', brain: '<path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>', message: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>', star: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>' };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill={name==='play'||name==='trophy'||name==='star'?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} onClick={onClick} dangerouslySetInnerHTML={{__html: p[name]}} />;
        };

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], act:[], dm:[], ass:{}, matchM:{}, postW:'IA', nextG:{opponent:'',date:''}, coachMsg:'', potw:null, color:'#1e3a8a', id:null, videoUrl:'' });
            const [step, setStep] = useState(1); const [idx, setIdx] = useState(null); const [isPriv, setIsPriv] = useState(false);
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1}); const [pain, setPain] = useState([]);
            const [tp, setTp] = useState(''); const [ts, setTs] = useState('');
            const [loading, setLoading] = useState(true); const [submitting, setSubmitting] = useState(false);
            const [gif, setGif] = useState(null); const [completed, setCompleted] = useState([]);
            
            const [rpeMod, setRpeMod] = useState(false); 
            const [rpe, setRpe] = useState(5); 
            const [dur, setDur] = useState(60);
            const [feedbackMsg, setFeedbackMsg] = useState("");
            const [showStats, setShowStats] = useState(false);
            
            const randomTip = useMemo(() => TIPS[Math.floor(Math.random() * TIPS.length)], []);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search); const uId = params.get('id'); const pIdx = params.get('p');
                const proc = (d, id) => {
                    setData({ players: d.players||[], log: d.trainingLog||{}, ex: d.exercises||[], act: d.activationExercises||[], dm: d.dmRecords||[], ass: d.assessments||{}, matchM: d.matchMinutes||{}, postW: d.postWorkout||'IA', nextG: d.nextGame||{}, coachMsg: d.coachMsg||d.coachMessage||'', potw: d.playerOfTheWeek, color: d.themeColor||'#1e3a8a', id, videoUrl: d.videoUrl||'' });
                    if(pIdx !== null && d.players?.[parseInt(pIdx)]) {
                        setIsPriv(true); setIdx(parseInt(pIdx));
                        if(d.trainingLog?.[getTodayStr()]?.[parseInt(pIdx)]?.wellness?.sleep) setStep(3); else setStep(2);
                    }
                    setLoading(false);
                };

                let unsubscribe = () => {};
                if(uId) {
                    unsubscribe = db.collection('coachData').doc(uId).onSnapshot(doc => {
                        if (doc.exists) proc(doc.data(), doc.id);
                        else setLoading(false);
                    }, err => { console.error(err); setLoading(false); });
                } else {
                    db.collection('coachData').limit(1).get().then(snap => !snap.empty ? proc(snap.docs[0].data(), snap.docs[0].id) : setLoading(false));
                }
                return () => unsubscribe();
            }, []);

            const selectP = (i) => { setIdx(i); if(data.log[getTodayStr()]?.[i]?.wellness?.sleep) setStep(3); else { setScores({sleep:1,stress:1,fatigue:1,soreness:1,mood:1}); setPain([]); setStep(2); } };
            const addP = () => { if(tp) { const z = ts ? `${tp} ${ts}` : tp; if(!pain.includes(z)) setPain([...pain, z]); setTp(''); setTs(''); } };
            
            const subData = () => {
                setSubmitting(true); const td = getTodayStr(); const nl = {...data.log}; if(!nl[td]) nl[td]={}; if(!nl[td][idx]) nl[td][idx]={};
                nl[td][idx] = {...nl[td][idx], wellness: scores, painZones: pain};
                db.collection('coachData').doc(data.id).set({trainingLog: nl}, {merge:true}).then(()=>{setData({...data, log:nl}); setStep(3); setSubmitting(false); showToast("Prontidão enviada!", "✅");});
            };

            const saveRPE = () => {
                if(submitting) return;
                setSubmitting(true); const td = getTodayStr();
                db.collection('coachData').doc(data.id).update({
                    [`trainingLog.${td}.${idx}.rpe_am`]: rpe, 
                    [`trainingLog.${td}.${idx}.duration`]: dur,
                    [`trainingLog.${td}.${idx}.feedback`]: feedbackMsg,
                    [`trainingLog.${td}.${idx}.rpeSubmitted`]: true
                }).then(()=>{
                    setSubmitting(false); setRpeMod(false); showToast("Treino Concluído! 🚀", "🔥"); 
                    const nl = {...data.log}; if(!nl[td]) nl[td]={}; if(!nl[td][idx]) nl[td][idx]={};
                    nl[td][idx].rpe_am = rpe; nl[td][idx].duration = dur; nl[td][idx].rpeSubmitted = true;
                    setData({...data, log:nl});
                    window.scrollTo(0,0);
                }).catch(()=>{ setSubmitting(false); alert("Erro de conexão."); });
            };

            const getDM = (id) => {
                const act = safeArray(data.dm).filter(r=>r&&r.playerId==id&&r.status==='Active');
                if(act.length>0) return (parseInt(act[0].rtpPhase)||1)>=3 ? 'TRANSIÇÃO' : 'DM';
                const rec = safeArray(data.dm).filter(r=>r&&r.playerId==id&&r.status==='Recovered'&&r.dateOut);
                const td = new Date(getTodayStr());
                for(let r of rec) if(!isNaN(new Date(r.dateOut).getTime()) && Math.ceil(Math.abs(td - new Date(r.dateOut))/(1000*60*60*24))<=7) return 'TRANSIÇÃO';
                return 'APTO';
            };

            const calcBat = (w) => {
                if(!w || !w.sleep) return { p: 0, c: 'text-slate-500', f: 'bg-slate-500' };
                const s = (w.sleep||0)+(w.stress||0)+(w.fatigue||0)+(w.soreness||0)+(w.mood||0);
                const p = Math.max(0, Math.min(100, Math.round(100 - (((s - 5) / 30) * 100))));
                return { p, c: p<40?'text-red-500':p<75?'text-yellow-500':'text-green-500', f: p<40?'bg-red-500':p<75?'bg-yellow-500':'bg-green-500' };
            };

            const getPlayerStats = () => {
                let wCompleted = 0; let sleepSum = 0; let sleepCount = 0; let totalMins = 0; let currentStreak = 0;
                
                Object.keys(data.log).forEach(dateStr => {
                    const l = data.log[dateStr]?.[idx];
                    if(l?.rpeSubmitted) wCompleted++;
                    if(l?.wellness?.sleep) { sleepSum += l.wellness.sleep; sleepCount++; }
                });
                if(data.matchM) { Object.keys(data.matchM).forEach(d => { totalMins += (Number(data.matchM[d]?.[idx]) || 0); }); }
                
                let sleepAvgRaw = sleepCount > 0 ? (sleepSum / sleepCount) : 0;
                let sleepQuality = "Sem dados";
                if(sleepAvgRaw > 0) {
                    if(sleepAvgRaw <= 2.5) sleepQuality = "Excelente 🟢";
                    else if(sleepAvgRaw <= 4.5) sleepQuality = "Boa 🟡";
                    else sleepQuality = "Ruim 🔴";
                }

                let checkDate = new Date(); checkDate.setMinutes(checkDate.getMinutes() - checkDate.getTimezoneOffset());
                for(let i=0; i<30; i++) {
                    const dStr = checkDate.toISOString().split('T')[0];
                    if(data.log[dStr]?.[idx]?.wellness?.sleep) currentStreak++;
                    else if(i !== 0) break; 
                    checkDate.setDate(checkDate.getDate() - 1);
                }

                return { workouts: wCompleted, mins: totalMins, sleepQ: sleepQuality, streak: currentStreak };
            };

            const getHistory = () => {
                const pastDays = getDatesInRange(getTodayStr(), 5);
                return pastDays.map(d => {
                    const l = data.log[d]?.[idx] || {};
                    const w = safeObj(l.wellness);
                    return { date: d, hasW: !!w.sleep, bat: calcBat(w).p, rpe: l.rpe_am, dur: l.duration, rpeSub: l.rpeSubmitted };
                });
            };

            const getRpeEmoji = (val) => {
                if(val <= 3) return '😌';
                if(val <= 6) return '😅';
                if(val <= 8) return '🥵';
                return '💀';
            };

            const getNutritionAdvice = (rpeVal) => {
                if(rpeVal >= 8) return { t: "Desgaste Extremo Detectado!", d: "Reponha carboidratos rápidos (ex: fruta, suco) e beba muita água nas próximas 2h para restaurar o glicogênio.", ic: "🍎💧" };
                if(rpeVal >= 5) return { t: "Treino Intenso e Proveitoso", d: "Priorize uma refeição com boas proteínas e carboidratos nas próximas horas para reconstruir a fibra muscular.", ic: "🍗💪" };
                return { t: "Treino Moderado/Regenerativo", d: "Esforço bem controlado. Mantenha sua hidratação e alimentação equilibrada de costume.", ic: "🥗💧" };
            };

            if(loading) return <div className="h-full flex items-center justify-center text-blue-500 animate-pulse"><div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>;

            if(step===1) return (
                <div className="h-full flex flex-col p-4 animate-fade-in overflow-y-auto custom-scroll">
                    <div className="text-center mt-6 mb-8"><h1 className="text-3xl font-black text-white italic flex justify-center items-center"><span style={{color:data.color}}>PRO</span>COACH</h1><h2 className="text-xl font-bold mt-6 text-slate-100">{getGreeting()}! Quem é você?</h2></div>
                    <div className="grid grid-cols-3 sm:grid-cols-4 gap-4 pb-10">{data.players.map((p,i)=><div key={i} onClick={()=>selectP(i)} className="flex flex-col items-center gap-2 cursor-pointer active:scale-95"><div className="w-20 h-20 rounded-full border-2 border-slate-700 bg-slate-800 overflow-hidden relative">{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="user" size={32} className="m-5 text-slate-500"/>}{data.log[getTodayStr()]?.[i]?.wellness?.sleep && <div className="absolute bottom-1 right-1 w-4 h-4 bg-green-500 rounded-full border-2 border-slate-800"></div>}</div><span className="text-xs font-bold text-slate-300 truncate w-full text-center">{p.name}</span></div>)}</div>
                </div>
            );

            if(step===2) {
                const p = data.players[idx];
                return (
                    <div className="h-full flex flex-col animate-fade-in relative bg-slate-900">
                        <div className="bg-slate-800 p-4 border-b border-slate-700 flex items-center gap-4 shadow-lg shrink-0">{!isPriv && <button onClick={()=>setStep(1)} className="text-white bg-slate-700 p-2 rounded-full"><Icon name="x" size={20}/></button>}<div className="w-14 h-14 rounded-full bg-slate-700 overflow-hidden shrink-0 border-2" style={{borderColor:data.color}}>{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="user"/>}</div><div><div className="text-[10px] font-bold uppercase" style={{color:data.color}}>Prontidão Diária</div><h2 className="text-lg font-black text-white">{getGreeting()}, {p.name.split(' ')[0]}!</h2></div></div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-6 pb-28 custom-scroll">
                            {data.coachMsg && (
                                <div className="bg-blue-900/40 border border-blue-500/50 p-4 rounded-xl flex items-start gap-3 shadow-lg">
                                    <Icon name="alert" className="text-blue-400 shrink-0"/>
                                    <div><h3 className="text-xs font-black text-blue-400 uppercase tracking-wider mb-1">Mural do Professor</h3><p className="text-sm font-bold text-white leading-snug">{data.coachMsg}</p></div>
                                </div>
                            )}

                            {[{id:'sleep',l:'😴 Sono (1=Ótimo | 7=Ruim)'},{id:'stress',l:'🤯 Estresse (1=Relax | 7=Tenso)'},{id:'fatigue',l:'🔋 Cansaço (1=Energia | 7=Exausto)'},{id:'soreness',l:'🦵 Dor Muscular (1=Zero | 7=Muita)'},{id:'mood',l:'🧠 Humor (1=Feliz | 7=Mal)'}].map(m=>(<div key={m.id} className="bg-slate-800/50 p-4 rounded-xl border border-slate-700"><div className="flex justify-between mb-2 font-bold text-white text-sm"><span>{m.l}</span><span className="bg-slate-900 px-2 rounded text-blue-400">{scores[m.id]}</span></div><input type="range" min="1" max="7" value={scores[m.id]} onChange={e=>setScores({...scores,[m.id]:parseInt(e.target.value)})} className="hooper-slider" style={{background:'linear-gradient(to right,#22c55e,#eab308,#ef4444)'}}/></div>))}
                            <div className="bg-slate-800/80 p-5 rounded-xl border border-red-500/30"><h3 className="font-bold text-red-400 flex gap-2"><Icon name="alert"/> Dores Focais</h3><div className="flex gap-2 mt-3"><select className="flex-1 bg-slate-900 text-white text-xs p-2 rounded outline-none border border-slate-600" onChange={e=>setTp(e.target.value)} value={tp}><option value="">Local?</option>{["Pescoço","Ombro","Costas","Lombar","Quadril","Adutor","Joelho","Posterior","Panturrilha","Tornozelo","Pé"].map(x=><option key={x}>{x}</option>)}</select><select className="w-20 bg-slate-900 text-white text-xs p-2 rounded outline-none border border-slate-600" onChange={e=>setTs(e.target.value)} value={ts}><option value="">Lado?</option><option>(Dir)</option><option>(Esq)</option></select><button onClick={addP} className="bg-red-600 text-white px-3 rounded font-bold">+</button></div>{pain.length>0&&<div className="flex flex-wrap gap-2 mt-3">{pain.map(z=><span key={z} onClick={()=>setPain(pain.filter(x=>x!==z))} className="bg-red-900/50 text-red-300 text-xs px-2 py-1 rounded cursor-pointer">{z} x</span>)}</div>}</div>
                        </div>
                        <div className="absolute bottom-0 w-full p-4 bg-slate-900/90 z-20"><button onClick={subData} disabled={submitting} className="w-full text-white font-black py-4 rounded-2xl flex items-center justify-center gap-2 shadow-xl" style={{backgroundColor:data.color}}>{submitting ? <Icon name="refresh" className="animate-spin"/> : <><Icon name="send"/> ENVIAR PRONTIDÃO</>}</button></div>
                    </div>
                );
            }

            if (step === 3) {
                const p = data.players[idx]; const dm = getDM(idx); const inj = dm==='DM'; const trans = dm==='TRANSIÇÃO';
                const ass = data.ass[idx]?.[0]?.anamnese?.toLowerCase() || '';
                const hasLca = ass.includes('lca'); const hasPub = ass.includes('pubalgia'); const hasPost = ass.includes('posterior')||ass.includes('muscular');
                const hasHist = ass.trim()!=='' && !ass.includes('nenhum') && !ass.includes('sem histórico');

                let prev=[], gen=[];
                // CORREÇÃO: Garante que todos os exercícios com target "Geral" (ou vazios) sejam mostrados, e usa index como key pra não ocultar duplicados
                if(trans) { 
                    gen = safeArray(data.ex).filter(x=>x.target==='Transição (Retorno DM)'); 
                    prev = safeArray(data.ex).filter(x=>x.target==='Manutenção (Histórico Lesão)'); 
                }
                else if(!inj) { 
                    gen = safeArray(data.ex).filter(x => !x.target || x.target.trim().toLowerCase().includes('geral') || x.target === 'Geral'); 
                    prev = safeArray(data.ex).filter(x => (x.target==='LCA'&&hasLca) || (x.target==='Pubalgia'&&hasPub) || (x.target==='Posterior'&&hasPost) || (x.target==='Manutenção (Histórico Lesão)'&&hasHist)); 
                }
                
                const tEx = prev.length+gen.length+safeArray(data.act).length; const pct = tEx>0?Math.round((completed.length/tEx)*100):0;
                const tog = (id) => setCompleted(completed.includes(id)?completed.filter(x=>x!==id):[...completed,id]);
                
                const wl = data.log[getTodayStr()]?.[idx]?.wellness||{}; const bat = calcBat(wl);
                const isFinished = data.log[getTodayStr()]?.[idx]?.rpeSubmitted === true;
                const stats = getPlayerStats();

                let pw = data.postW; let ai = "";
                if(pw==='IA') { if(wl.fatigue>=5||wl.soreness>=5){pw='Crioterapia + Massagem'; ai="Fadiga alta. Foco na Crio imediata.";} else if(wl.fatigue>=3||wl.soreness>=3){pw='Bota Pneumática'; ai="Cansaço moderado detectado.";} else pw='Piscina/Passiva'; }
                else if(wl.fatigue>=5||wl.soreness>=5) ai="⚠️ Fadiga crítica. Aumente o tempo de recuperação em 10 min.";

                        )}

                        {gif && (
                            <div className="absolute inset-0 bg-slate-950 z-[100] flex flex-col"><div className="p-4 flex justify-end bg-slate-900"><button onClick={()=>setGif(null)} className="text-white bg-slate-800 p-2 rounded-full"><Icon name="x"/></button></div><div className="flex-1 flex justify-center items-center bg-black p-4 relative">{gif.gifUrl?<img src={gif.gifUrl} className="w-full max-h-[50vh] object-contain rounded-lg shadow-2xl"/>:<Icon name="image" size={60} className="text-slate-700"/>}</div><div className="bg-slate-900 p-6 rounded-t-3xl border-t border-slate-800 pb-10"><div className="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-6"></div><h2 className="text-2xl font-black text-white uppercase mb-2 text-center">{gif.title}</h2><div className="flex justify-center gap-4 mt-6"><div className="bg-slate-800 p-3 rounded-xl border border-slate-700 text-center w-24"><span className="text-[10px] text-slate-400 uppercase font-bold">Séries</span><div className="text-xl font-black text-blue-400">{gif.sets}</div></div><div className="bg-slate-800 p-3 rounded-xl border border-slate-700 text-center w-24"><span className="text-[10px] text-slate-400 uppercase font-bold">Reps</span><div className="text-xl font-black text-green-400">{gif.reps}</div></div>{gif.rest && (<div className="bg-slate-800 p-3 rounded-xl border border-slate-700 text-center w-24"><span className="text-[10px] text-slate-400 uppercase font-bold">Repouso</span><div className="text-xl font-black text-yellow-400">{gif.rest}s</div></div>)}</div><button onClick={() => setGif(null)} className="w-full mt-8 bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700">FECHAR</button></div></div>
                        )}
                    </div>
                );
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<AthletePortal />);
    </script>
</body>
</html>
