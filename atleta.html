<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .animate-fade-in { animation: fadeIn 0.4s; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-track { background: transparent; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .gold-glow { box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); border: 2px solid #eab308; }
        .tab-active { color: #3b82f6 !important; font-weight: 900; }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950 text-slate-100">
    <div id="root" class="h-full w-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); 
        const db = firebase.firestore();

        const AthletePortal = () => {
            const [data, setData] = useState(null);
            const [idx, setIdx] = useState(null);
            const [tab, setTab] = useState('treino'); // treino, agenda, rank, perfil
            const [step, setStep] = useState(1);

            useEffect(() => {
                const p = new URLSearchParams(window.location.search);
                const uId = p.get('id'); const pIdx = p.get('p');
                if(uId) {
                    db.collection('coachData').doc(uId).onSnapshot(doc => {
                        setData({ ...doc.data(), id: doc.id });
                        setIdx(parseInt(pIdx));
                    });
                }
            }, []);

            if(!data) return <div className="h-screen flex items-center justify-center text-blue-500 font-black animate-pulse">CARREGANDO...</div>;
            if(idx === null) return <div className="p-10 text-center">Atleta não selecionado.</div>;
            
            const p = data.players[idx];
            const isConvocado = p.convocado === true;

            return (
                <div className="flex-1 flex flex-col h-full bg-slate-950">
                    <div className="p-6 rounded-b-[40px] shadow-2xl z-10" style={{ background: `linear-gradient(135deg, ${data.themeColor || '#1e3a8a'}, #020617)` }}>
                        <h2 className="text-xl font-black text-white uppercase italic">{p.name}</h2>
                        <p className="text-[10px] font-bold text-blue-300 uppercase tracking-widest">PORTAL DO ATLETA</p>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 custom-scroll pb-24">
                        {tab === 'treino' && <div className="text-center text-slate-500 font-black text-sm">Aba de Treinos (Seu código original aqui...)</div>}
                        
                        {/* ABA AGENDA (SÓ APARECE SE CONVOCADO) */}
                        {tab === 'agenda' && (isConvocado ? (
                            <div className="animate-fade-in space-y-6">
                                <div className="bg-slate-900/50 border border-slate-800 p-6 rounded-[32px]">
                                    <h3 className="text-xs font-black text-blue-400 uppercase mb-4 flex items-center gap-2">LOGÍSTICA E CRONOGRAMA</h3>
                                    <div className="text-[11px] text-slate-300 font-bold whitespace-pre-line leading-relaxed">
                                        {data.logistica || "Nenhuma informação de logística disponível no momento."}
                                    </div>
                                </div>
                                <div className="bg-slate-900/50 border border-slate-800 p-6 rounded-[32px]">
                                    <h3 className="text-xs font-black text-emerald-500 uppercase mb-4">PROGRAMAÇÃO SEMANAL</h3>
                                    <div className="space-y-3">
                                        {(data.days || []).map((day, i) => (
                                            <div key={i} className="flex justify-between items-center bg-slate-950 p-3 rounded-xl border border-slate-700">
                                                <span className="text-[9px] font-black uppercase">{day.name}</span>
                                                <span className="text-[9px] font-bold text-blue-400 uppercase">{day.md}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="text-center p-10 text-slate-600 font-black italic">Aguardando convocação...</div>
                        ))}
                    </div>

                    {/* MENU INFERIOR */}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-800 p-4 flex justify-around items-center z-[110] rounded-t-[40px]">
                        <button onClick={()=>setTab('treino')} className={tab==='treino'?'tab-active':''}>⚽ TREINO</button>
                        
                        {/* TRAVA DE SEGURANÇA: Só aparece se for convocado */}
                        {isConvocado && (
                            <button onClick={()=>setTab('agenda')} className={tab==='agenda'?'tab-active':''}>📅 AGENDA</button>
                        )}
                        
                        <button onClick={()=>setTab('rank')} className={tab==='rank'?'tab-active':''}>📊 RANK</button>
                        <button onClick={()=>setTab('perfil')} className={tab==='perfil'?'tab-active':''}>👤 PERFIL</button>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<AthletePortal />);
    </script>
</body>
</html>
