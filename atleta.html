<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: 900; }
        .card-atleta { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], days:[], id:null, coachMsg:'' });
            const [idx, setIdx] = useState(null); 
            const [step, setStep] = useState(1); 
            const [tab, setTab] = useState('hoje');
            const [loading, setLoading] = useState(true);
            const [scores, setScores] = useState({sleep:3, stress:3, fatigue:3, soreness:1, mood:4});

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id');
                const pIdx = params.get('p');

                if(!uId) { alert("Link inválido"); return; }

                db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ 
                            players: d.players || [], 
                            log: d.trainingLog || {}, 
                            ex: d.exercises || [], 
                            days: d.days || [],
                            coachMsg: d.coachMsg || '',
                            id: doc.id 
                        });
                        // Se o link já veio com o player (?p=0), pula a seleção
                        if(pIdx !== null && step === 1) { 
                            setIdx(parseInt(pIdx)); 
                            setStep(2); 
                        }
                    }
                    setLoading(false);
                });
            }, [step]);

            const myWorkouts = useMemo(() => {
                if (idx === null) return [];
                const myName = (data.players[idx]?.name || "").toLowerCase();
                return data.ex.filter(e => {
                    const t = (e.target || "").toLowerCase();
                    return t.includes(myName) || t.includes("geral") || t.includes("convocado");
                });
            }, [data.ex, idx]);

            const handleSendWellness = () => {
                const today = new Date().toISOString().split('T')[0];
                db.collection('coachData').doc(data.id).set({
                    trainingLog: { [today]: { [idx]: { wellness: scores } } }
                }, { merge: true }).then(() => {
                    alert("✅ Relatório enviado com sucesso!");
                });
            };

            if(loading) return <div className="h-screen flex items-center justify-center text-white">Carregando dados...</div>;

            // PASSO 1: SELEÇÃO DE ATLETA (Para a comissão ver todos ou o atleta se achar)
            if(step === 1) return (
                <div className="p-6 h-screen overflow-y-auto bg-slate-950">
                    <h1 className="text-2xl font-black text-center mb-8">ELENCO <span className="text-blue-500">PROCOACH</span></h1>
                    <div className="grid grid-cols-2 gap-4">
                        {data.players.map((p, i) => (
                            <div key={i} onClick={()=>{setIdx(i); setStep(2);}} className="card-atleta p-4 rounded-2xl flex flex-col items-center gap-2">
                                <div className="w-16 h-16 rounded-full overflow-hidden border-2 border-slate-700">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : "👤"}
                                </div>
                                <span className="text-xs font-bold text-center uppercase">{p.name}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // PASSO 2: DASHBOARD DO ATLETA (Abas Hoje e Programação)
            const p = data.players[idx];
            return (
                <div className="h-full flex flex-col">
                    {/* TABS MENU */}
                    <div className="flex bg-slate-900 border-b border-white/10 pt-2 shrink-0">
                        <button onClick={()=>setTab('hoje')} className={`flex-1 py-4 text-[10px] font-black uppercase tracking-widest ${tab==='hoje'?'tab-active':'text-slate-500'}`}>Hoje</button>
                        <button onClick={()=>setTab('micro')} className={`flex-1 py-4 text-[10px] font-black uppercase tracking-widest ${tab==='micro'?'tab-active':'text-slate-500'}`}>Programação</button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 custom-scroll">
                        {tab === 'hoje' ? (
                            <div className="space-y-8 animate-fade-in">
                                {/* INFO ATLETA */}
                                <div className="flex items-center gap-4 bg-blue-600/10 p-4 rounded-3xl border border-blue-500/20">
                                    <div className="w-14 h-14 rounded-full border-2 border-blue-500 overflow-hidden">
                                        {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : "👤"}
                                    </div>
                                    <div>
                                        <h2 className="text-lg font-black uppercase leading-tight">{p.name}</h2>
                                        <p className="text-[10px] font-bold text-blue-400 uppercase tracking-widest">{p.position}</p>
                                    </div>
                                </div>

                                {/* MENSAGEM DO COACH / LOGÍSTICA */}
                                {data.coachMsg && (
                                    <div className="card-atleta p-5 rounded-3xl border-l-4 border-blue-500">
                                        <h4 className="text-[10px] font-black text-blue-400 uppercase mb-2">Quadro de Avisos</h4>
                                        <p className="text-sm text-slate-200 leading-relaxed whitespace-pre-wrap">{data.coachMsg}</p>
                                    </div>
                                )}

                                {/* TREINO DO DIA */}
                                <div className="space-y-4">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Atividades do Dia</h3>
                                    {myWorkouts.length > 0 ? myWorkouts.map((ex, i) => (
                                        <div key={i} className="card-atleta p-4 rounded-2xl flex items-center gap-4">
                                            <div className="w-12 h-12 bg-slate-800 rounded-xl flex items-center justify-center overflow-hidden">
                                                {ex.gifUrl ? <img src={ex.gifUrl} className="w-full h-full object-cover"/> : "⚽"}
                                            </div>
                                            <div>
                                                <div className="text-xs font-black uppercase">{ex.title}</div>
                                                <div className="text-[9px] font-bold text-slate-500 uppercase">{ex.target}</div>
                                            </div>
                                        </div>
                                    )) : <p className="text-center text-slate-600 italic text-xs">Nenhum treino específico para hoje.</p>}
                                </div>

                                {/* FORMULÁRIO WELLNESS */}
                                <div className="space-y-5 pb-10">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center">Relatório de Prontidão</h3>
                                    {Object.entries({sleep:'Sono', stress:'Estresse', fatigue:'Cansaço', soreness:'Dor Muscular', mood:'Humor'}).map(([key, label]) => (
                                        <div key={key} className="space-y-2">
                                            <div className="flex justify-between text-[10px] font-bold uppercase tracking-tighter">
                                                <span>{label}</span>
                                                <span className="text-blue-400">{scores[key]}</span>
                                            </div>
                                            <input type="range" min="1" max="7" value={scores[key]} onChange={e=>setScores({...scores, [key]:parseInt(e.target.value)})} className="hooper-slider"/>
                                        </div>
                                    ))}
                                    <button onClick={handleSendWellness} className="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase text-xs shadow-lg shadow-blue-500/20 active:scale-95 transition-all">Enviar Dados</button>
                                </div>
                            </div>
                        ) : (
                            /* ABA MICROCICLO (PROGRAMAÇÃO DA SEMANA) */
                            <div className="space-y-4 animate-fade-in pb-10">
                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Programação Semanal</h3>
                                {data.days.map((day, dIdx) => (
                                    <div key={dIdx} className="card-atleta p-5 rounded-[32px] space-y-4">
                                        <div className="flex justify-between items-center">
                                            <span className="text-lg font-black italic">{day.name}</span>
                                            <span className="text-[9px] font-bold bg-white/10 px-2 py-1 rounded text-slate-400 uppercase">{day.md || 'Treino'}</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="bg-slate-900/80 p-3 rounded-2xl border border-white/5">
                                                <div className="text-[8px] font-black text-blue-500 uppercase mb-1">Manhã</div>
                                                <div className="text-[10px] font-bold text-slate-300 uppercase leading-tight">
                                                    {(day.am || []).map(e => e.type).join(', ') || 'Folga'}
                                                </div>
                                            </div>
                                            <div className="bg-slate-900/80 p-3 rounded-2xl border border-white/5">
                                                <div className="text-[8px] font-black text-orange-500 uppercase mb-1">Tarde</div>
                                                <div className="text-[10px] font-bold text-slate-300 uppercase leading-tight">
                                                    {(day.pm || []).map(e => e.type).join(', ') || 'Folga'}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
