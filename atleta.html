<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .animate-fade-in { animation: fadeIn 0.4s; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-track { background: transparent; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .gold-glow { box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); border: 2px solid #eab308; }
        /* Estilo da Agulha */
        .gauge-needle {
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 100% 100% 2px 2px;
        }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950 text-slate-100">
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-3 rounded-full shadow-2xl z-[300] text-xs font-bold transition-opacity duration-300 pointer-events-none flex items-center gap-2" style="opacity:0;"></div>
    <div id="root" class="h-full w-full flex flex-col"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        
        const getStatusColor = (value) => {
            const val = parseFloat(value);
            if (val < 0.8) return '#3b82f6';
            if (val <= 1.3) return '#10b981';
            if (val <= 1.5) return '#f59e0b';
            return '#ef4444';
        };

        const SpeedometerGauge = ({ value }) => {
            const min=0.5, max=2.0; const valNum = Number(value)||min; const normalized=Math.max(min, Math.min(max, valNum));
            const angle=((normalized-min)/(max-min))*180-90;
            return (
                <div className="flex flex-col items-center">
                    <div className="gauge-container relative w-[120px] h-[60px] overflow-hidden">
                        <svg viewBox="0 0 200 100" className="w-full h-full">
                            <path d="M20 100 A80 80 0 0 1 180 100" fill="none" className="stroke-slate-800" strokeWidth="20"/>
                            <path d="M20 100 A80 80 0 0 1 73 36" fill="none" stroke="#22c55e" strokeWidth="20"/>
                            <path d="M73 36 A80 80 0 0 1 127 36" fill="none" stroke="#eab308" strokeWidth="20"/>
                            <path d="M127 36 A80 80 0 0 1 180 100" fill="none" stroke="#ef4444" strokeWidth="20"/>
                        </svg>
                        <div className="gauge-needle absolute bottom-0 left-1/2 w-1 h-12 origin-bottom transition-transform duration-1000" 
                             style={{ transform: `translateX(-50%) rotate(${angle}deg)`, background: getStatusColor(valNum) }}></div>
                        <div className="gauge-center absolute bottom-[-2px] left-1/2 w-3 h-3 rounded-full -translate-x-1/2" 
                             style={{ background: getStatusColor(valNum) }}></div>
                    </div>
                    <div className="text-xl font-black text-white mt-1">{valNum.toFixed(2)}</div>
                    <div className="text-[8px] font-bold text-slate-500 uppercase">Carga ACWR</div>
                </div>
            );
        };

        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const getGreeting = () => { const hour = new Date().getHours(); return hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite'; };
        const getDayOfWeek = () => { const days = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado']; return days[new Date().getDay()]; };
        const showToast = (msg, icon="✅") => { const t = document.getElementById('toast'); if(t){ t.innerHTML = `<span>${icon}</span> ${msg}`; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); } };
        const safeArray = (arr) => (Array.isArray(arr) && arr.length > 0) ? arr : []; 
        const safeObj = (obj) => (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
        const formatDateBR = (ds) => { if(!ds) return '-'; const [y, m, d] = ds.split('-'); return `${d}/${m}`; };
        const vibrate = (pattern) => { if ("vibrate" in navigator) { try { navigator.vibrate(pattern); } catch (e) {} } };

        const Icon = ({ name, size=24, className="", onClick }) => {
            const p = { 
                user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>', 
                check: '<polyline points="20 6 9 17 4 12"/>', 
                x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>', 
                send: '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>', 
                alert: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>', 
                activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>', 
                play: '<polygon points="5 3 19 12 5 21 5 3"/>', 
                clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>', 
                trophy: '<path d="M8 21h8m-4-9v9"/><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/><path d="M7 2v16"/><path d="M17 2v16"/>', 
                refresh: '<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 0 20.49 15"/>', 
                barChart: '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>', 
                share: '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>', 
                fastForward: '<polygon points="13 19 22 12 13 5 13 19"/><polygon points="2 19 11 12 2 5 2 19"/>', 
                plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>', 
                ball: '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>', 
                target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>', 
                eye: '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>', 
                fire: '<path d="M12 2c0 0-6 6.5-6 12a6 6 0 1 0 12 0c0-5.5-6-12-6-12z"/><path d="M12 14c0 0-2 2-2 4a2 2 0 1 0 4 0c0-2-2-4-2-4z"/>', 
                arrowDown: '<polyline points="6 9 12 15 18 9"/>', 
                arrowUp: '<polyline points="18 15 12 9 6 15"/>', 
                medkit: '<rect x="2" y="6" width="20" height="14" rx="2"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>', 
                bell: '<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>', 
                brain: '<path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>', 
                arrowLeft: '<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>', 
                logout: '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>'
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill={name==='play'||name==='trophy'||name==='fire'?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} onClick={onClick} dangerouslySetInnerHTML={{__html: p[name] || ''}} />;
        };

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], id:null, color:'#1e3a8a' });
            const [idx, setIdx] = useState(null); const [step, setStep] = useState(1); const [loading, setLoading] = useState(true);
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1}); const [pain, setPain] = useState([]);
            const [submitting, setSubmitting] = useState(false); const [water, setWater] = useState(0);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search); const uId = params.get('id'); const pIdx = params.get('p');
                if(!uId) { setLoading(false); return; }
                db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ players: d.players||[], log: d.trainingLog||{}, ex: d.exercises||[], id: doc.id, color: d.themeColor||'#1e3a8a' });
                        if(pIdx !== null) { setIdx(parseInt(pIdx)); setStep(2); }
                    }
                    setLoading(false);
                });
            }, []);

            if(loading) return <div className="h-screen flex items-center justify-center bg-slate-950 text-white">Carregando...</div>;

            if(step===1) return (
                <div className="p-6 h-screen flex flex-col items-center justify-center bg-slate-950">
                    <h1 className="text-3xl font-black italic mb-8 text-white"><span style={{color:data.color}}>PRO</span>COACH</h1>
                    <div className="grid grid-cols-3 gap-6 w-full max-w-2xl">
                        {data.players.map((p, i) => (
                            <div key={i} onClick={()=>{setIdx(i); setStep(2);}} className="flex flex-col items-center gap-2 cursor-pointer">
                                <div className="w-20 h-20 rounded-full border-2 border-slate-800 overflow-hidden bg-slate-900">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" className="m-6 text-slate-700"/>}
                                </div>
                                <span className="text-[10px] font-bold text-slate-300">{(p.name || '').split(' ')[0]}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const p = data.players[idx];
            return (
                <div className="h-full flex flex-col bg-slate-950 p-6 overflow-y-auto custom-scroll">
                    <div className="flex items-center gap-4 mb-8">
                        <div className="w-20 h-20 rounded-full border-4 border-white/10 overflow-hidden shrink-0">
                            {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user"/>}
                        </div>
                        <div>
                            <h1 className="text-2xl font-black uppercase text-white">{p.name}</h1>
                            <div className="text-xs font-bold text-blue-400 uppercase">{p.pos}</div>
                        </div>
                    </div>

                    <div className="grid grid-cols-3 gap-3 items-center mb-8">
                        <div className="bg-slate-900/50 border border-slate-800 p-3 rounded-2xl flex flex-col items-center">
                            <Icon name="ball" className="text-yellow-500 mb-1" size={16}/>
                            <span className="text-[8px] font-bold text-slate-500 uppercase text-center">Gols</span>
                            <span className="text-xl font-black text-white">{(p.stats && p.stats.g) || 0}</span>
                        </div>

                        <SpeedometerGauge value={data.log[getTodayStr()]?.[idx]?.acwr || 1.0} />

                        <div className="bg-slate-900/50 border border-slate-800 p-3 rounded-2xl flex flex-col items-center">
                            <Icon name="target" className="text-blue-500 mb-1" size={16}/>
                            <span className="text-[8px] font-bold text-slate-500 uppercase text-center">Assists</span>
                            <span className="text-xl font-black text-white">{(p.stats && p.stats.a) || 0}</span>
                        </div>
                    </div>

                    <div className="space-y-6">
                        {[{id:'sleep',l:'Sono'},{id:'stress',l:'Estresse'},{id:'fatigue',l:'Cansaço'},{id:'soreness',l:'Dor'},{id:'mood',l:'Humor'}].map(m=>(
                            <div key={m.id} className="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                                <div className="flex justify-between mb-2 font-bold text-white text-sm"><span>{m.l}</span><span className="text-blue-400">{scores[m.id]}</span></div>
                                <input type="range" min="1" max="7" value={scores[m.id]} onChange={e=>setScores({...scores,[m.id]:parseInt(e.target.value)})} className="hooper-slider" style={{background:'linear-gradient(to right,#22c55e,#eab308,#ef4444)'}}/>
                            </div>
                        ))}
                    </div>

                    <button onClick={()=>{
                        setSubmitting(true);
                        const td = getTodayStr();
                        db.collection('coachData').doc(data.id).set({ trainingLog: { [td]: { [idx]: { wellness: scores } } } }, {merge:true})
                        .then(()=>{ showToast("Enviado!"); setSubmitting(false); });
                    }} className="mt-10 w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase tracking-widest">
                        {submitting ? 'Enviando...' : 'Enviar Prontidão'}
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
