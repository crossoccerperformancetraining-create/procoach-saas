<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .animate-fade-in { animation: fadeIn 0.4s; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-track { background: transparent; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .gold-glow { box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); border: 2px solid #eab308; }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950 text-slate-100">
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-3 rounded-full shadow-2xl z-[300] text-xs font-bold transition-opacity duration-300 pointer-events-none flex items-center gap-2" style="opacity:0;"></div>
    <div id="root" class="h-full w-full flex flex-col"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        
        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const getGreeting = () => { const hour = new Date().getHours(); return hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite'; };
        const getDayOfWeek = () => { const days = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado']; return days[new Date().getDay()]; };
        const showToast = (msg, icon="✅") => { const t = document.getElementById('toast'); if(t){ t.innerHTML = `<span>${icon}</span> ${msg}`; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); } };
        const safeArray = (arr) => (Array.isArray(arr) && arr.length > 0) ? arr : []; const safeObj = (obj) => (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
        const formatDateBR = (ds) => { if(!ds) return '-'; const [y, m, d] = ds.split('-'); return `${d}/${m}`; };
        const vibrate = (pattern) => { if ("vibrate" in navigator) { try { navigator.vibrate(pattern); } catch (e) {} } };

        const smartShare = async (blob, filename, title) => {
            const file = new File([blob], filename, { type: blob.type });
            if (navigator.canShare && navigator.canShare({ files: [file] })) { try { await navigator.share({ files: [file], title: title }); return; } catch (err) {} }
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        };

        const getEmbedUrl = (url) => { if(!url) return null; const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/; const match = url.match(regExp); return (match && match[2].length === 11) ? `https://www.youtube.com/embed/${match[2]}` : null; };

        const Icon = ({ name, size=24, className="", onClick }) => {
            const p = { 
                user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>', check: '<polyline points="20 6 9 17 4 12"/>', x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>', bell: '<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>', trophy: '<path d="M8 21h8m-4-9v9"/><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/><path d="M7 2v16"/><path d="M17 2v16"/>', play: '<polygon points="5 3 19 12 5 21 5 3"/>', clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>', calendar: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>', activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>', target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>', ball: '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>', share: '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>'
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill={name==='play'||name==='trophy'?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} onClick={onClick} dangerouslySetInnerHTML={{__html: p[name] || ''}} />;
        };

        const RadarChart = ({ stats, size = 150 }) => {
            const center = size / 2; const radius = (size / 2) * 0.7;
            const points = [ { label: 'FOR', val: stats.force || 50 }, { label: 'VEL', val: stats.speed || 50 }, { label: 'POT', val: stats.power || 50 }, { label: 'PRE', val: stats.prev || 50 }, { label: 'TEC', val: stats.tech || 50 }, { label: 'RES', val: stats.endurance || 50 } ];
            const polygonPoints = points.map((p, i) => { const angle = (Math.PI * 2 * i) / points.length - Math.PI / 2; const x = center + (radius * (p.val / 100)) * Math.cos(angle); const y = center + (radius * (p.val / 100)) * Math.sin(angle); return `${x},${y}`; }).join(' ');
            return (
                <div className="flex flex-col items-center">
                    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="overflow-visible">
                        {[0.25, 0.5, 0.75, 1].map(scale => ( <circle key={scale} cx={center} cy={center} r={radius * scale} fill="none" stroke="#334155" strokeWidth="1" strokeDasharray="2,2" /> ))}
                        <polygon points={polygonPoints} fill="rgba(59, 130, 246, 0.4)" stroke="#3b82f6" strokeWidth="2" />
                        {points.map((p, i) => { const angle = (Math.PI * 2 * i) / points.length - Math.PI / 2; const tx = center + (radius + 15) * Math.cos(angle); const ty = center + (radius + 15) * Math.sin(angle); return <text key={i} x={tx} y={ty} textAnchor="middle" fill="#94a3b8" fontSize="10" fontWeight="bold" className="uppercase">{p.label}</text> })}
                    </svg>
                </div>
            );
        };

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], coachMsg:'', color:'#1e3a8a', id:null, days: [], videoUrl:'' });
            const [idx, setIdx] = useState(null);
            const [step, setStep] = useState(1);
            const [tab, setTab] = useState('workout');
            const [loading, setLoading] = useState(true);
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1});
            const [submitting, setSubmitting] = useState(false);
            const [agendaAck, setAgendaAck] = useState(false);
            const [rpeMod, setRpeMod] = useState(false);
            const [rpe, setRpe] = useState(5);
            const [dur, setDur] = useState(60);
            const [viewMode, setViewMode] = useState('finished');

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id');
                const pIdx = params.get('p');
                if(!uId) return;

                const unsubscribe = db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ ...d, id: doc.id, log: d.trainingLog || {}, ex: d.exercises || [] });
                        if(pIdx !== null && d.players?.[parseInt(pIdx)]) {
                            setIdx(parseInt(pIdx));
                            if(d.trainingLog?.[getTodayStr()]?.[parseInt(pIdx)]?.wellness?.sleep) setStep(3); else setStep(2);
                            if(d.trainingLog?.[getTodayStr()]?.[parseInt(pIdx)]?.agendaAck) setAgendaAck(true);
                        }
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const sendWellness = async () => {
                const td = getTodayStr();
                const nl = { ...data.log }; if(!nl[td]) nl[td] = {}; if(!nl[td][idx]) nl[td][idx] = {};
                nl[td][idx] = { ...nl[td][idx], wellness: scores };
                await db.collection('coachData').doc(data.id).update({ trainingLog: nl });
                setStep(3);
            };

            const confirmRead = async () => {
                const path = `trainingLog.${getTodayStr()}.${idx}.agendaAck`;
                await db.collection('coachData').doc(data.id).update({ [path]: true });
                setAgendaAck(true);
                showToast("Leitura confirmada!");
            };

            const saveRPE = async () => {
                const td = getTodayStr();
                const pathPrefix = `trainingLog.${td}.${idx}`;
                await db.collection('coachData').doc(data.id).update({ [`${pathPrefix}.rpe_am`]: rpe, [`${pathPrefix}.duration`]: dur, [`${pathPrefix}.rpeSubmitted`]: true });
                setRpeMod(false);
                if(typeof confetti !== 'undefined') confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            };

            const shareToInsta = async () => { const el = document.getElementById('share-card'); if(!el) return; el.style.display = 'flex'; const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#0f172a' }); el.style.display = 'none'; canvas.toBlob(blob => { smartShare(blob, 'meutreino.png', 'Treino Concluído'); }); };

            if(loading) return <div className="h-screen bg-slate-950 flex items-center justify-center text-white font-bold italic">PROCOACH...</div>;

            if(step === 1) return (
                <div className="p-6 h-screen flex flex-col items-center justify-center bg-slate-950">
                    <h1 className="text-3xl font-black italic mb-10 text-blue-500">PROCOACH</h1>
                    <div className="grid grid-cols-3 gap-6 w-full max-w-md">
                        {data.players.map((p, i) => (
                            <div key={i} onClick={() => { setIdx(i); setStep(2); }} className="flex flex-col items-center gap-2 cursor-pointer">
                                <div className="w-16 h-16 rounded-full border-2 border-slate-800 bg-slate-900 overflow-hidden">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" className="m-4 text-slate-700"/>}
                                </div>
                                <span className="text-[10px] font-bold uppercase truncate w-full text-center">{p.name?.split(' ')[0]}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if(step === 2) return (
                <div className="h-full bg-slate-950 p-6 flex flex-col animate-fade-in">
                    <h2 className="text-xl font-black uppercase text-white italic mb-8">Prontidão Diária</h2>
                    <div className="flex-1 space-y-6 overflow-y-auto">
                        {[{id:'sleep',l:'😴 Sono'},{id:'stress',l:'🤯 Estresse'},{id:'fatigue',l:'🔋 Energia'},{id:'soreness',l:'🦵 Dor'},{id:'mood',l:'🧠 Humor'}].map(m=>(
                            <div key={m.id} className="bg-slate-900 p-4 rounded-2xl border border-slate-800 shadow-lg">
                                <div className="flex justify-between mb-2 font-bold text-xs text-slate-400"><span>{m.l}</span><span className="text-white bg-slate-800 px-2 rounded">{scores[m.id]}</span></div>
                                <input type="range" min="1" max="7" value={scores[m.id]} onChange={e=>setScores({...scores,[m.id]:parseInt(e.target.value)})} className="hooper-slider"/>
                            </div>
                        ))}
                    </div>
                    <button onClick={sendWellness} className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl mt-4 shadow-xl">ENVIAR</button>
                </div>
            );

            const pActual = data.players[idx];
            const isFinishedToday = data.log?.[getTodayStr()]?.[idx]?.rpeSubmitted;

            return (
                <div className="flex-1 flex flex-col h-full bg-slate-950 relative">
                    {/* CABEÇALHO PERFIL */}
                    <div className="p-6 bg-slate-900 border-b border-slate-800 shadow-xl" style={{ background: `linear-gradient(135deg, ${data.color}, #020617)` }}>
                        <div className="flex items-center gap-4">
                            <div className={`w-16 h-16 rounded-full border-2 border-white/20 overflow-hidden bg-slate-800 ${pActual.highlight ? 'gold-glow' : ''}`}>
                                {pActual.image ? <img src={pActual.image} className="w-full h-full object-cover"/> : <Icon name="user" className="m-4 text-white/20"/>}
                            </div>
                            <div className="flex-1">
                                <h1 className="text-xl font-black uppercase text-white truncate">{pActual.name}</h1>
                                <div className="flex items-center gap-2 mt-1">
                                    <span className="text-[9px] font-black bg-blue-600 text-white px-2 py-0.5 rounded uppercase">Atleta</span>
                                    {pActual.highlight && <span className="text-[9px] font-black bg-yellow-500 text-slate-900 px-2 py-0.5 rounded tracking-tighter">DESTAQUE</span>}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto px-4 pt-4 pb-28 custom-scroll">
                        {/* TELA DE REGISTRO CONCLUÍDO (VISUAL ORIGINAL) */}
                        {isFinishedToday && tab === 'workout' && viewMode === 'finished' ? (
                            <div className="animate-fade-in flex flex-col items-center py-6">
                                <div className="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mb-4 shadow-lg"><Icon name="check" size={32} className="text-white"/></div>
                                <h2 className="text-2xl font-black text-green-500 uppercase mb-1 text-center">REGISTRO CONCLUÍDO!</h2>
                                <p className="text-[10px] text-slate-400 font-bold mb-8 uppercase">Os teus dados foram salvos na nuvem.</p>
                                
                                <div className="w-full bg-slate-900/50 border border-slate-800 rounded-3xl p-6 flex justify-between items-center mb-8 shadow-inner">
                                    <div className="text-center"><span className="block text-[8px] font-bold text-slate-500 uppercase mb-1">ESFORÇO (PSE)</span><span className="text-2xl font-black text-white">{data.log[getTodayStr()]?.[idx]?.rpe_am}/10</span></div>
                                    <div className="w-px h-10 bg-slate-800"></div>
                                    <div className="text-center"><span className="block text-[8px] font-bold text-slate-500 uppercase mb-1">DURAÇÃO</span><span className="text-2xl font-black text-blue-400">{data.log[getTodayStr()]?.[idx]?.duration} min</span></div>
                                </div>

                                <div className="w-full flex gap-3">
                                    <button onClick={()=>setViewMode('review')} className="flex-1 bg-slate-900 border border-slate-800 text-white font-black py-4 rounded-2xl text-[10px] uppercase">Ver Ficha</button>
                                    <button onClick={shareToInsta} className="flex-1 bg-gradient-to-r from-purple-600 to-pink-600 text-white font-black py-4 rounded-2xl text-[10px] uppercase">Compartilhar</button>
                                </div>
                            </div>
                        ) : (
                            /* CONTEÚDO DAS ABAS */
                            <div className="space-y-4">
                                {tab === 'workout' && (
                                    <div className="animate-fade-in space-y-4">
                                        {/* ABA DE RECADO (AJUSTADA) */}
                                        <div className="bg-slate-900/80 border border-slate-800 p-4 rounded-[24px]">
                                            <div className="flex items-center gap-2 mb-2 text-blue-500"><Icon name="bell" size={16}/><span className="text-[10px] font-black uppercase">Recado do Professor</span></div>
                                            <p className="text-sm font-bold text-white mb-4 italic leading-tight">"{data.coachMsg || "Foco no objetivo!"}"</p>
                                            {!agendaAck ? (
                                                <button onClick={confirmRead} className="w-full bg-blue-600 text-white text-[10px] font-bold py-2.5 rounded-xl flex items-center justify-center gap-1"><Icon name="check" size={14}/> CLIQUE AQUI PARA CONFIRMAR LEITURA</button>
                                            ) : (
                                                <div className="text-[9px] font-black text-green-500 text-center uppercase tracking-widest py-2 bg-green-500/10 rounded-xl border border-green-500/20">✓ Leitura Confirmada</div>
                                            )}
                                        </div>

                                        <div className="grid grid-cols-2 gap-3 text-center">
                                            <div className="bg-slate-900 border border-slate-800 p-4 rounded-3xl"><span className="text-2xl font-black text-white block">{pActual.stats?.g || 0}</span><span className="text-[8px] font-bold text-slate-500 uppercase">Gols</span></div>
                                            <div className="bg-slate-900 border border-slate-800 p-4 rounded-3xl"><span className="text-2xl font-black text-white block">{pActual.stats?.a || 0}</span><span className="text-[8px] font-bold text-slate-500 uppercase">Assists</span></div>
                                        </div>

                                        {data.ex.map((ex, i) => (
                                            <div key={i} className="bg-slate-900/80 border border-slate-800 p-4 rounded-3xl flex items-center gap-4">
                                                <div className="w-12 h-12 bg-slate-800 rounded-xl overflow-hidden shrink-0">{ex.gifUrl && <img src={ex.gifUrl} className="w-full h-full object-cover"/>}</div>
                                                <div className="flex-1"><div className="text-white font-bold text-sm uppercase">{ex.title}</div><div className="text-[10px] text-slate-500 font-bold">{ex.sets}x{ex.reps}</div></div>
                                            </div>
                                        ))}
                                        {!isFinishedToday && <button onClick={()=>setRpeMod(true)} className="w-full bg-green-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase tracking-widest text-sm">Finalizar Treino (PSE)</button>}
                                    </div>
                                )}

                                {tab === 'agenda' && (
                                    <div className="animate-fade-in space-y-6">
                                        {pActual.highlight ? (
                                            <div className="bg-slate-900 border-2 border-blue-500 p-5 rounded-[32px] shadow-lg relative overflow-hidden">
                                                <div className="absolute top-0 right-0 bg-blue-500 text-white px-4 py-1 rounded-bl-2xl font-black text-[10px] uppercase">STATUS</div>
                                                <div className="flex items-center gap-2 mb-4 text-yellow-500"><Icon name="trophy" size={20}/><span className="text-sm font-black text-white uppercase">Convocação Oficial</span></div>
                                                <div className="flex items-center gap-4 bg-blue-500/10 p-5 rounded-2xl border border-blue-500/30 mb-4">
                                                    <div className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center font-black text-white text-xl shadow-lg border-2 border-blue-400 shrink-0">{pActual.number || "!"}</div>
                                                    <div><div className="text-[14px] font-black text-white uppercase tracking-tight italic">VOCÊ ESTÁ RELACIONADO!</div></div>
                                                </div>
                                                <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800 shadow-inner"><span className="text-[8px] font-black text-blue-500 uppercase block mb-2 tracking-[0.2em]">Logística Operacional</span><p className="text-xs text-slate-200 leading-relaxed whitespace-pre-line italic">{data.coachMsg || "Aguardando informações do treinador."}</p></div>
                                            </div>
                                        ) : (
                                            <div className="bg-slate-900 border border-slate-800 p-10 rounded-[32px] text-center text-slate-500 text-[10px] font-black italic">Aguardando lista oficial...</div>
                                        )}
                                    </div>
                                )}

                                {tab === 'profile' && (
                                    <div className="animate-fade-in flex flex-col items-center py-4">
                                        <div className="w-full bg-slate-900 rounded-[40px] p-6 border border-slate-800 shadow-xl">
                                            <h3 className="text-center text-[10px] font-black text-slate-500 uppercase mb-8">Radar de Performance</h3>
                                            <RadarChart stats={{force:80, speed:75, power:70, prev:85, tech:75, endurance:80}} />
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* MODAL PSE */}
                    {rpeMod && (
                        <div className="absolute inset-0 bg-slate-950/95 z-[500] flex items-center justify-center p-6 animate-fade-in">
                            <div className="bg-slate-900 rounded-[32px] border border-slate-700 w-full max-w-sm p-6 shadow-2xl">
                                <h2 className="text-xl font-black text-white uppercase text-center mb-6">Finalizar Treino</h2>
                                <div className="mb-6"><label className="text-[10px] font-bold text-slate-400 uppercase flex justify-between mb-2"><span>PSE (0-10)</span><span className="text-blue-400 font-black text-sm">{rpe}/10</span></label><input type="range" min="0" max="10" value={rpe} onChange={e=>setRpe(parseInt(e.target.value))} className="hooper-slider"/></div>
                                <div className="mb-6 text-center"><label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Duração (Minutos)</label><input type="number" value={dur} onChange={e=>setDur(parseInt(e.target.value))} className="w-full bg-slate-950 border border-slate-800 text-white text-center font-black text-3xl py-3 rounded-xl outline-none"/></div>
                                <div className="flex gap-2"><button onClick={()=>setRpeMod(false)} className="flex-1 bg-slate-800 text-white py-4 rounded-2xl font-bold uppercase text-[10px]">Sair</button><button onClick={saveRPE} className="flex-2 bg-green-600 text-white py-4 px-6 rounded-2xl font-black uppercase text-[10px]">ENVIAR DADOS</button></div>
                            </div>
                        </div>
                    )}

                    {/* MENU INFERIOR */}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900/95 backdrop-blur-md border-t border-slate-800 p-4 flex justify-around items-center z-50 rounded-t-3xl shadow-[0_-5px_15px_rgba(0,0,0,0.5)]">
                         <div onClick={()=>{setTab('workout'); setViewMode('finished');}} className={`flex flex-col items-center ${tab==='workout'?'text-blue-500':'text-slate-500'}`}><Icon name="play" size={24}/><span className="text-[8px] font-black uppercase mt-1">Treino</span></div>
                         <div onClick={()=>setTab('agenda')} className={`flex flex-col items-center ${tab==='agenda'?'text-blue-500':'text-slate-500'}`}><Icon name="calendar" size={24}/><span className="text-[8px] font-black uppercase mt-1">Agenda</span></div>
                         <div onClick={()=>setTab('profile')} className={`flex flex-col items-center ${tab==='profile'?'text-blue-500':'text-slate-500'}`}><Icon name="target" size={24}/><span className="text-[8px] font-black uppercase mt-1">Perfil FIFA</span></div>
                    </div>

                    {/* CARD COMPARTILHAR OCULTO */}
                    <div id="share-card" className="fixed z-[-1]" style={{left: '-9999px', top: '-9999px', width: '400px', backgroundColor: '#0f172a'}}>
                        <div className="p-8 border-4 border-slate-800 rounded-[40px] flex flex-col items-center relative overflow-hidden" style={{backgroundColor: '#0f172a'}}>
                            <div className="absolute top-0 left-0 w-full h-40 opacity-40" style={{background: `linear-gradient(to bottom, ${data.color}, transparent)`}}></div>
                            <div className="w-32 h-32 rounded-full border-4 overflow-hidden bg-slate-800 shadow-2xl mb-4 z-10 relative" style={{borderColor: data.color}}>{pActual.image ? <img src={pActual.image} className="w-full h-full object-cover"/> : <Icon name="user" size={60} className="m-10 text-white/20"/>}</div>
                            <h2 className="text-3xl font-black uppercase text-white mb-1 z-10 text-center leading-tight">{pActual.name}</h2>
                            <div className="text-[10px] font-black text-slate-600 tracking-widest uppercase z-10 mt-8">POWERED BY PROCOACH MAX</div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
