<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .animate-fade-in { animation: fadeIn 0.4s; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .gold-glow { box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); border: 2px solid #eab308; }
        .card-micro { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950 text-slate-100">
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-3 rounded-full shadow-2xl z-[300] text-xs font-bold transition-opacity duration-300 pointer-events-none flex items-center gap-2" style="opacity:0;"></div>
    <div id="root" class="h-full w-full flex flex-col"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        
        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const getGreeting = () => { const hour = new Date().getHours(); return hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite'; };
        const getDayOfWeek = () => { const days = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado']; return days[new Date().getDay()]; };
        const showToast = (msg, icon="✅") => { const t = document.getElementById('toast'); if(t){ t.innerHTML = `<span>${icon}</span> ${msg}`; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); } };
        const safeArray = (arr) => (Array.isArray(arr) && arr.length > 0) ? arr : []; const safeObj = (obj) => (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
        const formatDateBR = (ds) => { if(!ds) return '-'; const [y, m, d] = ds.split('-'); return `${d}/${m}`; };
        const vibrate = (pattern) => { if ("vibrate" in navigator) { try { navigator.vibrate(pattern); } catch (e) {} } };

        const Icon = ({ name, size=24, className="", onClick }) => {
            const p = { 
                user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>', check: '<polyline points="20 6 9 17 4 12"/>', x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>', send: '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>', alert: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>', activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>', play: '<polygon points="5 3 19 12 5 21 5 3"/>', clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>', trophy: '<path d="M8 21h8m-4-9v9"/><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/><path d="M7 2v16"/><path d="M17 2v16"/>', refresh: '<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 0 20.49 15"/>', barChart: '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>', share: '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>', fastForward: '<polygon points="13 19 22 12 13 5 13 19"/><polygon points="2 19 11 12 2 5 2 19"/>', plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>', ball: '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>', target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>', calendar: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>', arrowLeft: '<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>'
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill={name==='play'||name==='trophy'?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} onClick={onClick} dangerouslySetInnerHTML={{__html: p[name] || ''}} />;
        };

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], act:[], dm:[], ass:{}, matchM:{}, postW:'IA', days:[], nextG:{opponent:'',date:''}, coachMsg:'', color:'#1e3a8a', id:null });
            const [idx, setIdx] = useState(null); const [step, setStep] = useState(1); const [loading, setLoading] = useState(true);
            const [tab, setTab] = useState('workout'); 
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1}); const [pain, setPain] = useState([]);
            const [water, setWater] = useState(0); const [completed, setCompleted] = useState([]);
            const [gif, setGif] = useState(null); const [restTimer, setRestTimer] = useState(null);
            const [focusMode, setFocusMode] = useState('exercise'); const audioCtxRef = useRef(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id'); const pIdx = params.get('p');
                if(!uId) { setLoading(false); return; }
                db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ 
                            players: d.players||[], log: d.trainingLog||{}, ex: d.exercises||[], 
                            act: d.activationExercises||[], dm: d.dmRecords||[], ass: d.assessments||{},
                            matchM: d.matchMinutes||{}, days: d.days||[], coachMsg: d.coachMsg||'', id: doc.id, color: d.themeColor||'#1e3a8a' 
                        });
                        if(pIdx !== null && step === 1) { setIdx(parseInt(pIdx)); setStep(2); }
                    }
                    setLoading(false);
                }, () => setLoading(false));
            }, []);

            const myWorkouts = useMemo(() => {
                if (idx === null || !data.players[idx]) return [];
                const myName = (data.players[idx].name || "").toLowerCase();
                return (data.ex || []).filter(e => {
                    const t = (e.target || "").toLowerCase();
                    return t.includes(myName) || t.includes("geral");
                });
            }, [data.ex, idx, data.players]);

            const isConvocado = useMemo(() => {
                if (idx === null) return false;
                const myName = (data.players[idx].name || "").toLowerCase();
                return (data.ex || []).some(e => (e.target || "").toUpperCase().includes("CONVOCADO") && (e.target || "").toLowerCase().includes(myName));
            }, [data.ex, idx]);

            const handleSendWellness = () => {
                const td = getTodayStr();
                db.collection('coachData').doc(data.id).set({ trainingLog: { [td]: { [idx]: { wellness: scores, painZones: pain } } } }, {merge:true})
                .then(()=> { alert("ENVIADO COM SUCESSO! ✅"); setStep(3); });
            };

            const handleAddWater = () => {
                const newWater = water + 0.25; setWater(newWater);
                const td = getTodayStr();
                db.collection('coachData').doc(data.id).update({ [`trainingLog.${td}.${idx}.waterIntake`]: newWater });
                showToast("+250ml 💧", "💧");
            };

            if(loading) return <div className="h-screen flex items-center justify-center text-white font-bold animate-pulse uppercase tracking-widest italic">Sincronizando ProCoach...</div>;

            // PASSO 1: SELEÇÃO ELENCO (ORIGINAL)
            if(step===1) return (
                <div className="p-6 h-screen overflow-y-auto bg-slate-950 flex flex-col items-center">
                    <h1 className="text-3xl font-black italic mb-10 text-white uppercase italic">PROCOACH</h1>
                    <div className="grid grid-cols-3 gap-6 w-full max-w-sm">
                        {data.players.map((p, i) => (
                            <div key={i} onClick={()=>{setIdx(i); setStep(2);}} className="flex flex-col items-center gap-2 cursor-pointer active:scale-90 transition-transform">
                                <div className="w-20 h-20 rounded-full border-2 border-slate-800 overflow-hidden bg-slate-900 shadow-2xl">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <div className="flex h-full items-center justify-center text-2xl">👤</div>}
                                </div>
                                <span className="text-[10px] font-bold text-slate-400 uppercase truncate w-full text-center">{p.name}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // PASSO 2: WELLNESS (ORIGINAL)
            if(step===2) return (
                <div className="h-full flex flex-col bg-slate-900 pb-20 animate-fade-in">
                    <div className="bg-slate-800 p-4 border-b border-slate-700 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="w-14 h-14 rounded-full bg-slate-700 overflow-hidden border-2 border-blue-500">
                                {data.players[idx]?.image ? <img src={data.players[idx].image} className="w-full h-full object-cover"/> : <Icon name="user"/>}
                            </div>
                            <h2 className="text-lg font-black text-white">{getGreeting()}, {data.players[idx]?.name.split(' ')[0]}!</h2>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 space-y-6">
                        {['Sono','Estresse','Cansaço','Dor Muscular','Humor'].map((l, i)=> {
                            const keys = ['sleep','stress','fatigue','soreness','mood'];
                            return (
                                <div key={l} className="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                                    <div className="flex justify-between mb-2 font-bold text-white text-xs uppercase"><span>{l}</span><span className="text-blue-400">{scores[keys[i]]}</span></div>
                                    <input type="range" min="1" max="7" value={scores[keys[i]]} onChange={e=>{
                                        const newS = {...scores}; newS[keys[i]] = parseInt(e.target.value); setScores(newS);
                                    }} className="hooper-slider" style={{background:'linear-gradient(to right,#22c55e,#eab308,#ef4444)'}}/>
                                </div>
                            )
                        })}
                        <button onClick={handleSendWellness} className="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-widest text-sm">Enviar Prontidão</button>
                    </div>
                </div>
            );

            // PASSO 3: DASHBOARD PRINCIPAL (ORIGINAL + ABAS)
            const p = data.players[idx];
            return (
                <div className="h-full flex flex-col bg-slate-950 relative">
                    {/* TOPO ORIGINAL */}
                    <div className="p-6 shrink-0 rounded-b-[40px] shadow-2xl relative overflow-hidden" style={{ background: `linear-gradient(135deg, ${data.color}, #020617)` }}>
                        <div className="flex items-center gap-4">
                            <div className="w-16 h-16 rounded-full border-2 border-white/20 overflow-hidden">
                                {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <div className="p-4 text-center">👤</div>}
                            </div>
                            <div>
                                <h2 className="text-lg font-black text-white uppercase italic">{p.name}</h2>
                                <p className="text-[10px] font-bold text-white/50 uppercase tracking-[0.2em]">{p.position || 'ATLETA'}</p>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 pb-32 custom-scroll">
                        {tab === 'workout' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-slate-900/50 p-4 rounded-3xl border border-slate-800 text-center">
                                        <Icon name="ball" className="text-yellow-500 mb-1 mx-auto" size={20}/>
                                        <span className="text-[10px] font-bold text-slate-500 uppercase">Gols</span>
                                        <div className="text-2xl font-black text-white">{p.stats?.g || 0}</div>
                                    </div>
                                    <div className="bg-slate-900/50 p-4 rounded-3xl border border-slate-800 text-center">
                                        <Icon name="activity" className="text-blue-500 mb-1 mx-auto" size={20}/>
                                        <span className="text-[10px] font-bold text-slate-500 uppercase">Assist.</span>
                                        <div className="text-2xl font-black text-white">{p.stats?.a || 0}</div>
                                    </div>
                                </div>

                                <div className="bg-blue-900/20 border border-blue-900 p-5 rounded-[32px] space-y-3">
                                    <div className="flex justify-between items-center"><h3 className="text-[10px] font-black text-blue-400 uppercase tracking-widest">💧 Hidratação</h3><span className="text-[10px] font-bold text-blue-300">{water.toFixed(2)}L</span></div>
                                    <button onClick={handleAddWater} className="w-full bg-blue-600 text-white font-black py-3 rounded-2xl text-xs uppercase shadow-lg shadow-blue-900/40">+ BEBI 250ML</button>
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-800 pb-2">Atividades do Dia</h3>
                                    {myWorkouts.length > 0 ? myWorkouts.map((ex, i) => (
                                        <div key={i} className="bg-slate-900 border border-slate-800 p-4 rounded-2xl flex items-center gap-4">
                                            <div className="text-xl">⚽</div>
                                            <div className="flex-1">
                                                <div className="text-xs font-black text-white uppercase">{ex.title}</div>
                                                <div className="text-[9px] font-bold text-slate-500 uppercase">{ex.target}</div>
                                            </div>
                                        </div>
                                    )) : <div className="text-center p-8 bg-slate-900/30 rounded-3xl border border-dashed border-slate-800 italic text-slate-600 text-xs">Dia de Recuperação</div>}
                                    <button className="w-full bg-slate-800 text-white font-black py-4 rounded-2xl shadow-xl uppercase text-xs border border-slate-700">Registrar Descanso</button>
                                </div>
                            </div>
                        )}

                        {tab === 'microciclo' && (
                            <div className="space-y-4 animate-fade-in">
                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Agenda da Semana</h3>
                                {data.days.map((day, dIdx) => (
                                    <div key={dIdx} className="card-micro rounded-[32px] p-5 mb-3 border border-white/5 space-y-4">
                                        <div className="flex justify-between items-center">
                                            <span className="text-lg font-black text-white italic">{day.name}</span>
                                            <span className="text-[9px] font-black bg-blue-600 px-2 py-1 rounded-lg uppercase">{day.md || 'Treino'}</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="bg-slate-950 p-3 rounded-2xl border border-white/5">
                                                <div className="text-[8px] font-black text-blue-500 uppercase mb-1">Manhã</div>
                                                <div className="text-[10px] font-bold text-slate-300 uppercase leading-tight">{(day.am || []).map(e=>e.type).join(', ') || 'Folga'}</div>
                                            </div>
                                            <div className="bg-slate-950 p-3 rounded-2xl border border-white/5">
                                                <div className="text-[8px] font-black text-orange-500 uppercase mb-1">Tarde</div>
                                                <div className="text-[10px] font-bold text-slate-300 uppercase leading-tight">{(day.pm || []).map(e=>e.type).join(', ') || 'Folga'}</div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'convocacao' && (
                            <div className="space-y-6 animate-fade-in">
                                <h3 className="text-[10px] font-black text-yellow-500 uppercase tracking-widest text-center mb-6">Status de Jogo</h3>
                                {isConvocado ? (
                                    <div className="bg-yellow-500/10 border-2 border-yellow-500/50 p-10 rounded-[40px] text-center gold-glow space-y-4">
                                        <div className="text-6xl animate-bounce">🏆</div>
                                        <h2 className="text-3xl font-black text-white uppercase italic">CONVOCADO!</h2>
                                        <p className="text-xs text-yellow-500 font-bold uppercase tracking-[0.2em]">Sua vaga está garantida na lista oficial.</p>
                                    </div>
                                ) : (
                                    <div className="bg-slate-900 border border-slate-800 p-10 rounded-[40px] text-center opacity-50 grayscale">
                                        <div className="text-5xl mb-4">📋</div>
                                        <p className="text-sm font-bold text-slate-500 uppercase">Aguardando Lista...</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* MENU INFERIOR (O NOVO) */}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-800 p-4 flex justify-around items-center z-50 rounded-t-[32px] shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
                         <div onClick={()=>setTab('workout')} className={`flex flex-col items-center gap-1 ${tab==='workout'?'text-blue-500 scale-110':'text-slate-600'}`}><Icon name="play" size={22}/><span className="text-[8px] font-black uppercase">Treino</span></div>
                         <div onClick={()=>setTab('microciclo')} className={`flex flex-col items-center gap-1 ${tab==='microciclo'?'text-blue-400 scale-110':'text-slate-600'}`}><Icon name="calendar" size={22}/><span className="text-[8px] font-black uppercase">Semana</span></div>
                         <div onClick={()=>setTab('convocacao')} className={`flex flex-col items-center gap-1 ${tab==='convocacao'?'text-yellow-500 scale-110':'text-slate-600'}`}><Icon name="trophy" size={22}/><span className="text-[8px] font-black uppercase">Convocar</span></div>
                         <div onClick={()=>setTab('workout')} className="flex flex-col items-center gap-1 text-slate-600"><Icon name="activity" size={22}/><span className="text-[8px] font-black uppercase">Histórico</span></div>
                         <div onClick={()=>setTab('workout')} className="flex flex-col items-center gap-1 text-slate-600"><Icon name="user" size={22}/><span className="text-[8px] font-black uppercase">Perfil</span></div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
