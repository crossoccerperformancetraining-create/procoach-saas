<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .animate-fade-in { animation: fadeIn 0.4s; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-track { background: transparent; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .card-pro { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .tab-active { color: #3b82f6 !important; font-weight: 900; }
        .gold-glow { box-shadow: 0 0 25px rgba(234, 179, 8, 0.4); border: 2px solid #eab308; }
        .visto-verde { position: absolute; top: 0; right: 0; background: #22c55e; border: 2px solid #020617; border-radius: 50%; padding: 2px; z-index: 10; }
        .btn-check { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #334155; display: flex; items-center; justify-content: center; }
        .btn-check.done { background: #22c55e; border-color: #22c55e; color: white; }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950 text-slate-100">
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-3 rounded-full shadow-2xl z-[300] text-xs font-bold transition-opacity duration-300 pointer-events-none flex items-center gap-2" style="opacity:0;"></div>
    <div id="root" class="h-full w-full flex flex-col"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        const getTodayStr = () => new Date().toISOString().split('T')[0];
        const getGreeting = () => { const h = new Date().getHours(); return h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite'; };
        const getEmbedUrl = (url) => { if(!url) return null; const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/; const m = url.match(reg); return (m && m[2].length === 11) ? `https://www.youtube.com/embed/${m[2]}` : null; };

        const Icon = ({ name, size=24, className="", onClick }) => {
            const paths = { 
                play: '<polygon points="5 3 19 12 5 21 5 3"/>',
                calendar: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
                trophy: '<path d="M8 21h8m-4-9v9"/><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/><path d="M7 2v16"/><path d="M17 2v16"/>',
                chart: '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>',
                user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
                bell: '<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>'
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} onClick={onClick} dangerouslySetInnerHTML={{__html: paths[name]}} />;
        };

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, exercises:[], days:[], coachMsg:'', id:null });
            const [idx, setIdx] = useState(null); const [step, setStep] = useState(1);
            const [tab, setTab] = useState('workout');
            const [scores, setScores] = useState({sleep:4, stress:4, fatigue:4, soreness:1, mood:4});
            const [completed, setCompleted] = useState([]);
            const [gifModal, setGifModal] = useState(null);
            const [respondedWellness, setRespondedWellness] = useState(false);
            const [agendaAck, setAgendaAck] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id'); const pIdx = params.get('p');
                if(!uId) return;
                db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ ...d, id: doc.id });
                        if(pIdx !== null && step === 1) { 
                            setIdx(parseInt(pIdx)); setStep(2); 
                            const logHoje = d.trainingLog?.[getTodayStr()]?.[parseInt(pIdx)];
                            if(logHoje?.wellness) setRespondedWellness(true);
                            if(logHoje?.agendaAck) setAgendaAck(true);
                        }
                    }
                });
            }, []);

            const myWorkouts = useMemo(() => {
                if (idx === null || !data.players[idx]) return [];
                const name = data.players[idx].name.toLowerCase();
                return (data.exercises || []).filter(e => e.target?.toLowerCase().includes(name) || e.target?.toLowerCase().includes('geral'));
            }, [data.exercises, idx]);

            const convocado = useMemo(() => {
                if (idx === null) return false;
                return (data.exercises || []).some(e => e.target?.toLowerCase().includes('convocado') && e.target?.toLowerCase().includes(data.players[idx].name.toLowerCase()));
            }, [data.exercises, idx]);

            const handleToggleEx = (id) => {
                if (completed.includes(id)) setCompleted(completed.filter(i => i !== id));
                else setCompleted([...completed, id]);
            };

            const finalize = () => { alert("Treino registrado! ✅"); window.scrollTo(0,0); };

            // TELA 1: SELEÇÃO
            if(step===1) return (
                <div className="p-8 flex flex-col items-center justify-center min-h-screen bg-slate-950">
                    <h1 className="text-3xl font-black italic mb-10 text-white uppercase italic">PROCOACH</h1>
                    <div className="grid grid-cols-3 gap-6 w-full max-w-sm">
                        {data.players.map((p, i) => {
                            const pronto = !!(data.trainingLog?.[getTodayStr()]?.[i]?.wellness);
                            return (
                                <div key={i} onClick={()=>{setIdx(i); setStep(2);}} className="flex flex-col items-center gap-2 cursor-pointer relative">
                                    <div className={`w-20 h-20 rounded-full border-2 overflow-hidden bg-slate-900 shadow-xl ${pronto ? 'border-green-500' : 'border-slate-800'}`}>
                                        {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <div className="flex h-full items-center justify-center text-2xl">👤</div>}
                                        {pronto && <div className="visto-verde"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="4"><polyline points="20 6 9 17 4 12"/></svg></div>}
                                    </div>
                                    <span className="text-[10px] font-bold text-slate-400 uppercase truncate w-full text-center">{p.name}</span>
                                </div>
                            )
                        })}
                    </div>
                </div>
            );

            const p = data.players[idx];
            return (
                <div className="flex flex-col min-h-screen pb-32 bg-slate-950">
                    {/* TOPO PREMIUM */}
                    <div className="p-6 rounded-b-[40px] shadow-2xl relative overflow-hidden" style={{ background: 'linear-gradient(135deg, #1e3a8a, #020617)' }}>
                        <div className="flex justify-between items-start">
                            <div className="flex items-center gap-4">
                                <div className="w-16 h-16 rounded-full border-2 border-white/20 overflow-hidden shrink-0"><img src={p.image || ''} className="w-full h-full object-cover"/></div>
                                <div>
                                    <div className="text-[10px] font-black text-blue-400 uppercase tracking-widest">{getGreeting()}!</div>
                                    <h2 className="text-xl font-black text-white uppercase italic">{p.name.split(' ')[0]}</h2>
                                </div>
                            </div>
                            <button onClick={()=>setStep(1)} className="bg-white/10 px-3 py-1 rounded-full text-[8px] font-black uppercase">Trocar</button>
                        </div>
                    </div>

                    <div className="p-6 space-y-6 flex-1 overflow-y-auto custom-scroll">
                        {tab === 'workout' && (
                            <div className="space-y-6 animate-fade-in">
                                {/* MENSAGEM */}
                                {data.coachMsg && (
                                    <div className="card-pro p-4 border-l-4 border-orange-500">
                                        <div className="flex justify-between items-center mb-2">
                                            <h4 className="text-[9px] font-black text-orange-400 uppercase">Aviso do Treinador</h4>
                                            {agendaAck && <span className="text-[8px] font-black text-green-400 uppercase">CIENTE ✅</span>}
                                        </div>
                                        <p className="text-sm font-semibold italic">{data.coachMsg}</p>
                                        {!agendaAck && <button onClick={()=>{const td=getTodayStr();db.collection('coachData').doc(data.id).set({trainingLog:{[td]:{[idx]:{agendaAck:true}}}},{merge:true}).then(()=>setAgendaAck(true));}} className="w-full bg-orange-600 py-1.5 rounded-lg text-[9px] font-black mt-3 uppercase">Marcar Ciente</button>}
                                    </div>
                                )}

                                {/* WELLNESS */}
                                {!respondedWellness ? (
                                    <div className="space-y-4">
                                        <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center border-b border-slate-800 pb-2">Prontidão Matinal</h3>
                                        {[{id:'sleep',l:'Sono',ic:'😴'},{id:'fatigue',l:'Cansaço',ic:'🔋'},{id:'soreness',l:'Dor',ic:'🦵'}].map(m=>(
                                            <div key={m.id} className="card-pro p-4">
                                                <div className="flex justify-between mb-2 font-bold text-white text-[10px] uppercase"><span>{m.ic} {m.l}</span><span className="text-blue-400">{scores[m.id]}</span></div>
                                                <input type="range" min="1" max="7" value={scores[m.id]} onChange={e=>setScores({...scores,[m.id]:parseInt(e.target.value)})} className="hooper-slider"/>
                                            </div>
                                        ))}
                                        <button onClick={()=>{const td=getTodayStr();db.collection('coachData').doc(data.id).set({trainingLog:{[td]:{[idx]:{wellness:scores}}}},{merge:true}).then(()=>setRespondedWellness(true));}} className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl uppercase text-xs">Enviar Prontidão</button>
                                    </div>
                                ) : (
                                    <div className="bg-green-500/10 border border-green-500/20 p-4 rounded-2xl text-center"><p className="text-[10px] font-black text-green-400 uppercase tracking-widest">✅ Prontidão diária enviada</p></div>
                                )}

                                {/* LISTA DE TREINOS COM GIFS */}
                                <div className="space-y-4">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-800 pb-2">Treino de Hoje</h3>
                                    {myWorkouts.length > 0 ? myWorkouts.map((ex, i) => (
                                        <div key={i} className={`card-pro p-4 flex items-center gap-4 transition-all ${completed.includes(ex.id) ? 'opacity-40 grayscale' : ''}`}>
                                            <div onClick={()=>setGifModal(ex)} className="w-16 h-16 bg-slate-800 rounded-xl overflow-hidden shrink-0 cursor-pointer border border-white/5"><img src={ex.gifUrl} className="w-full h-full object-cover"/></div>
                                            <div className="flex-1">
                                                <div className="text-xs font-black text-white uppercase leading-tight">{ex.title}</div>
                                                <div className="text-[10px] font-bold text-blue-400 mt-1">{ex.sets}x {ex.reps} | {ex.rest}s Desc.</div>
                                            </div>
                                            <button onClick={()=>handleToggleEx(ex.id)} className={`btn-check ${completed.includes(ex.id) ? 'done' : ''}`}>{completed.includes(ex.id) ? '✓' : ''}</button>
                                        </div>
                                    )) : <div className="text-center p-10 card-pro opacity-50 uppercase text-[10px] font-black tracking-widest">Sem atividades</div>}
                                </div>
                                {myWorkouts.length > 0 && <button onClick={finalize} className="w-full bg-green-500 text-white font-black py-5 rounded-3xl shadow-2xl uppercase tracking-widest text-sm">FINALIZAR TREINO 🏆</button>}
                            </div>
                        )}

                        {tab === 'micro' && (
                            <div className="space-y-4 animate-fade-in pb-10">
                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center mb-6">Microciclo Semanal</h3>
                                {data.days?.map((day, di) => (
                                    <div key={di} className="card-pro p-5 space-y-4">
                                        <div className="flex justify-between items-center"><span className="text-lg font-black italic uppercase text-white leading-none">{day.name}</span><span className="text-[9px] font-bold bg-blue-600 px-2 py-1 rounded text-white uppercase">{day.md || 'Treino'}</span></div>
                                        <div className="grid grid-cols-2 gap-3 text-[10px] font-black uppercase text-center">
                                            <div className="bg-slate-950 p-3 rounded-xl border border-white/5"><div className="text-blue-500 mb-1 tracking-widest">Manhã ☀️</div>{(day.am || []).map(e=>e.type).join(', ') || 'Folga'}</div>
                                            <div className="bg-slate-950 p-3 rounded-xl border border-white/5"><div className="text-orange-500 mb-1 tracking-widest">Tarde 🌤️</div>{(day.pm || []).map(e=>e.type).join(', ') || 'Folga'}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'convoca' && (
                            <div className="animate-fade-in text-center py-10 space-y-8">
                                {convocado ? (
                                    <div className="bg-yellow-500/10 border-2 border-yellow-500/50 p-10 rounded-[40px] gold-glow animate-bounce">
                                        <div className="text-8xl mb-6">🏆</div>
                                        <h2 className="text-4xl font-black text-white uppercase italic">CONVOCADO!</h2>
                                        <p className="text-xs text-yellow-500 font-black uppercase mt-4 tracking-widest">Você está na lista oficial para o jogo.</p>
                                    </div>
                                ) : (
                                    <div className="card-pro p-16 opacity-30 grayscale border-dashed border-2">
                                        <div className="text-7xl mb-6">📋</div>
                                        <p className="text-sm font-black uppercase tracking-[0.2em] text-slate-500 text-center">Aguardando Lista...</p>
                                    </div>
                                )}
                            </div>
                        )}

                        {tab === 'rank' && (
                            <div className="space-y-4 animate-fade-in">
                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6 text-center">Ranking Artilharia</h3>
                                {data.players.sort((a,b)=> (Number(b.stats?.g)||0) - (Number(a.stats?.g)||0)).slice(0,10).map((pl, ri) => (
                                    <div key={ri} className="card-pro p-4 flex justify-between items-center">
                                        <div className="flex items-center gap-3"><span className="text-xl font-black text-slate-800">#{ri+1}</span><span className="text-xs font-bold uppercase truncate">{pl.name}</span></div>
                                        <div className="bg-yellow-500 text-slate-950 px-4 py-1.5 rounded-full font-black text-[10px] shadow-lg">{pl.stats?.g || 0} GOLS</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'perfil' && (
                            <div className="animate-fade-in space-y-6">
                                <div className="card-pro p-8 text-center border border-blue-500/20 shadow-2xl">
                                    <div className="w-24 h-24 rounded-full border-4 border-blue-600 mx-auto mb-6 overflow-hidden shadow-lg"><img src={p.image || ''} className="w-full h-full object-cover" /></div>
                                    <h2 className="text-2xl font-black uppercase italic leading-none">{p.name}</h2>
                                    <div className="grid grid-cols-2 gap-4 mt-8">
                                        <div className="bg-slate-950 p-5 rounded-3xl border border-white/5 shadow-inner text-center"><div className="text-[9px] text-slate-500 font-black mb-1 uppercase tracking-widest">Nota Geral</div><div className="text-3xl font-black text-green-400">88</div></div>
                                        <div className="bg-slate-950 p-5 rounded-3xl border border-white/5 shadow-inner text-center"><div className="text-[9px] text-slate-500 font-black mb-1 uppercase tracking-widest">Potencial</div><div className="text-3xl font-black text-blue-400">94</div></div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* MODAL GIF */}
                    {gifModal && (
                        <div className="fixed inset-0 bg-black/95 z-[500] flex flex-col p-6 animate-fade-in">
                            <button onClick={()=>setGifModal(null)} className="self-end text-white text-3xl font-bold p-4">×</button>
                            <h2 className="text-xl font-black text-center uppercase mb-6">{gifModal.title}</h2>
                            <div className="flex-1 flex items-center justify-center rounded-3xl overflow-hidden border border-white/10">
                                <img src={gifModal.gifUrl} className="w-full h-auto max-h-[60vh] object-contain"/>
                            </div>
                            <div className="grid grid-cols-2 gap-4 mt-10">
                                <div className="card-pro p-4 text-center"><div className="text-blue-500 text-[10px] font-black">SÉRIES</div><div className="text-3xl font-black">{gifModal.sets}</div></div>
                                <div className="card-pro p-4 text-center"><div className="text-green-500 text-[10px] font-black">REPS</div><div className="text-3xl font-black">{gifModal.reps}</div></div>
                            </div>
                        </div>
                    )}

                    {/* MENU INFERIOR ✨ */}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-800 p-4 flex justify-around items-center z-[110] rounded-t-[40px] shadow-[0_-15px_40px_rgba(0,0,0,0.7)]">
                         <div onClick={()=>setTab('workout')} className={`flex flex-col items-center gap-1 ${tab==='workout'?'tab-active':'text-slate-600'}`}><Icon name="play" size={22}/><span className="text-[8px] font-black uppercase">Treino</span></div>
                         <div onClick={()=>setTab('micro')} className={`flex flex-col items-center gap-1 ${tab==='micro'?'tab-active':'text-slate-600'}`}><Icon name="calendar" size={22}/><span className="text-[8px] font-black uppercase">Semana</span></div>
                         <div onClick={()=>setTab('convoca')} className={`flex flex-col items-center gap-1 ${tab==='convoca'?'text-yellow-500 scale-125':'text-slate-600'}`}><Icon name="trophy" size={22}/><span className="text-[8px] font-black uppercase">Convocar</span></div>
                         <div onClick={()=>setTab('rank')} className={`flex flex-col items-center gap-1 ${tab==='rank'?'tab-active':'text-slate-600'}`}><Icon name="chart" size={22}/><span className="text-[8px] font-black uppercase">Rank</span></div>
                         <div onClick={()=>setTab('perfil')} className={`flex flex-col items-center gap-1 ${tab==='perfil'?'tab-active':'text-slate-600'}`}><Icon name="user" size={22}/><span className="text-[8px] font-black uppercase">Perfil</span></div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
