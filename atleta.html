<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .animate-fade-in { animation: fadeIn 0.4s; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-track { background: transparent; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .gold-glow { box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); border: 2px solid #eab308; }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950 text-slate-100">
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-3 rounded-full shadow-2xl z-[300] text-xs font-bold transition-opacity duration-300 pointer-events-none flex items-center gap-2" style="opacity:0;"></div>
    <div id="root" class="h-full w-full flex flex-col"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        
        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const getGreeting = () => { const hour = new Date().getHours(); return hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite'; };
        const showToast = (msg, icon="✅") => { const t = document.getElementById('toast'); if(t){ t.innerHTML = `<span>${icon}</span> ${msg}`; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); } };
        const safeArray = (arr) => (Array.isArray(arr)) ? arr : []; const safeObj = (obj) => (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
        const formatDateBR = (ds) => { if(!ds) return '-'; const [y, m, d] = ds.split('-'); return `${d}/${m}`; };

        const Icon = ({ name, size=24, className="", onClick }) => {
            const p = { 
                user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>', check: '<polyline points="20 6 9 17 4 12"/>', x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>', send: '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>', alert: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>', activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>', play: '<polygon points="5 3 19 12 5 21 5 3"/>', clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>', trophy: '<path d="M8 21h8m-4-9v9"/><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/><path d="M7 2v16"/><path d="M17 2v16"/>', refresh: '<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 0 20.49 15"/>', calendar: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>', target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>', bell: '<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>', ball: '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>'
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill={name==='play'||name==='trophy'?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} onClick={onClick} dangerouslySetInnerHTML={{__html: p[name] || ''}} />;
        };

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, exercises:[], color:'#1e3a8a', id:null, coachMsg:'', days: [] });
            const [idx, setIdx] = useState(null);
            const [step, setStep] = useState(1);
            const [tab, setTab] = useState('workout');
            const [loading, setLoading] = useState(true);
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1});
            const [pain, setPain] = useState([]);
            const [submitting, setSubmitting] = useState(false);
            const [water, setWater] = useState(0);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id');
                const pIdx = params.get('p');
                if(!uId) { setLoading(false); return; }

                const unsubscribe = db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ ...d, id: doc.id, players: d.players || [], log: d.trainingLog || {}, days: d.days || [], exercises: d.exercises || [] });
                        
                        if(pIdx !== null && d.players?.[parseInt(pIdx)]) {
                            const pI = parseInt(pIdx);
                            setIdx(pI);
                            // Se já preencheu wellness hoje, vai para o painel principal (step 3)
                            if(d.trainingLog?.[getTodayStr()]?.[pI]?.wellness?.sleep) {
                                setStep(3);
                            } else {
                                setStep(2);
                            }
                            setWater(Number(d.trainingLog?.[getTodayStr()]?.[pI]?.waterIntake) || 0);
                        }
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const subData = async () => {
                if(submitting) return;
                setSubmitting(true);
                try {
                    const td = getTodayStr();
                    const nl = { ...data.log };
                    if(!nl[td]) nl[td] = {};
                    if(!nl[td][idx]) nl[td][idx] = {};
                    
                    nl[td][idx] = { ...nl[td][idx], wellness: scores, painZones: pain };
                    
                    await db.collection('coachData').doc(data.id).update({ trainingLog: nl });
                    setStep(3);
                    showToast("Prontidão enviada!");
                } catch (e) {
                    console.error(e);
                    alert("Erro ao enviar. Tente novamente.");
                } finally {
                    setSubmitting(false);
                }
            };

            const handleAddWater = async () => {
                const td = getTodayStr();
                const newWater = water + 0.25;
                setWater(newWater);
                const path = `trainingLog.${td}.${idx}.waterIntake`;
                await db.collection('coachData').doc(data.id).update({ [path]: newWater });
                showToast("+250ml 💧", "💧");
            };

            if(loading) return <div className="h-screen flex items-center justify-center bg-slate-950 text-white font-black italic">PROCOACH...</div>;

            // STEP 1: SELEÇÃO DE ATLETA
            if(step === 1) return (
                <div className="p-6 h-screen flex flex-col items-center justify-center bg-slate-950 overflow-y-auto">
                    <h1 className="text-3xl font-black italic mb-8" style={{color:data.themeColor}}><span className="text-white">PRO</span>COACH</h1>
                    <div className="grid grid-cols-3 gap-6 w-full max-w-md">
                        {data.players.map((p, i) => (
                            <div key={i} onClick={() => { setIdx(i); setStep(2); }} className="flex flex-col items-center gap-2 cursor-pointer">
                                <div className="w-16 h-16 rounded-full border-2 border-slate-800 overflow-hidden bg-slate-900">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" className="m-4 text-slate-700"/>}
                                </div>
                                <span className="text-[10px] font-bold uppercase truncate w-full text-center">{p.name?.split(' ')[0]}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // STEP 2: FORMULÁRIO WELLNESS
            if(step === 2) return (
                <div className="h-full flex flex-col bg-slate-900 animate-fade-in">
                    <div className="p-6 border-b border-slate-800 flex justify-between items-center">
                        <h2 className="text-lg font-black uppercase italic text-white">Prontidão</h2>
                        <span className="text-[10px] font-bold text-slate-500 uppercase">{getGreeting()}</span>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 space-y-6">
                        {[{id:'sleep',l:'😴 Sono'},{id:'stress',l:'🤯 Estresse'},{id:'fatigue',l:'🔋 Energia'},{id:'soreness',l:'🦵 Dor'},{id:'mood',l:'🧠 Humor'}].map(m=>(
                            <div key={m.id} className="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                                <div className="flex justify-between mb-2 font-bold text-xs uppercase tracking-widest text-slate-400"><span>{m.l}</span><span className="text-white bg-slate-900 px-2 rounded">{scores[m.id]}</span></div>
                                <input type="range" min="1" max="7" value={scores[m.id]} onChange={e=>setScores({...scores,[m.id]:parseInt(e.target.value)})} className="hooper-slider" style={{background:'linear-gradient(to right,#22c55e,#eab308,#ef4444)'}}/>
                            </div>
                        ))}
                    </div>
                    <div className="p-4 bg-slate-900 border-t border-slate-800">
                        <button onClick={subData} disabled={submitting} className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl">{submitting ? 'Salvando...' : 'ENVIAR PARA O PROFESSOR'}</button>
                    </div>
                </div>
            );

            // STEP 3: DASHBOARD PRINCIPAL
            const p = data.players[idx];
            return (
                <div className="flex-1 flex flex-col h-full bg-slate-950">
                    {/* TOPO PERFIL */}
                    <div className="p-6 rounded-b-[40px] bg-slate-900 border-b border-slate-800">
                        <div className="flex items-center gap-4">
                            <div className="w-16 h-16 rounded-full border-2 border-blue-500 overflow-hidden bg-slate-800">
                                {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" className="m-4 text-slate-700"/>}
                            </div>
                            <div>
                                <h1 className="text-xl font-black uppercase text-white">{p.name}</h1>
                                <div className="flex items-center gap-2 mt-1">
                                    <span className="text-[9px] font-black bg-blue-600 text-white px-2 py-0.5 rounded uppercase">{p.position || 'Atleta'}</span>
                                    {p.highlight && <span className="text-[9px] font-black bg-yellow-500 text-slate-900 px-2 py-0.5 rounded flex items-center gap-1 shadow-lg"><Icon name="trophy" size={10}/> CONVOCADO</span>}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* CONTEÚDO DAS ABAS */}
                    <div className="flex-1 overflow-y-auto px-4 pt-4 pb-24 custom-scroll">
                        
                        {/* ABA TREINO */}
                        {tab === 'workout' && (
                            <div className="animate-fade-in space-y-4">
                                <div className="bg-blue-950/40 border border-blue-900 p-5 rounded-[32px] flex flex-col gap-3 shadow-inner">
                                    <div className="flex justify-between items-center"><h3 className="text-[10px] font-black text-blue-400 uppercase tracking-widest">💧 Hidratação</h3><span className="text-[10px] font-bold text-blue-300 bg-blue-900/50 px-2 py-0.5 rounded">{water.toFixed(2)}L / 3.0L</span></div>
                                    <div className="w-full h-3 bg-slate-800 rounded-full overflow-hidden border border-slate-700"><div className="h-full bg-blue-500 transition-all duration-700" style={{width: `${Math.min(100, (water/3)*100)}%`}}></div></div>
                                    <button onClick={handleAddWater} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-2xl text-xs active:scale-95 transition-transform">+ BEBI 250ML</button>
                                </div>

                                {safeArray(data.exercises).map((ex, i) => (
                                    <div key={i} className="bg-slate-900/50 border border-slate-800 p-4 rounded-[32px] flex items-center gap-4">
                                        <div className="w-16 h-16 bg-slate-800 rounded-2xl overflow-hidden shrink-0">
                                            {ex.gifUrl && <img src={ex.gifUrl} className="w-full h-full object-cover"/>}
                                        </div>
                                        <div>
                                            <div className="text-[10px] font-black text-blue-500 uppercase">{ex.target}</div>
                                            <div className="text-white font-bold uppercase text-sm">{ex.title}</div>
                                            <div className="text-[10px] text-slate-400 font-bold mt-1">{ex.sets} séries x {ex.reps}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* ABA AGENDA (CONVOCAÇÃO E LOGÍSTICA) */}
                        {tab === 'agenda' && (
                            <div className="animate-fade-in space-y-6">
                                {p.highlight ? (
                                    <div className="bg-slate-900/80 border-2 border-blue-500 p-5 rounded-[32px] shadow-lg relative overflow-hidden">
                                        <div className="absolute top-0 right-0 bg-blue-500 text-white px-4 py-1 rounded-bl-2xl font-black text-[10px] uppercase">Relacionado</div>
                                        
                                        <h3 className="text-sm font-black text-white uppercase mb-4 flex items-center gap-2">
                                            <Icon name="trophy" size={16} className="text-yellow-500"/> CONVOCAÇÃO OFICIAL
                                        </h3>

                                        <div className="flex items-center gap-4 bg-blue-500/10 p-4 rounded-2xl border border-blue-500/30 mb-4">
                                            <div className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center font-black text-white text-xl shadow-lg border-2 border-blue-400 shrink-0">
                                                {p.number || "!"}
                                            </div>
                                            <div>
                                                <div className="text-[14px] font-black text-white uppercase tracking-tight italic">VOCÊ VAI PRO JOGO!</div>
                                                <div className="text-[10px] font-bold text-blue-400 uppercase mt-0.5 leading-tight">Prepare seu equipamento e foque no objetivo.</div>
                                            </div>
                                        </div>

                                        <div className="bg-slate-950/80 p-4 rounded-2xl border border-slate-800">
                                            <span className="text-[8px] font-black text-blue-500 uppercase block mb-2 tracking-[0.2em]">Logística Operacional</span>
                                            <div className="text-white text-xs font-medium leading-relaxed whitespace-pre-line">
                                                {data.coachMsg || "Aguardando informações da comissão técnica."}
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-slate-900/50 border border-slate-800 p-8 rounded-[32px] text-center">
                                        <Icon name="clock" size={32} className="mx-auto text-slate-700 mb-2"/>
                                        <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Aguardando lista de relacionados...</p>
                                    </div>
                                )}

                                <div className="bg-slate-900/50 border border-slate-800 p-5 rounded-[32px]">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="calendar" size={16} className="text-emerald-500"/> Programação Semanal</h3>
                                    <div className="space-y-2.5">
                                        {safeArray(data.days).map((day, i) => (
                                            <div key={i} className="flex items-center justify-between bg-slate-950/80 p-4 rounded-2xl border border-slate-800">
                                                <div className="flex flex-col">
                                                    <span className="text-[8px] font-black text-slate-500 uppercase">{day.name}</span>
                                                    <span className="text-[11px] font-black text-white uppercase">{day.md}</span>
                                                </div>
                                                <div className="flex flex-col gap-1 items-end">
                                                    {safeArray(day.am).map((ev, idx) => <span key={idx} className={`${ev.colorClass || 'bg-blue-600'} text-white text-[8px] font-black px-2.5 py-1 rounded-lg uppercase`}>{ev.type}</span>)}
                                                    {safeArray(day.pm).map((ev, idx) => <span key={idx} className={`${ev.colorClass || 'bg-slate-700'} text-white text-[8px] font-black px-2.5 py-1 rounded-lg uppercase`}>{ev.type}</span>)}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* MENU INFERIOR */}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900/90 backdrop-blur-2xl border-t border-slate-800 p-4 flex justify-around items-center z-50 rounded-t-3xl">
                         <div onClick={()=>setTab('workout')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='workout'?'text-blue-500':'text-slate-500'}`}><Icon name="play" size={24}/><span className="text-[8px] font-black uppercase mt-1">Treino</span></div>
                         <div onClick={()=>setTab('agenda')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='agenda'?'text-blue-500':'text-slate-500'}`}><Icon name="calendar" size={24}/><span className="text-[8px] font-black uppercase mt-1">Agenda</span></div>
                         <div onClick={()=>setTab('ranking')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='ranking'?'text-yellow-500':'text-slate-500'}`}><Icon name="trophy" size={24}/><span className="text-[8px] font-black uppercase mt-1">Ranking</span></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
