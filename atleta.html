<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: 900; }
        .gold-border { border: 2px solid #fbbf24; box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950">
    <div id="root" class="h-full w-full"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], days:[], id:null, coachMsg:'' });
            const [idx, setIdx] = useState(null); 
            const [step, setStep] = useState(1); 
            const [tab, setTab] = useState('hoje');
            const [loading, setLoading] = useState(true);
            const [scores, setScores] = useState({sleep:3, stress:3, fatigue:3, soreness:1, mood:4});

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id');
                const pIdx = params.get('p');
                if(!uId) { setLoading(false); return; }

                const unsubscribe = db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ 
                            players: d.players || [], 
                            log: d.trainingLog || {}, 
                            ex: d.exercises || [], 
                            days: d.days || [],
                            coachMsg: d.coachMsg || '',
                            id: doc.id 
                        });
                        if(pIdx !== null && step === 1) { 
                            setIdx(parseInt(pIdx)); 
                            setStep(2); 
                        }
                    }
                    setLoading(false);
                }, err => { setLoading(false); });
                return () => unsubscribe();
            }, []);

            const myWorkouts = useMemo(() => {
                if (idx === null || !data.players[idx]) return [];
                const myName = (data.players[idx].name || "").toLowerCase();
                return (data.ex || []).filter(e => {
                    const t = (e.target || "").toLowerCase();
                    return t.includes(myName) || t.includes("geral") || t.includes("convocado");
                });
            }, [data.ex, idx, data.players]);

            const isConvocado = myWorkouts.some(e => (e.target || "").toUpperCase().includes("CONVOCADO"));

            const handleSend = () => {
                const td = new Date().toISOString().split('T')[0];
                db.collection('coachData').doc(data.id).set({ trainingLog: { [td]: { [idx]: { wellness: scores } } } }, {merge:true})
                .then(()=> alert("✅ Prontidão Enviada!"));
            };

            if(loading) return <div className="h-screen flex items-center justify-center text-white font-bold">Sincronizando...</div>;
            if(!data.id) return <div className="h-screen flex items-center justify-center text-white p-6 text-center text-sm">Aguardando link do treinador...</div>;

            if(step === 1) return (
                <div className="p-6 h-screen overflow-y-auto">
                    <h1 className="text-2xl font-black text-center mb-8 uppercase italic">PROCOACH <span className="text-blue-500">MAX</span></h1>
                    <div className="grid grid-cols-3 gap-4">
                        {data.players.map((p, i) => (
                            <div key={i} onClick={()=>{setIdx(i); setStep(2);}} className="flex flex-col items-center gap-2">
                                <div className="w-20 h-20 rounded-full border-2 border-slate-800 overflow-hidden bg-slate-900 shadow-xl">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <div className="flex h-full items-center justify-center">👤</div>}
                                </div>
                                <span className="text-[9px] font-bold text-center uppercase truncate w-full">{p.name}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="h-full flex flex-col overflow-hidden bg-slate-950">
                    <div className="flex bg-slate-900 border-b border-white/5 pt-2">
                        <button onClick={()=>setTab('hoje')} className={`flex-1 py-4 text-[10px] font-black uppercase tracking-widest ${tab==='hoje'?'tab-active':'text-slate-500'}`}>Hoje</button>
                        <button onClick={()=>setTab('micro')} className={`flex-1 py-4 text-[10px] font-black uppercase tracking-widest ${tab==='micro'?'tab-active':'text-slate-500'}`}>Programação</button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6">
                        {tab === 'hoje' ? (
                            <div className="space-y-6">
                                {/* CARD CONVOCAÇÃO */}
                                {isConvocado && (
                                    <div className="bg-gradient-to-r from-yellow-600 via-yellow-400 to-yellow-600 p-[2px] rounded-2xl animate-pulse">
                                        <div className="bg-slate-950 rounded-[14px] p-4 text-center">
                                            <span className="text-sm font-black text-white italic">✨ VOCÊ ESTÁ CONVOCADO! 🏆</span>
                                        </div>
                                    </div>
                                )}

                                <div className="flex items-center gap-4">
                                    <div className="w-14 h-14 rounded-full border-2 border-blue-500 overflow-hidden shrink-0">
                                        {data.players[idx]?.image ? <img src={data.players[idx].image} className="w-full h-full object-cover"/> : "👤"}
                                    </div>
                                    <div>
                                        <h2 className="text-lg font-black text-white uppercase">{data.players[idx]?.name}</h2>
                                        <p className="text-[10px] font-bold text-blue-500 uppercase">{data.players[idx]?.position}</p>
                                    </div>
                                </div>

                                {data.coachMsg && (
                                    <div className="bg-blue-600/10 border-l-4 border-blue-600 p-4 rounded-r-xl">
                                        <p className="text-sm text-slate-200 leading-relaxed font-medium">{data.coachMsg}</p>
                                    </div>
                                )}

                                <div className="space-y-4">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Treino do Dia</h3>
                                    {myWorkouts.map((ex, i) => (
                                        <div key={i} className="bg-slate-900 p-4 rounded-2xl flex items-center gap-4 border border-slate-800">
                                            <div className="w-10 h-10 bg-slate-800 rounded-lg flex items-center justify-center">⚽</div>
                                            <div className="flex-1">
                                                <div className="text-xs font-black text-white uppercase">{ex.title}</div>
                                                <div className="text-[9px] font-bold text-slate-500 uppercase">{ex.target}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="space-y-4 pb-10">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center">Wellness</h3>
                                    {['sleep','stress','fatigue','soreness','mood'].map(m=>(
                                        <div key={m} className="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                                            <div className="flex justify-between mb-2 text-[10px] font-bold uppercase"><span>{m}</span><span className="text-blue-400">{scores[m]}</span></div>
                                            <input type="range" min="1" max="7" value={scores[m]} onChange={e=>setScores({...scores,[m]:parseInt(e.target.value)})} className="hooper-slider"/>
                                        </div>
                                    ))}
                                    <button onClick={handleSend} className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase text-xs">Enviar Prontidão</button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4 pb-10">
                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Agenda Semanal</h3>
                                {data.days.length > 0 ? data.days.map((day, dIdx) => (
                                    <div key={dIdx} className="bg-slate-900/50 p-4 rounded-3xl border border-white/5 space-y-3">
                                        <div className="flex justify-between items-center">
                                            <span className="text-lg font-black italic">{day.name}</span>
                                            <span className="text-[9px] font-bold bg-white/10 px-2 py-1 rounded text-slate-400">{day.md || 'Treino'}</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div className="bg-slate-950 p-3 rounded-xl border border-white/5">
                                                <div className="text-[8px] font-black text-blue-500 uppercase mb-1">Manhã</div>
                                                <div className="text-[10px] font-bold text-slate-300">{(day.am || []).map(e=>e.type).join(', ') || 'Folga'}</div>
                                            </div>
                                            <div className="bg-slate-950 p-3 rounded-xl border border-white/5">
                                                <div className="text-[8px] font-black text-orange-500 uppercase mb-1">Tarde</div>
                                                <div className="text-[10px] font-bold text-slate-300">{(day.pm || []).map(e=>e.type).join(', ') || 'Folga'}</div>
                                            </div>
                                        </div>
                                    </div>
                                )) : <p className="text-center text-slate-500 italic text-xs py-10">Aguardando planejamento do treinador...</p>}
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
