<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .animate-fade-in { animation: fadeIn 0.4s; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-track { background: transparent; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .gold-glow { box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); border: 2px solid #eab308; }
        .tab-active { color: #3b82f6; border-top: 2px solid #3b82f6; }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950 text-slate-100">
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-3 rounded-full shadow-2xl z-[300] text-xs font-bold transition-opacity duration-300 pointer-events-none flex items-center gap-2" style="opacity:0;"></div>
    <div id="root" class="h-full w-full flex flex-col"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        
        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const getGreeting = () => { const hour = new Date().getHours(); return hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite'; };
        const showToast = (msg, icon="✅") => { const t = document.getElementById('toast'); if(t){ t.innerHTML = `<span>${icon}</span> ${msg}`; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); } };
        const safeArray = (arr) => (Array.isArray(arr) && arr.length > 0) ? arr : []; const safeObj = (obj) => (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
        const formatDateBR = (ds) => { if(!ds) return '-'; const [y, m, d] = ds.split('-'); return `${d}/${m}`; };
        const vibrate = (pattern) => { if ("vibrate" in navigator) { try { navigator.vibrate(pattern); } catch (e) {} } };

        const smartShare = async (blob, filename, title) => {
            const file = new File([blob], filename, { type: blob.type });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try { await navigator.share({ files: [file], title: title }); return; } catch (err) {}
            }
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        };

        const Icon = ({ name, size=24, className="", onClick }) => {
            const p = { 
                user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>', check: '<polyline points="20 6 9 17 4 12"/>', x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>', send: '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>', alert: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>', activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>', play: '<polygon points="5 3 19 12 5 21 5 3"/>', clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>', trophy: '<path d="M8 21h8m-4-9v9"/><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/><path d="M7 2v16"/><path d="M17 2v16"/>', refresh: '<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 0 20.49 15"/>', barChart: '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>', share: '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>', fastForward: '<polygon points="13 19 22 12 13 5 13 19"/><polygon points="2 19 11 12 2 5 2 19"/>', plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>', ball: '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>', target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>', eye: '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill={name==='play'||name==='trophy'?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} onClick={onClick} dangerouslySetInnerHTML={{__html: p[name]}} />;
        };

        // COMPONENTE DO GRÁFICO TIPO FIFA (RADAR)
        const RadarChart = ({ stats, size = 150 }) => {
            const center = size / 2;
            const radius = (size / 2) * 0.7;
            const points = [
                { label: 'FOR', val: stats.force || 50 },
                { label: 'VEL', val: stats.speed || 50 },
                { label: 'POT', val: stats.power || 50 },
                { label: 'PRE', val: stats.prev || 50 },
                { label: 'TEC', val: stats.tech || 50 },
                { label: 'RES', val: stats.endurance || 50 }
            ];
            const polygonPoints = points.map((p, i) => {
                const angle = (Math.PI * 2 * i) / points.length - Math.PI / 2;
                const x = center + (radius * (p.val / 100)) * Math.cos(angle);
                const y = center + (radius * (p.val / 100)) * Math.sin(angle);
                return `${x},${y}`;
            }).join(' ');

            return (
                <div className="flex flex-col items-center">
                    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="overflow-visible">
                        {[0.25, 0.5, 0.75, 1].map(scale => (
                            <circle key={scale} cx={center} cy={center} r={radius * scale} fill="none" stroke="#334155" strokeWidth="1" strokeDasharray="2,2" />
                        ))}
                        <polygon points={polygonPoints} fill="rgba(59, 130, 246, 0.4)" stroke="#3b82f6" strokeWidth="2" />
                        {points.map((p, i) => {
                            const angle = (Math.PI * 2 * i) / points.length - Math.PI / 2;
                            const tx = center + (radius + 15) * Math.cos(angle);
                            const ty = center + (radius + 15) * Math.sin(angle);
                            return <text key={i} x={tx} y={ty} textAnchor="middle" fill="#94a3b8" fontSize="10" fontWeight="bold" className="uppercase">{p.label}</text>
                        })}
                    </svg>
                </div>
            );
        };

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], ass:{}, color:'#1e3a8a', id:null, coachMsg:'', videoUrl:'' });
            const [idx, setIdx] = useState(null);
            const [tab, setTab] = useState('workout'); // 'workout' ou 'ranking'
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(true);
            const [water, setWater] = useState(0);
            const [showProfile, setShowProfile] = useState(false);

            // Controle de Treino
            const [gif, setGif] = useState(null); 
            const [completed, setCompleted] = useState([]);
            const [skippedExs, setSkippedExs] = useState({});
            const [exLoads, setExLoads] = useState({});
            const [restTimer, setRestTimer] = useState(null);
            const [focusMode, setFocusMode] = useState('exercise');
            const activeExRef = useRef(null);
            const audioCtxRef = useRef(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id');
                const pIdx = params.get('p');
                if(!uId) { setLoading(false); return; }
                const unsubscribe = db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ 
                            players: d.players||[], log: d.trainingLog||{}, ex: d.exercises||[], ass: d.assessments||{},
                            color: d.themeColor||'#1e3a8a', id: doc.id, coachMsg: d.coachMsg||'', videoUrl: d.videoUrl||''
                        });
                        if(pIdx !== null) setIdx(parseInt(pIdx));
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const getOrderedExs = () => {
                const assStr = data.ass[idx]?.[0]?.anamnese?.toLowerCase() || '';
                const hasLca = assStr.includes('lca'); const hasPub = assStr.includes('pubalgia');
                let baseExs = safeArray(data.ex);
                let genExs = baseExs.filter(x => !x.target || x.target === 'Geral' || (!x.target.includes('LCA') && !x.target.includes('Pubalgia'))); 
                let prevExs = baseExs.filter(x => (x.target==='Prevenção (LCA/Pubalgia)' && (hasLca || hasPub))); 
                return [...prevExs, ...genExs];
            };

            const goToNextEx = (currentId) => {
                const all = getOrderedExs();
                const currentIndex = all.findIndex(e => e.id === currentId);
                let nextEx = all.slice(currentIndex + 1).find(e => !completed.includes(e.id) && !skippedExs[e.id]);
                if(nextEx) { setGif(nextEx); setFocusMode('exercise'); } else { setGif(null); showToast("Treino finalizado! 🎉"); }
            };

            useEffect(() => {
                let interval = null;
                if (restTimer !== null && restTimer > 0) { interval = setInterval(() => setRestTimer(p => p - 1), 1000); } 
                else if (restTimer === 0) { setRestTimer(null); if(gif && focusMode === 'rest') goToNextEx(activeExRef.current); }
                return () => clearInterval(interval);
            }, [restTimer, gif, focusMode]);

            const handleAddWater = () => {
                const nw = water + 0.25; setWater(nw); showToast("+250ml", "💧");
                if(nw >= 3.0 && water < 3.0) confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 } });
            };

            const getRankingData = () => {
                const players = safeArray(data.players).map((p, i) => {
                    let streak = 0; let checkDate = new Date();
                    for(let j=0; j<30; j++) {
                        const dStr = checkDate.toISOString().split('T')[0];
                        if(data.log[dStr]?.[i]?.wellness?.sleep) streak++; else if(j!==0) break;
                        checkDate.setDate(checkDate.getDate() - 1);
                    }
                    return { ...p, streak, goals: Number(p.goals)||0, assists: Number(p.assists)||0 };
                });
                return {
                    artillery: [...players].sort((a,b) => b.goals - a.goals).slice(0, 5),
                    consistency: [...players].sort((a,b) => b.streak - a.streak).slice(0, 5)
                };
            };

            const getPlayerSkills = (pIdx) => {
                const lastAss = data.ass[pIdx]?.[0] || {};
                const fms = (Number(lastAss.fms_total)||0) * 4.7; // Max 21 -> ~100
                const force = (Number(lastAss.squat_rm)||0); // Valor relativo
                const speed = 100 - ((Number(lastAss.speed30)||4.5) * 10);
                return { force: Math.min(99, force), speed: Math.max(30, speed), power: Number(lastAss.sj)||50, prev: Math.min(99, fms), tech: 75, endurance: 70 };
            };

            if(loading) return <div className="h-screen flex items-center justify-center bg-slate-950 text-blue-500 font-bold animate-pulse text-xs uppercase tracking-widest">Carregando Sistema de Elite...</div>;

            if(idx === null) return (
                <div className="p-6 h-screen flex flex-col items-center justify-center animate-fade-in bg-slate-950">
                    <h1 className="text-3xl font-black italic mb-8 text-white"><span style={{color:data.color}}>PRO</span>COACH</h1>
                    <div className="grid grid-cols-3 gap-4 w-full max-w-md">
                        {data.players.map((p, i) => (
                            <div key={i} onClick={()=>setIdx(i)} className="flex flex-col items-center gap-2 cursor-pointer active:scale-95 transition-transform">
                                <div className="w-20 h-20 rounded-full border-2 border-slate-800 overflow-hidden bg-slate-900 shadow-lg shadow-black/50">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" size={32} className="m-6 text-slate-700"/>}
                                </div>
                                <span className="text-[10px] font-bold uppercase truncate w-full text-center text-slate-400">{p.name.split(' ')[0]}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const p = data.players[idx];
            const isSuspended = p.suspended === true;
            const isHighlight = p.highlight === true;
            const ranking = getRankingData();

            return (
                <div className="flex-1 flex flex-col h-full relative overflow-hidden bg-slate-950">
                    
                    {/* CABEÇALHO */}
                    <div className="p-6 shrink-0 rounded-b-[40px] shadow-2xl relative overflow-hidden z-10" style={{ background: isSuspended ? 'linear-gradient(to bottom, #7f1d1d, #020617)' : `linear-gradient(135deg, ${data.color}, #020617)` }}>
                        <div className="flex items-center gap-4 mt-2">
                            <div onClick={()=>setShowProfile(true)} className={`w-20 h-20 rounded-full border-4 border-white/20 overflow-hidden bg-slate-800 shadow-xl relative ${isHighlight ? 'gold-glow' : ''}`}>
                                {p.image ? <img src={p.image} className="w-full h-full object-cover object-top"/> : <Icon name="user" size={40} className="m-5 text-white/20"/>}
                            </div>
                            <div className="flex-1">
                                <h1 className="text-2xl font-black uppercase text-white leading-none truncate">{p.name}</h1>
                                <div className="flex items-center gap-2 mt-2">
                                    <span className="text-[9px] font-black bg-white/20 text-white px-2 py-0.5 rounded uppercase">{p.pos || 'Atleta'} {p.number ? `#${p.number}` : ''}</span>
                                    {isHighlight && <span className="text-[9px] font-black bg-yellow-500 text-slate-900 px-2 py-0.5 rounded flex items-center gap-1 shadow-lg"><Icon name="trophy" size={10}/> DESTAQUE</span>}
                                </div>
                            </div>
                            <button onClick={()=>setIdx(null)} className="bg-white/10 p-2 rounded-full text-white/50"><Icon name="refresh" size={20}/></button>
                        </div>
                        {isSuspended && <div className="mt-4 bg-red-600 text-white p-3 rounded-2xl flex items-center gap-3 animate-pulse border border-red-400 shadow-lg"><Icon name="alert" size={24}/><div className="text-[10px] font-black uppercase">Você está Suspenso para o próximo jogo oficial!</div></div>}
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scroll pb-28">
                        
                        {tab === 'workout' && (
                            <div className="space-y-4 animate-fade-in">
                                {/* PAINEL DE GOLOS */}
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-slate-900/50 border border-slate-800 p-4 rounded-3xl flex flex-col items-center">
                                        <Icon name="ball" className="text-yellow-500 mb-1" size={20}/>
                                        <span className="text-[10px] font-bold text-slate-500 uppercase">Gols Temporada</span>
                                        <span className="text-3xl font-black text-white">{p.goals || 0}</span>
                                    </div>
                                    <div className="bg-slate-900/50 border border-slate-800 p-4 rounded-3xl flex flex-col items-center">
                                        <Icon name="target" className="text-blue-500 mb-1" size={20}/>
                                        <span className="text-[10px] font-bold text-slate-500 uppercase">Assistências</span>
                                        <span className="text-3xl font-black text-white">{p.assists || 0}</span>
                                    </div>
                                </div>

                                {data.coachMsg && <div className="bg-blue-900/20 border border-blue-800/50 p-4 rounded-3xl"><div className="flex items-center gap-2 mb-1 text-blue-400 font-black text-[10px] uppercase"><Icon name="clock" size={16}/> Recado do Professor</div><p className="text-sm font-bold text-white">{data.coachMsg}</p></div>}

                                {data.videoUrl && (
                                    <div className="bg-slate-900 rounded-3xl overflow-hidden border border-slate-800 shadow-lg">
                                        <div className="p-3 border-b border-slate-800 flex items-center gap-2 bg-slate-900/80"><Icon name="play" size={16} className="text-red-500"/><span className="text-[10px] font-black uppercase text-slate-300">Análise de Vídeo</span></div>
                                        <div className="aspect-video"><iframe src={getEmbedUrl(data.videoUrl)} className="w-full h-full" frameBorder="0" allowFullScreen></iframe></div>
                                    </div>
                                )}

                                {/* HIDRATAÇÃO */}
                                <div className="bg-blue-950/40 border border-blue-900 p-5 rounded-[32px] flex flex-col gap-3 relative shadow-inner">
                                    <div className="flex justify-between items-center"><h3 className="text-[10px] font-black text-blue-400 uppercase tracking-widest flex items-center gap-1">💧 Hidratação Diária</h3><span className="text-[10px] font-bold text-blue-300 bg-blue-900/50 px-2 py-0.5 rounded">{water.toFixed(2)}L / 3.0L</span></div>
                                    <div className="w-full h-3 bg-slate-800 rounded-full overflow-hidden border border-slate-700"><div className="h-full bg-blue-500 transition-all duration-700" style={{width: `${Math.min(100, (water/3)*100)}%`}}></div></div>
                                    <button onClick={handleAddWater} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-2xl text-xs flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-lg"><Icon name="plus" size={16}/> BEBI 250ML</button>
                                </div>

                                {/* EXERCÍCIOS */}
                                <div className="pt-2">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2">Treino Individual</h3>
                                    <div className="space-y-3">
                                        {getOrderedExs().map((ex, i) => (
                                            <div key={i} className={`bg-slate-900/80 border p-4 rounded-3xl flex items-center gap-4 transition-all ${completed.includes(ex.id)?'border-green-500 opacity-60':'border-slate-800'}`}>
                                                <div className="w-16 h-16 bg-slate-800 rounded-2xl overflow-hidden shrink-0 border border-slate-700 cursor-pointer" onClick={()=>{setGif(ex); setFocusMode('exercise');}}>
                                                    {ex.gifUrl ? <img src={ex.gifUrl} className="w-full h-full object-cover"/> : <Icon name="play" className="m-5 text-slate-700"/>}
                                                </div>
                                                <div className="flex-1">
                                                    <div className="text-sm font-black text-white uppercase">{ex.title}</div>
                                                    <div className="text-[10px] font-bold text-blue-400 mt-1 uppercase">{ex.sets}x{ex.reps} | {ex.rest}s Desc</div>
                                                </div>
                                                <button onClick={()=>{ activeExRef.current = ex.id; if(completed.includes(ex.id)) setCompleted(completed.filter(id=>id!==ex.id)); else setCompleted([...completed, ex.id]); }} className={`w-10 h-10 rounded-full border-2 flex items-center justify-center ${completed.includes(ex.id)?'bg-green-500 border-green-500 text-white':'border-slate-700 text-slate-700'}`}><Icon name="check" size={20}/></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'ranking' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="bg-slate-900/50 border border-slate-800 p-6 rounded-[32px]">
                                    <div className="flex items-center gap-3 mb-6"><div className="bg-yellow-500/20 p-2 rounded-full"><Icon name="ball" size={20} className="text-yellow-500"/></div><h3 className="font-black text-lg uppercase text-white">Artilharia</h3></div>
                                    <div className="space-y-3">
                                        {ranking.artillery.map((player, i) => (
                                            <div key={i} className="flex items-center gap-3 border-b border-slate-800/50 pb-3">
                                                <span className={`text-xl font-black w-6 ${i===0?'text-yellow-500':i===1?'text-slate-400':i===2?'text-amber-700':'text-slate-700'}`}>{i+1}</span>
                                                <div className="w-10 h-10 rounded-full bg-slate-800 overflow-hidden border border-slate-700">{player.image && <img src={player.image} className="w-full h-full object-cover"/>}</div>
                                                <div className="flex-1 font-bold text-sm uppercase">{player.name}</div>
                                                <div className="bg-slate-800 px-3 py-1 rounded-full font-black text-yellow-500 text-xs">{player.goals} Gols</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-slate-900/50 border border-slate-800 p-6 rounded-[32px]">
                                    <div className="flex items-center gap-3 mb-6"><div className="bg-orange-500/20 p-2 rounded-full"><Icon name="fire" size={20} className="text-orange-500"/></div><h3 className="font-black text-lg uppercase text-white">Consistência (🔥)</h3></div>
                                    <div className="space-y-3">
                                        {ranking.consistency.map((player, i) => (
                                            <div key={i} className="flex items-center gap-3 border-b border-slate-800/50 pb-3">
                                                <span className="text-xl font-black w-6 text-slate-700">{i+1}</span>
                                                <div className="w-10 h-10 rounded-full bg-slate-800 overflow-hidden border border-slate-700">{player.image && <img src={player.image} className="w-full h-full object-cover"/>}</div>
                                                <div className="flex-1 font-bold text-sm uppercase">{player.name}</div>
                                                <div className="bg-orange-500/20 px-3 py-1 rounded-full font-black text-orange-500 text-xs">🔥 {player.streak}d</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* PERFIL / SKILLS MODAL */}
                    {showProfile && (
                        <div className="fixed inset-0 bg-slate-950 z-[300] p-6 flex flex-col items-center animate-fade-in custom-scroll overflow-y-auto">
                            <button onClick={()=>setShowProfile(false)} className="absolute top-6 right-6 text-white/50"><Icon name="x" size={32}/></button>
                            <div className="w-32 h-32 rounded-full border-4 border-blue-500 overflow-hidden bg-slate-800 shadow-2xl mb-4 mt-10">
                                {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" size={60} className="m-8 text-white/20"/>}
                            </div>
                            <h2 className="text-3xl font-black uppercase text-white mb-1">{p.name}</h2>
                            <p className="text-blue-400 font-black uppercase text-xs tracking-widest mb-8">{p.pos || 'Atleta'}</p>
                            
                            <div className="w-full bg-slate-900 rounded-[40px] p-6 border border-slate-800 mb-6">
                                <h3 className="text-center text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Atributos de Performance</h3>
                                <RadarChart stats={getPlayerSkills(idx)} />
                                <div className="grid grid-cols-2 gap-4 mt-8">
                                    <div className="bg-slate-950 p-3 rounded-2xl border border-slate-800 text-center"><div className="text-[10px] font-bold text-slate-600 uppercase mb-1">Nota Geral</div><div className="text-2xl font-black text-green-400">88</div></div>
                                    <div className="bg-slate-950 p-3 rounded-2xl border border-slate-800 text-center"><div className="text-[10px] font-bold text-slate-600 uppercase mb-1">Potencial</div><div className="text-2xl font-black text-blue-400">94</div></div>
                                </div>
                            </div>
                            
                            <button onClick={()=>setShowProfile(false)} className="w-full bg-slate-800 text-white font-black py-4 rounded-2xl">VOLTAR</button>
                        </div>
                    )}

                    {/* MODO FOCO AUTOMÁTICO */}
                    {gif && (
                        <div className="absolute inset-0 bg-slate-950 z-[200] flex flex-col animate-fade-in">
                            <div className="p-4 flex justify-end bg-transparent absolute top-0 w-full z-10"><button onClick={()=>{setGif(null); setRestTimer(null);}} className="text-white bg-black/50 p-2 rounded-full backdrop-blur-sm"><Icon name="x"/></button></div>
                            {focusMode === 'exercise' ? (
                                <div className="flex-1 flex justify-center items-center bg-black relative">
                                    {gif.gifUrl?<img src={gif.gifUrl} className="w-full h-full object-cover opacity-80"/>:<Icon name="image" size={80} className="text-slate-700"/>}
                                    <div className="absolute bottom-0 left-0 w-full bg-gradient-to-t from-slate-950 via-slate-950/80 to-transparent p-6 pt-20">
                                        <h2 className="text-3xl font-black text-white uppercase mb-4 leading-tight">{gif.title}</h2>
                                        <div className="flex gap-4 mb-8">
                                            <div className="bg-slate-800/80 backdrop-blur-sm p-3 rounded-xl border border-slate-700 text-center flex-1"><span className="text-[10px] text-slate-400 uppercase font-bold">Séries</span><div className="text-2xl font-black text-blue-400">{gif.sets}</div></div>
                                            <div className="bg-slate-800/80 backdrop-blur-sm p-3 rounded-xl border border-slate-700 text-center flex-1"><span className="text-[10px] text-slate-400 uppercase font-bold">Reps</span><div className="text-2xl font-black text-green-400">{gif.reps}</div></div>
                                            {gif.rest && <div className="bg-slate-800/80 backdrop-blur-sm p-3 rounded-xl border border-slate-700 text-center flex-1"><span className="text-[10px] text-slate-400 uppercase font-bold">Descanso</span><div className="text-2xl font-black text-yellow-400">{gif.rest}s</div></div>}
                                        </div>
                                        <button onClick={() => {
                                            const id = gif.id; if(!completed.includes(id)) setCompleted([...completed, id]);
                                            activeExRef.current = id;
                                            if(gif.rest && parseInt(gif.rest) > 0) { setRestTimer(parseInt(gif.rest)); setFocusMode('rest'); } else { goToNextEx(id); }
                                        }} className="w-full bg-green-500 hover:bg-green-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-green-900/50 flex justify-center items-center gap-2 text-lg active:scale-95 transition-transform">
                                            <Icon name="check" size={24}/> CONCLUIR SÉRIE
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex-1 flex flex-col justify-center items-center bg-slate-900 p-6 relative">
                                     <h2 className="text-xl font-bold text-slate-400 uppercase mb-2 tracking-widest">Descanso Ativo</h2>
                                     <div className="text-8xl font-black text-yellow-400 animate-pulse drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]">{restTimer}</div>
                                     <div className="text-slate-500 mt-4 text-xs font-bold uppercase tracking-widest">Celular vai apitar ao terminar</div>
                                     <button onClick={()=>{setRestTimer(0);}} className="mt-10 bg-slate-800 text-white border border-slate-700 px-8 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest active:scale-95">Pular ⏭️</button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* MENU INFERIOR */}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900/90 backdrop-blur-2xl border-t border-slate-800 p-4 flex justify-around items-center z-50 rounded-t-[32px]">
                         <div onClick={()=>setTab('workout')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='workout'?'text-blue-500':'text-slate-600'}`}><Icon name="play" size={24}/><span className="text-[8px] font-black uppercase mt-1">Treino</span></div>
                         <div onClick={()=>setTab('ranking')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='ranking'?'text-yellow-500':'text-slate-600'}`}><Icon name="trophy" size={24}/><span className="text-[8px] font-black uppercase mt-1">Ranking</span></div>
                         <div onClick={()=>setShowProfile(true)} className="flex flex-col items-center text-slate-600 cursor-pointer"><Icon name="barChart" size={24}/><span className="text-[8px] font-black uppercase mt-1">Skills</span></div>
                         <div onClick={()=>setIdx(null)} className="flex flex-col items-center text-slate-600 cursor-pointer"><Icon name="user" size={24}/><span className="text-[8px] font-black uppercase mt-1">Sair</span></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
