    <script type="text/babel">

        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };

        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const getGreeting = () => { const hour = new Date().getHours(); return hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite'; };
        const getDayOfWeek = () => { const days = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado']; return days[new Date().getDay()]; };
        const showToast = (msg, icon="✅") => { const t = document.getElementById('toast'); if(t){ t.innerHTML = `<span>${icon}</span> ${msg}`; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); } };
        const safeArray = (arr) => (Array.isArray(arr) && arr.length > 0) ? arr : []; const safeObj = (obj) => (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
        const formatDateBR = (ds) => { if(!ds) return '-'; const [y, m, d] = ds.split('-'); return `${d}/${m}`; };
        const getDatesInRange = (start, days) => { const dates=[]; const end=new Date(start); end.setMinutes(end.getMinutes()-end.getTimezoneOffset()); for(let i=0;i<days;i++){const d=new Date(end); d.setDate(end.getDate()-i); dates.push(d.toISOString().split('T')[0]);} return dates; };
        const vibrate = (pattern) => { if ("vibrate" in navigator) { try { navigator.vibrate(pattern); } catch (e) {} } };

        const smartShare = async (blob, filename, title) => {
            const file = new File([blob], filename, { type: blob.type });
            if (navigator.canShare && navigator.canShare({ files: [file] })) { try { await navigator.share({ files: [file], title: title }); return; } catch (err) {} }
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        };

        const getEmbedUrl = (url) => { if(!url) return null; const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/; const match = url.match(regExp); return (match && match[2].length === 11) ? `https://www.youtube.com/embed/${match[2]}` : null; };

        const Icon = ({ name, size=24, className="", onClick }) => {
            const p = { 
                user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>', check: '<polyline points="20 6 9 17 4 12"/>', x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>', send: '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>', alert: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>', activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>', play: '<polygon points="5 3 19 12 5 21 5 3"/>', clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>', trophy: '<path d="M8 21h8m-4-9v9"/><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/><path d="M7 2v16"/><path d="M17 2v16"/>', refresh: '<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 0 20.49 15"/>', barChart: '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>', share: '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>', fastForward: '<polygon points="13 19 22 12 13 5 13 19"/><polygon points="2 19 11 12 2 5 2 19"/>', plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>', ball: '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>', target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>', eye: '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>', fire: '<path d="M12 2c0 0-6 6.5-6 12a6 6 0 1 0 12 0c0-5.5-6-12-6-12z"/><path d="M12 14c0 0-2 2-2 4a2 2 0 1 0 4 0c0-2-2-4-2-4z"/>', arrowDown: '<polyline points="6 9 12 15 18 9"/>', arrowUp: '<polyline points="18 15 12 9 6 15"/>', medkit: '<rect x="2" y="6" width="20" height="14" rx="2"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>', bell: '<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>', brain: '<path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>', arrowLeft: '<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>', logout: '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>', calendar: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill={name==='play'||name==='trophy'||name==='fire'?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} onClick={onClick} dangerouslySetInnerHTML={{__html: p[name] || ''}} />;
        };

        const RadarChart = ({ stats, size = 150 }) => {
            const center = size / 2; const radius = (size / 2) * 0.7;
            const points = [ { label: 'FOR', val: stats.force || 50 }, { label: 'VEL', val: stats.speed || 50 }, { label: 'POT', val: stats.power || 50 }, { label: 'PRE', val: stats.prev || 50 }, { label: 'TEC', val: stats.tech || 50 }, { label: 'RES', val: stats.endurance || 50 } ];
            const polygonPoints = points.map((p, i) => { const angle = (Math.PI * 2 * i) / points.length - Math.PI / 2; const x = center + (radius * (p.val / 100)) * Math.cos(angle); const y = center + (radius * (p.val / 100)) * Math.sin(angle); return `${x},${y}`; }).join(' ');
            return (
                <div className="flex flex-col items-center">
                    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="overflow-visible">
                        {[0.25, 0.5, 0.75, 1].map(scale => ( <circle key={scale} cx={center} cy={center} r={radius * scale} fill="none" stroke="#334155" strokeWidth="1" strokeDasharray="2,2" /> ))}
                        <polygon points={polygonPoints} fill="rgba(59, 130, 246, 0.4)" stroke="#3b82f6" strokeWidth="2" />
                        {points.map((p, i) => { const angle = (Math.PI * 2 * i) / points.length - Math.PI / 2; const tx = center + (radius + 15) * Math.cos(angle); const ty = center + (radius + 15) * Math.sin(angle); return <text key={i} x={tx} y={ty} textAnchor="middle" fill="#94a3b8" fontSize="10" fontWeight="bold" className="uppercase">{p.label}</text> })}
                    </svg>
                </div>
            );
        };

        const getMotivationalQuote = () => {
            const quotes = [ "O suor de hoje é a vitória de amanhã. Vá com tudo!", "A disciplina é a ponte entre a meta e a realização.", "Trabalhe em silêncio e deixe o sucesso fazer barulho.", "A dedicação supera o talento quando o talento não se dedica.", "Onde a vontade não falha, o caminho se abre.", "Não pare quando estiver cansado, pare quando tiver terminado." ];
            const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24); return quotes[dayOfYear % quotes.length];
        };

        const getStreakTitle = (streak) => {
            if (streak >= 15) return "LENDA INTOCÁVEL 👑";
            if (streak >= 7) return "MOTOR DA EQUIPE ⚙️";
            if (streak >= 3) return "FOCADO 🎯";
            return "EM EVOLUÇÃO 🌱";
        };

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], act:[], dm:[], ass:{}, matchM:{}, postW:'IA', nextG:{opponent:'',date:''}, coachMsg:'', color:'#1e3a8a', id:null, videoUrl:'', logo:null, teamName:'PROCOACH', days: [] });
            const [idx, setIdx] = useState(null); const [isPriv, setIsPriv] = useState(false); 
            const [tab, setTab] = useState('workout'); const [step, setStep] = useState(1); const [loading, setLoading] = useState(true);
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1}); const [pain, setPain] = useState([]);
            const [tp, setTp] = useState(''); const [ts, setTs] = useState(''); const [submitting, setSubmitting] = useState(false);
            const [water, setWater] = useState(0); const [agendaAck, setAgendaAck] = useState(false);
            const [gif, setGif] = useState(null); const [completed, setCompleted] = useState([]);
            const [skippedExs, setSkippedExs] = useState({}); const [exLoads, setExLoads] = useState({}); const [skipModal, setSkipModal] = useState(null);
            const [rpeMod, setRpeMod] = useState(false); const [rpe, setRpe] = useState(5); const [dur, setDur] = useState(60);
            const [feedbackMsg, setFeedbackMsg] = useState(""); const [showStats, setShowStats] = useState(false);
            const [expandedDay, setExpandedDay] = useState(null); const [viewMode, setViewMode] = useState('finished');
            const [showProfile, setShowProfile] = useState(false);
            const [restTimer, setRestTimer] = useState(null); const [focusMode, setFocusMode] = useState('exercise');
            const activeExRef = useRef(null); const audioCtxRef = useRef(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search); const uId = params.get('id'); const pIdx = params.get('p');
                if(!uId) { setLoading(false); return; }
                const unsubscribe = db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ players: d.players||[], log: d.trainingLog||{}, ex: d.exercises||[], act: d.activationExercises||[], dm: d.dmRecords||[], ass: d.assessments||{}, matchM: d.matchMinutes||{}, postW: d.postWorkout||'IA', nextG: d.nextGame||{}, coachMsg: d.coachMsg||d.coachMessage||'', color: d.themeColor||'#1e3a8a', id: doc.id, videoUrl: d.videoUrl||'', logo: d.logo||null, teamName: (d.header && d.header.teamName) ? d.header.teamName : 'PROCOACH', days: d.days || [] });
                        if(pIdx !== null && d.players && d.players[parseInt(pIdx)]) {
                            setIsPriv(true); setIdx(parseInt(pIdx));
                            if(d.trainingLog && d.trainingLog[getTodayStr()] && d.trainingLog[getTodayStr()][parseInt(pIdx)] && d.trainingLog[getTodayStr()][parseInt(pIdx)].wellness && d.trainingLog[getTodayStr()][parseInt(pIdx)].wellness.sleep) setStep(3); else setStep(2);
                            if(d.trainingLog && d.trainingLog[getTodayStr()] && d.trainingLog[getTodayStr()][parseInt(pIdx)] && d.trainingLog[getTodayStr()][parseInt(pIdx)].agendaAck) setAgendaAck(true);
                            setWater(Number(d.trainingLog?.[getTodayStr()]?.[parseInt(pIdx)]?.waterIntake) || 0);
                        }
                    }
                    setLoading(false);
                }, () => { setLoading(false); });
                return () => unsubscribe();
            }, []);

            const getDM = (id) => { const act = safeArray(data.dm).filter(r=>r&&r.playerId==id&&r.status==='Active'); if(act.length>0) return (parseInt(act[0].rtpPhase)||1)>=3 ? 'TRANSIÇÃO' : 'DM'; return 'APTO'; };
            const calcBat = (w) => { if(!w || !w.sleep) return { p: 0, c: 'text-slate-500', f: 'bg-slate-500' }; const s = (w.sleep||0)+(w.stress||0)+(w.fatigue||0)+(w.soreness||0)+(w.mood||0); const p = Math.max(0, Math.min(100, Math.round(100 - (((s - 5) / 30) * 100)))); return { p, c: p<40?'text-red-500':p<75?'text-yellow-500':'text-green-500', f: p<40?'bg-red-500':p<75?'bg-yellow-500':'bg-green-500' }; };

            const getOrderedExs = () => {
                const baseExs = safeArray(data.ex); const dm = getDM(idx); const trans = dm==='TRANSIÇÃO'; const inj = dm==='DM';
                let prevExs = []; let genExs = [];
                if(trans) { genExs = baseExs.filter(x=>x.target==='Transição (Retorno DM)'); } 
                else if(!inj) { genExs = baseExs.filter(x => !x.target || x.target === 'Geral'); }
                return { act: safeArray(data.act), prev: prevExs, gen: genExs, flat: [...safeArray(data.act), ...prevExs, ...genExs] };
            };

            const goToNextEx = (currentId) => { const all = getOrderedExs().flat; const currentIndex = all.findIndex(e => e.id === currentId); let nextEx = all.slice(currentIndex + 1).find(e => !completed.includes(e.id) && !skippedExs[e.id]); if(nextEx) { setGif(nextEx); setFocusMode('exercise'); } else { setGif(null); } };

            useEffect(() => {
                let interval = null;
                if (restTimer !== null && restTimer > 0) { interval = setInterval(() => setRestTimer(p => p - 1), 1000); } 
                else if (restTimer === 0) { setRestTimer(null); if(gif && focusMode === 'rest') goToNextEx(activeExRef.current); }
                return () => clearInterval(interval);
            }, [restTimer, gif, focusMode]);

            const initAudio = () => { if(!audioCtxRef.current) { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); audioCtxRef.current = ctx; } catch(e){} } };

            const selectP = (i) => { setIdx(i); initAudio(); if(data.log?.[getTodayStr()]?.[i]?.wellness?.sleep) { setStep(3); if(data.log[getTodayStr()][i].agendaAck) setAgendaAck(true); setWater(Number(data.log[getTodayStr()][i].waterIntake) || 0); } else { setStep(2); } };
            const subData = () => {
                setSubmitting(true); const td = getTodayStr(); const nl = {...data.log}; if(!nl[td]) nl[td]={}; if(!nl[td][idx]) nl[td][idx]={};
                nl[td][idx] = {...nl[td][idx], wellness: scores, painZones: pain};
                db.collection('coachData').doc(data.id).set({trainingLog: nl}, {merge:true}).then(()=>{setStep(3); setSubmitting(false);});
            };

            const ackAgenda = () => {
                const td = getTodayStr();
                db.collection('coachData').doc(data.id).update({ [`trainingLog.${td}.${idx}.agendaAck`]: true }).then(()=>{ setAgendaAck(true); });
            };

            const handleSkip = (reason) => { setSkippedExs({...skippedExs, [skipModal]: reason}); setSkipModal(null); };
            const handleAddWater = () => { const td = getTodayStr(); const currentWater = Number(data.log[td]?.[idx]?.waterIntake) || 0; const newWater = currentWater + 0.25; setWater(newWater); db.collection('coachData').doc(data.id).update({ [`trainingLog.${td}.${idx}.waterIntake`]: newWater }); };

            const saveRPE = () => {
                setSubmitting(true); const td = getTodayStr();
                db.collection('coachData').doc(data.id).update({ [`trainingLog.${td}.${idx}.rpe_am`]: rpe, [`trainingLog.${td}.${idx}.duration`]: dur, [`trainingLog.${td}.${idx}.rpeSubmitted`]: true }).then(()=>{
                    setSubmitting(false); setRpeMod(false); if(typeof confetti !== 'undefined') confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                });
            };

            const shareToInsta = async () => { const el = document.getElementById('share-card'); if(!el) return; el.style.display = 'flex'; const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#0f172a' }); el.style.display = 'none'; canvas.toBlob(blob => { smartShare(blob, 'meutreino.png', 'Treino Concluído'); }); };

            const getPlayerStats = () => { let wCompleted = 0; let totalMins = 0; let currentStreak = 0; Object.keys(data.log).forEach(dateStr => { if(data.log[dateStr]?.[idx]?.rpeSubmitted) wCompleted++; }); return { workouts: wCompleted, mins: totalMins, streak: currentStreak }; };
            const getHistory = () => { const pastDays = getDatesInRange(getTodayStr(), 7); return pastDays.map(d => { const l = data.log[d]?.[idx] || {}; return { date: d, hasW: !!l.wellness?.sleep, bat: calcBat(l.wellness).p, rpeSub: l.rpeSubmitted }; }); };
            const getRankingData = () => { const players = data.players.map((p, i) => ({ ...p, goals: Number(p.stats?.g || 0), assists: Number(p.stats?.a || 0) })); return { artillery: [...players].sort((a,b) => b.goals - a.goals).slice(0, 5) }; };
            const getPlayerSkills = (pIdx) => ({ force: 80, speed: 70, power: 75, prev: 85, tech: 75, endurance: 70 });
            const getRpeEmoji = (val) => { if(val <= 3) return '😌'; if(val <= 6) return '😅'; if(val <= 8) return '🥵'; return '💀'; };

            if(loading) return <div className="h-screen flex items-center justify-center bg-slate-950 text-white">Sincronizando...</div>;
            if(!data.id) return <div className="h-screen flex items-center justify-center bg-slate-950 text-white">Atleta não encontrado.</div>;

            if(step===1) return (
                <div className="p-6 h-screen flex flex-col items-center justify-center bg-slate-950">
                    <h1 className="text-3xl font-black italic mb-8 text-white"><span style={{color:data.color}}>PRO</span>COACH</h1>
                    <div className="grid grid-cols-3 md:grid-cols-4 gap-6 w-full max-w-2xl">
                        {data.players.map((p, i) => (
                            p && (
                                <div key={i} onClick={()=>selectP(i)} className="flex flex-col items-center gap-2 cursor-pointer">
                                    <div className={`w-20 h-20 rounded-full border-2 overflow-hidden bg-slate-900 ${p.highlight ? 'border-yellow-400 gold-glow' : 'border-slate-800'}`}>
                                        {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" size={32} className="m-6 text-slate-700"/>}
                                    </div>
                                    <span className="text-[10px] font-bold uppercase text-slate-300">{p.name?.split(' ')[0]}</span>
                                </div>
                            )
                        ))}
                    </div>
                </div>
            );

            if(step===2) return (
                <div className="h-full flex flex-col bg-slate-900 p-6">
                    <h2 className="text-xl font-black text-white uppercase mb-6">Prontidão Diária</h2>
                    <div className="flex-1 space-y-6">
                        {[{id:'sleep',l:'😴 Sono'},{id:'stress',l:'🤯 Estresse'},{id:'fatigue',l:'🔋 Energia'},{id:'soreness',l:'🦵 Dor'},{id:'mood',l:'🧠 Humor'}].map(m=>(<div key={m.id} className="bg-slate-800/50 p-4 rounded-xl border border-slate-700"><div className="flex justify-between mb-2 font-bold text-white text-sm"><span>{m.l}</span><span className="bg-slate-900 px-2 rounded text-blue-400">{scores[m.id]}</span></div><input type="range" min="1" max="7" value={scores[m.id]} onChange={e=>setScores({...scores,[m.id]:parseInt(e.target.value)})} className="hooper-slider"/></div>))}
                    </div>
                    <button onClick={subData} className="w-full text-white font-black py-4 rounded-2xl mt-4 shadow-xl" style={{backgroundColor:data.color}}>ENVIAR PRONTIDÃO</button>
                </div>
            );

            const p = data.players[idx]; 
            const isHighlight = p.highlight === true;
            const ranking = getRankingData(); const exData = getOrderedExs();
            const isFinished = data.log[getTodayStr()]?.[idx]?.rpeSubmitted === true;

            const tog = (ex) => { const id = ex.id; if(!completed.includes(id)) { setCompleted([...completed, id]); } else { setCompleted(completed.filter(x=>x!==id)); } };
            const renderExerciseCard = (ex, typeClass, iconName, borderClassColor) => {
                const isDone = completed.includes(ex.id);
                return (
                    <div key={ex.id} className={`bg-slate-900/80 p-4 rounded-2xl border ${isDone?'border-green-500':'border-slate-800'} flex items-center gap-4 transition-colors`}>
                        <div className="w-12 h-12 bg-slate-800 rounded-xl overflow-hidden shrink-0">
                            {ex.gifUrl ? <img src={ex.gifUrl} className="w-full h-full object-cover"/> : <Icon name={iconName} className="m-3 text-slate-500"/>}
                        </div>
                        <div className="flex-1">
                            <div className="font-black text-white text-sm uppercase">{ex.title}</div>
                            <div className={`text-[10px] font-bold uppercase ${typeClass}`}>{ex.sets}x {ex.reps}</div>
                        </div>
                        <button onClick={()=>tog(ex)} className={`w-10 h-10 rounded-full border-2 flex items-center justify-center ${isDone ? 'bg-green-500 border-green-500 text-white' : 'border-slate-700 text-slate-600'}`}><Icon name="check" size={20}/></button>
                    </div>
                )
            };

            return (
                <div className="flex-1 flex flex-col h-full bg-slate-950 overflow-hidden">
                    {/* TOPO PERFIL */}
                    <div className="p-6 rounded-b-[40px] shadow-2xl relative overflow-hidden" style={{ background: `linear-gradient(135deg, ${data.color}, #020617)` }}>
                        <div className="flex items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className={`w-20 h-20 rounded-full border-4 border-white/20 overflow-hidden bg-slate-800 shadow-xl ${isHighlight ? 'gold-glow' : ''}`}>
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" size={40} className="m-5 text-white/20"/>}
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black uppercase text-white leading-none">{p.name}</h1>
                                    <div className="flex items-center gap-2 mt-2">
                                        <span className="text-[9px] font-black bg-white/20 text-white px-2 py-0.5 rounded uppercase">{p.pos || 'Atleta'}</span>
                                        {isHighlight && <span className="text-[9px] font-black bg-yellow-500 text-slate-900 px-2 py-0.5 rounded shadow-lg"><Icon name="trophy" size={10}/> DESTAQUE</span>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scroll pb-28">
                        
                        {/* ABA TREINO */}
                        {tab === 'workout' && (
                            <div className="space-y-4 animate-fade-in">
                                {/* ABA DE RECADO IGUAL À IMAGEM */}
                                <div className="bg-slate-900/80 border border-slate-800 p-4 rounded-[24px]">
                                    <div className="flex items-center gap-2 mb-2 text-blue-500">
                                        <Icon name="bell" size={16}/><span className="text-[10px] font-black uppercase">Recado do Professor</span>
                                    </div>
                                    <p className="text-sm font-bold text-white mb-3 leading-tight">{data.coachMsg || "Foco no objetivo!"}</p>
                                    {!agendaAck && (
                                        <button onClick={ackAgenda} className="w-full bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold py-2.5 rounded-xl transition-colors flex items-center justify-center gap-1">
                                            <Icon name="check" size={14}/> CLIQUE AQUI PARA CONFIRMAR LEITURA
                                        </button>
                                    )}
                                    {agendaAck && <div className="text-[9px] font-bold text-green-500 text-center uppercase tracking-widest"><Icon name="check" size={10} className="inline mr-1"/> Leitura Confirmada</div>}
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-3xl text-center shadow-inner">
                                        <Icon name="ball" className="text-yellow-500 mb-1 mx-auto" size={20}/>
                                        <span className="text-[10px] font-bold text-slate-500 uppercase">Gols</span>
                                        <span className="text-3xl font-black text-white block">{(p.stats && p.stats.g) || 0}</span>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-3xl text-center shadow-inner">
                                        <Icon name="target" className="text-blue-500 mb-1 mx-auto" size={20}/>
                                        <span className="text-[10px] font-bold text-slate-500 uppercase">Assists</span>
                                        <span className="text-3xl font-black text-white block">{(p.stats && p.stats.a) || 0}</span>
                                    </div>
                                </div>

                                {data.exercises.map(ex => renderExerciseCard(ex, "text-blue-400", "activity", "border-slate-700"))}

                                {!isFinished && (
                                    <button onClick={()=>setRpeMod(true)} className="w-full bg-green-500 text-white font-black py-4 rounded-2xl shadow-xl flex items-center justify-center gap-2 text-lg active:scale-95 transition-transform uppercase tracking-widest">
                                        <Icon name="check"/> FINALIZAR TREINO
                                    </button>
                                )}
                            </div>
                        )}

                        {/* ABA AGENDA: CONVOCAÇÃO PELO DESTAQUE COM LOGÍSTICA */}
                        {tab === 'agenda' && (
                            <div className="animate-fade-in space-y-6">
                                {p.highlight ? (
                                    <div className="bg-slate-900/80 border-2 border-blue-500 p-5 rounded-[32px] shadow-lg relative overflow-hidden">
                                        <div className="absolute top-0 right-0 bg-blue-500 text-white px-4 py-1 rounded-bl-2xl font-black text-[10px] uppercase shadow-md">Status</div>
                                        <h3 className="text-sm font-black text-white uppercase mb-4 flex items-center gap-2"><Icon name="trophy" size={16} className="text-yellow-500"/> CONVOCAÇÃO OFICIAL</h3>
                                        <div className="flex items-center gap-4 bg-blue-500/10 p-4 rounded-2xl border border-blue-500/30 mb-4">
                                            <div className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center font-black text-white text-xl shadow-lg border-2 border-blue-400 shrink-0">{p.number || "!"}</div>
                                            <div>
                                                <div className="text-[14px] font-black text-white uppercase tracking-tight italic">VOCÊ ESTÁ RELACIONADO!</div>
                                                <div className="text-[10px] font-bold text-blue-400 uppercase mt-0.5 leading-tight">Prepare seu equipamento e foque no objetivo.</div>
                                            </div>
                                        </div>
                                        <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800">
                                            <span className="text-[8px] font-black text-blue-500 uppercase block mb-2 tracking-[0.2em]">Logística e Programação</span>
                                            <p className="text-xs text-white leading-relaxed whitespace-pre-line font-medium italic">
                                                {data.coachMsg || "Aguardando informações da comissão técnica."}
                                            </p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-slate-900/50 border border-slate-800 p-8 rounded-[32px] text-center"><p className="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Aguardando lista de relacionados...</p></div>
                                )}
                                <div className="bg-slate-900/50 border border-slate-800 p-5 rounded-[32px]">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="calendar" size={16} className="text-emerald-500"/> Programação Semanal</h3>
                                    <div className="space-y-2.5">
                                        {safeArray(data.days).map((day, i) => (
                                            <div key={i} className="flex items-center justify-between bg-slate-950/80 p-4 rounded-2xl border border-slate-800">
                                                <div className="flex flex-col"><span className="text-[8px] font-black text-slate-500 uppercase">{day.name}</span><span className="text-[11px] font-black text-white uppercase">{day.md}</span></div>
                                                <div className="flex gap-1">
                                                    {safeArray(day.am).map((ev, idx) => <span key={idx} className="bg-blue-600 text-white text-[8px] font-black px-2.5 py-1 rounded-lg uppercase shadow-sm">{ev.type}</span>)}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* OUTRAS ABAS ORIGINAIS FUNCIONANDO */}
                        {tab === 'stats' && (
                            <div className="animate-fade-in space-y-4">
                                <h2 className="text-xl font-black text-white uppercase text-center mb-1">Seus Números</h2>
                                <div className="space-y-2">
                                    {getHistory().map((h, i) => (
                                        <div key={i} className="bg-slate-900 border border-slate-700 rounded-lg p-3 flex justify-between items-center">
                                            <span className="text-[10px] font-bold text-slate-400 uppercase">{formatDateBR(h.date)}</span>
                                            <div className="flex-1 mx-4 h-1.5 bg-slate-800 rounded-full overflow-hidden"><div className="h-full bg-blue-500" style={{width: `${h.bat}%`}}></div></div>
                                            <span className="text-[10px] font-black text-white">{h.hasW ? h.bat+'%' : '-'}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'profile' && (
                            <div className="animate-fade-in flex flex-col items-center">
                                <div className="w-full bg-slate-900 rounded-[40px] p-6 border border-slate-800 mt-4">
                                    <h3 className="text-center text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Atributos de Performance</h3>
                                    <RadarChart stats={getPlayerSkills(idx)} />
                                </div>
                                <button onClick={shareToInsta} className="mt-6 w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white font-black py-4 rounded-2xl flex items-center justify-center gap-2"><Icon name="share" size={20}/> COMPARTILHAR STATUS</button>
                            </div>
                        )}
                    </div>

                    {/* MODAL PSE */}
                    {rpeMod && (
                        <div className="absolute inset-0 bg-slate-950/90 z-[500] flex items-center justify-center p-6 animate-fade-in">
                            <div className="bg-slate-800 rounded-[32px] border border-slate-700 w-full max-w-sm p-6 shadow-2xl relative">
                                <button onClick={()=>setRpeMod(false)} className="absolute top-4 right-4 text-slate-400"><Icon name="x" size={20}/></button>
                                <h2 className="text-xl font-black text-white uppercase text-center mb-6">Nível de Esforço</h2>
                                <div className="w-full mb-6">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase flex justify-between mb-2"><span>PSE (Escala 0-10)</span><span className="text-blue-400 font-black text-sm">{rpe}/10</span></label>
                                    <input type="range" min="0" max="10" value={rpe} onChange={e=>setRpe(parseInt(e.target.value))} className="hooper-slider"/>
                                </div>
                                <div className="w-full mb-6 text-center"><label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Duração (Mins)</label><input type="number" value={dur} onChange={e=>setDur(parseInt(e.target.value))} className="w-full bg-slate-900 border border-slate-600 text-white text-center font-black text-3xl py-3 rounded-xl outline-none"/></div>
                                <button onClick={saveRPE} className="w-full bg-green-500 text-white font-black py-4 rounded-2xl shadow-xl">SALVAR E FINALIZAR</button>
                            </div>
                        </div>
                    )}

                    {/* MENU INFERIOR */}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900/90 backdrop-blur-2xl border-t border-slate-800 p-4 flex justify-around items-center z-50 rounded-t-3xl shadow-[0_-5px_15px_rgba(0,0,0,0.5)]">
                         <div onClick={()=>setTab('workout')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='workout'?'text-blue-500':'text-slate-500'}`}><Icon name="play" size={24}/><span className="text-[8px] font-black uppercase mt-1">Treino</span></div>
                         <div onClick={()=>setTab('agenda')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='agenda'?'text-blue-500':'text-slate-500'}`}><Icon name="calendar" size={24}/><span className="text-[8px] font-black uppercase mt-1">Agenda</span></div>
                         <div onClick={()=>setTab('stats')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='stats'?'text-blue-500':'text-slate-500'}`}><Icon name="activity" size={24}/><span className="text-[8px] font-black uppercase mt-1">Histórico</span></div>
                         <div onClick={()=>setTab('profile')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='profile'?'text-blue-500':'text-slate-500'}`}><Icon name="target" size={24}/><span className="text-[8px] font-black uppercase mt-1">Perfil FIFA</span></div>
                    </div>

                    {/* SHARE CARD OCULTO */}
                    <div id="share-card" className="fixed z-[-1]" style={{left: '-9999px', top: '-9999px', width: '400px', backgroundColor: '#0f172a'}}>
                        <div className="p-8 border-4 border-slate-800 rounded-[40px] flex flex-col items-center relative overflow-hidden" style={{backgroundColor: '#0f172a'}}>
                            <div className="absolute top-0 left-0 w-full h-40 opacity-40" style={{background: `linear-gradient(to bottom, ${data.color}, transparent)`}}></div>
                            <div className="w-32 h-32 rounded-full border-4 overflow-hidden bg-slate-800 shadow-2xl mb-4 z-10 relative" style={{borderColor: data.color}}>{p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" size={60} className="m-10 text-white/20"/>}</div>
                            <h2 className="text-3xl font-black uppercase text-white mb-1 z-10 text-center leading-tight">{p.name}</h2>
                            <div className="text-[10px] font-black text-slate-600 tracking-widest uppercase z-10 mt-8">POWERED BY PROCOACH MAX</div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
