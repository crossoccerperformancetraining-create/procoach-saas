<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 8px; border-radius: 4px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #ffffff; cursor: pointer; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const Icon = ({ name, size=24, className="" }) => {
            const icons = {
                play: '<polygon points="5 3 19 12 5 21 5 3"/>',
                calendar: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
                trophy: '<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6m12 5h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-2.34M12 2v10.5"/>',
                activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
                target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
                user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>'
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{__html: icons[name]}} />;
        };

        const AthletePortal = () => {
            const [data, setData] = useState(null);
            const [idx, setIdx] = useState(null);
            const [tab, setTab] = useState('workout');
            const [step, setStep] = useState(1);
            const [showProfile, setShowProfile] = useState(false);
            const [showStats, setShowStats] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id');
                const pIdx = params.get('p');
                if(!uId) return;
                
                return db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        setData({ ...doc.data(), id: doc.id });
                        if(pIdx !== null) { setIdx(parseInt(pIdx)); setStep(3); }
                    }
                });
            }, []);

            if(!data) return <div className="h-screen flex items-center justify-center text-white">Carregando...</div>;

            if(step === 1) {
                return (
                    <div className="p-6 h-screen flex flex-col items-center justify-center bg-slate-950">
                        <h1 className="text-3xl font-black italic mb-8 text-white uppercase tracking-tighter">Portal do Atleta</h1>
                        <div className="grid grid-cols-3 gap-6 w-full max-w-md">
                            {(data.players || []).map((p, i) => (
                                <div key={i} onClick={()=>{setIdx(i); setStep(3);}} className="flex flex-col items-center gap-2 cursor-pointer">
                                    <div className="w-16 h-16 rounded-full border-2 border-slate-800 overflow-hidden bg-slate-900 shadow-lg">
                                        {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" className="m-4 text-slate-700"/>}
                                    </div>
                                    <span className="text-[10px] font-bold uppercase text-slate-400 text-center">{p.name.split(' ')[0]}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            const p = data.players[idx] || {};

            return (
                <div className="h-full flex flex-col relative">
                    {/* HEADER */}
                    <div className="p-6 pb-8 shrink-0 rounded-b-[40px] shadow-2xl" style={{ background: `linear-gradient(135deg, ${data.themeColor || '#1e3a8a'}, #020617)` }}>
                        <div className="flex items-center gap-4">
                            <div className="w-16 h-16 rounded-full border-4 border-white/20 overflow-hidden shadow-xl bg-slate-900">
                                {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" className="m-3 text-white/20"/>}
                            </div>
                            <div>
                                <h1 className="text-xl font-black uppercase text-white leading-tight">{p.name}</h1>
                                <div className="text-[10px] font-bold text-white/60 uppercase tracking-widest">{p.position || 'Atleta'} | Nº {p.number || '--'}</div>
                            </div>
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <div className="flex-1 overflow-y-auto p-5 space-y-6 custom-scroll pb-32">
                        
                        {/* TREINOS */}
                        {tab === 'workout' && (
                            <div className="animate-fade-in space-y-4">
                                <h3 className="text-xs font-black text-slate-500 uppercase tracking-widest">Sessão de Treino</h3>
                                {(data.exercises || []).map((ex, i) => (
                                    <div key={i} className="bg-slate-900 border border-slate-800 p-4 rounded-3xl flex items-center gap-4">
                                        <div className="w-14 h-14 bg-slate-800 rounded-2xl overflow-hidden shrink-0 flex items-center justify-center">
                                            {ex.gifUrl ? <img src={ex.gifUrl} className="w-full h-full object-cover"/> : <Icon name="play" className="text-slate-600"/>}
                                        </div>
                                        <div className="flex-1">
                                            <div className="font-black text-white text-[12px] uppercase">{ex.title}</div>
                                            <div className="text-[10px] font-bold text-slate-500 mt-1">{ex.sets}x {ex.reps} | {ex.rest}s Desc.</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* AGENDA (CONVOCAÇÃO E MICROCICLO) */}
                        {tab === 'agenda' && (
                            <div className="animate-fade-in space-y-6">
                                {/* CARD CONVOCAÇÃO */}
                                <div className="bg-slate-900/80 border-2 border-blue-500 p-5 rounded-[32px] shadow-lg relative overflow-hidden">
                                    <div className="absolute top-0 right-0 bg-blue-500 text-white px-4 py-1 rounded-bl-2xl font-black text-[10px] uppercase">Status</div>
                                    <h3 className="text-sm font-black text-white uppercase mb-4 flex items-center gap-2"><Icon name="trophy" size={16} className="text-yellow-500"/> CONVOCAÇÃO</h3>
                                    <div className="flex items-center gap-4 bg-blue-500/10 p-4 rounded-2xl border border-blue-500/30">
                                        <div className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center font-black text-white text-xl shadow-lg border-2 border-blue-400 shrink-0">{p.number || "!"}</div>
                                        <div>
                                            <div className="text-[12px] font-black text-white uppercase tracking-tight">VOCÊ ESTÁ CONVOCADO!</div>
                                            <div className="text-[10px] font-bold text-blue-400 uppercase italic mt-0.5">Apresentação: 08:30h no CT</div>
                                        </div>
                                    </div>
                                </div>

                                {/* MICROCICLO SEMANAL */}
                                <div className="bg-slate-900/50 border border-slate-800 p-5 rounded-[32px] shadow-inner">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="calendar" size={16} className="text-emerald-500"/> Programação Semanal</h3>
                                    <div className="space-y-2.5">
                                        {(data.days || []).map((day, i) => (
                                            <div key={i} className="flex items-center justify-between bg-slate-950/80 p-4 rounded-2xl border border-slate-800">
                                                <div className="flex flex-col">
                                                    <span className="text-[8px] font-black text-slate-500 uppercase">{day.name}</span>
                                                    <span className="text-[11px] font-black text-white uppercase">{day.md}</span>
                                                </div>
                                                <div className="flex flex-col gap-1 items-end">
                                                    {(day.am || []).map((ev, idx) => <span key={idx} className={`${ev.colorClass || 'bg-blue-600'} text-white text-[8px] font-black px-2.5 py-1 rounded-lg uppercase`}>{ev.type}</span>)}
                                                    {(day.pm || []).map((ev, idx) => <span key={idx} className={`${ev.colorClass || 'bg-slate-700'} text-white text-[8px] font-black px-2.5 py-1 rounded-lg uppercase`}>{ev.type}</span>)}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* RANKING */}
                        {tab === 'ranking' && (
                            <div className="animate-fade-in space-y-4">
                                <h3 className="text-xs font-black text-slate-500 uppercase tracking-widest">Ranking da Equipa</h3>
                                {(data.players || []).sort((a,b) => (b.overall || 0) - (a.overall || 0)).map((player, i) => (
                                    <div key={i} className={`p-4 rounded-3xl flex items-center gap-4 border ${player.name === p.name ? 'bg-blue-600/20 border-blue-500' : 'bg-slate-900 border-slate-800'}`}>
                                        <span className="text-lg font-black text-slate-500 w-6">#{i+1}</span>
                                        <div className="w-10 h-10 rounded-full bg-slate-800 overflow-hidden">
                                            {player.image && <img src={player.image} className="w-full h-full object-cover"/>}
                                        </div>
                                        <div className="flex-1">
                                            <div className="text-[12px] font-black text-white uppercase">{player.name}</div>
                                            <div className="text-[10px] font-bold text-slate-500 uppercase">{player.position}</div>
                                        </div>
                                        <div className="text-lg font-black text-blue-400 italic">{player.overall || '--'}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* MENU INFERIOR NAVEGAÇÃO */}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900/95 backdrop-blur-xl border-t border-slate-800 p-4 pb-6 flex justify-around items-center z-50 rounded-t-[32px]">
                        <div onClick={()=>setTab('workout')} className={`flex flex-col items-center gap-1 transition-all ${tab==='workout'?'text-blue-500 scale-110':'text-slate-500'}`}>
                            <Icon name="play" size={24}/>
                            <span className="text-[8px] font-black uppercase">Treino</span>
                        </div>
                        <div onClick={()=>setTab('agenda')} className={`flex flex-col items-center gap-1 transition-all ${tab==='agenda'?'text-blue-500 scale-110':'text-slate-500'}`}>
                            <Icon name="calendar" size={24}/>
                            <span className="text-[8px] font-black uppercase">Agenda</span>
                        </div>
                        <div onClick={()=>setShowStats(true)} className="flex flex-col items-center gap-1 text-slate-500">
                            <Icon name="activity" size={24}/>
                            <span className="text-[8px] font-black uppercase">Stats</span>
                        </div>
                        <div onClick={()=>setTab('ranking')} className={`flex flex-col items-center gap-1 transition-all ${tab==='ranking'?'text-yellow-500 scale-110':'text-slate-500'}`}>
                            <Icon name="trophy" size={24}/>
                            <span className="text-[8px] font-black uppercase">Rank</span>
                        </div>
                        <div onClick={()=>setShowProfile(true)} className="flex flex-col items-center gap-1 text-slate-500">
                            <Icon name="target" size={24}/>
                            <span className="text-[8px] font-black uppercase">Perfil</span>
                        </div>
                    </div>

                    {/* MODAL PLACEHOLDERS PARA FUNÇÕES EXISTENTES */}
                    {showProfile && (
                        <div className="fixed inset-0 z-[100] bg-slate-950 p-6 overflow-y-auto animate-fade-in">
                            <button onClick={()=>setShowProfile(false)} className="mb-6 text-slate-500 font-bold uppercase text-xs">← Voltar</button>
                            <h2 className="text-3xl font-black text-white italic uppercase mb-8 text-center">Perfil Atleta</h2>
                            <div className="bg-slate-900 border border-slate-800 p-8 rounded-[40px] flex flex-col items-center text-center">
                                <div className="w-32 h-32 rounded-full border-4 border-blue-500 overflow-hidden mb-4 shadow-[0_0_30px_rgba(59,130,246,0.5)]">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" className="m-8 text-slate-700"/>}
                                </div>
                                <h3 className="text-2xl font-black text-white uppercase leading-tight">{p.name}</h3>
                                <p className="text-blue-500 font-black italic mb-6">OVERALL: {p.overall || '--'}</p>
                                <div className="grid grid-cols-2 gap-4 w-full">
                                    {Object.entries(p.stats || {PAC:0, SHO:0, PAS:0, DRI:0, DEF:0, PHY:0}).map(([k,v]) => (
                                        <div key={k} className="bg-slate-950 p-3 rounded-2xl border border-slate-800">
                                            <div className="text-[10px] font-black text-slate-500">{k}</div>
                                            <div className="text-lg font-black text-white italic">{v}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {showStats && (
                        <div className="fixed inset-0 z-[100] bg-slate-950 p-6 overflow-y-auto animate-fade-in flex flex-col items-center justify-center">
                            <Icon name="activity" size={60} className="text-blue-500 mb-4 opacity-20"/>
                            <h2 className="text-xl font-black text-white uppercase italic">Estatísticas em breve</h2>
                            <button onClick={()=>setShowStats(false)} className="mt-8 bg-slate-800 text-white px-8 py-3 rounded-full font-black text-xs uppercase">Fechar</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
