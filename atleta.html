<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .animate-fade-in { animation: fadeIn 0.4s; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-track { background: transparent; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .gold-glow { box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); border: 2px solid #eab308; }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950 text-slate-100">
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-3 rounded-full shadow-2xl z-[200] text-xs font-bold transition-opacity duration-300 pointer-events-none flex items-center gap-2" style="opacity:0;"></div>
    <div id="root" class="h-full w-full flex flex-col"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        
        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const showToast = (msg, icon="✅") => { const t = document.getElementById('toast'); if(t){ t.innerHTML = `<span>${icon}</span> ${msg}`; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); } };
        const safeArray = (arr) => (Array.isArray(arr)) ? arr : [];
        const safeObj = (obj) => (obj && typeof obj === 'object') ? obj : {};

        const Icon = ({ name, size=24, className="", onClick }) => {
            const p = { 
                user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
                check: '<polyline points="20 6 9 17 4 12"/>',
                alert: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
                trophy: '<path d="M8 21h8m-4-9v9"/><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/><path d="M7 2v16"/><path d="M17 2v16"/>',
                ball: '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>',
                target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
                x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
                play: '<polygon points="5 3 19 12 5 21 5 3"/>',
                clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
                share: '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>',
                plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>'
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} onClick={onClick} dangerouslySetInnerHTML={{__html: p[name]}} />;
        };

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], color:'#1e3a8a', id:null, coachMsg:'', videoUrl:'' });
            const [idx, setIdx] = useState(null);
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(true);
            const [water, setWater] = useState(0);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id');
                const pIdx = params.get('p');
                
                const unsubscribe = db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ 
                            players: d.players||[], 
                            log: d.trainingLog||{}, 
                            ex: d.exercises||[], 
                            color: d.themeColor||'#1e3a8a', 
                            id: doc.id,
                            coachMsg: d.coachMsg||'',
                            videoUrl: d.videoUrl||''
                        });
                        if(pIdx !== null) setIdx(parseInt(pIdx));
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            if(loading) return <div className="h-screen flex items-center justify-center bg-slate-950 text-blue-500 font-bold animate-pulse">Carregando Módulo Atleta...</div>;

            // TELA DE SELEÇÃO DE JOGADOR
            if(idx === null) return (
                <div className="p-6 h-screen flex flex-col items-center justify-center animate-fade-in">
                    <h1 className="text-3xl font-black italic mb-8"><span style={{color:data.color}}>PRO</span>COACH</h1>
                    <div className="grid grid-cols-3 gap-4 w-full max-w-md">
                        {data.players.map((p, i) => (
                            <div key={i} onClick={()=>setIdx(i)} className="flex flex-col items-center gap-2 cursor-pointer">
                                <div className="w-20 h-20 rounded-full border-2 border-slate-800 overflow-hidden bg-slate-900">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" className="m-5 text-slate-600"/>}
                                </div>
                                <span className="text-[10px] font-bold uppercase truncate w-full text-center">{p.name.split(' ')[0]}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const p = data.players[idx];
            const isSuspended = p.suspended === true;
            const stats = safeObj(p.stats);

            return (
                <div className="flex-1 flex flex-col h-full relative overflow-hidden">
                    
                    {/* CABEÇALHO DO ATLETA */}
                    <div className="p-6 shrink-0 rounded-b-3xl shadow-2xl relative overflow-hidden" style={{ background: isSuspended ? 'linear-gradient(to bottom, #7f1d1d, #020617)' : `linear-gradient(to bottom, ${data.color}, #020617)` }}>
                        <div className="flex items-center gap-4 mt-2">
                            <div className={`w-20 h-20 rounded-full border-4 border-white/20 overflow-hidden bg-slate-800 shadow-xl ${p.isPotw ? 'gold-glow' : ''}`}>
                                {p.image ? <img src={p.image} className="w-full h-full object-cover object-top"/> : <Icon name="user" size={40} className="m-5 text-white/30"/>}
                            </div>
                            <div className="flex-1">
                                <h1 className="text-2xl font-black uppercase text-white leading-none">{p.name}</h1>
                                <div className="flex items-center gap-2 mt-2">
                                    <span className="text-[10px] font-black bg-white/20 text-white px-2 py-0.5 rounded uppercase">{p.pos || 'Atleta'}</span>
                                    {p.isPotw && <span className="text-[10px] font-black bg-yellow-500 text-slate-900 px-2 py-0.5 rounded flex items-center gap-1 shadow-lg"><Icon name="trophy" size={10}/> DESTAQUE</span>}
                                </div>
                            </div>
                        </div>

                        {/* ALERTA DE SUSPENSÃO */}
                        {isSuspended && (
                            <div className="mt-4 bg-red-600 text-white p-3 rounded-xl flex items-center gap-3 animate-pulse border-2 border-red-400">
                                <Icon name="alert" size={24}/>
                                <div>
                                    <div className="text-xs font-black uppercase">Você está Suspenso!</div>
                                    <div className="text-[10px] font-bold opacity-90">Inapto para o próximo compromisso oficial.</div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* CONTEÚDO SCROLL */}
                    <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scroll pb-24">
                        
                        {/* CARD DE ESTATÍSTICAS PESSOAIS */}
                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-slate-900/50 border border-slate-800 p-4 rounded-2xl flex flex-col items-center">
                                <Icon name="ball" className="text-yellow-500 mb-1" size={20}/>
                                <span className="text-[10px] font-bold text-slate-500 uppercase">Gols na Temporada</span>
                                <span className="text-3xl font-black text-white">{stats.g || 0}</span>
                            </div>
                            <div className="bg-slate-900/50 border border-slate-800 p-4 rounded-2xl flex flex-col items-center">
                                <Icon name="target" className="text-blue-500 mb-1" size={20}/>
                                <span className="text-[10px] font-bold text-slate-500 uppercase">Assistências</span>
                                <span className="text-3xl font-black text-white">{stats.a || 0}</span>
                            </div>
                        </div>

                        {/* AGENDA E VÍDEO TÁTICO */}
                        {data.coachMsg && (
                            <div className="bg-blue-900/20 border border-blue-500/30 p-4 rounded-2xl">
                                <div className="flex items-center gap-2 mb-2 text-blue-400">
                                    <Icon name="clock" size={18}/>
                                    <span className="text-[10px] font-black uppercase">Recado do Professor</span>
                                </div>
                                <p className="text-sm font-bold text-white leading-relaxed">{data.coachMsg}</p>
                            </div>
                        )}

                        {data.videoUrl && (
                            <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-lg">
                                <div className="p-3 border-b border-slate-800 flex items-center gap-2">
                                    <Icon name="play" size={16} className="text-red-500"/>
                                    <span className="text-[10px] font-black uppercase text-slate-300">Análise de Vídeo Obrigatória</span>
                                </div>
                                <div className="aspect-video bg-black">
                                    <iframe src={data.videoUrl.replace("watch?v=", "embed/")} className="w-full h-full" frameBorder="0" allowFullScreen></iframe>
                                </div>
                            </div>
                        )}

                        {/* HIDRATAÇÃO INTERATIVA */}
                        <div className="bg-blue-950/30 border border-blue-800/50 p-5 rounded-3xl relative overflow-hidden">
                            <div className="flex justify-between items-end mb-3">
                                <div>
                                    <h3 className="text-xs font-black text-blue-400 uppercase tracking-widest">Controle de Água</h3>
                                    <div className="text-2xl font-black text-white">{water.toFixed(2)}L <span className="text-xs text-slate-500">/ 3.0L</span></div>
                                </div>
                                <button onClick={()=>{setWater(prev=>prev+0.25); showToast("+250ml", "💧");}} className="bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-full shadow-lg active:scale-90 transition-transform">
                                    <Icon name="plus" size={20}/>
                                </button>
                            </div>
                            <div className="w-full h-2.5 bg-slate-800 rounded-full overflow-hidden">
                                <div className="h-full bg-blue-500 transition-all duration-500 shadow-[0_0_10px_rgba(59,130,246,0.5)]" style={{width: `${Math.min(100, (water/3)*100)}%`}}></div>
                            </div>
                        </div>

                        {/* EXERCÍCIOS DO DIA */}
                        <div className="pt-2">
                            <h3 className="text-xs font-black text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                                <div className="w-1 h-4 bg-blue-500 rounded-full"></div> Treinamento Individual
                            </h3>
                            <div className="space-y-3">
                                {data.ex.length > 0 ? data.ex.map((ex, i) => (
                                    <div key={i} className="bg-slate-900/80 border border-slate-800 p-4 rounded-2xl flex items-center gap-4 hover:border-slate-600 transition-colors">
                                        <div className="w-16 h-16 bg-slate-800 rounded-xl overflow-hidden shrink-0 border border-slate-700">
                                            {ex.gifUrl ? <img src={ex.gifUrl} className="w-full h-full object-cover"/> : <Icon name="play" className="m-5 text-slate-700"/>}
                                        </div>
                                        <div className="flex-1">
                                            <div className="text-sm font-black text-white uppercase">{ex.title}</div>
                                            <div className="text-[10px] font-bold text-blue-400 mt-1 uppercase">{ex.sets}x{ex.reps} | {ex.rest}s Descanso</div>
                                        </div>
                                        <Icon name="check" className="text-slate-700 hover:text-green-500 cursor-pointer"/>
                                    </div>
                                )) : <div className="text-center py-10 text-slate-600 text-xs font-bold uppercase border-2 border-dashed border-slate-800 rounded-3xl">Nenhuma ficha enviada hoje.</div>}
                            </div>
                        </div>
                    </div>

                    {/* BARRA DE NAVEGAÇÃO INFERIOR */}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900/90 backdrop-blur-xl border-t border-slate-800 p-4 flex justify-around items-center z-50">
                         <div className="flex flex-col items-center text-blue-500"><Icon name="play" size={24}/><span className="text-[8px] font-bold uppercase mt-1">Treino</span></div>
                         <div className="flex flex-col items-center text-slate-500" onClick={()=>setShowToast("Em breve!", "⏳")}><Icon name="trophy" size={24}/><span className="text-[8px] font-bold uppercase mt-1">Ranking</span></div>
                         <div className="flex flex-col items-center text-slate-500" onClick={()=>setIdx(null)}><Icon name="user" size={24}/><span className="text-[8px] font-bold uppercase mt-1">Trocar</span></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
