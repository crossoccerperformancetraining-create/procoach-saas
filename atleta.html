<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #334155; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 10px rgba(0,0,0,0.5); border: 2px solid #334155; }
        .animate-fade-in { animation: fadeIn 0.4s; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-track { background: transparent; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .gold-shine { background: linear-gradient(90deg, #eab308, #fef08a, #eab308); background-size: 200% auto; animation: shine 3s linear infinite; color: #422006; } @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col font-sans bg-slate-950">
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-3 rounded-full shadow-2xl z-[100] text-xs font-bold transition-opacity duration-300 pointer-events-none flex items-center gap-2" style="opacity:0;"></div>
    <div id="root" class="h-full w-full flex flex-col"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        
        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const getGreeting = () => { const hour = new Date().getHours(); return hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite'; };
        const showToast = (msg, icon="✅") => { const t = document.getElementById('toast'); if(t){ t.innerHTML = `<span>${icon}</span> ${msg}`; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); } };
        const safeArray = (arr) => (Array.isArray(arr) && arr.length > 0) ? arr : []; const safeObj = (obj) => (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
        const formatDateBR = (ds) => { if(!ds) return '-'; const [y, m, d] = ds.split('-'); return `${d}/${m}`; };
        const getDatesInRange = (start, days) => { const dates=[]; const end=new Date(start); end.setMinutes(end.getMinutes()-end.getTimezoneOffset()); for(let i=0;i<days;i++){const d=new Date(end); d.setDate(end.getDate()-i); dates.push(d.toISOString().split('T')[0]);} return dates; };
        const vibrate = (pattern) => { if ("vibrate" in navigator) { try { navigator.vibrate(pattern); } catch (e) {} } };

        const smartShare = async (blob, filename, title) => {
            const file = new File([blob], filename, { type: blob.type });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try { await navigator.share({ files: [file], title: title }); return; } catch (err) {}
            }
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        };

        const Icon = ({ name, size=24, className="", onClick }) => {
            const p = { user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>', check: '<polyline points="20 6 9 17 4 12"/>', x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>', send: '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>', alert: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>', activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>', medkit: '<rect x="2" y="6" width="20" height="14" rx="2"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>', image: '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>', play: '<polygon points="5 3 19 12 5 21 5 3"/>', clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>', trophy: '<path d="M8 21h8m-4-9v9"/><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/><path d="M7 2v16"/><path d="M17 2v16"/>', refresh: '<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 0 20.49 15"/>', barChart: '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>', brain: '<path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>', message: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>', arrowDown: '<polyline points="6 9 12 15 18 9"/>', arrowUp: '<polyline points="18 15 12 9 6 15"/>', bell: '<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>', share: '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>', fastForward: '<polygon points="13 19 22 12 13 5 13 19"/><polygon points="2 19 11 12 2 5 2 19"/>' };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill={name==='play'||name==='trophy'?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} onClick={onClick} dangerouslySetInnerHTML={{__html: p[name]}} />;
        };

        const getHydrationAdvice = (rpeVal, durVal) => { const r = Number(rpeVal)||5; const d = Number(durVal)||60; return (((d / 60) * (0.5 + (r * 0.1))) + 0.3).toFixed(1); };

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], act:[], dm:[], ass:{}, matchM:{}, postW:'IA', nextG:{opponent:'',date:''}, coachMsg:'', potw:null, color:'#1e3a8a', id:null, videoUrl:'' });
            const [step, setStep] = useState(1); const [idx, setIdx] = useState(null); const [isPriv, setIsPriv] = useState(false);
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1}); const [pain, setPain] = useState([]);
            const [tp, setTp] = useState(''); const [ts, setTs] = useState('');
            const [loading, setLoading] = useState(true); const [submitting, setSubmitting] = useState(false);
            
            // Controle de Treino
            const [gif, setGif] = useState(null); 
            const [completed, setCompleted] = useState([]);
            const [skippedExs, setSkippedExs] = useState({}); // { id: 'Motivo' }
            const [exLoads, setExLoads] = useState({}); // { id: '40' }
            const [skipModal, setSkipModal] = useState(null); // id do exercicio
            
            // Modais Finais
            const [rpeMod, setRpeMod] = useState(false); 
            const [rpe, setRpe] = useState(5); 
            const [dur, setDur] = useState(60);
            const [feedbackMsg, setFeedbackMsg] = useState("");
            const [showStats, setShowStats] = useState(false);
            const [expandedDay, setExpandedDay] = useState(null); 
            const [viewMode, setViewMode] = useState('finished'); // 'finished' ou 'review'
            
            // Agenda Ciente
            const [agendaAck, setAgendaAck] = useState(false);
            
            // Cronômetro
            const [restTimer, setRestTimer] = useState(null);
            const audioCtxRef = useRef(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search); const uId = params.get('id'); const pIdx = params.get('p');
                const proc = (d, id) => {
                    setData({ players: d.players||[], log: d.trainingLog||{}, ex: d.exercises||[], act: d.activationExercises||[], dm: d.dmRecords||[], ass: d.assessments||{}, matchM: d.matchMinutes||{}, postW: d.postWorkout||'IA', nextG: d.nextGame||{}, coachMsg: d.coachMsg||d.coachMessage||'', potw: d.playerOfTheWeek, color: d.themeColor||'#1e3a8a', id, videoUrl: d.videoUrl||'' });
                    if(pIdx !== null && d.players?.[parseInt(pIdx)]) {
                        setIsPriv(true); setIdx(parseInt(pIdx));
                        if(d.trainingLog?.[getTodayStr()]?.[parseInt(pIdx)]?.wellness?.sleep) setStep(3); else setStep(2);
                        if(d.trainingLog?.[getTodayStr()]?.[parseInt(pIdx)]?.agendaAck) setAgendaAck(true);
                    }
                    setLoading(false);
                };
                let unsubscribe = () => {};
                if(uId) { unsubscribe = db.collection('coachData').doc(uId).onSnapshot(doc => { if (doc.exists) proc(doc.data(), doc.id); else setLoading(false); }, err => { console.error(err); setLoading(false); }); } 
                else { db.collection('coachData').limit(1).get().then(snap => !snap.empty ? proc(snap.docs[0].data(), snap.docs[0].id) : setLoading(false)); }
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                let interval = null;
                if (restTimer !== null && restTimer > 0) { interval = setInterval(() => { setRestTimer(prev => prev - 1); }, 1000); } 
                else if (restTimer === 0) { playBeep(); vibrate([300, 150, 300, 150, 500]); setRestTimer(null); }
                return () => clearInterval(interval);
            }, [restTimer]);

            const initAudio = () => {
                if(!audioCtxRef.current) { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); audioCtxRef.current = ctx; } catch(e){} }
                if(audioCtxRef.current && audioCtxRef.current.state === 'suspended') { audioCtxRef.current.resume(); }
                try { const osc = audioCtxRef.current.createOscillator(); const gain = audioCtxRef.current.createGain(); gain.gain.value = 0; osc.connect(gain); gain.connect(audioCtxRef.current.destination); osc.start(); osc.stop(audioCtxRef.current.currentTime + 0.1); } catch(e) {}
            };

            const playBeep = () => {
                try {
                    const ctx = audioCtxRef.current; if(!ctx) return;
                    const osc = ctx.createOscillator(); const gain = ctx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
                    gain.gain.setValueAtTime(1, ctx.currentTime); osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                    setTimeout(() => { const osc2 = ctx.createOscillator(); const gain2 = ctx.createGain(); osc2.type = 'sine'; osc2.frequency.setValueAtTime(880, ctx.currentTime); gain2.gain.setValueAtTime(1, ctx.currentTime); osc2.connect(gain2); gain2.connect(ctx.destination); osc2.start(); osc2.stop(ctx.currentTime + 0.3); }, 400);
                } catch(e) {}
            };

            const selectP = (i) => { setIdx(i); initAudio(); if(data.log[getTodayStr()]?.[i]?.wellness?.sleep) { setStep(3); if(data.log[getTodayStr()]?.[i]?.agendaAck) setAgendaAck(true); } else { setScores({sleep:1,stress:1,fatigue:1,soreness:1,mood:1}); setPain([]); setStep(2); } };
            const addP = () => { if(tp) { const z = ts ? `${tp} ${ts}` : tp; if(!pain.includes(z)) setPain([...pain, z]); setTp(''); setTs(''); } };
            
            const subData = () => {
                setSubmitting(true); const td = getTodayStr(); const nl = {...data.log}; if(!nl[td]) nl[td]={}; if(!nl[td][idx]) nl[td][idx]={};
                nl[td][idx] = {...nl[td][idx], wellness: scores, painZones: pain};
                db.collection('coachData').doc(data.id).set({trainingLog: nl}, {merge:true}).then(()=>{setData({...data, log:nl}); setStep(3); setSubmitting(false); showToast("Prontidão enviada!"); window.scrollTo(0,0);});
            };

            const ackAgenda = () => {
                const td = getTodayStr();
                db.collection('coachData').doc(data.id).update({ [`trainingLog.${td}.${idx}.agendaAck`]: true }).then(()=>{
                    setAgendaAck(true); showToast("Compromisso Confirmado!");
                }).catch(()=>{ alert("Erro ao confirmar."); });
            };

            const handleSkip = (reason) => {
                setSkippedExs({...skippedExs, [skipModal]: reason});
                setCompleted(completed.filter(x => x !== skipModal)); // Remove from completed if skipped
                setSkipModal(null);
                showToast(`Série pulada: ${reason}`, '⚠️');
            };

            const saveRPE = () => {
                if(submitting) return; setSubmitting(true); const td = getTodayStr();
                const allExs = [...data.act, ...data.ex];
                const doneExsNames = completed.map(id => { const x = allExs.find(e => e.id === id); return x ? `${x.title} ${exLoads[id] ? `(${exLoads[id]}kg)` : ''}` : null; }).filter(Boolean);
                const skippedInfo = Object.entries(skippedExs).map(([id, reason]) => { const x = allExs.find(e => e.id === parseInt(id)); return x ? `${x.title} (Motivo: ${reason})` : null; }).filter(Boolean);

                db.collection('coachData').doc(data.id).update({
                    [`trainingLog.${td}.${idx}.rpe_am`]: rpe, 
                    [`trainingLog.${td}.${idx}.duration`]: dur,
                    [`trainingLog.${td}.${idx}.feedback`]: feedbackMsg,
                    [`trainingLog.${td}.${idx}.exercisesDone`]: doneExsNames,
                    [`trainingLog.${td}.${idx}.exercisesSkipped`]: skippedInfo,
                    [`trainingLog.${td}.${idx}.rpeSubmitted`]: true
                }).then(()=>{
                    setSubmitting(false); setRpeMod(false); showToast("Treino Concluído! 🚀", "🔥"); 
                    if(typeof confetti !== 'undefined') confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, zIndex: 9999 });
                    vibrate([100, 50, 100]);
                    const nl = {...data.log}; if(!nl[td]) nl[td]={}; if(!nl[td][idx]) nl[td][idx]={};
                    nl[td][idx].rpe_am = rpe; nl[td][idx].duration = dur; nl[td][idx].rpeSubmitted = true; nl[td][idx].exercisesDone = doneExsNames; nl[td][idx].exercisesSkipped = skippedInfo;
                    setData({...data, log:nl}); window.scrollTo(0,0);
                }).catch(()=>{ setSubmitting(false); alert("Erro de conexão."); });
            };

            const shareToInsta = async () => {
                const el = document.getElementById('share-card');
                if(!el) return;
                showToast("Gerando Imagem...", "⏳");
                try {
                    el.style.display = 'flex';
                    const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#0f172a' });
                    el.style.display = 'none';
                    canvas.toBlob(blob => { smartShare(blob, 'meutreino.png', 'Treino Concluído'); });
                } catch(e) { el.style.display = 'none'; showToast("Erro ao compartilhar."); }
            };

            const getDM = (id) => { const act = safeArray(data.dm).filter(r=>r&&r.playerId==id&&r.status==='Active'); if(act.length>0) return (parseInt(act[0].rtpPhase)||1)>=3 ? 'TRANSIÇÃO' : 'DM'; const rec = safeArray(data.dm).filter(r=>r&&r.playerId==id&&r.status==='Recovered'&&r.dateOut); const td = new Date(getTodayStr()); for(let r of rec) if(!isNaN(new Date(r.dateOut).getTime()) && Math.ceil(Math.abs(td - new Date(r.dateOut))/(1000*60*60*24))<=7) return 'TRANSIÇÃO'; return 'APTO'; };
            const calcBat = (w) => { if(!w || !w.sleep) return { p: 0, c: 'text-slate-500', f: 'bg-slate-500' }; const s = (w.sleep||0)+(w.stress||0)+(w.fatigue||0)+(w.soreness||0)+(w.mood||0); const p = Math.max(0, Math.min(100, Math.round(100 - (((s - 5) / 30) * 100)))); return { p, c: p<40?'text-red-500':p<75?'text-yellow-500':'text-green-500', f: p<40?'bg-red-500':p<75?'bg-yellow-500':'bg-green-500' }; };

            const getPlayerStats = () => {
                let wCompleted = 0; let sleepSum = 0; let sleepCount = 0; let totalMins = 0; let currentStreak = 0;
                Object.keys(data.log).forEach(dateStr => { const l = data.log[dateStr]?.[idx]; if(l?.rpeSubmitted) wCompleted++; if(l?.wellness?.sleep) { sleepSum += l.wellness.sleep; sleepCount++; } });
                if(data.matchM) { Object.keys(data.matchM).forEach(d => { totalMins += (Number(data.matchM[d]?.[idx]) || 0); }); }
                let sleepAvgRaw = sleepCount > 0 ? (sleepSum / sleepCount) : 0; let sleepQuality = "Sem dados"; if(sleepAvgRaw > 0) { if(sleepAvgRaw <= 2.5) sleepQuality = "Excelente 🟢"; else if(sleepAvgRaw <= 4.5) sleepQuality = "Boa 🟡"; else sleepQuality = "Ruim 🔴"; }
                let checkDate = new Date(); checkDate.setMinutes(checkDate.getMinutes() - checkDate.getTimezoneOffset());
                for(let i=0; i<30; i++) { const dStr = checkDate.toISOString().split('T')[0]; if(data.log[dStr]?.[idx]?.wellness?.sleep) currentStreak++; else if(i !== 0) break; checkDate.setDate(checkDate.getDate() - 1); }
                return { workouts: wCompleted, mins: totalMins, sleepQ: sleepQuality, streak: currentStreak };
            };

            const getHistory = () => { const pastDays = getDatesInRange(getTodayStr(), 5); return pastDays.map(d => { const l = data.log[d]?.[idx] || {}; const w = safeObj(l.wellness); return { date: d, hasW: !!w.sleep, bat: calcBat(w).p, rpe: l.rpe_am, dur: l.duration, rpeSub: l.rpeSubmitted, exs: l.exercisesDone || [], skips: l.exercisesSkipped || [] }; }); };
            const getRpeEmoji = (val) => { if(val <= 3) return '😌'; if(val <= 6) return '😅'; if(val <= 8) return '🥵'; return '💀'; };
            const getNutritionAdvice = (rpeVal) => { if(rpeVal >= 8) return { t: "Desgaste Extremo Detectado!", d: "Reponha carboidratos rápidos (ex: fruta, suco) e beba muita água nas próximas 2h para restaurar o glicogênio.", ic: "🍎" }; if(rpeVal >= 5) return { t: "Treino Intenso e Proveitoso", d: "Priorize uma refeição com boas proteínas e carboidratos nas próximas horas para reconstruir a fibra muscular.", ic: "🍗" }; return { t: "Treino Moderado/Regenerativo", d: "Esforço bem controlado. Mantenha sua hidratação e alimentação equilibrada de costume.", ic: "🥗" }; };

            if(loading) return <div className="h-full flex items-center justify-center text-blue-500 animate-pulse"><div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>;

            if(step===1) return (
                <div className="h-full flex flex-col p-4 animate-fade-in overflow-y-auto custom-scroll">
                    <div className="text-center mt-6 mb-8"><h1 className="text-3xl font-black text-white italic flex justify-center items-center"><span style={{color:data.color}}>PRO</span>COACH</h1><h2 className="text-xl font-bold mt-6 text-slate-100">{getGreeting()}! Quem é você?</h2></div>
                    <div className="grid grid-cols-3 sm:grid-cols-4 gap-4 pb-10">{data.players.map((p,i)=><div key={i} onClick={()=>selectP(i)} className="flex flex-col items-center gap-2 cursor-pointer active:scale-95"><div className="w-20 h-20 rounded-full border-2 border-slate-700 bg-slate-800 overflow-hidden relative">{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="user" size={32} className="m-5 text-slate-500"/>}{data.log[getTodayStr()]?.[i]?.wellness?.sleep && <div className="absolute bottom-1 right-1 w-4 h-4 bg-green-500 rounded-full border-2 border-slate-800"></div>}</div><span className="text-xs font-bold text-slate-300 truncate w-full text-center">{p.name}</span></div>)}</div>
                </div>
            );

            if(step===2) {
                const p = data.players[idx];
                return (
                    <div className="h-full flex flex-col animate-fade-in relative bg-slate-900 pb-20">
                        <div className="bg-slate-800 p-4 border-b border-slate-700 flex items-center gap-4 shadow-lg shrink-0">{!isPriv && <button onClick={()=>setStep(1)} className="text-white bg-slate-700 p-2 rounded-full"><Icon name="x" size={20}/></button>}<div className="w-14 h-14 rounded-full bg-slate-700 overflow-hidden shrink-0 border-2" style={{borderColor:data.color}}>{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="user"/>}</div><div><div className="text-[10px] font-bold uppercase" style={{color:data.color}}>Prontidão Diária</div><h2 className="text-lg font-black text-white">{getGreeting()}, {p.name.split(' ')[0]}!</h2></div></div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-6 custom-scroll">

                                        <span className="text-xl">💧</span>
                                        <div><div className="text-xs font-bold text-blue-400 mb-1">Alvo de Hidratação IA</div><div className="text-[10px] text-slate-300">{getHydrationAdvice(data.log[getTodayStr()]?.[idx]?.rpe_am, data.log[getTodayStr()]?.[idx]?.duration)}</div></div>

                                    <div className="w-full flex gap-2">
                                        <button onClick={()=>setViewMode('review')} className="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-lg text-[10px] uppercase border border-slate-700"><Icon name="activity" size={14} className="inline mr-1"/> Revisar Ficha</button>
                                        <button onClick={shareToInsta} className="flex-1 bg-gradient-to-r from-purple-500 to-pink-500 hover:opacity-90 text-white font-bold py-3 rounded-lg text-[10px] uppercase shadow-lg"><Icon name="share" size={14} className="inline mr-1"/> Compartilhar</button>

                                    )}

                                    {!inj && safeArray(data.act).length>0 && (
                                        <div className="bg-orange-900/20 border border-orange-800 p-4 rounded-xl relative overflow-hidden">
                                            <div className="absolute top-0 right-0 w-2 h-full bg-orange-500"></div>
                                            <h3 className="text-xs font-black text-orange-500 uppercase flex items-center gap-2 mb-3"><Icon name="fire" size={14}/> Ativação Pré-Treino</h3>
                                            {safeArray(data.act).map(ex => renderExerciseCard(ex, "text-orange-400", "fire"))}
                                        </div>
                                    )}
                                    
                                    {!inj && prevExs.length>0 && (
                                        <div className="bg-yellow-900/20 border border-yellow-800 p-4 rounded-xl relative overflow-hidden">
                                            <div className="absolute top-0 right-0 w-2 h-full bg-yellow-500"></div>
                                            <h3 className="text-xs font-black text-yellow-500 uppercase flex items-center gap-2 mb-3"><Icon name="alert" size={14}/> {trans ? 'Manutenção Preventiva' : 'Prevenção Específica'}</h3>
                                            {prevExs.map(ex => renderExerciseCard(ex, "text-yellow-400", "alert"))}

                                    {!inj && Object.keys(blocks).length === 0 && genExs.length === 0 && (

                                    )}

                                    {!inj && Object.keys(blocks).map(blockName => (
                                        <div key={blockName} className="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden mb-4">
                                            <div className="bg-slate-700/50 p-3 border-b border-slate-700 flex items-center gap-2">

                                        </div>

                                </>

                            {inj && !isFinished && <div className="bg-red-900/20 p-6 rounded-xl border border-red-800 text-center"><Icon name="medkit" size={30} className="mx-auto text-red-500 mb-2"/><h3 className="text-red-500 font-bold uppercase">Fisioterapia</h3><p className="text-slate-400 text-xs mt-2">Tratamento e reavaliação clínica obrigatória.</p></div>}
                            
                            <div className="bg-blue-900/20 border border-blue-800 p-4 rounded-xl flex flex-col gap-2"><div className="flex items-center gap-4"><div className="bg-blue-600 p-2 rounded-full shadow-lg shadow-blue-500/50 animate-pulse"><Icon name="bolt" size={20} className="text-white"/></div><div className="flex-1"><h3 className="font-bold text-xs text-blue-400 uppercase">Ação Pós-Treino</h3><p className="text-[10px] text-slate-300 mt-1">Sugerido: <strong>{pw}</strong>.</p></div></div>{ai && <div className="mt-2 bg-blue-950/50 border border-blue-500/30 rounded p-2 text-[10px] text-blue-300 flex items-start gap-2"><Icon name="brain" size={14} className="shrink-0 text-blue-400"/><span className="font-bold">{ai}</span></div>}</div>

                                        <div className="w-20 h-20 bg-blue-500/20 text-blue-500 rounded-full flex items-center justify-center mb-4 shadow-lg shadow-blue-500/20"><Icon name="activity" size={40}/></div>
                                        <h2 className="text-2xl font-black text-white uppercase text-center mb-1">Seus Números</h2>
                                        <p className="text-[10px] text-slate-400 text-center mb-8 uppercase tracking-wider">Acompanhamento Pessoal</p>
                                        
                                        <div className="w-full space-y-3 mb-8">
                                            <div className="bg-slate-900 border border-slate-700 p-4 rounded-xl flex justify-between items-center shadow-inner"><div className="flex items-center gap-2 text-slate-300"><Icon name="clock" size={16} className="text-blue-400"/><span className="text-xs font-bold uppercase">Minutos Jogados</span></div><span className="text-lg font-black text-white">{stats.mins}</span></div>
                                            <div className="bg-slate-900 border border-slate-700 p-4 rounded-xl flex justify-between items-center shadow-inner"><div className="flex items-center gap-2 text-slate-300"><Icon name="check" size={16} className="text-green-400"/><span className="text-xs font-bold uppercase">Treinos Realizados</span></div><span className="text-lg font-black text-white">{stats.workouts}</span></div>
                                        </div>

                                        <h3 className="w-full text-left text-xs font-black text-slate-400 uppercase tracking-widest mb-3 border-b border-slate-800 pb-2">Diário de Bordo (Toque para Expandir)</h3>
                                        <div className="w-full space-y-2 mb-8">
                                            {historyData.map((h, i) => (
                                                <div key={i} onClick={()=> h.hasW && h.rpeSub ? setExpandedDay(expandedDay === h.date ? null : h.date) : null} className={`bg-slate-900 border border-slate-700 rounded-lg overflow-hidden transition-all ${h.hasW && h.rpeSub ? 'cursor-pointer hover:border-slate-500' : ''}`}>
                                                    <div className="flex justify-between items-center p-3">
                                                        <span className="text-[10px] font-bold text-slate-400 uppercase flex items-center gap-1 w-16">{formatDateBR(h.date)} {expandedDay === h.date ? <Icon name="arrowUp" size={10}/> : <Icon name="arrowDown" size={10}/>}</span>
                                                        <div className="flex-1 ml-2 flex flex-col gap-1.5">
                                                            {h.hasW ? (
                                                                <>
                                                                    <div className="flex items-center gap-2"><span className="text-[8px] text-slate-500 font-bold w-6 text-right">BAT.</span><div className="flex-1 h-1.5 bg-slate-800 rounded-full overflow-hidden"><div className={`h-full ${h.bat<40?'bg-red-500':h.bat<75?'bg-yellow-500':'bg-green-500'}`} style={{width: `${h.bat}%`}}></div></div><span className={`text-[8px] font-black w-6 text-right ${h.bat<40?'text-red-500':h.bat<75?'text-yellow-500':'text-green-500'}`}>{h.bat}%</span></div>
                                                                    <div className="flex items-center gap-2"><span className="text-[8px] text-slate-500 font-bold w-6 text-right">CARGA</span><div className="flex-1 h-1.5 bg-slate-800 rounded-full overflow-hidden"><div className="h-full bg-blue-500 transition-all duration-500" style={{width: `${h.rpeSub ? Math.min(100, (h.rpe * h.dur)/800*100) : 0}%`}}></div></div><span className="text-[8px] font-black w-6 text-right text-blue-400">{h.rpeSub ? (h.rpe * h.dur) : '-'}</span></div>
                                                                </>
                                                            ) : <span className="text-[10px] text-slate-600 italic">Sem Registro</span>}
                                                        </div>
                                                    </div>
                                                    {expandedDay === h.date && (h.exs.length > 0 || h.skips?.length > 0) && (
                                                        <div className="bg-slate-950 p-3 border-t border-slate-800 animate-fade-in">
                                                            <div className="text-[9px] font-bold text-slate-500 uppercase mb-2">Relatório do Treino:</div>
                                                            <ul className="space-y-1.5">
                                                                {h.exs.map((exName, idxE) => <li key={`d-${idxE}`} className="text-[10px] font-bold text-slate-300 flex items-center gap-2"><Icon name="check" size={10} className="text-green-500 shrink-0"/> {exName}</li>)}
                                                                {h.skips?.map((exName, idxE) => <li key={`s-${idxE}`} className="text-[10px] font-bold text-slate-500 flex items-center gap-2"><Icon name="x" size={10} className="text-yellow-500 shrink-0"/> {exName}</li>)}
                                                            </ul>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}

                        {/* MODAL DE PULAR EXERCÍCIO */}
                        {skipModal && (
                            <div className="fixed inset-0 bg-slate-950/90 z-[160] flex items-center justify-center p-6 animate-fade-in">
                                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 w-full max-w-sm">
                                    <h3 className="font-bold text-white uppercase text-center mb-4">Motivo para pular?</h3>
                                    <div className="flex flex-col gap-2">
                                        <button onClick={()=>handleSkip('Aparelho Ocupado')} className="bg-slate-700 hover:bg-slate-600 text-white font-bold p-3 rounded-lg text-sm">🏋️ Aparelho Ocupado</button>
                                        <button onClick={()=>handleSkip('Senti Dor / Desconforto')} className="bg-red-900/40 border border-red-800 text-white font-bold p-3 rounded-lg text-sm">🤕 Senti Dor/Desconforto</button>
                                        <button onClick={()=>handleSkip('Fadiga / Cansaço Extremo')} className="bg-slate-700 hover:bg-slate-600 text-white font-bold p-3 rounded-lg text-sm">🥵 Fadiga Extrema</button>
                                        <button onClick={()=>setSkipModal(null)} className="mt-4 text-xs text-slate-400 font-bold underline p-2">Cancelar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* MODAL FINAL RPE */}
                        {rpeMod && (
                            <div className="absolute inset-0 bg-slate-950/90 backdrop-blur-md z-[100] flex flex-col items-center justify-center p-6 animate-fade-in font-sans">
                                <div className="bg-slate-800 rounded-3xl border border-slate-700 w-full max-w-sm p-6 shadow-2xl flex flex-col items-center relative">
                                    <button onClick={()=>setRpeMod(false)} className="absolute top-4 right-4 text-slate-400 hover:text-white"><Icon name="x" size={20}/></button>
                                    <div className="w-16 h-16 bg-blue-500/20 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-3"><Icon name="check" size={32}/></div>
                                    <h2 className="text-2xl font-black text-white uppercase text-center mb-2">Muito Bem!</h2>
                                    <p className="text-xs text-slate-400 text-center mb-6">Registre seu esforço para finalizar.</p>
                                    <div className="w-full mb-6">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase flex justify-between mb-2"><span>Nível de Esforço (PSE)</span><span className="text-blue-400 font-black text-sm">{rpe}/10 {getRpeEmoji(rpe)}</span></label>
                                        <input type="range" min="0" max="10" step="1" value={rpe} onChange={e=>setRpe(parseInt(e.target.value))} className="hooper-slider w-full h-3 mb-2" style={{background:'linear-gradient(to right,#3b82f6,#ef4444)'}}/>
                                        <div className="flex justify-between text-[9px] text-slate-500 font-bold uppercase mt-1"><span>Muito Leve</span><span>Exaustivo</span></div>
                                    </div>
                                    <div className="w-full mb-4">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Duração (Minutos)</label>
                                        <input type="number" min="0" value={dur} onChange={e=>setDur(parseInt(e.target.value))} className="w-full bg-slate-900 border border-slate-600 text-white text-center font-black text-2xl py-3 rounded-xl outline-none focus:border-blue-500 transition-colors"/>
                                    </div>
                                    <div className="w-full mb-6">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Recado ao Professor (Opcional)</label>
                                        <div className="flex flex-wrap gap-1.5 mb-2">
                                            {['🦵 Perna Pesada', '🔥 Treino Top', '💪 Me Senti Bem', '🥵 Muito Quente', '😴 Cansado'].map(tag => (
                                                <span key={tag} onClick={()=>setFeedbackMsg(feedbackMsg ? feedbackMsg + ' | ' + tag : tag)} className="bg-slate-700 hover:bg-blue-600 text-[9px] text-white px-2 py-1 rounded cursor-pointer border border-slate-600 transition-colors font-bold">{tag}</span>
                                            ))}
                                        </div>
                                        <textarea className="w-full bg-slate-900 border border-slate-600 text-white text-xs p-3 rounded-xl outline-none h-16 custom-scroll" placeholder="Digite mais detalhes aqui se precisar..." value={feedbackMsg} onChange={e=>setFeedbackMsg(e.target.value)}></textarea>
                                    </div>
                                    <button onClick={saveRPE} disabled={submitting} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 transition-transform active:scale-95">
                                        {submitting ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <><Icon name="send"/> ENVIAR E FINALIZAR</>}
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* MODO FOCO (GIF TELA CHEIA) */}
                        {gif && (
                            <div className="absolute inset-0 bg-slate-950 z-[120] flex flex-col animate-fade-in">
                                <div className="p-4 flex justify-end bg-transparent absolute top-0 w-full z-10"><button onClick={()=>setGif(null)} className="text-white bg-black/50 p-2 rounded-full backdrop-blur-sm"><Icon name="x"/></button></div>
                                <div className="flex-1 flex justify-center items-center bg-black relative">
                                    {gif.gifUrl?<img src={gif.gifUrl} className="w-full h-full object-cover opacity-80"/>:<Icon name="image" size={80} className="text-slate-700"/>}
                                    <div className="absolute bottom-0 left-0 w-full bg-gradient-to-t from-slate-950 via-slate-950/80 to-transparent p-6 pt-20">
                                        <h2 className="text-3xl font-black text-white uppercase mb-4 leading-tight">{gif.title}</h2>
                                        <div className="flex gap-4 mb-8">
                                            <div className="bg-slate-800/80 backdrop-blur-sm p-3 rounded-xl border border-slate-700 text-center flex-1"><span className="text-[10px] text-slate-400 uppercase font-bold">Séries</span><div className="text-2xl font-black text-blue-400">{gif.sets}</div></div>
                                            <div className="bg-slate-800/80 backdrop-blur-sm p-3 rounded-xl border border-slate-700 text-center flex-1"><span className="text-[10px] text-slate-400 uppercase font-bold">Reps</span><div className="text-2xl font-black text-green-400">{gif.reps}</div></div>
                                            {gif.rest && (<div className="bg-slate-800/80 backdrop-blur-sm p-3 rounded-xl border border-slate-700 text-center flex-1"><span className="text-[10px] text-slate-400 uppercase font-bold">Repouso</span><div className="text-2xl font-black text-yellow-400">{gif.rest}s</div></div>)}
                                        </div>
                                        <button onClick={() => startFocusRest(gif)} className="w-full bg-green-500 hover:bg-green-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-green-900/50 flex justify-center items-center gap-2 text-lg active:scale-95 transition-transform">
                                            <Icon name="check" size={24}/> CONCLUIR E DESCANSAR
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<AthletePortal />);
    </script>
</body>
</html>
