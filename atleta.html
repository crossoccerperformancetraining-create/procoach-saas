<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .animate-fade-in { animation: fadeIn 0.4s; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-track { background: transparent; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .gold-glow { box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); border: 2px solid #eab308; }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950 text-slate-100">
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-3 rounded-full shadow-2xl z-[300] text-xs font-bold transition-opacity duration-300 pointer-events-none flex items-center gap-2" style="opacity:0;"></div>
    <div id="root" class="h-full w-full flex flex-col"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        
        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const getGreeting = () => { const hour = new Date().getHours(); return hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite'; };
        const showToast = (msg, icon="✅") => { const t = document.getElementById('toast'); if(t){ t.innerHTML = `<span>${icon}</span> ${msg}`; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); } };
        const safeArray = (arr) => (Array.isArray(arr) && arr.length > 0) ? arr : [];
        const safeObj = (obj) => (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
        const formatDateBR = (ds) => { if(!ds) return '-'; const [y, m, d] = ds.split('-'); return `${d}/${m}`; };

        const Icon = ({ name, size=24, className="", onClick }) => {
            const p = { 
                user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>', check: '<polyline points="20 6 9 17 4 12"/>', x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>', bell: '<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>', trophy: '<path d="M8 21h8m-4-9v9"/><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/><path d="M7 2v16"/><path d="M17 2v16"/>', play: '<polygon points="5 3 19 12 5 21 5 3"/>', calendar: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>', activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>', target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>', ball: '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>'
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill={name==='play'||name==='trophy'||name==='fire'?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} onClick={onClick} dangerouslySetInnerHTML={{__html: p[name] || ''}} />;
        };

        const RadarChart = ({ stats, size = 150 }) => {
            const center = size / 2; const radius = (size / 2) * 0.7;
            const points = [ { label: 'FOR', val: stats.force || 50 }, { label: 'VEL', val: stats.speed || 50 }, { label: 'POT', val: stats.power || 50 }, { label: 'PRE', val: stats.prev || 50 }, { label: 'TEC', val: stats.tech || 50 }, { label: 'RES', val: stats.endurance || 50 } ];
            const polygonPoints = points.map((p, i) => { const angle = (Math.PI * 2 * i) / points.length - Math.PI / 2; const x = center + (radius * (p.val / 100)) * Math.cos(angle); const y = center + (radius * (p.val / 100)) * Math.sin(angle); return `${x},${y}`; }).join(' ');
            return (
                <div className="flex flex-col items-center">
                    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="overflow-visible">
                        {[0.25, 0.5, 0.75, 1].map(scale => ( <circle key={scale} cx={center} cy={center} r={radius * scale} fill="none" stroke="#334155" strokeWidth="1" strokeDasharray="2,2" /> ))}
                        <polygon points={polygonPoints} fill="rgba(59, 130, 246, 0.4)" stroke="#3b82f6" strokeWidth="2" />
                        {points.map((p, i) => { const angle = (Math.PI * 2 * i) / points.length - Math.PI / 2; const tx = center + (radius + 15) * Math.cos(angle); const ty = center + (radius + 15) * Math.sin(angle); return <text key={i} x={tx} y={ty} textAnchor="middle" fill="#94a3b8" fontSize="10" fontWeight="bold" className="uppercase">{p.label}</text> })}
                    </svg>
                </div>
            );
        };

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], coachMsg:'', color:'#1e3a8a', id:null, days: [], ass:{} });
            const [idx, setIdx] = useState(null);
            const [tab, setTab] = useState('workout');
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(true);
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1});
            const [agendaAck, setAgendaAck] = useState(false);
            const [water, setWater] = useState(0);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id');
                const unsubscribe = db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ ...d, id: doc.id, log: d.trainingLog || {}, players: d.players || [], ex: d.exercises || [], days: d.days || [] });
                        const pIdx = params.get('p');
                        if(pIdx !== null && d.players?.[pIdx]) {
                            setIdx(parseInt(pIdx));
                            if(d.trainingLog?.[getTodayStr()]?.[pIdx]?.wellness?.sleep) setStep(3); else setStep(2);
                            if(d.trainingLog?.[getTodayStr()]?.[pIdx]?.agendaAck) setAgendaAck(true);
                            setWater(Number(d.trainingLog?.[getTodayStr()]?.[pIdx]?.waterIntake) || 0);
                        }
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const sendWellness = async () => {
                const td = getTodayStr();
                const nl = { ...data.log }; if(!nl[td]) nl[td] = {}; if(!nl[td][idx]) nl[td][idx] = {};
                nl[td][idx] = { ...nl[td][idx], wellness: scores };
                await db.collection('coachData').doc(data.id).update({ trainingLog: nl });
                setStep(3);
            };

            const confirmRead = async () => {
                const td = getTodayStr();
                const path = `trainingLog.${td}.${idx}.agendaAck`;
                await db.collection('coachData').doc(data.id).update({ [path]: true });
                setAgendaAck(true);
                showToast("Leitura confirmada!");
            };

            if(loading) return <div className="h-screen bg-slate-950 flex items-center justify-center text-white">Sincronizando...</div>;

            if(step===1) return (
                <div className="p-6 h-screen flex flex-col items-center justify-center bg-slate-950 overflow-y-auto">
                    <h1 className="text-3xl font-black italic mb-8 text-white"><span style={{color:data.color}}>PRO</span>COACH</h1>
                    <div className="grid grid-cols-3 gap-6 w-full max-w-md">
                        {data.players.map((p, i) => (
                            <div key={i} onClick={() => { setIdx(i); setStep(2); }} className="flex flex-col items-center gap-2 cursor-pointer">
                                <div className={`w-16 h-16 rounded-full border-2 overflow-hidden bg-slate-900 ${p.highlight ? 'border-yellow-400 gold-glow' : 'border-slate-800'}`}>
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" size={32} className="m-4 text-slate-700"/>}
                                </div>
                                <span className="text-[10px] font-bold uppercase truncate w-full text-center">{p.name?.split(' ')[0]}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if(step===2) return (
                <div className="h-full flex flex-col bg-slate-950 p-6 animate-fade-in">
                    <h2 className="text-xl font-black uppercase text-white italic mb-8">Prontidão</h2>
                    <div className="flex-1 space-y-6">
                        {[{id:'sleep',l:'😴 Sono'},{id:'stress',l:'🤯 Estresse'},{id:'fatigue',l:'🔋 Energia'},{id:'soreness',l:'🦵 Dor'},{id:'mood',l:'🧠 Humor'}].map(m=>(
                            <div key={m.id} className="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                                <div className="flex justify-between mb-2 font-bold text-xs text-slate-400"><span>{m.l}</span><span className="text-white">{scores[m.id]}</span></div>
                                <input type="range" min="1" max="7" value={scores[m.id]} onChange={e=>setScores({...scores,[m.id]:parseInt(e.target.value)})} className="hooper-slider"/>
                            </div>
                        ))}
                    </div>
                    <button onClick={sendWellness} className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl mt-4">ENTRAR</button>
                </div>
            );

            const pActual = data.players[idx];
            const getPlayerSkills = () => ({ force: 80, speed: 75, power: 70, prev: 85, tech: 75, endurance: 80 });

            return (
                <div className="flex-1 flex flex-col h-full bg-slate-950">
                    <div className="p-6 bg-slate-900 border-b border-slate-800 flex items-center gap-4">
                        <div className={`w-14 h-14 rounded-full border-2 border-blue-500 overflow-hidden bg-slate-800 ${pActual.highlight ? 'gold-glow' : ''}`}>
                            {pActual.image ? <img src={pActual.image} className="w-full h-full object-cover"/> : <Icon name="user" className="m-3 text-slate-700"/>}
                        </div>
                        <div className="flex-1">
                            <h1 className="text-lg font-black uppercase text-white">{pActual.name}</h1>
                            <div className="flex items-center gap-2 mt-1">
                                <span className="text-[9px] font-black bg-blue-600 text-white px-2 py-0.5 rounded uppercase">{pActual.pos || 'Atleta'}</span>
                                {pActual.highlight && <span className="text-[9px] font-black bg-yellow-500 text-slate-900 px-2 py-0.5 rounded">DESTAQUE</span>}
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scroll pb-24">
                        {tab === 'workout' && (
                            <div className="animate-fade-in space-y-4">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-3xl text-center">
                                        <Icon name="ball" className="text-yellow-500 mb-1 mx-auto" size={20}/>
                                        <span className="text-2xl font-black text-white block">{pActual.stats?.g || 0}</span>
                                        <span className="text-[9px] font-bold text-slate-500 uppercase">Gols Temporada</span>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-3xl text-center">
                                        <Icon name="target" className="text-blue-500 mb-1 mx-auto" size={20}/>
                                        <span className="text-2xl font-black text-white block">{pActual.stats?.a || 0}</span>
                                        <span className="text-[9px] font-bold text-slate-500 uppercase">Assistências</span>
                                    </div>
                                </div>

                                {/* ABA DE RECADO (AJUSTADA CONFORME IMAGEM) */}
                                <div className="bg-slate-900/80 border border-slate-800 p-4 rounded-[24px]">
                                    <div className="flex items-center gap-2 mb-2 text-blue-500">
                                        <Icon name="bell" size={16}/><span className="text-[10px] font-black uppercase">Recado do Professor</span>
                                    </div>
                                    <p className="text-sm font-bold text-white mb-4 leading-tight">{data.coachMsg || "Nenhum recado no momento."}</p>
                                    {!agendaAck ? (
                                        <button onClick={confirmRead} className="w-full bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold py-3 rounded-xl flex items-center justify-center gap-1">
                                            <Icon name="check" size={14}/> CLIQUE AQUI PARA CONFIRMAR LEITURA
                                        </button>
                                    ) : (
                                        <div className="text-[9px] font-bold text-green-500 text-center uppercase tracking-widest py-2 bg-green-500/10 rounded-xl">✓ Leitura Confirmada</div>
                                    )}
                                </div>

                                {safeArray(data.ex).map((ex, i) => (
                                    <div key={i} className="bg-slate-900 border border-slate-800 p-4 rounded-3xl flex items-center gap-4">
                                        <div className="w-12 h-12 bg-slate-800 rounded-xl overflow-hidden shrink-0">{ex.gifUrl && <img src={ex.gifUrl} className="w-full h-full object-cover"/>}</div>
                                        <div className="flex-1">
                                            <div className="text-white font-bold text-sm uppercase">{ex.title}</div>
                                            <div className="text-[10px] text-slate-500 font-bold">{ex.sets}x{ex.reps}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'agenda' && (
                            <div className="animate-fade-in space-y-4">
                                {pActual.highlight ? (
                                    <div className="bg-slate-900 border-2 border-blue-500 p-5 rounded-[32px] shadow-lg relative overflow-hidden">
                                        <div className="absolute top-0 right-0 bg-blue-500 text-white px-4 py-1 rounded-bl-2xl font-black text-[10px] uppercase">STATUS</div>
                                        <h3 className="text-sm font-black text-white uppercase mb-4 flex items-center gap-2"><Icon name="trophy" size={16} className="text-yellow-500"/> CONVOCAÇÃO OFICIAL</h3>
                                        
                                        <div className="flex items-center gap-4 bg-blue-500/10 p-4 rounded-2xl border border-blue-500/30 mb-4">
                                            <div className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center font-black text-white text-xl shadow-lg border-2 border-blue-400 shrink-0">{pActual.number || "!"}</div>
                                            <div>
                                                <div className="text-[14px] font-black text-white uppercase tracking-tight italic">VOCÊ ESTÁ CONVOCADO!</div>
                                                <div className="text-[10px] font-bold text-blue-400 uppercase leading-tight italic">Confira a logística completa no recado.</div>
                                            </div>
                                        </div>

                                        <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800">
                                            <span className="text-[8px] font-black text-blue-500 uppercase block mb-2 tracking-[0.2em]">Logística Operacional</span>
                                            <p className="text-xs text-slate-200 leading-relaxed whitespace-pre-line font-medium italic">
                                                {data.coachMsg || "Aguardando informações da comissão técnica."}
                                            </p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-slate-900 border border-slate-800 p-10 rounded-[32px] text-center text-slate-500 uppercase text-[10px] font-black italic">Aguardando lista oficial...</div>
                                )}
                                <div className="bg-slate-900 border border-slate-800 p-5 rounded-[32px]">
                                    <h3 className="text-xs font-black text-slate-400 uppercase mb-4">Programação Semanal</h3>
                                    {safeArray(data.days).map((day, i) => (
                                        <div key={i} className="flex justify-between items-center bg-slate-950 p-3 rounded-xl mb-2 border border-slate-800">
                                            <div className="flex flex-col"><span className="text-[8px] font-black text-slate-500 uppercase">{day.name}</span><span className="text-[10px] font-black text-white">{day.md}</span></div>
                                            <div className="flex gap-1">{safeArray(day.am).map((ev, idx) => <span key={idx} className="bg-blue-600 text-white text-[8px] font-black px-2 py-0.5 rounded uppercase">{ev.type}</span>)}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'profile' && (
                            <div className="animate-fade-in flex flex-col items-center">
                                <div className="w-full bg-slate-900 rounded-[40px] p-6 border border-slate-800 mt-4">
                                    <h3 className="text-center text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Atributos de Performance</h3>
                                    <RadarChart stats={getPlayerSkills()} />
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="fixed bottom-0 left-0 w-full bg-slate-900/95 border-t border-slate-800 p-4 flex justify-around items-center z-50">
                         <div onClick={()=>setTab('workout')} className={`flex flex-col items-center ${tab==='workout'?'text-blue-500':'text-slate-500'}`}><Icon name="play" size={24}/><span className="text-[8px] font-black uppercase mt-1">Treino</span></div>
                         <div onClick={()=>setTab('agenda')} className={`flex flex-col items-center ${tab==='agenda'?'text-blue-500':'text-slate-500'}`}><Icon name="calendar" size={24}/><span className="text-[8px] font-black uppercase mt-1">Agenda</span></div>
                         <div onClick={()=>setTab('profile')} className={`flex flex-col items-center ${tab==='profile'?'text-blue-500':'text-slate-500'}`}><Icon name="target" size={24}/><span className="text-[8px] font-black uppercase mt-1">Perfil FIFA</span></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
