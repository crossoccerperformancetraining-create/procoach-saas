                                )}
                                <div className="bg-slate-900/50 border border-slate-800 p-5 rounded-[32px]">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="calendar" size={16} className="text-emerald-500"/> Programação Semanal</h3>
                                    <div className="space-y-2.5">
                                        {safeArray(data.days).map((day, i) => (
                                            <div key={i} className="flex items-center justify-between bg-slate-950/80 p-4 rounded-2xl border border-slate-800">
                                                <div className="flex flex-col"><span className="text-[8px] font-black text-slate-500 uppercase">{day.name}</span><span className="text-[11px] font-black text-white uppercase">{day.md}</span></div>
                                                <div className="flex flex-col gap-1 items-end">
                                                    {safeArray(day.am).map((ev, idx) => <span key={idx} className={`${ev.colorClass || 'bg-blue-600'} text-white text-[8px] font-black px-2.5 py-1 rounded-lg uppercase shadow-sm`}>{ev.type}</span>)}
                                                    {safeArray(day.pm).map((ev, idx) => <span key={idx} className={`${ev.colorClass || 'bg-slate-700'} text-white text-[8px] font-black px-2.5 py-1 rounded-lg uppercase shadow-sm`}>{ev.type}</span>)}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'ranking' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="bg-slate-900/50 border border-slate-800 p-6 rounded-[32px]">
                                    <div className="flex items-center gap-3 mb-6"><div className="bg-yellow-500/20 p-2 rounded-full"><Icon name="ball" size={20} className="text-yellow-500"/></div><h3 className="font-black text-lg uppercase text-white">Artilharia</h3></div>
                                    <div className="space-y-3">
                                        {ranking.artillery.map((player, i) => (
                                            <div key={i} className="flex items-center gap-3 border-b border-slate-800/50 pb-3">
                                                <span className={`text-xl font-black w-6 ${i===0?'text-yellow-500':i===1?'text-slate-400':i===2?'text-amber-700':'text-slate-700'}`}>{i+1}</span>
                                                <div className="w-10 h-10 rounded-full bg-slate-800 overflow-hidden border border-slate-700">{player.image && <img src={player.image} className="w-full h-full object-cover"/>}</div>
                                                <div className="flex-1 font-bold text-sm uppercase">{player.name}</div>
                                                <div className="bg-slate-800 px-3 py-1 rounded-full font-black text-yellow-500 text-xs">{player.goals} Gols</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="fixed bottom-0 left-0 w-full bg-slate-900/90 backdrop-blur-2xl border-t border-slate-800 p-4 flex justify-around items-center z-50 rounded-t-3xl">
                         <div onClick={()=>setTab('workout')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='workout'?'text-blue-500':'text-slate-500'}`}><Icon name="play" size={24}/><span className="text-[8px] font-black uppercase mt-1">Treino</span></div>
                         <div onClick={()=>setTab('agenda')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='agenda'?'text-blue-500':'text-slate-500'}`}><Icon name="calendar" size={24}/><span className="text-[8px] font-black uppercase mt-1">Agenda</span></div>
                         <div onClick={()=>setShowStats(true)} className="flex flex-col items-center text-slate-500 cursor-pointer"><Icon name="activity" size={24}/><span className="text-[8px] font-black uppercase mt-1">Histórico</span></div>
                         <div onClick={()=>setTab('ranking')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='ranking'?'text-yellow-500':'text-slate-500'}`}><Icon name="trophy" size={24}/><span className="text-[8px] font-black uppercase mt-1">Ranking</span></div>
                         <div onClick={()=>setShowProfile(true)} className="flex flex-col items-center text-slate-500 cursor-pointer"><Icon name="target" size={24}/><span className="text-[8px] font-black uppercase mt-1">Perfil FIFA</span></div>
                    </div>

                    {showProfile && (
                        <div className="fixed inset-0 bg-slate-950 z-[400] p-6 flex flex-col items-center animate-fade-in custom-scroll overflow-y-auto text-center">
                            <button onClick={()=>setShowProfile(false)} className="absolute top-6 right-6 text-white/50"><Icon name="x" size={32}/></button>
                            <div className="w-32 h-32 rounded-full border-4 border-blue-500 overflow-hidden bg-slate-800 shadow-2xl mb-4 mt-10 mx-auto">
                                {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" size={60} className="m-8 text-white/20"/>}
                            </div>
                            <h2 className="text-3xl font-black uppercase text-white mb-1">{p.name}</h2>
                            <p className="text-blue-400 font-black uppercase text-xs tracking-widest mb-4">{p.pos || 'Atleta'}</p>
                            <div className="w-full bg-slate-900 rounded-[40px] p-6 border border-slate-800 mb-6">
                                <h3 className="text-center text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Radar de Habilidades</h3>
                                <RadarChart stats={getPlayerSkills(idx)} />
                            </div>
                            <button onClick={()=>setShowProfile(false)} className="w-full bg-slate-800 text-white font-black py-4 rounded-2xl border border-slate-700">FECHAR PERFIL</button>
                        </div>
                    )}

                    {showStats && (
                        <div className="absolute inset-0 bg-slate-950/95 backdrop-blur-lg z-[110] flex flex-col items-center justify-start pt-12 p-6 animate-fade-in font-sans overflow-y-auto custom-scroll">
                            <button onClick={()=>setShowStats(false)} className="absolute top-4 right-6 text-slate-400"><Icon name="x" size={32}/></button>
                            <h2 className="text-2xl font-black text-white uppercase text-center mb-8">Seus Números</h2>
                            <div className="w-full space-y-3 mb-8">
                                <div className="bg-slate-900 border border-slate-700 p-4 rounded-xl flex justify-between items-center shadow-inner"><div className="flex items-center gap-2 text-slate-300"><Icon name="clock" size={16} className="text-blue-400"/><span className="text-xs font-bold uppercase">Minutos Jogados</span></div><span className="text-lg font-black text-white">{stats.mins}</span></div>
                                <div className="bg-slate-900 border border-slate-700 p-4 rounded-xl flex justify-between items-center shadow-inner"><div className="flex items-center gap-2 text-slate-300"><Icon name="check" size={16} className="text-green-400"/><span className="text-xs font-bold uppercase">Treinos Realizados</span></div><span className="text-lg font-black text-white">{stats.workouts}</span></div>
                            </div>
                            <div className="w-full space-y-2">
                                {getHistory().map((h, i) => (
                                    <div key={i} className="bg-slate-900 border border-slate-700 rounded-lg p-3 flex justify-between items-center">
                                        <span className="text-[10px] font-bold text-slate-400 uppercase w-16">{formatDateBR(h.date)}</span>
                                        <div className="flex-1 ml-2 h-1.5 bg-slate-800 rounded-full overflow-hidden"><div className={`h-full ${h.bat<40?'bg-red-500':h.bat<75?'bg-yellow-500':'bg-green-500'}`} style={{width: `${h.bat}%`}}></div></div>
                                        <span className={`text-[10px] font-black w-8 text-right ${h.bat<40?'text-red-500':h.bat<75?'text-yellow-500':'text-green-500'}`}>{h.hasW ? h.bat+'%' : '-'}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
