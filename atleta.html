<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #334155; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); border: 2px solid #334155; }
        .animate-fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col font-sans">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco",
            authDomain: "prosaude-e9130.firebaseapp.com",
            projectId: "prosaude-e9130",
            storageBucket: "prosaude-e9130.firebasestorage.app",
            messagingSenderId: "999318121562",
            appId: "1:999318121562:web:1f192d4c0f14a64fb57c63"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        
        // Saudação inteligente com base na hora
        const getGreeting = () => {
            const hour = new Date().getHours();
            if (hour < 12) return 'Bom dia';
            if (hour < 18) return 'Boa tarde';
            return 'Boa noite';
        };

        const BODY_PARTS = ["Cabeça", "Pescoço", "Ombro", "Peitoral", "Costas Sup.", "Lombar", "Abdômen", "Braço", "Quadril", "Adutor", "Quadríceps", "Posterior Coxa", "Joelho", "Panturrilha", "Tornozelo", "Pé"];
        const SIDES = [{id: '', label: 'Central/Ambos'}, {id: '(Dir)', label: 'Direito'}, {id: '(Esq)', label: 'Esquerdo'}];
        const safeArray = (arr, fallback=[]) => (Array.isArray(arr) && arr.length > 0) ? arr : fallback;
        const safeObj = (obj) => (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};

        const Icon = ({ name, size=24, className="", onClick }) => {
            const icons = {
                user: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>,
                x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
                send: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
                alert: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
                activity: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
                medkit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>,
                bolt: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
                image: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
                play: <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
                refresh: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 0 20.49 15"></path></svg>,
                brain: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>
            };
            return <span className={`cursor-pointer ${className}`} onClick={onClick}>{icons[name]}</span>;
        };

        const AthletePortal = () => {
            const [players, setPlayers] = useState([]);
            const [coachDocId, setCoachDocId] = useState(null);
            const [trainingLog, setTrainingLog] = useState({});
            const [themeColor, setThemeColor] = useState('#1e3a8a');
            const [exercises, setExercises] = useState([]);
            const [dmRecords, setDmRecords] = useState([]);
            const [assessments, setAssessments] = useState({}); // NOVO: Para puxar a anamnese
            const [postWorkout, setPostWorkout] = useState('Bota Pneumática (15 min)');
            
            const [step, setStep] = useState(1); 
            const [selectedIdx, setSelectedIdx] = useState(null);
            const [isPrivateLink, setIsPrivateLink] = useState(false);
            
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1});
            const [painZones, setPainZones] = useState([]);
            const [tempPart, setTempPart] = useState('');
            const [tempSide, setTempSide] = useState('');
            
            const [loading, setLoading] = useState(true);
            const [submitting, setSubmitting] = useState(false);
            const [expandedGif, setExpandedGif] = useState(null);
            
            // Gamificação: exercícios concluídos
            const [completedExs, setCompletedExs] = useState([]);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const urlId = urlParams.get('id');
                const playerIndex = urlParams.get('p'); 

                const processData = (data, docId) => {
                    setCoachDocId(docId);
                    setPlayers(data.players || []);
                    setTrainingLog(data.trainingLog || {});
                    setExercises(data.exercises || []);
                    setDmRecords(data.dmRecords || []);
                    setAssessments(data.assessments || {}); // Sincroniza avaliações médicas
                    if(data.themeColor) setThemeColor(data.themeColor);
                    if(data.postWorkout) setPostWorkout(data.postWorkout);

                    if (playerIndex !== null && data.players && data.players[playerIndex]) {
                        setIsPrivateLink(true);
                        const idx = parseInt(playerIndex);
                        setSelectedIdx(idx);
                        const todayLog = data.trainingLog?.[getTodayStr()]?.[idx]?.wellness;
                        
                        if(todayLog && todayLog.sleep) {
                            setStep(3); 
                        } else {
                            setStep(2); 
                        }
                    }
                };

                if (urlId) {
                    db.collection('coachData').doc(urlId).get().then(doc => {
                        if(doc.exists) processData(doc.data(), doc.id);
                        else alert("Treinador não encontrado.");
                        setLoading(false);
                    }).catch(e => { console.error(e); alert("Erro de conexão."); setLoading(false); });
                } else {
                    db.collection('coachData').limit(1).get().then(snap => {
                        if(!snap.empty) processData(snap.docs[0].data(), snap.docs[0].id);
                        else alert("Banco de dados não encontrado.");
                        setLoading(false);
                    }).catch(e => { console.error(e); setLoading(false); });
                }
            }, []);

            const selectPlayer = (idx) => {
                setSelectedIdx(idx);
                const existingLog = trainingLog[getTodayStr()]?.[idx]?.wellness;
                if(existingLog && existingLog.sleep) setStep(3);
                else { setScores({sleep:1, stress:1, fatigue:1, soreness:1, mood:1}); setPainZones([]); setStep(2); }
            };

            const addPain = () => {
                if(!tempPart) return;
                const zone = tempSide ? `${tempPart} ${tempSide}` : tempPart;
                if(!painZones.includes(zone)) setPainZones([...painZones, zone]);
                setTempPart(''); setTempSide('');
            };

            const removePain = (zone) => { setPainZones(painZones.filter(z => z !== zone)); };

            const submitData = () => {
                setSubmitting(true);
                const today = getTodayStr();
                const newLog = { ...trainingLog };
                if (!newLog[today]) newLog[today] = {};
                if (!newLog[today][selectedIdx]) newLog[today][selectedIdx] = {};
                
                newLog[today][selectedIdx].wellness = scores;
                newLog[today][selectedIdx].painZones = painZones;

                db.collection('coachData').doc(coachDocId).set({ trainingLog: newLog }, { merge: true })
                    .then(() => { setTrainingLog(newLog); setSubmitting(false); setStep(3); })
                    .catch(err => { setSubmitting(false); alert("Erro ao enviar. Verifique a internet."); });
            };

            const getPlayerDMStatus = (pId) => {
                const activeRecords = safeArray(dmRecords).filter(r => r && r.playerId == pId && r.status === 'Active');
                if (activeRecords.length > 0) {
                    const phase = parseInt(activeRecords[0].rtpPhase) || 1;
                    if (phase >= 3) return 'TRANSIÇÃO'; // Fases 3 até 8 são transição pro campo
                    return 'DM'; // Fases 1 e 2 = Só Fisioterapia
                }
                const todayDate = new Date(getTodayStr());
                const recoveredRecords = safeArray(dmRecords).filter(r => r && r.playerId == pId && r.status === 'Recovered' && r.dateOut);
                for(let r of recoveredRecords) {
                    const outDate = new Date(r.dateOut);
                    if(!isNaN(outDate.getTime()) && Math.ceil(Math.abs(todayDate - outDate) / (1000 * 60 * 60 * 24)) <= 7) {
                        return 'TRANSIÇÃO'; 
                    }
                }
                return 'APTO';
            };

            if (loading) return <div className="h-full flex flex-col items-center justify-center text-blue-500 animate-pulse"><div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div><p className="font-bold tracking-widest">Carregando...</p></div>;

            if (step === 1) {
                return (
                    <div className="h-full flex flex-col p-4 animate-fade-in custom-scroll overflow-y-auto">
                        <div className="text-center mt-6 mb-8 shrink-0">
                            <h1 className="text-3xl font-black text-white italic tracking-wider flex items-center justify-center gap-2"><span style={{color: themeColor}}>PRO</span>COACH <span className="text-[9px] not-italic bg-slate-800 text-white px-1.5 py-0.5 rounded border border-slate-700">V144 MAX</span></h1>
                            <p className="text-slate-400 text-sm mt-1 uppercase font-bold">Portal do Atleta</p>
                            <h2 className="text-xl font-bold mt-6 text-slate-100">{getGreeting()}! Quem é você?</h2>
                        </div>
                        <div className="flex-1 pb-10"><div className="grid grid-cols-3 sm:grid-cols-4 gap-4">
                            {players.map((p, i) => (
                                <div key={i} onClick={() => selectPlayer(i)} className="flex flex-col items-center gap-2 cursor-pointer group transform transition-transform active:scale-95">
                                    <div className="w-20 h-20 rounded-full border-2 border-slate-700 bg-slate-800 overflow-hidden shadow-lg group-hover:border-blue-500 transition-colors relative">
                                        {p.image ? <img src={p.image} className="w-full h-full object-cover object-top" /> : <div className="w-full h-full flex items-center justify-center text-slate-600"><Icon name="user" size={32}/></div>}
                                        {trainingLog[getTodayStr()]?.[i]?.wellness?.sleep && <div className="absolute bottom-1 right-1 w-4 h-4 bg-green-500 border-2 border-slate-800 rounded-full"></div>}
                                    </div>
                                    <span className="text-xs font-bold text-slate-300 text-center leading-tight truncate w-full px-1">{p.name}</span>
                                </div>
                            ))}
                        </div></div>
                    </div>
                );
            }

            if (step === 2) {
                const p = players[selectedIdx];
                return (
                    <div className="h-full flex flex-col animate-fade-in relative bg-slate-900">
                        <div className="bg-slate-800 p-4 border-b border-slate-700 flex items-center gap-4 shrink-0 shadow-lg z-10">
                            {!isPrivateLink && <button onClick={()=>setStep(1)} className="text-slate-400 hover:text-white p-2 bg-slate-700 rounded-full"><Icon name="x" size={20}/></button>}
                            <div className="w-14 h-14 rounded-full border-2 bg-slate-700 overflow-hidden shrink-0" style={{borderColor: themeColor}}>{p.image ? <img src={p.image} className="w-full h-full object-cover object-top" /> : <Icon name="user" className="m-3 text-slate-500"/>}</div>
                            <div><div className="text-[10px] font-bold uppercase tracking-wider" style={{color: themeColor}}>Passo 1: Prontidão</div><h2 className="text-lg font-black text-white leading-none truncate">{getGreeting()}, {p.name.split(' ')[0]}!</h2></div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-6 space-y-8 pb-28 custom-scroll">
                            {[{id:'sleep', label:'😴 Qualidade do Sono', desc:'1 = Excelente | 7 = Péssimo/Insônia', color:'#3b82f6'},{id:'stress', label:'🤯 Nível de Estresse', desc:'1 = Muito Relaxado | 7 = Muito Estressado', color:'#8b5cf6'},{id:'fatigue', label:'🔋 Nível de Cansaço', desc:'1 = Com Muita Energia | 7 = Exausto', color:'#10b981'},{id:'soreness', label:'🦵 Dor Muscular', desc:'1 = Nenhuma Dor | 7 = Muita Dor', color:'#f59e0b'},{id:'mood', label:'🧠 Humor / Disposição', desc:'1 = Muito Animado | 7 = Irritado/Desanimado', color:'#eab308'}].map(m => (
                                <div key={m.id} className="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 shadow-inner">
                                    <div className="flex justify-between items-end mb-2"><div><h3 className="font-bold text-slate-100 text-sm">{m.label}</h3><p className="text-[9px] text-slate-400 uppercase mt-0.5">{m.desc}</p></div><div className="text-xl font-black w-8 h-8 flex items-center justify-center rounded bg-slate-800 border border-slate-600 text-white shadow" style={{borderColor: m.color}}>{scores[m.id]}</div></div>
                                    <input type="range" min="1" max="7" step="1" value={scores[m.id]} onChange={(e)=>setScores({...scores, [m.id]: parseInt(e.target.value)})} className="hooper-slider mt-4" style={{background: `linear-gradient(to right, #22c55e, #eab308, #ef4444)`}} />
                                </div>
                            ))}

                            <div className="bg-slate-800/80 p-5 rounded-2xl border border-red-500/30 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-red-500"></div><h3 className="font-bold text-red-400 flex items-center gap-2 mb-1"><Icon name="alert" size={18}/> Mapeamento de Dores Focais</h3><p className="text-[10px] text-slate-400 uppercase mb-4">Adicione se houver alguma dor específica hoje.</p>
                                <div className="flex flex-col gap-3 mb-4">
                                    <div className="flex gap-2">
                                        <select className="flex-1 bg-slate-900 border border-slate-600 text-slate-200 text-sm p-3 rounded-xl outline-none" value={tempPart} onChange={e=>setTempPart(e.target.value)}><option value="">1. Qual local?</option>{BODY_PARTS.map(bp => <option key={bp} value={bp}>{bp}</option>)}</select>
                                        <select className="flex-1 bg-slate-900 border border-slate-600 text-slate-200 text-sm p-3 rounded-xl outline-none" value={tempSide} onChange={e=>setTempSide(e.target.value)}><option value="">2. Qual lado?</option>{SIDES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}</select>
                                    </div>
                                    <button onClick={addPain} disabled={!tempPart} className={`py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all ${tempPart ? 'bg-red-600 text-white' : 'bg-slate-700 text-slate-500'}`}>+ ADICIONAR DOR</button>
                                </div>
                                {painZones.length > 0 && (<div className="flex flex-wrap gap-2 pt-3 border-t border-slate-700">{painZones.map(z => (<div key={z} onClick={()=>removePain(z)} className="bg-red-900/40 border border-red-500/50 text-red-300 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2 cursor-pointer">{z} <Icon name="x" size={14}/></div>))}</div>)}
                            </div>
                        </div>

                        <div className="absolute bottom-0 left-0 w-full p-4 bg-slate-900/90 backdrop-blur-md border-t border-slate-800 z-20">
                            <button onClick={submitData} disabled={submitting} className="w-full text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-900/50 flex items-center justify-center gap-2 text-lg transition-transform active:scale-95" style={{backgroundColor: themeColor}}>
                                {submitting ? <div className="w-6 h-6 border-4 border-white border-t-transparent rounded-full animate-spin"></div> : <><Icon name="send"/> ENVIAR E VER TREINO</>}
                            </button>
                        </div>
                    </div>
                );
            }

            if (step === 3) {
                const p = players[selectedIdx];
                const dmStatus = getPlayerDMStatus(selectedIdx);
                const isInjured = dmStatus === 'DM'; // Fase 1 e 2
                const inTransition = dmStatus === 'TRANSIÇÃO'; // Fase 3+
                const headerBg = isInjured ? '#dc2626' : inTransition ? '#f97316' : themeColor;

                // Leitura da Anamnese para liberar os preventivos corretos
                const pAssessments = assessments[selectedIdx] || [];
                const latestAssessment = pAssessments.length > 0 ? pAssessments[0] : {};
                const anamnese = (latestAssessment.anamnese || '').toLowerCase();
                
                const hasLCA = anamnese.includes('lca');
                const hasPubalgia = anamnese.includes('pubalgia');
                const hasPosterior = anamnese.includes('posterior') || anamnese.includes('muscular');

                // Filtro 100% inteligente dos exercícios
                let prevExercises = [];
                let genExercises = [];

                if (isInjured) {
                    // Lesionado grave: não vê nenhum exercício físico
                } else if (inTransition) {
                    // Atleta no DM Fases 3+: Vê apenas Transição e Manutenção
                    genExercises = exercises.filter(ex => ex.target === 'Transição (Retorno DM)');
                    prevExercises = exercises.filter(ex => ex.target === 'Manutenção (Histórico Lesão)');
                } else {
                    // Atleta Apto (Ex: Jorginho): Vê treino Geral e as SUAS prevenções específicas
                    genExercises = exercises.filter(ex => ex.target === 'Geral');
                    prevExercises = exercises.filter(ex => {
                        if (ex.target === 'LCA' && hasLCA) return true;
                        if (ex.target === 'Pubalgia' && hasPubalgia) return true;
                        if (ex.target === 'Posterior' && hasPosterior) return true;
                        if (ex.target === 'Manutenção (Histórico Lesão)') return true; // Geral
                        return false;
                    });
                }

                // Cálculo da Barra de Progresso
                const totalExs = prevExercises.length + genExercises.length;
                const progressPct = totalExs > 0 ? Math.round((completedExs.length / totalExs) * 100) : 0;
                const toggleComplete = (id) => {
                    if(completedExs.includes(id)) setCompletedExs(completedExs.filter(x => x !== id));
                    else setCompletedExs([...completedExs, id]);
                };

                // Inteligência Artificial no Pós-Treino
                const todayLog = trainingLog[getTodayStr()]?.[selectedIdx]?.wellness || {};
                let finalPostWorkout = postWorkout;
                let aiAlert = "";
                
                if (postWorkout === 'IA') {
                    const fatigue = todayLog.fatigue || 1;
                    const soreness = todayLog.soreness || 1;
                    if (fatigue >= 5 || soreness >= 5) {
                        finalPostWorkout = 'Banheira de Gelo (Crio) + Massagem';
                        aiAlert = "A IA detectou fadiga alta. Foque na Crioterapia imediata.";
                    } else if (fatigue >= 3 || soreness >= 3) {
                        finalPostWorkout = 'Bota Pneumática (20 min)';
                        aiAlert = "A IA detectou cansaço moderado. Bota pneumática indicada.";
                    } else {
                        finalPostWorkout = 'Piscina / Soltura Aquática';
                    }
                } else {
                    // Se o treinador fixou um treino, a IA só alerta se o jogador estiver muito cansado
                    if (todayLog.fatigue >= 5 || todayLog.soreness >= 5) aiAlert = "⚠️ Alerta IA: Seu nível de fadiga está crítico. Dedique 10 min a mais na recuperação hoje.";
                    else if (todayLog.sleep >= 5) aiAlert = "⚠️ Alerta IA: Sono ruim relatado. Aumente a hidratação.";
                }

                return (
                    <div className="flex flex-col h-full bg-slate-950 overflow-hidden font-sans relative">
                        <div className="absolute top-4 right-4 flex gap-2 z-50">
                            <button onClick={()=>window.location.reload()} className="bg-white/20 hover:bg-white/40 p-2 rounded-full text-white backdrop-blur-md transition-colors"><Icon name="refresh" size={20}/></button>
                            {!isPrivateLink && <button onClick={()=>setStep(1)} className="bg-black/20 p-2 rounded-full text-white/50 hover:text-white backdrop-blur-md"><Icon name="x" size={20}/></button>}
                        </div>

                        <div className="p-6 rounded-b-3xl shadow-2xl shrink-0" style={{ background: `linear-gradient(to bottom, ${headerBg}, #020617)` }}>
                            <div className="flex items-center gap-4 mb-4 mt-4">
                                <div className="w-16 h-16 rounded-full border-2 border-white/50 overflow-hidden bg-slate-800 shadow-lg">{p?.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" size={30} className="m-4 text-white/50"/>}</div>
                                <div><h1 className="text-xl font-black uppercase text-white tracking-wider">{p?.name}</h1><span className="text-[10px] font-bold bg-white/20 text-white px-2 py-1 rounded backdrop-blur-sm">{isInjured?'DEPARTAMENTO MÉDICO':inTransition?'TRANSIÇÃO':'TREINO REGULAR'}</span></div>
                            </div>
                            
                            {!isInjured && totalExs > 0 && (
                                <div className="mt-4">
                                    <div className="flex justify-between text-[10px] font-bold uppercase mb-1 text-white/70"><span>Progresso do Treino</span><span>{progressPct}%</span></div>
                                    <div className="w-full h-1.5 bg-white/10 rounded-full overflow-hidden"><div className="h-full bg-green-400 transition-all duration-500" style={{width: `${progressPct}%`}}></div></div>
                                </div>
                            )}
                        </div>
                        
                        <div className="p-4 flex flex-col gap-4 flex-1 overflow-y-auto custom-scroll pb-10">
                            <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 flex items-center justify-between opacity-60 grayscale"><div className="flex items-center gap-3"><div className="bg-green-500/20 p-2 rounded-full text-green-500"><Icon name="check" size={20}/></div><div><h3 className="font-bold text-sm text-white">Wellness</h3><p className="text-[10px] text-slate-400">Respondido hoje</p></div></div></div>
                            
                            {!isInjured && prevExercises.length > 0 && (
                                <div className="bg-yellow-900/30 border border-yellow-700 p-4 rounded-xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-2 h-full bg-yellow-500"></div><h3 className="text-xs font-black text-yellow-500 uppercase flex items-center gap-2 mb-3"><Icon name="alert" size={14}/> {inTransition ? 'Manutenção Preventiva' : 'Prevenção Específica'}</h3>
                                    {prevExercises.map(ex => (
                                        <div key={ex.id} className="bg-black/40 p-3 rounded-lg flex gap-3 items-center mb-2">
                                            <div className="w-16 h-16 bg-slate-700 rounded overflow-hidden shrink-0 cursor-pointer relative group" onClick={() => setExpandedGif(ex)}>
                                                {ex.gifUrl ? <img src={ex.gifUrl} className="w-full h-full object-cover opacity-80" onError={(e)=>e.target.style.display='none'}/> : <Icon name="image" className="m-5 text-slate-500"/>}
                                                <div className="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100"><Icon name="play" size={20} className="text-white"/></div>
                                            </div>
                                            <div className="flex-1">
                                                <div className="font-bold text-xs text-white">{ex.title}</div>
                                                <div className="text-[10px] text-slate-400 mt-1">{ex.sets}x {ex.reps} {ex.rest && `| Repouso: ${ex.rest}s`}</div>
                                            </div>
                                            <div onClick={()=>toggleComplete(ex.id)} className={`w-8 h-8 rounded-full border-2 flex items-center justify-center cursor-pointer transition-colors ${completedExs.includes(ex.id) ? 'bg-green-500 border-green-500 text-white' : 'border-slate-600 text-transparent'}`}><Icon name="check" size={16}/></div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {!isInjured && (
                                <div className="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
                                    <div className="bg-slate-700/50 p-3 border-b border-slate-700 flex items-center gap-2"><Icon name="activity" size={16} className="text-blue-400"/><h3 className="font-bold text-sm uppercase text-white">{inTransition ? 'Treino de Transição' : 'Academia'}</h3></div>
                                    <div className="p-4 flex flex-col gap-3">
                                        {genExercises.length === 0 ? (
                                            <div className="text-center text-slate-500 text-xs py-4">A ficha principal de hoje não possui exercícios para o seu perfil.</div>
                                        ) : genExercises.map(ex => (
                                            <div key={ex.id} className="bg-slate-900/50 p-3 rounded-lg border border-slate-700/50 flex gap-3">
                                                <div className="w-20 h-20 bg-slate-800 rounded overflow-hidden shrink-0 cursor-pointer relative group" onClick={() => setExpandedGif(ex)}>
                                                    {ex.gifUrl ? <img src={ex.gifUrl} className="w-full h-full object-cover" onError={(e)=>e.target.style.display='none'}/> : <Icon name="image" className="m-6 text-slate-500"/>}
                                                    <div className="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100"><Icon name="play" size={24} className="text-white"/></div>
                                                </div>
                                                <div className="flex-1 flex flex-col justify-between">
                                                    <div>
                                                        <div className="font-bold text-xs text-white">{ex.title}</div>
                                                        <div className="text-[10px] text-blue-400 font-bold uppercase mt-1">{ex.sets}x {ex.reps} {ex.rest && `| Repouso: ${ex.rest}s`}</div>
                                                    </div>
                                                </div>
                                                <div className="flex items-center justify-center">
                                                    <div onClick={()=>toggleComplete(ex.id)} className={`w-8 h-8 rounded-full border-2 flex items-center justify-center cursor-pointer transition-colors ${completedExs.includes(ex.id) ? 'bg-green-500 border-green-500 text-white' : 'border-slate-600 text-transparent'}`}><Icon name="check" size={16}/></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {isInjured && (
                                <div className="bg-red-900/20 border border-red-800 rounded-xl p-4">
                                    <div className="flex items-center justify-center mb-4"><div className="bg-red-500/20 p-3 rounded-full"><Icon name="medkit" size={24} className="text-red-500"/></div></div>
                                    <h3 className="text-center font-black text-red-500 uppercase text-sm mb-4">Fisioterapia</h3>
                                    <div className="space-y-2">
                                        <div className="bg-slate-900 p-3 rounded border border-red-900/50 flex justify-between items-center">
                                            <div><div className="text-xs font-bold text-white">Comparecer ao DM</div><div className="text-[10px] text-slate-400">Tratamento obrigatório e reavaliação</div></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="bg-blue-900/30 border border-blue-800 rounded-xl p-4 flex flex-col gap-2">
                                <div className="flex items-center gap-4">
                                    <div className="bg-blue-500 p-2 rounded-full shadow-lg shadow-blue-500/50 animate-pulse"><Icon name="bolt" size={20} className="text-white"/></div>
                                    <div className="flex-1"><h3 className="font-bold text-xs text-blue-400 uppercase">Ação Pós-Treino</h3><p className="text-[10px] text-slate-300 mt-1">Recuperação orientada: <strong>{finalPostWorkout}</strong>.</p></div>
                                </div>
                                {aiAlert && (
                                    <div className="mt-2 bg-blue-950/50 border border-blue-500/30 rounded p-2 text-[10px] text-blue-300 flex items-start gap-2">
                                        <Icon name="brain" size={14} className="shrink-0 text-blue-400"/>
                                        <span className="font-bold">{aiAlert}</span>
                                    </div>
                                )}
                            </div>
                        </div>

                        {expandedGif && (
                            <div className="absolute inset-0 bg-slate-950 z-50 flex flex-col animate-fade-in font-sans">
                                <div className="p-4 flex justify-between items-center bg-slate-900 border-b border-slate-800">
                                    <span className="text-xs font-bold text-slate-400 uppercase">Detalhes da Execução</span>
                                    <button onClick={() => setExpandedGif(null)} className="text-white bg-slate-800 p-2 rounded-full"><Icon name="x" size={16}/></button>
                                </div>
                                <div className="flex-1 flex flex-col justify-center items-center bg-black p-4 relative">
                                    {expandedGif.gifUrl ? <img src={expandedGif.gifUrl} className="w-full max-h-[50vh] object-contain rounded-lg shadow-2xl"/> : <Icon name="image" size={60} className="text-slate-700"/>}
                                </div>
                                <div className="bg-slate-900 p-6 rounded-t-3xl border-t border-slate-800 pb-10">
                                    <div className="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-6"></div>
                                    <h2 className="text-2xl font-black text-white uppercase mb-2 text-center">{expandedGif.title}</h2>
                                    <div className="flex justify-center gap-4 mt-6">
                                        <div className="bg-slate-800 p-3 rounded-xl border border-slate-700 text-center w-24">
                                            <span className="text-[10px] text-slate-400 uppercase font-bold">Séries</span><div className="text-xl font-black text-blue-400">{expandedGif.sets}</div>
                                        </div>
                                        <div className="bg-slate-800 p-3 rounded-xl border border-slate-700 text-center w-24">
                                            <span className="text-[10px] text-slate-400 uppercase font-bold">Repetições</span><div className="text-xl font-black text-green-400">{expandedGif.reps}</div>
                                        </div>
                                        {expandedGif.rest && (
                                            <div className="bg-slate-800 p-3 rounded-xl border border-slate-700 text-center w-24">
                                                <span className="text-[10px] text-slate-400 uppercase font-bold">Repouso</span><div className="text-xl font-black text-yellow-400">{expandedGif.rest}s</div>
                                            </div>
                                        )}
                                    </div>
                                    <button onClick={() => setExpandedGif(null)} className="w-full mt-8 bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700">FECHAR</button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
