<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        /* Seus Estilos Originais */
        .card-atleta { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.1); }
        .btn-azul { background-color: #2563eb; color: white; font-weight: 800; border-radius: 16px; transition: all 0.2s; }
        .btn-azul:active { transform: scale(0.98); opacity: 0.9; }
        .gold-glow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.4); border: 2px solid #eab308; }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950 text-slate-100">
    <div id="root" class="h-full w-full flex flex-col"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], days:[], id:null, coachMsg:'', color:'#1e3a8a' });
            const [idx, setIdx] = useState(null); 
            const [step, setStep] = useState(1); 
            const [loading, setLoading] = useState(true);
            const [tab, setTab] = useState('treino'); 
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1});

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id'); const pIdx = params.get('p');
                if(!uId) { setLoading(false); return; }
                db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ 
                            players: d.players||[], log: d.trainingLog||{}, ex: d.exercises||[], 
                            days: d.days||[], coachMsg: d.coachMsg||'', id: doc.id, color: d.themeColor||'#1e3a8a' 
                        });
                        if(pIdx !== null && step === 1) { setIdx(parseInt(pIdx)); setStep(2); }
                    }
                    setLoading(false);
                }, () => setLoading(false));
            }, []);

            const myWorkouts = useMemo(() => {
                if (idx === null || !data.players[idx]) return [];
                const myName = (data.players[idx].name || "").toLowerCase();
                return (data.ex || []).filter(e => {
                    const t = (e.target || "").toLowerCase();
                    return t.includes(myName) || t.includes("geral");
                });
            }, [data.ex, idx, data.players]);

            const isConvocado = useMemo(() => {
                return (data.exercises || []).some(e => (e.target || "").toUpperCase().includes("CONVOCADO") && (e.target || "").toLowerCase().includes((data.players[idx]?.name || "").toLowerCase()));
            }, [data.exercises, idx]);

            if(loading) return <div className="h-screen flex items-center justify-center text-white font-bold animate-pulse">CARREGANDO...</div>;

            // TELA 1: SELEÇÃO (IGUAL AO ORIGINAL)
            if(step===1) return (
                <div className="p-6 h-screen overflow-y-auto bg-slate-950 flex flex-col items-center">
                    <h1 className="text-2xl font-black italic mb-8 uppercase text-white">PROCOACH <span style={{color:data.color}}>MAX</span></h1>
                    <div className="grid grid-cols-3 gap-4 w-full max-w-sm">
                        {data.players.map((p, i) => (
                            <div key={i} onClick={()=>{setIdx(i); setStep(2);}} className="flex flex-col items-center gap-2 cursor-pointer">
                                <div className="w-20 h-20 rounded-full border-2 border-slate-800 overflow-hidden bg-slate-900 shadow-xl">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <div className="flex h-full items-center justify-center text-xl">👤</div>}
                                </div>
                                <span className="text-[9px] font-bold text-slate-400 uppercase truncate w-full text-center">{p.name}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // TELA 2: DASHBOARD (SEU PADRÃO ORIGINAL)
            const p = data.players[idx];
            return (
                <div className="h-full flex flex-col bg-slate-950 relative">
                    {/* CABEÇALHO ORIGINAL */}
                    <div className="p-6 shrink-0 rounded-b-[40px] shadow-2xl relative overflow-hidden" style={{ background: `linear-gradient(135deg, ${data.color}, #020617)` }}>
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-16 h-16 rounded-full border-2 border-white/20 overflow-hidden shrink-0">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <div className="p-4 text-center">👤</div>}
                                </div>
                                <div>
                                    <h2 className="text-lg font-black text-white uppercase">{p.name}</h2>
                                    <p className="text-[10px] font-bold text-white/60 uppercase tracking-widest">{p.position}</p>
                                </div>
                            </div>
                            <button onClick={()=>setStep(1)} className="text-[10px] font-bold bg-white/10 px-3 py-1 rounded-full uppercase">Voltar</button>
                        </div>
                    </div>

                    {/* CONTEÚDO DAS ABAS */}
                    <div className="flex-1 overflow-y-auto p-6 custom-scroll pb-28">
                        
                        {tab === 'treino' && (
                            <div className="space-y-6 animate-fade-in">
                                {/* CARD DE RECAPAÇÃO / TREINO (IGUAL AO ORIGINAL) */}
                                <div className="bg-slate-900/50 p-6 rounded-[32px] border border-slate-800 text-center">
                                    {myWorkouts.length > 0 ? (
                                        <div className="space-y-4">
                                            <h3 className="text-xs font-black text-blue-500 uppercase tracking-widest">Atividades de Hoje</h3>
                                            {myWorkouts.map((ex, i) => (
                                                <div key={i} className="flex items-center gap-4 bg-slate-800/50 p-3 rounded-2xl border border-slate-700">
                                                    <div className="text-xl">⚽</div>
                                                    <div className="text-left flex-1">
                                                        <div className="text-xs font-black text-white uppercase">{ex.title}</div>
                                                        <div className="text-[9px] font-bold text-slate-500 uppercase">{ex.target}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="space-y-2">
                                            <div className="text-4xl">🔋</div>
                                            <h3 className="text-lg font-black text-white uppercase">Dia de Recuperação</h3>
                                        </div>
                                    )}
                                </div>

                                {/* SLIDERS WELLNESS (IGUAL AO ORIGINAL) */}
                                <div className="space-y-4">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center">Relatório de Prontidão</h3>
                                    {['sleep','stress','fatigue','soreness','mood'].map(m=>(
                                        <div key={m} className="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                                            <div className="flex justify-between mb-2 font-bold text-white text-[10px] uppercase"><span>{m}</span><span className="text-blue-400">{scores[m]}</span></div>
                                            <input type="range" min="1" max="7" value={scores[m]} onChange={e=>setScores({...scores,[m]:parseInt(e.target.value)})} className="hooper-slider"/>
                                        </div>
                                    ))}
                                    <button onClick={()=>{
                                        const td = new Date().toISOString().split('T')[0];
                                        db.collection('coachData').doc(data.id).set({ trainingLog: { [td]: { [idx]: { wellness: scores } } } }, {merge:true})
                                        .then(()=> alert("Dados Enviados!"));
                                    }} className="w-full btn-azul py-4 shadow-xl uppercase text-xs">Registrar Atividade</button>
                                </div>
                            </div>
                        )}

                        {tab === 'convocacao' && (
                            <div className="animate-fade-in space-y-6">
                                <h3 className="text-[10px] font-black text-yellow-500 uppercase tracking-widest text-center mb-6">Lista de Convocados</h3>
                                {isConvocado ? (
                                    <div className="bg-yellow-500/10 border-2 border-yellow-500/50 p-8 rounded-[40px] text-center gold-glow">
                                        <div className="text-5xl mb-4">🏆</div>
                                        <h2 className="text-2xl font-black text-white uppercase italic">Você está Convocado!</h2>
                                        <p className="text-xs text-yellow-500 font-bold mt-2 uppercase tracking-widest">Prepare seu kit de jogo</p>
                                    </div>
                                ) : (
                                    <div className="bg-slate-900/50 border border-slate-800 p-10 rounded-[40px] text-center">
                                        <div className="text-4xl opacity-20 grayscale mb-4">📋</div>
                                        <p className="text-slate-500 font-bold uppercase text-xs">Lista ainda não publicada pela comissão.</p>
                                    </div>
                                )}
                            </div>
                        )}

                        {tab === 'microciclo' && (
                            <div className="animate-fade-in space-y-4">
                                <h3 className="text-[10px] font-black text-blue-400 uppercase tracking-widest text-center mb-6">Programação da Semana</h3>
                                {data.days && data.days.length > 0 ? data.days.map((day, dIdx) => (
                                    <div key={dIdx} className="bg-slate-900/80 p-5 rounded-[32px] border border-white/5">
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="text-lg font-black italic">{day.name}</span>
                                            <span className="text-[9px] font-bold bg-blue-600 px-2 py-1 rounded text-white">{day.md || 'Treino'}</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div className="bg-slate-950 p-3 rounded-2xl">
                                                <div className="text-[8px] font-black text-blue-500 uppercase mb-1">Manhã</div>
                                                <div className="text-[10px] font-bold text-slate-300">{(day.am || []).map(e=>e.type).join(', ') || 'Folga'}</div>
                                            </div>
                                            <div className="bg-slate-950 p-3 rounded-2xl">
                                                <div className="text-[8px] font-black text-orange-500 uppercase mb-1">Tarde</div>
                                                <div className="text-[10px] font-bold text-slate-300">{(day.pm || []).map(e=>e.type).join(', ') || 'Folga'}</div>
                                            </div>
                                        </div>
                                    </div>
                                )) : <div className="text-center p-10 text-slate-600 text-xs">Agenda indisponível.</div>}
                            </div>
                        )}
                    </div>

                    {/* SEU MENU INFERIOR ORIGINAL AMPLIADO */}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-800 p-4 flex justify-around items-center z-50 rounded-t-[32px] shadow-2xl">
                         <div onClick={()=>setTab('treino')} className={`flex flex-col items-center gap-1 ${tab==='treino'?'text-blue-500 scale-110':'text-slate-600'}`}>
                            <span className="text-xl">⚽</span>
                            <span className="text-[8px] font-black uppercase">Treino</span>
                         </div>
                         <div onClick={()=>setTab('microciclo')} className={`flex flex-col items-center gap-1 ${tab==='microciclo'?'text-blue-400 scale-110':'text-slate-600'}`}>
                            <span className="text-xl">📅</span>
                            <span className="text-[8px] font-black uppercase">Semana</span>
                         </div>
                         <div onClick={()=>setTab('convocacao')} className={`flex flex-col items-center gap-1 ${tab==='convocacao'?'text-yellow-500 scale-110':'text-slate-600'}`}>
                            <span className="text-xl">🏆</span>
                            <span className="text-[8px] font-black uppercase">Convocado</span>
                         </div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
