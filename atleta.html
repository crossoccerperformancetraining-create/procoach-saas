        const RadarChart = ({ stats, size = 150 }) => {

            const points = [ { label: 'FOR', val: stats.force || 50 }, { label: 'VEL', val: stats.speed || 50 }, { label: 'POT', val: stats.power || 50 }, { label: 'PRE', val: stats.prev || 50 }, { label: 'TEC', val: stats.tech || 50 }, { label: 'RES', val: stats.endurance || 50 } ];

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], act:[], dm:[], ass:{}, matchM:{}, postW:'IA', nextG:{opponent:'',date:''}, coachMsg:'', color:'#1e3a8a', id:null, videoUrl:'', logo:null, teamName:'PROCOACH', days: [] });
            const [idx, setIdx] = useState(null); const [isPriv, setIsPriv] = useState(false);

            const getDM = (id) => { const act = safeArray(data.dm).filter(r=>r&&r.playerId==id&&r.status==='Active'); if(act.length>0) return (parseInt(act[0].rtpPhase)||1)>=3 ? 'TRANSIÇÃO' : 'DM'; return 'APTO'; };
            const calcBat = (w) => { if(!w || !w.sleep) return { p: 0, c: 'text-slate-500', f: 'bg-slate-500' }; const s = (w.sleep||0)+(w.stress||0)+(w.fatigue||0)+(w.soreness||0)+(w.mood||0); const p = Math.max(0, Math.min(100, Math.round(100 - (((s - 5) / 30) * 100)))); return { p, c: p<40?'text-red-500':p<75?'text-yellow-500':'text-green-500', f: p<40?'bg-red-500':p<75?'bg-yellow-500':'bg-green-500' }; };

            const selectP = (i) => { setIdx(i); initAudio(); if(data.log && data.log[getTodayStr()] && data.log[getTodayStr()][i] && data.log[getTodayStr()][i].wellness && data.log[getTodayStr()][i].wellness.sleep) { setStep(3); if(data.log[getTodayStr()][i].agendaAck) setAgendaAck(true); setWater(Number(data.log[getTodayStr()][i].waterIntake) || 0); } else { setScores({sleep:1,stress:1,fatigue:1,soreness:1,mood:1}); setPain([]); setStep(2); } };

            const getPlayerStats = () => { let wCompleted = 0; let totalMins = 0; let currentStreak = 0; Object.keys(data.log).forEach(dateStr => { if(data.log[dateStr]?.[idx]?.rpeSubmitted) wCompleted++; }); return { workouts: wCompleted, mins: totalMins, streak: currentStreak }; };
            const getHistory = () => { const pastDays = getDatesInRange(getTodayStr(), 7); return pastDays.map(d => { const l = data.log[d]?.[idx] || {}; const w = safeObj(l.wellness); return { date: d, hasW: !!w.sleep, bat: calcBat(w).p, rpeSub: l.rpeSubmitted }; }); };
            const getRankingData = () => { const players = data.players.map((p, i) => ({ ...p, goals: Number(p.stats?.g || 0), assists: Number(p.stats?.a || 0) })); return { artillery: [...players].sort((a,b) => b.goals - a.goals).slice(0, 5), consistency: [...players].sort((a,b) => b.streak - a.streak).slice(0, 5) }; };
            const getPlayerSkills = (pIdx) => ({ force: 80, speed: 70, power: 75, prev: 85, tech: 75, endurance: 70 });
            const getNutritionAdvice = (rpeVal) => { if(rpeVal >= 8) return { t: "Desgaste Extremo Detectado!", d: "Reponha carboidratos rápidos (ex: fruta, suco) e beba muita água nas próximas 2h para restaurar o glicogênio.", ic: "🍎" }; if(rpeVal >= 5) return { t: "Treino Intenso e Proveitoso", d: "Priorize uma refeição com boas proteínas e carboidratos nas próximas horas para reconstruir a fibra muscular.", ic: "🍗" }; return { t: "Treino Moderado/Regenerativo", d: "Esforço bem controlado. Mantenha sua hidratação e alimentação equilibrada de costume.", ic: "🥗" }; };
            const getRpeEmoji = (val) => { if(val <= 3) return '😌'; if(val <= 6) return '😅'; if(val <= 8) return '🥵'; return '💀'; };

            if(loading) return <div className="h-screen flex flex-col items-center justify-center bg-slate-950 text-white p-6"><div className="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-6 shadow-lg shadow-blue-500/20"></div><div className="text-2xl font-black italic tracking-wider animate-pulse"><span style={{color: data.color || '#3b82f6'}}>PRO</span>COACH</div></div>;
            if(!data.id || (idx !== null && !data.players[idx])) return <div className="h-screen flex flex-col items-center justify-center bg-slate-950 text-white p-6 text-center"><div className="text-red-500 mb-4 animate-pulse"><Icon name="alert" size={48} /></div><h2 className="text-xl font-black uppercase mb-2">Atleta Não Encontrado</h2></div>;

            if(step===1) return (
                <div className="p-6 h-screen flex flex-col items-center justify-center animate-fade-in bg-slate-950 overflow-y-auto">
                    <h1 className="text-3xl font-black italic mb-8 text-white"><span style={{color:data.color}}>PRO</span>COACH</h1>
                    <div className="grid grid-cols-3 md:grid-cols-4 gap-6 w-full max-w-2xl pb-10">
                        {data.players.map((p, i) => (
                            p && (
                                <div key={i} onClick={()=>selectP(i)} className="flex flex-col items-center gap-2 cursor-pointer hover:scale-105 transition-transform relative text-center">
                                    <div className={`w-20 h-20 rounded-full border-2 overflow-hidden bg-slate-900 shadow-lg ${p.highlight ? 'border-yellow-400 gold-glow' : 'border-slate-800'}`}>
                                        {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" size={32} className="m-6 text-slate-700"/>}
                                    </div>
                                    <span className="text-[10px] font-bold uppercase truncate w-full text-slate-300">{(p.name || 'Atleta').split(' ')[0]}</span>
                                </div>
                            )
                        ))}
                    </div>
                </div>
            );

            if(step===2) return (
                <div className="h-full flex flex-col animate-fade-in relative bg-slate-900 pb-20">
                    <div className="bg-slate-800 p-4 border-b border-slate-700 flex items-center justify-between shadow-lg shrink-0">
                        <div className="flex items-center gap-4">
                            <div className="w-14 h-14 rounded-full bg-slate-700 overflow-hidden shrink-0 border-2" style={{borderColor:data.color}}>{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="user"/>}</div>
                            <div><div className="text-[10px] font-bold uppercase" style={{color:data.color}}>Prontidão Diária</div><h2 className="text-lg font-black text-white">{getGreeting()}, {(p.name || 'Atleta').split(' ')[0]}!</h2></div>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 space-y-6 custom-scroll">
                        {[{id:'sleep',l:'😴 Sono'},{id:'stress',l:'🤯 Estresse'},{id:'fatigue',l:'🔋 Energia'},{id:'soreness',l:'🦵 Dor'},{id:'mood',l:'🧠 Humor'}].map(m=>(<div key={m.id} className="bg-slate-800/50 p-4 rounded-xl border border-slate-700"><div className="flex justify-between mb-2 font-bold text-white text-sm"><span>{m.l}</span><span className="bg-slate-900 px-2 rounded text-blue-400">{scores[m.id]}</span></div><input type="range" min="1" max="7" value={scores[m.id]} onChange={e=>setScores({...scores,[m.id]:parseInt(e.target.value)})} className="hooper-slider"/></div>))}
                    </div>
                    <div className="fixed bottom-0 left-0 w-full p-4 bg-slate-900/95 backdrop-blur-md z-50 border-t border-slate-800"><button onClick={subData} disabled={submitting} className="w-full text-white font-black py-4 rounded-2xl flex items-center justify-center gap-2 shadow-xl" style={{backgroundColor:data.color}}><Icon name="send"/> ENVIAR PRONTIDÃO</button></div>
                </div>
            );

            const pActual = data.players[idx]; 
            const isHighlight = pActual.highlight === true;
            const stats = getPlayerStats(); const ranking = getRankingData(); const exData = getOrderedExs();
            const streakTitle = getStreakTitle(stats.streak);
            const isFinished = data.log[getTodayStr()]?.[idx]?.rpeSubmitted === true;

            const tog = (ex) => { const id = ex.id; if(!completed.includes(id)) { setCompleted([...completed, id]); vibrate(50); } else { setCompleted(completed.filter(x=>x!==id)); vibrate(20); } };
            const renderExerciseCard = (ex, typeClass, iconName, borderClassColor) => {
                const isDone = completed.includes(ex.id);
                return (
                    <div key={ex.id} className={`bg-slate-900/80 p-4 rounded-2xl border ${isDone?'border-green-500 shadow-lg':'border-slate-800'} flex items-center gap-4 transition-all`}>
                        <div className="w-12 h-12 bg-slate-800 rounded-xl overflow-hidden shrink-0">{ex.gifUrl ? <img src={ex.gifUrl} className="w-full h-full object-cover"/> : <Icon name={iconName} className="m-3 text-slate-500"/>}</div>
                        <div className="flex-1"><div className="font-black text-white text-sm uppercase leading-tight">{ex.title}</div><div className={`text-[10px] font-bold uppercase mt-1 ${typeClass}`}>{ex.sets}x {ex.reps}</div></div>
                        <button onClick={()=>tog(ex)} className={`w-10 h-10 rounded-full border-2 flex items-center justify-center cursor-pointer transition-all ${isDone ? 'bg-green-500 border-green-500 text-white shadow-lg' : 'border-slate-700 text-slate-600'}`}><Icon name="check" size={20}/></button>
                    </div>
                )
            };

            return (
                <div className="flex-1 flex flex-col h-full bg-slate-950 overflow-hidden relative">
                    <div className="p-6 bg-slate-900 border-b border-slate-800 shadow-xl" style={{ background: `linear-gradient(135deg, ${data.color}, #020617)` }}>
                        <div className="flex items-center gap-4">
                            <div className={`w-20 h-20 rounded-full border-4 border-white/20 overflow-hidden bg-slate-800 shadow-xl relative cursor-pointer shrink-0 ${isHighlight ? 'gold-glow' : ''}`}>
                                {pActual.image ? <img src={pActual.image} className="w-full h-full object-cover object-top"/> : <Icon name="user" size={40} className="m-5 text-white/20"/>}
                            </div>
                            <div className="flex-1">
                                <h1 className="text-2xl font-black uppercase text-white leading-none truncate">{pActual.name}</h1>
                                <div className="flex items-center gap-2 mt-2">
                                    <span className="text-[9px] font-black bg-white/20 text-white px-2 py-0.5 rounded uppercase">{pActual.pos || 'Atleta'} {pActual.number ? `#${pActual.number}` : ''}</span>
                                    {isHighlight && <span className="text-[9px] font-black bg-yellow-500 text-slate-900 px-2 py-0.5 rounded shadow-lg tracking-widest"><Icon name="trophy" size={10}/> DESTAQUE</span>}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scroll pb-28">
                        {isFinished && tab === 'workout' && viewMode === 'finished' ? (
                            <div className="animate-fade-in flex flex-col items-center py-6">
                                <div className="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mb-3 shadow-lg shadow-green-500/50"><Icon name="check" size={32} className="text-white"/></div>
                                <h2 className="text-xl font-black text-green-500 uppercase mb-1 text-center leading-none">REGISTRO CONCLUÍDO!</h2>
                                <p className="text-[10px] text-slate-400 font-bold mb-8 uppercase text-center">Os teus dados foram salvos na nuvem.</p>
                                <div className="w-full bg-slate-900/50 border border-slate-800 rounded-3xl p-6 flex justify-between items-center mb-8 shadow-inner">
                                    <div className="text-center w-1/2 border-r border-slate-800"><span className="block text-[10px] font-bold text-slate-500 uppercase mb-1 leading-none">ESFORÇO (PSE)</span><span className="text-2xl font-black text-white leading-none">{data.log[getTodayStr()]?.[idx]?.rpe_am}/10</span></div>
                                    <div className="text-center w-1/2"><span className="block text-[10px] font-bold text-slate-500 uppercase mb-1 leading-none">DURAÇÃO</span><span className="text-2xl font-black text-blue-400 leading-none">{data.log[getTodayStr()]?.[idx]?.duration} min</span></div>
                                </div>
                                <div className="w-full text-left bg-slate-900 border border-slate-800 p-5 rounded-[24px] flex gap-4 items-start mb-10 shadow-lg">
                                    <span className="text-3xl">{getNutritionAdvice(data.log[getTodayStr()]?.[idx]?.rpe_am || 5).ic}</span>
                                    <div><div className="text-[12px] font-black text-white mb-1 uppercase italic leading-none">{getNutritionAdvice(data.log[getTodayStr()]?.[idx]?.rpe_am || 5).t}</div><div className="text-[10px] text-slate-400 font-bold leading-tight">{getNutritionAdvice(data.log[getTodayStr()]?.[idx]?.rpe_am || 5).d}</div></div>
                                </div>
                                <div className="w-full flex gap-3"><button onClick={()=>setViewMode('review')} className="flex-1 bg-slate-900 border border-slate-800 text-white font-black py-4 rounded-2xl text-[10px] uppercase shadow-lg">Ver Ficha</button><button onClick={shareToInsta} className="flex-1 bg-gradient-to-r from-purple-600 to-pink-600 text-white font-black py-4 rounded-2xl text-[10px] uppercase shadow-lg">Compartilhar</button></div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {tab === 'workout' && (
                                    <div className="animate-fade-in space-y-4">
                                        <div className="bg-slate-900/80 border border-slate-800 p-4 rounded-[24px] shadow-lg">
                                            <div className="flex items-center gap-2 mb-2 text-blue-500"><Icon name="bell" size={16}/><span className="text-[10px] font-black uppercase tracking-widest">Recado do Professor</span></div>
                                            <p className="text-sm font-bold text-white mb-4 italic leading-tight">{data.coachMsg || "Foco total no trabalho de hoje!"}</p>
                                            {!agendaAck ? (
                                                <button onClick={ackAgenda} className="w-full bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold py-2.5 rounded-xl transition-all shadow-lg flex items-center justify-center gap-1 active:scale-95"><Icon name="check" size={14}/> CLIQUE AQUI PARA CONFIRMAR LEITURA</button>
                                            ) : (
                                                <div className="text-[9px] font-black text-green-500 text-center uppercase tracking-[0.2em] py-2 bg-green-500/10 rounded-xl border border-green-500/20">✓ Leitura Confirmada</div>
                                            )}
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="bg-slate-900 border border-slate-800 p-4 rounded-3xl text-center shadow-inner"><Icon name="ball" className="text-yellow-500 mb-1 mx-auto" size={20}/><span className="text-[10px] font-bold text-slate-500 uppercase">Gols</span><span className="text-2xl font-black text-white block">{(pActual.stats && pActual.stats.g) || 0}</span></div>
                                            <div className="bg-slate-900 border border-slate-800 p-4 rounded-3xl text-center shadow-inner"><Icon name="target" className="text-blue-500 mb-1 mx-auto" size={20}/><span className="text-[10px] font-bold text-slate-500 uppercase">Assists</span><span className="text-2xl font-black text-white block">{(pActual.stats && pActual.stats.a) || 0}</span></div>
                                        </div>
                                        {data.ex.map(ex => renderExerciseCard(ex, "text-blue-400", "activity", "border-slate-800"))}
                                        {!isFinished && <button onClick={()=>setRpeMod(true)} className="w-full bg-green-600 text-white font-black py-4 rounded-2xl shadow-xl flex items-center justify-center gap-2 uppercase tracking-widest active:scale-95 transition-all"><Icon name="check"/> FINALIZAR TREINO (PSE)</button>}
                                    </div>
                                )}
                                {tab === 'agenda' && (
                                    <div className="animate-fade-in space-y-6">
                                        {pActual.highlight ? (
                                            <div className="bg-slate-900 border-2 border-blue-500 p-5 rounded-[32px] shadow-lg relative overflow-hidden">
                                                <div className="absolute top-0 right-0 bg-blue-500 text-white px-4 py-1 rounded-bl-2xl font-black text-[10px] uppercase shadow-md tracking-tighter">Relacionado</div>
                                                <h3 className="text-sm font-black text-white uppercase mb-4 flex items-center gap-2"><Icon name="trophy" size={16} className="text-yellow-500"/> CONVOCAÇÃO OFICIAL</h3>
                                                <div className="flex items-center gap-4 bg-blue-500/10 p-5 rounded-2xl border border-blue-500/30 mb-4">
                                                    <div className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center font-black text-white text-xl shadow-lg border-2 border-blue-400 shrink-0">{pActual.number || "!"}</div>
                                                    <div><div className="text-[14px] font-black text-white uppercase tracking-tight italic">VOCÊ VAI PRO JOGO!</div><div className="text-[10px] font-bold text-blue-400 uppercase mt-0.5 leading-tight tracking-tighter">Prepare seu equipamento e foque no objetivo.</div></div>
                                                </div>
                                                <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800 shadow-inner"><span className="text-[8px] font-black text-blue-500 uppercase block mb-2 tracking-[0.2em]">Logística e Programação</span><p className="text-xs text-slate-200 leading-relaxed whitespace-pre-line font-medium italic">{data.coachMsg || "Aguardando informações da comissão técnica."}</p></div>
                                            </div>
                                        ) : (
                                            <div className="bg-slate-900/50 border border-slate-800 p-8 rounded-[32px] text-center"><p className="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Aguardando lista oficial...</p></div>
                                        )}
                                        <div className="bg-slate-900 border border-slate-800 p-5 rounded-[32px] shadow-lg"><h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Programação Semanal</h3><div className="space-y-2.5">{safeArray(data.days).map((day, i) => (<div key={i} className="flex items-center justify-between bg-slate-950/80 p-4 rounded-2xl border border-slate-800 shadow-sm"><div className="flex flex-col"><span className="text-[8px] font-black text-slate-500 uppercase tracking-widest">{day.name}</span><span className="text-[11px] font-black text-white uppercase">{day.md}</span></div><div className="flex gap-1">{safeArray(day.am).map((ev, idx) => <span key={idx} className="bg-blue-600 text-white text-[8px] font-black px-2.5 py-1 rounded-lg uppercase shadow-sm">{ev.type}</span>)}</div></div>))}</div></div>
                                    </div>
                                )}
                                {tab === 'profile' && (
                                    <div className="animate-fade-in flex flex-col items-center">
                                        <div className="w-full bg-slate-900 rounded-[40px] p-6 border border-slate-800 mt-4 shadow-xl"><h3 className="text-center text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Radar de Habilidades</h3><RadarChart stats={getPlayerSkills(idx)} /><div className="grid grid-cols-2 gap-4 mt-8"><div className="bg-slate-950 p-3 rounded-2xl border border-slate-800 text-center"><div className="text-[10px] font-bold text-slate-600 uppercase mb-1">Nota Geral</div><div className="text-2xl font-black text-green-400 leading-none">88</div></div><div className="bg-slate-950 p-3 rounded-2xl border border-slate-800 text-center"><div className="text-[10px] font-bold text-slate-600 uppercase mb-1">Potencial</div><div className="text-2xl font-black text-blue-400 leading-none">94</div></div></div></div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {rpeMod && (
                        <div className="absolute inset-0 bg-slate-950/90 z-[500] flex items-center justify-center p-6 animate-fade-in">
                            <div className="bg-slate-800 rounded-[32px] border border-slate-700 w-full max-w-sm p-6 shadow-2xl relative"><button onClick={()=>setRpeMod(false)} className="absolute top-4 right-4 text-slate-400 hover:text-white"><Icon name="x" size={20}/></button><h2 className="text-xl font-black text-white uppercase text-center mb-6 leading-none">Nível de Esforço</h2><div className="w-full mb-6"><label className="text-[10px] font-bold text-slate-400 uppercase flex justify-between mb-2 leading-none"><span>PSE (Escala 0-10)</span><span className="text-blue-400 font-black text-sm">{rpe}/10</span></label><input type="range" min="0" max="10" value={rpe} onChange={e=>setRpe(parseInt(e.target.value))} className="hooper-slider"/></div><div className="w-full mb-6 text-center leading-none"><label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block leading-none">Duração (Minutos)</label><input type="number" value={dur} onChange={e=>setDur(parseInt(e.target.value))} className="w-full bg-slate-900 border border-slate-600 text-white text-center font-black text-3xl py-3 rounded-xl outline-none"/></div><button onClick={saveRPE} className="w-full bg-green-500 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all">SALVAR E FINALIZAR</button></div>
                        </div>
                    )}

                    <div className="fixed bottom-0 left-0 w-full bg-slate-900/90 backdrop-blur-2xl border-t border-slate-800 p-4 flex justify-around items-center z-50 rounded-t-3xl shadow-2xl">
                         <div onClick={()=>setTab('workout')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='workout'?'text-blue-500':'text-slate-500'}`}><Icon name="play" size={24}/><span className="text-[8px] font-black uppercase mt-1">Treino</span></div>
                         <div onClick={()=>setTab('agenda')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='agenda'?'text-blue-500':'text-slate-500'}`}><Icon name="calendar" size={24}/><span className="text-[8px] font-black uppercase mt-1">Agenda</span></div>
                         <div onClick={()=>setShowStats(true)} className="flex flex-col items-center text-slate-500 cursor-pointer"><Icon name="activity" size={24}/><span className="text-[8px] font-black uppercase mt-1">Histórico</span></div>
                         <div onClick={()=>setTab('profile')} className={`flex flex-col items-center cursor-pointer transition-colors ${tab==='profile'?'text-blue-500':'text-slate-500'}`}><Icon name="target" size={24}/><span className="text-[8px] font-black uppercase mt-1">Perfil FIFA</span></div>
                    </div>

                    <div id="share-card" className="fixed z-[-1]" style={{left: '-9999px', top: '-9999px', width: '400px', backgroundColor: '#0f172a'}}><div className="p-8 border-4 border-slate-800 rounded-[40px] flex flex-col items-center relative overflow-hidden" style={{backgroundColor: '#0f172a'}}><div className="absolute top-0 left-0 w-full h-40 opacity-40" style={{background: `linear-gradient(to bottom, ${data.color}, transparent)`}}></div><div className="w-32 h-32 rounded-full border-4 overflow-hidden bg-slate-800 shadow-2xl mb-4 z-10 relative" style={{borderColor: data.color}}>{pActual.image ? <img src={pActual.image} className="w-full h-full object-cover"/> : <Icon name="user" size={60} className="m-10 text-white/20"/>}</div><h2 className="text-3xl font-black uppercase text-white mb-1 z-10 text-center leading-tight">{pActual.name}</h2><div className="text-[10px] font-black text-slate-600 tracking-widest uppercase z-10 mt-8">POWERED BY PROCOACH MAX</div></div></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
