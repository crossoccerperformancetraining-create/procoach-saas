<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        .card-micro { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950">
    <div id="root" class="h-full w-full"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], log:{}, ex:[], id:null, days:[], coachMsg: '' });
            const [idx, setIdx] = useState(null); const [step, setStep] = useState(1); const [loading, setLoading] = useState(true);
            const [tab, setTab] = useState('hoje');
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1});

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id');
                if(!uId) { setLoading(false); return; }
                db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ 
                            players: d.players||[], 
                            log: d.trainingLog||{}, 
                            ex: d.exercises||[], 
                            days: d.days || [],
                            id: doc.id, 
                            coachMsg: d.coachMsg || ''
                        });
                    }
                    setLoading(false);
                });
            }, []);

            const myWorkouts = useMemo(() => {
                if (idx === null) return [];
                const myName = (data.players[idx]?.name || "").toLowerCase();
                return data.ex.filter(e => {
                    const t = (e.target || "").toLowerCase();
                    return t.includes(myName) || t.includes("geral") || t.includes("convocado");
                });
            }, [data.ex, idx]);

            if(loading) return <div className="h-screen flex items-center justify-center text-white font-bold">PROCOACH MAX...</div>;

            if(step===1) return (
                <div className="p-6 h-screen flex flex-col items-center justify-center">
                    <h1 className="text-3xl font-black italic mb-8 text-white uppercase">PROCOACH</h1>
                    <div className="grid grid-cols-3 gap-6 w-full max-w-2xl">
                        {data.players.map((p, i) => (
                            <div key={i} onClick={()=>{setIdx(i); setStep(2);}} className="flex flex-col items-center gap-2">
                                <div className="w-16 h-16 rounded-full border-2 border-slate-800 overflow-hidden bg-slate-900 shadow-xl">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <div className="flex h-full items-center justify-center text-xl">👤</div>}
                                </div>
                                <span className="text-[10px] font-bold text-slate-400 uppercase">{(p.name || '').split(' ')[0]}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="h-full flex flex-col overflow-hidden bg-slate-950">
                    {/* MENU SUPERIOR DE ABAS */}
                    <div className="flex bg-slate-900/80 backdrop-blur-md pt-4 border-b border-white/5">
                        <button onClick={() => setTab('hoje')} className={`flex-1 py-4 text-xs font-black uppercase tracking-widest ${tab==='hoje' ? 'tab-active' : 'text-slate-500'}`}>Hoje</button>
                        <button onClick={() => setTab('semana')} className={`flex-1 py-4 text-xs font-black uppercase tracking-widest ${tab==='semana' ? 'tab-active' : 'text-slate-500'}`}>Programação</button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 custom-scroll">
                        {tab === 'hoje' ? (
                            <div className="space-y-8">
                                <div className="flex items-center gap-4">
                                    <div className="w-14 h-14 rounded-full border-2 border-blue-500 overflow-hidden">
                                        {data.players[idx].image ? <img src={data.players[idx].image} className="w-full h-full object-cover"/> : <div className="p-4">👤</div>}
                                    </div>
                                    <div>
                                        <h2 className="text-lg font-black text-white uppercase leading-none">{data.players[idx].name}</h2>
                                        <p className="text-[10px] font-bold text-blue-500 uppercase tracking-widest mt-1">{data.players[idx].position}</p>
                                    </div>
                                </div>

                                {data.coachMsg && (
                                    <div className="bg-blue-600/10 border-l-4 border-blue-600 p-4 rounded-r-2xl">
                                        <h4 className="text-[10px] font-black text-blue-400 uppercase mb-2">Aviso da Comissão</h4>
                                        <p className="text-sm text-slate-200 italic font-medium whitespace-pre-wrap">{data.coachMsg}</p>
                                    </div>
                                )}

                                <div className="space-y-4">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">Treino do Dia</h3>
                                    {myWorkouts.map((ex, i) => (
                                        <div key={i} className="bg-slate-900 p-4 rounded-2xl flex items-center gap-4 border border-slate-800">
                                            <div className="w-12 h-12 bg-slate-800 rounded-xl flex items-center justify-center overflow-hidden">
                                                {ex.gifUrl ? <img src={ex.gifUrl} className="w-full h-full object-cover"/> : "⚽"}
                                            </div>
                                            <div className="flex-1">
                                                <div className="text-xs font-black text-white uppercase">{ex.title}</div>
                                                <div className="text-[9px] font-bold text-slate-500 uppercase">{ex.target}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="space-y-4 pb-10">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] text-center">Wellness</h3>
                                    {['sleep','stress','fatigue','soreness','mood'].map(m=>(
                                        <div key={m} className="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                                            <div className="flex justify-between mb-2 text-xs font-bold uppercase"><span>{m}</span><span className="text-blue-400">{scores[m]}</span></div>
                                            <input type="range" min="1" max="7" value={scores[m]} onChange={e=>setScores({...scores,[m]:parseInt(e.target.value)})} className="hooper-slider" style={{background:'linear-gradient(to right,#22c55e,#eab308,#ef4444)'}}/>
                                        </div>
                                    ))}
                                    <button onClick={()=>{ alert("Enviado!"); }} className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl uppercase text-xs">Enviar Prontidão</button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4 pb-10">
                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-6">Planejamento da Semana</h3>
                                {data.days.map((day, dIdx) => (
                                    <div key={dIdx} className="card-micro rounded-3xl p-5 mb-4 relative overflow-hidden">
                                        <div className="flex justify-between items-center mb-4">
                                            <span className="text-lg font-black text-white italic">{day.name}</span>
                                            <span className="text-[9px] font-bold bg-white/10 px-2 py-1 rounded text-slate-400">FASE: {day.phase || 'GERAL'}</span>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="bg-slate-950/40 p-3 rounded-xl border border-white/5">
                                                <div className="text-[8px] font-black text-blue-500 uppercase mb-1">Manhã ☀️</div>
                                                <div className="text-[11px] font-bold text-slate-200 uppercase leading-tight">{day.morning || 'Folga'}</div>
                                            </div>
                                            <div className="bg-slate-950/40 p-3 rounded-xl border border-white/5">
                                                <div className="text-[8px] font-black text-orange-500 uppercase mb-1">Tarde 🌤️</div>
                                                <div className="text-[11px] font-bold text-slate-200 uppercase leading-tight">{day.afternoon || 'Folga'}</div>
                                            </div>
                                        </div>
                                        
                                        {day.obs && (
                                            <div className="mt-3 text-[9px] text-slate-500 font-medium italic border-t border-white/5 pt-2">
                                                📝 {day.obs}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
