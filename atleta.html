<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta - ProCoach MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #1e293b; outline: none; }
        .hooper-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-950 text-slate-100">
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-3 rounded-full shadow-2xl z-[300] text-xs font-bold transition-opacity duration-300 pointer-events-none flex items-center gap-2" style="opacity:0;"></div>
    <div id="root" class="h-full w-full flex flex-col"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = { apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco", authDomain: "prosaude-e9130.firebaseapp.com", projectId: "prosaude-e9130", storageBucket: "prosaude-e9130.firebasestorage.app", messagingSenderId: "999318121562", appId: "1:999318121562:web:1f192d4c0f14a64fb57c63" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        
        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const showToast = (msg) => { const t = document.getElementById('toast'); if(t){ t.innerHTML = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); } };
        const safeArray = (arr) => (Array.isArray(arr) ? arr : []);
        const getEmbedUrl = (url) => { if(!url) return null; const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/; const match = url.match(regExp); return (match && match[2].length === 11) ? `https://www.youtube.com/embed/${match[2]}` : null; };

        const Icon = ({ name, size=24, className="", onClick }) => {
            const p = { 
                user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>', check: '<polyline points="20 6 9 17 4 12"/>', x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>', send: '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>', activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>', play: '<polygon points="5 3 19 12 5 21 5 3"/>', clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>', trophy: '<path d="M8 21h8m-4-9v9"/><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/><path d="M7 2v16"/><path d="M17 2v16"/>', calendar: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>', target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>', bell: '<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>', ball: '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>'
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill={name==='play'||name==='trophy'?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} onClick={onClick} dangerouslySetInnerHTML={{__html: p[name] || ''}} />;
        };

        const AthletePortal = () => {
            const [data, setData] = useState({ players:[], trainingLog:{}, exercises:[], coachMsg:'', days: [], assessments:{}, matchMinutes:{}, videoUrl:'' });
            const [idx, setIdx] = useState(null);
            const [step, setStep] = useState(1);
            const [tab, setTab] = useState('workout');
            const [loading, setLoading] = useState(true);
            const [scores, setScores] = useState({sleep:1, stress:1, fatigue:1, soreness:1, mood:1});
            const [rpeMod, setRpeMod] = useState(false);
            const [rpe, setRpe] = useState(5);
            const [dur, setDur] = useState(60);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const uId = params.get('id');
                const pIdx = params.get('p');
                if(!uId) return;

                const unsubscribe = db.collection('coachData').doc(uId).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setData({ ...d, id: doc.id, trainingLog: d.trainingLog || {} });
                        if(pIdx !== null && d.players?.[parseInt(pIdx)]) {
                            const pI = parseInt(pIdx);
                            setIdx(pI);
                            if(d.trainingLog?.[getTodayStr()]?.[pI]?.wellness?.sleep) setStep(3); else setStep(2);
                        }
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const sendWellness = async () => {
                const td = getTodayStr();
                const nl = { ...data.trainingLog }; if(!nl[td]) nl[td] = {}; if(!nl[td][idx]) nl[td][idx] = {};
                nl[td][idx] = { ...nl[td][idx], wellness: scores };
                await db.collection('coachData').doc(data.id).update({ trainingLog: nl });
                setStep(3);
            };

            const sendRPE = async () => {
                const td = getTodayStr();
                const nl = { ...data.trainingLog }; if(!nl[td]) nl[td] = {}; if(!nl[td][idx]) nl[td][idx] = {};
                nl[td][idx] = { ...nl[td][idx], rpe_am: rpe, duration: dur, rpeSubmitted: true };
                await db.collection('coachData').doc(data.id).update({ trainingLog: nl });
                setRpeMod(false);
                showToast("✅ Treino Finalizado!");
                if(typeof confetti !== 'undefined') confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            };

            if(loading) return <div className="h-screen bg-slate-950 flex items-center justify-center text-white font-black italic">PROCOACH...</div>;

            if(step === 1) return (
                <div className="p-6 h-screen flex flex-col items-center justify-center bg-slate-950">
                    <h1 className="text-3xl font-black italic mb-8 text-blue-500">PROCOACH</h1>
                    <div className="grid grid-cols-3 gap-6 w-full max-w-md">
                        {data.players.map((p, i) => (
                            <div key={i} onClick={() => { setIdx(i); setStep(2); }} className="flex flex-col items-center gap-2 cursor-pointer">
                                <div className="w-16 h-16 rounded-full border-2 border-slate-800 overflow-hidden bg-slate-900">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" className="m-4 text-slate-700"/>}
                                </div>
                                <span className="text-[10px] font-bold uppercase truncate w-full text-center">{p.name?.split(' ')[0]}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if(step === 2) return (
                <div className="h-full flex flex-col bg-slate-950 p-6 animate-fade-in">
                    <h2 className="text-xl font-black uppercase text-white italic mb-6">Prontidão</h2>
                    <div className="flex-1 space-y-6 overflow-y-auto">
                        {[{id:'sleep',l:'😴 Sono'},{id:'stress',l:'🤯 Estresse'},{id:'fatigue',l:'🔋 Energia'},{id:'soreness',l:'🦵 Dor'},{id:'mood',l:'🧠 Humor'}].map(m=>(
                            <div key={m.id} className="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                                <div className="flex justify-between mb-2 font-bold text-xs text-slate-400"><span>{m.l}</span><span className="text-white bg-slate-800 px-2 rounded">{scores[m.id]}</span></div>
                                <input type="range" min="1" max="7" value={scores[m.id]} onChange={e=>setScores({...scores,[m.id]:parseInt(e.target.value)})} className="hooper-slider"/>
                            </div>
                        ))}
                    </div>
                    <button onClick={sendWellness} className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl mt-4">ENVIAR E ENTRAR</button>
                </div>
            );

            const pActual = data.players[idx];
            const isFinishedToday = data.trainingLog?.[getTodayStr()]?.[idx]?.rpeSubmitted;

            return (
                <div className="flex-1 flex flex-col h-full bg-slate-950">
                    {/* CABEÇALHO */}
                    <div className="p-6 bg-slate-900 border-b border-slate-800 flex items-center gap-4">
                        <div className="w-12 h-12 rounded-full border-2 border-blue-500 overflow-hidden bg-slate-800">
                            {pActual.image ? <img src={pActual.image} className="w-full h-full object-cover"/> : <Icon name="user" className="m-3 text-slate-700"/>}
                        </div>
                        <div className="flex-1">
                            <h1 className="text-md font-black uppercase text-white truncate">{pActual.name}</h1>
                            <span className="text-[9px] font-black bg-blue-600 text-white px-2 py-0.5 rounded uppercase">Atleta</span>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto px-4 pt-4 pb-28 custom-scroll">
                        
                        {/* --- ABA TREINO (INÍCIO) --- */}
                        {tab === 'workout' && (
                            <div className="animate-fade-in space-y-4">
                                <div className="bg-slate-900 border border-slate-800 p-4 rounded-3xl">
                                    <div className="flex items-center gap-2 mb-2 text-blue-500"><Icon name="bell" size={16}/><span className="text-[10px] font-black uppercase tracking-widest">Quadro de Avisos</span></div>
                                    <p className="text-sm font-bold text-white italic">"{data.coachMsg || "Foco total!"}"</p>
                                </div>

                                {data.videoUrl && (
                                    <div className="bg-indigo-900/20 border border-indigo-800 p-4 rounded-3xl">
                                        <div className="text-indigo-400 font-black text-[10px] uppercase mb-3 flex items-center gap-2"><Icon name="play" size={16}/> Vídeo Tático</div>
                                        <div className="w-full aspect-video rounded-xl overflow-hidden bg-black border border-indigo-500/30">
                                            <iframe src={getEmbedUrl(data.videoUrl)} frameBorder="0" allowFullScreen className="w-full h-full"></iframe>
                                        </div>
                                    </div>
                                )}

                                <div className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Treino do Dia</div>
                                {safeArray(data.exercises).map((ex, i) => (
                                    <div key={i} className="bg-slate-900 border border-slate-800 p-4 rounded-3xl flex items-center gap-4">
                                        <div className="w-12 h-12 bg-slate-800 rounded-xl overflow-hidden shrink-0">{ex.gifUrl && <img src={ex.gifUrl} className="w-full h-full object-cover"/>}</div>
                                        <div className="flex-1">
                                            <div className="text-white font-bold text-sm uppercase">{ex.title}</div>
                                            <div className="text-[10px] text-slate-500 font-bold">{ex.sets}x{ex.reps} | {ex.target}</div>
                                        </div>
                                    </div>
                                ))}

                                {!isFinishedToday && (
                                    <button onClick={()=>setRpeMod(true)} className="w-full bg-green-600 text-white font-black py-4 rounded-2xl shadow-xl flex items-center justify-center gap-2">
                                        <Icon name="check" size={20}/> FINALIZAR TREINO (PSE)
                                    </button>
                                )}
                            </div>
                        )}

                        {/* --- ABA AGENDA (CONVOCAÇÃO) --- */}
                        {tab === 'agenda' && (
                            <div className="animate-fade-in space-y-4">
                                {pActual.highlight ? (
                                    <div className="bg-slate-900 border-2 border-blue-500 p-5 rounded-[32px] shadow-lg relative overflow-hidden">
                                        <div className="absolute top-0 right-0 bg-blue-500 text-white px-4 py-1 rounded-bl-2xl font-black text-[10px] uppercase">CONVOCADO</div>
                                        <div className="flex items-center gap-2 mb-4 text-yellow-500"><Icon name="trophy" size={20}/><span className="text-sm font-black text-white uppercase">Relacionado para o Jogo</span></div>
                                        <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800">
                                            <span className="text-[9px] font-black text-blue-500 uppercase block mb-3 tracking-[0.2em]">Logística e Programação</span>
                                            <p className="text-xs text-slate-200 leading-relaxed whitespace-pre-line font-medium italic">
                                                {data.coachMsg || "Aguardando informações do Professor."}
                                            </p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-slate-900 border border-slate-800 p-10 rounded-[32px] text-center text-slate-500 uppercase text-[10px] font-black italic">Aguardando lista oficial...</div>
                                )}
                                <div className="bg-slate-900 border border-slate-800 p-5 rounded-[32px]">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Programação Semanal</h3>
                                    <div className="space-y-2.5">
                                        {safeArray(data.days).map((day, i) => (
                                            <div key={i} className="flex items-center justify-between bg-slate-950 p-4 rounded-2xl border border-slate-800 text-[10px] font-bold">
                                                <span className="text-slate-500 uppercase">{day.name}</span>
                                                <span className="text-white uppercase">{day.md}</span>
                                                <div className="flex gap-1">{safeArray(day.am).map((ev, idx) => <span key={idx} className="bg-blue-600 text-white px-2 py-0.5 rounded uppercase">{ev.type}</span>)}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* OUTRAS ABAS */}
                        {tab === 'stats' && (
                            <div className="animate-fade-in space-y-4">
                                <h2 className="text-center font-black uppercase text-white">Meus Dados</h2>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-3xl text-center"><span className="text-xl font-black text-blue-400 block">{Object.values(data.matchMinutes || {}).reduce((acc, curr) => acc + (Number(curr[idx]) || 0), 0)}'</span><span className="text-[9px] font-bold text-slate-500 uppercase">Minutos</span></div>
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-3xl text-center"><span className="text-xl font-black text-green-500 block">{Object.values(data.trainingLog).filter(l => l[idx]?.wellness?.sleep).length}</span><span className="text-[9px] font-bold text-slate-500 uppercase">Treinos</span></div>
                                </div>
                            </div>
                        )}

                        {tab === 'ranking' && (
                            <div className="animate-fade-in space-y-3">
                                <h2 className="text-center font-black uppercase text-white">Geral</h2>
                                {data.players.map((p, i) => (
                                    <div key={i} className={`flex items-center gap-3 p-3 rounded-2xl border ${i===idx?'bg-blue-900/20 border-blue-500':'bg-slate-900 border-slate-800'}`}>
                                        <span className="text-xs font-black text-slate-500">{i+1}º</span>
                                        <div className="w-8 h-8 rounded-full bg-slate-800 overflow-hidden">{p.image && <img src={p.image} className="w-full h-full object-cover"/>}</div>
                                        <span className="flex-1 text-[11px] font-bold uppercase truncate">{p.name}</span>
                                        <span className="text-[11px] font-black text-blue-400">{(p.stats?.g || 0) + (p.stats?.a || 0)}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* MODAL PSE */}
                    {rpeMod && (
                        <div className="absolute inset-0 bg-slate-950/95 z-[500] flex items-center justify-center p-6 animate-fade-in">
                            <div className="bg-slate-900 rounded-[32px] border border-slate-700 w-full max-w-sm p-6 shadow-2xl">
                                <h2 className="text-xl font-black text-white uppercase text-center mb-6">Esforço do Treino</h2>
                                <div className="mb-6"><label className="text-[10px] font-bold text-slate-400 uppercase flex justify-between mb-2"><span>PSE (0-10)</span><span className="text-blue-400 font-black text-sm">{rpe}/10</span></label><input type="range" min="0" max="10" value={rpe} onChange={e=>setRpe(parseInt(e.target.value))} className="hooper-slider"/></div>
                                <div className="mb-6 text-center"><label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Duração (Minutos)</label><input type="number" value={dur} onChange={e=>setDur(parseInt(e.target.value))} className="w-full bg-slate-950 border border-slate-800 text-white text-center font-black text-3xl py-3 rounded-xl outline-none"/></div>
                                <div className="flex gap-2"><button onClick={()=>setRpeMod(false)} className="flex-1 bg-slate-800 text-white py-4 rounded-2xl font-bold uppercase text-[10px]">Cancelar</button><button onClick={sendRPE} className="flex-2 bg-green-600 text-white py-4 px-6 rounded-2xl font-black uppercase text-[10px]">ENVIAR DADOS</button></div>
                            </div>
                        </div>
                    )}

                    {/* MENU INFERIOR */}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900/95 backdrop-blur-md border-t border-slate-800 p-4 flex justify-around items-center z-50 rounded-t-3xl">
                         <div onClick={()=>setTab('workout')} className={`flex flex-col items-center transition-colors ${tab==='workout'?'text-blue-500':'text-slate-500'}`}><Icon name="play" size={24}/><span className="text-[8px] font-black uppercase mt-1">Treino</span></div>
                         <div onClick={()=>setTab('agenda')} className={`flex flex-col items-center transition-colors ${tab==='agenda'?'text-blue-500':'text-slate-500'}`}><Icon name="calendar" size={24}/><span className="text-[8px] font-black uppercase mt-1">Agenda</span></div>
                         <div onClick={()=>setTab('stats')} className={`flex flex-col items-center transition-colors ${tab==='stats'?'text-blue-500':'text-slate-500'}`}><Icon name="activity" size={24}/><span className="text-[8px] font-black uppercase mt-1">Dados</span></div>
                         <div onClick={()=>setTab('ranking')} className={`flex flex-col items-center transition-colors ${tab==='ranking'?'text-yellow-500':'text-slate-500'}`}><Icon name="trophy" size={24}/><span className="text-[8px] font-black uppercase mt-1">Rank</span></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AthletePortal />);
    </script>
</body>
</html>
