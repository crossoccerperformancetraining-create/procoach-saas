function Thread({workspace,message,user,onClose}){const[replies,setReplies]=useState([]),[text,setText]=useState('');useEffect(()=>{if(!message)return;const base=db.collection('coachData').doc(workspace).collection('staffMessages').doc(message.id);base.collection('reads').doc(user.uid).set({uid:user.uid,email:user.email||'',readAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}).catch(()=>{});return base.collection('replies').orderBy('createdAt','asc').onSnapshot(s=>setReplies(s.docs.map(d=>({id:d.id,...d.data()}))),()=>setReplies([]))},[message?.id]);const send=async()=>{const body=text.trim();if(!body)return;await db.collection('coachData').doc(workspace).collection('staffMessages').doc(message.id).collection('replies').add({body,authorUid:user.uid,authorEmail:user.email||'',createdAt:firebase.firestore.FieldValue.serverTimestamp()});setText('')};return <div className="fixed inset-0 z-50 bg-black/80 p-3 flex items-end md:items-center justify-center" onClick={onClose}><div className="w-full max-w-xl max-h-[92vh] bg-slate-900 border border-slate-700 rounded-t-3xl md:rounded-3xl flex flex-col overflow-hidden" onClick={e=>e.stopPropagation()}><div className="p-4 border-b border-slate-700 flex justify-between gap-3"><div><div className="text-[9px] uppercase font-black text-blue-400">{message.category} • {message.priority}</div><h2 className="font-black text-white">{message.title}</h2></div><button onClick={onClose} className="text-2xl text-slate-400">×</button></div><div className="p-4 overflow-y-auto scroll flex-1"><p className="text-sm whitespace-pre-wrap">{message.body}</p>{message.eventDate&&<div className="mt-3 bg-blue-500/10 border border-blue-500/30 rounded-xl p-3 text-xs"><b>{fmtDate(message.eventDate)}</b> {message.eventTime?`• ${message.eventTime}`:""}{message.eventLocation?<div className="text-slate-400 mt-1">{message.eventLocation}</div>:null}</div>}<div className="text-[9px] text-slate-500 mt-2">{message.authorName||message.authorEmail} • {fm function App(){const[user,setUser]=useState(null),[workspace,setWorkspace]=useState(new URLSearchParams(location.search).get('workspace')||localStorage.getItem('procoach_commission_workspace')||''),[manualWorkspace,setManualWorkspace]=useState(''),[data,setData]=useState(null),[role,setRole]=useState('viewer'),[loading,setLoading]=useState(true),[tab,setTab]=useState('wall'),[messages,setMessages]=useState([]),[tasks,setTasks]=useState([]),[selected,setSelected]=useState(null),[form,setForm]=useState({title:'',body:'',category:'Comunicado',priority:'Normal'}),[task,setTask]=useState({title:'',dueDate:'',assignedRole:'all'});

const createTask=async()=>{if(!canPublish(role)||!task.title.trim())return;await db.collection('coachData').doc(workspace).collection('staffTasks').add({...task,title:task.title.trim(),status:'Pendente',createdBy:user.uid,createdByEmail:user.email||'',createdAt:firebase.firestore.FieldValue.serverTimestamp()});setTask({title:'',dueDate:'',assignedRole:'all'})};
const updateTask=(id,status)=>db.collection('coachData').doc(workspace).collection('staffTasks').doc(id).update({status,completedAt:status==='Concluída'?firebase.firestore.FieldValue.serverTimestamp():null,completedBy:status==='Concluída'?user.uid:null});

if(loading)return <div className="h-full flex items-center justify-center text-slate-400">Carregando...</div>;if(!user)return <Login/>;if(!workspace||!data)return <div className="h-full flex items-center justify-center p-6"><div className="w-full max-w-sm bg-slate-900 border border-slate-800 rounded-3xl p-6"><h2 className="font-black text-white">Abrir espaço da comissão</h2><p className="text-xs text-slate-400 mt-2 mb-4">Use o link enviado pelo administrador ou informe o ID do clube.</p><input value={manualWorkspace} onChange={e=>setManualWorkspace(e.target.value)} placeholder="ID do espaço" className="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-sm mb-3"/><button onClick={()=>setWorkspace(manualWorkspace.trim())} className="w-full bg-blue-600 py-3 rounded-xl font-black text-xs uppercase">Abrir</button><button onClick={()=>auth.signOut()} className="w-full mt-2 text-xs text-slate-500">Sair</button></div></div>;
const activeDm=safeArray(data.dmRecords).filter(x=>x?.status==='Active').length,players=safeArray(data.players),available=players.filter(p=>p&&!p.injured&&!p.suspended).length;

{tab==='wall'&&<div className="max-w-3xl mx-auto">{canPublish(role)&&<div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 mb-4"><div className="grid grid-cols-2 gap-2"><select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} className="bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs"><option>Comunicado</option><option>Ofício</option><option>Reunião</option><option>Performance</option><option>Departamento médico</option><option>Administrativo</option></select><select value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})} className="bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs"><option>Normal</option><option>Importante</option><option>Urgente</option></select></div><input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Assunto" className="w-full mt-2 bg-slate-800 border border-slate-700 rounded-xl p-3 text-xs"/><textarea value={form.body} onChange={e=>setForm({...form,body:e.target.value})} placeholder="Mensagem para a comissão..." className="w-full h-24 mt-2 bg-slate-800 border border-slate-700 rounded-xl p-3 text-xs"/><button onClick={publish} className="w-full mt-2 bg-blue-600 py-3 rounded-xl text-xs font-black uppercase">Publicar</button></div>}<div className="space-y-2">{messages.map(m=><button key={m.id} onClick={()=>setSelected(m)} className={`w-full text-left rounded-2xl border p-4 ${m.priority==='Urgente'?'bg-red-950/40 border-red-800':m.priority==='Importante'?'bg-yellow-950/30 border-yellow-800':'bg-slate-900 border-slate-800'}`}><div className="flex justify-between gap-2"><div><div className="text-[8px] uppercase font-black text-blue-400">{m.category} • {m.priority}</div><div className="font-black text-white">{m.title}</div></div><div className="text-[8px] text-slate-500">{fmt(m.createdAt)}</div></div><p className="text-xs text-slate-400 mt-2 line-clamp-3">{m.body}</p>{m.eventDate&&<div className="mt-2 text-[9px] font-bold text-blue-300">{fmtDate(m.eventDate)} {m.eventTime?`• ${m.eventTime}`:""} {m.eventLocation?`• ${m.eventLocation}`:""}</div>}<div className="text-[8px] text-slate-500 mt-2">{m.authorName||m.authorEmail}</div></button>)}{!messages.length&&<div className="p-10 text-center text-xs text-slate-500">Nenhum comunicado.</div>}</div></div>}
{tab==='agenda'&&<div className="max-w-3xl mx-auto"><h2 className="text-xl font-black text-white mb-4">Agenda da comissão</h2><div className="space-y-2">{agenda.map((a,i)=><div key={i} className="bg-slate-900 border border-slate-800 rounded-2xl p-4"><div className="text-[8px] uppercase font-black text-blue-400">{a.type}</div><div className="font-black text-white">{a.title}</div><div className="text-xs text-slate-400 mt-1">{fmtDate(a.date)} {a.time?`• ${a.time}`:''}</div>{a.detail&&<div className="text-xs text-slate-500 mt-2 whitespace-pre-wrap">{a.detail}</div>}</div>)}{!agenda.length&&<div className="p-10 text-center text-xs text-slate-500">Nenhum compromisso cadastrado.</div>}</div></div>}
{tab==='tasks'&&<div className="max-w-3xl mx-auto">{canPublish(role)&&<div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 mb-4"><h2 className="font-black text-white mb-3">Nova tarefa</h2><input value={task.title} onChange={e=>setTask({...task,title:e.target.value})} placeholder="Descrição" className="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-xs mb-2"/><div className="grid grid-cols-2 gap-2"><input type="date" value={task.dueDate} onChange={e=>setTask({...task,dueDate:e.target.value})} className="bg-slate-800 border border-slate-700 rounded-xl p-3 text-xs"/><select value={task.assignedRole} onChange={e=>setTask({...task,assignedRole:e.target.value})} className="bg-slate-800 border border-slate-700 rounded-xl p-3 text-xs"><option value="all">Toda comissão</option>{Object.entries(ROLE_CATALOG).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></div><button onClick={createTask} className="w-full mt-2 bg-emerald-600 py-3 rounded-xl text-xs font-black uppercase">Criar</button></div>}<div className="space-y-2">{tasks.map(t=><div key={t.id} className="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex gap-3 items-center"><div className="flex-1"><div className="font-black text-white">{t.title}</div><div className="text-[9px] text-slate-500">{t.assignedRole==='all'?'Toda comissão':ROLE_CATALOG[t.assignedRole]||t.assignedRole} {t.dueDate?`• ${fmtDate(t.dueDate)}`:''}</div></div><select value={t.status||'Pendente'} onChange={e=>updateTask(t.id,e.target.value)} className="bg-slate-800 border border-slate-700 rounded-lg p-2 text-[9px]"><option>Pendente</option><option>Em andamento</option><option>Concluída</option></select></div>)}{!tasks.length&&<div className="p-10 text-center text-xs text-slate-500">Nenhuma tarefa.</div>}</div></div>}
