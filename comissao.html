<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Módulo desativado</title><style>body{margin:0;background:#020617;color:#fff;font-family:Arial,sans-serif;display:grid;place-items:center;min-height:100vh}.card{max-width:560px;padding:32px;border:1px solid #334155;border-radius:20px;background:#0f172a;text-align:center}a{display:inline-block;margin-top:18px;padding:12px 18px;border-radius:12px;background:#2563eb;color:white;text-decoration:none;font-weight:800}</style></head><body><div class="card"><h1>Portal da Comissão desativado</h1><p>O módulo foi retirado temporariamente para estabilizar o painel e separar corretamente os elencos Profissional e Base.</p><a href="index.html?v=113">Voltar ao ProCoach</a></div><script>
(async()=>{
  try{
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      for(const reg of regs){
        const url=reg.active?.scriptURL||reg.waiting?.scriptURL||reg.installing?.scriptURL||'';
        if(url.includes('comissao-sw.js')) await reg.unregister();
      }
    }
    if('caches' in window){
      const keys=await caches.keys();
      await Promise.all(keys.filter(k=>k.startsWith('procoach-comissao')).map(k=>caches.delete(k)));
    }
  }catch(e){console.warn('Limpeza do módulo da comissão:',e)}
})();
</script></body></html>
