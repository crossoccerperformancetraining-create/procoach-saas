        const smartShare = async (blob, filename, title) => {
            const file = new File([blob], filename, { type: blob.type });

                try { await navigator.share({ files: [file], title: title }); return; } catch (err) { console.log(err); }

            const url = URL.createObjectURL(blob); const a = document.createElement('a');

            document.body.removeChild(a); URL.revokeObjectURL(url);
        };

        const safeObj = (o) => (o && typeof o === 'object' && !Array.isArray(o)) ? o : {};
        const safeArray = (a, f=[]) => (Array.isArray(a) && a.length > 0) ? a : f;
        const getWSum = (w) => w ? Object.values(w).reduce((a, b) => Number(a) + Number(b), 0) : 0;
        const calcDailyLoad = (log) => { if(!log) return 0; const rpe = (Number(log.rpe_am)||0) + (Number(log.rpe_pm)||0); const dur = Number(log.duration) || 0; return rpe * (dur > 0 ? dur : 60); };
        
        const isPlayerInTransition = (pId, dmRecords) => {
            const todayDate = new Date(getTodayStr());
            const records = safeArray(dmRecords).filter(r => r && r.playerId == pId && r.status === 'Recovered' && r.dateOut);
            for(let r of records) {
                const outDate = new Date(r.dateOut);
                if(isNaN(outDate.getTime())) continue;
                const diffTime = Math.abs(todayDate - outDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if(diffDays <= 7) return true; 
            }
            return false;
        };

        const AssessmentView = ({ players, themeColor, assessments, setAssessments, dmRecords }) => {
            const [selectedPlayer, setSelectedPlayer] = useState(0);
            const [viewMetric, setViewMetric] = useState('fms_total'); 
            
            const [form, setForm] = useState({ 
                date: getTodayStr(), weight: '', height: '', age: '', chest: '', axilla: '', tricep: '', subscap: '', abdo: '', supra: '', thigh: '', 
                soccer_test: '', sj: '', cmj: '', speed30: '', anamnese: '', orto: '', postura: '', squat_rm: '', assimetria: '',
                fms_ds: '', fms_hs_l: '', fms_hs_r: '', fms_ill_l: '', fms_ill_r: '', fms_sm_l: '', fms_sm_r: '', fms_aslr_l: '', fms_aslr_r: '', fms_tspu: '', fms_rs_l: '', fms_rs_r: '', fms_total: '',
                lachman: '', mcmurray: '', isocinetica: '', tornozelo_gaveta: '', lunge_test: '', quadril_adm: '', quadril_forca: '', y_balance: '', conduta: 'Liberado'
            });

            const playerPastInjuries = safeArray(dmRecords).filter(r => r && r.playerId == selectedPlayer);

            const calculateFMS = () => {
                const getV = (k) => parseInt(form[k]);
                return (getV('fms_ds') || 0) + Math.min(getV('fms_hs_l')||0, getV('fms_hs_r')||0) + Math.min(getV('fms_ill_l')||0, getV('fms_ill_r')||0) + Math.min(getV('fms_sm_l')||0, getV('fms_sm_r')||0) + Math.min(getV('fms_aslr_l')||0, getV('fms_aslr_r')||0) + (getV('fms_tspu') || 0) + Math.min(getV('fms_rs_l')||0, getV('fms_rs_r')||0);
            };

            const calculateBF = () => { const sum = Number(form.chest)+Number(form.axilla)+Number(form.tricep)+Number(form.subscap)+Number(form.abdo)+Number(form.supra)+Number(form.thigh); if(sum===0||!form.age) return 0; const bd = 1.112 - (0.00043499*sum) + (0.00000055*sum*sum) - (0.00028826*form.age); return (((4.95/bd)-4.50)*100).toFixed(1); };
            
            const saveAssessment = () => { 
                const newRec = { ...form, bf: calculateBF(), fms_total: calculateFMS() }; 
                const h = Array.isArray(assessments[selectedPlayer]) ? assessments[selectedPlayer] : []; 
                setAssessments({ ...assessments, [selectedPlayer]: [newRec, ...h] }); 
                showToast("Avaliação Salva!"); 
            };

            const autoSugerirConduta = () => {
                const fmsScore = calculateFMS();
                if (form.lachman === 'Positivo' || form.mcmurray === 'Positivo' || form.tornozelo_gaveta === 'Instável' || (fmsScore > 0 && fmsScore < 14)) {
                    setForm({...form, conduta: 'Não Liberado'});
                    showToast("IA: Atleta Não Liberado (Risco Crítico)");
                } else if (form.lunge_test === 'Restrito' || form.quadril_adm === 'Restrito' || form.assimetria !== '') {
                    setForm({...form, conduta: 'Restrições'});
                    showToast("IA: Liberado com Restrições");
                } else {
                    setForm({...form, conduta: 'Liberado'});
                    showToast("IA: Liberado sem restrições");
                }
            };
            
            const getRankings = (metric) => { 
                const list = safeArray(players).map((p, i) => { 
                    if(!p) return null; 
                    const h = Array.isArray(assessments[i]) ? assessments[i] : []; 
                    if(h.length === 0 || !h[0] || h[0][metric] === undefined) return null;
                    const val = parseFloat(h[0][metric]); 
                    return { name: p.name, val: isNaN(val) ? 0 : val }; 
                }).filter(x => x && x.val > 0); 
                if(metric === 'speed30') { list.sort((a,b) => a.val - b.val); } else { list.sort((a,b) => b.val - a.val); } 
                return { top5: list.slice(0, 5), bottom5: list.slice(-5).reverse() }; 
            };
            
            const rankings = getRankings(viewMetric);
            const RankChart = ({ title, data, color }) => ( <div className="mb-4"><h4 className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-2">{title}</h4>{data.length === 0 ? <div className="text-xs text-slate-300 dark:text-slate-600">Sem dados válidos para a equipa</div> : data.map((d, i) => ( <div key={i} className="flex items-center gap-2 mb-1"><div className="text-[10px] font-bold w-4 text-slate-400">#{i+1}</div><div className="flex-1"><div className="flex justify-between text-[10px] font-bold text-slate-700 dark:text-slate-300 mb-0.5"><span>{d.name}</span><span>{d.val}</span></div><div className="h-1.5 w-full bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{width: '100%', backgroundColor: color}}></div></div></div></div> ))}</div> );
            const history = Array.isArray(assessments[selectedPlayer]) ? assessments[selectedPlayer] : [];
            
            const FmsRow = ({ label, id, isBilateral }) => {
                if (isBilateral) {
                    return (
                        <div className="flex justify-between items-center bg-slate-50 dark:bg-slate-700/50 p-2 rounded border dark:border-slate-600">

                                <div className="flex items-center gap-1"><span className="text-[9px] text-slate-400">Dir:</span><input type="number" min="0" max="3" className="w-10 p-1 text-center text-xs font-bold rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form[`fms_${id}_r`] || ''} onChange={e=>setForm({...form, [`fms_${id}_r`]: e.target.value})} /></div>

                                <input type="number" min="0" max="3" className="w-12 p-1 text-center text-xs font-bold rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form[`fms_${id}`] || ''} onChange={e=>setForm({...form, [`fms_${id}`]: e.target.value})} />

            };

            const renderPhysicalAnalyst = () => { 
                if (form.conduta === 'Não Liberado') {
                    return (<div className="mt-6 p-4 border rounded-xl bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-800 text-red-900 dark:text-red-200"><div className="flex gap-3 items-center mb-2"><Icon name="alert" size={24} className="text-red-600" /><div className="text-xs font-black uppercase tracking-wider text-red-600">ATLETA VETADO</div></div><div className="text-sm font-bold leading-snug mb-2">Incapacitado para treino/jogo pelo Departamento Médico.</div><div className="text-[10px] font-bold bg-white/50 dark:bg-black/30 p-2 rounded">Plano: Iniciar protocolo de recuperação.</div></div>);
                }

                const bf = calculateBF(); const fmsScore = calculateFMS();
                let feedback = "Atleta apto. Parâmetros normais."; let plan = "Plano Sugerido: Treino padrão da equipa."; let isAlert = false;

                if(fmsScore > 0 && fmsScore < 14) { feedback = `ALTO RISCO DE LESÃO! Escore FMS (${fmsScore}) muito baixo.`; plan = "Plano: Foco imediato em mobilidade e estabilidade do core."; isAlert = true; } 
                else if(form.lachman === 'Positivo' || form.mcmurray === 'Positivo') { feedback = `ALTO RISCO! Teste de joelho (Lachman/McMurray) Positivo.`; plan = "Plano: RM Imediata e encaminhamento ortopédico."; isAlert = true; } 
                else if(bf > 15) { feedback = "Gordura acima do ideal para a posição."; plan = "Plano: Aeróbico contínuo + Ajuste Nutricional."; } 
                else if(bf > 0 && bf < 8) { feedback = "Gordura baixa (Nível Elite). Excelente."; plan = "Plano: Manutenção de força e monitorar CK constante."; }
                if(form.speed30 > 0 && form.speed30 < 4.0) feedback += " Velocidade de Sprint acima da média."; else if (form.speed30 > 4.4) plan += " Sugerida Pliometria 2x semana.";

                const colors = isAlert ? 'bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-800 text-red-900 dark:text-red-200' : 'bg-emerald-50 dark:bg-emerald-900/30 border-emerald-200 dark:border-emerald-800 text-emerald-900 dark:text-emerald-200';
                return (<div className={`mt-6 p-4 border rounded-xl ${colors}`}><div className="flex gap-3 items-center mb-2"><Icon name="brain" size={24} className={isAlert ? 'text-red-600' : 'text-emerald-600'} /><div className={`text-xs font-black uppercase tracking-wider ${isAlert ? 'text-red-600' : 'text-emerald-600'}`}>Analista Clínico & Físico IA</div></div><div className="text-sm font-bold leading-snug mb-2">{feedback}</div><div className="text-[10px] font-bold bg-white/50 dark:bg-black/30 p-2 rounded">{plan}</div></div>); 
            };

            const selectedP = players[selectedPlayer] || { name: 'Selecione', image: null };

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in flex flex-col gap-6 custom-scroll" style={{ WebkitOverflowScrolling: 'touch' }}>
                    <div className="flex flex-col lg:flex-row gap-6 h-full">
                        
                        {/* LISTA DE ATLETAS */}

                                return (

                                        <div className="w-8 h-8 rounded-full bg-slate-200 overflow-hidden relative shrink-0 border border-slate-200 dark:border-slate-600">{p.image?<img src={p.image} className="w-full h-full object-cover object-top"/>:<Icon name="user"/>}</div>
                                        <div className="font-bold text-sm text-slate-700 dark:text-slate-200">{p.name}</div>
                                    </div>
                                )
                            })}

                        {/* FORMULÁRIO CENTRAL */}

                            <div className="flex items-center gap-4 mb-6 border-b dark:border-slate-700 pb-4">
                                <div className="w-20 h-20 rounded-full bg-slate-200 border-2 border-slate-300 dark:border-slate-600 overflow-hidden relative shadow-md shrink-0">{selectedP.image ? <img src={selectedP.image} className="w-full h-full object-cover object-top"/> : <div className="w-full h-full flex items-center justify-center text-slate-400"><Icon name="user" size={40}/></div>}</div>

                                    <h2 className="text-2xl font-black text-slate-800 dark:text-slate-100 uppercase leading-none">{selectedP.name}</h2>

                                </div>
                                <div className="text-right">
                                    <input type="date" value={form.date || ''} onChange={e=>setForm({...form, date: e.target.value})} className="border dark:border-slate-600 rounded px-2 py-1 text-xs font-bold text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-700 outline-none"/>
                                </div>
                            </div>

                                        {playerPastInjuries.map((inj, idx) => (

                                                {formatDateBR(inj.dateIn)} - {inj.location} ({inj.type})
                                            </span>
                                        ))}
                                    </div>
                                </div>

                                        <span onClick={()=>setForm({...form, anamnese: form.anamnese ? form.anamnese+', Sem histórico grave' : 'Sem histórico grave'})} className="bg-slate-200 dark:bg-slate-600 text-[8px] px-1.5 py-0.5 rounded cursor-pointer hover:bg-blue-500 hover:text-white font-bold text-slate-600 dark:text-slate-300">Nenhum</span>

                                        <span onClick={()=>setForm({...form, anamnese: form.anamnese ? form.anamnese+', Histórico de Pubalgia' : 'Histórico de Pubalgia'})} className="bg-slate-200 dark:bg-slate-600 text-[8px] px-1.5 py-0.5 rounded cursor-pointer hover:bg-blue-500 hover:text-white font-bold text-slate-600 dark:text-slate-300">Pubalgia</span>
                                        <span onClick={()=>setForm({...form, anamnese: form.anamnese ? form.anamnese+', Lesão muscular recorrente' : 'Lesão muscular recorrente'})} className="bg-slate-200 dark:bg-slate-600 text-[8px] px-1.5 py-0.5 rounded cursor-pointer hover:bg-blue-500 hover:text-white font-bold text-slate-600 dark:text-slate-300">Lesão Muscular</span>

                                </div>

                                        <span onClick={()=>setForm({...form, orto: form.orto ? form.orto+', Edema' : 'Edema'})} className="bg-slate-200 dark:bg-slate-600 text-[8px] px-1.5 py-0.5 rounded cursor-pointer hover:bg-blue-500 hover:text-white font-bold text-slate-600 dark:text-slate-300">Edema</span>
                                        <span onClick={()=>setForm({...form, orto: form.orto ? form.orto+', Perda de ADM' : 'Perda de ADM'})} className="bg-slate-200 dark:bg-slate-600 text-[8px] px-1.5 py-0.5 rounded cursor-pointer hover:bg-blue-500 hover:text-white font-bold text-slate-600 dark:text-slate-300">Perda ADM</span>
                                        <span onClick={()=>setForm({...form, orto: form.orto ? form.orto+', Crepitação' : 'Crepitação'})} className="bg-slate-200 dark:bg-slate-600 text-[8px] px-1.5 py-0.5 rounded cursor-pointer hover:bg-blue-500 hover:text-white font-bold text-slate-600 dark:text-slate-300">Crepitação</span>
                                    </div>
                                </div>
                            </div>

                            <h3 className="text-sm font-bold text-slate-700 dark:text-slate-200 uppercase mt-6 mb-3 border-b dark:border-slate-700 pb-1 flex items-center gap-2"><Icon name="medkit"/> Testes Ortopédicos Específicos</h3>

                                    <select className="w-full text-xs p-1 mb-1 rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form.lachman || ''} onChange={e=>setForm({...form, lachman: e.target.value})}><option value="">Lachman/Gaveta...</option><option value="Negativo">Negativo (Estável)</option><option value="Positivo">Positivo (Instável)</option></select>
                                    <select className="w-full text-xs p-1 mb-1 rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form.mcmurray || ''} onChange={e=>setForm({...form, mcmurray: e.target.value})}><option value="">McMurray/Thessaly...</option><option value="Negativo">Negativo (Sem lesão)</option><option value="Positivo">Positivo (Sinal Meniscal)</option></select>
                                    <input type="text" placeholder="Isocinética (Déficit %)" className="w-full text-xs p-1 rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form.isocinetica || ''} onChange={e=>setForm({...form, isocinetica: e.target.value})}/>
                                </div>
                                
                                <div className="bg-slate-50 dark:bg-slate-700/50 p-3 rounded border dark:border-slate-600">

                                    <select className="w-full text-xs p-1 mb-1 rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form.tornozelo_gaveta || ''} onChange={e=>setForm({...form, tornozelo_gaveta: e.target.value})}><option value="">Estabilidade Tornozelo...</option><option value="Estável">Estável</option><option value="Instável">Instável (Laxidão)</option></select>
                                    <input type="text" placeholder="Lunge Test (Restrição?)" className="w-full text-xs p-1 mb-1 rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form.lunge_test || ''} onChange={e=>setForm({...form, lunge_test: e.target.value})}/>
                                    <select className="w-full text-xs p-1 rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form.quadril_adm || ''} onChange={e=>setForm({...form, quadril_adm: e.target.value})}><option value="">ADM Quadril/Pelve...</option><option value="Normal">Normal</option><option value="Restrito">Restrito (Risco Pubalgia)</option></select>
                                </div>

                                <div className="bg-slate-50 dark:bg-slate-700/50 p-3 rounded border dark:border-slate-600">
                                    <h4 className="text-[10px] font-black text-purple-500 uppercase mb-2">Decisão Clínica</h4>
                                    <label className="text-[9px] font-bold text-slate-500 uppercase block mb-1">Parecer Final (Conduta)</label>
                                    <select className="w-full font-bold text-xs p-1.5 rounded bg-white dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-500 outline-none" value={form.conduta || 'Liberado'} onChange={e=>setForm({...form, conduta: e.target.value})}>
                                        <option value="Liberado">🟢 Liberado (Sem restrições)</option>
                                        <option value="Restrições">🟡 Liberado com Restrições</option>
                                        <option value="Não Liberado">🔴 Não Liberado (Afastado)</option>
                                    </select>
                                    <button onClick={autoSugerirConduta} className="mt-2 w-full bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-bold py-1.5 rounded flex items-center justify-center gap-1"><Icon name="brain" size={12}/> GERAR CONDUTA IA</button>
                                </div>
                            </div>

                            {/* BLOCO 2: ANTROPOMETRIA */}
                            <h3 className="text-sm font-bold text-slate-700 dark:text-slate-200 uppercase mb-3 border-b dark:border-slate-700 pb-1 flex items-center gap-2"><Icon name="user"/> Composição Corporal</h3>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                                <div><label className="text-[10px] font-bold text-slate-400 uppercase">Peso (kg)</label><input type="number" className="w-full border dark:border-slate-600 rounded p-2 text-sm font-bold dark:bg-slate-700 dark:text-white outline-none" value={form.weight || ''} onChange={e=>setForm({...form, weight: e.target.value})}/></div>
                                <div><label className="text-[10px] font-bold text-slate-400 uppercase">Altura (cm)</label><input type="number" className="w-full border dark:border-slate-600 rounded p-2 text-sm font-bold dark:bg-slate-700 dark:text-white outline-none" value={form.height || ''} onChange={e=>setForm({...form, height: e.target.value})}/></div>
                                <div><label className="text-[10px] font-bold text-slate-400 uppercase">Idade</label><input type="number" className="w-full border dark:border-slate-600 rounded p-2 text-sm font-bold dark:bg-slate-700 dark:text-white outline-none" value={form.age || ''} onChange={e=>setForm({...form, age: e.target.value})}/></div>
                                <div className="bg-slate-100 dark:bg-slate-700 rounded p-2 flex flex-col items-center justify-center border dark:border-slate-600"><span className="text-[10px] font-bold text-slate-400 uppercase">Gordura Est.</span><span className="text-xl font-black text-slate-700 dark:text-slate-200">{calculateBF()}%</span></div>
                            </div>
                            <div className="grid grid-cols-4 md:grid-cols-7 gap-2 mb-6">
                                {[['chest','Peito'],['abdo','Abd'],['thigh','Coxa'],['axilla','Axila'],['tricep','Tric'],['subscap','SubS'],['supra','Supra']].map(([k,l]) => (

                                ))}
                            </div>

                            {/* BLOCO 3: FMS E TESTES */}
                            <h3 className="text-sm font-bold text-slate-700 dark:text-slate-200 uppercase mb-3 border-b dark:border-slate-700 pb-1 flex items-center gap-2"><Icon name="activity"/> Testes Físicos & FMS</h3>
                            
                            <div className="mb-6 bg-slate-100/50 dark:bg-slate-800/50 p-4 rounded-xl border border-blue-200 dark:border-blue-900/50">

                                        <h4 className="text-sm font-bold text-blue-600 dark:text-blue-400 uppercase tracking-wide">Protocolo FMS (0-21)</h4>

                                    </div>
                                    <div className="flex flex-col items-center">
                                        <span className="text-[9px] font-bold text-slate-400 uppercase mb-1">Escore Total</span>
                                        <div className={`text-2xl font-black rounded px-3 py-1 bg-white dark:bg-slate-900 border ${calculateFMS() < 14 && calculateFMS() > 0 ? 'text-red-500 border-red-500' : 'text-emerald-500 border-emerald-500'}`}>{calculateFMS()}</div>

                                    <table className="w-full text-xs text-left">
                                        <thead className="bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400"><tr><th className="p-3">Data</th><th className="p-3">Conduta</th><th className="p-3">FMS</th><th className="p-3">1RM</th><th className="p-3">Ação</th></tr></thead>
                                        <tbody>
                                            {history.length === 0 ? <tr><td colSpan="5" className="p-4 text-center text-slate-400">Nenhuma avaliação salva.</td></tr> : history.map((h, i) => {
                                                if(!h) return null;
                                                return (
                                                    <tr key={i} className="border-t dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50">
                                                        <td className="p-3 font-bold dark:text-slate-300">{formatDateBR(h.date)}</td>
                                                        <td className="p-3 font-bold text-blue-600 dark:text-blue-400">{h.conduta || 'Liberado'}</td>
                                                        <td className="p-3 font-bold text-emerald-600">{h.fms_total||'-'}</td>
                                                        <td className="p-3 dark:text-slate-300">{h.squat_rm||'-'} kg</td>
                                                        <td className="p-3"><button onClick={()=>{setForm(h); showToast("Dados carregados no formulário!");}} className="text-[9px] bg-slate-200 dark:bg-slate-600 px-2 py-1 rounded font-bold text-slate-600 dark:text-slate-300 hover:bg-blue-500 hover:text-white transition-colors">VER COMPLETO</button></td>
                                                    </tr>
                                                )
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {/* BARRA LATERAL DOS RANKINGS */}
                    <div className="w-full lg:w-64 bg-white dark:bg-slate-800 rounded-xl shadow p-4 border border-slate-200 dark:border-slate-700 h-fit">
                        <h3 className="text-sm font-bold text-slate-800 dark:text-slate-100 uppercase mb-4 flex items-center gap-2"><Icon name="trophy"/> Top 5 da Equipa</h3>
                        <select className="w-full mb-4 text-xs font-bold border dark:border-slate-600 rounded p-2 dark:bg-slate-700 dark:text-white outline-none" value={viewMetric} onChange={e=>setViewMetric(e.target.value)}>
                            <option value="fms_total">Escore FMS (Prevenção)</option>
                            <option value="squat_rm">Força Máx (1RM)</option>
                            <option value="speed30">Velocidade 30m</option>
                            <option value="soccer_test">Soccer Test (Resistência)</option>
                            <option value="sj">Squat Jump (Potência)</option>
                        </select>
                        <RankChart title="Melhores do Elenco" data={rankings.top5} color="#22c55e" />
                        <div className="border-t dark:border-slate-700 my-3"></div>
                        <RankChart title="Atenção (Menores Índices)" data={rankings.bottom5} color="#ef4444" />
                    </div>
                </div>
            );
        };

        const SquadView = ({ players, setPlayers, themeColor, trainingLog, dmRecords }) => {
            const [viewProfile, setViewProfile] = useState(null);
            const [editPlayer, setEditPlayer] = useState(null); 
            const today = getTodayStr(); 
            const safePlayers = safeArray(players);
            
            const addP = () => setPlayers([...safePlayers, {name: "Novo Atleta", image: null, injured: false, position: 'Atleta', number: ''}]);
            const fileInputRef = useRef(null); const [localData, setLocalData] = useState({});
            
            const getWeeklyLoad = (playerIndex) => { const dates = getDatesInRange(today, 7); let sum = 0; dates.forEach(d => { sum += calcDailyLoad(trainingLog[d]?.[playerIndex]); }); return Math.min(100, sum/2000*100); };
            const getPlayerDMStatus = (playerId) => { const dmRecs = safeArray(dmRecords); return dmRecs.find(r => r && r.playerId == playerId && r.status === 'Active'); };
            
            const Editor = () => { if(editPlayer === null) return null; const p = safePlayers[editPlayer]; if(!p) return null; const handleImg = async (e) => { const f=e.target.files[0]; if(f){ try{const c=await compressImage(f,80,0.4); setLocalData({...localData, image:c});}catch(e){} } }; return (<div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 animate-fade-in" onClick={()=>setEditPlayer(null)}><div className="bg-white dark:bg-slate-800 rounded-xl p-4 w-full max-w-sm space-y-3" onClick={e=>e.stopPropagation()}><h3 className="font-bold dark:text-white">Editar {p.name}</h3><div className="flex justify-center flex-col items-center gap-2"><div onClick={()=>fileInputRef.current.click()} className="w-32 h-32 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden border-2 border-blue-500 cursor-pointer">{localData.image?<img src={localData.image} className="w-full h-full object-cover object-top"/>:<Icon name="user"/>}</div><input type="file" ref={fileInputRef} className="hidden" onChange={async (e) => { const f=e.target.files[0]; if(f){ try{const c=await compressImage(f,80,0.4); setLocalData({...localData, image:c});}catch(err){} } }}/><div className="w-full"><label className="text-[9px] uppercase font-bold text-slate-400">Ou cole URL da Imagem:</label><BufferedInput className="w-full text-xs border dark:border-slate-600 rounded p-1 dark:bg-slate-700 dark:text-white" placeholder="https://..." value={localData.image && localData.image.startsWith('http') ? localData.image : ''} onSave={(val)=>setLocalData({...localData, image:val})} /></div></div><BufferedInput className="w-full border dark:border-slate-600 p-2 rounded dark:bg-slate-700 dark:text-white" value={localData.name} onSave={val=>setLocalData({...localData, name:val})}/><div className="grid grid-cols-2 gap-2"><BufferedInput type="number" className="border dark:border-slate-600 p-2 rounded dark:bg-slate-700 dark:text-white" placeholder="Camisa" value={localData.number} onSave={val=>setLocalData({...localData, number:val})}/><select className="border dark:border-slate-600 p-2 rounded dark:bg-slate-700 dark:text-white" value={localData.position} onChange={e=>setLocalData({...localData, position:e.target.value})}><option value="">-</option>{["Goleiro","Zagueiro","Lateral","Volante","Meia","Ponta","Atacante"].map(x=><option key={x} value={x}>{x}</option>)}</select></div><div className="flex gap-2"><button onClick={()=>{if(confirm('Excluir?')){setPlayers(safePlayers.filter((_,i)=>i!==editPlayer));setEditPlayer(null);}}} className="bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-2 rounded flex-1">Excluir</button><button onClick={()=>{const n=[...safePlayers];n[editPlayer]=localData;setPlayers(n);setEditPlayer(null);}} className="bg-blue-600 text-white p-2 rounded flex-1">Salvar</button></div></div></div>); };
            
            const injuredCount = safePlayers.filter(p=>p && p.injured).length;
            const squadAnalysis = injuredCount > 2 ? `Atenção: ${injuredCount} atletas indisponíveis.` : "Elenco com boa disponibilidade geral.";

            return (
                <div className="p-6 h-full overflow-y-auto animate-fade-in custom-scroll" style={{ WebkitOverflowScrolling: 'touch' }}>
                    <PlayerProfileModal player={safePlayers[viewProfile]} playerIndex={viewProfile} logs={trainingLog} onClose={()=>setViewProfile(null)} themeColor={themeColor} setPlayers={setPlayers} players={safePlayers} />
                    {editPlayer!==null && <Editor/>}
                    <div className="flex justify-between items-end mb-6"><h2 className="text-2xl font-bold flex items-center gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="user"/> Gestão do Elenco</h2><div className="text-xs bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-1.5 rounded-lg shadow-sm flex items-center gap-2 text-slate-600 dark:text-slate-300"><Icon name="brain" size={14} className="text-blue-500"/>{squadAnalysis}</div></div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        {safePlayers.map((p, i) => { 
                            if(!p) return null;
                            const loadPct = getWeeklyLoad(i); 
                            const dailyLog = trainingLog[today]?.[i] || {}; 
                            const wellness = safeObj(dailyLog.wellness); 
                            const soreness = Number(wellness.soreness) || 0; 
                            const sleep = Number(wellness.sleep) || 0; 
                            const isRisk = soreness >= 5; 
                            const dmStatus = p.injured ? getPlayerDMStatus(i) : null; 
                            const inTransition = !p.injured && isPlayerInTransition(i, dmRecords);
                            
                            return (
                                <div key={i} className={`bg-white dark:bg-slate-800 rounded-xl shadow border p-4 flex flex-col items-center gap-3 relative group hover:shadow-lg transition-all cursor-pointer ${isRisk || p.injured ? 'border-red-500 dark:border-red-500 ring-2 ring-red-100 dark:ring-red-900/50' : 'border-slate-100 dark:border-slate-700'}`} onClick={()=>setViewProfile(i)}>
                                    <button onClick={(e)=>{e.stopPropagation();setLocalData(p);setEditPlayer(i);}} className="absolute top-2 right-2 text-slate-300 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 bg-white dark:bg-slate-800 rounded-full p-1"><Icon name="edit" size={16}/></button>
                                    
                                    {isRisk && !p.injured && <div className="absolute top-2 left-2 bg-red-500 text-white text-[9px] font-bold px-2 py-0.5 rounded-full animate-pulse z-10 flex items-center gap-1"><Icon name="alert" size={10} stroke="white"/> RISCO</div>}
                                    {p.injured && <div className="absolute top-2 left-2 bg-slate-800 dark:bg-slate-600 text-white p-1.5 rounded-full z-10"><Icon name="medkit" size={14}/></div>}
                                    {inTransition && !p.injured && <div className="absolute top-2 left-2 bg-orange-500 text-white text-[9px] font-bold px-2 py-0.5 rounded-full z-10 flex items-center gap-1"><Icon name="activity" size={10} stroke="white"/> EM TRANSIÇÃO</div>}
                                    
                                    <div className="w-20 h-20 rounded-full bg-slate-100 dark:bg-slate-700 overflow-hidden relative border-2 shrink-0" style={{borderColor: p.injured ? '#1e293b' : inTransition ? '#f97316' : isRisk ? '#ef4444' : themeColor}}>
                                        {p.image ? <img src={p.image} className="w-full h-full object-cover object-top"/> : <div className="w-full h-full flex items-center justify-center text-slate-300 dark:text-slate-500"><Icon name="user" size={32}/></div>}
                                    </div>
                                    <div className="text-center w-full">
                                        <div className="font-bold text-slate-700 dark:text-slate-200 text-lg truncate">{p.name}</div>
                                        <div className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase mt-1 flex justify-center gap-2">{p.number && <span className="bg-slate-100 dark:bg-slate-700 px-1.5 rounded text-slate-600 dark:text-slate-300">#{p.number}</span>}<span>{p.position || 'Atleta'}</span></div>
                                    </div>
                                    
                                    <div className="border-t dark:border-slate-700 pt-2 w-full flex justify-center items-center gap-2">
                                        {p.injured && dmStatus ? (
                                            <div className="w-full text-center">
                                                <div className="text-[10px] font-black text-red-600 dark:text-red-400 uppercase mb-1">{dmStatus.location}</div>
                                                <div className="text-[9px] font-bold text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700 rounded px-2 py-1">{RTP_PHASES.find(ph=>ph.id==dmStatus.rtpPhase)?.label || 'Em tratamento'}</div>
                                            </div>
                                        ) : (
                                            <><MiniGauge value={loadPct} min={0} max={100} label="Carga 7 Dias" />{sleep >= 5 && <div className="text-red-500 bg-red-50 dark:bg-red-900/30 p-1 rounded-full" title="Sono Ruim"><Icon name="moon" size={12}/></div>}{soreness >= 5 && <div className="text-red-500 bg-red-50 dark:bg-red-900/30 p-1 rounded-full" title="Dor Alta"><Icon name="bolt" size={12}/></div>}</>
                                        )}
                                    </div>
                                </div>
                            ) 
                        })}
                        <button onClick={addP} className="bg-white dark:bg-slate-800 rounded-xl shadow border border-dashed border-slate-300 dark:border-slate-600 p-4 flex flex-col items-center justify-center gap-2 text-slate-400 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 hover:border-blue-500 dark:hover:border-blue-400 transition-all cursor-pointer h-40"><Icon name="plus" size={32}/><span className="font-bold text-sm">Adicionar Atleta</span></button>
                    </div>
                </div>
            );
        };

        const MedicalView = ({ players, setPlayers, dmRecords, setDmRecords, themeColor }) => {
            const [selectedPlayer, setSelectedPlayer] = useState('');
            const [injuryType, setInjuryType] = useState('Muscular');
            const [location, setLocation] = useState('');
            const [dateIn, setDateIn] = useState(getTodayStr());
            const [editingId, setEditingId] = useState(null); 
            const records = safeArray(dmRecords);
            const activeInjuries = records.filter(r => r && r.status === 'Active');
            const commonDiagnoses = [ "Estiramento Posterior Coxa", "Estiramento Quadríceps", "Estiramento Adutor", "Estiramento Panturrilha", "Entorse Tornozelo", "Entorse Joelho", "Trauma Direto (Pancada)", "Edema Muscular", "Tendinite Patelar", "Tendinite Aquiles", "Pubalgia", "Contratura Muscular", "Fratura", "Luxação Ombro", "Desconforto Muscular", "Gripe / Virose", "Outro" ];
            
            const handleSave = () => { if(selectedPlayer==='') return alert('Selecione um atleta'); if (editingId) { const updated = records.map(r => r.id === editingId ? { ...r, playerId: selectedPlayer, type: injuryType, location, dateIn } : r); setDmRecords(updated); setEditingId(null); showToast('Registro atualizado'); } else { const newRecord = { id: Date.now(), playerId: selectedPlayer, type: injuryType, location, dateIn, dateOut: null, status: 'Active', rtpPhase: 1 }; setDmRecords([newRecord, ...records]); const updatedPlayers = [...players]; if(updatedPlayers[selectedPlayer]) updatedPlayers[selectedPlayer].injured = true; setPlayers(updatedPlayers); showToast('Atleta no DM'); } setLocation(''); if (!editingId) setSelectedPlayer(''); };
            const handleEdit = (record) => { setEditingId(record.id); setSelectedPlayer(record.playerId); setInjuryType(record.type); setLocation(record.location); setDateIn(record.dateIn); };
            const handleDelete = (id, playerId, status) => { if(!confirm('Excluir?')) return; const newRecords = records.filter(r => r.id !== id); setDmRecords(newRecords); if (status === 'Active') { const hasOtherActive = newRecords.some(r => r.playerId == playerId && r.status === 'Active'); if (!hasOtherActive) { const updatedPlayers = [...players]; if(updatedPlayers[playerId]) updatedPlayers[playerId].injured = false; setPlayers(updatedPlayers); } } showToast('Excluído'); };
            const dischargePlayer = (recordId, playerId) => { if(!confirm('Dar alta?')) return; const updatedRecords = records.map(r => r.id === recordId ? { ...r, status: 'Recovered', dateOut: getTodayStr() } : r); setDmRecords(updatedRecords); const updatedPlayers = [...players]; if(updatedPlayers[playerId]) updatedPlayers[playerId].injured = false; setPlayers(updatedPlayers); showToast('Atleta liberado!'); };
            
            const renderReturnToPlayMap = () => (
                <div className="bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-200 dark:border-slate-700 p-4 mt-6">
                    <h3 className="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase mb-4 flex items-center gap-2">
                        <Icon name="activity"/> Mapa Return To Play
                    </h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                        {RTP_PHASES.map(ph => {
                            const isPhaseActive = activeInjuries.some(r => (parseInt(r.rtpPhase)||1) === ph.id);
                            return (
                                <div key={ph.id} className={`p-3 rounded-lg border transition-all ${isPhaseActive ? 'bg-blue-50 border-blue-500 dark:bg-blue-900/40 dark:border-blue-400 ring-2 ring-blue-500/50' : 'bg-slate-50 border-slate-200 dark:bg-slate-700 dark:border-slate-600'}`}>
                                    <div className={`text-xs font-black uppercase mb-1 ${isPhaseActive ? 'text-blue-600 dark:text-blue-400' : 'text-slate-700 dark:text-slate-300'}`}>{ph.label}</div>
                                    <div className="text-[10px] text-slate-500 dark:text-slate-400 leading-tight">{ph.desc}</div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            const renderDrAI = (phaseId) => { 
                const phase = RTP_PHASES.find(p => p.id === (parseInt(phaseId) || 1)) || RTP_PHASES[0];
                return (<div className="mt-2 flex gap-2 items-center bg-blue-50 dark:bg-blue-900/30 p-2 rounded text-[10px] text-blue-800 dark:text-blue-300"><Icon name="brain" size={14}/><span><strong>Dr. Virtual:</strong> {phase.desc}</span></div>); 
            };
            
            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in flex flex-col gap-6 custom-scroll" style={{ WebkitOverflowScrolling: 'touch' }}>
                    <div className="flex flex-col md:flex-row gap-6">
                        <div className="w-full md:w-1/3 bg-white dark:bg-slate-800 rounded-xl shadow p-6 border border-slate-200 dark:border-slate-700 h-fit">
                            <h2 className="text-xl font-bold flex items-center gap-2 mb-4 text-red-600 dark:text-red-500"><Icon name="medkit"/> {editingId ? 'Editar' : 'Entrada DM'}</h2>
                            <div className="flex justify-center mb-4"><div className="w-24 h-24 rounded-full bg-slate-100 overflow-hidden relative shadow-sm">{selectedPlayer!==''&&players[selectedPlayer]?.image?<img src={players[selectedPlayer].image} className="w-full h-full object-cover object-top"/>:<div className="w-full h-full flex items-center justify-center text-slate-300"><Icon name="user" size={40}/></div>}</div></div>
                            <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Atleta</label>
                            <select className="w-full border dark:border-slate-600 rounded p-2 mb-3 font-bold text-sm dark:bg-slate-700 dark:text-white" value={selectedPlayer} onChange={e=>setSelectedPlayer(e.target.value)} disabled={!!editingId}><option value="">Selecione...</option>{safeArray(players).map((p,i)=>{if(!p)return null; return <option key={i} value={i}>{p.name}</option>})}</select>
                            <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Tipo</label>
                            <select className="w-full border dark:border-slate-600 rounded p-2 mb-3 text-sm dark:bg-slate-700 dark:text-white" value={injuryType} onChange={e=>setInjuryType(e.target.value)}><option>Muscular</option><option>Articular</option><option>Trauma/Pancada</option><option>Fratura</option><option>Doença</option><option>Outro</option></select>
                            <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Diagnóstico</label>
                            <select className="w-full border dark:border-slate-600 rounded p-2 mb-3 text-sm dark:bg-slate-700 dark:text-white" value={location} onChange={e=>setLocation(e.target.value)}><option value="">Selecione...</option>{commonDiagnoses.map(d=><option key={d} value={d}>{d}</option>)}</select>
                            <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mt-2 block">Data Entrada</label>
                            <input type="date" className="w-full border dark:border-slate-600 rounded p-2 mb-4 text-sm dark:bg-slate-700 dark:text-white outline-none" value={dateIn || ''} onChange={e=>setDateIn(e.target.value)}/>
                            <div className="flex gap-2"><button onClick={handleSave} className="flex-1 bg-red-600 text-white font-bold py-3 rounded hover:bg-red-700">SALVAR NO DM</button></div>
                        </div>
                        <div className="flex-1 space-y-4">
                            <div className="bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-200 dark:border-slate-700 p-4">
                                <div className="flex justify-between items-center mb-4"><h3 className="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase flex items-center gap-2"><Icon name="activity"/> Tratamento (Ativos)</h3></div>
                                {activeInjuries.length===0?<div className="text-slate-400 text-sm text-center py-4">Nenhum atleta no DM.</div>:<div className="space-y-3">{activeInjuries.map((r,idx)=>{
                                    if(!r) return null;
                                    const progressPct=(((parseInt(r.rtpPhase)||1)/9)*100);
                                    const p = players[r.playerId];
                                    if(!p) return null;
                                    return(
                                        <div key={idx} className="p-3 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg shadow-sm mb-2 relative">
                                            <div className="flex justify-between items-start mb-2">
                                                <div className="flex gap-3">
                                                    <div className="w-12 h-12 rounded-full bg-slate-100 overflow-hidden border border-red-200">{p.image?<img src={p.image} className="w-full h-full object-cover object-top"/>:<Icon name="user" className="m-3 text-red-300"/>}</div>
                                                    <div><div className="font-bold text-slate-800 dark:text-slate-100 text-lg">{p.name}</div><div className="text-xs text-red-600 font-bold">{r.location}</div></div>
                                                </div>
                                                <button onClick={()=>dischargePlayer(r.id,r.playerId)} className="bg-green-500 text-white px-3 py-1.5 rounded text-xs font-bold shadow hover:bg-green-600">DAR ALTA</button>
                                            </div>
                                            <div className="bg-slate-50 dark:bg-slate-800 p-2 rounded border border-slate-100 dark:border-slate-700">
                                                <div className="text-[10px] font-bold text-slate-400 uppercase mb-1">Evolução Clínica</div>
                                                <select className="w-full text-xs font-bold border dark:border-slate-600 rounded p-1 mb-2 bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 outline-none" value={r.rtpPhase||1} onChange={(e)=>{const u=records.map(x=>x.id===r.id?{...x,rtpPhase:parseInt(e.target.value)}:x);setDmRecords(u);}}>
                                                    {RTP_PHASES.map(ph=>(<option key={ph.id} value={ph.id}>{ph.label}</option>))}
                                                </select>
                                                <div className="w-full h-2 bg-slate-200 dark:bg-slate-600 rounded-full overflow-hidden mb-2"><div className="h-full bg-blue-500 transition-all duration-500" style={{width:`${progressPct}%`}}></div></div>
                                                {renderDrAI(r.rtpPhase)}
                                            </div>
                                            <div className="absolute top-2 right-2 flex gap-1"><button onClick={()=>handleEdit(r)} className="text-slate-400 hover:text-blue-500"><Icon name="edit" size={14}/></button><button onClick={()=>handleDelete(r.id, r.playerId, r.status)} className="text-slate-400 hover:text-red-500"><Icon name="trash" size={14}/></button></div>
                                        </div>
                                    )
                                })}</div>}
                            </div>
                            
                            <div className="bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-200 dark:border-slate-700 p-6">
                                <h3 className="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase mb-4 flex items-center gap-2"><Icon name="list"/> Histórico Completo</h3>
                                <div className="overflow-x-auto custom-scroll" style={{ WebkitOverflowScrolling: 'touch' }}>
                                    <table className="w-full text-xs text-left">
                                        <thead className="bg-slate-50 dark:bg-slate-700 text-slate-500 dark:text-slate-300 uppercase"><tr><th className="p-3">Data</th><th className="p-3">Atleta</th><th className="p-3">Lesão</th><th className="p-3">Status</th></tr></thead>
                                        <tbody>{records.filter(r=>r && r.status!=='Active').map((r,i)=>{
                                            if(!r) return null;
                                            const p = players[r.playerId] || { name: 'Atleta Excluído' };
                                            return (
                                                <tr key={i} className="border-t dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700"><td className="p-3 text-slate-500 dark:text-slate-400">{formatDateBR(r.dateIn)}</td><td className="p-3 font-bold dark:text-slate-200">{p.name}</td><td className="p-3 dark:text-slate-300">{r.location}</td><td className="p-3"><span className="text-green-600 font-bold">RECUPERADO ({formatDateBR(r.dateOut)})</span></td></tr>
                                            )
                                        })}</tbody>
                                    </table>
                                </div>
                            </div>

                            {renderReturnToPlayMap()}

                        </div>
                    </div>
                </div>
            );
        };

        const MainApp = ({ user, initialData }) => {
            const [tab, setTab] = useState('assessment'); 
            const [themeColor, setThemeColor] = useState(initialData?.themeColor || '#1e3a8a');
            const [players, setPlayers] = useState(initialData?.players || []);
            const [trainingLog, setTrainingLog] = useState(initialData?.trainingLog || {});
            const [assessments, setAssessments] = useState(initialData?.assessments || {});
            const [dmRecords, setDmRecords] = useState(initialData?.dmRecords || []);
            const [matchMinutes, setMatchMinutes] = useState(initialData?.matchMinutes || {});
            const [header, setHeader] = useState(initialData?.header || {});
            const [logo, setLogo] = useState(initialData?.logo || null);
            const [days, setDays] = useState(safeArray(initialData?.days, DEFAULT_DAYS));
            const [darkMode, setDarkMode] = useState(initialData?.darkMode !== undefined ? initialData.darkMode : true);

            const [showSettings, setShowSettings] = useState(false);
            const [showNotifications, setShowNotifications] = useState(false);

            useEffect(() => { if(darkMode) document.body.classList.add('dark'); else document.body.classList.remove('dark'); }, [darkMode]);

            useEffect(() => {
                if(!user) return;
                const tId = setTimeout(() => {
                    db.collection('coachData').doc(user.uid).set({ themeColor, players, trainingLog, assessments, dmRecords, matchMinutes, header, logo, darkMode, days }, { merge: true });
                }, 2000); 
                return () => clearTimeout(tId);
            }, [themeColor, players, trainingLog, assessments, dmRecords, matchMinutes, header, logo, darkMode, days, user]);

            const activeAlerts = useMemo(() => {
                const today = getTodayStr(); let alerts = [];
                safeArray(players).forEach((p, i) => {
                    if(!p) return;
                    const logObj = trainingLog[today]?.[i] || {};
                    const wellness = safeObj(logObj.wellness);
                    if(Number(wellness.soreness) >= 5) alerts.push({ type: 'danger', icon: 'bolt', text: `${p.name} relatou dor aguda (Nível ${wellness.soreness}).`});
                    if(Number(wellness.sleep) >= 5) alerts.push({ type: 'warning', icon: 'moon', text: `${p.name} relatou sono ruim.`});
                    const todayLoad = calcDailyLoad(logObj);
                    if(todayLoad > 0) {
                        const historyDates = getDatesInRange(today, 7).slice(1); let chronicLoad = 0; 
                        historyDates.forEach(d => chronicLoad += calcDailyLoad(trainingLog[d]?.[i])); 
                        const avgLoad = (chronicLoad + todayLoad) / 7;
                        if(avgLoad > 0 && todayLoad > avgLoad * 1.5) alerts.push({ type: 'danger', icon: 'activity', text: `${p.name} com sobrecarga aguda hoje.`});
                    }
                });
                return alerts;
            }, [players, trainingLog, dmRecords, matchMinutes]);

            return (
                <div className="flex flex-col h-full bg-slate-100 dark:bg-slate-900 transition-colors duration-300">
                    <SettingsModal show={showSettings} onClose={()=>setShowSettings(false)} themeColor={themeColor} setThemeColor={setThemeColor} header={header} setHeader={setHeader} logo={logo} setLogo={setLogo} onExport={()=>{}} onImport={()=>{}} />
                    {showNotifications && <NotificationCenter alerts={activeAlerts} onClose={()=>setShowNotifications(false)} />}
                    <div className="bg-white dark:bg-slate-800 p-2 flex justify-between items-center shadow-sm shrink-0 px-4 border-b dark:border-slate-700">
                        <div className="font-black text-xl italic text-slate-800 dark:text-white"><span style={{color: themeColor}}>PRO</span>COACH <span className="text-[9px] bg-slate-800 dark:bg-slate-200 text-white dark:text-slate-800 px-1.5 py-0.5 rounded ml-1">V149 MAX</span></div>
                        <div className="flex gap-1">
                            <button onClick={()=>{showToast("A atualizar..."); setTimeout(()=>window.location.reload(),500);}} className="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded"><Icon name="refresh" size={20}/></button>
                            <button onClick={()=>setShowNotifications(true)} className="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded relative"><Icon name="bell" size={20}/>{activeAlerts.length > 0 && <span className="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-red-500 rounded-full"></span>}</button>
                            <button onClick={()=>setDarkMode(!darkMode)} className="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded"><Icon name={darkMode?"sun":"moon"} size={20}/></button>
                            <button onClick={()=>setShowSettings(true)} className="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded" style={{color: themeColor}}><Icon name="settings" size={24}/></button>
                            <button onClick={()=>auth.signOut().then(()=>window.location.reload())} className="p-2 text-red-500 hover:bg-red-100 dark:hover:bg-red-900/30 rounded"><Icon name="logout" size={20}/></button>
                        </div>
                    </div>
                    
                    <div className="flex bg-slate-100 dark:bg-slate-900 p-1 gap-1 overflow-x-auto shadow-inner custom-scroll border-b dark:border-slate-700" style={{ WebkitOverflowScrolling: 'touch' }}>
                        {['squad','micro','pse','assessment','dm'].map(t=>(<button key={t} onClick={()=>setTab(t)} className={`px-4 py-2 rounded text-xs font-bold shrink-0 transition-colors ${tab===t?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500 uppercase hover:bg-slate-200 dark:hover:bg-slate-800'}`}>{t}</button>))}
                    </div>
                    
                    <div className="flex-1 overflow-hidden relative">
                        {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} />}
                        {tab === 'micro' && <MicrocycleView days={days} setDays={setDays} themeColor={themeColor} players={players} trainingLog={trainingLog} />}
                        {tab === 'pse' && <PSEView players={players} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} />}
                        {tab === 'assessment' && <AssessmentView players={players} themeColor={themeColor} assessments={assessments} setAssessments={setAssessments} dmRecords={dmRecords} />}
                        {tab === 'dm' && <MedicalView players={players} setPlayers={setPlayers} dmRecords={dmRecords} setDmRecords={setDmRecords} themeColor={themeColor} />}
                    </div>
                </div>
            );
        };

        const CloudWrapper = ({ user }) => {
            const [init, setInit] = useState(null); const [l, setL] = useState(true);
            useEffect(() => {
                let isRes = false;
                const fallback = setTimeout(() => { if(!isRes) { setInit(sanitizeCloudData({})); setL(false); } }, 3000); 
                const unsub = db.collection('coachData').doc(user.uid).onSnapshot(d => {
                    isRes = true; setInit(sanitizeCloudData(d.exists ? d.data() : {})); setL(false);
                }, () => { isRes = true; setInit(sanitizeCloudData({})); setL(false); });
                return () => { clearTimeout(fallback); unsub(); };
            }, [user]);

            if (l) return (
                <div className="flex flex-col h-screen w-screen items-center justify-center bg-slate-900 text-slate-300">
                    <svg className="animate-spin h-10 w-10 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
                    <div className="font-bold text-xl">A Sincronizar Nuvem...</div>
                </div>
            );
            return <ErrorBoundary><MainApp user={user} initialData={init} /></ErrorBoundary>;
        };

        const RootApp = () => {
            const [user, setUser] = useState(null); const [loading, setLoading] = useState(true);
            useEffect(() => { auth.onAuthStateChanged(u => { setUser(u); setLoading(false); const ld = document.getElementById('loading-state'); if(ld) ld.style.display='none'; }); }, []);
            if (loading) return null;
            if (!user) return <LoginScreen onLogin={()=>{}} />;
            return <CloudWrapper user={user} />;
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<RootApp />);
    </script>
</body>
</html>
