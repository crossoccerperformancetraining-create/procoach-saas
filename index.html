    <style>

        body.dark { background-color: #0f172a; color: #f8fafc; }

        .dashed-btn { border: 2px dashed #cbd5e1; color: #94a3b8; font-weight: bold; font-size: 9px; width: 100%; padding: 4px; border-radius: 6px; transition: all 0.2s; }
        .dark .dashed-btn { border-color: #475569; color: #cbd5e1; }
        .dashed-btn:hover { border-color: #1a4a3e; color: #1a4a3e; background-color: #f0fdf4; }
        .dark .dashed-btn:hover { border-color: #10b981; color: #10b981; background-color: rgba(16, 185, 129, 0.1); }
        .gauge-container { width: 220px; height: 110px; overflow: hidden; position: relative; margin: 0 auto; }
        .gauge-needle { width: 4px; height: 100px; background: #475569; position: absolute; left: 108px; top: 10px; transform-origin: bottom center; transition: transform 0.5s cubic-bezier(0.4, 2.08, 0.55, 0.44); border-radius: 2px; z-index: 10; }
        .dark .gauge-needle { background: #e2e8f0; }
        .gauge-center { width: 16px; height: 16px; background: #334155; border-radius: 50%; position: absolute; bottom: -8px; left: 102px; z-index: 11; }
        .dark .gauge-center { background: #cbd5e1; }

        .mini-gauge-needle { width: 2px; height: 35px; background: #334155; position: absolute; left: 39px; top: 5px; transform-origin: bottom center; transition: transform 0.5s ease-out; border-radius: 1px; z-index: 10; }
        .dark .mini-gauge-needle { background: #cbd5e1; }
        @media print { .no-print { display: none !important; } .page-break { page-break-inside: avoid; } body { background: white !important; color: black !important; -webkit-print-color-adjust: exact; } * { color: black !important; } #print-area { padding: 0; } .overflow-y-auto { overflow: visible !important; height: auto !important; } }
        #loading-state { display: flex; height: 100vh; width: 100vw; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #64748b; flex-direction: column; gap: 10px; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; z-index: 9999; display: none; font-size: 12px; font-weight: bold; white-space: nowrap; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-badge { position: absolute; top: 10px; right: 10px; background: #dcfce7; color: #166534; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .status-badge.show { opacity: 1; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }

<body class="h-screen w-screen overflow-hidden flex flex-col safe-area-inset">
    <div id="toast"></div>
    <div id="root" class="h-full w-full"><div id="loading-state">A Iniciar Sistema V144 MAX...</div></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- CONSTANTS ---
        const DEFAULT_DAYS = [
            { id: 1, md: 'MD-4', name: 'SEGUNDA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 2, md: 'MD-3', name: 'TERÇA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 3, md: 'MD-2', name: 'QUARTA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 4, md: 'MD-1', name: 'QUINTA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 5, md: 'JOGO', name: 'SEXTA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 6, md: 'MD+1', name: 'SÁBADO', date:'', plannedMins: '', am: [], pm: [] },
            { id: 7, md: 'MD+2', name: 'DOMINGO', date:'', plannedMins: '', am: [], pm: [] }
        ];

        const RTP_PHASES = [ 
            {id:1, label:"Fase 1: Aguda", desc:"Controle do quadro álgico/inflamatório. Fisioterapia."}, 
            {id:2, label:"Fase 2: Sub-aguda", desc:"Reabilitação do segmento lesado + Fortalecimento não envolvidos. Fisioterapia."}, 
            {id:3, label:"Fase 3: Transição I", desc:"Força segmentada (não envolvidos) + Cardio sem impacto. Fisio + Transição."}, 
            {id:4, label:"Fase 4: Transição II", desc:"Funcionais + cardio sem impacto. Força com restrição. Introdução Pliometria/Corrida."}, 
            {id:5, label:"Fase 5: Transição III", desc:"Força sem restrições funcionais. Cardio com impacto. Fisio + Transição Campo."}, 
            {id:6, label:"Fase 6: Performance I", desc:"Potência na Academia. Aceleração e Pliometria sem restrições."}, 
            {id:7, label:"Fase 7: Performance II", desc:"Potência especifica do esporte. Preparação individual e parcial com grupo."}, 
            {id:8, label:"Fase 8: Performance III", desc:"Retorno ao grupo com minutagem controlada em jogo. Liberado treino com o grupo sem restrições."}, 
            {id:9, label:"Fase 9: Liberação", desc:"Responsabilidade do atleta com cuidados antes e após treinos e jogos."} 
        ];

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco",
            authDomain: "prosaude-e9130.firebaseapp.com",
            projectId: "prosaude-e9130",
            storageBucket: "prosaude-e9130.firebasestorage.app",
            messagingSenderId: "999318121562",
            appId: "1:999318121562:web:1f192d4c0f14a64fb57c63"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();
        db.enablePersistence().catch((err) => { console.warn("Offline Persistence Error:", err.code); });

        // --- HELPER FUNCTIONS ---
        const showToast = (msg, color = '#333') => { const t = document.getElementById('toast'); if(t){ t.innerText = msg; t.style.backgroundColor = color; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); } };
        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const safeObj = (obj) => (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
        const safeArray = (arr, fallback=[]) => (Array.isArray(arr)) ? arr : fallback;
        const getWSum = (w) => (w && typeof w === 'object') ? Object.values(w).reduce((a, b) => Number(a) + Number(b), 0) || 0 : 0;
        const calcDailyLoad = (log) => { if(!log) return 0; const rpe = (Number(log.rpe_am)||0) + (Number(log.rpe_pm)||0); const dur = Number(log.duration) || 0; return rpe * (dur > 0 ? dur : 60); };

        const sanitizeCloudData = (data) => {
            if (!data || typeof data !== 'object') return {};
            return {
                themeColor: data.themeColor || '#1e3a8a',
                players: safeArray(data.players).map(p => safeObj(p)),
                trainingLog: safeObj(data.trainingLog),
                assessments: safeObj(data.assessments),
                dmRecords: safeArray(data.dmRecords),
                matchMinutes: safeObj(data.matchMinutes),
                header: safeObj(data.header),
                logo: data.logo || null,
                darkMode: !!data.darkMode,
                plan: data.plan || 'starter',
                days: safeArray(data.days, DEFAULT_DAYS),
                exercises: safeArray(data.exercises),
                library: safeArray(data.library),
                postWorkout: data.postWorkout || 'Bota Pneumática (15 min)'
            };
        };

        // --- COMPONENTS ---
        const Icon = ({ name, size=18, className="" }) => {
            const icons = {
                calendar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
                list: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
                smile: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>,
                plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                image: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
                user: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
                alert: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
                trophy: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8 21h8m-4-9v9"/><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/><path d="M7 2v16"/><path d="M17 2v16"/></svg>,
                check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>,
                save: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
                settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
                medkit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>,
                x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
                logout: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            };
            return <span className={className}>{icons[name] || null}</span>;
        };

        const BufferedInput = ({ value, onSave, className, placeholder, type="text" }) => { 
            const [localVal, setLocalVal] = useState(value); 
            useEffect(() => setLocalVal(value), [value]); 
            return (<input type={type} className={className} value={localVal} placeholder={placeholder} onChange={(e) => setLocalVal(e.target.value)} onBlur={() => { if(localVal !== value) onSave(localVal); }} />); 
        };

        const LoginScreen = ({ onLogin }) => {
            const [email, setEmail] = useState('crossoccerperformancetraining@gmail.com');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const handleLogin = (e) => { e.preventDefault(); auth.signInWithEmailAndPassword(email, password).then(onLogin).catch(() => setError('Acesso negado.')); };
            return (
                <div className="flex h-screen w-full items-center justify-center bg-slate-900 px-4 animate-fade-in"><div className="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-sm border border-slate-700"><div className="text-center mb-6"><h1 className="text-3xl font-black text-white italic tracking-wider"><span className="text-blue-500">PRO</span>COACH</h1><p className="text-slate-400 text-xs mt-1 uppercase font-bold">Cloud Sync Edition</p></div>{error && <div className="bg-red-500/20 border border-red-500 text-red-300 text-xs p-3 rounded-lg mb-4 text-center">{error}</div>}<form onSubmit={handleLogin} className="space-y-4"><div><label className="text-[10px] font-bold text-slate-400 uppercase mb-1 block">E-mail</label><input type="email" required value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-slate-900 border border-slate-700 text-white p-3 rounded-lg outline-none focus:border-blue-500 transition-colors" /></div><div><label className="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Senha</label><input type="password" required value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-slate-900 border border-slate-700 text-white p-3 rounded-lg outline-none focus:border-blue-500 transition-colors" /></div><button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg transition-colors mt-4">ENTRAR NO SISTEMA</button></form></div></div>
            );
        };

        // --- MAIN APP ---
        const MainApp = ({ user, initialData }) => {
            const [tab, setTab] = useState('squad'); 
            const [players, setPlayers] = useState(initialData.players || []);
            const [trainingLog, setTrainingLog] = useState(initialData.trainingLog || {});
            const [dmRecords, setDmRecords] = useState(initialData.dmRecords || []);
            const [exercises, setExercises] = useState(initialData.exercises || []);
            const [library, setLibrary] = useState(initialData.library || []);
            const [darkMode, setDarkMode] = useState(initialData.darkMode || false);
            const [themeColor, setThemeColor] = useState(initialData.themeColor || '#1e3a8a');
            const [syncStatus, setSyncStatus] = useState('');

            useEffect(() => {
                const timeoutId = setTimeout(() => {
                    setSyncStatus('A Guardar...');
                    db.collection('coachData').doc(user.uid).set({ ...initialData, players, trainingLog, dmRecords, exercises, library, darkMode, themeColor }, { merge: true })
                        .then(() => { setSyncStatus('☁️ Sincronizado'); setTimeout(() => setSyncStatus(''), 2000); });
                }, 2000); 
                return () => clearTimeout(timeoutId);
            }, [players, trainingLog, dmRecords, exercises, library, darkMode, themeColor]);

            return (
                <div className={`flex flex-col h-full ${darkMode ? 'dark' : ''}`}>
                    <div className="bg-white dark:bg-slate-800 border-b dark:border-slate-700 p-2 px-4 flex justify-between items-center shadow-sm shrink-0">
                        <div className="font-black text-xl italic text-slate-800 dark:text-white" style={{color: themeColor}}>PROCOACH V144</div>
                        <div className="flex gap-2 items-center">
                            {syncStatus && <span className="text-[10px] text-slate-400">{syncStatus}</span>}
                            <button onClick={() => setDarkMode(!darkMode)}><Icon name={darkMode ? "sun" : "moon"}/></button>
                            <button onClick={() => auth.signOut().then(() => window.location.reload())} className="text-red-500"><Icon name="logout"/></button>
                        </div>
                    </div>

                    <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-lg gap-1 overflow-x-auto shadow-inner w-full">
                        <button onClick={()=>setTab('squad')} className={`px-4 py-2 rounded text-xs font-bold ${tab==='squad'?'bg-white shadow text-slate-800':'text-slate-500'}`}>ELENCO</button>
                        <button onClick={()=>setTab('wellness')} className={`px-4 py-2 rounded text-xs font-bold ${tab==='wellness'?'bg-white shadow text-slate-800':'text-slate-500'}`}>WELLNESS</button>
                        <button onClick={()=>setTab('workout')} className={`px-4 py-2 rounded text-xs font-bold ${tab==='workout'?'bg-white shadow text-slate-800':'text-slate-500'}`}>TREINO</button>
                        <button onClick={()=>setTab('library')} className={`px-4 py-2 rounded text-xs font-bold ${tab==='library'?'bg-purple-600 text-white':'text-purple-500'}`}>BIBLIOTECA</button>
                    </div>

                    <div className="flex-1 overflow-hidden bg-slate-50 dark:bg-slate-900">
                        {tab === 'squad' && <div className="p-4 text-slate-800 dark:text-white font-bold">Módulo de Elenco Ativo.</div>}
                        {tab === 'wellness' && <div className="p-4 text-slate-800 dark:text-white font-bold">Módulo Wellness Ativo.</div>}
                        {tab === 'workout' && <div className="p-4 text-slate-800 dark:text-white font-bold">Gerador de Treinos Ativo.</div>}
                        {tab === 'library' && <div className="p-4 text-slate-800 dark:text-white font-bold">Biblioteca de GIFs Ativa.</div>}
                    </div>
                </div>
            );
        };

        const RootApp = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [data, setData] = useState(null);

            useEffect(() => {
                auth.onAuthStateChanged(u => {
                    setUser(u);
                    if (u) {
                        db.collection('coachData').doc(u.uid).get().then(doc => {
                            setData(sanitizeCloudData(doc.data()));
                            setLoading(false);
                            document.getElementById('loading-state').style.display = 'none';
                        });
                    } else {
                        setLoading(false);
                        document.getElementById('loading-state').style.display = 'none';
                    }
                });
            }, []);

            if (loading) return null;
            return user ? <MainApp user={user} initialData={data} /> : <LoginScreen />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
