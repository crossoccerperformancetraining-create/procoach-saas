const ExecutiveDecisionPanel = ({ players, trainingLog, dmRecords, attendanceLog, days, assessments, matchMinutes, onNavigate }) => {
    const today = getTodayStr();
    const safePlayers = safeArray(players);
    const todayIndex = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
    const todayPlan = safeArray(days, DEFAULT_DAYS)[todayIndex] || {};
    const todayData = safeObj(trainingLog[today]);
    const responses = safePlayers.filter((_, index) => safeObj(todayData[index]?.wellness).sleep).length;
    const dataQuality = safePlayers.length ? Math.round((responses / safePlayers.length) * 100) : 0;
    const available = safePlayers.filter((player, index) => {
        const status = attendanceLog?.[today]?.[index];
        return player && !player.injured && !player.suspended && !['A','J','DM'].includes(status);
    });
    const readinessValues = safePlayers.map((_, index) => safeObj(todayData[index]?.wellness)).filter(w => w.sleep).map(w => {
        const burden = ['sleep','stress','fatigue','soreness','mood'].reduce((sum, key) => sum + (Number(w[key]) || 1), 0);
        return Math.max(0, Math.round(100 - ((burden - 5) / 30) * 100));
    });
    const readiness = readinessValues.length ? Math.round(readinessValues.reduce((a,b) => a+b, 0) / readinessValues.length) : 0;
    const realLoads = safePlayers.map((_, index) => calcDailyLoad(todayData[index])).filter(Boolean);
    const actualLoad = realLoads.length ? Math.round(realLoads.reduce((a,b)=>a+b,0) / realLoads.length) : 0;
    const targetMinutes = todayPlan.md?.includes('JOGO') ? 90 : todayPlan.md?.includes('MD-3') ? 65 : todayPlan.md?.includes('MD-2') ? 45 : todayPlan.md?.includes('MD-1') ? 35 : 60;
    const targetPse = todayPlan.md?.includes('JOGO') ? 10 : todayPlan.md?.includes('MD-3') ? 8 : todayPlan.md?.includes('MD-1') ? 3 : 6;
    const targetLoad = targetMinutes * targetPse;
    const activeDm = safeArray(dmRecords).filter(record => record?.status === 'Active');
    const alerts = [];
    safePlayers.forEach((player, index) => {
        if (!player) return;
        const wellness = safeObj(todayData[index]?.wellness);
        if (player.injured) alerts.push({ level: 'red', text: `${player.name}: indisponível no DM` });
        else if ((Number(wellness.soreness)||0) >= 6) alerts.push({ level: 'red', text: `${player.name}: dor muscular elevada` });
        else if ((Number(wellness.fatigue)||0) >= 6 || (Number(wellness.sleep)||0) >= 6) alerts.push({ level: 'yellow', text: `${player.name}: prontidão reduzida` });
        if (!wellness.sleep) alerts.push({ level: 'slate', text: `${player.name}: wellness pendente` });
    });
    const positions = available.reduce((acc, player) => {
        const key = player.position || player.pos || 'Sem posição';
        acc[key] = (acc[key] || 0) + 1;
        return acc;
    }, {});
    const card = (label, value, subtitle, tone, icon) => (
        <div className={`rounded-2xl border p-4 shadow-sm ${tone}`}>
            <div className="flex justify-between items-start"><div><div className="text-[9px] font-black uppercase tracking-widest opacity-70">{label}</div><div className="text-3xl font-black mt-1">{value}</div><div className="text-[10px] font-bold opacity-70 mt-1">{subtitle}</div></div><Icon name={icon} size={28} className="opacity-30"/></div>
        </div>
    );
    return (
        <div className="mb-6 space-y-4">
            <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-3">
                <div><h3 className="text-sm font-black uppercase dark:text-white">Central de Decisão</h3><p className="text-[10px] text-slate-500 font-bold uppercase">Indicadores que exigem ação da comissão hoje</p></div>
                <div className="flex flex-wrap gap-2">
                    <button onClick={()=>onNavigate?.('profile360')} className="bg-slate-800 text-white px-3 py-2 rounded-lg text-[10px] font-black uppercase">Perfil 360º</button>
                    <button onClick={()=>onNavigate?.('reports')} className="bg-blue-600 text-white px-3 py-2 rounded-lg text-[10px] font-black uppercase">Relatório semanal</button>
                    <button onClick={()=>onNavigate?.('workout')} className="bg-emerald-600 text-white px-3 py-2 rounded-lg text-[10px] font-black uppercase">Montar treino</button>
                </div>
            </div>
            <div className="grid grid-cols-2 xl:grid-cols-4 gap-3">
                {card('Prontidão média', readiness ? `${readiness}%` : '-', `${readinessValues.length} respostas válidas`, readiness >= 75 ? 'bg-emerald-50 dark:bg-emerald-900/20 border-emerald-200 dark:border-emerald-800 text-emerald-700 dark:text-emerald-300' : 'bg-yellow-50 dark:bg-yellow-900/20 border-yellow-200 dark:border-yellow-800 text-yellow-700 dark:text-yellow-300', 'activity')}
                {card('Disponíveis', `${available.length}/${safePlayers.length}`, `${activeDm.length} no departamento médico`, 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800 text-blue-700 dark:text-blue-300', 'user')}
                {card('Carga do dia', actualLoad || '-', `Meta estimada: ${targetLoad} U.A.`, actualLoad > targetLoad * 1.15 ? 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800 text-red-700 dark:text-red-300' : 'bg-orange-50 dark:bg-orange-900/20 border-orange-200 dark:border-orange-800 text-orange-700 dark:text-orange-300', 'barChart')}
                {card('Qualidade dos dados', `${dataQuality}%`, `${responses}/${safePlayers.length} wellness preenchidos`, dataQuality >= 90 ? 'bg-emerald-50 dark:bg-emerald-900/20 border-emerald-200 dark:border-emerald-800 text-emerald-700 dark:text-emerald-300' : 'bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300', 'check')}
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                <div className="lg:col-span-2 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-4 shadow-sm">
                    <div className="flex justify-between items-center mb-3"><h4 className="text-[10px] font-black uppercase text-slate-500">Central de alertas</h4><span className="text-[9px] font-bold bg-slate-100 dark:bg-slate-700 dark:text-slate-300 px-2 py-1 rounded-full">{alerts.length} sinais</span></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2 max-h-40 overflow-y-auto custom-scroll">
                        {alerts.length ? alerts.slice(0,10).map((alert,index)=><div key={index} className={`text-[10px] font-bold p-2 rounded-lg border ${alert.level==='red'?'bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-300 border-red-200 dark:border-red-800':alert.level==='yellow'?'bg-yellow-50 dark:bg-yellow-900/20 text-yellow-700 dark:text-yellow-300 border-yellow-200 dark:border-yellow-800':'bg-slate-50 dark:bg-slate-900 text-slate-500 border-slate-200 dark:border-slate-700'}`}>{alert.text}</div>) : <div className="text-xs text-emerald-600 font-bold">Nenhum alerta crítico identificado.</div>}
                    </div>
                </div>
                <div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-4 shadow-sm">
                    <h4 className="text-[10px] font-black uppercase text-slate-500 mb-3">Disponibilidade por posição</h4>
                    <div className="space-y-2">{Object.entries(positions).length ? Object.entries(positions).sort((a,b)=>b[1]-a[1]).slice(0,7).map(([position,count])=><div key={position} className="flex justify-between text-[10px] font-bold dark:text-slate-300"><span className="truncate">{position}</span><span className="bg-slate-100 dark:bg-slate-700 px-2 rounded">{count}</span></div>) : <div className="text-xs text-slate-400">Cadastre as posições do elenco.</div>}</div>
                </div>
            </div>
        </div>
    );
};

const Player360View = ({ players, trainingLog, assessments, dmRecords, attendanceLog, matchMinutes, themeColor }) => {
    const safePlayers = safeArray(players);
    const [selectedIndex, setSelectedIndex] = useState(0);
    const [searchPlayer, setSearchPlayer] = useState('');
    useEffect(() => { if (selectedIndex >= safePlayers.length) setSelectedIndex(0); }, [safePlayers.length]);
    const visiblePlayers = safePlayers.map((item, index) => ({ item, index })).filter(({ item }) => String(item?.name || '').toLowerCase().includes(searchPlayer.toLowerCase()));
    const player = safePlayers[selectedIndex];
    if (!player) return <div className="p-8 text-center text-slate-500">Cadastre um atleta para abrir o Perfil 360º.</div>;
    const today = getTodayStr();
    const dates7 = getDatesInRange(today, 7);
    const dates28 = getDatesInRange(today, 28);
    const loads7 = dates7.map(date => calcDailyLoad(trainingLog?.[date]?.[selectedIndex]));
    const loads28 = dates28.map(date => calcDailyLoad(trainingLog?.[date]?.[selectedIndex]));
    const total7 = loads7.reduce((a,b)=>a+b,0);
    const total28 = loads28.reduce((a,b)=>a+b,0);
    const acuteChronic = total28 > 0 ? Number((total7 / (total28 / 4)).toFixed(2)) : 0;
    const wellnessEntries = dates7.map(date => safeObj(trainingLog?.[date]?.[selectedIndex]?.wellness)).filter(w => w.sleep);
    const avgWellness = key => wellnessEntries.length ? (wellnessEntries.reduce((sum,w)=>sum+(Number(w[key])||0),0)/wellnessEntries.length).toFixed(1) : '-';
    const painCounts = {};
    dates28.forEach(date => safeArray(trainingLog?.[date]?.[selectedIndex]?.painZones).forEach(zone => painCounts[zone]=(painCounts[zone]||0)+1));
    const frequentPain = Object.entries(painCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

};

const ReportsView = ({ players, trainingLog, dmRecords, attendanceLog, matchMinutes, header, logo, themeColor }) => {
    const [endDate, setEndDate] = useState(getTodayStr());
    const dates = getDatesInRange(endDate, 7).reverse();
    const safePlayers = safeArray(players);
    const activeDm = safeArray(dmRecords).filter(record=>record?.status==='Active');
    const dailyRows = dates.map(date => {
        const logs = safeObj(trainingLog[date]);
        const loads = safePlayers.map((_,index)=>calcDailyLoad(logs[index])).filter(Boolean);
        const responses = safePlayers.filter((_,index)=>safeObj(logs[index]?.wellness).sleep).length;
        const attendance = safePlayers.map((_,index)=>attendanceLog?.[date]?.[index]).filter(Boolean);
        const present = attendance.filter(status=>['P','T'].includes(status)).length;
        return { date, avgLoad: loads.length?Math.round(loads.reduce((a,b)=>a+b,0)/loads.length):0, responses, present, attendanceCount: attendance.length };
    });
    const avgLoad = Math.round(dailyRows.reduce((sum,row)=>sum+row.avgLoad,0) / Math.max(1,dailyRows.filter(row=>row.avgLoad>0).length));
    const responseTotal = dailyRows.reduce((sum,row)=>sum+row.responses,0);
    const possibleResponses = safePlayers.length * dates.length;
    const adherence = possibleResponses ? Math.round((responseTotal/possibleResponses)*100) : 0;
    const presentTotal = dailyRows.reduce((sum,row)=>sum+row.present,0);
    const attendanceTotal = dailyRows.reduce((sum,row)=>sum+row.attendanceCount,0);
    const attendanceRate = attendanceTotal ? Math.round((presentTotal/attendanceTotal)*100) : 0;
    const alerts = safePlayers.map((player,index)=>{
        const last = safeObj(trainingLog?.[endDate]?.[index]?.wellness);
        const load7 = dates.reduce((sum,date)=>sum+calcDailyLoad(trainingLog?.[date]?.[index]),0);
        const reasons=[];
        if(player.injured) reasons.push('DM');
        if((Number(last.soreness)||0)>=6) reasons.push('dor alta');
        if((Number(last.fatigue)||0)>=6) reasons.push('fadiga alta');
        if(load7>=3000) reasons.push('carga semanal alta');
        return reasons.length?{name:player.name,reasons}:null;
    }).filter(Boolean);
    const reportText = `*RELATÓRIO SEMANAL PROCOACH*\nEquipe: ${header?.teamName || 'Equipe'}\nPeríodo: ${formatDateBR(dates[0])} a ${formatDateBR(endDate)}\n\nCarga média diária: ${avgLoad || '-'} U.A.\nAdesão ao wellness: ${adherence}%\nFrequência registrada: ${attendanceRate || '-'}%\nAtletas no DM: ${activeDm.length}\nAlertas: ${alerts.length}\n\n${alerts.length?'Atenção:\n'+alerts.map(a=>`• ${a.name}: ${a.reasons.join(', ')}`).join('\n'):'Nenhum alerta prioritário.'}`;
    const copyReport = async () => { try { await navigator.clipboard.writeText(reportText); showToast('Relatório copiado para o WhatsApp!', '#10b981'); } catch(e) { alert(reportText); } };
    return (
        <div className="h-full overflow-y-auto bg-slate-50 dark:bg-slate-900 p-4 md:p-6 custom-scroll pb-32">
            <div id="executive-report" className="max-w-6xl mx-auto space-y-5">
                <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4"><div className="flex items-center gap-4">{logo?<img src={logo} className="w-14 h-14 object-contain"/>:<div className="w-14 h-14 rounded-xl flex items-center justify-center text-white" style={{backgroundColor:themeColor}}><Icon name="barChart" size={28}/></div>}<div><div className="text-[10px] uppercase font-black text-slate-400">Inteligência e relatórios</div><h2 className="text-2xl font-black uppercase dark:text-white">Resumo Executivo Semanal</h2><div className="text-xs font-bold text-slate-500">{header?.teamName || 'ProCoach'} · {formatDateBR(dates[0])} a {formatDateBR(endDate)}</div></div></div><div className="flex flex-wrap gap-2 no-print"><input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} className="border dark:border-slate-600 rounded-lg px-3 py-2 text-xs font-bold dark:bg-slate-700 dark:text-white"/><button onClick={copyReport} className="bg-emerald-600 text-white rounded-lg px-4 py-2 text-[10px] font-black uppercase">Copiar resumo</button><button onClick={()=>window.print()} className="bg-slate-800 text-white rounded-lg px-4 py-2 text-[10px] font-black uppercase">Imprimir / PDF</button></div></div>
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">{[['Carga média',avgLoad?`${avgLoad} U.A.`:'-','Média diária do elenco'],['Adesão wellness',`${adherence}%`,`${responseTotal}/${possibleResponses} respostas`],['Frequência',attendanceRate?`${attendanceRate}%`:'-','Registros da semana'],['Disponibilidade',`${safePlayers.length-activeDm.length}/${safePlayers.length}`,`${activeDm.length} atletas no DM`]].map(([label,value,detail])=><div key={label} className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-4 shadow-sm"><div className="text-[9px] uppercase font-black text-slate-400">{label}</div><div className="text-3xl font-black dark:text-white mt-1">{value}</div><div className="text-[9px] font-bold text-slate-500 mt-1">{detail}</div></div>)}</div>
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4"><div className="lg:col-span-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5 shadow-sm"><h3 className="text-xs font-black uppercase dark:text-white mb-4">Indicadores por dia</h3><div className="overflow-x-auto"><table className="w-full text-xs"><thead><tr className="text-left text-[9px] uppercase text-slate-400 border-b dark:border-slate-700"><th className="py-2">Data</th><th>Carga média</th><th>Wellness</th><th>Presentes</th></tr></thead><tbody>{dailyRows.map(row=><tr key={row.date} className="border-b dark:border-slate-700 dark:text-slate-300"><td className="py-3 font-bold">{formatDateBR(row.date)}</td><td>{row.avgLoad || '-'}</td><td>{row.responses}/{safePlayers.length}</td><td>{row.attendanceCount?`${row.present}/${row.attendanceCount}`:'-'}</td></tr>)}</tbody></table></div></div><div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5 shadow-sm"><h3 className="text-xs font-black uppercase dark:text-white mb-4">Prioridades da comissão</h3><div className="space-y-2 max-h-72 overflow-y-auto custom-scroll">{alerts.length?alerts.map(alert=><div key={alert.name} className="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-3"><div className="text-[10px] font-black text-red-700 dark:text-red-300">{alert.name}</div><div className="text-[9px] text-red-600 dark:text-red-400 mt-1">{alert.reasons.join(' · ')}</div></div>):<div className="text-xs font-bold text-emerald-600">Nenhum alerta prioritário nesta semana.</div>}</div></div></div>
                <div className="bg-slate-900 text-white rounded-2xl p-5 shadow-xl"><div className="text-[10px] font-black uppercase text-blue-300 mb-2">Conclusão automática baseada nos registros</div><p className="text-sm font-medium leading-relaxed">{adherence<70?'A qualidade dos dados está baixa; priorize a adesão ao wellness antes de decisões mais sensíveis. ':''}{avgLoad>600?'A carga média semanal ficou elevada; considere recuperação e controle de volume. ':avgLoad>0?'A carga registrada permaneceu em uma faixa operacional moderada. ':'Ainda não há carga suficiente registrada. '}{activeDm.length?`${activeDm.length} atleta(s) permanecem no departamento médico e exigem acompanhamento de retorno. `:'O elenco não possui lesões ativas registradas. '}{alerts.length?'Revise os atletas destacados antes do próximo treino ou convocação.':'Não foram identificados alertas prioritários nos critérios atuais.'}</p><div className="text-[9px] text-slate-400 mt-3">Este resumo apoia a decisão profissional; não substitui avaliação médica, fisiológica ou técnica.</div></div>
            </div>
        </div>
    );
};

  const DashboardView = ({ players, days, trainingLog, dmRecords, themeColor, attendanceLog, trainingStatus, assessments, matchMinutes, nextGame, setNextGame, header, setHeader, onNavigate }) => {

        if (!md) return 0;

        if (md.includes('MD-4')) return 75;
        if (md.includes('MD-3')) return 65;
        if (md.includes('MD-2')) return 45;
        if (md.includes('MD-1')) return 35;
        if (md.includes('JOGO')) return 90;
        if (md.includes('MD+1') || md.includes('MD+2')) return 40;

        if (md.includes('Tático')) return 80;
        if (md.includes('Força')) return 65;
        if (md.includes('Velocidade')) return 45;
        if (md.includes('PRÉ')) return 100;
        if (md.includes('FOLGA')) return 0;
        return 55;
    };

    const calcularPseIA = (md) => {
        if (!md) return 0;
        if (md.includes('MD-5')) return 7;
        if (md.includes('MD-4')) return 7;

        if (md.includes('MD-2')) return 5;
        if (md.includes('MD-1')) return 3;

    const updateTrainingStatus = async (status) => {
        const user = firebase.auth().currentUser;
        if (!user) return alert("Erro: Usuário não logado");
        const docId = typeof getActiveDocId === 'function' ? getActiveDocId(user.uid) : user.uid;
        try {
            await db.collection('coachData').doc(docId).update({
                trainingStatus: status,
                statusUpdatedAt: new Date().toISOString()

        let daysWithLoad = 0;

            const dailyL = calcDailyLoad(trainingLog[date]?.[i]);
            if(dailyL > 0) { 
                chronicLoadTotal += dailyL; 
                daysWithLoad++;
                if(index < 7) acuteLoad += dailyL;

                        <div className="flex gap-1 items-center">
                            
                            <div className="flex bg-slate-100 dark:bg-slate-700 rounded p-1 mr-2 border dark:border-slate-600 overflow-x-auto custom-scroll max-w-[45vw] md:max-w-none">
                                <button onClick={() => setActiveTeam('pro')} className={`px-2 py-1 rounded text-[9px] font-black uppercase transition-all whitespace-nowrap ${activeTeam === 'pro' ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:text-slate-300 dark:hover:text-white'}`}>
                                    {header.labelPro || 'PRO'}
                                </button>
                                <button onClick={() => setActiveTeam('base')} className={`px-2 py-1 rounded text-[9px] font-black uppercase transition-all whitespace-nowrap ${activeTeam === 'base' ? 'bg-emerald-600 text-white shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:text-slate-300 dark:hover:text-white'}`}>
                                    {header.labelBase || 'BASE'}
                                </button>
                                
                                {(header.extraTeams || []).map(team => (
                                    <div key={team.id} className={`flex items-center rounded transition-all border ${activeTeam === team.id ? 'bg-purple-600 border-purple-600 shadow-sm' : 'bg-transparent border-transparent'}`}>
                                        <button onClick={() => setActiveTeam(team.id)} className={`px-2 py-1 text-[9px] font-black uppercase whitespace-nowrap ${activeTeam === team.id ? 'text-white' : 'text-slate-500 hover:text-slate-700 dark:text-slate-300 dark:hover:text-white'}`}>
                                            {team.name}
                                        </button>
                                        <button onClick={(e) => {
                                            e.stopPropagation();
                                            if(window.confirm(`Excluir a categoria ${team.name}?`)) {
                                                const newExtras = header.extraTeams.filter(t => t.id !== team.id);
                                                setHeader({...header, extraTeams: newExtras});
                                                if(activeTeam === team.id) setActiveTeam('pro');
                                            }
                                        }} className={`px-1 py-1 text-[8px] font-bold ${activeTeam === team.id ? 'text-white/70 hover:text-white' : 'text-slate-400 hover:text-red-500'}`} title="Excluir Categoria">
                                            ×
                                        </button>
                                    </div>
                                ))}
                                
                                <button onClick={() => {
                                    const newName = prompt("Nome da Categoria (ex: Sub-17, Feminino):");
                                    if(newName) {
                                        const newId = newName.toLowerCase().replace(/[^a-z0-9]/g, '');
                                        setHeader({...header, extraTeams: [...(header.extraTeams || []), {id: newId, name: newName}]});
                                    }
                                }} className="px-2 py-1 rounded text-[9px] font-black uppercase text-slate-400 hover:text-blue-500 transition-all whitespace-nowrap">
                                    + CAT
                                </button>
                            </div>

                            <button onClick={()=>window.open(getAthletePortalUrl(getActiveDocId(user.uid), '', true),'_blank')} className="text-[10px] bg-blue-600 text-white px-2 py-1 rounded font-bold hover:bg-blue-500 mr-2 uppercase flex items-center gap-1">
                                <Icon name="user" size={14}/>
                                <span className="hidden md:inline">Portal Atleta</span>
                            </button>
                            <button onClick={()=>setDarkMode(!darkMode)} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700">{darkMode ? <Icon name="sun" size={20}/> : <Icon name="moon" size={20}/>}</button>
                            <button onClick={()=>setShowSettings(true)} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700"><Icon name="settings" size={24}/></button>
                            <button onClick={()=>auth.signOut().then(() => window.location.reload())} className="p-2 rounded text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30"><Icon name="logout" size={20}/></button>
                        </div>
                    </div>
                    
                    <div className="flex bg-slate-100 dark:bg-slate-900 p-1.5 gap-2 overflow-x-auto shadow-inner no-print w-full custom-scroll border-y border-slate-200 dark:border-slate-800">
                        {navGroups.map((group, groupIndex) => (
                            <div key={group.label} className="flex items-center gap-1 shrink-0">
                                {groupIndex > 0 && <span aria-hidden="true" className="hidden xl:block w-px h-7 bg-slate-300 dark:bg-slate-700 mx-2"></span>}
                                <span aria-hidden="true" className="hidden xl:inline text-[8px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 pl-2 pr-1 border-l-2 border-slate-300 dark:border-slate-700 cursor-default select-none whitespace-nowrap">{group.label}</span>
                                {group.items.map(([key,label]) => (
                                    <button key={key} onClick={()=>setTab(key)} className={`px-3 py-2 rounded-lg text-[10px] font-black transition-all shrink-0 uppercase whitespace-nowrap ${tab===key?'bg-white dark:bg-slate-700 shadow text-slate-900 dark:text-white border border-slate-200 dark:border-slate-600':'text-slate-500 dark:text-slate-400 hover:bg-white/70 dark:hover:bg-slate-800'}`}>{label}</button>
                                ))}
                            </div>
                        ))}
                    </div>
                    
                    <div className="flex-1 overflow-hidden relative">
                        {tab === 'squad' && (
                            <div className="px-6 pt-4 pb-4 bg-slate-100 dark:bg-slate-900 shrink-0 transition-colors shadow-sm z-10 border-b border-slate-200 dark:border-slate-800">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label className="text-[10px] font-black text-blue-600 dark:text-blue-400 uppercase flex gap-1 items-center mb-2 tracking-wider"><Icon name="bell" size={14}/> Comunicado aos Atletas</label>
                                        <div className="flex flex-col gap-2">
                                            <div className="flex flex-col md:flex-row gap-2">
                                                <select className="w-full md:w-1/3 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-white p-2 rounded-lg text-xs font-bold outline-none" onChange={e => {if(e.target.value) setCoachMsg(e.target.value)}}>
                                                    <option value="">📋 Selecionar aviso rápido...</option>
                                                    <option value="🎥 ATENÇÃO: Reunião de Vídeo Análise antes do treino.">🎥 Vídeo Análise Tática</option>
                                                    <option value="🩺 OBRIGATÓRIO: Passar na Avaliação Médica.">🩺 Avaliação Médica</option>
                                                    <option value="🏋️ Foco de Hoje: Academia (Membros Inferiores).">🏋️ Academia</option>
                                                    <option value="🧊 RECUPERAÇÃO: Crioterapia obrigatória pós-treino.">🧊 Crioterapia</option>
                                                </select>
                                                <BufferedInput className="w-full md:w-2/3 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-800 dark:text-white p-2 rounded-lg text-sm font-bold outline-none" placeholder="Digite um recado..." value={coachMsg} onSave={val=>setCoachMsg(val)} />
                                            </div>
                                            <div className="flex items-center gap-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 p-1 rounded-lg shadow-sm mt-1">
                                                <Icon name="play" size={20} className="text-red-500 ml-2 shrink-0"/>
                                                <BufferedInput className="w-full bg-transparent text-slate-800 dark:text-white p-1.5 text-xs outline-none" placeholder="Cole link do YouTube para Vídeo-Análise" value={videoUrl} onSave={val=>setVideoUrl(val)} />
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-black text-yellow-600 dark:text-yellow-400 uppercase flex gap-1 items-center mb-2 tracking-wider"><Icon name="trophy" size={14}/> Logística de Convocação (App Atleta)</label>
                                        <textarea 
                                            className="w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-800 dark:text-white p-3 rounded-lg text-sm font-bold outline-none h-[88px] custom-scroll placeholder-slate-400 dark:placeholder-slate-500" 
                                            placeholder="🚌 Digite a logística de viagem para os atletas convocados... (Ex: Saída sexta às 13h, Traje de viagem, etc.)" 
                                            value={nextGame.logistics || ''} 
                                            onChange={e => setNextGame({ ...nextGame, logistics: e.target.value })}
                                        ></textarea>
                                    </div>

                                    <div className="col-span-1 md:col-span-2 mt-2">
                                        <button 
                                            onClick={dispararAlerta} 
                                            className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3.5 rounded-xl flex items-center justify-center gap-2 shadow-lg uppercase tracking-widest transition-transform active:scale-[0.99] border-b-4 border-black/20"
                                        >
                                            <Icon name="bell" size={18} /> DISPARAR NOTIFICAÇÃO (ATUALIZAR APP DOS ATLETAS)
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                        <div className="h-full">
                           {tab === 'home' && <DashboardView players={players} days={days} trainingLog={trainingLog} dmRecords={dmRecords} themeColor={themeColor} attendanceLog={attendanceLog} trainingStatus={initialData?.trainingStatus} assessments={assessments} matchMinutes={matchMinutes} nextGame={nextGame} setNextGame={setNextGame} header={header} setHeader={setHeader} onNavigate={setTab} />}
                            {tab === 'profile360' && <Player360View players={players} trainingLog={trainingLog} assessments={assessments} dmRecords={dmRecords} attendanceLog={attendanceLog} matchMinutes={matchMinutes} themeColor={themeColor} />}
                            {tab === 'squad' && <SquadView players={players} setPlayers={setPlayersSafely} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} />}
                            {tab === 'micro' && <MicrocycleView days={days} setDays={setDays} themeColor={themeColor} players={players} trainingLog={trainingLog} library={library} />}
                            {tab === 'wellness' && <WellnessDashboard players={players} setPlayers={setPlayersSafely} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} user={user} />}
                            {tab === 'pse' && <PSEView players={players} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} />}
                            {tab === 'match' && <PreGameView players={players} setPlayers={setPlayersSafely} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} matchMinutes={matchMinutes} setMatchMinutes={setMatchMinutes} getActiveDocId={getActiveDocId} />}
                            {tab === 'gameday' && <GameDayView players={players} setPlayers={setPlayersSafely} themeColor={themeColor} matchMinutes={matchMinutes} setMatchMinutes={setMatchMinutes} user={user} exercises={exercises} library={library} trainingLog={trainingLog} />}
                            {tab === 'dm' && <MedicalView players={players} setPlayers={setPlayersSafely} dmRecords={dmRecords} setDmRecords={setDmRecords} themeColor={themeColor} />}
                            {tab === 'assessment' && <AssessmentView players={players} themeColor={themeColor} assessments={assessments} setAssessments={setAssessments} dmRecords={dmRecords} />}
                            {tab === 'reports' && <ReportsView players={players} trainingLog={trainingLog} dmRecords={dmRecords} attendanceLog={attendanceLog} matchMinutes={matchMinutes} header={header} logo={logo} themeColor={themeColor} />}
                            {tab === 'library' && <LibraryView themeColor={themeColor} library={library} setLibrary={setLibrary} initialData={initialData} user={user} />}
                            {tab === 'macro' && <MacrocycleView themeColor={themeColor} macrocycle={macrocycle} setMacrocycle={setMacrocycle} user={user} />}
                            {tab === 'workout' && <WorkoutBuilderView themeColor={themeColor} exercises={exercises} setExercises={setExercises} library={library} postWorkout={postWorkout} setPostWorkout={setPostWorkout} players={players} trainingLog={trainingLog} initialData={initialData} user={user} />}
                            {tab === 'freq' && <AttendanceView players={players} themeColor={themeColor} attendanceLog={attendanceLog} setAttendanceLog={setAttendanceLog} dmRecords={dmRecords} user={user} />}
                        </div>
                    </div>
                </div>
            );
        };
      const CloudWrapper = ({ user, activeTeam, setActiveTeam }) => {
            const [initialData, setInitialData] = useState(null);
            const [loadingCloud, setLoadingCloud] = useState(true);

            useEffect(() => {
                setLoadingCloud(true);
                const docId = getActiveDocId(user.uid);
                const unsubscribe = db.collection('coachData').doc(docId).onSnapshot(doc => {
                    setInitialData(sanitizeCloudData(doc.exists ? doc.data() : {}));
                    setLoadingCloud(false);
                }, err => {
                    console.error("Cloud fetch error:", err);
                    setInitialData(sanitizeCloudData({}));
                    setLoadingCloud(false);
                });
                return () => unsubscribe();
            }, [user, activeTeam]);

            if (loadingCloud) return <div className="flex flex-col h-screen w-screen items-center justify-center bg-slate-900 text-slate-300 font-bold">A Carregar Dados...</div>;
            return <ErrorBoundary><MainApp user={user} initialData={initialData} activeTeam={activeTeam} setActiveTeam={setActiveTeam} /></ErrorBoundary>;
        };

        const RootApp = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTeam, setActiveTeam] = useState(localStorage.getItem('procoach_active_team') || 'pro');

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                    const loader = document.getElementById('loading-state');
                    if(loader) loader.style.display = 'none';
                });
                return () => unsubscribe();
            }, []);

            const handleSetTeam = (team) => {
                setActiveTeam(team);
                localStorage.setItem('procoach_active_team', team);
            };

            if (loading) return null;
            if (!user) return <LoginScreen onLogin={() => {}} />;
            return <CloudWrapper user={user} activeTeam={activeTeam} setActiveTeam={handleSetTeam} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
