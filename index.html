    <style>
        body { overscroll-behavior-y: contain; touch-action: pan-x pan-y; background-color: #f8fafc; color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s, color 0.3s; }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; z-index: 9999; display: none; font-size: 12px; font-weight: bold; white-space: nowrap; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

<body class="h-screen w-screen overflow-hidden flex flex-col safe-area-inset">
    <div id="toast"></div>
    <div id="root" class="h-full w-full"><div id="loading-state">A iniciar o ProCoach...</div></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const DEFAULT_DAYS = [
            { id: 1, md: 'MD-4', name: 'SEGUNDA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 2, md: 'MD-3', name: 'TERÇA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 3, md: 'MD-2', name: 'QUARTA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 4, md: 'MD-1', name: 'QUINTA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 5, md: 'JOGO', name: 'SEXTA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 6, md: 'MD+1', name: 'SÁBADO', date:'', plannedMins: '', am: [], pm: [] },
            { id: 7, md: 'MD+2', name: 'DOMINGO', date:'', plannedMins: '', am: [], pm: [] }
        ];

        const RTP_PHASES = [ 
            {id:1, label:"Fase 1: Aguda", desc:"Controle do quadro álgico/inflamatório. Fisioterapia."}, 
            {id:2, label:"Fase 2: Sub-aguda", desc:"Reabilitação do segmento lesado + Fortalecimento não envolvidos. Fisioterapia."}, 
            {id:3, label:"Fase 3: Transição I", desc:"Força segmentada (não envolvidos) + Cardio sem impacto. Fisio + Transição."}, 
            {id:4, label:"Fase 4: Transição II", desc:"Funcionais + cardio sem impacto. Força com restrição. Introdução Pliometria/Corrida."}, 
            {id:5, label:"Fase 5: Transição III", desc:"Força sem restrições funcionais. Cardio com impacto. Fisio + Transição Campo."}, 
            {id:6, label:"Fase 6: Performance I", desc:"Potência na Academia. Aceleração e Pliometria sem restrições."}, 
            {id:7, label:"Fase 7: Performance II", desc:"Potência especifica do esporte. Preparação individual e parcial com grupo."}, 
            {id:8, label:"Fase 8: Performance III", desc:"Retorno ao grupo com minutagem controlada em jogo. Liberado treino com o grupo sem restrições."}, 
            {id:9, label:"Fase 9: Liberação", desc:"Responsabilidade do atleta com cuidados antes e após treinos e jogos."} 
        ];
        const getWorkspaceBaseId = (uid) => localStorage.getItem('procoach_active_workspace') || uid;
        const getActiveDocId = (uid) => {
            const baseId = getWorkspaceBaseId(uid);
            const team = localStorage.getItem('procoach_active_team') || 'pro';
            return team === 'pro' ? baseId : `${baseId}_${team}`;
        };
        const normalizeEmailKey = (email='') => String(email).trim().toLowerCase();

        const getAthletePortalUrl = (docId, playerId = '', preview = false) => {
            const url = new URL('atleta.html', window.location.href);
            url.search = '';
            if (docId) url.searchParams.set('id', docId);
            if (playerId) url.searchParams.set('uid', String(playerId));
            if (preview) url.searchParams.set('view', 'coach');
            return url.toString();
        };

        const AnalysisModal = ({ day, onClose, onUpdate }) => {
            const [analysisData, setAnalysisData] = useState({ 
                timeTarget: day.plannedMins || '', 
                pseTarget: day.pseTarget || '' 
            });
            const isHigh = Number(analysisData.timeTarget) > 120 || Number(analysisData.pseTarget) > 8;

            return (
                <div className="fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4 animate-fade-in" onClick={onClose}>
                    <div className="bg-[#1e293b] rounded-2xl shadow-2xl p-6 w-full max-w-sm border border-slate-700" onClick={e=>e.stopPropagation()}>
                        <h3 className="text-xl font-black text-white uppercase mb-6 flex items-center gap-2">
                            <Icon name="brain" className="text-blue-400"/> Análise {day.name}
                        </h3>
                        <div className="grid grid-cols-2 gap-4 mb-6">
                            <input type="number" className="bg-slate-900 p-4 rounded-xl text-white font-black w-full" value={analysisData.timeTarget} onChange={(e) => setAnalysisData({...analysisData, timeTarget: e.target.value})} placeholder="Tempo (min)" />
                            <input type="number" className={`p-4 rounded-xl font-black w-full bg-slate-900 ${analysisData.pseTarget > 8 ? 'text-red-500' : 'text-white'}`} value={analysisData.pseTarget} onChange={(e) => setAnalysisData({...analysisData, pseTarget: e.target.value})} placeholder="PSE (1-10)" />
                        </div>
                        <div className={`mb-6 p-3 rounded-lg text-[11px] font-bold border ${isHigh ? 'bg-red-500/10 text-red-400 border-red-500/20' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20'}`}>
                            {isHigh ? '⚠️ ALERTA: Carga muito alta!' : '✅ Volume controlado.'}
                        </div>
                        <button onClick={() => { onUpdate(day.id, analysisData); onClose(); }} className="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase hover:bg-blue-700">SALVAR E FECHAR</button>
                    </div>
                </div>
            );
        };
 const MicrocycleView = ({ days, setDays, themeColor, players, trainingLog, library }) => {
    const [modalOpen, setModalOpen] = useState(false);
    const [aiModal, setAiModal] = useState(null);
    const [activeSlot, setActiveSlot] = useState({ dayId: null, period: null });
    
    const [customLabel, setCustomLabel] = useState('');
    const [customColor, setCustomColor] = useState('#2563eb');
    const [isExporting, setIsExporting] = useState(false);
    
    const [startDate, setStartDate] = useState(() => {
        const d = new Date();
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
        const monday = new Date(d.setDate(diff));
        return monday.toISOString().split('T')[0];
    });

    const safeDays = days.map(d => ({...d, plannedMins: d.plannedMins || ''}));

    // CÉREBRO DA IA 1: Calcula a Meta de Tempo (Volume)
    const calcularMetaIA = (md) => {
        if (!md) return 0;
        if (md.includes('MD-5')) return 85;
        if (md.includes('MD-4')) return 75;
        if (md.includes('MD-3')) return 65;
        if (md.includes('MD-2')) return 45;
        if (md.includes('MD-1')) return 35;
        if (md.includes('JOGO')) return 90;
        if (md.includes('MD+1') || md.includes('MD+2')) return 40;
        if (md.includes('Resistência')) return 90;
        if (md.includes('Tático')) return 80;
        if (md.includes('Força')) return 65;
        if (md.includes('Velocidade')) return 45;
        if (md.includes('PRÉ')) return 100;
        if (md.includes('FOLGA')) return 0;
        return 55;
    };

    // CÉREBRO DA IA 2: Calcula a Meta de Intensidade (PSE)
    const calcularPseIA = (md) => {
        if (!md) return 0;
        if (md.includes('MD-5')) return 7;
        if (md.includes('MD-4')) return 7;  // Aquisição Força
        if (md.includes('MD-3')) return 8;  // Pico Tático (Alta Intensidade)
        if (md.includes('MD-2')) return 5;  // Polimento / Velocidade
        if (md.includes('MD-1')) return 3;  // Ativação (Baixa Intensidade)
        if (md.includes('JOGO')) return 10; // Esforço Máximo
        if (md.includes('MD+1') || md.includes('MD+2')) return 3; // Recuperação
        if (md.includes('Resistência')) return 8;
        if (md.includes('Tático')) return 6;
        if (md.includes('Força')) return 7;
        if (md.includes('Velocidade')) return 5;
        if (md.includes('PRÉ')) return 8;
        if (md.includes('FOLGA')) return 0;
        return 5;
    };

    const getDayDate = (index) => {
        const date = new Date(startDate + 'T12:00:00'); 
        date.setDate(date.getDate() + index);
        return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
    };

    const getDayDateStr = (index) => {
        const date = new Date(startDate + 'T12:00:00'); 
        date.setDate(date.getDate() + index);
        return date.toISOString().split('T')[0];
    };

    // LÊ DADOS DA ABA PSE (REAL)
    const getTeamMetricsForDate = (dateStr) => {
        if (!trainingLog || !trainingLog[dateStr]) return { load: 0, dur: 0 };
        const playersLog = Object.values(trainingLog[dateStr]);
        let totalLoad = 0;
        let totalDur = 0;
        let countLoad = 0;
        let countDur = 0;
        
        playersLog.forEach(log => {
            const rpeAm = Number(log.rpe_am) || 0;
            const rpePm = Number(log.rpe_pm) || 0;
            const dur = Number(log.duration) || 0;
            const sRpe = (rpeAm + rpePm) * dur;
            
            if (sRpe > 0) { totalLoad += sRpe; countLoad++; }
            if (dur > 0) { totalDur += dur; countDur++; }
        });
        
        return {
            load: countLoad > 0 ? Math.round(totalLoad / countLoad) : 0,
            dur: countDur > 0 ? Math.round(totalDur / countDur) : 0
        };
    };

    const eventTypes = [ 
        { label: 'JOGO', color: 'bg-[#dc2626]', text: 'text-white', load: 100 }, 
        { label: 'RECUPERAÇÃO', color: 'bg-[#3b82f6]', text: 'text-white', load: 20 }, 
        { label: 'ACADEMIA', color: 'bg-[#eab308]', text: 'text-slate-900', load: 40 }, 
        { label: 'FOLGA', color: 'bg-[#94a3b8]', text: 'text-slate-800', load: 0 },
        { label: 'TREINO FÍSICO', color: 'bg-[#16a34a]', text: 'text-white', load: 60 },
        { label: 'TÉCNICO', color: 'bg-[#2563eb]', text: 'text-white', load: 50 }, 
        { label: 'JOGUINHO', color: 'bg-[#ec4899]', text: 'text-white', load: 60 },
        { label: 'ORG. OFENSIVA', color: 'bg-[#0ea5e9]', text: 'text-white', load: 60 }, 
        { label: 'ORG. DEFENSIVA', color: 'bg-[#f97316]', text: 'text-white', load: 60 }, 
        { label: 'TRANS. OFENSIVA', color: 'bg-[#06b6d4]', text: 'text-white', load: 70 }, 
        { label: 'TRANS. DEFENSIVA', color: 'bg-[#f43f5e]', text: 'text-white', load: 70 }, 
        { label: 'ABP OFENSIVA', color: 'bg-[#8b5cf6]', text: 'text-white', load: 30 }, 
        { label: 'ABP DEFENSIVA', color: 'bg-[#d946ef]', text: 'text-white', load: 30 }, 
        { label: 'TÁTICO GERAL', color: 'bg-[#10b981]', text: 'text-white', load: 60 }, 
        { label: 'PDI', color: 'bg-[#14b8a6]', text: 'text-white', load: 40 }
    ];

    const openModal = (dayId, period) => { setActiveSlot({ dayId, period }); setModalOpen(true); };
    
    const addEvent = (typeObj, isCustom = false) => {
        const newDays = safeDays.map(d => {
            if(d.id === activeSlot.dayId) {
                const currentEvents = Array.isArray(d[activeSlot.period]) ? d[activeSlot.period] : [];
                
                let autoDuration = '';
                let autoPse = '';
                if(isCustom && library) {
                    const treinoSalvo = library.find(item => item.title.toUpperCase() === customLabel.trim().toUpperCase());
                    if(treinoSalvo) {
                        autoDuration = treinoSalvo.duration || '';
                        autoPse = treinoSalvo.pse || '';
                    }
                }

                const newEvent = {
                    id: Date.now(),
                    type: isCustom ? customLabel.toUpperCase() : typeObj.label,
                    colorClass: isCustom ? '' : typeObj.color,
                    textClass: isCustom ? 'text-white' : typeObj.text,
                    customColor: isCustom ? customColor : null,
                    load: isCustom ? 50 : typeObj.load,
                    duration: autoDuration,
                    pse: autoPse
                };
                return { ...d, [activeSlot.period]: [...currentEvents, newEvent] };
            }
            return d;
        });
        
        setDays(newDays);
        setModalOpen(false);
        if(isCustom) setCustomLabel('');

        const user = firebase.auth().currentUser;
        const docId = getActiveDocId ? getActiveDocId(user?.uid) : user?.uid;
        if(user) {
            db.collection('coachData').doc(docId).update({ days: newDays }).catch(err => console.error(err));
        }
    };

    const removeEvent = (dayId, period, eventId) => {
        const newDays = safeDays.map(d => d.id === dayId ? { ...d, [period]: (d[period] || []).filter(e => e.id !== eventId) } : d);
        setDays(newDays);
        const user = firebase.auth().currentUser;
        const docId = getActiveDocId ? getActiveDocId(user?.uid) : user?.uid;
        if(user) db.collection('coachData').doc(docId).update({ days: newDays });
    };

    const updateHeader = (dayId, field, val) => {
        const newDays = safeDays.map(d => d.id === dayId ? { ...d, [field]: val } : d);
        setDays(newDays);
        const user = firebase.auth().currentUser;
        const docId = getActiveDocId ? getActiveDocId(user?.uid) : user?.uid;
        if(user) db.collection('coachData').doc(docId).update({ days: newDays });
    };

    const exportToPNG = () => {
        setIsExporting(true);
        showToast("Preparando planejamento...", "#3b82f6");
        setTimeout(async () => {
            const el = document.getElementById('microcycle-board');
            if(!el) { setIsExporting(false); return; }
            try {
                const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#0f172a', useCORS: true });
                canvas.toBlob(blob => {
                    smartShare(blob, `Microciclo_${startDate}.png`, 'Microciclo da Semana');
                    setIsExporting(false);
                });
            } catch(e) {
                setIsExporting(false);
                showToast("Erro ao gerar imagem.", "#ef4444");
            }
        }, 500);
    };

    const renderAiAnalysis = () => {
        if(!aiModal) return null;
        
        const dayIndex = safeDays.findIndex(d => d.id === aiModal.id);
        const dateStr = getDayDateStr(dayIndex !== -1 ? dayIndex : 0);
        const metrics = getTeamMetricsForDate(dateStr);
        
        const sugeridoTempo = Number(calcularMetaIA(aiModal.md)) || 0;
        const sugeridoPse = Number(calcularPseIA(aiModal.md)) || 0;
        const metaCarga = sugeridoTempo * sugeridoPse;
        const minsReal = metrics.dur;

        let feedback = metrics.load === 0 ? `Aguardando a execução do treino para emitir parecer.` : 
                       metrics.load > metaCarga * 1.15 ? "⚠️ Carga executada está ALTA! Considere reduzir o volume/intensidade no próximo dia." :
                       metrics.load < metaCarga * 0.85 ? "📉 Carga executada está BAIXA em relação ao planejado." :
                       "✅ Treino executado dentro da meta de excelência.";

        return (
            <div className="fixed inset-0 bg-black/80 z-[99999] flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setAiModal(null)}>
                <div className="bg-[#1e293b] p-6 rounded-3xl w-full max-w-sm border border-slate-700 shadow-2xl relative" onClick={e => e.stopPropagation()}>
                    <h3 className="text-xl font-black text-white text-center mb-6">ANÁLISE {aiModal.name} ({aiModal.md})</h3>
                    
                    <div className="grid grid-cols-2 gap-2 mb-6">
                        <div className="bg-slate-900 p-4 rounded-xl text-center border border-blue-500/30">
                            <p className="text-[10px] text-blue-400 font-bold uppercase">Meta de Carga (IA)</p>
                            <div className="text-2xl font-black text-white">{metaCarga} <span className="text-xs">U.A.</span></div>
                            <p className="text-[8px] text-slate-500 mt-1 uppercase">{sugeridoTempo}m x PSE {sugeridoPse}</p>
                        </div>
                        <div className="bg-slate-900 p-4 rounded-xl text-center border border-orange-500/30">
                            <p className="text-[10px] text-orange-400 font-bold uppercase">Carga Real</p>
                            <div className="text-2xl font-black text-white">{metrics.load} <span className="text-xs">U.A.</span></div>
                            <p className="text-[8px] text-slate-500 mt-1 uppercase">{minsReal}m executados</p>
                        </div>
                    </div>

                    <div className="bg-slate-700 p-3 rounded-lg text-xs font-bold text-white mb-4 text-center">
                        {feedback}
                    </div>
                    
                    <button onClick={()=>setAiModal(null)} className="w-full bg-blue-600 py-4 rounded-xl font-black text-white uppercase hover:bg-blue-500 transition-all shadow-lg">Fechar Painel</button>
                </div>
            </div>
        );
    };

    const getThermoColor = (md) => {
        if (!md) return 'bg-[#1a4a3e] text-white';
        if(md.includes('MD-3') || md.includes('Resistência')) return 'bg-red-600 text-white';
        if(md.includes('MD-4') || md.includes('MD-5') || md.includes('Força')) return 'bg-orange-600 text-white';
        if(md.includes('MD-2') || md.includes('Velocidade')) return 'bg-yellow-500 text-slate-900';
        if(md.includes('MD-1') || md.includes('Tático')) return 'bg-emerald-500 text-white';
        if(md.includes('MD+1') || md.includes('MD+2')) return 'bg-blue-500 text-white';
        if(md.includes('JOGO')) return 'bg-slate-950 text-yellow-400 border-b-2 border-yellow-500';

                                <div><label className="text-[8px] uppercase font-bold text-slate-500">Telefone</label><input value={localData.guardianPhone||''} onChange={e=>setLocalData({...localData,guardianPhone:e.target.value})} className="w-full border dark:border-slate-600 p-2 rounded dark:bg-slate-800 dark:text-white text-xs"/></div>

                        <div className="bg-indigo-50 dark:bg-indigo-900/20 border border-indigo-200 dark:border-indigo-800 rounded-xl p-3 space-y-3">

                                <span className={`text-[8px] font-black uppercase px-2 py-1 rounded-full ${localData.contractStatus==='Vencido'?'bg-red-100 text-red-700':localData.contractEnd&&new Date(localData.contractEnd)<new Date()?'bg-red-100 text-red-700':'bg-indigo-100 text-indigo-700'}`}>{localData.contractStatus || 'Ativo'}</span>

                            <div className="grid grid-cols-2 gap-2">

                                <div><label className="text-[8px] uppercase font-bold text-slate-500">Término</label><input type="date" value={localData.contractEnd||''} onChange={e=>setLocalData({...localData,contractEnd:e.target.value})} className="w-full border dark:border-slate-600 p-2 rounded dark:bg-slate-800 dark:text-white text-xs"/></div>
                                <div><label className="text-[8px] uppercase font-bold text-slate-500">Tipo de vínculo</label><select value={localData.contractType||'Profissional'} onChange={e=>setLocalData({...localData,contractType:e.target.value})} className="w-full border dark:border-slate-600 p-2 rounded dark:bg-slate-800 dark:text-white text-xs"><option>Profissional</option><option>Formação</option><option>Empréstimo</option><option>Experiência</option><option>Amador</option><option>Outro</option></select></div>
                                <div><label className="text-[8px] uppercase font-bold text-slate-500">Status</label><select value={localData.contractStatus||'Ativo'} onChange={e=>setLocalData({...localData,contractStatus:e.target.value})} className="w-full border dark:border-slate-600 p-2 rounded dark:bg-slate-800 dark:text-white text-xs"><option>Ativo</option><option>Em renovação</option><option>Empréstimo</option><option>Vencido</option><option>Rescindido</option></select></div>
                                <div><label className="text-[8px] uppercase font-bold text-slate-500">Iniciar negociação</label><input type="date" value={localData.negotiationStart||''} onChange={e=>setLocalData({...localData,negotiationStart:e.target.value})} className="w-full border dark:border-slate-600 p-2 rounded dark:bg-slate-800 dark:text-white text-xs"/></div>
                                <div><label className="text-[8px] uppercase font-bold text-slate-500">Opção de renovação</label><select value={localData.renewalOption||'Não informado'} onChange={e=>setLocalData({...localData,renewalOption:e.target.value})} className="w-full border dark:border-slate-600 p-2 rounded dark:bg-slate-800 dark:text-white text-xs"><option>Não informado</option><option>Sim</option><option>Não</option><option>Automática</option><option>Por metas</option></select></div>
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                <div><label className="text-[8px] uppercase font-bold text-slate-500">Clube de origem</label><input value={localData.originClub||''} onChange={e=>setLocalData({...localData,originClub:e.target.value})} className="w-full border dark:border-slate-600 p-2 rounded dark:bg-slate-800 dark:text-white text-xs" placeholder="Se empréstimo"/></div>
                                <div><label className="text-[8px] uppercase font-bold text-slate-500">Empresário / responsável</label><input value={localData.agentName||''} onChange={e=>setLocalData({...localData,agentName:e.target.value})} className="w-full border dark:border-slate-600 p-2 rounded dark:bg-slate-800 dark:text-white text-xs"/></div>
                            </div>
                            <div><label className="text-[8px] uppercase font-bold text-slate-500">Observações</label><textarea value={localData.contractNotes||''} onChange={e=>setLocalData({...localData,contractNotes:e.target.value})} className="w-full h-16 border dark:border-slate-600 p-2 rounded dark:bg-slate-800 dark:text-white text-xs" placeholder="Cláusulas, metas, pendências..."/></div>
                        </div>

                        <div className="grid grid-cols-2 gap-2 bg-slate-50 dark:bg-slate-700/50 p-2 rounded border dark:border-slate-600">
                            <div>
                                <label className="text-[9px] uppercase font-bold text-slate-500">⚽ Gols no Ano:</label>
                                <input type="number" min="0" className="w-full border dark:border-slate-500 p-1.5 rounded dark:bg-slate-800 dark:text-white text-sm text-center font-bold outline-none" value={(localData.stats && localData.stats.g) || ''} onChange={e=>setLocalData({...localData, stats: {...localData.stats, g: e.target.value}})} placeholder="0"/>
                            </div>
                            <div>
                                <label className="text-[9px] uppercase font-bold text-slate-500">👟 Assistências:</label>
                                <input type="number" min="0" className="w-full border dark:border-slate-500 p-1.5 rounded dark:bg-slate-800 dark:text-white text-sm text-center font-bold outline-none" value={(localData.stats && localData.stats.a) || ''} onChange={e=>setLocalData({...localData, stats: {...localData.stats, a: e.target.value}})} placeholder="0"/>
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-2 gap-2">
                            <label className="flex items-center gap-2 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 p-2 rounded cursor-pointer transition-colors hover:bg-red-100">
                                <input type="checkbox" checked={localData.suspended || false} onChange={e=>setLocalData({...localData, suspended: e.target.checked})} className="w-4 h-4 accent-red-600"/>
                                <span className="text-[10px] font-bold text-red-700 dark:text-red-400 uppercase">🚫 Suspenso</span>
                            </label>
                            <label className="flex items-center gap-2 bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800 p-2 rounded cursor-pointer transition-colors hover:bg-yellow-100">
                                <input type="checkbox" checked={localData.highlight || false} onChange={e=>setLocalData({...localData, highlight: e.target.checked})} className="w-4 h-4 accent-yellow-500"/>
                                <span className="text-[10px] font-bold text-yellow-700 dark:text-yellow-400 uppercase">🏆 Destaque</span>

                        </div>

                        <div className="flex gap-2 pt-2">
                            <button onClick={()=>{if(confirm('Excluir Atleta?')){setPlayers(safePlayers.filter((_,i)=>i!==editPlayer));setEditPlayer(null);}}} className="bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-3 rounded font-bold flex-1 text-xs hover:bg-red-200">EXCLUIR</button>
                            <button onClick={()=>{const n=[...safePlayers];n[editPlayer]=localData;setPlayers(n);setEditPlayer(null);}} className="bg-blue-600 text-white p-3 rounded font-bold flex-1 text-xs shadow-lg hover:bg-blue-700">SALVAR DADOS</button>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const PlayerProfileModal = ({ player, playerIndex, logs, onClose, themeColor, setPlayers, players }) => {
        if (!player) return null;
        const today = getTodayStr(); 
        const currentLog = logs[today]?.[playerIndex] || {};
        const wellness = safeObj(currentLog.wellness);
        const dates = getDatesInRange(today, 7).reverse();
        
        const toggleInjury = () => { const n = [...players]; n[playerIndex].injured = !n[playerIndex].injured; setPlayers(n); };
        
        const getLoad = (d) => { 
            const l = logs[d]?.[playerIndex]; 
            if(!l) return 0;
            const rpeSum = (Number(l.rpe_am)||0)+(Number(l.rpe_pm)||0);
            const dur = Number(l.duration) || 0;
            return dur > 0 ? rpeSum * dur : rpeSum * 60; 
        };

        const todayLoad = getLoad(today);
        const historyDates = getDatesInRange(today, 7).slice(1); 
        let chronicLoad = 0; historyDates.forEach(d => chronicLoad += getLoad(d)); 
        const avgLoad = (chronicLoad + todayLoad) / 7;
        
        const loadHistoryLine = getDatesInRange(today, 14).reverse().map(d => getLoad(d));
        const wellnessHistory = getDatesInRange(today, 7).reverse().map(d => {
            const w = safeObj(logs[d]?.[playerIndex]?.wellness);
            return w.sleep ? (8 - Number(w.sleep)) * 14.28 : 50; 
        });

        let loadMsg = "Carga Equilibrada. Prontidão Alta."; 
        let loadColor = "text-green-500";
        
        if (avgLoad > 0) {
            if (todayLoad > avgLoad * 1.4) { loadMsg = "Risco Agudo! Sobrecarga detectada. Sugestão: Recuperativo imediato."; loadColor = "text-red-500"; } 
            else if (todayLoad < avgLoad * 0.6) { loadMsg = "Carga baixa hoje. Oportunidade para treino de força ou tático intenso."; loadColor = "text-yellow-500"; }
        }

        const copyAthleteLink = () => {
            const user = firebase.auth().currentUser;
            if(user) {
                const link = getAthletePortalUrl(getActiveDocId(user.uid), player.id);
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(link).then(() => {
                        showToast("Link copiado! Envie no WhatsApp.");
                    }).catch(() => alert("Copie este link:\n" + link));
                } else { alert("Copie este link:\n" + link); }
            }
        };

        return (
            <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden relative flex flex-col max-h-[90vh]" onClick={e=>e.stopPropagation()}>
                    
                    <div className="p-6 relative text-white flex flex-col items-center shrink-0" style={{background:`linear-gradient(to bottom, ${themeColor}, #1e293b)`}}>
                        <button onClick={onClose} className="absolute top-4 right-4 text-white/70 hover:text-white"><Icon name="x" size={24}/></button>
                        <div className="w-24 h-24 rounded-full border-4 border-white dark:border-slate-700 bg-slate-200 dark:bg-slate-600 shadow-lg mb-2 overflow-hidden">{player.image?<img src={player.image} className="w-full h-full object-cover object-top" onError={(e)=>{e.target.style.display='none'}}/>:<div className="w-full h-full flex items-center justify-center text-slate-400"><Icon name="user" size={40}/></div>}</div>
                        <h2 className="text-2xl font-bold uppercase tracking-tight">{player.name}</h2>
                        <p className="text-white/70 text-sm font-bold">{player.number?`#${player.number} `:''} {player.position||'Atleta'}</p>
                        
                        <div className="flex gap-2 mt-3">
                            <button onClick={toggleInjury} className={`px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest flex items-center gap-1 shadow-lg ${player.injured?'bg-red-500 text-white':'bg-green-500 text-white'}`}>{player.injured?<><Icon name="medkit" size={12}/> LESIONADO (DM)</>:<><Icon name="check" size={12}/> DISPONÍVEL</>}</button>
                        </div>
                    </div>
                    
                    <div className="p-6 space-y-6 overflow-y-auto flex-1 custom-scroll bg-slate-100 dark:bg-slate-900">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
                                <div className="flex justify-between items-end mb-4">
                                    <h3 className="text-[10px] font-black uppercase text-slate-500 dark:text-slate-400 tracking-widest flex items-center gap-1">
                                        <Icon name="activity" size={14} className="text-blue-500"/> GPS Virtual (14d)
                                    </h3>
                                    <span className="text-[9px] font-bold text-slate-400">sRPE</span>
                                </div>
                                <div className="w-full px-2"><LineChart data={loadHistoryLine} color={themeColor} height={50} /></div>
                            </div>

                            <div className="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
                                <div className="flex justify-between items-end mb-4">
                                    <h3 className="text-[10px] font-black uppercase text-slate-500 dark:text-slate-400 tracking-widest flex items-center gap-1">
                                        <Icon name="smile" size={14} className="text-emerald-500"/> Índice de Recuperação (7d)
                                    </h3>
                                    <span className="text-[9px] font-bold text-slate-400">%</span>
                                </div>
                                <div className="w-full px-2"><LineChart data={wellnessHistory} color="#10b981" height={50} /></div>
                            </div>
                        </div>

                        <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-4 shadow-sm">
                            <div className="flex items-center gap-2 mb-2 border-b dark:border-slate-700 pb-2">
                                <Icon name="brain" className={loadColor} size={18}/>
                                <span className={`text-[10px] font-black uppercase tracking-wider ${loadColor}`}>Assistente de Prontidão IA</span>
                            </div>
                            <div className="text-sm font-bold text-slate-700 dark:text-slate-200 leading-snug">{loadMsg}</div>
                        </div>

                        <div>
                            <h3 className="text-xs font-black text-slate-400 dark:text-slate-500 uppercase mb-3 flex items-center gap-2 tracking-widest"><Icon name="smile"/> Estado Hoje ({formatDateBR(today)})</h3>
                            <div className="grid grid-cols-2 gap-4">
                                {Object.entries({Sono:wellness.sleep, Estresse:wellness.stress, Fadiga:wellness.fatigue, Dor:wellness.soreness, Humor: wellness.mood}).map(([k,v])=>(
                                    <div key={k} className="bg-white dark:bg-slate-800 p-3 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm">
                                        <div className="flex justify-between text-xs font-bold mb-2">
                                            <span className="text-slate-500 dark:text-slate-400">{k}</span>
                                            <span className="dark:text-white font-black">{v||'-'}</span>
                                        </div>
                                        <div className="h-1.5 w-full bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
                                            <div className="h-full rounded-full transition-all duration-500" style={{width:`${((Number(v)||0)/7)*100}%`,backgroundColor:(Number(v)||0)>=5?'#ef4444':(Number(v)||0)>=3?'#eab308':'#22c55e'}}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        <div className="flex flex-col gap-2 mt-4">
                            <button onClick={copyAthleteLink} className="w-full bg-slate-800 hover:bg-slate-700 text-white font-black text-xs tracking-widest uppercase py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg transition-transform active:scale-95 border-b-4 border-black/30">
                                <Icon name="copy"/> Copiar Link do App do Atleta
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const injuredCount = safePlayers.filter(p=>p && p.injured).length;
    const squadAnalysis = injuredCount > 2 ? `Atenção: ${injuredCount} indisponíveis.` : "Elenco pronto.";

    return (
        <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in custom-scroll pb-32">
            <PlayerProfileModal player={safePlayers[viewProfile]} playerIndex={viewProfile} logs={trainingLog} onClose={()=>setViewProfile(null)} themeColor={themeColor} setPlayers={setPlayers} players={safePlayers} />
            {editPlayer!==null && <Editor/>}
            
            <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 gap-4">
                <div className="flex items-center gap-4">
                    <h2 className="text-2xl font-bold flex items-center gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="user"/> Gestão do Elenco</h2>
                    <button onClick={addP} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-[10px] font-black flex items-center gap-2 shadow-lg transition-all uppercase tracking-widest">
                        <Icon name="plus" size={14}/> Adicionar Atleta
                    </button>
                    <button onClick={enableFemaleHealthForSquad} className="bg-fuchsia-600 hover:bg-fuchsia-700 text-white px-4 py-2 rounded-lg text-[10px] font-black flex items-center gap-2 shadow-lg transition-all uppercase tracking-widest hidden lg:flex" title="Ativar questionário de cólicas e saúde menstrual para esta categoria">
                        <Icon name="activity" size={14}/> Equipe feminina
                    </button>
                    <button onClick={generateExecutiveDossier} className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg text-[10px] font-black flex items-center gap-2 shadow-lg transition-all uppercase tracking-widest hidden md:flex">
                        <Icon name="download" size={14}/> GerAR DOSSIÊ (PDF)
                    </button>
                </div>
                <div className="text-xs bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-1.5 rounded-lg shadow-sm flex items-center gap-2 text-slate-600 dark:text-slate-300">
                    <Icon name="brain" size={14} className="text-blue-500"/>{squadAnalysis}
                </div>
                <button onClick={generateExecutiveDossier} className="w-full bg-purple-600 hover:bg-purple-700 text-white px-4 py-3 rounded-lg text-[10px] font-black flex items-center justify-center gap-2 shadow-lg transition-all uppercase tracking-widest md:hidden">
                    <Icon name="download" size={14}/> Gerar Dossiê da Diretoria (PDF)
                </button>
                <button onClick={enableFemaleHealthForSquad} className="w-full bg-fuchsia-600 hover:bg-fuchsia-700 text-white px-4 py-3 rounded-lg text-[10px] font-black flex items-center justify-center gap-2 shadow-lg transition-all uppercase tracking-widest lg:hidden">
                    <Icon name="activity" size={14}/> Configurar equipe feminina
                </button>
            </div>
            
            <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-2 md:gap-4">
                {safePlayers.map((p, i) => { 
                    if(!p) return null;
                    const loadPct = getWeeklyLoad(i); 
                    const dailyLog = trainingLog[today]?.[i] || {}; 
                    
                    // IA: CHECAGEM DE DOR CONTÍNUA (OLGA) NO CARTÃO DO ELENCO
                    let daysWithPain = 0;
                    for (let j = 0; j <= 2; j++) {
                        let d = new Date(today);
                        d.setDate(d.getDate() - j);
                        let dStr = d.toISOString().split('T')[0];
                        if (trainingLog[dStr]?.[i]?.wellness?.soreness >= 6) {
                            daysWithPain++;
                        }
                    }
                    const isChronicPain = daysWithPain >= 2;

                    return (
                        <div key={i} className={`bg-white dark:bg-slate-800 rounded-xl shadow border p-3 flex flex-col items-center gap-2 relative group hover:shadow-lg transition-all cursor-pointer ${isChronicPain || p.injured || p.suspended ? 'border-red-500' : p.highlight ? 'border-yellow-400' : 'border-slate-100 dark:border-slate-700'}`} onClick={()=>setViewProfile(i)}>
                            <button onClick={(e)=>{e.stopPropagation();setLocalData(p);setEditPlayer(i);}} className="absolute top-1 right-1 text-slate-400 hover:text-blue-500 z-20"><Icon name="edit" size={12}/></button>

                const avgLoadPerAtleta = safePs.length > 0 ? currentAccumulatedLoad / safePs.length : 0;
                const limit = 2800;
                const percentage = Math.min(100, (avgLoadPerAtleta / limit) * 100);
                
                let statusColor = "bg-green-500";
                let statusText = "ZONA SEGURA";
                if (percentage > 85) {

                    statusText = "ALERTA: SOBRECARGA NO ELENCO"; 
                } else if (percentage > 65) {

            const dailyL = calcDailyLoad(trainingLog[d]?.[i]);
            if(dailyL > 0) { 
                chronicLoadTotal += dailyL; 
                daysWithLoad++; // Conta apenas dias com treino registrado
                if(index < 7) acuteLoad += dailyL; 
            }
        });
        
        // Só calculamos se o atleta tiver ao menos 14 dias de histórico real
        if (daysWithLoad >= 14 && chronicLoadTotal > 0) {
            const acwrVal = parseFloat((acuteLoad / (chronicLoadTotal / 4)).toFixed(2));
            const pData = { ...p, idx: i, acwr: acwrVal };
            
            if (acwrVal >= 1.5) groups.danger.push(pData);
            else if (acwrVal >= 0.8) groups.optimal.push(pData);
            else groups.under.push(pData);
        }
    });
    return groups;

   const WorkoutBuilderView = ({ themeColor, exercises, setExercises, library, postWorkout, setPostWorkout, players, trainingLog, initialData, user }) => {
    const [targetOptions, setTargetOptions] = useState(initialData?.customTargets || ['Ativação & Core', 'Treino Funcional', 'Força', 'Geral']);
    const fieldTargets = ['TÉCNICO', 'JOGUINHO', 'ORG. OFENSIVA', 'ORG. DEFENSIVA', 'TRANS. OFENSIVA', 'TRANS. DEFENSIVA', 'ABP OFENSIVA', 'ABP DEFENSIVA', 'TÁTICO GERAL', 'PDI', 'AQUECIMENTO'];
    
    const [trainingType, setTrainingType] = useState('academia');
    const [form, setForm] = useState({ title: '', gifUrl: '', videoUrl: '', sets: '', reps: '', rest: '', target: targetOptions[0], order: '', period: 'am', description: '', type: 'academia', duration: '', pse: '', objective: '' });
    
    const [editId, setEditId] = useState(null);
    const [sessionDate, setSessionDate] = useState(getTodayStr());
    const [pontoChave, setPontoChave] = useState("");

    const [showLibraryModal, setShowLibraryModal] = useState(false);
    const [selectedLibItems, setSelectedLibItems] = useState([]);
    const [libFilter, setLibFilter] = useState('Todas');

    useEffect(() => {
        if(user && targetOptions.length > 0) {
            db.collection('coachData').doc(getActiveDocId(user.uid)).update({ customTargets: targetOptions }).catch(err => {
                if(err.code === 'not-found') db.collection('coachData').doc(getActiveDocId(user.uid)).set({ customTargets: targetOptions }, { merge: true });
            });
        }
    }, [targetOptions, user]);

    const getAiSuggestion = () => {
        const today = getTodayStr(); 
        let totalFatigue = 0, count = 0;
        const safePs = Array.isArray(players) ? players : [];
        safePs.forEach((p, i) => {
            const logForPlayer = trainingLog?.[today]?.[i];
            const stats = safeObj(logForPlayer?.wellness);
            if(stats.sleep) { totalFatigue += (Number(stats.fatigue) || 1) + (Number(stats.soreness) || 1); count++; }
        });
        const avg = count > 0 ? totalFatigue / count : 0;
        if (avg >= 10) return "🚨 IA: CRIOTERAPIA OBRIGATÓRIA (FADIGA CRÍTICA)";
        if (avg >= 7) return "⚠️ IA: BANHEIRA DE GELO (FADIGA ALTA)";
        return "✅ IA: RECUPERAÇÃO LIVRE (TIME PRONTO)";
    };

    const addTarget = () => {
        const name = prompt("Nome do novo Público ou Bloco de Academia (ex: Goleiros):");
        if (name && !targetOptions.includes(name)) {
            setTargetOptions([...targetOptions, name]);
            if(trainingType === 'academia') setForm({...form, target: name});
        }
    };

    const importFromDate = () => {
        if(!sessionDate) return showToast("Selecione uma data no calendário!", "#ef4444");
        db.collection('coachData').doc(getActiveDocId(user.uid)).get().then(doc => {
            if(doc.exists){
                const pastWorkout = doc.data().exerciseHistory?.[sessionDate];
                if(pastWorkout && pastWorkout.length > 0){ setExercises(pastWorkout); showToast("Treino importado com sucesso!", "#10b981"); } 
                else { showToast("Nenhum treino encontrado nesta data.", "#eab308"); }
            }
        });
    };

    const fixWorkoutForToday = () => {
        db.collection('coachData').doc(getActiveDocId(user.uid)).set({ exerciseHistory: { [sessionDate]: exercises } }, { merge: true }).then(() => {
            showToast(`Sessão salva para o dia ${formatDateBR(sessionDate)} no app do atleta!`, "#10b981");
        });
    };

    const exportarPDF = async () => {
        showToast("Gerando Ficha Padrão Europeu...", "#3b82f6");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const pageWidth = doc.internal.pageSize.getWidth();
        
        const customCoach = document.getElementById('pdfCoachName')?.value || "Adriano Cabeça";
        const customHeaderColor = document.getElementById('pdfHeaderColor')?.value || "#1e293b";
        const customBarColor = document.getElementById('pdfBarColor')?.value || "#047857";
        const teamName = initialData?.header?.teamName || "AC NOVA GERAÇÃO"; 
        const logoUrl = initialData?.logo;
        
        let tempoTotal = 0;
        if (exercises && exercises.length > 0) {
            exercises.forEach(ex => { tempoTotal += parseInt(ex.duration) || 0; });
        }

        doc.setFillColor(customHeaderColor); 
        doc.rect(0, 0, pageWidth, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(20);
        doc.setFont("helvetica", "bold");
        doc.text(teamName, 20, 20);
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        const today = new Date().toLocaleDateString('pt-BR');
        doc.text(`PLANO DE TREINO | DATA: ${today} | DURAÇÃO: ${tempoTotal > 0 ? tempoTotal + ' MIN' : '-'}`, 20, 28);
        doc.text(`TREINADOR: ${customCoach.toUpperCase()}`, 20, 34);

        if (logoUrl) {
            try {
                const imgLogo = new Image();
                imgLogo.crossOrigin = "Anonymous";
                imgLogo.src = logoUrl;
                await new Promise((resolve) => { imgLogo.onload = resolve; imgLogo.onerror = resolve; });
                doc.addImage(imgLogo, 'PNG', pageWidth - 45, 5, 30, 30);
            } catch (e) { console.log("Erro logo PDF", e); }
        }

        let y = 50;

        if (!exercises || exercises.length === 0) {
            doc.setTextColor(0, 0, 0);
            doc.text("Nenhum exercício cadastrado para a sessão.", 20, y);
            doc.save("Plano_de_Treino.pdf");
            return;
        }

        for (let i = 0; i < exercises.length; i++) {
            const ex = exercises[i];
            if (y > 230) { doc.addPage(); y = 20; }

            doc.setDrawColor(200, 200, 200);
            doc.setFillColor(248, 250, 252);
            doc.rect(15, y, pageWidth - 30, 80, 'FD');
            doc.setFillColor(customBarColor); 
            doc.rect(15, y, pageWidth - 30, 10, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            const titulo = ex.target || ex.title || ex.name || "ATIVIDADE SEM NOME";
            const tempo = ex.duration ? `${ex.duration} MIN` : "-";
            doc.text(`${i + 1}. ${titulo.toUpperCase()}`, 20, y + 7);
            doc.text(tempo, pageWidth - 35, y + 7);

            doc.setTextColor(50, 50, 50);
            doc.setFontSize(9);
            doc.setFont("helvetica", "bold");
            doc.text("Estrutura:", 20, y + 18);
            doc.setFont("helvetica", "normal");
            doc.text(`${ex.blocks || ex.sets || '-'} Séries x ${ex.duration || ex.reps || '-'} | Pausa: ${ex.rest || '-'}`, 40, y + 18);

            doc.setFont("helvetica", "bold");
            doc.text("Pontos-Chave e Comportamentos:", 20, y + 26);
            doc.setFont("helvetica", "normal");
            const notas = doc.splitTextToSize(ex.notes || ex.description || ex.objective || "Sem observações detalhadas.", 85);
            doc.text(notas, 20, y + 32);

            if (ex.gifUrl) {
                try {
                    const imgBoard = new Image();
                    imgBoard.crossOrigin = "Anonymous";
                    imgBoard.src = ex.gifUrl;
                    await new Promise((resolve) => { imgBoard.onload = resolve; imgBoard.onerror = resolve; });
                    doc.addImage(imgBoard, 'JPEG', 110, y + 14, 80, 60); 
                } catch (e) {
                    doc.setDrawColor(220); doc.rect(110, y + 14, 80, 60); doc.text("Sem Prancheta", 135, y + 45);
                }
            } else {
                doc.setDrawColor(220); doc.rect(110, y + 14, 80, 60); doc.text("Sem Prancheta", 135, y + 45);
            }
            y += 85; 
        }

        doc.save(`Ficha_de_Treino_${today.replace(/\//g, '-')}.pdf`);
        showToast("Ficha gerada com sucesso!", "#10b981");
    }

    const notificarTreino = () => {
        const dataFormatada = formatDateBR(sessionDate);
        let focoTexto = getAiSuggestion().replace(/🚨 IA: |⚠️ IA: |✅ IA: /g, '');
        const text = `⚽ *FALA RAPAZIADA!* ⚽\n\nA sessão de treino do dia *${dataFormatada}* já está liberada e detalhada no App.\n\n🎯 *Diretriz:* ${focoTexto}\n\nAssistam aos vídeos da vídeo-análise e confiram a prancheta antes de irmos pro campo. Já vão mentalizando o trabalho!\n\n🔐 Acesse pelo seu link individual do Portal do Atleta enviado pela comissão.`;
        const whatsappUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
        window.open(whatsappUrl, '_blank');
        showToast("Redirecionando para o WhatsApp...", "#10b981");
    };

    const saveExercise = () => {
        if(!form.title) return showToast("Digite o nome da Atividade/Exercício!", "#ef4444");
        
        const finalForm = { ...form, type: trainingType };
        if (trainingType === 'campo' && !fieldTargets.includes(form.target)) {
            finalForm.target = fieldTargets[0];
        }

        if (editId) {
            setExercises(exercises.map(ex => ex.id === editId ? { ...ex, ...finalForm } : ex));
            setEditId(null);
            showToast("Exercício Atualizado!", "#10b981");
        } else {
            setExercises([...exercises, { id: Date.now(), ...finalForm }]);
            showToast("Adicionado à Sessão!", "#10b981");
        }
        
        setForm({ title: '', gifUrl: '', videoUrl: '', sets: '', reps: '', rest: '', target: trainingType === 'academia' ? targetOptions[0] : fieldTargets[0], order: '', period: form.period, description: '', type: trainingType, duration: '', pse: '', objective: '' });
    };

    const editExercise = (ex) => {
        setTrainingType(ex.type || 'academia');
        setForm({
            title: ex.title || '', gifUrl: ex.gifUrl || '', videoUrl: ex.videoUrl || '',
            sets: ex.sets || '', reps: ex.reps || '', rest: ex.rest || '',
            target: ex.target || (ex.type === 'campo' ? fieldTargets[0] : targetOptions[0]),
            order: ex.order || '', period: ex.period || 'am', description: ex.description || '', type: ex.type || 'academia',
            duration: ex.duration || '', pse: ex.pse || '', objective: ex.objective || ''
        });
        setEditId(ex.id);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // FUNÇÕES DA GALERIA MULTI-SELEÇÃO
    const toggleLibSelection = (item) => {
        if (selectedLibItems.some(i => i.id === item.id)) {
            setSelectedLibItems(selectedLibItems.filter(i => i.id !== item.id));
        } else {
            setSelectedLibItems([...selectedLibItems, item]);
        }
    };

    const addSelectedLibraryItems = () => {
        if (selectedLibItems.length === 0) return showToast("Nenhum item selecionado", "#eab308");

        const newExercises = selectedLibItems.map((item, index) => {
            const isField = ['Tático', 'Técnico', 'Coletivo', 'Bola Parada', 'Mini Jogo'].includes(item.category || item.method);
            return {
                id: Date.now() + index,
                title: item.title || item.name || '',
                gifUrl: item.gifUrl || item.image || '',
                videoUrl: item.videoUrl || item.video || '',
                description: item.tacticalNotes || item.description || item.desc || '',
                sets: item.sets || item.time?.toString() || '',
                reps: item.reps || '',
                rest: item.rest || '',
                type: isField ? 'campo' : 'academia',
                target: item.category || item.method || (isField ? fieldTargets[0] : targetOptions[0]),
                duration: item.duration || '',
                pse: item.pse || '',
                objective: item.objective || '',
                period: form.period // Pega o turno atual (Manhã ou Tarde) selecionado na tela

        });

        setExercises([...exercises, ...newExercises]);
        setSelectedLibItems([]);

        const dataStr = e.dataTransfer.getData('text/plain');

        const data = JSON.parse(dataStr);

        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        if (!data.fromField) {
            if(data.isOpp) setOppBench(b => b.filter(item => item.idx !== data.idx));
            else setBench(b => b.filter(item => item.idx !== data.idx));

            setFieldPlayers(f => f.filter(item => item.idx !== data.idx));

 const GameDayView = ({ players, setPlayers, themeColor, matchMinutes, setMatchMinutes, user, exercises, library, trainingLog }) => {
    const [matchDate, setMatchDate] = useState(getTodayStr());
    const [opponent, setOpponent] = useState('');
    const [homeScore, setHomeScore] = useState(0);
    const [awayScore, setAwayScore] = useState(0);
    const safePs = safeArray(players);
    const [showTacticalBoard, setShowTacticalBoard] = useState(false);

    // NOVIDADE: Estado para as observações (salva atrelado à data do jogo)
    const currentNotes = matchMinutes[matchDate]?.notes || '';
    
    const updateNotes = (val) => {
        const newMins = {...matchMinutes};
        if(!newMins[matchDate]) newMins[matchDate] = {};
        newMins[matchDate].notes = val;
        setMatchMinutes(newMins);
        const docId = typeof getActiveDocId === 'function' ? getActiveDocId(user?.uid) : user?.uid;
        if(user) db.collection('coachData').doc(docId).update({ matchMinutes: newMins });
    };

    const updateStatDirect = (pIdx, stat, val) => {
        const newPs = [...safePs];
        if (!newPs[pIdx].stats) newPs[pIdx].stats = { g: 0, a: 0, yc: 0, rc: 0 };
        newPs[pIdx].stats[stat] = val === '' ? '' : Math.max(0, parseInt(val) || 0);
        setPlayers(newPs);
    };

    const checkProntidao = (index) => {
        let queixas = 0;
        const hoje = new Date();
        for(let i = 1; i <= 3; i++) {
            let d = new Date();
            d.setDate(hoje.getDate() - i);
            let dataStr = d.toISOString().split('T')[0];
            if(trainingLog && trainingLog[dataStr] && trainingLog[dataStr][index]?.soreness > 6) {
                queixas++;
            }
        }
        return queixas >= 2;
    };

    const updateMins = (pIdx, val) => {
        const newMins = {...matchMinutes};
        if(!newMins[matchDate]) newMins[matchDate] = {};
        newMins[matchDate][pIdx] = { ...newMins[matchDate][pIdx], mins: parseInt(val) || 0 };
        setMatchMinutes(newMins);
        const docId = typeof getActiveDocId === 'function' ? getActiveDocId(user?.uid) : user?.uid;
        if(user) db.collection('coachData').doc(docId).update({ matchMinutes: newMins });
    };

    const updateWeight = (pIdx, field, val) => {
        const newMins = {...matchMinutes};
        if(!newMins[matchDate]) newMins[matchDate] = {};
        newMins[matchDate][pIdx] = { ...newMins[matchDate][pIdx], [field]: val };
        setMatchMinutes(newMins);
        const docId = typeof getActiveDocId === 'function' ? getActiveDocId(user?.uid) : user?.uid;

};

    const player = safePlayers[selectedIndex];

    const frequentPain = Object.entries(painCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

                    <div className="grid grid-cols-1 xl:grid-cols-3 gap-4">
                        <section className="xl:col-span-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5 shadow-sm"><h3 className="text-xs font-black uppercase dark:text-white mb-4">Prontidão e wellness — 7 dias</h3><div className="grid grid-cols-2 md:grid-cols-5 gap-3">{[['Sono','sleep'],['Estresse','stress'],['Fadiga','fatigue'],['Dor','soreness'],['Humor','mood']].map(([label,key])=><div key={key} className="bg-slate-50 dark:bg-slate-900 rounded-xl p-3 text-center border border-slate-100 dark:border-slate-700"><div className="text-[9px] font-black text-slate-400 uppercase">{label}</div><div className="text-2xl font-black dark:text-white mt-1">{avgWellness(key)}</div><div className="text-[8px] text-slate-400">média 1–7</div></div>)}</div><div className="mt-5"><div className="text-[10px] font-black uppercase text-slate-400 mb-2">Regiões com dor recorrente</div><div className="flex flex-wrap gap-2">{frequentPain.length?frequentPain.map(([zone,count])=><span key={zone} className="bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-300 border border-red-200 dark:border-red-800 px-3 py-1.5 rounded-full text-[10px] font-bold">{zone}: {count}x</span>):<span className="text-xs text-slate-400">Sem dor recorrente registrada.</span>}</div></div></section>

const ReportsView = ({ players, trainingLog, dmRecords, attendanceLog, matchMinutes, header, logo, themeColor }) => {
    const [endDate, setEndDate] = useState(getTodayStr());
    const dates = getDatesInRange(endDate, 7).reverse();
    const safePlayers = safeArray(players);
    const activeDm = safeArray(dmRecords).filter(record=>record?.status==='Active');
    const dailyRows = dates.map(date => {
        const logs = safeObj(trainingLog[date]);
        const loads = safePlayers.map((_,index)=>calcDailyLoad(logs[index])).filter(Boolean);
        const responses = safePlayers.filter((_,index)=>safeObj(logs[index]?.wellness).sleep).length;
        const attendance = safePlayers.map((_,index)=>attendanceLog?.[date]?.[index]).filter(Boolean);
        const present = attendance.filter(status=>['P','T'].includes(status)).length;
        return { date, avgLoad: loads.length?Math.round(loads.reduce((a,b)=>a+b,0)/loads.length):0, responses, present, attendanceCount: attendance.length };
    });
    const avgLoad = Math.round(dailyRows.reduce((sum,row)=>sum+row.avgLoad,0) / Math.max(1,dailyRows.filter(row=>row.avgLoad>0).length));
    const responseTotal = dailyRows.reduce((sum,row)=>sum+row.responses,0);
    const possibleResponses = safePlayers.length * dates.length;
    const adherence = possibleResponses ? Math.round((responseTotal/possibleResponses)*100) : 0;
    const presentTotal = dailyRows.reduce((sum,row)=>sum+row.present,0);
    const attendanceTotal = dailyRows.reduce((sum,row)=>sum+row.attendanceCount,0);
    const attendanceRate = attendanceTotal ? Math.round((presentTotal/attendanceTotal)*100) : 0;
    const alerts = safePlayers.map((player,index)=>{
        const last = safeObj(trainingLog?.[endDate]?.[index]?.wellness);
        const load7 = dates.reduce((sum,date)=>sum+calcDailyLoad(trainingLog?.[date]?.[index]),0);
        const reasons=[];
        if(player.injured) reasons.push('DM');
        if((Number(last.soreness)||0)>=6) reasons.push('dor alta');
        if((Number(last.fatigue)||0)>=6) reasons.push('fadiga alta');
        if(load7>=3000) reasons.push('carga semanal alta');
        return reasons.length?{name:player.name,reasons}:null;
    }).filter(Boolean);
    const reportText = `*RELATÓRIO SEMANAL PROCOACH*\nEquipe: ${header?.teamName || 'Equipe'}\nPeríodo: ${formatDateBR(dates[0])} a ${formatDateBR(endDate)}\n\nCarga média diária: ${avgLoad || '-'} U.A.\nAdesão ao wellness: ${adherence}%\nFrequência registrada: ${attendanceRate || '-'}%\nAtletas no DM: ${activeDm.length}\nAlertas: ${alerts.length}\n\n${alerts.length?'Atenção:\n'+alerts.map(a=>`• ${a.name}: ${a.reasons.join(', ')}`).join('\n'):'Nenhum alerta prioritário.'}`;
    const copyReport = async () => { try { await navigator.clipboard.writeText(reportText); showToast('Relatório copiado para o WhatsApp!', '#10b981'); } catch(e) { alert(reportText); } };
    return (
        <div className="h-full overflow-y-auto bg-slate-50 dark:bg-slate-900 p-4 md:p-6 custom-scroll pb-32">
            <div id="executive-report" className="max-w-6xl mx-auto space-y-5">
                <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4"><div className="flex items-center gap-4">{logo?<img src={logo} className="w-14 h-14 object-contain"/>:<div className="w-14 h-14 rounded-xl flex items-center justify-center text-white" style={{backgroundColor:themeColor}}><Icon name="barChart" size={28}/></div>}<div><div className="text-[10px] uppercase font-black text-slate-400">Inteligência e relatórios</div><h2 className="text-2xl font-black uppercase dark:text-white">Resumo Executivo Semanal</h2><div className="text-xs font-bold text-slate-500">{header?.teamName || 'ProCoach'} · {formatDateBR(dates[0])} a {formatDateBR(endDate)}</div></div></div><div className="flex flex-wrap gap-2 no-print"><input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} className="border dark:border-slate-600 rounded-lg px-3 py-2 text-xs font-bold dark:bg-slate-700 dark:text-white"/><button onClick={copyReport} className="bg-emerald-600 text-white rounded-lg px-4 py-2 text-[10px] font-black uppercase">Copiar resumo</button><button onClick={()=>window.print()} className="bg-slate-800 text-white rounded-lg px-4 py-2 text-[10px] font-black uppercase">Imprimir / PDF</button></div></div>
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">{[['Carga média',avgLoad?`${avgLoad} U.A.`:'-','Média diária do elenco'],['Adesão wellness',`${adherence}%`,`${responseTotal}/${possibleResponses} respostas`],['Frequência',attendanceRate?`${attendanceRate}%`:'-','Registros da semana'],['Disponibilidade',`${safePlayers.length-activeDm.length}/${safePlayers.length}`,`${activeDm.length} atletas no DM`]].map(([label,value,detail])=><div key={label} className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-4 shadow-sm"><div className="text-[9px] uppercase font-black text-slate-400">{label}</div><div className="text-3xl font-black dark:text-white mt-1">{value}</div><div className="text-[9px] font-bold text-slate-500 mt-1">{detail}</div></div>)}</div>
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4"><div className="lg:col-span-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5 shadow-sm"><h3 className="text-xs font-black uppercase dark:text-white mb-4">Indicadores por dia</h3><div className="overflow-x-auto"><table className="w-full text-xs"><thead><tr className="text-left text-[9px] uppercase text-slate-400 border-b dark:border-slate-700"><th className="py-2">Data</th><th>Carga média</th><th>Wellness</th><th>Presentes</th></tr></thead><tbody>{dailyRows.map(row=><tr key={row.date} className="border-b dark:border-slate-700 dark:text-slate-300"><td className="py-3 font-bold">{formatDateBR(row.date)}</td><td>{row.avgLoad || '-'}</td><td>{row.responses}/{safePlayers.length}</td><td>{row.attendanceCount?`${row.present}/${row.attendanceCount}`:'-'}</td></tr>)}</tbody></table></div></div><div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5 shadow-sm"><h3 className="text-xs font-black uppercase dark:text-white mb-4">Prioridades da comissão</h3><div className="space-y-2 max-h-72 overflow-y-auto custom-scroll">{alerts.length?alerts.map(alert=><div key={alert.name} className="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-3"><div className="text-[10px] font-black text-red-700 dark:text-red-300">{alert.name}</div><div className="text-[9px] text-red-600 dark:text-red-400 mt-1">{alert.reasons.join(' · ')}</div></div>):<div className="text-xs font-bold text-emerald-600">Nenhum alerta prioritário nesta semana.</div>}</div></div></div>
                <div className="bg-slate-900 text-white rounded-2xl p-5 shadow-xl"><div className="text-[10px] font-black uppercase text-blue-300 mb-2">Conclusão automática baseada nos registros</div><p className="text-sm font-medium leading-relaxed">{adherence<70?'A qualidade dos dados está baixa; priorize a adesão ao wellness antes de decisões mais sensíveis. ':''}{avgLoad>600?'A carga média semanal ficou elevada; considere recuperação e controle de volume. ':avgLoad>0?'A carga registrada permaneceu em uma faixa operacional moderada. ':'Ainda não há carga suficiente registrada. '}{activeDm.length?`${activeDm.length} atleta(s) permanecem no departamento médico e exigem acompanhamento de retorno. `:'O elenco não possui lesões ativas registradas. '}{alerts.length?'Revise os atletas destacados antes do próximo treino ou convocação.':'Não foram identificados alertas prioritários nos critérios atuais.'}</p><div className="text-[9px] text-slate-400 mt-3">Este resumo apoia a decisão profissional; não substitui avaliação médica, fisiológica ou técnica.</div></div>
            </div>
        </div>
    );
};

  const DashboardView = ({ players, days, trainingLog, dmRecords, themeColor, attendanceLog, trainingStatus, assessments, matchMinutes, nextGame, setNextGame, header, setHeader, onNavigate }) => {
    const todayStr = getTodayStr();
    const safePs = Array.isArray(players) ? players : [];
    const activeDM = Array.isArray(dmRecords) ? dmRecords.filter(r => r && r.status === 'Active') : [];
    
    const d = new Date();
    const dayOfWeek = d.getDay(); 
    const mappedIndex = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    const todayPlan = days[mappedIndex] || {};
