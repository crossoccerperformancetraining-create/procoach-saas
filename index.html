            const getActiveDocId = (uid) => {

        const AnalysisModal = ({ day, onClose, onUpdate }) => {

            return (

                        </h3>
                        <div className="grid grid-cols-2 gap-4 mb-6">
                            <input type="number" className="bg-slate-900 p-4 rounded-xl text-white font-black w-full" value={analysisData.timeTarget} onChange={(e) => setAnalysisData({...analysisData, timeTarget: e.target.value})} placeholder="Tempo (min)" />
                            <input type="number" className={`p-4 rounded-xl font-black w-full bg-slate-900 ${analysisData.pseTarget > 8 ? 'text-red-500' : 'text-white'}`} value={analysisData.pseTarget} onChange={(e) => setAnalysisData({...analysisData, pseTarget: e.target.value})} placeholder="PSE (1-10)" />
                        </div>
                        <div className={`mb-6 p-3 rounded-lg text-[11px] font-bold border ${isHigh ? 'bg-red-500/10 text-red-400 border-red-500/20' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20'}`}>
                            {isHigh ? '⚠️ ALERTA: Carga muito alta!' : '✅ Volume controlado.'}
                        </div>
                        <button onClick={() => { onUpdate(day.id, analysisData); onClose(); }} className="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase hover:bg-blue-700">SALVAR E FECHAR</button>
                    </div>
                </div>
            );
            const AnalysisModal = ({ day, onClose, onUpdate }) => {
    const [analysisData, setAnalysisData] = useState({ 
        timeTarget: day.plannedMins || '', 
        pseTarget: day.pseTarget || '' 
    });

    return (
        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 animate-fade-in" onClick={onClose}>
            <div className="bg-[#1e293b] rounded-2xl shadow-2xl p-6 w-full max-w-sm border border-slate-700" onClick={e=>e.stopPropagation()}>
                <h3 className="text-xl font-black text-white uppercase mb-6">Configurar Carga: {day.name}</h3>
                <div className="grid grid-cols-2 gap-4 mb-6">
                    <input type="number" className="bg-slate-900 p-4 rounded-xl text-white font-black w-full" value={analysisData.timeTarget} onChange={(e) => setAnalysisData({...analysisData, timeTarget: e.target.value})} placeholder="Tempo (min)" />
                    <input type="number" className="bg-slate-900 p-4 rounded-xl text-white font-black w-full" value={analysisData.pseTarget} onChange={(e) => setAnalysisData({...analysisData, pseTarget: e.target.value})} placeholder="PSE (1-10)" />
                </div>
                <button onClick={() => { onUpdate(day.id, analysisData); onClose(); }} className="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase hover:bg-blue-700">SALVAR E FECHAR</button>

};
        };
  const MicrocycleView = ({ days, setDays, themeColor, players, trainingLog, library }) => {
        const [modalOpen, setModalOpen] = useState(false);
        const [aiModal, setAiModal] = useState(null);
        const [activeSlot, setActiveSlot] = useState({ dayId: null, period: null });
        
        const [customLabel, setCustomLabel] = useState('');
        const [customColor, setCustomColor] = useState('#2563eb');
        const [isExporting, setIsExporting] = useState(false);
        
        const [startDate, setStartDate] = useState(() => {
            const d = new Date();
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
            const monday = new Date(d.setDate(diff));
            return monday.toISOString().split('T')[0];
        });

        const safeDays = days.map(d => ({...d, plannedMins: d.plannedMins || '', actualMins: d.actualMins || ''}));
      
       // CÉREBRO: Calcula a carga real somando os blocos do dia
    const calculateDailyLoad = (dayIndex) => {
        if (!days || !days[dayIndex] || !days[dayIndex].blocks) return 0;
        return days[dayIndex].blocks.reduce((sum, b) => sum + (parseInt(b.duration) || 0), 0);
    };

        // 1. CÉREBRO DA IA: Calcula a meta baseada no MD
        // 1. CÉREBRO DA IA: Calcula a meta baseada na fase
        const calcularMetaIA = (md) => {
            if (!md) return '-';
            
            // Padrão MD (Semana Competitiva)
            if (md.includes('MD-5')) return '85';
            if (md.includes('MD-4')) return '75';
            if (md.includes('MD-3')) return '65';
            if (md.includes('MD-2')) return '45';
            if (md.includes('MD-1')) return '35';
            if (md.includes('JOGO')) return '90';
            if (md.includes('MD+1') || md.includes('MD+2')) return '40';
            
            // Semana Sem Jogo (Aquisitiva)
            if (md.includes('Resistência')) return '90'; // Alto Volume
            if (md.includes('Tático')) return '80';      // Volume Moderado/Alto
            if (md.includes('Força')) return '65';       // Volume Moderado, Alta Tensão
            if (md.includes('Velocidade')) return '45';  // Baixo Volume, Altíssima Intensidade
            
            // Pré-Temporada
            if (md.includes('PRÉ')) return '100'; // Volume alto característico
            if (md.includes('FOLGA')) return '0';
            
            return '55'; // Padrão
        };
        const getDayDate = (index) => {
            const date = new Date(startDate + 'T12:00:00'); 
            date.setDate(date.getDate() + index);
            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
        };

        const eventTypes = [ 
            { label: 'JOGO', color: 'bg-[#dc2626]', text: 'text-white', load: 100 }, 
            { label: 'RECUPERAÇÃO', color: 'bg-[#3b82f6]', text: 'text-white', load: 20 }, 
            { label: 'ACADEMIA', color: 'bg-[#eab308]', text: 'text-slate-900', load: 40 }, 
            { label: 'FOLGA', color: 'bg-[#94a3b8]', text: 'text-slate-800', load: 0 },
            { label: 'TREINO FÍSICO', color: 'bg-[#16a34a]', text: 'text-white', load: 60 },
            { label: 'TÉCNICO', color: 'bg-[#2563eb]', text: 'text-white', load: 50 }, 
            { label: 'JOGUINHO', color: 'bg-[#ec4899]', text: 'text-white', load: 60 },
            { label: 'ORG. OFENSIVA', color: 'bg-[#0ea5e9]', text: 'text-white', load: 60 }, 
            { label: 'ORG. DEFENSIVA', color: 'bg-[#f97316]', text: 'text-white', load: 60 }, 
            { label: 'TRANS. OFENSIVA', color: 'bg-[#06b6d4]', text: 'text-white', load: 70 }, 
            { label: 'TRANS. DEFENSIVA', color: 'bg-[#f43f5e]', text: 'text-white', load: 70 }, 
            { label: 'ABP OFENSIVA', color: 'bg-[#8b5cf6]', text: 'text-white', load: 30 }, 
            { label: 'ABP DEFENSIVA', color: 'bg-[#d946ef]', text: 'text-white', load: 30 }, 
            { label: 'TÁTICO GERAL', color: 'bg-[#10b981]', text: 'text-white', load: 60 }, 
            { label: 'PDI', color: 'bg-[#14b8a6]', text: 'text-white', load: 40 }
        ];

        const openModal = (dayId, period) => { setActiveSlot({ dayId, period }); setModalOpen(true); };
        
       const addEvent = (typeObj, isCustom = false) => {
        const newDays = safeDays.map(d => {
            if(d.id === activeSlot.dayId) {
                const currentEvents = Array.isArray(d[activeSlot.period]) ? d[activeSlot.period] : [];
                
                // MÁGICA DA INTEGRAÇÃO: Busca o Tempo e a PSE na Biblioteca
                let autoDuration = '';
                let autoPse = '';
                if(isCustom && library) {
                    // Procura na biblioteca um treino com o nome exato digitado ou selecionado
                    const treinoSalvo = library.find(item => item.title.toUpperCase() === customLabel.trim().toUpperCase());
                    if(treinoSalvo) {
                        autoDuration = treinoSalvo.duration || '';
                        autoPse = treinoSalvo.pse || '';
                    }
                }

                const newEvent = {
                    id: Date.now(),
                    type: isCustom ? customLabel.toUpperCase() : typeObj.label,
                    colorClass: isCustom ? '' : typeObj.color,
                    textClass: isCustom ? 'text-white' : typeObj.text,
                    customColor: isCustom ? customColor : null,
                    load: isCustom ? 50 : typeObj.load,
                    duration: autoDuration, // Preenchimento Automático do Tempo!
                    pse: autoPse            // Preenchimento Automático da PSE!
                };
                return { ...d, [activeSlot.period]: [...currentEvents, newEvent] };
            }
            return d;
                return d;
            });
            
            setDays(newDays);
            setModalOpen(false);
            if(isCustom) setCustomLabel('');

            const user = firebase.auth().currentUser;
            const docId = getActiveDocId ? getActiveDocId(user?.uid) : user?.uid;
            if(user) {
                db.collection('coachData').doc(docId).update({ days: newDays }).catch(err => console.error(err));
            }
        };

        const removeEvent = (dayId, period, eventId) => {
            const newDays = safeDays.map(d => d.id === dayId ? { ...d, [period]: (d[period] || []).filter(e => e.id !== eventId) } : d);
            setDays(newDays);
            const user = firebase.auth().currentUser;
            const docId = getActiveDocId ? getActiveDocId(user?.uid) : user?.uid;
            if(user) db.collection('coachData').doc(docId).update({ days: newDays });
        };

        const updateHeader = (dayId, field, val) => {
            const newDays = safeDays.map(d => d.id === dayId ? { ...d, [field]: val } : d);
            setDays(newDays);
            const user = firebase.auth().currentUser;
            const docId = getActiveDocId ? getActiveDocId(user?.uid) : user?.uid;
            if(user) db.collection('coachData').doc(docId).update({ days: newDays });
        };

        const handleUpdate = (field, val) => {
            const newDays = safeDays.map(d => d.id === aiModal.id ? { ...d, [field]: val } : d);
            setDays(newDays);
            setAiModal({ ...aiModal, [field]: val });
            const user = firebase.auth().currentUser;
            const docId = getActiveDocId ? getActiveDocId(user?.uid) : user?.uid;
            if(user) db.collection('coachData').doc(docId).update({ days: newDays });
        };

        const exportToPNG = () => {
            setIsExporting(true);
            showToast("Preparando planejamento...", "#3b82f6");
            setTimeout(async () => {
                const el = document.getElementById('microcycle-board');
                if(!el) { setIsExporting(false); return; }
                try {
                    const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#0f172a', useCORS: true });
                    canvas.toBlob(blob => {
                        smartShare(blob, `Microciclo_${startDate}.png`, 'Microciclo da Semana');
                        setIsExporting(false);
                    });
                } catch(e) {
                    setIsExporting(false);
                    showToast("Erro ao gerar imagem.", "#ef4444");
                }
            }, 500);
        };

        const renderAiAnalysis = () => {
            if(!aiModal) return null;
            
            const sugerido = Number(calcularMetaIA(aiModal.md)) || 55;
            const minsReal = Number(aiModal.actualMins) || 0;

            let feedback = minsReal === 0 ? `Para hoje (MD ${aiModal.md}), sugiro ${sugerido} minutos.` : 
                           minsReal > sugerido + 10 ? "⚠️ Carga elevada! Considere reduzir o volume amanhã." :
                           "✅ Treino dentro dos parâmetros de excelência.";

            return (
                <div className="fixed inset-0 bg-black/80 z-[99999] flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setAiModal(null)}>
                    <div className="bg-[#1e293b] p-6 rounded-3xl w-full max-w-sm border border-slate-700 shadow-2xl relative" onClick={e => e.stopPropagation()}>
                        <h3 className="text-xl font-black text-white text-center mb-6">ANÁLISE {aiModal.name} ({aiModal.md})</h3>
                        
                        <div className="bg-slate-900 p-4 rounded-xl mb-4 text-center border border-slate-700">
                            <p className="text-[10px] text-blue-400 font-bold uppercase">IA Sugere (Min)</p>
                            <div className="text-3xl font-black text-white">{sugerido}</div>
                        </div>

                        <div className="mb-6">
                            <p className="text-[10px] text-orange-500 font-bold uppercase">Tempo Realizado (Min)</p>
                            <input type="number" className="w-full bg-slate-900 p-4 text-xl font-black text-white border-b-2 border-orange-500 outline-none" 
                                   value={aiModal.actualMins || ''} 
                                   onChange={(e) => handleUpdate('actualMins', e.target.value)} />
                        </div>

                        {minsReal > 0 && (
                            <div className="bg-slate-700 p-3 rounded-lg text-xs font-bold text-white mb-4 animate-bounce">
                                {feedback}
                            </div>
                        )}
                        
                        <button onClick={()=>setAiModal(null)} className="w-full bg-blue-600 py-4 rounded-xl font-black text-white uppercase hover:bg-blue-500 transition-all shadow-lg">Salvar e Fechar</button>
                    </div>
                </div>
            );
        };

       // Define as cores dos cards baseadas no foco fisiológico
        const getThermoColor = (md) => {
            if (!md) return 'bg-[#1a4a3e] text-white';
            
            // Vermelho/Laranja: Alta Carga Fisiológica
            if(md.includes('MD-3') || md.includes('Resistência')) return 'bg-red-600 text-white';
            if(md.includes('MD-4') || md.includes('MD-5') || md.includes('Força')) return 'bg-orange-600 text-white';
            
            // Amarelo: Carga Moderada / Alerta de Velocidade
            if(md.includes('MD-2') || md.includes('Velocidade')) return 'bg-yellow-500 text-slate-900';
            
            // Verde/Azul: Tático e Recuperação
            if(md.includes('MD-1') || md.includes('Tático')) return 'bg-emerald-500 text-white';
            if(md.includes('MD+1') || md.includes('MD+2')) return 'bg-blue-500 text-white';
            
            // Especiais
            if(md.includes('JOGO')) return 'bg-slate-950 text-yellow-400 border-b-2 border-yellow-500';
            if(md.includes('PRÉ')) return 'bg-purple-700 text-white'; // Roxo para Pré-Temporada
            if(md.includes('FOLGA')) return 'bg-slate-500 text-white'; // Cinza para Folga
            
            return 'bg-[#1a4a3e] text-white';
        };

        return (
            <div className="h-full bg-slate-900 flex flex-col relative overflow-hidden animate-fade-in">
                {renderAiAnalysis()}
                <div className="bg-[#0f172a] p-4 border-b border-slate-800 flex justify-between items-center shrink-0">
                    <div className="flex flex-col">
                        <h2 className="font-black text-lg text-white italic flex gap-2 uppercase">
                            <Icon name="calendar" className="not-italic text-blue-500"/> Planeamento Semanal
                        </h2>
                        <div className="flex items-center gap-2 mt-1">
                            <span className="text-[9px] font-bold text-slate-500 uppercase">Início da Semana:</span>
                            <input type="date" className="bg-slate-800 text-white text-[10px] font-black p-1 rounded border border-slate-700 outline-none" value={startDate} onChange={(e) => setStartDate(e.target.value)} />
                        </div>

        const PlayerProfileModal = ({ player, playerIndex, logs, onClose, themeColor, setPlayers, players }) => {
            if (!player) return null;
            const today = getTodayStr(); 
            const currentLog = logs[today]?.[playerIndex] || {};
            const wellness = safeObj(currentLog.wellness);
            const dates = getDatesInRange(today, 7).reverse();
            const toggleInjury = () => { const n = [...players]; n[playerIndex].injured = !n[playerIndex].injured; setPlayers(n); };
            
            const getLoad = (d) => { 
                const l = logs[d]?.[playerIndex]; 
                if(!l) return 0;
                const rpeSum = (Number(l.rpe_am)||0)+(Number(l.rpe_pm)||0);
                const dur = Number(l.duration) || 0;
                return dur > 0 ? rpeSum * dur : rpeSum * 60; 
            };

            const todayLoad = getLoad(today);
            const historyDates = getDatesInRange(today, 7).slice(1); 
            let chronicLoad = 0; historyDates.forEach(d => chronicLoad += getLoad(d));

        const PSEView = ({ players, themeColor, trainingLog, setTrainingLog }) => {
            const [date, setDate] = useState(getTodayStr()); 
            const [globalDur, setGlobalDur] = useState('');
            const [localRPEs, setLocalRPEs] = useState({});
            const [saveStatus, setSaveStatus] = useState('');
            const saveTimeoutRef = useRef(null);

            useEffect(() => { 
                const c = {}; 
                safeArray(players).forEach((_, i) => { 
                    const log = trainingLog[date]?.[i] || {}; 
                    c[i] = { am: Number(log.rpe_am) || 0, pm: Number(log.rpe_pm) || 0, dur: Number(log.duration) || 0 }; 
                }); 
                setLocalRPEs(c); 
            }, [date, players, trainingLog]);

            const saveToMain = (currentLocal) => { 
                setSaveStatus('A Guardar...'); 
                const newLog = {...trainingLog}; 
                if(!newLog[date]) newLog[date] = {}; 
                safeArray(players).forEach((_, i) => { 
                    if(!newLog[date][i]) newLog[date][i] = {}; 
                    newLog[date][i].rpe_am = currentLocal[i].am; 
                    newLog[date][i].rpe_pm = currentLocal[i].pm; 
                    newLog[date][i].duration = currentLocal[i].dur;
                }); 
                setTrainingLog(newLog); 
                setTimeout(() => setSaveStatus('Salvo'), 500); 
                setTimeout(() => setSaveStatus(''), 2000); 
            };

            const updateRPE = (i, field, val) => { 
                const newValue = parseInt(val) || 0; 
                setLocalRPEs(prev => { 
                    const next = {...prev, [i]: {...(prev[i]||{am:0, pm:0}), [field]: newValue}}; 
                    if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current); 
                    saveTimeoutRef.current = setTimeout(() => { saveToMain(next); }, 1000); 
                    return next; 
                }); 
            };

            const applyGlobalDur = (val) => {
                setGlobalDur(val);
                const num = parseInt(val) || 0;
                setLocalRPEs(prev => {
                    const next = {};
                    safeArray(players).forEach((_, i) => {
                        next[i] = { ...(prev[i] || {am:0, pm:0}), dur: num };
                    });
                    if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
                    saveTimeoutRef.current = setTimeout(() => { saveToMain(next); }, 1000);
                    return next;

                            </div>

                            <div className="flex gap-2 flex-1 md:flex-none justify-end">
                                <button onClick={manualSave} className="bg-slate-200 dark:bg-slate-700 p-2 rounded hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300"><Icon name="save"/></button>
                                <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="bg-slate-100 dark:bg-slate-700 dark:text-white font-bold p-2 rounded border dark:border-slate-600 w-full md:w-auto outline-none"/>
                            </div>
                        </div>
                    </div>
                    
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col flex-1 min-h-0">

                            <div className="col-span-4">Atleta</div>
                            <div className="col-span-3 text-center">Manhã (0-10)</div>

                        <div className="divide-y divide-slate-100 dark:divide-slate-700 overflow-y-auto flex-1 custom-scroll">
                            {safeArray(players).map((p, i) => {

                                return (
                                    <div key={i} className={`grid grid-cols-12 p-3 items-center hover:bg-slate-50 dark:hover:bg-slate-700/50`}>

                                                <div className="w-8 h-8 rounded-full bg-slate-200 overflow-hidden shrink-0">{p.image?<img src={p.image} className="w-full h-full object-cover object-top"/>:<Icon name="user"/>}</div>
                                                <div>
                                                    <span className="font-bold text-sm text-slate-700 dark:text-slate-200 truncate block">{p.name}</span>

                                        <div className="col-span-3 flex justify-center"><input type="range" min="0" max="10" value={localRPEs[i]?.pm||0} onChange={e=>updateRPE(i,'pm',e.target.value)} className="w-16 md:w-24 mr-2 accent-orange-500"/><span className="font-bold w-4 text-center text-orange-500 dark:text-orange-400">{localRPEs[i]?.pm}</span></div>

        const TeamCoachAI = ({ activePlayers, pseAvg, dmCount }) => {

            else if (numericAvg >= 400) { title = "Zona de Alta Intensidade"; suggestion = "Treino exigente. Amanhã: Carga baixa/moderada (foco tático sem contato) para supercompensação."; colorClass = "bg-orange-800 text-orange-50"; } 
            else if (numericAvg >= 200) { title = "Zona de Manutenção/Desenvolvimento"; suggestion = "Carga Ideal. Amanhã: Pode manter a intensidade se não for véspera de jogo (MD-1)."; colorClass = "bg-green-800 text-green-50"; }

            if(dmCount >= 3) { suggestion += ` ALERTA: ${dmCount} atletas no DM. Atenção na rotação.`; }
            return (<div className={`md:col-span-2 rounded-xl shadow p-5 border border-slate-700 flex flex-col justify-center relative overflow-hidden ${colorClass}`}><div className="absolute top-0 right-0 p-4 opacity-10"><Icon name="brain" size={80}/></div><div className="flex items-center gap-2 mb-2 z-10"><div className="bg-white/20 p-1.5 rounded-full"><Icon name="brain" size={20}/></div><h3 className="font-bold text-sm uppercase tracking-wider opacity-80">Técnico Virtual (Equipe)</h3></div><div className="z-10"><div className="text-xl font-black mb-1">{title}</div><div className="text-sm font-medium opacity-90 leading-snug">{suggestion}</div></div></div>);
        };

     const PreGameView = ({ players, setPlayers, themeColor, trainingLog, dmRecords, matchMinutes, setMatchMinutes, getActiveDocId }) => {
            const [monitorDate, setMonitorDate] = useState(getTodayStr()); 
            const dailyData = safeObj(trainingLog[monitorDate]);
           const safePs = safeArray(players);
            const [showTacticalBoard, setShowTacticalBoard] = useState(false);
            
            const weeklyLoadStats = useMemo(() => {
                const dates = getDatesInRange(monitorDate, 7);
                let currentAccumulatedLoad = 0;

                dates.forEach(d => {
                    safePs.forEach((_, i) => {
                        currentAccumulatedLoad += calcDailyLoad(safeObj(trainingLog[d]?.[i]));
                    });
                });

                const avgLoadPerAtleta = safePs.length > 0 ? currentAccumulatedLoad / safePs.length : 0;
                const limit = 2800;
                const percentage = Math.min(100, (avgLoadPerAtleta / limit) * 100);
                
                let statusColor = "bg-green-500";
                let statusText = "ZONA SEGURA";
                if (percentage > 85) { 
                    statusColor = "bg-red-600 animate-pulse"; 
                    statusText = "ALERTA: SOBRECARGA NO ELENCO"; 
                } else if (percentage > 65) { 
                    statusColor = "bg-yellow-500"; 
                    statusText = "ATENÇÃO: CARGA ACUMULADA"; 
                }

                return { percentage, statusColor, statusText, avgLoadPerAtleta };
            }, [trainingLog, monitorDate, safePs]);

            // INTELIGÊNCIA ACWR: Painel Consolidado do Elenco
          // INTELIGÊNCIA ACWR CORRIGIDA: Painel Consolidado do Elenco
           // INTELIGÊNCIA ACWR CORRIGIDA: Painel Consolidado do Elenco
const acwrGroups = useMemo(() => {
    const groups = { danger: [], optimal: [], under: [] };
    safePs.forEach((p, i) => {
        if(!p || p.injured) return;
        const chronicDates = getDatesInRange(monitorDate, 28);
        let acuteLoad = 0; 
        let chronicLoadTotal = 0;
        let daysWithLoad = 0; // Contador de trava de segurança

        chronicDates.forEach((d, index) => {
            const dailyL = calcDailyLoad(trainingLog[d]?.[i]);
            if(dailyL > 0) { 
                chronicLoadTotal += dailyL; 
                daysWithLoad++; // Conta apenas dias com treino registrado
                if(index < 7) acuteLoad += dailyL; 
            }
        });
        
        // Só calculamos se o atleta tiver ao menos 14 dias de histórico real
        if (daysWithLoad >= 14 && chronicLoadTotal > 0) {
            const acwrVal = parseFloat((acuteLoad / (chronicLoadTotal / 4)).toFixed(2));
            const pData = { ...p, idx: i, acwr: acwrVal };
            
            if (acwrVal >= 1.5) groups.danger.push(pData);
            else if (acwrVal >= 0.8) groups.optimal.push(pData);
            else groups.under.push(pData);
        }
    });
    return groups;
}, [trainingLog, monitorDate, safePs]);

            const activePlayersIndices = [];
            safePs.forEach((p, i) => { if(p && safeObj(dailyData[i]?.wellness).sleep) activePlayersIndices.push(i); });
            
            const teamHooperAvg = activePlayersIndices.length > 0 
                ? Math.round(activePlayersIndices.reduce((acc, i) => acc + getWSum(dailyData[i]?.wellness), 0) / activePlayersIndices.length) 
                : 0;

            const rpePlayersIndices = [];
            safePs.forEach((p, i) => { if(p && calcDailyLoad(dailyData[i]) > 0) rpePlayersIndices.push(i); });
            
            const pseSum = rpePlayersIndices.reduce((acc, i) => acc + calcDailyLoad(dailyData[i]), 0);
            const pseAvgRaw = rpePlayersIndices.length > 0 ? Math.round(pseSum / rpePlayersIndices.length) : 0;
            const pseColor = pseAvgRaw >= 600 ? '#ef4444' : pseAvgRaw >= 300 ? '#eab308' : '#22c55e';
            
            const dmCount = safePs.filter(p => p && p.injured).length;

            const copySummary = () => {
                const dms = players.filter(p => p && p.injured).map(p => p.name).join(', ') || 'Nenhum';
                const risco = acwrGroups.danger.map(p => p.name).join(', ') || 'Nenhum';
                const text = `📊 *Resumo de Performance*\n🗓️ Data: ${formatDateBR(monitorDate)}\n\n📈 *Carga Média:* ${pseAvgRaw} sRPE\n⚠️ *Atletas em Risco (ACWR > 1.5):* ${risco}\n🏥 *Atletas no DM (${dmCount}):* ${dms}`;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => showToast("Resumo copiado para o WhatsApp!", "#10b981")).catch(()=> alert(text));
                } else {
                    alert("Copie o texto:\n" + text);
                }
            };

            const updateMinutes = (pIdx, val) => { 
                const newMins = {...matchMinutes}; 
                if(!newMins[monitorDate]) newMins[monitorDate] = {}; 
                newMins[monitorDate][pIdx] = { ...newMins[monitorDate][pIdx], mins: parseInt(val) || 0 }; 
                setMatchMinutes(newMins);
                const user = firebase.auth().currentUser;
                const docId = getActiveDocId ? getActiveDocId(user?.uid) : user?.uid;
                if(user) db.collection('coachData').doc(docId).update({ matchMinutes: newMins });
            };

            const renderMatchReadinessAI = (pLog, mins, isInjured, inTransition, dehydrationLevel) => {
                if (isInjured) return <div className="text-[9px] font-bold text-red-500 bg-red-900/30 px-2 py-0.5 rounded">Indisponível (DM)</div>;
                if (dehydrationLevel >= 2) return <div className="text-[9px] font-bold text-red-500 bg-red-900/30 px-2 py-0.5 rounded animate-pulse">DESIDRATAÇÃO CRÍTICA</div>;
                if (inTransition) return <div className="text-[9px] font-bold text-orange-500 bg-orange-900/30 px-2 py-0.5 rounded">Transição - Limite: 45min</div>;
                const load = calcDailyLoad(pLog);
                const wellness = getWSum(pLog?.wellness);
                if (mins >= 150) return <div className="text-[9px] font-bold text-red-500 bg-red-900/30 px-2 py-0.5 rounded">Risco - Poupe o Atleta</div>;
                if (load >= 600 || wellness >= 20) return <div className="text-[9px] font-bold text-yellow-500 bg-yellow-900/30 px-2 py-0.5 rounded">Fadigado - Controlar Minutos</div>;
                return <div className="text-[9px] font-bold text-green-500 bg-green-900/30 px-2 py-0.5 rounded">Apto para Jogo</div>;
            };

            const [viewProfile, setViewProfile] = useState(null);

            return (

     const WorkoutBuilderView = ({ themeColor, exercises, setExercises, library, postWorkout, setPostWorkout, players, trainingLog, initialData, user }) => {

const exportarPDF = async () => {
        showToast("Gerando Ficha Padrão Europeu...", "#3b82f6");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const pageWidth = doc.internal.pageSize.getWidth();
        
        // Capturando as escolhas do Painel na tela
        const customCoach = document.getElementById('pdfCoachName')?.value || "Adriano Cabeça";

        let tempoTotal = 0;

                const tempoExtraido = parseInt(ex.duration) || 0;
                tempoTotal += tempoExtraido;

        // --- 1. CABEÇALHO TÁTICO ---

        doc.rect(0, 0, pageWidth, 40, 'F');
        
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(20);
        doc.setFont("helvetica", "bold");
        doc.text(teamName, 20, 20);
        
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        const today = new Date().toLocaleDateString('pt-BR');
        doc.text(`PLANO DE TREINO | DATA: ${today} | DURAÇÃO: ${tempoTotal > 0 ? tempoTotal + ' MIN' : '-'}`, 20, 28);
        doc.text(`TREINADOR: ${customCoach.toUpperCase()}`, 20, 34);

        if (logoUrl) {
            try {
                const imgLogo = new Image();
                imgLogo.crossOrigin = "Anonymous";
                imgLogo.src = logoUrl;
                await new Promise((resolve) => {
                    imgLogo.onload = resolve;
                    imgLogo.onerror = resolve;
                });
                doc.addImage(imgLogo, 'PNG', pageWidth - 45, 5, 30, 30);
            } catch (e) {
                console.log("Erro logo PDF", e);
            }
        }

        let y = 50;

        if (!exercises || exercises.length === 0) {
            doc.setTextColor(0, 0, 0);

                            const missingCount = players.filter((p, i) => p && !p.injured && !trainingLog[todayStr]?.[i]?.wellness?.sleep).length;
                            if (missingCount > 0) {

                                    showToast(`🤖 IA: Faltam ${missingCount} atletas preencherem o Wellness hoje!`, "⚠️");

                if (isSyncing.current) {
                    isSyncing.current = false;
                    return;
                }

                const timeoutId = setTimeout(() => {
                    setSyncStatus('A Guardar...');
                    const dataToSave = { 
                        themeColor, players, trainingLog, assessments, 
                        dmRecords, matchMinutes, header, logo, attendanceLog,
                       darkMode, days, exercises, library, macrocycle, attendanceLog,
                        postWorkout, coachMsg, videoUrl, nextGame,
                        lastAlertSent

                    const docId = getActiveDocId(user.uid);

                            if(err.code === 'not-found') db.collection('coachData').doc(docId).set(dataToSave, { merge: true });
                            else setSyncStatus('❌ Erro Sinc');

                }, 800);
                return () => clearTimeout(timeoutId);
            }, [themeColor, players, trainingLog, assessments, dmRecords, matchMinutes, header, logo, darkMode, days, exercises, library, postWorkout, coachMsg, videoUrl, nextGame, lastAlertSent, user, activeTeam]);
           const dispararAlerta = async () => {
                setLastAlertSent(Date.now());
                const options = {
                    method: 'POST',
                    headers: {
                        accept: 'application/json',
                        'content-type': 'application/json',
                        Authorization: 'Basic COLE_AQUI_A_SUA_REST_API_KEY' 
                    },
                    body: JSON.stringify({
                        app_id: 'd5cc1c36-cb5b-403d-ab8b-327de95b7b7c',
                        included_segments: ['Subscribed Users'],
                        headings: { pt: '🚨 URGENTE: ProCoach MAX' },
                        contents: { pt: 'O professor atualizou a agenda e os treinos. Verifique agora!' },
                        priority: 10,
                        ttl: 86400,
                        content_available: true
                    })
                };
                try {
                    await fetch('https://onesignal.com/api/v1/notifications', options);
                    showToast("🔔 Notificação de alta prioridade enviada para o elenco!");
                } catch (err) {
                    console.error("Erro no OneSignal:", err);
                    showToast("Aviso interno salvo, mas houve erro no disparo push.");

                        themeColor, players, trainingLog, assessments, 
                        dmRecords, matchMinutes, header, logo, 
                        darkMode, days, exercises, library, 
                        postWorkout, coachMsg, videoUrl, nextGame, lastAlertSent
                    };
                    const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `procoach_backup_${new Date().toISOString().split('T')[0]}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showToast("Backup gerado com sucesso! ✅");
                } catch (err) {
                    showToast("Erro ao exportar arquivo ❌", "#ef4444");
                }
            };

            const handleImport = (newData) => {
                if(!newData) return;
                if(confirm("Isso irá substituir todos os dados atuais. Continuar?")) {
                    setThemeColor(newData.themeColor || '#1e3a8a');

                            {tab === 'assessment' && <AssessmentView players={players} themeColor={themeColor} assessments={assessments} setAssessments={setAssessments} dmRecords={dmRecords} />}
                            {tab === 'library' && <LibraryView themeColor={themeColor} library={library} setLibrary={setLibrary} initialData={initialData} user={user} />}
                            {tab === 'macro' && <MacrocycleView themeColor={themeColor} macrocycle={macrocycle} setMacrocycle={setMacrocycle} user={user} />}
                            {tab === 'workout' && <WorkoutBuilderView themeColor={themeColor} exercises={exercises} setExercises={setExercises} library={library} postWorkout={postWorkout} setPostWorkout={setPostWorkout} players={players} trainingLog={trainingLog} initialData={initialData} user={user} />}
                            {tab === 'freq' && <AttendanceView players={players} themeColor={themeColor} attendanceLog={attendanceLog} setAttendanceLog={setAttendanceLog} dmRecords={dmRecords} user={user} />}
                        </div>
                    </div>
                </div>
            );
        };
      const CloudWrapper = ({ user, activeTeam, setActiveTeam }) => {
            const [initialData, setInitialData] = useState(null);
            const [loadingCloud, setLoadingCloud] = useState(true);

            useEffect(() => {
                setLoadingCloud(true);
                const docId = getActiveDocId(user.uid);
                const unsubscribe = db.collection('coachData').doc(docId).onSnapshot(doc => {
                    setInitialData(sanitizeCloudData(doc.exists ? doc.data() : {}));
                    setLoadingCloud(false);
                }, err => {
                    console.error("Cloud fetch error:", err);
                    setInitialData(sanitizeCloudData({}));
                    setLoadingCloud(false);
                });
                return () => unsubscribe();
            }, [user, activeTeam]);

            if (loadingCloud) return <div className="flex flex-col h-screen w-screen items-center justify-center bg-slate-900 text-slate-300 font-bold">A Carregar Dados...</div>;
            return <ErrorBoundary><MainApp user={user} initialData={initialData} activeTeam={activeTeam} setActiveTeam={setActiveTeam} /></ErrorBoundary>;
        };

        const RootApp = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTeam, setActiveTeam] = useState(localStorage.getItem('procoach_active_team') || 'pro');

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                    const loader = document.getElementById('loading-state');
                    if(loader) loader.style.display = 'none';
                });
                return () => unsubscribe();
            }, []);

            const handleSetTeam = (team) => {
                setActiveTeam(team);
                localStorage.setItem('procoach_active_team', team);
            };

            if (loading) return null;
            if (!user) return <LoginScreen onLogin={() => {}} />;
            return <CloudWrapper user={user} activeTeam={activeTeam} setActiveTeam={handleSetTeam} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
