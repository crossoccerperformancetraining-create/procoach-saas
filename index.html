            return (<div className="flex flex-col items-center"><div className="mini-gauge-container"><svg viewBox="0 0 80 40" className="w-full h-full"><path d="M5 40 A35 35 0 0 1 75 40" fill="none" className="stroke-slate-200 dark:stroke-slate-700" strokeWidth="8"/><path d="M5 40 A35 35 0 0 1 28 12" fill="none" stroke="#22c55e" strokeWidth="8"/><path d="M28 12 A35 35 0 0 1 52 12" fill="none" stroke="#eab308" strokeWidth="8"/><path d="M52 12 A35 35 0 0 1 75 40" fill="none" stroke="#ef4444" strokeWidth="8"/></svg><div className="mini-gauge-needle" style={{transform:`rotate(${angle||0}deg)`}}></div></div><div className="text-[10px] font-black text-slate-700 dark:text-slate-200 -mt-1">{valNum}</div>{label && <div className="text-[8px] text-slate-400 dark:text-slate-500 uppercase font-bold">{label}</div>}</div>);
        };

        const DonutChart = ({ value, max, color, label, size=80 }) => {
            const valNum = Number(value)||0; const maxNum = Number(max)||20;
            const r=30, c=2*Math.PI*r, o=c-(valNum/maxNum)*c;
            return (<div className="relative flex items-center justify-center" style={{width:size,height:size}}><svg width={size} height={size} viewBox="0 0 80 80" className="rotate-[-90deg]"><circle cx="40" cy="40" r={r} className="stroke-slate-200 dark:stroke-slate-700" strokeWidth="8" fill="transparent"/><circle cx="40" cy="40" r={r} stroke={color} strokeWidth="8" fill="transparent" strokeDasharray={c} strokeDashoffset={o||0} strokeLinecap="round" style={{transition:'stroke-dashoffset 0.5s'}}/></svg><div className="absolute flex flex-col items-center"><span className="text-xl font-bold text-slate-700 dark:text-slate-200">{value}</span>{label&&<span className="text-[8px] uppercase font-bold text-slate-400 dark:text-slate-500">{label}</span>}</div></div>);
        };

        // --- ABA PRESCRIÇÃO (MELHORADA COM EDIÇÃO E ORDEM) ---
        const WorkoutBuilderView = ({ themeColor, exercises, setExercises, library, postWorkout, setPostWorkout }) => {
            const [form, setForm] = useState({ id: null, title: '', gifUrl: '', sets: '', reps: '', rest: '', target: 'Geral' });
            
            const addExercise = () => {
                if(!form.title) return showToast("Digite o nome!");
                if(form.id) {
                    setExercises(exercises.map(ex => ex.id === form.id ? form : ex));
                    showToast("Exercício Atualizado!");
                } else {
                    setExercises([{ ...form, id: Date.now() }, ...exercises]);
                    showToast("Adicionado!");
                }
                setForm({ id: null, title: '', gifUrl: '', sets: '', reps: '', rest: '', target: 'Geral' });
            };

            const removeExercise = (id) => setExercises(exercises.filter(ex => ex.id !== id));
            const editExercise = (ex) => { setForm(ex); showToast("Editando exercício..."); };
            const move = (idx, dir) => {
                const newArr = [...exercises];
                const target = idx + dir;
                if(target < 0 || target >= newArr.length) return;
                [newArr[idx], newArr[target]] = [newArr[target], newArr[idx]];
                setExercises(newArr);
            };

            const loadFromLibrary = (libId) => {
                const selected = library.find(l => l.id === parseInt(libId));
                if(selected) setForm({...form, title: selected.title, gifUrl: selected.gifUrl});
            };

            const activationList = exercises.filter(e => e.target === '🔥 Ativação Pré-Treino');
            const otherList = exercises.filter(e => e.target !== '🔥 Ativação Pré-Treino');

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in custom-scroll flex flex-col gap-6">
                    <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 shrink-0">
                        <div className="flex flex-col md:flex-row justify-between md:items-start gap-4 mb-6">
                            <div>
                                <h2 className="text-xl font-black text-slate-800 dark:text-slate-100 uppercase mb-2 flex items-center gap-2" style={{color: themeColor}}>
                                    <Icon name="bolt"/> {form.id ? 'Editando Exercício' : 'Prescrição Diária'}
                                </h2>
                            </div>
                            <div className="bg-blue-50 dark:bg-blue-900/30 p-3 rounded-lg border border-blue-200 dark:border-blue-800 md:w-64">
                                <label className="text-[10px] font-black text-blue-600 dark:text-blue-400 uppercase mb-1 flex items-center gap-1"><Icon name="medkit" size={12}/> Pós-Treino</label>
                                <select className="w-full border dark:border-blue-700 rounded p-1.5 text-xs font-bold dark:bg-slate-800 dark:text-white outline-none" value={postWorkout} onChange={e=>setPostWorkout(e.target.value)}>
                                    <option value="Bota Pneumática (15 min)">Bota Pneumática</option>
                                    <option value="Banheira de Gelo (Crioterapia)">Banheira de Gelo</option>
                                    <option value="Livre (Recuperação Passiva)">Livre</option>
                                </select>
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                            <div className="md:col-span-3"><label className="text-[10px] font-bold text-slate-400 uppercase">Biblioteca</label>
                                <select className="w-full border rounded p-2 text-xs font-bold dark:bg-slate-700 dark:text-white" onChange={e => loadFromLibrary(e.target.value)}><option value="">Puxar da Biblioteca...</option>{library.map(l => <option key={l.id} value={l.id}>{l.title}</option>)}</select>
                            </div>
                            <div className="md:col-span-3"><label className="text-[10px] font-bold text-slate-400 uppercase">Exercício</label><input type="text" className="w-full border rounded p-2 text-xs font-bold dark:bg-slate-700 dark:text-white" value={form.title} onChange={e=>setForm({...form, title: e.target.value})} /></div>
                            <div className="md:col-span-1"><label className="text-[10px] font-bold text-slate-400 uppercase">Sets/Reps</label><input type="text" className="w-full border rounded p-2 text-xs text-center dark:bg-slate-700 dark:text-white" value={form.sets} onChange={e=>setForm({...form, sets: e.target.value})} /></div>
                            <div className="md:col-span-2"><label className="text-[10px] font-bold text-slate-400 uppercase">Público Alvo</label>
                                <select className="w-full border rounded p-2 text-xs dark:bg-slate-700 dark:text-white" value={form.target} onChange={e=>setForm({...form, target: e.target.value})}>
                                    <option value="🔥 Ativação Pré-Treino">🔥 Ativação Pré-Treino</option>
                                    <option value="Geral">Elenco Geral</option>
                                    <option value="Prevenção">Prevenção / DM</option>
                                </select>
                            </div>
                            <div className="md:col-span-2"><label className="text-[10px] font-bold text-slate-400 uppercase">GIF Link</label><input type="text" className="w-full border rounded p-2 text-xs dark:bg-slate-700 dark:text-white" value={form.gifUrl} onChange={e=>setForm({...form, gifUrl: e.target.value})} /></div>
                            <div className="md:col-span-1"><button onClick={addExercise} className="w-full bg-blue-600 text-white font-bold p-2.5 rounded shadow hover:bg-blue-700 uppercase text-[10px]">{form.id ? 'Atualizar' : 'Add'}</button></div>
                        </div>
                    </div>

                    {/* LISTA SEPARADA: ATIVAÇÃO */}
                    <div className="space-y-4">
                        <h3 className="text-orange-500 font-black uppercase text-sm border-l-4 border-orange-500 pl-2">🔥 Bloco de Ativação</h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {activationList.map((ex, i) => (
                                <div key={ex.id} className="bg-white dark:bg-slate-800 rounded-xl overflow-hidden border border-orange-200 dark:border-orange-900 shadow-sm flex flex-col relative group">
                                    <div className="absolute top-2 right-2 flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                        <button onClick={()=>move(exercises.indexOf(ex), -1)} className="bg-white text-slate-800 p-1 rounded-full shadow border"><Icon name="up" size={12}/></button>
                                        <button onClick={()=>editExercise(ex)} className="bg-blue-500 text-white p-1 rounded-full shadow"><Icon name="edit" size={12}/></button>
                                        <button onClick={()=>move(exercises.indexOf(ex), 1)} className="bg-white text-slate-800 p-1 rounded-full shadow border"><Icon name="down" size={12}/></button>
                                        <button onClick={()=>removeExercise(ex.id)} className="bg-red-500 text-white p-1 rounded-full shadow"><Icon name="trash" size={12}/></button>
                                    </div>
                                    <div className="w-full h-32 bg-slate-200">{ex.gifUrl && <img src={ex.gifUrl} className="w-full h-full object-cover"/>}</div>
                                    <div className="p-3"><h3 className="font-bold text-sm uppercase truncate">{ex.title}</h3><p className="text-xs text-slate-500 font-bold">{ex.sets}</p></div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* LISTA SEPARADA: TREINO GERAL */}
                    <div className="space-y-4">
                        <h3 className="text-blue-500 font-black uppercase text-sm border-l-4 border-blue-500 pl-2">💪 Bloco Principal / Prevenção</h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {otherList.map((ex, i) => (
                                <div key={ex.id} className="bg-white dark:bg-slate-800 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col relative group">
                                    <div className="absolute top-2 right-2 flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                        <button onClick={()=>move(exercises.indexOf(ex), -1)} className="bg-white text-slate-800 p-1 rounded-full shadow border"><Icon name="up" size={12}/></button>
                                        <button onClick={()=>editExercise(ex)} className="bg-blue-500 text-white p-1 rounded-full shadow"><Icon name="edit" size={12}/></button>
                                        <button onClick={()=>move(exercises.indexOf(ex), 1)} className="bg-white text-slate-800 p-1 rounded-full shadow border"><Icon name="down" size={12}/></button>
                                        <button onClick={()=>removeExercise(ex.id)} className="bg-red-500 text-white p-1 rounded-full shadow"><Icon name="trash" size={12}/></button>
                                    </div>
                                    <div className="w-full h-32 bg-slate-200">{ex.gifUrl && <img src={ex.gifUrl} className="w-full h-full object-cover"/>}</div>
                                    <div className="p-3"><h3 className="font-bold text-sm uppercase truncate">{ex.title}</h3><p className="text-xs text-slate-500 font-bold">{ex.sets}</p><p className="text-[9px] text-blue-500 font-bold">{ex.target}</p></div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- ABA MATCH (COM CONTAGEM REGRESSIVA) ---
        const PreGameView = ({ players, themeColor, trainingLog, dmRecords, matchMinutes, setMatchMinutes, matchInfo, setMatchInfo }) => {
            const [monitorDate, setMonitorDate] = useState(getTodayStr());
            const [countdown, setCountdown] = useState("");

            useEffect(() => {
                const timer = setInterval(() => {
                    if(!matchInfo?.date) return setCountdown("DATA NÃO DEFINIDA");
                    const target = new Date(matchInfo.date);
                    const diff = target - new Date();
                    if(diff <= 0) return setCountdown("O JOGO COMEÇOU!");
                    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    setCountdown(`⚔️ FALTAM ${d} DIAS E ${h} HORAS`);
                }, 1000);
                return () => clearInterval(timer);
            }, [matchInfo?.date]);

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in custom-scroll">
                    <div className="bg-slate-900 p-6 rounded-2xl shadow-xl text-white mb-8 relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-8 opacity-10"><Icon name="trophy" size={120}/></div>
                        <div className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">Mural do Próximo Jogo</div>
                        <div className="flex flex-col md:flex-row justify-between items-center gap-6 z-10 relative">
                            <div className="text-center md:text-left">
                                <h3 className="text-xs font-bold text-slate-400 uppercase">Adversário</h3>
                                <BufferedInput className="bg-transparent text-3xl font-black outline-none border-b border-slate-700 w-full" placeholder="NOME DO TIME" value={matchInfo?.opponent || ''} onSave={val=>setMatchInfo({...matchInfo, opponent: val})}/>
                            </div>
                            <div className="bg-slate-800 px-6 py-4 rounded-2xl border border-slate-700 text-center">
                                <div className="text-[10px] font-bold text-yellow-500 uppercase mb-1">Contagem Regressiva</div>
                                <div className="text-xl font-mono font-black">{countdown}</div>
                                <input type="datetime-local" className="mt-2 bg-slate-700 text-[10px] rounded px-2 py-1 outline-none" value={matchInfo?.date || ''} onChange={e=>setMatchInfo({...matchInfo, date: e.target.value})}/>
                            </div>
                        </div>
                    </div>
                    {/* RESTO DA SUA ABA MATCH ORIGINAL ABAIXO */}
                    <div className="flex justify-between items-center mb-4"><h2 className="text-2xl font-bold flex items-center gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="barChart"/> Status da Equipe</h2></div>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                         <div className="bg-white dark:bg-slate-800 rounded-xl shadow p-4 border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center col-span-1"><SpeedometerGauge value={18} /></div>
                    </div>
                </div>
            );
        };

        // --- ABA ELENCO (COM CRAQUE E LINK WHATSAPP) ---
        const SquadView = ({ players, setPlayers, themeColor, trainingLog, dmRecords }) => {
            const [viewProfile, setViewProfile] = useState(null);
            const safePs = safeArray(players);

            const toggleCraque = (idx) => {
                const newPs = safePs.map((p, i) => ({ ...p, isCraque: i === idx ? !p.isCraque : false }));
                setPlayers(newPs);
                showToast(newPs[idx].isCraque ? "🏆 NOVO CRAQUE DA SEMANA!" : "Troféu removido.");
            };

            const sendWALink = (p, idx) => {
                const link = `${window.location.origin}${window.location.pathname}?id=${auth.currentUser.uid}&p=${idx}`;
                const msg = `Fala ${p.name}! 🚀\nAcesse seu portal de treino e wellness clicando aqui:\n${link}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            };

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in custom-scroll">
                    {viewProfile !== null && <PlayerProfileModal player={safePs[viewProfile]} playerIndex={viewProfile} logs={trainingLog} onClose={()=>setViewProfile(null)} themeColor={themeColor} setPlayers={setPlayers} players={safePs} />}
                    <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                        {safePs.map((p, i) => (
                            <div key={i} className={`bg-white dark:bg-slate-800 rounded-2xl shadow-lg border-2 p-5 flex flex-col items-center relative transition-all ${p.isCraque ? 'border-yellow-400 scale-105 shadow-yellow-500/20' : 'border-transparent'}`}>
                                <div className="absolute top-2 right-2 flex gap-2">
                                    <button onClick={()=>toggleCraque(i)} className={`p-1.5 rounded-full shadow-sm transition-all ${p.isCraque ? 'bg-yellow-400 text-white' : 'bg-slate-100 text-slate-300'}`}><Icon name="trophy" size={14}/></button>
                                    <button onClick={()=>sendWALink(p, i)} className="p-1.5 rounded-full bg-green-500 text-white shadow-sm"><Icon name="share" size={14}/></button>
                                </div>
                                <div className="w-20 h-20 rounded-full bg-slate-100 overflow-hidden mb-3 border-2" style={{borderColor: p.isCraque ? '#fbbf24' : themeColor}}>
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover object-top"/> : <Icon name="user" size={40} className="m-5 text-slate-300"/>}
                                </div>
                                <h3 className="font-black text-slate-800 dark:text-white uppercase truncate w-full text-center">{p.name}</h3>
                                <p className="text-[10px] font-bold text-slate-400 mb-4">{p.position || 'Atleta'}</p>
                                <button onClick={()=>setViewProfile(i)} className="w-full bg-slate-100 dark:bg-slate-700 p-2 rounded-lg font-bold text-[10px] uppercase hover:bg-slate-200">Ver Perfil</button>
                            </div>
                        ))}
                        <button onClick={()=>setPlayers([...safePs, {name: 'Novo Atleta', isCraque: false}])} className="dashed-btn h-44 flex flex-col items-center justify-center gap-2"><Icon name="plus" size={32}/> ADD ATLETA</button>
                    </div>
                </div>
            );
        };

        // --- MANTENDO O RESTO DO SISTEMA ---
        const MainApp = ({ user, initialData }) => {
            const [tab, setTab] = useState('squad');
            const [players, setPlayers] = useState(initialData.players || []);
            const [exercises, setExercises] = useState(initialData.exercises || []);
            const [trainingLog, setTrainingLog] = useState(initialData.trainingLog || {});
            const [matchInfo, setMatchInfo] = useState(initialData.matchInfo || { opponent: '', date: '' });
            const [themeColor, setThemeColor] = useState(initialData.themeColor || '#1e3a8a');
            const [library, setLibrary] = useState(initialData.library || []);
            const [dmRecords, setDmRecords] = useState(initialData.dmRecords || []);
            const [darkMode, setDarkMode] = useState(initialData.darkMode || false);

            useEffect(() => {
                const timer = setTimeout(() => {
                    db.collection('coachData').doc(user.uid).set({ ...initialData, players, exercises, trainingLog, matchInfo, themeColor, library, dmRecords, darkMode }, { merge: true });
                }, 2000);
                return () => clearTimeout(timer);
            }, [players, exercises, trainingLog, matchInfo, themeColor, library, dmRecords, darkMode]);

            return (
                <div className={`flex flex-col h-full ${darkMode ? 'dark' : ''}`}>
                    <header className="p-3 bg-white dark:bg-slate-800 shadow-sm border-b dark:border-slate-700 flex justify-between items-center shrink-0">
                        <div className="font-black italic text-xl" style={{color: themeColor}}>PROCOACH V145 MAX</div>
                        <div className="flex gap-2">
                             <button onClick={()=>setDarkMode(!darkMode)}><Icon name={darkMode?"sun":"moon"}/></button>
                             <button onClick={()=>auth.signOut().then(()=>window.location.reload())} className="text-red-500"><Icon name="logout"/></button>
                        </div>
                    </header>
                    <nav className="flex bg-slate-100 dark:bg-slate-950 p-1 overflow-x-auto gap-1">
                        {['squad','workout','match','dm','library'].map(t => (
                            <button key={t} onClick={()=>setTab(t)} className={`px-4 py-2 rounded-lg text-xs font-black uppercase transition-all ${tab===t?'bg-white shadow text-slate-800':'text-slate-400'}`}>{t}</button>
                        ))}
                    </nav>
                    <main className="flex-1 overflow-hidden">
                        {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} />}
                        {tab === 'workout' && <WorkoutBuilderView themeColor={themeColor} exercises={exercises} setExercises={setExercises} library={library} postWorkout="Recuperação" setPostWorkout={()=>{}} />}
                        {tab === 'match' && <PreGameView players={players} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} matchInfo={matchInfo} setMatchInfo={setMatchInfo} />}
                    </main>
                </div>
            );
        };

        // --- AUTH & BOOTSTRAP ---
        const LoginScreen = () => {
            const [e, setE] = useState('crossoccerperformancetraining@gmail.com');
            const [p, setP] = useState('');
            return (
                <div className="h-screen flex items-center justify-center bg-slate-900 p-6">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
                        <h1 className="text-2xl font-black mb-6 text-center text-blue-600">PROCOACH ACCESS</h1>
                        <input className="w-full p-3 border rounded-xl mb-3" placeholder="Email" value={e} onChange={val=>setE(val.target.value)}/>
                        <input className="w-full p-3 border rounded-xl mb-4" type="password" placeholder="Senha" onChange={val=>setP(val.target.value)}/>
                        <button className="w-full bg-blue-600 text-white p-3 rounded-xl font-bold uppercase shadow-lg" onClick={()=>auth.signInWithEmailAndPassword(e,p)}>Entrar</button>
                    </div>
                </div>
            );
        };

        const RootApp = () => {
            const [user, setUser] = useState(null);
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                auth.onAuthStateChanged(u => {
                    setUser(u);
                    if(u) {
                        db.collection('coachData').doc(u.uid).onSnapshot(doc => {
                            setData(sanitizeCloudData(doc.data()));
                            setLoading(false);
                            document.getElementById('loading-state').style.display='none';
                        });
                    } else { setLoading(false); document.getElementById('loading-state').style.display='none'; }
                });
            }, []);

            if(loading) return null;
            return user ? <MainApp user={user} initialData={data} /> : <LoginScreen />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
