        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, resetting: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            componentDidCatch(error, errorInfo) { console.error("ProCoach Error:", error, errorInfo); }
            
            handleHardReset = async () => {
                this.setState({ resetting: true });
                try {
                    localStorage.clear();
                    firebase.auth().onAuthStateChanged(async (user) => {
                        if (user) {
                            await firebase.firestore().collection('coachData').doc(user.uid).set({

                                trainingLog: {},
                                dmRecords: [],
                                matchMinutes: {},
                                assessments: {},
                                days: DEFAULT_DAYS,
                                themeColor: '#1e3a8a',
                                darkMode: true
                            });
                        }
                        window.location.href = window.location.href.split('?')[0] + '?reset=1';
                    });
                } catch (e) {
                    console.error("Erro ao resetar:", e);
                    window.location.reload();
                }
            }

        const smartShare = async (blob, filename, title) => {
            const file = new File([blob], filename, { type: blob.type });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({ files: [file], title: title });
                    return;
                } catch (err) {
                    console.log("Compartilhamento cancelado ou falhou", err);
                }
            }
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        const showToast = (msg, color = '#333') => { const t = document.getElementById('toast'); if(t){ t.innerText = msg; t.style.backgroundColor = color; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); } };
        const compressImage = (file, maxWidth=150, quality=0.5) => { return new Promise((resolve) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = (event) => { const img = new Image(); img.src = event.target.result; img.onload = () => { const elem = document.createElement('canvas'); const scaleFactor = maxWidth / img.width; elem.width = maxWidth; elem.height = img.height * scaleFactor; const ctx = elem.getContext('2d'); ctx.drawImage(img, 0, 0, elem.width, elem.height); resolve(elem.toDataURL('image/jpeg', quality)); }; }; }); };
        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const getDatesInRange = (startDate, daysBack) => { const dates = []; const end = new Date(startDate); for (let i = 0; i < daysBack; i++) { const d = new Date(end); d.setDate(end.getDate() - i); dates.push(d.toISOString().split('T')[0]); } return dates; };
        const formatDateBR = (dateString) => { if(!dateString) return '-'; const [y, m, d] = dateString.split('-'); return `${d}/${m}/${y}`; };
        
        const safeObj = (obj) => (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
        const safeArray = (arr, fallback=[]) => (Array.isArray(arr) && arr.length > 0) ? arr : fallback;
        const getWSum = (w) => {
            if (w && typeof w === 'object' && !Array.isArray(w)) {
                return Object.values(w).reduce((a, b) => Number(a) + Number(b), 0) || 0;
            }
            return 0;
        };

        const calcDailyLoad = (log) => {
            if(!log) return 0;
            const rpe = (Number(log.rpe_am)||0) + (Number(log.rpe_pm)||0);
            const dur = Number(log.duration) || 0;
            return rpe * (dur > 0 ? dur : 60); 
        };

        const isPlayerInTransition = (pId, dmRecords) => {
            const todayDate = new Date(getTodayStr());
            const records = safeArray(dmRecords).filter(r => r && r.playerId == pId && r.status === 'Recovered' && r.dateOut);
            for(let r of records) {
                const outDate = new Date(r.dateOut);
                if(isNaN(outDate.getTime())) continue;
                const diffTime = Math.abs(todayDate - outDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if(diffDays <= 7) return true; 
            }
            return false;
        };

        const SpeedometerGauge = ({ value }) => {

            return (<div className="flex flex-col items-center"><div className="gauge-container"><svg viewBox="0 0 200 100" className="w-full h-full"><path d="M20 100 A80 80 0 0 1 180 100" fill="none" className="stroke-slate-200 dark:stroke-slate-700" strokeWidth="20"/><path d="M20 100 A80 80 0 0 1 73 36" fill="none" stroke="#22c55e" strokeWidth="20" strokeDasharray="1000"/><path d="M73 36 A80 80 0 0 1 127 36" fill="none" stroke="#eab308" strokeWidth="20" strokeDasharray="1000"/><path d="M127 36 A80 80 0 0 1 180 100" fill="none" stroke="#ef4444" strokeWidth="20" strokeDasharray="1000"/></svg><div className="gauge-needle" style={{transform:`rotate(${angle||0}deg)`}}></div><div className="gauge-center"></div></div><div className="text-3xl font-black -mt-4 text-slate-700 dark:text-slate-200">{valNum}</div><div className="text-[10px] font-bold uppercase text-slate-400 dark:text-slate-500 mt-1">Prontidão Equipe</div></div>);

        const NotificationCenter = ({ alerts, onClose }) => {

        const SettingsModal = ({ show, onClose, themeColor, setThemeColor, header, setHeader, logo, setLogo, onExport, onImport }) => {

            return (<div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in"><div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden relative"><div className="p-4 border-b dark:border-slate-700 flex justify-between items-center" style={{backgroundColor:themeColor}}><h2 className="text-white font-bold flex items-center gap-2"><Icon name="settings"/> CONFIG & BACKUP</h2><button onClick={onClose} className="text-white hover:bg-white/20 p-1 rounded"><Icon name="x"/></button></div><div className="p-6 space-y-6 max-h-[80vh] overflow-y-auto"><div><h3 className="text-sm font-bold text-slate-400 uppercase mb-2">Identidade</h3><div className="flex items-center gap-4"><div className="w-20 h-20 rounded-full bg-slate-100 dark:bg-slate-700 border-2 flex items-center justify-center relative group cursor-pointer overflow-hidden" style={{borderColor:themeColor}}>{logo?<img src={logo} className="w-full h-full object-contain"/>:<Icon name="image" className="text-slate-300 dark:text-slate-500" size={30}/>}<input type="file" ref={fileInputRef} className="hidden" onChange={handleLogoFile}/><div className="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100" onClick={()=>fileInputRef.current.click()}><Icon name="folder" className="text-white"/></div></div><div className="flex-1"><label className="text-[10px] font-bold text-slate-500 dark:text-slate-400">NOME</label><BufferedInput className="w-full border-b-2 border-slate-200 dark:border-slate-600 py-1 font-bold text-lg outline-none bg-transparent dark:text-white" value={header.teamName || ''} onSave={val=>setHeader({...header, teamName:val})}/><BufferedInput className="w-full text-xs mt-1 border-b border-slate-100 dark:border-slate-700 p-1 bg-transparent dark:text-slate-300" placeholder="Ou cole URL da logo..." value={logo && logo.startsWith('http')?logo:''} onSave={val=>setLogo(val)}/></div></div></div><div><h3 className="text-sm font-bold text-slate-400 uppercase mb-2">Tema</h3><input type="color" value={themeColor} onChange={e=>setThemeColor(e.target.value)} className="w-12 h-12 rounded-lg border-2 cursor-pointer dark:border-slate-600"/></div><div className="border-t dark:border-slate-700 pt-4"><div className="grid grid-cols-2 gap-2 mb-2"><button onClick={onExport} className="flex justify-center gap-2 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 border border-blue-200 dark:border-blue-800 py-2 rounded font-bold text-xs"><Icon name="share" size={14}/> EXPORTAR TUDO</button><button onClick={()=>importInputRef.current.click()} className="flex justify-center gap-2 bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400 border border-green-200 dark:border-green-800 py-2 rounded font-bold text-xs"><Icon name="upload" size={14}/> IMPORTAR DADOS</button><input type="file" ref={importInputRef} className="hidden" accept=".json" onChange={handleRestore}/></div><p className="text-[10px] text-slate-400 text-center mb-2">Use exportar para salvar uma cópia local por segurança.</p></div></div></div></div>);

        const WellnessDashboard = ({ players, themeColor, trainingLog, setTrainingLog }) => {

                const hs = Math.min(getV('fms_hs_l')||0, getV('fms_hs_r')||0);
                const ill = Math.min(getV('fms_ill_l')||0, getV('fms_ill_r')||0);
                const sm = Math.min(getV('fms_sm_l')||0, getV('fms_sm_r')||0);
                const aslr = Math.min(getV('fms_aslr_l')||0, getV('fms_aslr_r')||0);
                const tspu = getV('fms_tspu') || 0;
                const rs = Math.min(getV('fms_rs_l')||0, getV('fms_rs_r')||0);
                return ds + hs + ill + sm + aslr + tspu + rs;
            };

            const calculateBF = () => { const sum = Number(form.chest)+Number(form.axilla)+Number(form.tricep)+Number(form.subscap)+Number(form.abdo)+Number(form.supra)+Number(form.thigh); if(sum===0||!form.age) return 0; const bd = 1.112 - (0.00043499*sum) + (0.00000055*sum*sum) - (0.00028826*form.age); return (((4.95/bd)-4.50)*100).toFixed(1); };
            
            const saveAssessment = () => { 
                const newRec = { ...form, bf: calculateBF(), fms_total: calculateFMS() }; 
                const h = Array.isArray(assessments[selectedPlayer]) ? assessments[selectedPlayer] : []; 
                setAssessments({ ...assessments, [selectedPlayer]: [newRec, ...h] }); 
                showToast("Avaliação Salva!"); 
            };

            const autoSugerirConduta = () => {
                const fmsScore = calculateFMS();
                if (form.lachman === 'Positivo' || form.mcmurray === 'Positivo' || form.tornozelo_gaveta === 'Instável' || (fmsScore > 0 && fmsScore < 14)) {
                    setForm({...form, conduta: 'Não Liberado'});
                    showToast("IA: Atleta Não Liberado (Risco Crítico)");
                } else if (form.lunge_test === 'Restrito' || form.quadril_adm === 'Restrito' || form.assimetria !== '') {
                    setForm({...form, conduta: 'Restrições'});
                    showToast("IA: Liberado com Restrições");
                } else {
                    setForm({...form, conduta: 'Liberado'});
                    showToast("IA: Liberado sem restrições");
                }
            };
            
            const getRankings = (metric) => { 
                const list = safeArray(players).map((p, i) => { 
                    if(!p) return null; 
                    const h = Array.isArray(assessments[i]) ? assessments[i] : []; 
                    if(h.length === 0 || h[0][metric] === undefined) return null;
                    const val = parseFloat(h[0][metric]); 
                    return { name: p.name, val: isNaN(val) ? 0 : val }; 
                }).filter(x => x && x.val > 0); 
                
                if(metric === 'speed30') { list.sort((a,b) => a.val - b.val); } 
                else { list.sort((a,b) => b.val - a.val); } 
                
                return { top5: list.slice(0, 5), bottom5: list.slice(-5).reverse() }; 
            };
            
            const rankings = getRankings(viewMetric);
            const RankChart = ({ title, data, color }) => ( <div className="mb-4"><h4 className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-2">{title}</h4>{data.length === 0 ? <div className="text-xs text-slate-300 dark:text-slate-600">Sem dados válidos</div> : data.map((d, i) => ( <div key={i} className="flex items-center gap-2 mb-1"><div className="text-[10px] font-bold w-4 text-slate-400">#{i+1}</div><div className="flex-1"><div className="flex justify-between text-[10px] font-bold text-slate-700 dark:text-slate-300 mb-0.5"><span>{d.name}</span><span>{d.val}</span></div><div className="h-1.5 w-full bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{width: '100%', backgroundColor: color}}></div></div></div></div> ))}</div> );
            const history = Array.isArray(assessments[selectedPlayer]) ? assessments[selectedPlayer] : [];
            
            const FmsRow = ({ label, id, isBilateral }) => {
                if (isBilateral) {
                    return (
                        <div className="flex justify-between items-center bg-slate-50 dark:bg-slate-700/50 p-2 rounded border dark:border-slate-600">

                            <div className="flex gap-2 w-1/2 justify-end">
                                <div className="flex items-center gap-1"><span className="text-[9px] text-slate-400">Esq:</span><input type="number" min="0" max="3" className="w-10 p-1 text-center text-xs font-bold rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form[`fms_${id}_l`]} onChange={e=>setForm({...form, [`fms_${id}_l`]: e.target.value})} /></div>
                                <div className="flex items-center gap-1"><span className="text-[9px] text-slate-400">Dir:</span><input type="number" min="0" max="3" className="w-10 p-1 text-center text-xs font-bold rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form[`fms_${id}_r`]} onChange={e=>setForm({...form, [`fms_${id}_r`]: e.target.value})} /></div>
                            </div>
                        </div>
                    );
                } else {
                    return (
                        <div className="flex justify-between items-center bg-slate-50 dark:bg-slate-700/50 p-2 rounded border dark:border-slate-600">
                            <span className="text-[10px] font-bold text-slate-600 dark:text-slate-300 w-1/2 pr-2 leading-tight">{label}</span>
                            <div className="w-1/2 flex justify-end">
                                <input type="number" min="0" max="3" className="w-12 p-1 text-center text-xs font-bold rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form[`fms_${id}`]} onChange={e=>setForm({...form, [`fms_${id}`]: e.target.value})} />
                            </div>
                        </div>
                    );
                }
            };

            const renderPhysicalAnalyst = () => { 
                if (form.conduta === 'Não Liberado') {
                    return (<div className="mt-6 p-4 border rounded-xl bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-800 text-red-900 dark:text-red-200"><div className="flex gap-3 items-center mb-2"><Icon name="alert" size={24} className="text-red-600" /><div className="text-xs font-black uppercase tracking-wider text-red-600">ATLETA VETADO</div></div><div className="text-sm font-bold leading-snug mb-2">Incapacitado para treino/jogo pelo Departamento Médico.</div><div className="text-[10px] font-bold bg-white/50 dark:bg-black/30 p-2 rounded">Plano: Iniciar protocolo de recuperação.</div></div>);
                }

                const bf = calculateBF(); 
                const fmsScore = calculateFMS();
                
                let feedback = "Atleta apto. Parâmetros normais."; 
                let plan = "Plano Sugerido: Treino padrão da equipa.";
                let isAlert = false;

                if(fmsScore > 0 && fmsScore < 14) {
                    feedback = `ALTO RISCO DE LESÃO! Escore FMS (${fmsScore}) muito baixo.`;
                    plan = "Plano: Foco imediato em mobilidade e estabilidade do core.";
                    isAlert = true;
                } else if(form.lachman === 'Positivo' || form.mcmurray === 'Positivo') {
                    feedback = `ALTO RISCO! Teste de joelho (Lachman/McMurray) Positivo.`;
                    plan = "Plano: RM Imediata e encaminhamento ortopédico.";
                    isAlert = true;
                } else if(bf > 15) { 
                    feedback = "Gordura acima do ideal para a posição."; 
                    plan = "Plano: Aeróbico contínuo + Ajuste Nutricional.";

                    feedback = "Gordura baixa (Nível Elite). Excelente."; 
                    plan = "Plano: Manutenção de força e monitorar CK constante."; 
                }
                
                if(form.speed30 > 0 && form.speed30 < 4.0) feedback += " Velocidade de Sprint acima da média.";

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in flex flex-col gap-6 custom-scroll">

                        {/* LISTA DE ATLETAS */}

                                        <div className="w-8 h-8 rounded-full bg-slate-200 overflow-hidden relative shrink-0 border border-slate-200 dark:border-slate-600">{p.image?<img src={p.image} className="w-full h-full object-cover object-top"/>:<Icon name="user"/>}</div>
                                        <div className="font-bold text-sm text-slate-700 dark:text-slate-200">{p.name}</div>
                                    </div>
                                )
                            })}

                        {/* FORMULÁRIO CENTRAL */}

                                <div className="w-20 h-20 rounded-full bg-slate-200 border-2 border-slate-300 dark:border-slate-600 overflow-hidden relative shadow-md shrink-0">{players[selectedPlayer]?.image ? <img src={players[selectedPlayer].image} className="w-full h-full object-cover object-top"/> : <div className="w-full h-full flex items-center justify-center text-slate-400"><Icon name="user" size={40}/></div>}</div>
                                <div className="flex-1">
                                    <h2 className="text-2xl font-black text-slate-800 dark:text-slate-100 uppercase leading-none">{players[selectedPlayer]?.name || 'Selecione'}</h2>
                                    <div className="text-xs font-bold text-slate-400 uppercase mt-1">Ficha Clínica e Esportiva</div>
                                </div>
                                <div className="text-right">
                                    <input type="date" value={form.date} onChange={e=>setForm({...form, date: e.target.value})} className="border dark:border-slate-600 rounded px-2 py-1 text-xs font-bold text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-700 outline-none"/>
                                </div>
                            </div>
                            
                            {/* BLOCO 1: CLÍNICA E ORTOPEDIA */}

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase">Anamnese (Cirurgias/Histórico)</label>
                                    <textarea className="w-full border dark:border-slate-600 rounded p-2 text-xs font-medium dark:bg-slate-700 dark:text-white h-20 custom-scroll outline-none" value={form.anamnese} onChange={e=>setForm({...form, anamnese: e.target.value})} placeholder="Lesões crônicas, cirurgias prévias..."></textarea>
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase">Avaliação Ortopédica (Articulações)</label>
                                    <textarea className="w-full border dark:border-slate-600 rounded p-2 text-xs font-medium dark:bg-slate-700 dark:text-white h-20 custom-scroll outline-none" value={form.orto} onChange={e=>setForm({...form, orto: e.target.value})} placeholder="Sinais clínicos, edema, perda ADM..."></textarea>
                                    <div className="flex flex-wrap gap-1 mt-1">
                                        <span onClick={()=>setForm({...form, orto: form.orto ? form.orto+', Dor à palpação' : 'Dor à palpação'})} className="bg-slate-200 dark:bg-slate-600 text-[8px] px-1.5 py-0.5 rounded cursor-pointer hover:bg-blue-500 hover:text-white font-bold text-slate-600 dark:text-slate-300">Dor Palpação</span>
                                        <span onClick={()=>setForm({...form, orto: form.orto ? form.orto+', Edema leve' : 'Edema leve'})} className="bg-slate-200 dark:bg-slate-600 text-[8px] px-1.5 py-0.5 rounded cursor-pointer hover:bg-blue-500 hover:text-white font-bold text-slate-600 dark:text-slate-300">Edema</span>
                                        <span onClick={()=>setForm({...form, orto: form.orto ? form.orto+', Perda de ADM' : 'Perda de ADM'})} className="bg-slate-200 dark:bg-slate-600 text-[8px] px-1.5 py-0.5 rounded cursor-pointer hover:bg-blue-500 hover:text-white font-bold text-slate-600 dark:text-slate-300">Perda ADM</span>
                                        <span onClick={()=>setForm({...form, orto: form.orto ? form.orto+', Crepitação' : 'Crepitação'})} className="bg-slate-200 dark:bg-slate-600 text-[8px] px-1.5 py-0.5 rounded cursor-pointer hover:bg-blue-500 hover:text-white font-bold text-slate-600 dark:text-slate-300">Crepitação</span>
                                    </div>
                                </div>
                            </div>

                            <h3 className="text-sm font-bold text-slate-700 dark:text-slate-200 uppercase mt-6 mb-3 border-b dark:border-slate-700 pb-1 flex items-center gap-2"><Icon name="medkit"/> Testes Ortopédicos Específicos</h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                                <div className="bg-slate-50 dark:bg-slate-700/50 p-3 rounded border dark:border-slate-600">
                                    <h4 className="text-[10px] font-black text-blue-500 uppercase mb-2">Joelho (LCA/Menisco)</h4>
                                    <select className="w-full text-xs p-1 mb-1 rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form.lachman} onChange={e=>setForm({...form, lachman: e.target.value})}><option value="">Lachman/Gaveta...</option><option value="Negativo">Negativo (Estável)</option><option value="Positivo">Positivo (Instável)</option></select>
                                    <select className="w-full text-xs p-1 mb-1 rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form.mcmurray} onChange={e=>setForm({...form, mcmurray: e.target.value})}><option value="">McMurray/Thessaly...</option><option value="Negativo">Negativo (Sem lesão)</option><option value="Positivo">Positivo (Sinal Meniscal)</option></select>
                                    <input type="text" placeholder="Isocinética (Déficit %)" className="w-full text-xs p-1 rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form.isocinetica} onChange={e=>setForm({...form, isocinetica: e.target.value})}/>
                                </div>
                                
                                <div className="bg-slate-50 dark:bg-slate-700/50 p-3 rounded border dark:border-slate-600">
                                    <h4 className="text-[10px] font-black text-orange-500 uppercase mb-2">Tornozelo & Quadril</h4>
                                    <select className="w-full text-xs p-1 mb-1 rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form.tornozelo_gaveta} onChange={e=>setForm({...form, tornozelo_gaveta: e.target.value})}><option value="">Estabilidade Tornozelo...</option><option value="Estável">Estável</option><option value="Instável">Instável (Laxidão)</option></select>
                                    <input type="text" placeholder="Lunge Test (Restrição?)" className="w-full text-xs p-1 mb-1 rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form.lunge_test} onChange={e=>setForm({...form, lunge_test: e.target.value})}/>
                                    <select className="w-full text-xs p-1 rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form.quadril_adm} onChange={e=>setForm({...form, quadril_adm: e.target.value})}><option value="">ADM Quadril/Pelve...</option><option value="Normal">Normal</option><option value="Restrito">Restrito (Risco Pubalgia)</option></select>
                                </div>

                                <div className="bg-slate-50 dark:bg-slate-700/50 p-3 rounded border dark:border-slate-600">
                                    <h4 className="text-[10px] font-black text-purple-500 uppercase mb-2">Decisão Clínica</h4>
                                    <label className="text-[9px] font-bold text-slate-500 uppercase block mb-1">Parecer Final (Conduta)</label>
                                    <select className="w-full font-bold text-xs p-1.5 rounded bg-white dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-500 outline-none" value={form.conduta} onChange={e=>setForm({...form, conduta: e.target.value})}>
                                        <option value="Liberado">🟢 Liberado (Sem restrições)</option>
                                        <option value="Restrições">🟡 Liberado com Restrições</option>

                                    <button onClick={autoSugerirConduta} className="mt-2 w-full bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-bold py-1.5 rounded flex items-center justify-center gap-1"><Icon name="brain" size={12}/> GERAR CONDUTA IA</button>

                            <h3 className="text-sm font-bold text-slate-700 dark:text-slate-200 uppercase mb-3 border-b dark:border-slate-700 pb-1 flex items-center gap-2"><Icon name="user"/> Composição Corporal</h3>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                                <div><label className="text-[10px] font-bold text-slate-400 uppercase">Peso (kg)</label><input type="number" className="w-full border dark:border-slate-600 rounded p-2 text-sm font-bold dark:bg-slate-700 dark:text-white outline-none" value={form.weight} onChange={e=>setForm({...form, weight: e.target.value})}/></div>
                                <div><label className="text-[10px] font-bold text-slate-400 uppercase">Altura (cm)</label><input type="number" className="w-full border dark:border-slate-600 rounded p-2 text-sm font-bold dark:bg-slate-700 dark:text-white outline-none" value={form.height} onChange={e=>setForm({...form, height: e.target.value})}/></div>
                                <div><label className="text-[10px] font-bold text-slate-400 uppercase">Idade</label><input type="number" className="w-full border dark:border-slate-600 rounded p-2 text-sm font-bold dark:bg-slate-700 dark:text-white outline-none" value={form.age} onChange={e=>setForm({...form, age: e.target.value})}/></div>
                                <div className="bg-slate-100 dark:bg-slate-700 rounded p-2 flex flex-col items-center justify-center border dark:border-slate-600"><span className="text-[10px] font-bold text-slate-400 uppercase">Gordura Est.</span><span className="text-xl font-black text-slate-700 dark:text-slate-200">{calculateBF()}%</span></div>

                                {[['chest','Peito'],['abdo','Abd'],['thigh','Coxa'],['axilla','Axila'],['tricep','Tric'],['subscap','SubS'],['supra','Supra']].map(([k,l]) => (

                            <div className="mb-6 bg-slate-100/50 dark:bg-slate-800/50 p-4 rounded-xl border border-blue-200 dark:border-blue-900/50">

                                <div><label className="text-[10px] font-bold text-slate-400 uppercase">Velocidade 30m (s)</label><input type="number" className="w-full border dark:border-slate-600 rounded p-2 text-sm font-bold dark:bg-slate-700 dark:text-white outline-none" value={form.speed30} onChange={e=>setForm({...form, speed30: e.target.value})}/></div>
                                <div><label className="text-[10px] font-bold text-slate-400 uppercase">Salto SJ (cm)</label><input type="number" className="w-full border dark:border-slate-600 rounded p-2 text-sm font-bold dark:bg-slate-700 dark:text-white outline-none" value={form.sj} onChange={e=>setForm({...form, sj: e.target.value})}/></div>
                                <div><label className="text-[10px] font-bold text-slate-400 uppercase">Salto CMJ (cm)</label><input type="number" className="w-full border dark:border-slate-600 rounded p-2 text-sm font-bold dark:bg-slate-700 dark:text-white outline-none" value={form.cmj} onChange={e=>setForm({...form, cmj: e.target.value})}/></div>
                                <div className="col-span-1 md:col-span-1"><label className="text-[10px] font-bold text-slate-400 uppercase text-orange-500">Desequilíbrio / Assimetria</label><input type="text" className="w-full border border-orange-200 dark:border-orange-800 rounded p-2 text-sm font-bold dark:bg-slate-700 dark:text-white outline-none" value={form.assimetria} onChange={e=>setForm({...form, assimetria: e.target.value})} placeholder="Ex: 15% defict pos. esq"/></div>
                            </div>

                            {renderPhysicalAnalyst()}
                            
                            <button onClick={saveAssessment} className="w-full py-4 bg-slate-800 dark:bg-slate-700 text-white font-black rounded-xl hover:opacity-90 flex items-center justify-center gap-2 mt-6 shadow-lg"><Icon name="save"/> SALVAR TODA AVALIAÇÃO</button>
                            
                            <div className="mt-8">
                                <h3 className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-3">Histórico de Performance (Tabela)</h3>
                                <div className="overflow-x-auto rounded-lg border dark:border-slate-700">
                                    <table className="w-full text-xs text-left">
                                        <thead className="bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400"><tr><th className="p-3">Data</th><th className="p-3">Conduta</th><th className="p-3">FMS</th><th className="p-3">1RM</th><th className="p-3">Ação</th></tr></thead>
                                        <tbody>
                                            {history.length === 0 ? <tr><td colSpan="5" className="p-4 text-center text-slate-400">Nenhuma avaliação salva.</td></tr> : history.map((h, i) => (
                                                <tr key={i} className="border-t dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50">
                                                    <td className="p-3 font-bold dark:text-slate-300">{formatDateBR(h.date)}</td>
                                                    <td className="p-3 font-bold text-blue-600 dark:text-blue-400">{h.conduta || 'Liberado'}</td>
                                                    <td className="p-3 font-bold text-emerald-600">{h.fms_total||'-'}</td>
                                                    <td className="p-3 dark:text-slate-300">{h.squat_rm||'-'} kg</td>
                                                    <td className="p-3"><button onClick={()=>{setForm(h); showToast("Dados carregados no formulário!");}} className="text-[9px] bg-slate-200 dark:bg-slate-600 px-2 py-1 rounded font-bold text-slate-600 dark:text-slate-300 hover:bg-blue-500 hover:text-white transition-colors">VER COMPLETO</button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {/* BARRA LATERAL DOS RANKINGS */}
                    <div className="w-full lg:w-64 bg-white dark:bg-slate-800 rounded-xl shadow p-4 border border-slate-200 dark:border-slate-700 h-fit">
                        <h3 className="text-sm font-bold text-slate-800 dark:text-slate-100 uppercase mb-4 flex items-center gap-2"><Icon name="trophy"/> Top 5 da Equipa</h3>
                        <select className="w-full mb-4 text-xs font-bold border dark:border-slate-600 rounded p-2 dark:bg-slate-700 dark:text-white outline-none" value={viewMetric} onChange={e=>setViewMetric(e.target.value)}>
                            <option value="fms_total">Escore FMS (Prevenção)</option>
                            <option value="squat_rm">Força Máx (1RM)</option>
                            <option value="speed30">Velocidade 30m</option>
                            <option value="soccer_test">Soccer Test (Resistência)</option>
                            <option value="sj">Squat Jump (Potência)</option>
                        </select>
                        <RankChart title="Melhores do Elenco" data={rankings.top5} color="#22c55e" />
                        <div className="border-t dark:border-slate-700 my-3"></div>
                        <RankChart title="Atenção (Menores Índices)" data={rankings.bottom5} color="#ef4444" />
                    </div>
                </div>
            );
        };

        const MainApp = ({ user, initialData }) => {
            const [tab, setTab] = useState('squad'); 
            
            const [themeColor, setThemeColor] = useState(initialData?.themeColor || '#1e3a8a');
            const [players, setPlayers] = useState(initialData?.players || []);
            const [trainingLog, setTrainingLog] = useState(initialData?.trainingLog || {});
            const [assessments, setAssessments] = useState(initialData?.assessments || {});
            const [dmRecords, setDmRecords] = useState(initialData?.dmRecords || []);
            const [matchMinutes, setMatchMinutes] = useState(initialData?.matchMinutes || {});
            const [header, setHeader] = useState(initialData?.header || {});
            const [logo, setLogo] = useState(initialData?.logo || null);
            const [darkMode, setDarkMode] = useState(initialData?.darkMode || false);
            
            const [days, setDays] = useState(safeArray(initialData?.days, DEFAULT_DAYS));

            const [showSettings, setShowSettings] = useState(false);
            const [showNotifications, setShowNotifications] = useState(false);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [syncStatus, setSyncStatus] = useState(''); 

            useEffect(() => {
                if (darkMode) document.body.classList.add('dark');
                else document.body.classList.remove('dark');
            }, [darkMode]);

            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
            }, []);

            useEffect(() => {
                if(!user) return;
                const timeoutId = setTimeout(() => {
                    setSyncStatus('Salvando...');
                    const dataToSave = { themeColor, players, trainingLog, assessments, dmRecords, matchMinutes, header, logo, darkMode, days };
                    db.collection('coachData').doc(user.uid).set(dataToSave, { merge: true })
                        .then(() => { setSyncStatus('☁️ Sincronizado'); setTimeout(() => setSyncStatus(''), 3000); })
                        .catch((err) => { setSyncStatus('❌ Erro na Nuvem'); console.error(err); });
                }, 2000); 
                return () => clearTimeout(timeoutId);
            }, [themeColor, players, trainingLog, assessments, dmRecords, matchMinutes, header, logo, darkMode, days, user]);

            const activeAlerts = useMemo(() => {
                const today = getTodayStr(); let alerts = [];
                safeArray(players).forEach((p, i) => {
                    if(!p) return;
                    
                    const logObj = trainingLog[today]?.[i] || {};
                    const wellness = safeObj(logObj.wellness);
                    if(Number(wellness.soreness) >= 5) alerts.push({ type: 'danger', icon: 'bolt', text: `${p.name} relatou dor aguda (Nível ${wellness.soreness}).`});
                    if(Number(wellness.sleep) >= 5) alerts.push({ type: 'warning', icon: 'moon', text: `${p.name} relatou sono ruim.`});
                    
                    const todayLoad = calcDailyLoad(logObj);
                    if(todayLoad > 0) {
                        const historyDates = getDatesInRange(today, 7).slice(1); let chronicLoad = 0; 
                        historyDates.forEach(d => chronicLoad += calcDailyLoad(trainingLog[d]?.[i])); 
                        const avgLoad = (chronicLoad + todayLoad) / 7;
                        if(avgLoad > 0 && todayLoad > avgLoad * 1.5) alerts.push({ type: 'danger', icon: 'activity', text: `${p.name} com sobrecarga aguda hoje.`});
                    }
                    
                    const recentDates = getDatesInRange(today, 7); let minsLast7 = 0;
                    recentDates.forEach(d => minsLast7 += (Number(matchMinutes[d]?.[i]) || 0));
                    if (minsLast7 >= 150 && !p.injured) alerts.push({ type: 'danger', icon: 'alert', text: `${p.name} acumulou ${minsLast7}min de jogo. Risco alto.`});
                });
                
                const activeDm = safeArray(dmRecords).filter(r => r && r.status === 'Active');
                activeDm.forEach(r => {
                    const p = players[r.playerId];
                    if(p) {
                        const phaseLabel = RTP_PHASES.find(ph => ph.id === (parseInt(r.rtpPhase) || 1))?.label || `Fase ${r.rtpPhase}`;
                        alerts.push({ type: 'warning', icon: 'medkit', text: `DM: ${p.name} está na ${phaseLabel}.` });
                    }
                });
                
                const dischargedToday = safeArray(dmRecords).filter(r => r && r.status === 'Recovered' && r.dateOut === getTodayStr());
                dischargedToday.forEach(r => {
                    const p = players[r.playerId];
                    if(p) {
                        alerts.push({ type: 'info', icon: 'check', text: `Alta Médica: ${p.name} foi liberado do DM hoje!` });
                    }
                });

                return alerts;
            }, [players, trainingLog, dmRecords, matchMinutes]);

            const downloadCurrentView = async () => {
                const el = document.getElementById('print-area');
                if(!el) return;
                showToast("Gerando imagem da tela...");
                
                const originalBg = el.style.backgroundColor;
                el.style.backgroundColor = document.body.classList.contains('dark') ? '#0f172a' : '#f8fafc';
                
                try {
                    const canvas = await html2canvas(el, { 
                        scale: 2, 
                        useCORS: true, 
                        backgroundColor: document.body.classList.contains('dark') ? '#0f172a' : '#f8fafc' 
                    });
                    canvas.toBlob(blob => { 
                        smartShare(blob, `procoach_view.png`, 'ProCoach Export'); 
                    });
                } catch(e) { 
                    showToast("Erro ao exportar tela"); 
                }
                
                el.style.backgroundColor = originalBg;
            };

            const handleRefresh = () => {
                showToast("Atualizando dados...");
                setTimeout(() => window.location.reload(), 500);
            };

            return (
                <div className="flex flex-col h-full bg-slate-100 dark:bg-slate-900 transition-colors duration-300">
                    <SettingsModal show={showSettings} onClose={()=>setShowSettings(false)} themeColor={themeColor} setThemeColor={setThemeColor} header={header} setHeader={setHeader} logo={logo} setLogo={setLogo} onExport={()=>{}} onImport={()=>{}} />
                    {showNotifications && <NotificationCenter alerts={activeAlerts} onClose={()=>setShowNotifications(false)} />}
                    <div className="bg-white dark:bg-slate-800 border-b dark:border-slate-700 p-2 px-4 flex justify-between items-center shadow-sm z-30 shrink-0 no-print transition-colors duration-300">
                        <div className="font-black text-xl italic text-slate-800 dark:text-white flex items-center gap-2">
                            <div><span style={{color: themeColor}}>PRO</span>COACH <span className="text-[9px] not-italic bg-slate-800 dark:bg-slate-200 text-white dark:text-slate-800 px-1.5 py-0.5 rounded ml-1">V138 MAX</span></div>
                            <div className={`flex items-center gap-1 px-2 py-0.5 rounded-full text-[9px] font-bold border ${isOnline ? 'bg-green-50 text-green-600 border-green-200' : 'bg-red-50 text-red-600 border-red-200'}`}><div className={`w-1.5 h-1.5 rounded-full ${isOnline ? 'bg-green-500' : 'bg-red-500'}`}></div>{isOnline ? 'ONLINE' : 'OFFLINE'}</div>
                            {syncStatus && <span className="text-[9px] font-bold text-slate-400 animate-pulse">{syncStatus}</span>}
                        </div>
                        <div className="flex gap-1 items-center">
                            <button onClick={handleRefresh} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 font-bold text-xs flex items-center gap-1" title="Atualizar Dados"><Icon name="refresh" size={20}/></button>
                            <button onClick={()=>setShowNotifications(true)} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 relative"><Icon name="bell" size={20}/>{activeAlerts.length > 0 && <span className="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white dark:border-slate-800"></span>}</button>
                            <button onClick={()=>setDarkMode(!darkMode)} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400">{darkMode ? <Icon name="sun" size={20}/> : <Icon name="moon" size={20}/>}</button>
                            <button onClick={downloadCurrentView} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 font-bold text-xs flex items-center gap-1" title="Baixar Tela"><Icon name="download"/></button>
                            <button onClick={()=>setShowSettings(true)} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700" style={{color: themeColor}} title="Configurações"><Icon name="settings" size={24}/></button>
                            <button onClick={()=>auth.signOut().then(() => window.location.reload())} className="p-2 rounded hover:bg-red-100 dark:hover:bg-red-900/30 text-red-500" title="Sair"><Icon name="logout" size={20}/></button>
                        </div>
                    </div>
                    
                    <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-lg gap-1 overflow-x-auto shadow-inner no-print w-full custom-scroll">
                        <button onClick={()=>setTab('squad')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='squad'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>ELENCO</button>
                        <button onClick={()=>setTab('micro')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='micro'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>MICROCICLO</button>
                        <button onClick={()=>setTab('wellness')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='wellness'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>WELLNESS</button>
                        <button onClick={()=>setTab('pse')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='pse'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>CARGA/PSE</button>
                        <button onClick={()=>setTab('match')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='match'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>MATCH</button>
                        <button onClick={()=>setTab('assessment')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='assessment'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>AVALIAÇÃO</button>
                        <button onClick={()=>setTab('dm')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='dm'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>DM</button>
                    </div>
                    
                    <div className="flex-1 overflow-hidden relative" id="print-area">
                        {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} />}
                        {tab === 'micro' && <MicrocycleView days={days} setDays={setDays} themeColor={themeColor} players={players} trainingLog={trainingLog} />}
                        {tab === 'wellness' && <WellnessDashboard players={players} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} />}
                        {tab === 'pse' && <PSEView players={players} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} />}
                        {tab === 'match' && <PreGameView players={players} setPlayers={setPlayers} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} matchMinutes={matchMinutes} setMatchMinutes={setMatchMinutes} />}
                        {tab === 'assessment' && <AssessmentView players={players} themeColor={themeColor} assessments={assessments} setAssessments={setAssessments} />}
                        {tab === 'dm' && <MedicalView players={players} setPlayers={setPlayers} dmRecords={dmRecords} setDmRecords={setDmRecords} themeColor={themeColor} />}
                    </div>
                </div>
            );
        };

        const CloudWrapper = ({ user }) => {
            const [initialData, setInitialData] = useState(null);
            const [loadingCloud, setLoadingCloud] = useState(true);

            useEffect(() => {
                const unsubscribe = db.collection('coachData').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) { 
                        setInitialData(sanitizeCloudData(doc.data())); 
                    } else { 
                        setInitialData(sanitizeCloudData({})); 
                    }
                    setLoadingCloud(false);
                }, err => {
                    console.error("Cloud fetch error:", err);
                    setInitialData(sanitizeCloudData({}));
                    setLoadingCloud(false);
                });
                return () => unsubscribe();
            }, [user]);

            if (loadingCloud) return <div className="flex flex-col h-screen w-screen items-center justify-center bg-slate-900 text-slate-300 font-bold"><Icon name="cloud" size={40} className="animate-bounce text-blue-500 mb-4"/>Sincronizando Módulo Blindado...</div>;
            return <ErrorBoundary><MainApp user={user} initialData={initialData} /></ErrorBoundary>;
        };

        const RootApp = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                    const loader = document.getElementById('loading-state');
                    if(loader) loader.style.display = 'none';
                });
                return () => unsubscribe();
            }, []);

            if (loading) return null;
            if (!user) return <LoginScreen onLogin={() => {}} />;
            return <CloudWrapper user={user} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
