        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, resetting: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            componentDidCatch(error, errorInfo) { console.error("ProCoach Error:", error, errorInfo); }
            
            handleHardReset = () => {
                this.setState({ resetting: true });
                localStorage.clear();
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(regs => {
                        for (let r of regs) r.unregister();
                    });
                }
                const user = firebase.auth().currentUser;
                if (user) {
                    firebase.firestore().collection('coachData').doc(user.uid).set({
                        players: [], trainingLog: {}, dmRecords: [], matchMinutes: {}, assessments: {},
                        days: DEFAULT_DAYS, themeColor: '#1e3a8a', darkMode: true
                    });
                }
                setTimeout(() => { window.location.href = window.location.pathname + '?clear=' + Date.now(); }, 1000);
            }

                if (this.state.hasError) {
                    return (

        const smartShare = async (blob, filename, title) => {
            const file = new File([blob], filename, { type: blob.type });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try { await navigator.share({ files: [file], title: title }); return; } catch (err) { console.log("Compartilhamento cancelado", err); }
            }
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        };

        const showToast = (msg, color = '#333') => { const t = document.getElementById('toast'); if(t){ t.innerText = msg; t.style.backgroundColor = color; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); } };

        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const getDatesInRange = (startDate, daysBack) => { const dates = []; const end = new Date(startDate); end.setMinutes(end.getMinutes() - end.getTimezoneOffset()); for (let i = 0; i < daysBack; i++) { const d = new Date(end); d.setDate(end.getDate() - i); dates.push(d.toISOString().split('T')[0]); } return dates; };
        const formatDateBR = (dateString) => { if(!dateString) return '-'; const [y, m, d] = dateString.split('-'); return `${d}/${m}/${y}`; };
        const safeObj = (obj) => (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
        const safeArray = (arr, fallback=[]) => (Array.isArray(arr) && arr.length > 0) ? arr : fallback;
        const getWSum = (w) => { if (w && typeof w === 'object' && !Array.isArray(w)) { return Object.values(w).reduce((a, b) => Number(a) + Number(b), 0) || 0; } return 0; };
        const calcDailyLoad = (log) => { if(!log) return 0; const rpe = (Number(log.rpe_am)||0) + (Number(log.rpe_pm)||0); const dur = Number(log.duration) || 0; return rpe * (dur > 0 ? dur : 60); };

        const isPlayerInTransition = (pId, dmRecords) => {
            const todayDate = new Date(getTodayStr());
            const records = safeArray(dmRecords).filter(r => r && r.playerId == pId && r.status === 'Recovered' && r.dateOut);
            for(let r of records) {
                const outDate = new Date(r.dateOut);
                if(isNaN(outDate.getTime())) continue;
                const diffTime = Math.abs(todayDate - outDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if(diffDays <= 7) return true; 
            }
            return false;
        };

        const SpeedometerGauge = ({ value }) => {

            return (<div className="flex flex-col items-center"><div className="gauge-container"><svg viewBox="0 0 200 100" className="w-full h-full"><path d="M20 100 A80 80 0 0 1 180 100" fill="none" className="stroke-slate-200 dark:stroke-slate-700" strokeWidth="20"/><path d="M20 100 A80 80 0 0 1 73 36" fill="none" stroke="#22c55e" strokeWidth="20" strokeDasharray="1000"/><path d="M73 36 A80 80 0 0 1 127 36" fill="none" stroke="#eab308" strokeWidth="20" strokeDasharray="1000"/><path d="M127 36 A80 80 0 0 1 180 100" fill="none" stroke="#ef4444" strokeWidth="20" strokeDasharray="1000"/></svg><div className="gauge-needle" style={{transform:`rotate(${angle||0}deg)`}}></div><div className="gauge-center"></div></div><div className="text-3xl font-black -mt-4 text-slate-700 dark:text-slate-200">{valNum}</div><div className="text-[10px] font-bold uppercase text-slate-400 dark:text-slate-500 mt-1">Prontidão Equipe</div></div>);

            const c1=reverse?"#ef4444":"#22c55e"; const c2="#eab308"; const c3=reverse?"#22c55e":"#ef4444";
            return (<div className="flex flex-col items-center"><div className="mini-gauge-container"><svg viewBox="0 0 80 40" className="w-full h-full"><path d="M5 40 A35 35 0 0 1 75 40" fill="none" className="stroke-slate-200 dark:stroke-slate-700" strokeWidth="8"/><path d="M5 40 A35 35 0 0 1 28 12" fill="none" stroke={c1} strokeWidth="8"/><path d="M28 12 A35 35 0 0 1 52 12" fill="none" stroke={c2} strokeWidth="8"/><path d="M52 12 A35 35 0 0 1 75 40" fill="none" stroke={c3} strokeWidth="8"/></svg><div className="mini-gauge-needle" style={{transform:`rotate(${angle||0}deg)`}}></div><div className="absolute bottom-0 w-2 h-2 bg-slate-700 dark:bg-slate-300 rounded-full left-[39px]"></div></div><div className="text-[10px] font-black text-slate-700 dark:text-slate-200 -mt-1">{valNum}</div>{label && <div className="text-[8px] text-slate-400 dark:text-slate-500 uppercase font-bold">{label}</div>}</div>);

        const SettingsModal = ({ show, onClose, themeColor, setThemeColor, header, setHeader, logo, setLogo, onExport, onImport }) => {

                                <div className="grid grid-cols-2 gap-2">
                                    <label className="flex items-center gap-2 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 p-2 rounded cursor-pointer transition-colors hover:bg-red-100">
                                        <input type="checkbox" checked={localData.suspended || false} onChange={e=>setLocalData({...localData, suspended: e.target.checked})} className="w-4 h-4 accent-red-600"/>
                                        <span className="text-[10px] font-bold text-red-700 dark:text-red-400 uppercase">🚫 Suspenso</span>
                                    </label>
                                    
                                    <label className="flex items-center gap-2 bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800 p-2 rounded cursor-pointer transition-colors hover:bg-yellow-100">
                                        <input type="checkbox" checked={localData.highlight || false} onChange={e=>setLocalData({...localData, highlight: e.target.checked})} className="w-4 h-4 accent-yellow-500"/>
                                        <span className="text-[10px] font-bold text-yellow-700 dark:text-yellow-400 uppercase">🏆 Destaque</span>
                                    </label>
                                </div>
                            </div>

                          <div className="flex flex-wrap gap-2 pt-2 no-print">
                        <button onClick={() => {if(confirm('Excluir Atleta da Equipe?')){setPlayers(safePlayers.filter((_,i)=>i!==editPlayer));setEditPlayer(null);}}} className="bg-red-600 text-white px-3 py-1.5 rounded text-xs hover:bg-red-700">Excluir Atleta</button>
                        <button onClick={() => {const n=[...safePlayers];n[editPlayer]=localData;setPlayers(n);setEditPlayer(null);}} className="bg-blue-600 text-white px-3 py-1.5 rounded text-xs hover:bg-blue-700">Salvar Alterações</button>
                        
                        {/* BOTÃO DE RELATÓRIO PDF */}
                        <button onClick={() => window.print()} className="bg-emerald-600 text-white px-3 py-1.5 rounded text-xs hover:bg-emerald-700 flex items-center gap-1">
                            <span>🖨️ Relatório PDF</span>
                        </button>
                    </div>
                        </div>
                    </div>
                ); 
            };
            
            const injuredCount = safePlayers.filter(p=>p && p.injured).length;
            const squadAnalysis = injuredCount > 2 ? `Atenção: ${injuredCount} atletas indisponíveis.` : "Elenco com boa disponibilidade geral.";

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in custom-scroll">
                    <PlayerProfileModal player={safePlayers[viewProfile]} playerIndex={viewProfile} logs={trainingLog} onClose={()=>setViewProfile(null)} themeColor={themeColor} setPlayers={setPlayers} players={safePlayers} />
                    {editPlayer!==null && <Editor/>}
                    <div className="flex justify-between items-end mb-6"><h2 className="text-2xl font-bold flex items-center gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="user"/> Gestão do Elenco</h2><div className="text-xs bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-1.5 rounded-lg shadow-sm flex items-center gap-2 text-slate-600 dark:text-slate-300"><Icon name="brain" size={14} className="text-blue-500"/>{squadAnalysis}</div></div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        {safePlayers.map((p, i) => { 
                            if(!p) return null;
                            const loadPct = getWeeklyLoad(i); 
                            const dailyLog = trainingLog[today]?.[i] || {}; 
                            const wellness = safeObj(dailyLog.wellness); 
                            const soreness = Number(wellness.soreness) || 0; 
                            const sleep = Number(wellness.sleep) || 0; 
                            const isRisk = soreness >= 5; 
                            const dmStatus = p.injured ? getPlayerDMStatus(i) : null; 
                            const inTransition = !p.injured && isPlayerInTransition(i, dmRecords);
                            
                            return (
                                <div key={i} className={`bg-white dark:bg-slate-800 rounded-xl shadow border p-4 flex flex-col items-center gap-3 relative group hover:shadow-lg transition-all cursor-pointer ${isRisk || p.injured || p.suspended ? 'border-red-500 dark:border-red-500 ring-2 ring-red-100 dark:ring-red-900/50' : p.highlight ? 'border-yellow-400 dark:border-yellow-500 ring-2 ring-yellow-100 dark:ring-yellow-900/50' : 'border-slate-100 dark:border-slate-700'}`} onClick={()=>setViewProfile(i)}>
                                    <button onClick={(e)=>{e.stopPropagation();setLocalData(p);setEditPlayer(i);}} className="absolute top-2 right-2 text-slate-300 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 bg-white dark:bg-slate-800 rounded-full p-1"><Icon name="edit" size={16}/></button>
                                    
                                    {isRisk && !p.injured && !p.suspended && <div className="absolute top-2 left-2 bg-red-500 text-white text-[9px] font-bold px-2 py-0.5 rounded-full animate-pulse z-10 flex items-center gap-1"><Icon name="alert" size={10} stroke="white"/> RISCO</div>}
                                    {p.injured && <div className="absolute top-2 left-2 bg-slate-800 dark:bg-slate-600 text-white p-1.5 rounded-full z-10"><Icon name="medkit" size={14}/></div>}
                                    {inTransition && !p.injured && !p.suspended && <div className="absolute top-2 left-2 bg-orange-500 text-white text-[9px] font-bold px-2 py-0.5 rounded-full z-10 flex items-center gap-1"><Icon name="activity" size={10} stroke="white"/> EM TRANSIÇÃO</div>}
                                    {p.suspended && <div className="absolute top-2 left-2 bg-red-600 text-white text-[9px] font-bold px-2 py-0.5 rounded-full animate-pulse z-10">🚫 SUSPENSO</div>}
                                    {p.highlight && !p.injured && !p.suspended && <div className="absolute top-2 left-2 bg-yellow-400 text-yellow-900 text-[9px] font-bold px-2 py-0.5 rounded-full z-10 flex items-center gap-1">🏆 DESTAQUE</div>}
                                    
                                    <div className={`w-20 h-20 rounded-full bg-slate-100 dark:bg-slate-700 overflow-hidden relative border-2 shrink-0 ${p.highlight ? 'ring-4 ring-yellow-400/30' : ''}`} style={{borderColor: p.injured || p.suspended ? '#ef4444' : inTransition ? '#f97316' : isRisk ? '#ef4444' : p.highlight ? '#facc15' : themeColor}}>
                                        {p.image ? <img src={p.image} className="w-full h-full object-cover object-top"/> : <div className="w-full h-full flex items-center justify-center text-slate-300 dark:text-slate-500"><Icon name="user" size={32}/></div>}
                                    </div>
                                    <div className="text-center w-full">
                                        <div className="font-bold text-slate-700 dark:text-slate-200 text-lg truncate">{p.name}</div>
                                        <div className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase mt-1 flex justify-center gap-2">{p.number && <span className="bg-slate-100 dark:bg-slate-700 px-1.5 rounded text-slate-600 dark:text-slate-300">#{p.number}</span>}<span>{p.position || 'Atleta'}</span></div>
                                    </div>
                                    
                                    <div className="border-t dark:border-slate-700 pt-2 w-full flex justify-center items-center gap-2">
                                        {p.injured && dmStatus ? (
                                            <div className="w-full text-center">
                                                <div className="text-[10px] font-black text-red-600 dark:text-red-400 uppercase mb-1">{dmStatus.location}</div>
                                                <div className="text-[9px] font-bold text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700 rounded px-2 py-1">{RTP_PHASES.find(ph=>ph.id==dmStatus.rtpPhase)?.label || 'Em tratamento'}</div>
                                            </div>
                                        ) : (
                                            <><MiniGauge value={loadPct} min={0} max={100} label="Carga 7 Dias" />{sleep >= 5 && <div className="text-red-500 bg-red-50 dark:bg-red-900/30 p-1 rounded-full" title="Sono Ruim"><Icon name="moon" size={12}/></div>}{soreness >= 5 && <div className="text-red-500 bg-red-50 dark:bg-red-900/30 p-1 rounded-full" title="Dor Alta"><Icon name="bolt" size={12}/></div>}</>
                                        )}
                                    </div>
                                </div>
                            ) 
                        })}
                        <button onClick={addP} className="bg-white dark:bg-slate-800 rounded-xl shadow border border-dashed border-slate-300 dark:border-slate-600 p-4 flex flex-col items-center justify-center gap-2 text-slate-400 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 hover:border-blue-500 dark:hover:border-blue-400 transition-all cursor-pointer h-40"><Icon name="plus" size={32}/><span className="font-bold text-sm">Adicionar Atleta</span></button>
                    </div>
                </div>
            );
        };

        const PSEView = ({ players, themeColor, trainingLog, setTrainingLog }) => {
            const [date, setDate] = useState(getTodayStr()); 
            const [globalDur, setGlobalDur] = useState('');
            const [localRPEs, setLocalRPEs] = useState({});
            const [saveStatus, setSaveStatus] = useState('');
            const saveTimeoutRef = useRef(null);

            useEffect(() => { 
                const c = {}; 
                safeArray(players).forEach((_, i) => { 
                    const log = trainingLog[date]?.[i] || {}; 
                    c[i] = { am: Number(log.rpe_am) || 0, pm: Number(log.rpe_pm) || 0, dur: Number(log.duration) || 0 }; 
                }); 
                setLocalRPEs(c); 
            }, [date, players, trainingLog]);

            const saveToMain = (currentLocal) => { 
                setSaveStatus('A Guardar...'); 
                const newLog = {...trainingLog}; 
                if(!newLog[date]) newLog[date] = {}; 
                safeArray(players).forEach((_, i) => { 
                    if(!newLog[date][i]) newLog[date][i] = {}; 
                    newLog[date][i].rpe_am = currentLocal[i].am; 
                    newLog[date][i].rpe_pm = currentLocal[i].pm; 
                    newLog[date][i].duration = currentLocal[i].dur;
                }); 
                setTrainingLog(newLog); 
                setTimeout(() => setSaveStatus('Salvo'), 500); 
                setTimeout(() => setSaveStatus(''), 2000); 
            };

            const updateRPE = (i, field, val) => { 
                const newValue = parseInt(val) || 0; 
                setLocalRPEs(prev => { 
                    const next = {...prev, [i]: {...(prev[i]||{am:0, pm:0}), [field]: newValue}}; 
                    if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current); 
                    saveTimeoutRef.current = setTimeout(() => { saveToMain(next); }, 1000); 
                    return next; 
                }); 
            };

            const applyGlobalDur = (val) => {
                setGlobalDur(val);
                const num = parseInt(val) || 0;
                setLocalRPEs(prev => {
                    const next = {};
                    safeArray(players).forEach((_, i) => {
                        next[i] = { ...(prev[i] || {am:0, pm:0}), dur: num };
                    });
                    if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
                    saveTimeoutRef.current = setTimeout(() => { saveToMain(next); }, 1000);
                    return next;
                });
            };

            const manualSave = () => { if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current); saveToMain(localRPEs); showToast("Salvo manualmente!"); };

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in flex flex-col relative custom-scroll">
                    <div className={`status-badge ${saveStatus ? 'show' : ''} z-50`}>{saveStatus === 'Salvo' ? '💾 SALVO' : '⏳ A Guardar...'}</div>
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 shrink-0 gap-4">
                        <div className="flex items-center gap-2"><h2 className="text-xl font-bold text-slate-700 dark:text-slate-100 flex items-center gap-2"><Icon name="activity"/> CONTROLO DE CARGA (sRPE)</h2></div>
                        
                        <div className="flex flex-wrap items-center gap-4 bg-slate-50 dark:bg-slate-900 p-2 rounded-lg border border-slate-200 dark:border-slate-700 w-full md:w-auto">
                            <div className="flex items-center gap-2 flex-1 md:flex-none">
                                <span className="text-[10px] font-bold text-slate-500 uppercase whitespace-nowrap">Tempo Geral:</span>
                                <input type="number" placeholder="Minutos..." value={globalDur} onChange={e=>applyGlobalDur(e.target.value)} className="w-24 p-2 text-xs font-bold border dark:border-slate-600 rounded bg-white dark:bg-slate-700 dark:text-white outline-none" title="Aplica este tempo para todos os atletas"/>
                            </div>
                            <div className="h-6 w-px bg-slate-300 dark:bg-slate-600 hidden md:block"></div>
                            <div className="flex gap-2 flex-1 md:flex-none justify-end">
                                <button onClick={manualSave} className="bg-slate-200 dark:bg-slate-700 p-2 rounded hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300"><Icon name="save"/></button>
                                <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="bg-slate-100 dark:bg-slate-700 dark:text-white font-bold p-2 rounded border dark:border-slate-600 w-full md:w-auto outline-none"/>
                            </div>
                        </div>
                    </div>
                    
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col flex-1 min-h-0">
                        <div className="grid grid-cols-12 bg-slate-100 dark:bg-slate-700 p-3 text-[10px] font-bold text-slate-500 dark:text-slate-300 uppercase shrink-0">
                            <div className="col-span-4">Atleta</div>
                            <div className="col-span-3 text-center">Manhã (0-10)</div>
                            <div className="col-span-3 text-center">Tarde (0-10)</div>
                            <div className="col-span-2 text-center">Duração (min)</div>
                        </div>
                        <div className="divide-y divide-slate-100 dark:divide-slate-700 overflow-y-auto flex-1 custom-scroll">
                            {safeArray(players).map((p, i) => { 
                                if(!p) return null; 
                                const dur = localRPEs[i]?.dur||0;
                                const sRPE = ((localRPEs[i]?.am||0) + (localRPEs[i]?.pm||0)) * (dur > 0 ? dur : 60);
                                return (
                                    <div key={i} className={`grid grid-cols-12 p-3 items-center hover:bg-slate-50 dark:hover:bg-slate-700/50`}>
                                        <div className="col-span-4">
                                            <div className="flex items-center gap-3">
                                                <div className="w-8 h-8 rounded-full bg-slate-200 overflow-hidden shrink-0">{p.image?<img src={p.image} className="w-full h-full object-cover object-top"/>:<Icon name="user"/>}</div>
                                                <div>
                                                    <span className="font-bold text-sm text-slate-700 dark:text-slate-200 truncate block">{p.name}</span>
                                                    {sRPE > 0 && <span className="text-[9px] font-bold text-blue-500">Carga Real: {sRPE}</span>}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="col-span-3 flex justify-center"><input type="range" min="0" max="10" value={localRPEs[i]?.am||0} onChange={e=>updateRPE(i,'am',e.target.value)} className="w-16 md:w-24 mr-2 accent-blue-600"/><span className="font-bold w-4 text-center text-blue-600 dark:text-blue-400">{localRPEs[i]?.am}</span></div>
                                        <div className="col-span-3 flex justify-center"><input type="range" min="0" max="10" value={localRPEs[i]?.pm||0} onChange={e=>updateRPE(i,'pm',e.target.value)} className="w-16 md:w-24 mr-2 accent-orange-500"/><span className="font-bold w-4 text-center text-orange-500 dark:text-orange-400">{localRPEs[i]?.pm}</span></div>
                                        <div className="col-span-2 flex justify-center"><input type="number" min="0" placeholder="0" className="w-12 md:w-16 p-1 text-center text-sm font-bold border dark:border-slate-600 rounded bg-white dark:bg-slate-800 dark:text-white outline-none" value={localRPEs[i]?.dur||''} onChange={e=>updateRPE(i,'dur',e.target.value)} /></div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const TeamCoachAI = ({ activePlayers, pseAvg, dmCount }) => {
            const numericAvg = parseFloat(pseAvg) || 0;
            let title = "Diagnóstico da Equipe"; let suggestion = ""; let colorClass = "bg-slate-800 text-slate-300";
            if (numericAvg >= 600) { title = "ALERTA VERMELHO (Sobrecarga)"; suggestion = "Carga Extremamente Alta. RISCO DE LESÃO ELEVADO. Amanhã: Recuperação passiva ou folga obrigatória."; colorClass = "bg-red-900 text-red-50"; } 
            else if (numericAvg >= 400) { title = "Zona de Alta Intensidade"; suggestion = "Treino exigente. Amanhã: Carga baixa/moderada (foco tático sem contato) para supercompensação."; colorClass = "bg-orange-800 text-orange-50"; } 
            else if (numericAvg >= 200) { title = "Zona de Manutenção/Desenvolvimento"; suggestion = "Carga Ideal. Amanhã: Pode manter a intensidade se não for véspera de jogo (MD-1)."; colorClass = "bg-green-800 text-green-50"; } 
            else if (numericAvg > 0) { title = "Carga Baixa / Regenerativo"; suggestion = "Estímulo leve hoje. Amanhã: Oportunidade para 'Choque' (Força ou Resistência) se longe do jogo."; colorClass = "bg-blue-800 text-blue-50"; } 
            else { title = "Sem Dados Suficientes"; suggestion = "Aguardando preenchimento de PSE e Duração (min) dos treinos."; colorClass = "bg-slate-800 text-slate-300"; }
            if(dmCount >= 3) { suggestion += ` ALERTA: ${dmCount} atletas no DM. Atenção na rotação.`; }
            return (<div className={`md:col-span-2 rounded-xl shadow p-5 border border-slate-700 flex flex-col justify-center relative overflow-hidden ${colorClass}`}><div className="absolute top-0 right-0 p-4 opacity-10"><Icon name="brain" size={80}/></div><div className="flex items-center gap-2 mb-2 z-10"><div className="bg-white/20 p-1.5 rounded-full"><Icon name="brain" size={20}/></div><h3 className="font-bold text-sm uppercase tracking-wider opacity-80">Técnico Virtual (Equipe)</h3></div><div className="z-10"><div className="text-xl font-black mb-1">{title}</div><div className="text-sm font-medium opacity-90 leading-snug">{suggestion}</div></div></div>);
        };

        const PreGameView = ({ players, setPlayers, themeColor, trainingLog, dmRecords, matchMinutes, setMatchMinutes }) => {
            const [monitorDate, setMonitorDate] = useState(getTodayStr()); 
            const dailyData = safeObj(trainingLog[monitorDate]);
            const safePs = safeArray(players);
            
            const activePlayersIndices = [];
            safePs.forEach((p, i) => { if(p && safeObj(dailyData[i]?.wellness).sleep) activePlayersIndices.push(i); });
            
            const teamHooperAvg = activePlayersIndices.length > 0 
                ? Math.round(activePlayersIndices.reduce((acc, i) => acc + getWSum(dailyData[i]?.wellness), 0) / activePlayersIndices.length) 
                : 0;

            const rpePlayersIndices = [];
            safePs.forEach((p, i) => { if(p && calcDailyLoad(dailyData[i]) > 0) rpePlayersIndices.push(i); });
            
            const pseSum = rpePlayersIndices.reduce((acc, i) => acc + calcDailyLoad(dailyData[i]), 0);
            const pseAvgRaw = rpePlayersIndices.length > 0 ? Math.round(pseSum / rpePlayersIndices.length) : 0;
            const pseColor = pseAvgRaw >= 600 ? '#ef4444' : pseAvgRaw >= 300 ? '#eab308' : '#22c55e';
            
            const dmCount = safePs.filter(p => p && p.injured).length;
            
            const weeklyDates = getDatesInRange(monitorDate, 7).reverse();
            const weeklyData = weeklyDates.map(d => {
                const dayLog = safeObj(trainingLog[d]);
                let loadSum = 0, wellnessSum = 0, countLoad = 0, countWell = 0;
                safePs.forEach((p, i) => {
                    if(p) {
                        const l = dayLog[i];
                        if(l) { 
                            const load = calcDailyLoad(l);
                            if(load > 0) { loadSum += load; countLoad++; } 
                            if(safeObj(l.wellness).sleep) { wellnessSum += getWSum(l.wellness); countWell++; } 
                        }
                    }
                });
                return { date: d, avgLoad: countLoad > 0 ? Math.round(loadSum/countLoad) : 0, avgWell: countWell > 0 ? Math.round(wellnessSum/countWell) : 0 };
            });

            const updateMinutes = (pIdx, val) => { const newMins = {...matchMinutes}; if(!newMins[monitorDate]) newMins[monitorDate] = {}; newMins[monitorDate][pIdx] = parseInt(val) || 0; setMatchMinutes(newMins); };

            const [viewProfile, setViewProfile] = useState(null);

            const renderMatchReadinessAI = (pLog, mins, isInjured, inTransition) => {
                if (isInjured) return <div className="text-[9px] font-bold text-red-500 bg-red-900/30 px-2 py-0.5 rounded">Indisponível (DM)</div>;
                if (inTransition) return <div className="text-[9px] font-bold text-orange-500 bg-orange-900/30 px-2 py-0.5 rounded">Transição - Limite: 30 a 45min</div>;
                
                const load = calcDailyLoad(pLog);
                const wellness = getWSum(pLog?.wellness);
                if (mins >= 150) return <div className="text-[9px] font-bold text-red-500 bg-red-900/30 px-2 py-0.5 rounded">Risco Máximo - POUPE O ATLETA</div>;
                if (load >= 600 || wellness >= 20) return <div className="text-[9px] font-bold text-yellow-500 bg-yellow-900/30 px-2 py-0.5 rounded">Fadigado - Limitar 45 min</div>;
                return <div className="text-[9px] font-bold text-green-500 bg-green-900/30 px-2 py-0.5 rounded">Apto para 90 min</div>;
            };

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in custom-scroll">
                    <PlayerProfileModal player={safePs[viewProfile]} playerIndex={viewProfile} logs={trainingLog} onClose={()=>setViewProfile(null)} themeColor={themeColor} setPlayers={setPlayers} players={safePs} />
                    
                    <div className="flex justify-between items-center mb-4 border-b dark:border-slate-700 pb-2"><h2 className="text-2xl font-bold flex items-center gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="trophy"/> Performance & Carga</h2><div className="flex gap-2"><div className="flex items-center gap-2 text-xs bg-white dark:bg-slate-700 border dark:border-slate-600 rounded px-3 py-1.5 shadow-sm"><span className="font-bold text-slate-500 dark:text-slate-300 uppercase">Análise:</span><input type="date" value={monitorDate} onChange={e=>setMonitorDate(e.target.value)} className="bg-transparent text-slate-800 dark:text-slate-100 font-bold outline-none"/></div></div></div>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow p-4 border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center col-span-1"><SpeedometerGauge value={teamHooperAvg} /></div>
                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow p-4 border border-slate-100 dark:border-slate-700 flex items-center gap-4">
                            <DonutChart value={Math.min(20, Math.round(pseAvgRaw/50))} max={20} color={pseColor} size={60} />
                            <div><div className="text-xl font-black text-slate-800 dark:text-slate-200">{pseAvgRaw}</div><div className="text-[10px] text-slate-400 font-bold uppercase">sRPE Equipe</div></div>
                        </div>
                        <TeamCoachAI activePlayers={activePlayersIndices} pseAvg={pseAvgRaw} dmCount={dmCount} />
                    </div>
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-100 dark:border-slate-700 p-4 mb-8 overflow-x-auto custom-scroll">
                        <h3 className="text-xs font-bold text-slate-400 uppercase mb-3 flex items-center gap-2"><Icon name="barChart"/> Contexto Semanal (Média Equipe)</h3>
                        <div className="flex gap-2 min-w-max">
                            {weeklyData.map((d, idx) => {
                                if(!d) return null;
                                const isToday = d.date === monitorDate;
                                const wColor = d.avgWell >= 20 ? 'bg-red-400' : d.avgWell >= 14 ? 'bg-yellow-400' : 'bg-green-400';
                                return (
                                    <div key={idx} className={`flex-1 min-w-[60px] flex flex-col items-center p-2 rounded border ${isToday ? 'bg-blue-50 dark:bg-blue-900/30 border-blue-200 dark:border-blue-800' : 'bg-slate-50 dark:bg-slate-700 border-transparent'}`}>
                                        <div className="text-[9px] font-bold text-slate-400 mb-1">{formatDateBR(d.date).slice(0,5)}</div>
                                        <div className="flex items-end gap-1 h-20 w-full justify-center">

                                {activeInjuries.length===0?<div className="text-slate-400 text-sm text-center py-4 bg-slate-50 dark:bg-slate-700/50 rounded-lg">Nenhum atleta no Departamento Médico. 🙌</div>:<div className="space-y-3">{activeInjuries.map((r,idx)=>{

                                                    <div><div className="font-bold text-slate-800 dark:text-slate-100 text-lg">{p.name}</div><div className="text-xs text-red-600 font-bold bg-red-50 dark:bg-red-900/30 px-1 rounded inline-block">{r.location}</div></div>

        const AssessmentView = ({ players, themeColor, assessments, setAssessments, dmRecords }) => {
            const [selectedPlayer, setSelectedPlayer] = useState(0);
            const [viewMetric, setViewMetric] = useState('fms_total'); 
            
            const [form, setForm] = useState({ 
                date: getTodayStr(), weight: '', height: '', age: '', 
                chest: '', axilla: '', tricep: '', subscap: '', abdo: '', supra: '', thigh: '', 
                soccer_test: '', sj: '', cmj: '', speed30: '',
                anamnese: '', orto: '', postura: '', squat_rm: '', assimetria: '',
                fms_ds: '', fms_hs_l: '', fms_hs_r: '', fms_ill_l: '', fms_ill_r: '', 
                fms_sm_l: '', fms_sm_r: '', fms_aslr_l: '', fms_aslr_r: '', 
                fms_tspu: '', fms_rs_l: '', fms_rs_r: '', fms_total: '',
                lachman: '', mcmurray: '', isocinetica: '', 
                tornozelo_gaveta: '', lunge_test: '', 
                quadril_adm: '', quadril_forca: '', 
                y_balance: '', conduta: 'Liberado'
            });

            const playerPastInjuries = safeArray(dmRecords).filter(r => r && r.playerId == selectedPlayer);

            const calculateFMS = () => {
                const getV = (k) => parseInt(form[k]);
                const ds = getV('fms_ds') || 0;
                const hs = Math.min(getV('fms_hs_l')||0, getV('fms_hs_r')||0);
                const ill = Math.min(getV('fms_ill_l')||0, getV('fms_ill_r')||0);
                const sm = Math.min(getV('fms_sm_l')||0, getV('fms_sm_r')||0);
                const aslr = Math.min(getV('fms_aslr_l')||0, getV('fms_aslr_r')||0);
                const tspu = getV('fms_tspu') || 0;
                const rs = Math.min(getV('fms_rs_l')||0, getV('fms_rs_r')||0);
                return ds + hs + ill + sm + aslr + tspu + rs;
            };

            const calculateBF = () => { const sum = Number(form.chest)+Number(form.axilla)+Number(form.tricep)+Number(form.subscap)+Number(form.abdo)+Number(form.supra)+Number(form.thigh); if(sum===0||!form.age) return 0; const bd = 1.112 - (0.00043499*sum) + (0.00000055*sum*sum) - (0.00028826*form.age); return (((4.95/bd)-4.50)*100).toFixed(1); };
            
            const saveAssessment = () => { 
                const newRec = { ...form, bf: calculateBF(), fms_total: calculateFMS() }; 
                const h = Array.isArray(assessments[selectedPlayer]) ? assessments[selectedPlayer] : []; 
                setAssessments({ ...assessments, [selectedPlayer]: [newRec, ...h] });

            const autoSugerirConduta = () => {
                const fmsScore = calculateFMS();
                if (form.lachman === 'Positivo' || form.mcmurray === 'Positivo' || form.tornozelo_gaveta === 'Instável' || (fmsScore > 0 && fmsScore < 14)) {
                    setForm({...form, conduta: 'Não Liberado'});
                    showToast("IA: Atleta Não Liberado (Risco Crítico)");
                } else if (form.lunge_test === 'Restrito' || form.quadril_adm === 'Restrito' || form.assimetria !== '') {
                    setForm({...form, conduta: 'Restrições'});
                    showToast("IA: Liberado com Restrições");
                } else {
                    setForm({...form, conduta: 'Liberado'});
                    showToast("IA: Liberado sem restrições");
                }

            const getRankings = (metric) => { 
                const list = safeArray(players).map((p, i) => { 
                    if(!p) return null; 
                    const h = Array.isArray(assessments[i]) ? assessments[i] : []; 
                    if(h.length === 0 || !h[0] || h[0][metric] === undefined) return null;
                    const val = parseFloat(h[0][metric]); 
                    return { name: p.name, val: isNaN(val) ? 0 : val }; 
                }).filter(x => x && x.val > 0); 
                
                if(metric === 'speed30') { list.sort((a,b) => a.val - b.val); } 
                else { list.sort((a,b) => b.val - a.val); } 
                
                return { top5: list.slice(0, 5), bottom5: list.slice(-5).reverse() }; 
            };
            
            const rankings = getRankings(viewMetric);
            const RankChart = ({ title, data, color }) => ( <div className="mb-4"><h4 className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-2">{title}</h4>{data.length === 0 ? <div className="text-xs text-slate-300 dark:text-slate-600">Sem dados válidos para a equipa</div> : data.map((d, i) => ( <div key={i} className="flex items-center gap-2 mb-1"><div className="text-[10px] font-bold w-4 text-slate-400">#{i+1}</div><div className="flex-1"><div className="flex justify-between text-[10px] font-bold text-slate-700 dark:text-slate-300 mb-0.5"><span>{d.name}</span><span>{d.val}</span></div><div className="h-1.5 w-full bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{width: '100%', backgroundColor: color}}></div></div></div></div> ))}</div> );
            const history = Array.isArray(assessments[selectedPlayer]) ? assessments[selectedPlayer] : [];
            
            const FmsRow = ({ label, id, isBilateral }) => {
                if (isBilateral) {
                    return (
                        <div className="flex justify-between items-center bg-slate-50 dark:bg-slate-700/50 p-2 rounded border dark:border-slate-600">

                                <div className="flex items-center gap-1"><span className="text-[9px] text-slate-400">Dir:</span><input type="number" min="0" max="3" className="w-10 p-1 text-center text-xs font-bold rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form[`fms_${id}_r`] || ''} onChange={e=>setForm({...form, [`fms_${id}_r`]: e.target.value})} /></div>
                            </div>
                        </div>
                    );
                } else {
                    return (
                        <div className="flex justify-between items-center bg-slate-50 dark:bg-slate-700/50 p-2 rounded border dark:border-slate-600">
                            <span className="text-[10px] font-bold text-slate-600 dark:text-slate-300 w-1/2 pr-2 leading-tight">{label}</span>
                            <div className="w-1/2 flex justify-end">
                                <input type="number" min="0" max="3" className="w-12 p-1 text-center text-xs font-bold rounded border dark:border-slate-500 dark:bg-slate-800 dark:text-white outline-none" value={form[`fms_${id}`] || ''} onChange={e=>setForm({...form, [`fms_${id}`]: e.target.value})} />
                            </div>
                        </div>
                    );
                }
            };

            const renderPhysicalAnalyst = () => { 
                if (form.conduta === 'Não Liberado') {
                    return (<div className="mt-6 p-4 border rounded-xl bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-800 text-red-900 dark:text-red-200"><div className="flex gap-3 items-center mb-2"><Icon name="alert" size={24} className="text-red-600" /><div className="text-xs font-black uppercase tracking-wider text-red-600">ATLETA VETADO</div></div><div className="text-sm font-bold leading-snug mb-2">Incapacitado para treino/jogo pelo Departamento Médico.</div><div className="text-[10px] font-bold bg-white/50 dark:bg-black/30 p-2 rounded">Plano: Iniciar protocolo de recuperação.</div></div>);
                }

                const bf = calculateBF(); 
                const fmsScore = calculateFMS();
                
                let feedback = "Atleta apto. Parâmetros normais."; 
                let plan = "Plano Sugerido: Treino padrão da equipa.";
                let isAlert = false;

                if(fmsScore > 0 && fmsScore < 14) {
                    feedback = `ALTO RISCO DE LESÃO! Escore FMS (${fmsScore}) muito baixo.`;
                    plan = "Plano: Foco imediato em mobilidade e estabilidade do core.";
                    isAlert = true;
                } else if(form.lachman === 'Positivo' || form.mcmurray === 'Positivo') {
                    feedback = `ALTO RISCO! Teste de joelho (Lachman/McMurray) Positivo.`;
                    plan = "Plano: RM Imediata e encaminhamento ortopédico.";
                    isAlert = true;

                    <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-lg gap-1 overflow-x-auto shadow-inner no-print w-full custom-scroll">
                        {['squad','micro','wellness','pse','workout','match','dm','assessment','library'].map(t => (
                            <button key={t} onClick={()=>setTab(t)} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 uppercase ${tab===t?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>{t}</button>
                        ))}
                    </div>
                    
                    <div className="flex-1 overflow-hidden relative flex flex-col" id="print-area">
                        {tab === 'squad' && (
                            <div className="px-6 pt-4 pb-2 bg-slate-100 dark:bg-slate-900 shrink-0 transition-colors shadow-sm z-10 border-b border-slate-200 dark:border-slate-800">
                                <label className="text-[10px] font-black text-blue-600 dark:text-blue-400 uppercase flex gap-1 items-center mb-2 tracking-wider"><Icon name="bell" size={14}/> Comunicação & Análise (Atletas)</label>
                                <div className="flex flex-col gap-2"><div className="flex flex-col md:flex-row gap-2">
                                        <select className="w-full md:w-1/3 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-white p-2 rounded-lg text-xs font-bold outline-none shadow-sm cursor-pointer" onChange={e => {if(e.target.value) setCoachMsg(e.target.value)}}>
                                            <option value="">📋 Selecionar aviso rápido...</option>
                                            <option value="🎥 ATENÇÃO: Reunião de Vídeo Análise antes do treino.">🎥 Vídeo Análise Tática</option>
                                            <option value="🩺 OBRIGATÓRIO: Passar na Avaliação Médica / Fisioterapia.">🩺 Avaliação Médica / Fisio</option>
                                            <option value="🏋️ Foco de Hoje: Academia (Membros Superiores).">🏋️ Academia (Superiores)</option>
                                            <option value="🏋️ Foco de Hoje: Academia (Membros Inferiores).">🏋️ Academia (Inferiores)</option>
                                            <option value="⚡ Foco de Hoje: Treino Funcional / Potência no Campo.">⚡ Treino Funcional / Potência</option>
                                            <option value="🧊 RECUPERAÇÃO: Crioterapia (Banheira de Gelo) obrigatória pós-treino.">🧊 Crioterapia Obrigatória</option>
                                        </select>
                                        <BufferedInput className="w-full md:w-2/3 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-800 dark:text-white p-2 rounded-lg text-sm font-bold outline-none shadow-sm placeholder-slate-400" placeholder="Ou digite um recado da comissão técnica..." value={coachMsg} onSave={val=>setCoachMsg(val)} />
                                    </div>
                                    <div className="flex items-center gap-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 p-1 rounded-lg shadow-sm mt-1">
                                        <Icon name="play" size={20} className="text-red-500 ml-2 shrink-0"/>
                                        <BufferedInput className="w-full bg-transparent text-slate-800 dark:text-white p-1.5 text-xs outline-none placeholder-slate-400" placeholder="Cole o link do YouTube para Vídeo-Análise Tática (Opcional)" value={videoUrl} onSave={val=>setVideoUrl(val)} />
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        <div className="flex-1 overflow-hidden relative">
                            {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} />}
                            {tab === 'micro' && <MicrocycleView days={days} setDays={setDays} themeColor={themeColor} players={players} trainingLog={trainingLog} />}
                            {tab === 'wellness' && <WellnessDashboard players={players} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} />}
                            {tab === 'pse' && <PSEView players={players} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} />}
                            {tab === 'match' && <PreGameView players={players} setPlayers={setPlayers} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} matchMinutes={matchMinutes} setMatchMinutes={setMatchMinutes} />}
                            {tab === 'dm' && <MedicalView players={players} setPlayers={setPlayers} dmRecords={dmRecords} setDmRecords={setDmRecords} themeColor={themeColor} />}
                            {tab === 'assessment' && <AssessmentView players={players} themeColor={themeColor} assessments={assessments} setAssessments={setAssessments} dmRecords={dmRecords} />}
                            {tab === 'library' && <LibraryView themeColor={themeColor} library={library} setLibrary={setLibrary} initialData={initialData} user={user} />}
                            {tab === 'workout' && <WorkoutBuilderView themeColor={themeColor} exercises={exercises} setExercises={setExercises} library={library} postWorkout={postWorkout} setPostWorkout={setPostWorkout} players={players} trainingLog={trainingLog} initialData={initialData} user={user} />}
                        </div>
                    </div>
                </div>
            );
        };

        const CloudWrapper = ({ user }) => {
            const [initialData, setInitialData] = useState(null);
            const [loadingCloud, setLoadingCloud] = useState(true);

            useEffect(() => {
                const unsubscribe = db.collection('coachData').doc(user.uid).onSnapshot(doc => {
                    setInitialData(sanitizeCloudData(doc.exists ? doc.data() : {}));
                    setLoadingCloud(false);
                }, err => {
                    console.error("Cloud fetch error:", err);
                    setInitialData(sanitizeCloudData({}));
                    setLoadingCloud(false);
                });
                return () => unsubscribe();
            }, [user]);

            if (loadingCloud) return <div className="flex flex-col h-screen w-screen items-center justify-center bg-slate-900 text-slate-300 font-bold"><Icon name="cloud" size={40} className="animate-bounce text-blue-500 mb-4"/>A sincronizar...</div>;
            return <ErrorBoundary><MainApp user={user} initialData={initialData} /></ErrorBoundary>;
        };

        const RootApp = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                    const loader = document.getElementById('loading-state');
                    if(loader) loader.style.display = 'none';
                });
                return () => unsubscribe();
            }, []);

            if (loading) return null;
            if (!user) return <LoginScreen onLogin={() => {}} />;
            return <CloudWrapper user={user} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
