                                                if (faltas > 0) return <span className="bg-orange-100 text-orange-600 border border-orange-200 px-2 py-0.5 rounded text-[8px] font-black uppercase shadow-sm">{faltas} Falta(s)</span>;
                                                return null;
                                            })()}
                                        </div>
                                        <div className="text-[9px] font-bold text-slate-400">{p.pos || 'Atleta'}</div>
                                    </div>
                                </div>
                                <div className="flex bg-slate-100 dark:bg-slate-900 rounded-lg p-1 border dark:border-slate-600">
                                    <button onClick={()=>setStatus(i, 'P')} className={`flex-1 md:w-20 py-1.5 text-[10px] font-black uppercase rounded transition-colors ${status === 'P' ? 'bg-green-500 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800'}`}>Pres</button>
                                    <button onClick={()=>setStatus(i, 'A')} className={`flex-1 md:w-20 py-1.5 text-[10px] font-black uppercase rounded transition-colors ${status === 'A' ? 'bg-red-500 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800'}`}>Falta</button>
                                    <button onClick={()=>setStatus(i, 'J')} className={`flex-1 md:w-20 py-1.5 text-[10px] font-black uppercase rounded transition-colors ${status === 'J' ? 'bg-yellow-500 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800'}`}>Just</button>
                                    <button onClick={()=>setStatus(i, 'DM')} className={`flex-1 md:w-20 py-1.5 text-[10px] font-black uppercase rounded transition-colors ${status === 'DM' ? 'bg-slate-600 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800'}`}>DM</button>
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
            <div className="mt-8 mb-4 px-2">
                <button 
                    onClick={salvarFrequencia} 
                    className="w-full bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-black py-4 rounded-xl shadow-[0_0_15px_rgba(16,185,129,0.4)] flex items-center justify-center gap-2 transition-all uppercase tracking-wider"
                >
                    <i className="fa-solid fa-cloud-arrow-up text-lg"></i> 
                    Salvar Frequência e Atualizar Home
                </button>
            </div>
        </div>
    );
};

        // =============================
        // PROCOACH FASE 2 - INTELIGÊNCIA OPERACIONAL
        // =============================
        const phase2Clamp = (value, min = 0, max = 100) => Math.max(min, Math.min(max, Number(value) || 0));

        const getIsoWeekInfo = (dateString = getTodayStr()) => {
            const base = new Date(`${dateString}T12:00:00`);
            const date = new Date(Date.UTC(base.getFullYear(), base.getMonth(), base.getDate()));
            const dayNum = date.getUTCDay() || 7;
            date.setUTCDate(date.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
            const week = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
            const monday = new Date(base);
            const localDay = monday.getDay() || 7;
            monday.setDate(monday.getDate() - localDay + 1);
            const mondayStr = new Date(monday.getTime() - monday.getTimezoneOffset() * 60000).toISOString().split('T')[0];
            return { year: date.getUTCFullYear(), week, key: `${date.getUTCFullYear()}-W${String(week).padStart(2, '0')}`, monday: mondayStr };
        };

        const PHASE2_WEEK_PHASES = [
            { id: 'pre', label: 'Pré-temporada', color: 'bg-purple-600', border: 'border-purple-500' },
            { id: 'development', label: 'Desenvolvimento', color: 'bg-blue-600', border: 'border-blue-500' },
            { id: 'shock', label: 'Choque / Pico', color: 'bg-red-600', border: 'border-red-500' },
            { id: 'maintenance', label: 'Manutenção', color: 'bg-yellow-500', border: 'border-yellow-500' },
            { id: 'competition', label: 'Competição', color: 'bg-emerald-600', border: 'border-emerald-500' },
            { id: 'recovery', label: 'Regenerativo', color: 'bg-cyan-600', border: 'border-cyan-500' },
            { id: 'transition', label: 'Transição / Férias', color: 'bg-slate-600', border: 'border-slate-500' }
        ];

        const phase2LoadDefaults = (md = '') => {
            const value = String(md).toUpperCase();
            if (value.includes('JOGO')) return { duration: 90, pse: 10 };
            if (value.includes('MD-5')) return { duration: 85, pse: 7 };
            if (value.includes('MD-4')) return { duration: 75, pse: 7 };
            if (value.includes('MD-3')) return { duration: 65, pse: 8 };
            if (value.includes('MD-2')) return { duration: 45, pse: 5 };
            if (value.includes('MD-1')) return { duration: 35, pse: 3 };
            if (value.includes('MD+')) return { duration: 40, pse: 3 };
            if (value.includes('FOLGA')) return { duration: 0, pse: 0 };
            return { duration: 55, pse: 5 };
        };

        const calculatePlannedWeekLoad = (days) => safeArray(days).reduce((total, day) => {
            const defaults = phase2LoadDefaults(day?.md);
            const duration = Number(day?.plannedMins || day?.timeTarget) || defaults.duration;
            const pse = Number(day?.pseTarget) || defaults.pse;
            return total + duration * pse;
        }, 0);

        const getPhase2PositionGroup = (player) => {
            const value = String(player?.position || player?.pos || '').toUpperCase();
            if (/GOL|GOLEIR/.test(value)) return 'GOL';
            if (/ZAG|LAT|ALA|DEF/.test(value)) return 'DEF';
            if (/VOL|MEI|MC|ME/.test(value)) return 'MEI';
            if (/ATA|PONTA|CENTRO|EXT/.test(value)) return 'ATA';
            return 'OUT';
        };

        const getPhase2PlayerMetrics = ({ player, playerIndex, referenceDate, trainingLog, dmRecords, attendanceLog, matchMinutes }) => {
            const dates28 = getDatesInRange(referenceDate, 28);
            const dates7 = dates28.slice(0, 7);
            const dates14 = dates28.slice(0, 14);
            const loadFor = (date) => calcDailyLoad(trainingLog?.[date]?.[playerIndex]);
            const acute = dates7.reduce((sum, date) => sum + loadFor(date), 0);
            const chronicTotal = dates28.reduce((sum, date) => sum + loadFor(date), 0);
            const daysWithLoad = dates28.filter(date => loadFor(date) > 0).length;
            const acwr = daysWithLoad >= 8 && chronicTotal > 0 ? acute / (chronicTotal / 4) : 0;

            let latestWellness = null;
            let latestWellnessDate = null;
            for (const date of dates7) {
                const wellness = safeObj(trainingLog?.[date]?.[playerIndex]?.wellness);
                if (wellness.sleep) { latestWellness = wellness; latestWellnessDate = date; break; }
            }
            const wellnessSum = latestWellness ? getWSum(latestWellness) : 0;
            const readiness = latestWellness ? phase2Clamp(Math.round(100 - ((wellnessSum - 5) / 30) * 100)) : 50;

            const attendanceValues = dates14.map(date => attendanceLog?.[date]?.[playerIndex]).filter(Boolean);
            const presentCount = attendanceValues.filter(status => status === 'P').length;
            const attendancePct = attendanceValues.length ? Math.round((presentCount / attendanceValues.length) * 100) : 100;
            const minutes14 = dates14.reduce((sum, date) => {
                const value = matchMinutes?.[date]?.[playerIndex];
                return sum + (Number(value?.mins) || Number(value) || 0);
            }, 0);

            const activeDm = safeArray(dmRecords).find(record => record && record.status === 'Active' && (record.playerId == playerIndex || record.playerUid === player?.id));
            const rtpPhase = Number(activeDm?.rtpPhase) || 0;
            const inTransition = !!activeDm && rtpPhase >= 3;
            let score = readiness;
            const reasons = [];
            if (!latestWellness) reasons.push('Sem wellness recente');
            if (acwr >= 1.5) { score -= 22; reasons.push(`ACWR alto (${acwr.toFixed(2)})`); }
            else if (acwr > 0 && acwr < 0.8) { score -= 8; reasons.push(`Carga abaixo da zona (${acwr.toFixed(2)})`); }
            if (attendancePct < 75) { score -= 10; reasons.push(`Frequência ${attendancePct}%`); }
            if (minutes14 >= 180) { score -= 8; reasons.push(`${minutes14} min em 14 dias`); }
            if (latestWellness && Number(latestWellness.soreness) >= 6) { score -= 15; reasons.push('Dor muscular elevada'); }
            if (latestWellness && Number(latestWellness.fatigue) >= 6) { score -= 12; reasons.push('Fadiga elevada'); }
            if (activeDm && !inTransition) { score = 0; reasons.unshift('Departamento médico'); }
            if (inTransition) { score = Math.min(score, 62); reasons.unshift(`RTP fase ${rtpPhase}`); }
            if (player?.suspended) { score = 0; reasons.unshift('Suspenso'); }
            score = phase2Clamp(Math.round(score));

            let recommendation = 'APTO';
            let statusClass = 'text-emerald-400 bg-emerald-500/10 border-emerald-500/30';
            let suggestedMinutes = 90;
            if (score === 0) { recommendation = player?.suspended ? 'SUSPENSO' : 'INDISPONÍVEL'; statusClass = 'text-red-400 bg-red-500/10 border-red-500/30'; suggestedMinutes = 0; }
            else if (score < 50) { recommendation = 'NÃO RECOMENDADO'; statusClass = 'text-red-400 bg-red-500/10 border-red-500/30'; suggestedMinutes = 20; }
            else if (score < 70) { recommendation = 'CONTROLE DE MINUTOS'; statusClass = 'text-orange-400 bg-orange-500/10 border-orange-500/30'; suggestedMinutes = inTransition ? 30 : 45; }
            else if (score < 85) { recommendation = 'APTO COM MONITORAMENTO'; statusClass = 'text-yellow-400 bg-yellow-500/10 border-yellow-500/30'; suggestedMinutes = 70; }

            return { acute, chronicTotal, acwr, readiness, attendancePct, minutes14, activeDm, rtpPhase, inTransition, score, reasons, recommendation, statusClass, suggestedMinutes, latestWellnessDate };
        };

        const MicrocycleSeasonView = ({ days, setDays, themeColor, players, trainingLog, library, macrocycle, setMacrocycle }) => {
            const [weekStart, setWeekStart] = useState(getIsoWeekInfo().monday);
            const weekInfo = useMemo(() => getIsoWeekInfo(weekStart), [weekStart]);
            const weekRecords = safeObj(macrocycle?.weeks);
            const savedWeek = safeObj(weekRecords[weekInfo.key]);
            const [draft, setDraft] = useState({});

            useEffect(() => {
                setDraft({
                    phase: savedWeek.phase || 'competition',
                    objective: savedWeek.objective || '',
                    plannedLoad: savedWeek.plannedLoad || calculatePlannedWeekLoad(days),
                    competition: savedWeek.competition || '',
                    opponent: savedWeek.opponent || '',
                    notes: savedWeek.notes || ''
                });
            }, [weekInfo.key]);

            const persistWeek = (includeSnapshot = false) => {
                const payload = {
                    ...savedWeek,
                    ...draft,
                    key: weekInfo.key,
                    startDate: weekInfo.monday,
                    updatedAt: new Date().toISOString(),
                    ...(includeSnapshot ? { microcycleSnapshot: JSON.parse(JSON.stringify(days)) } : {})
                };
                setMacrocycle({ ...safeObj(macrocycle), weeks: { ...weekRecords, [weekInfo.key]: payload } });
                showToast(includeSnapshot ? 'Microciclo capturado na temporada!' : 'Diretriz semanal salva!', '#10b981');
            };

            const applySnapshot = () => {
                if (!Array.isArray(savedWeek.microcycleSnapshot)) return showToast('Esta semana ainda não possui modelo salvo.', '#eab308');
                if (!confirm('Aplicar o modelo salvo e substituir o microciclo atual?')) return;
                setDays(JSON.parse(JSON.stringify(savedWeek.microcycleSnapshot)));
                showToast('Modelo semanal aplicado!', '#3b82f6');
            };

            const actualLoad = safeArray(days).reduce((sum, day, index) => {
                const date = new Date(`${weekInfo.monday}T12:00:00`);
                date.setDate(date.getDate() + index);
                const dateStr = date.toISOString().split('T')[0];
                const logs = Object.values(safeObj(trainingLog?.[dateStr]));
                const playerLogs = logs.filter(log => log && typeof log === 'object' && ('duration' in log || 'rpe_am' in log || 'rpe_pm' in log));
                if (!playerLogs.length) return sum;
                return sum + Math.round(playerLogs.reduce((acc, log) => acc + calcDailyLoad(log), 0) / playerLogs.length);
            }, 0);
            const plannedLoad = Number(draft.plannedLoad) || calculatePlannedWeekLoad(days);
            const adherence = plannedLoad > 0 ? Math.round((actualLoad / plannedLoad) * 100) : 0;

            return (
                <div className="h-full flex flex-col overflow-hidden bg-slate-900">
                    <div className="shrink-0 bg-slate-950 border-b border-slate-800 p-3 no-print">
                        <div className="grid grid-cols-1 xl:grid-cols-12 gap-3 items-end">
                            <div className="xl:col-span-2">
                                <label className="text-[9px] font-black text-slate-500 uppercase block mb-1">Semana integrada</label>
                                <input type="date" value={weekStart} onChange={event => setWeekStart(event.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs font-bold text-white outline-none" />
                            </div>
                            <div className="xl:col-span-2">
                                <label className="text-[9px] font-black text-slate-500 uppercase block mb-1">Fase da temporada</label>
                                <select value={draft.phase || 'competition'} onChange={event => setDraft({ ...draft, phase: event.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs font-bold text-white outline-none">
                                    {PHASE2_WEEK_PHASES.map(phase => <option key={phase.id} value={phase.id}>{phase.label}</option>)}
                                </select>
                            </div>
                            <div className="xl:col-span-3">
                                <label className="text-[9px] font-black text-slate-500 uppercase block mb-1">Objetivo central</label>
                                <input value={draft.objective || ''} onChange={event => setDraft({ ...draft, objective: event.target.value })} placeholder="Ex: controlar profundidade e acelerar transição" className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs font-bold text-white outline-none" />
                            </div>
                            <div className="xl:col-span-2">
                                <label className="text-[9px] font-black text-slate-500 uppercase block mb-1">Meta semanal (U.A.)</label>
                                <input type="number" value={draft.plannedLoad || ''} onChange={event => setDraft({ ...draft, plannedLoad: event.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs font-bold text-white outline-none" />
                            </div>
                            <div className="xl:col-span-3 flex gap-2">
                                <button onClick={() => persistWeek(false)} className="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg text-[10px] font-black uppercase">Salvar diretriz</button>
                                <button onClick={() => persistWeek(true)} className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-lg text-[10px] font-black uppercase">Capturar semana</button>
                                <button onClick={applySnapshot} className="px-3 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg text-[10px] font-black uppercase" title="Aplicar modelo salvo">Aplicar</button>
                            </div>
                        </div>
                        <div className="mt-2 flex flex-wrap gap-2 text-[9px] font-bold uppercase">
                            <span className="bg-slate-800 border border-slate-700 text-slate-300 px-2 py-1 rounded">{weekInfo.key}</span>
                            <span className="bg-blue-500/10 border border-blue-500/30 text-blue-400 px-2 py-1 rounded">Planejado: {plannedLoad} U.A.</span>
                            <span className="bg-orange-500/10 border border-orange-500/30 text-orange-400 px-2 py-1 rounded">Executado: {actualLoad} U.A.</span>
                            <span className={`${adherence >= 85 && adherence <= 115 ? 'text-emerald-400 border-emerald-500/30 bg-emerald-500/10' : 'text-yellow-400 border-yellow-500/30 bg-yellow-500/10'} border px-2 py-1 rounded`}>Aderência: {adherence || 0}%</span>
                            {savedWeek.microcycleSnapshot && <span className="bg-purple-500/10 border border-purple-500/30 text-purple-400 px-2 py-1 rounded">Modelo salvo</span>}
                        </div>
                    </div>
                    <div className="flex-1 min-h-0"><MicrocycleView days={days} setDays={setDays} themeColor={themeColor} players={players} trainingLog={trainingLog} library={library} /></div>
                </div>
            );
        };

        const SeasonPlannerPhase2 = ({ themeColor, macrocycle, setMacrocycle, user, days, setDays }) => {
            const [mode, setMode] = useState('annual');
            const currentInfo = getIsoWeekInfo();
            const [year, setYear] = useState(currentInfo.year);
            const [selectedWeek, setSelectedWeek] = useState(currentInfo.week);
            const weekKey = `${year}-W${String(selectedWeek).padStart(2, '0')}`;
            const weeks = safeObj(macrocycle?.weeks);
            const current = safeObj(weeks[weekKey]);
            const [draft, setDraft] = useState({});

            useEffect(() => {
                setDraft({
                    phase: current.phase || 'competition', objective: current.objective || '', plannedLoad: current.plannedLoad || '',
                    competition: current.competition || '', opponent: current.opponent || '', notes: current.notes || ''
                });
            }, [weekKey, macrocycle]);

            const save = (capture = false) => {
                const next = { ...current, ...draft, key: weekKey, updatedAt: new Date().toISOString(), ...(capture ? { microcycleSnapshot: JSON.parse(JSON.stringify(days)) } : {}) };
                setMacrocycle({ ...safeObj(macrocycle), weeks: { ...weeks, [weekKey]: next } });
                showToast(capture ? 'Semana e microciclo salvos!' : 'Semana atualizada!', '#10b981');
            };

            const apply = () => {
                if (!Array.isArray(current.microcycleSnapshot)) return showToast('Nenhum microciclo capturado nesta semana.', '#eab308');
                if (confirm('Substituir o microciclo atual pelo modelo desta semana?')) setDays(JSON.parse(JSON.stringify(current.microcycleSnapshot)));
            };

            const annualWeeks = Array.from({ length: 52 }, (_, index) => index + 1);
            const filled = annualWeeks.filter(week => weeks[`${year}-W${String(week).padStart(2, '0')}`]).length;
            const totalPlanned = annualWeeks.reduce((sum, week) => sum + (Number(weeks[`${year}-W${String(week).padStart(2, '0')}`]?.plannedLoad) || 0), 0);
            const phaseCounts = PHASE2_WEEK_PHASES.map(phase => ({ ...phase, count: annualWeeks.filter(week => weeks[`${year}-W${String(week).padStart(2, '0')}`]?.phase === phase.id).length }));

            return (
                <div className="h-full flex flex-col bg-slate-50 dark:bg-slate-900 overflow-hidden">
                    <div className="shrink-0 px-6 pt-5 flex flex-wrap justify-between gap-3 items-center">
                        <div><h2 className="text-2xl font-black uppercase dark:text-white" style={{color: themeColor}}>Temporada integrada</h2><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">52 semanas • carga • competição • modelos de microciclo</p></div>
                        <div className="flex bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl p-1 shadow-sm">
                            <button onClick={() => setMode('annual')} className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase ${mode === 'annual' ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>Plano 52 semanas</button>
                            <button onClick={() => setMode('classic')} className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase ${mode === 'classic' ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>Mapa clássico</button>
                        </div>
                    </div>
                    <div className="flex-1 min-h-0 overflow-y-auto p-6 custom-scroll">
                        {mode === 'classic' ? <MacrocycleView themeColor={themeColor} macrocycle={macrocycle} setMacrocycle={setMacrocycle} user={user} /> : (
                            <div className="grid grid-cols-1 xl:grid-cols-12 gap-5">
                                <div className="xl:col-span-8 space-y-5">
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                        <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl p-4"><div className="text-[9px] font-black uppercase text-slate-400">Semanas planejadas</div><div className="text-3xl font-black dark:text-white">{filled}<span className="text-sm text-slate-500">/52</span></div></div>
                                        <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl p-4"><div className="text-[9px] font-black uppercase text-slate-400">Carga anual prevista</div><div className="text-3xl font-black text-blue-500">{totalPlanned}</div></div>
                                        <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl p-4"><div className="text-[9px] font-black uppercase text-slate-400">Semana atual</div><div className="text-3xl font-black text-emerald-500">W{currentInfo.week}</div></div>
                                        <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl p-4"><div className="text-[9px] font-black uppercase text-slate-400">Modelos capturados</div><div className="text-3xl font-black text-purple-500">{annualWeeks.filter(week => weeks[`${year}-W${String(week).padStart(2, '0')}`]?.microcycleSnapshot).length}</div></div>
                                    </div>
                                    <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl p-5 shadow-sm">
                                        <div className="flex flex-wrap justify-between items-center gap-3 mb-4"><h3 className="font-black uppercase dark:text-white">Mapa anual {year}</h3><input type="number" min="2020" max="2100" value={year} onChange={event => setYear(Number(event.target.value) || currentInfo.year)} className="w-24 bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 rounded-lg p-2 text-xs font-black dark:text-white" /></div>
                                        <div className="grid grid-cols-4 sm:grid-cols-8 md:grid-cols-10 xl:grid-cols-12 gap-2">
                                            {annualWeeks.map(week => {
                                                const item = safeObj(weeks[`${year}-W${String(week).padStart(2, '0')}`]);
                                                const phase = PHASE2_WEEK_PHASES.find(value => value.id === item.phase);
                                                return <button key={week} onClick={() => setSelectedWeek(week)} title={item.objective || `Semana ${week}`} className={`h-12 rounded-lg border text-[10px] font-black transition-all ${selectedWeek === week ? 'ring-2 ring-blue-500 scale-105' : ''} ${phase ? `${phase.color} ${phase.border} text-white` : 'bg-slate-100 dark:bg-slate-700 border-slate-200 dark:border-slate-600 text-slate-500'}`}>W{week}<span className="block text-[7px] opacity-70">{item.plannedLoad || '-'}</span></button>;
                                            })}
                                        </div>
                                        <div className="flex flex-wrap gap-2 mt-4">{phaseCounts.map(phase => <span key={phase.id} className="text-[9px] font-bold uppercase text-slate-500 dark:text-slate-400"><i className={`inline-block w-2 h-2 rounded-full ${phase.color} mr-1`}></i>{phase.label}: {phase.count}</span>)}</div>
                                    </div>
                                </div>
                                <div className="xl:col-span-4">
                                    <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl p-5 shadow-xl sticky top-0">
                                        <h3 className="font-black uppercase dark:text-white mb-1">{weekKey}</h3><p className="text-[9px] text-slate-400 font-bold uppercase mb-5">Diretriz e modelo operacional</p>
                                        <div className="space-y-3">
                                            <div><label className="text-[9px] font-black uppercase text-slate-400">Fase</label><select value={draft.phase || 'competition'} onChange={event => setDraft({ ...draft, phase: event.target.value })} className="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 text-xs font-bold dark:text-white">{PHASE2_WEEK_PHASES.map(phase => <option key={phase.id} value={phase.id}>{phase.label}</option>)}</select></div>
                                            <div><label className="text-[9px] font-black uppercase text-slate-400">Objetivo central</label><input value={draft.objective || ''} onChange={event => setDraft({ ...draft, objective: event.target.value })} className="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 text-xs font-bold dark:text-white" placeholder="Objetivo técnico, tático e físico" /></div>
                                            <div className="grid grid-cols-2 gap-2"><div><label className="text-[9px] font-black uppercase text-slate-400">Meta U.A.</label><input type="number" value={draft.plannedLoad || ''} onChange={event => setDraft({ ...draft, plannedLoad: event.target.value })} className="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 text-xs font-bold dark:text-white" /></div><div><label className="text-[9px] font-black uppercase text-slate-400">Competição</label><input value={draft.competition || ''} onChange={event => setDraft({ ...draft, competition: event.target.value })} className="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 text-xs font-bold dark:text-white" /></div></div>
                                            <div><label className="text-[9px] font-black uppercase text-slate-400">Adversário / evento</label><input value={draft.opponent || ''} onChange={event => setDraft({ ...draft, opponent: event.target.value })} className="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 text-xs font-bold dark:text-white" /></div>
                                            <div><label className="text-[9px] font-black uppercase text-slate-400">Notas da comissão</label><textarea value={draft.notes || ''} onChange={event => setDraft({ ...draft, notes: event.target.value })} className="w-full h-24 p-3 rounded-xl bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 text-xs font-bold dark:text-white custom-scroll" /></div>
                                            <button onClick={() => save(false)} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl uppercase text-xs">Salvar semana</button>
                                            <div className="grid grid-cols-2 gap-2"><button onClick={() => save(true)} className="bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3 rounded-xl uppercase text-[10px]">Capturar microciclo</button><button onClick={apply} className="bg-purple-600 hover:bg-purple-500 text-white font-black py-3 rounded-xl uppercase text-[10px]">Aplicar modelo</button></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ReadinessSelectionView = ({ players, setPlayers, trainingLog, dmRecords, attendanceLog, matchMinutes, nextGame, setNextGame, selectionPlans, setSelectionPlans, themeColor }) => {
            const [matchDate, setMatchDate] = useState(nextGame?.date || getTodayStr());
            const [search, setSearch] = useState('');
            const [positionFilter, setPositionFilter] = useState('TODOS');
            const [sortBy, setSortBy] = useState('score');
            const plan = safeObj(selectionPlans?.[matchDate]);
            const entries = safeObj(plan.players);

            useEffect(() => {
                if (nextGame?.date && nextGame.date !== matchDate) setMatchDate(nextGame.date);
            }, [nextGame?.date]);

            const rows = useMemo(() => safeArray(players).map((player, playerIndex) => {
                const metrics = getPhase2PlayerMetrics({ player, playerIndex, referenceDate: matchDate, trainingLog, dmRecords, attendanceLog, matchMinutes });
                const entry = safeObj(entries[player.id]);
                return { player, playerIndex, positionGroup: getPhase2PositionGroup(player), ...metrics, selected: entry.selected !== undefined ? !!entry.selected : !!(player.highlight || player.convocado), entry };
            }), [players, matchDate, trainingLog, dmRecords, attendanceLog, matchMinutes, selectionPlans]);

            const visible = rows.filter(row => {
                const matchesSearch = String(row.player?.name || '').toLowerCase().includes(search.toLowerCase());
                return matchesSearch && (positionFilter === 'TODOS' || row.positionGroup === positionFilter);
            }).sort((a, b) => sortBy === 'name' ? String(a.player.name).localeCompare(String(b.player.name)) : sortBy === 'position' ? a.positionGroup.localeCompare(b.positionGroup) : b.score - a.score);

            const updateEntry = (row, patch) => {
                const nextEntry = { selected: row.selected, minuteLimit: row.entry.minuteLimit ?? row.suggestedMinutes, role: row.entry.role || 'Banco', note: row.entry.note || '', ...patch };
                setSelectionPlans({ ...safeObj(selectionPlans), [matchDate]: { ...plan, date: matchDate, opponent: nextGame?.opponent || plan.opponent || '', updatedAt: new Date().toISOString(), players: { ...entries, [row.player.id]: nextEntry } } });
                if ('selected' in patch) {
                    const nextPlayers = safeArray(players).map((player, index) => index === row.playerIndex ? { ...player, highlight: !!patch.selected, convocado: !!patch.selected, selectionLimit: nextEntry.minuteLimit, selectionRole: nextEntry.role, selectionNote: nextEntry.note } : player);
                    setPlayers(nextPlayers);
                }
            };

            const applyAutoSelection = () => {
                const eligible = rows.filter(row => row.score >= 50 && row.recommendation !== 'INDISPONÍVEL' && row.recommendation !== 'SUSPENSO').sort((a, b) => b.score - a.score).slice(0, 23);
                const selectedIds = new Set(eligible.map(row => row.player.id));
                const nextEntries = { ...entries };
                rows.forEach(row => { nextEntries[row.player.id] = { ...safeObj(nextEntries[row.player.id]), selected: selectedIds.has(row.player.id), minuteLimit: safeObj(nextEntries[row.player.id]).minuteLimit ?? row.suggestedMinutes, role: safeObj(nextEntries[row.player.id]).role || (selectedIds.has(row.player.id) ? 'Banco' : 'Fora'), note: safeObj(nextEntries[row.player.id]).note || '' }; });
                setSelectionPlans({ ...safeObj(selectionPlans), [matchDate]: { ...plan, date: matchDate, opponent: nextGame?.opponent || '', updatedAt: new Date().toISOString(), players: nextEntries } });
                setPlayers(safeArray(players).map(player => ({ ...player, highlight: selectedIds.has(player.id), convocado: selectedIds.has(player.id), selectionLimit: nextEntries[player.id]?.minuteLimit, selectionRole: nextEntries[player.id]?.role, selectionNote: nextEntries[player.id]?.note })));
                showToast(`${eligible.length} atletas sugeridos pela matriz. Revise antes de publicar.`, '#3b82f6');
            };

            const selectedRows = rows.filter(row => row.selected);
            const publish = () => {
                setNextGame({ ...safeObj(nextGame), date: matchDate, opponent: nextGame?.opponent || plan.opponent || '', presentation: `${selectedRows.length} atletas relacionados`, selectionPublishedAt: new Date().toISOString() });
                const nextPlayers = safeArray(players).map((player, index) => {
                    const row = rows[index]; const entry = safeObj(entries[player.id]);
                    return { ...player, highlight: !!row?.selected, convocado: !!row?.selected, selectionLimit: entry.minuteLimit ?? row?.suggestedMinutes, selectionRole: entry.role || 'Banco', selectionNote: entry.note || '' };
                });
                setPlayers(nextPlayers);
                showToast('Convocação publicada no Portal do Atleta!', '#10b981');
            };

            const copyList = () => {
                const text = `🏆 *CONVOCAÇÃO PROCOACH*\n📅 ${formatDateBR(matchDate)}${nextGame?.opponent ? ` | vs ${nextGame.opponent}` : ''}\n\n${selectedRows.map(row => `• ${row.player.name} | ${row.entry.role || 'Banco'} | limite ${row.entry.minuteLimit ?? row.suggestedMinutes} min`).join('\n') || 'Nenhum atleta selecionado.'}`;
                navigator.clipboard?.writeText(text).then(() => showToast('Lista copiada para o WhatsApp!', '#10b981')).catch(() => alert(text));
            };

            return (
                <div className="h-full overflow-y-auto p-6 bg-slate-50 dark:bg-slate-900 custom-scroll pb-32">
                    <div className="flex flex-col xl:flex-row justify-between gap-4 mb-5">
                        <div><h2 className="text-2xl font-black uppercase dark:text-white" style={{color: themeColor}}>Matriz de prontidão e convocação</h2><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Wellness + carga + frequência + minutos + DM/RTP</p></div>
                        <div className="flex flex-wrap gap-2 items-end">
                            <div><label className="text-[9px] font-black uppercase text-slate-400 block">Data do jogo</label><input type="date" value={matchDate} onChange={event => setMatchDate(event.target.value)} className="p-2 rounded-lg border dark:border-slate-600 bg-white dark:bg-slate-800 dark:text-white text-xs font-bold" /></div>
                            <div><label className="text-[9px] font-black uppercase text-slate-400 block">Adversário</label><input value={nextGame?.opponent || ''} onChange={event => setNextGame({ ...safeObj(nextGame), opponent: event.target.value, date: matchDate })} placeholder="Adversário" className="p-2 rounded-lg border dark:border-slate-600 bg-white dark:bg-slate-800 dark:text-white text-xs font-bold" /></div>
                            <button onClick={applyAutoSelection} className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">Sugerir 23</button>
                            <button onClick={copyList} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">Copiar lista</button>
                            <button onClick={publish} className="bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">Publicar no app</button>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-5">
                        <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl p-4"><div className="text-[9px] uppercase font-black text-slate-400">Relacionados</div><div className="text-3xl font-black text-blue-500">{selectedRows.length}</div></div>
                        <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl p-4"><div className="text-[9px] uppercase font-black text-slate-400">Aptos ≥ 70</div><div className="text-3xl font-black text-emerald-500">{rows.filter(row => row.score >= 70).length}</div></div>
                        <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl p-4"><div className="text-[9px] uppercase font-black text-slate-400">Controle</div><div className="text-3xl font-black text-orange-500">{rows.filter(row => row.score > 0 && row.score < 70).length}</div></div>
                        <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl p-4"><div className="text-[9px] uppercase font-black text-slate-400">Indisponíveis</div><div className="text-3xl font-black text-red-500">{rows.filter(row => row.score === 0).length}</div></div>
                        <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl p-4"><div className="text-[9px] uppercase font-black text-slate-400">Prontidão média</div><div className="text-3xl font-black dark:text-white">{rows.length ? Math.round(rows.reduce((sum, row) => sum + row.score, 0) / rows.length) : 0}%</div></div>
                    </div>
                    <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl p-4 mb-4 flex flex-wrap gap-2">
                        <input value={search} onChange={event => setSearch(event.target.value)} placeholder="Buscar atleta..." className="flex-1 min-w-[180px] p-2 rounded-lg bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 text-xs font-bold dark:text-white" />
                        <select value={positionFilter} onChange={event => setPositionFilter(event.target.value)} className="p-2 rounded-lg bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 text-xs font-bold dark:text-white"><option value="TODOS">Todas posições</option><option value="GOL">Goleiros</option><option value="DEF">Defensores</option><option value="MEI">Meio-campistas</option><option value="ATA">Atacantes</option><option value="OUT">Outros</option></select>
                        <select value={sortBy} onChange={event => setSortBy(event.target.value)} className="p-2 rounded-lg bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 text-xs font-bold dark:text-white"><option value="score">Maior prontidão</option><option value="name">Nome</option><option value="position">Posição</option></select>
                    </div>
                    <div className="space-y-2">
                        {visible.map(row => {
                            const minuteLimit = row.entry.minuteLimit ?? row.suggestedMinutes;
                            return <div key={row.player.id} className={`grid grid-cols-1 xl:grid-cols-12 gap-3 items-center bg-white dark:bg-slate-800 border-2 rounded-2xl p-3 ${row.selected ? 'border-blue-500 shadow-lg' : 'border-slate-200 dark:border-slate-700'}`}>
                                <div className="xl:col-span-3 flex items-center gap-3"><button onClick={() => updateEntry(row, { selected: !row.selected })} className={`w-10 h-10 rounded-xl border flex items-center justify-center font-black ${row.selected ? 'bg-blue-600 border-blue-600 text-white' : 'bg-slate-100 dark:bg-slate-700 border-slate-300 dark:border-slate-600 text-slate-400'}`}>{row.selected ? '✓' : '+'}</button><div className="w-11 h-11 rounded-full overflow-hidden bg-slate-200">{row.player.image ? <img src={row.player.image} className="w-full h-full object-cover object-top"/> : <Icon name="user" className="m-3 text-slate-400"/>}</div><div><div className="font-black uppercase text-sm dark:text-white">{row.player.name}</div><div className="text-[9px] font-bold text-slate-400">{row.positionGroup} • {row.player.position || row.player.pos || 'Atleta'}</div></div></div>
                                <div className="xl:col-span-1 text-center"><div className={`text-3xl font-black ${row.score >= 70 ? 'text-emerald-500' : row.score >= 50 ? 'text-orange-500' : 'text-red-500'}`}>{row.score}</div><div className="text-[8px] uppercase font-bold text-slate-400">Prontidão</div></div>
                                <div className="xl:col-span-3 grid grid-cols-4 gap-1 text-center"><div><div className="font-black text-xs dark:text-white">{row.readiness}%</div><div className="text-[7px] uppercase text-slate-400">Wellness</div></div><div><div className="font-black text-xs dark:text-white">{row.acwr ? row.acwr.toFixed(2) : '-'}</div><div className="text-[7px] uppercase text-slate-400">ACWR</div></div><div><div className="font-black text-xs dark:text-white">{row.attendancePct}%</div><div className="text-[7px] uppercase text-slate-400">Freq.</div></div><div><div className="font-black text-xs dark:text-white">{row.minutes14}</div><div className="text-[7px] uppercase text-slate-400">Min 14d</div></div></div>
                                <div className="xl:col-span-2"><span className={`inline-block border rounded-lg px-2 py-1 text-[9px] font-black uppercase ${row.statusClass}`}>{row.recommendation}</span><div className="text-[8px] text-slate-400 mt-1 truncate" title={row.reasons.join(' • ')}>{row.reasons.join(' • ') || 'Sem alertas relevantes'}</div></div>
                                <div className="xl:col-span-3 grid grid-cols-3 gap-2"><select value={row.entry.role || 'Banco'} onChange={event => updateEntry(row, { role: event.target.value })} className="bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 rounded-lg p-2 text-[9px] font-bold dark:text-white"><option>Titular</option><option>Banco</option><option>Fora</option></select><input type="number" min="0" max="120" value={minuteLimit} onChange={event => updateEntry(row, { minuteLimit: Number(event.target.value) || 0 })} title="Limite de minutos" className="bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 rounded-lg p-2 text-[9px] font-bold dark:text-white text-center"/><input value={row.entry.note || ''} onChange={event => updateEntry(row, { note: event.target.value })} placeholder="Observação" className="bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 rounded-lg p-2 text-[9px] font-bold dark:text-white" /></div>
                            </div>;
                        })}
                    </div>
                </div>
            );
        };

        const RTP_PHASE2_CRITERIA = {
            1: ['Dor controlada', 'Edema estabilizado', 'Diagnóstico registrado'],
            2: ['ADM funcional mínima', 'Atividades de vida diária sem piora', 'Plano terapêutico definido'],
            3: ['Cardio sem impacto tolerado', 'Força de segmentos não envolvidos', 'Sem reação 24h'],
            4: ['Corrida linear tolerada', 'Pliometria introdutória', 'Força com restrição segura'],
            5: ['Mudança de direção controlada', 'Força funcional sem restrição', 'Carga de campo tolerada'],
            6: ['Potência sem dor', 'Aceleração sem restrição', 'Testes funcionais aprovados'],
            7: ['Treino parcial com grupo', 'Gestos específicos aprovados', 'Confiança do atleta adequada'],
            8: ['Treino completo com grupo', 'Minutagem controlada tolerada', 'Sem reação em 24-48h'],
            9: ['Liberação médica', 'Liberação fisioterapia', 'Liberação preparação física']
        };

        const MedicalRtpSuiteView = (props) => {
            const [mode, setMode] = useState('advanced');
            return <div className="h-full flex flex-col overflow-hidden bg-slate-50 dark:bg-slate-900">
                <div className="shrink-0 px-6 pt-4"><div className="inline-flex bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl p-1 shadow-sm"><button onClick={() => setMode('advanced')} className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase ${mode === 'advanced' ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>RTP avançado</button><button onClick={() => setMode('classic')} className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase ${mode === 'classic' ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>Operação DM</button></div></div>
                <div className="flex-1 min-h-0">{mode === 'classic' ? <MedicalView {...props} /> : <RtpAdvancedBoard {...props} />}</div>
            </div>;
        };

        const RtpAdvancedBoard = ({ players, setPlayers, dmRecords, setDmRecords, themeColor }) => {
            const activeRecords = safeArray(dmRecords).filter(record => record && record.status === 'Active');
            const [selectedId, setSelectedId] = useState(activeRecords[0]?.id || null);
            const [sessionNote, setSessionNote] = useState('');
            const [sessionLoad, setSessionLoad] = useState('');
            useEffect(() => { if (!activeRecords.some(record => record.id === selectedId)) setSelectedId(activeRecords[0]?.id || null); }, [dmRecords]);
            const record = activeRecords.find(item => item.id === selectedId);
            const player = record ? players[record.playerId] : null;
            const phase = Number(record?.rtpPhase) || 1;
            const criteria = RTP_PHASE2_CRITERIA[phase] || [];
            const checked = safeObj(record?.rtpCriteria);
            const completedCriteria = criteria.filter(item => checked[`${phase}:${item}`]).length;
            const update = (patch) => setDmRecords(safeArray(dmRecords).map(item => item.id === selectedId ? { ...item, ...patch, updatedAt: new Date().toISOString() } : item));
            const toggleCriterion = (criterion) => update({ rtpCriteria: { ...checked, [`${phase}:${criterion}`]: !checked[`${phase}:${criterion}`] } });
            const advance = () => {
                if (completedCriteria !== criteria.length) return showToast('Conclua todos os critérios da fase antes de avançar.', '#eab308');
                const nextPhase = Math.min(9, phase + 1);
                update({ rtpPhase: nextPhase, phaseHistory: [...safeArray(record.phaseHistory), { from: phase, to: nextPhase, date: getTodayStr(), timestamp: new Date().toISOString() }] });
                showToast(`Atleta avançou para a Fase ${nextPhase}!`, '#10b981');
            };
            const addSession = () => {
                if (!sessionNote.trim()) return;
                update({ rtpSessions: [{ id: Date.now(), date: getTodayStr(), note: sessionNote.trim(), load: Number(sessionLoad) || 0 }, ...safeArray(record.rtpSessions)] });
                setSessionNote(''); setSessionLoad(''); showToast('Sessão de RTP registrada!', '#10b981');
            };
            const daysOut = record?.dateIn ? Math.max(0, Math.ceil((new Date(`${getTodayStr()}T12:00:00`) - new Date(`${record.dateIn}T12:00:00`)) / 86400000)) : 0;
            const expectedDays = record?.expectedReturn ? Math.ceil((new Date(`${record.expectedReturn}T12:00:00`) - new Date(`${getTodayStr()}T12:00:00`)) / 86400000) : null;

            return <div className="h-full overflow-y-auto p-6 custom-scroll pb-32">
                <div className="mb-5"><h2 className="text-2xl font-black uppercase dark:text-white" style={{color: themeColor}}>Return to Play avançado</h2><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Critérios, restrições, sessões e governança multidisciplinar</p></div>
                {!activeRecords.length ? <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl p-12 text-center text-slate-400 font-bold">Nenhum atleta ativo no DM. Cadastre uma entrada na aba “Operação DM”.</div> : <div className="grid grid-cols-1 xl:grid-cols-12 gap-5">
                    <div className="xl:col-span-3 space-y-2">{activeRecords.map(item => { const itemPlayer = players[item.playerId]; return <button key={item.id} onClick={() => setSelectedId(item.id)} className={`w-full text-left p-3 rounded-xl border-2 flex items-center gap-3 ${selectedId === item.id ? 'border-blue-500 bg-blue-500/10' : 'border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800'}`}><div className="w-10 h-10 rounded-full overflow-hidden bg-slate-200">{itemPlayer?.image ? <img src={itemPlayer.image} className="w-full h-full object-cover object-top"/> : <Icon name="user" className="m-2 text-slate-400"/>}</div><div><div className="font-black text-xs uppercase dark:text-white">{itemPlayer?.name || 'Atleta'}</div><div className="text-[9px] text-slate-400">Fase {item.rtpPhase || 1} • {item.location}</div></div></button>; })}</div>
                    <div className="xl:col-span-9 space-y-5">
                        <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl p-5 shadow-sm">
                            <div className="flex flex-col md:flex-row justify-between gap-4 mb-5"><div className="flex items-center gap-4"><div className="w-16 h-16 rounded-full overflow-hidden bg-slate-200">{player?.image ? <img src={player.image} className="w-full h-full object-cover object-top"/> : <Icon name="user" className="m-4 text-slate-400"/>}</div><div><h3 className="text-xl font-black uppercase dark:text-white">{player?.name}</h3><div className="text-xs font-bold text-red-500">{record?.location}</div></div></div><div className="grid grid-cols-3 gap-2 text-center"><div className="bg-slate-100 dark:bg-slate-700 rounded-xl p-3"><div className="text-2xl font-black dark:text-white">{daysOut}</div><div className="text-[8px] uppercase text-slate-400">Dias afastado</div></div><div className="bg-blue-500/10 border border-blue-500/30 rounded-xl p-3"><div className="text-2xl font-black text-blue-500">{phase}/9</div><div className="text-[8px] uppercase text-slate-400">Fase RTP</div></div><div className="bg-slate-100 dark:bg-slate-700 rounded-xl p-3"><div className={`text-2xl font-black ${expectedDays !== null && expectedDays < 0 ? 'text-red-500' : 'text-emerald-500'}`}>{expectedDays === null ? '-' : expectedDays}</div><div className="text-[8px] uppercase text-slate-400">Dias previstos</div></div></div></div>
                            <div className="w-full h-3 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden"><div className="h-full bg-blue-600 transition-all" style={{width: `${(phase / 9) * 100}%`}}></div></div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl p-5"><h4 className="font-black uppercase text-sm dark:text-white mb-4">Dados clínicos e operacionais</h4><div className="grid grid-cols-2 gap-3">

                </div><button onClick={saveEditing} className="w-full mt-5 bg-blue-600 text-white font-black py-4 rounded-xl uppercase">Salvar ficha profissional</button></div></div>}
                <div className="flex flex-col xl:flex-row justify-between gap-4 mb-5"><div><h2 className="text-2xl font-black uppercase dark:text-white" style={{color: themeColor}}>Biblioteca profissional</h2><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Pesquisa • metadados • progressões • histórico de uso</p></div><div className="grid grid-cols-3 gap-2"><div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl px-4 py-2 text-center"><div className="text-xl font-black dark:text-white">{library.length}</div><div className="text-[7px] uppercase text-slate-400">Atividades</div></div><div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl px-4 py-2 text-center"><div className="text-xl font-black text-yellow-500">{library.filter(item => item.favorite).length}</div><div className="text-[7px] uppercase text-slate-400">Favoritas</div></div><div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl px-4 py-2 text-center"><div className="text-xl font-black text-emerald-500">{totalUses}</div><div className="text-[7px] uppercase text-slate-400">Usos</div></div></div></div>
                <div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl p-4 mb-5 grid grid-cols-1 md:grid-cols-5 gap-2"><input value={search} onChange={event => setSearch(event.target.value)} placeholder="Buscar título, objetivo ou tag..." className="md:col-span-2 p-3 rounded-xl bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 text-xs font-bold dark:text-white"/><select value={category} onChange={event => setCategory(event.target.value)} className="p-3 rounded-xl bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 text-xs font-bold dark:text-white">{categories.map(item => <option key={item}>{item}</option>)}</select><select value={phase} onChange={event => setPhase(event.target.value)} className="p-3 rounded-xl bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 text-xs font-bold dark:text-white">{phases.map(item => <option key={item}>{item}</option>)}</select><div className="flex gap-2"><select value={difficulty} onChange={event => setDifficulty(event.target.value)} className="flex-1 p-3 rounded-xl bg-slate-100 dark:bg-slate-700 border dark:border-slate-600 text-xs font-bold dark:text-white"><option>Todas</option><option>Iniciante</option><option>Intermediário</option><option>Avançado</option></select><button onClick={() => setFavoritesOnly(!favoritesOnly)} className={`px-4 rounded-xl border font-black ${favoritesOnly ? 'bg-yellow-500 border-yellow-500 text-white' : 'bg-slate-100 dark:bg-slate-700 border-slate-200 dark:border-slate-600 text-slate-400'}`}>★</button></div></div>
                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">{filtered.map(item => <div key={item.id} className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl p-4 shadow-sm flex flex-col"><div className="flex justify-between gap-3"><div><div className="text-[8px] font-black uppercase text-blue-500">{item.category || 'Sem categoria'} • {item.phase || 'GERAL'}</div><h3 className="font-black uppercase dark:text-white mt-1">{item.title}</h3></div><button onClick={() => updateItem(item.id,{favorite:!item.favorite})} className={`text-2xl ${item.favorite ? 'text-yellow-500' : 'text-slate-300 dark:text-slate-600'}`}>★</button></div><p className="text-xs text-slate-500 dark:text-slate-400 mt-3 line-clamp-3 min-h-[48px]">{item.objective || item.tacticalNotes || 'Objetivo ainda não preenchido.'}</p><div className="grid grid-cols-4 gap-1 my-4 text-center"><div className="bg-slate-100 dark:bg-slate-700 rounded-lg p-2"><div className="font-black text-xs dark:text-white">{item.duration || '-'}</div><div className="text-[7px] text-slate-400">MIN</div></div><div className="bg-slate-100 dark:bg-slate-700 rounded-lg p-2"><div className="font-black text-xs dark:text-white">{item.pse || '-'}</div><div className="text-[7px] text-slate-400">PSE</div></div><div className="bg-slate-100 dark:bg-slate-700 rounded-lg p-2"><div className="font-black text-xs dark:text-white">{item.minPlayers || '-'}–{item.maxPlayers || '-'}</div><div className="text-[7px] text-slate-400">ATLETAS</div></div><div className="bg-slate-100 dark:bg-slate-700 rounded-lg p-2"><div className="font-black text-xs text-emerald-500">{item.usageCount || 0}</div><div className="text-[7px] text-slate-400">USOS</div></div></div><div className="flex flex-wrap gap-1 mb-4">{safeArray(item.tags).slice(0,5).map(tag => <span key={tag} className="text-[8px] font-bold bg-blue-500/10 text-blue-500 border border-blue-500/20 px-2 py-1 rounded-full">#{tag}</span>)}</div><div className="mt-auto grid grid-cols-2 gap-2"><button onClick={() => setEditing({ ...item })} className="bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg text-[9px] font-black uppercase">Editar ficha</button><button onClick={() => markUsed(item)} className="bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-lg text-[9px] font-black uppercase">Registrar uso</button></div></div>)}</div>{!filtered.length && <div className="text-center text-slate-400 font-bold py-20">Nenhuma atividade corresponde aos filtros.</div>}
            </div>;
        };


        // ================================================================
        // PROCOACH FASE 3 — ENTERPRISE, GOVERNANÇA E INTELIGÊNCIA DE CLUBE
        // ================================================================

        const phase4DateDays = (date) => {
            if (!date) return null;
            const end = new Date(`${date}T12:00:00`); const now = new Date(); now.setHours(12,0,0,0);
            return Math.ceil((end-now)/86400000);
        };
        const phase4ContractMeta = (player) => {
            const days = phase4DateDays(player?.contractEnd);
            if (days === null) return {days:null,label:'Sem data',tone:'text-slate-500 bg-slate-100 dark:bg-slate-700'};
            if (days < 0) return {days,label:`Vencido há ${Math.abs(days)}d`,tone:'text-red-700 bg-red-100 dark:bg-red-900/30'};
            if (days <= 30) return {days,label:`Crítico • ${days}d`,tone:'text-red-700 bg-red-100 dark:bg-red-900/30'};
            if (days <= 90) return {days,label:`Atenção • ${days}d`,tone:'text-orange-700 bg-orange-100 dark:bg-orange-900/30'};
            if (days <= 180) return {days,label:`Planejar • ${days}d`,tone:'text-yellow-700 bg-yellow-100 dark:bg-yellow-900/30'};
            return {days,label:`Regular • ${days}d`,tone:'text-emerald-700 bg-emerald-100 dark:bg-emerald-900/30'};
        };

        const ContractsView = ({players,setPlayers,themeColor}) => {
            const [search,setSearch]=useState(''); const [status,setStatus]=useState('Todos'); const [windowDays,setWindowDays]=useState('Todos');
            const ps=safeArray(players); const update=(id,field,value)=>setPlayers(ps.map(p=>p.id===id?{...p,[field]:value}:p));
            const filtered=ps.filter(p=>{const m=phase4ContractMeta(p);const text=`${p.name||''} ${p.position||''} ${p.contractType||''}`.toLowerCase(); if(search&&!text.includes(search.toLowerCase()))return false;if(status!=='Todos'&&(p.contractStatus||'Ativo')!==status)return false;if(windowDays!=='Todos'&&(m.days===null||m.days>Number(windowDays)))return false;return true;}).sort((a,b)=>(phase4ContractMeta(a).days??99999)-(phase4ContractMeta(b).days??99999));
            const counts={critical:ps.filter(p=>{const d=phase4ContractMeta(p).days;return d!==null&&d<=30}).length,attention:ps.filter(p=>{const d=phase4ContractMeta(p).days;return d!==null&&d>30&&d<=90}).length,missing:ps.filter(p=>!p.contractEnd).length};
            return <div className="h-full overflow-y-auto p-4 md:p-6 bg-slate-50 dark:bg-slate-900 custom-scroll pb-32"><div className="max-w-7xl mx-auto">
                <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-5"><div><div className="text-[9px] font-black uppercase tracking-[.2em] text-indigo-500">Gestão patrimonial esportiva</div><h2 className="text-2xl font-black uppercase dark:text-white">Contratos do elenco</h2><p className="text-xs text-slate-500">Controle de vencimentos, renovação, empréstimos e responsáveis.</p></div><button onClick={()=>window.print()} className="no-print px-4 py-3 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase">Imprimir relação</button></div>
                <div className="grid grid-cols-3 gap-3 mb-5">{[['Críticos até 30d',counts.critical,'text-red-500'],['Atenção até 90d',counts.attention,'text-orange-500'],['Sem vencimento',counts.missing,'text-slate-500']].map(([l,v,c])=><div key={l} className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl p-4"><div className="text-[8px] uppercase font-black text-slate-400">{l}</div><div className={`text-3xl font-black ${c}`}>{v}</div></div>)}</div>
                <div className="no-print bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl p-4 mb-4 grid grid-cols-1 md:grid-cols-3 gap-2"><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar atleta, posição ou vínculo..." className="p-3 rounded-xl border dark:border-slate-600 dark:bg-slate-700 dark:text-white text-xs"/><select value={status} onChange={e=>setStatus(e.target.value)} className="p-3 rounded-xl border dark:border-slate-600 dark:bg-slate-700 dark:text-white text-xs"><option>Todos</option><option>Ativo</option><option>Em renovação</option><option>Empréstimo</option><option>Vencido</option><option>Rescindido</option></select><select value={windowDays} onChange={e=>setWindowDays(e.target.value)} className="p-3 rounded-xl border dark:border-slate-600 dark:bg-slate-700 dark:text-white text-xs"><option>Todos</option><option value="30">Até 30 dias</option><option value="60">Até 60 dias</option><option value="90">Até 90 dias</option><option value="180">Até 180 dias</option></select></div>
                <div className="print-document bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl overflow-auto"><div className="print-only mb-4"><h1 className="text-2xl font-black">RELAÇÃO CONTRATUAL</h1><p>Emitido em {new Date().toLocaleString('pt-BR')}</p></div><table className="w-full text-xs min-w-[1100px] phase4-table"><thead className="bg-slate-100 dark:bg-slate-700 text-slate-500"><tr><th className="p-3 text-left">Atleta</th><th>Posição</th><th>Vínculo</th><th>Início</th><th>Término</th><th>Status</th><th>Renovação</th><th>Negociação</th><th>Responsável</th><th>Situação</th></tr></thead><tbody>{filtered.map(p=>{const m=phase4ContractMeta(p);return <tr key={p.id} className="border-t dark:border-slate-700"><td className="p-3 font-black dark:text-white">{p.name}</td><td><select value={p.position||''} onChange={e=>update(p.id,'position',e.target.value)} className="no-print bg-transparent text-xs"><option value="">-</option>{['Goleiro','Zagueiro','Lateral','Volante','Meia','Ponta','Atacante'].map(x=><option key={x}>{x}</option>)}</select><span className="print-only">{p.position||'-'}</span></td><td><select value={p.contractType||'Profissional'} onChange={e=>update(p.id,'contractType',e.target.value)} className="no-print p-1 rounded dark:bg-slate-700"><option>Profissional</option><option>Formação</option><option>Empréstimo</option><option>Experiência</option><option>Amador</option><option>Outro</option></select><span className="print-only">{p.contractType||'Profissional'}</span></td><td><input type="date" value={p.contractStart||''} onChange={e=>update(p.id,'contractStart',e.target.value)} className="no-print p-1 rounded dark:bg-slate-700"/><span className="print-only">{p.contractStart?formatDateBR(p.contractStart):'-'}</span></td><td><input type="date" value={p.contractEnd||''} onChange={e=>update(p.id,'contractEnd',e.target.value)} className="no-print p-1 rounded dark:bg-slate-700"/><span className="print-only">{p.contractEnd?formatDateBR(p.contractEnd):'-'}</span></td><td><select value={p.contractStatus||'Ativo'} onChange={e=>update(p.id,'contractStatus',e.target.value)} className="no-print p-1 rounded dark:bg-slate-700"><option>Ativo</option><option>Em renovação</option><option>Empréstimo</option><option>Vencido</option><option>Rescindido</option></select><span className="print-only">{p.contractStatus||'Ativo'}</span></td><td><select value={p.renewalOption||'Não informado'} onChange={e=>update(p.id,'renewalOption',e.target.value)} className="no-print p-1 rounded dark:bg-slate-700"><option>Não informado</option><option>Sim</option><option>Não</option><option>Automática</option><option>Por metas</option></select><span className="print-only">{p.renewalOption||'-'}</span></td><td><input type="date" value={p.negotiationStart||''} onChange={e=>update(p.id,'negotiationStart',e.target.value)} className="no-print p-1 rounded dark:bg-slate-700"/><span className="print-only">{p.negotiationStart?formatDateBR(p.negotiationStart):'-'}</span></td><td><input value={p.agentName||''} onChange={e=>update(p.id,'agentName',e.target.value)} className="no-print w-28 p-1 rounded dark:bg-slate-700"/><span className="print-only">{p.agentName||'-'}</span></td><td><span className={`px-2 py-1 rounded-full text-[8px] font-black uppercase ${m.tone}`}>{m.label}</span></td></tr>})}</tbody></table></div>
            </div></div>;
        };

        const AlertsCenterView = ({user,workspaceId,players,trainingLog,dmRecords,attendanceLog,athleteRequests,setAthleteRequests,resolvedAlerts,setResolvedAlerts,notificationCenter,setNotificationCenter,onNavigate,careAppointments,teamCommitments,commitmentResponses}) => {
            const [filter,setFilter]=useState('Todos'); const [title,setTitle]=useState(''); const [message,setMessage]=useState(''); const [target,setTarget]=useState('all'); const [pushBusy,setPushBusy]=useState(false); const ps=safeArray(players); const today=getTodayStr(); const alerts=[];
            ps.forEach((p,i)=>{if(!p)return;const w=safeObj(trainingLog?.[today]?.[i]?.wellness);if(!w.sleep)alerts.push({id:`wellness_${p.id}_${today}`,level:'Atenção',type:'Pendência',title:`${p.name} sem wellness`,detail:'A prontidão ainda não foi respondida.',tab:'wellness'});if(Number(w.soreness)>=6)alerts.push({id:`pain_${p.id}_${today}`,level:Number(w.soreness)>=7?'Crítico':'Atenção',type:'Saúde',title:`Dor elevada: ${p.name}`,detail:`Dor muscular ${w.soreness}/7`,tab:'wellness'});if(Number(w.fatigue)>=6)alerts.push({id:`fatigue_${p.id}_${today}`,level:'Atenção',type:'Carga',title:`Fadiga alta: ${p.name}`,detail:`Fadiga ${w.fatigue}/7`,tab:'wellness'});const cm=phase4ContractMeta(p);if(cm.days!==null&&cm.days<=90)alerts.push({id:`contract_${p.id}_${p.contractEnd}`,level:cm.days<=30?'Crítico':'Atenção',type:'Contrato',title:`Contrato: ${p.name}`,detail:cm.label,tab:'contracts'});});
            safeArray(dmRecords).filter(r=>r?.status==='Active').forEach(r=>{const p=ps.find((x,i)=>x.id===r.playerUid||i===Number(r.playerId));alerts.push({id:`dm_${r.id}`,level:'Atenção',type:'DM/RTP',title:p?.name||'Atleta no DM',detail:`${r.location||r.type||'Lesão'} • RTP ${r.rtpPhase||1}/9`,tab:'dm'})});
            Object.entries(safeObj(athleteRequests)).forEach(([pid,items])=>safeArray(items).forEach(req=>alerts.push({id:req.id||`request_${pid}_${req.createdAt}`,level:req.severity==='Alta'?'Crítico':'Atenção',type:'Solicitação do atleta',title:`${ps.find(p=>p.id===pid)?.name||'Atleta'}: ${req.type||'Atendimento'}`,detail:req.message||req.location||'Solicitação enviada pelo portal.',tab:'care'})));
            safeArray(careAppointments).filter(x=>x.athleteResponse==='Solicitar alteração').forEach(x=>alerts.push({id:`appointment_${x.id}`,level:'Atenção',type:'Agenda clínica',title:`Alteração solicitada: ${ps.find(p=>p.id===x.playerId)?.name||'Atleta'}`,detail:`${x.specialty} • ${formatDateBR(x.date)} ${x.time||''}`,tab:'care'}));
            safeArray(teamCommitments).filter(c=>c.requiresAck&&c.date>=today).forEach(c=>{const targets=c.target==='all'?ps:ps.filter(p=>p.id===c.target);const pending=targets.filter(p=>!commitmentResponses?.[c.id]?.[p.id]||commitmentResponses[c.id][p.id].response==='Pendente');if(pending.length)alerts.push({id:`commitment_${c.id}`,level:'Informativo',type:'Confirmação',title:`${pending.length} pendente(s): ${c.title}`,detail:`${formatDateBR(c.date)} ${c.time||''}`,tab:'commitments'})});
            const types=['Todos',...new Set(alerts.map(a=>a.type))];const visible=alerts.filter(a=>(filter==='Todos'||a.type===filter)&&!resolvedAlerts?.[a.id]);
            const toggle=id=>{const resolved=!resolvedAlerts?.[id];setResolvedAlerts({...safeObj(resolvedAlerts),[id]:resolved});const next={};Object.entries(safeObj(athleteRequests)).forEach(([pid,items])=>{next[pid]=safeArray(items).map(req=>req.id===id?{...req,status:resolved?'Concluído':'Aberto',resolvedAt:resolved?new Date().toISOString():null}:req)});setAthleteRequests(next);};
            const publish=async()=>{if(!title.trim()&&!message.trim())return showToast('Informe título ou mensagem.','#ef4444');const targetValue=target.startsWith('guardian:')?target:target||'all';const notice={id:`notice_${Date.now()}`,title:title||'Comunicado da comissão',message,createdAt:new Date().toISOString(),target:targetValue};setNotificationCenter([notice,...safeArray(notificationCenter)].slice(0,150));setPushBusy(true);try{const payload={workspaceId,title:notice.title,message:notice.message};if(target.startsWith('guardian:'))payload.targetGuardianId=target.split(':')[1];else if(target!=='all')payload.targetPlayerId=target;await authenticatedApiRequest('/api/send-notification',payload);showToast(target==='all'?'Comunicado e push enviados.':'Notificação individual enviada.','#10b981')}catch(e){showToast('Comunicado salvo; push não enviado.','#eab308')}finally{setPushBusy(false);setTitle('');setMessage('')}};
            return <div className="h-full overflow-y-auto p-4 md:p-6 bg-slate-50 dark:bg-slate-900 custom-scroll pb-32"><div className="max-w-7xl mx-auto"><div className="flex flex-col md:flex-row justify-between gap-3 mb-5"><div><div className="text-[9px] font-black uppercase tracking-[.2em] text-red-500">Central operacional</div><h2 className="text-2xl font-black uppercase dark:text-white">Alertas e Notificações</h2><p className="text-xs text-slate-500">Pendências, saúde, contratos, agenda e mensagens individuais.</p></div><select value={filter} onChange={e=>setFilter(e.target.value)} className="p-3 rounded-xl border dark:border-slate-600 dark:bg-slate-800 dark:text-white text-xs font-bold">{types.map(x=><option key={x}>{x}</option>)}</select></div><div className="grid grid-cols-1 xl:grid-cols-3 gap-6"><div className="xl:col-span-2 space-y-3">{visible.length===0?<div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl p-10 text-center text-emerald-600 font-black">Nenhum alerta aberto neste filtro.</div>:visible.map(a=><div key={a.id} className={`bg-white dark:bg-slate-800 border-l-4 ${a.level==='Crítico'?'border-red-500':a.level==='Atenção'?'border-yellow-500':'border-blue-500'} rounded-2xl p-4 shadow-sm flex gap-4 items-start`}><div className="flex-1"><div className="text-[8px] uppercase font-black text-slate-400">{a.type} • {a.level}</div><div className="font-black text-sm dark:text-white mt-1">{a.title}</div><div className="text-[10px] text-slate-500 mt-1">{a.detail}</div></div><div className="flex flex-col gap-2"><button onClick={()=>onNavigate?.(a.tab)} className="text-[8px] font-black uppercase text-blue-500">Abrir</button><button onClick={()=>toggle(a.id)} className="text-[8px] font-black uppercase text-emerald-600">Resolver</button></div></div>)}</div><div className="space-y-4"><div className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl p-5"><h3 className="font-black uppercase text-sm dark:text-white mb-3">Publicar comunicado</h3><select value={target} onChange={e=>setTarget(e.target.value)} className="w-full p-3 rounded-xl border dark:border-slate-600 dark:bg-slate-700 dark:text-white text-xs mb-2"><option value="all">Todo o elenco</option>{ps.map(p=><option key={p.id} value={p.id}>Atleta: {p.name}</option>)}{ps.filter(isMinorPlayer).map(p=><option key={`g_${p.id}`} value={`guardian:${p.id}`}>Responsável: {p.name}</option>)}</select><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Título" className="w-full p-3 rounded-xl border dark:border-slate-600 dark:bg-slate-700 dark:text-white text-xs mb-2"/><textarea value={message} onChange={e=>setMessage(e.target.value)} placeholder="Mensagem..." className="w-full h-28 p-3 rounded-xl border dark:border-slate-600 dark:bg-slate-700 dark:text-white text-xs"/><button disabled={pushBusy} onClick={publish} className="w-full mt-3 bg-blue-600 disabled:bg-slate-500 text-white py-3 rounded-xl font-black uppercase text-xs">{pushBusy?'Enviando...':'Publicar e notificar'}</button></div><div className="bg-slate-900 text-white rounded-2xl p-5"><div className="text-[9px] uppercase font-black text-blue-300">Últimos comunicados</div><div className="space-y-2 mt-3">{safeArray(notificationCenter).slice(0,8).map(n=><div key={n.id} className="border-b border-slate-700 pb-2"><div className="text-xs font-black">{n.title}</div><div className="text-[9px] text-slate-400">{n.message}</div><div className="text-[8px] text-blue-300 mt-1">Destino: {n.target==='all'||!n.target?'Todos':n.target?.startsWith('guardian:')?'Responsável':ps.find(p=>p.id===n.target)?.name||n.target}</div></div>)}</div></div></div></div></div></div>;
        };

            if (loadingCloud) return <div className="flex flex-col h-screen w-screen items-center justify-center bg-slate-900 text-slate-300 font-bold">A Carregar Espaço de Trabalho...</div>;
            const role = resolveWorkspaceRole(user, initialData, workspaceId);
            if (role === 'viewer' && initialData?.ownerUid && initialData.ownerUid !== user.uid && !initialData?.memberRoles?.[normalizeEmailKey(user.email)]) return <div className="h-screen flex flex-col items-center justify-center bg-slate-950 text-white p-6 text-center"><Icon name="lock" size={48} className="text-red-500 mb-4"/><h1 className="text-2xl font-black uppercase">Acesso não autorizado</h1><p className="text-sm text-slate-400 max-w-md mt-2">O proprietário precisa incluir o seu e-mail na aba Acessos deste espaço de trabalho.</p><button onClick={()=>auth.signOut()} className="mt-6 px-5 py-3 bg-slate-800 rounded-xl font-black uppercase text-xs">Sair</button></div>;
            return <ErrorBoundary><MainApp user={user} initialData={initialData} activeTeam={activeTeam} setActiveTeam={setActiveTeam} workspaceId={workspaceId} activeWorkspace={activeWorkspace} profile={profile} setProfile={setProfile} /></ErrorBoundary>;
        };

        const RootApp = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [profile, setProfile] = useState({ workspaces: [] });
            const requestedWorkspace = new URLSearchParams(window.location.search).get('workspace');
            if (requestedWorkspace) { localStorage.setItem('procoach_active_workspace', requestedWorkspace); localStorage.setItem('procoach_active_team', 'pro'); }
            const [activeWorkspace, setActiveWorkspace] = useState(requestedWorkspace || localStorage.getItem('procoach_active_workspace') || '');
            const [activeTeam, setActiveTeam] = useState(localStorage.getItem('procoach_active_team') || 'pro');

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    if (!u) { setLoading(false); return; }
                    const fallbackWorkspace = requestedWorkspace || localStorage.getItem('procoach_active_workspace') || u.uid;
                    if (!localStorage.getItem('procoach_active_workspace')) localStorage.setItem('procoach_active_workspace', fallbackWorkspace);
                    setActiveWorkspace(fallbackWorkspace);
                    const unsubProfile = db.collection('procoachProfiles').doc(u.uid).onSnapshot(doc => {
                        const current = doc.exists ? doc.data() : {};
                        const defaults = safeArray(current.workspaces).length ? current.workspaces : [{ id:u.uid, name:'Clube principal', ownerUid:u.uid, createdAt:new Date().toISOString() }];
                        const next={...current,workspaces:defaults}; setProfile(next);
                        if(!doc.exists) db.collection('procoachProfiles').doc(u.uid).set(next,{merge:true}).catch(()=>{});
                        setLoading(false);
                    },()=>setLoading(false));
                    return () => unsubProfile();
                });
                return () => unsubscribe();
            }, []);

            const handleSetTeam = (team) => { setActiveTeam(team); localStorage.setItem('procoach_active_team', team); };
            if (loading) return null;
            if (!user) return <LoginScreen onLogin={() => {}} />;
            return <CloudWrapper user={user} activeTeam={activeTeam} setActiveTeam={handleSetTeam} activeWorkspace={activeWorkspace || user.uid} profile={profile} setProfile={setProfile} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
