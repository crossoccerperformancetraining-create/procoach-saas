        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, resetting: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            componentDidCatch(error, errorInfo) { console.error("ProCoach Error:", error, errorInfo); }
            
            handleHardReset = () => {
                this.setState({ resetting: true });
                localStorage.clear();
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(regs => { for (let r of regs) r.unregister(); });
                }
                const user = firebase.auth().currentUser;
                if (user) {
                    firebase.firestore().collection('coachData').doc(user.uid).set({
                        players: [], trainingLog: {}, dmRecords: [], matchMinutes: {}, assessments: {},
                        days: DEFAULT_DAYS, themeColor: '#1e3a8a', darkMode: true, plan: 'starter', exercises: []
                    });
                }
                setTimeout(() => { window.location.href = window.location.pathname + '?clear=' + Date.now(); }, 1000);
            }

        const smartShare = async (blob, filename, title) => {
            const file = new File([blob], filename, { type: blob.type });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try { await navigator.share({ files: [file], title: title }); return; } catch (err) {}
            }
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        };

        const compressImage = (file, maxWidth=150, quality=0.5) => { return new Promise((resolve) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = (event) => { const img = new Image(); img.src = event.target.result; img.onload = () => { const elem = document.createElement('canvas'); const scaleFactor = maxWidth / img.width; elem.width = maxWidth; elem.height = img.height * scaleFactor; const ctx = elem.getContext('2d'); ctx.drawImage(img, 0, 0, elem.width, elem.height); resolve(elem.toDataURL('image/jpeg', quality)); }; }; }); };
        
        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        
        const getDatesInRange = (startDate, daysBack) => { 
            const dates = []; const end = new Date(startDate); end.setMinutes(end.getMinutes() - end.getTimezoneOffset());
            for (let i = 0; i < daysBack; i++) { const d = new Date(end); d.setDate(end.getDate() - i); dates.push(d.toISOString().split('T')[0]); } 
            return dates; 
        };

        const formatDateBR = (dateString) => { if(!dateString) return '-'; const [y, m, d] = dateString.split('-'); return `${d}/${m}/${y}`; };

        const safeArray = (arr, fallback=[]) => (Array.isArray(arr) && arr.length > 0) ? arr : fallback;
        const getWSum = (w) => { if (w && typeof w === 'object' && !Array.isArray(w)) { return Object.values(w).reduce((a, b) => Number(a) + Number(b), 0) || 0; } return 0; };
        const calcDailyLoad = (log) => { if(!log) return 0; const rpe = (Number(log.rpe_am)||0) + (Number(log.rpe_pm)||0); const dur = Number(log.duration) || 0; return rpe * (dur > 0 ? dur : 60); };
        const isPlayerInTransition = (pId, dmRecords) => { const todayDate = new Date(getTodayStr()); const records = safeArray(dmRecords).filter(r => r && r.playerId == pId && r.status === 'Recovered' && r.dateOut); for(let r of records) { const outDate = new Date(r.dateOut); if(isNaN(outDate.getTime())) continue; const diffTime = Math.abs(todayDate - outDate); const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); if(diffDays <= 7) return true; } return false; };

        const SpeedometerGauge = ({ value }) => {
            const min=4, max=28; const valNum = Number(value)||min; const normalized=Math.max(min, Math.min(max, valNum));
            const angle=((normalized-min)/(max-min))*180-90;
            return (<div className="flex flex-col items-center"><div className="gauge-container"><svg viewBox="0 0 200 100" className="w-full h-full"><path d="M20 100 A80 80 0 0 1 180 100" fill="none" className="stroke-slate-200 dark:stroke-slate-700" strokeWidth="20"/><path d="M20 100 A80 80 0 0 1 73 36" fill="none" stroke="#22c55e" strokeWidth="20" strokeDasharray="1000"/><path d="M73 36 A80 80 0 0 1 127 36" fill="none" stroke="#eab308" strokeWidth="20" strokeDasharray="1000"/><path d="M127 36 A80 80 0 0 1 180 100" fill="none" stroke="#ef4444" strokeWidth="20" strokeDasharray="1000"/></svg><div className="gauge-needle" style={{transform:`rotate(${angle||0}deg)`}}></div><div className="gauge-center"></div></div><div className="text-3xl font-black -mt-4 text-slate-700 dark:text-slate-200">{valNum}</div><div className="text-[10px] font-bold uppercase text-slate-400 dark:text-slate-500 mt-1">Prontidão Equipe</div></div>);
        };
        
        const MiniGauge = ({ value, min=4, max=28, reverse=false, label="" }) => {
            const valNum = Number(value)||min; const normalized=Math.max(min, Math.min(max, valNum)); const angle=((normalized-min)/(max-min))*180-90;
            const c1=reverse?"#ef4444":"#22c55e"; const c2="#eab308"; const c3=reverse?"#22c55e":"#ef4444";
            return (<div className="flex flex-col items-center"><div className="mini-gauge-container"><svg viewBox="0 0 80 40" className="w-full h-full"><path d="M5 40 A35 35 0 0 1 75 40" fill="none" className="stroke-slate-200 dark:stroke-slate-700" strokeWidth="8"/><path d="M5 40 A35 35 0 0 1 28 12" fill="none" stroke={c1} strokeWidth="8"/><path d="M28 12 A35 35 0 0 1 52 12" fill="none" stroke={c2} strokeWidth="8"/><path d="M52 12 A35 35 0 0 1 75 40" fill="none" stroke={c3} strokeWidth="8"/></svg><div className="mini-gauge-needle" style={{transform:`rotate(${angle||0}deg)`}}></div><div className="absolute bottom-0 w-2 h-2 bg-slate-700 dark:bg-slate-300 rounded-full left-[39px]"></div></div><div className="text-[10px] font-black text-slate-700 dark:text-slate-200 -mt-1">{valNum}</div>{label && <div className="text-[8px] text-slate-400 dark:text-slate-500 uppercase font-bold">{label}</div>}</div>);
        };
        
        const DonutChart = ({ value, max, color, label, size=80 }) => {

            );

        const NotificationCenter = ({ alerts, onClose }) => {

        const SettingsModal = ({ show, onClose, themeColor, setThemeColor, header, setHeader, logo, setLogo, onExport, onImport }) => {

            const fileInputRef=useRef(null); const importInputRef=useRef(null);

            const handleRestore = (e) => { const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=(e)=>{try{const d=JSON.parse(e.target.result); onImport(d); showToast("Dados Restaurados!"); setTimeout(() => window.location.reload(), 1000);}catch(e){showToast("Erro no arquivo")}}; r.readAsText(f); };

div></div><div><h3 className="text-sm font-bold text-slate-400 uppercase mb-2">Tema</h3><input type="color" value={themeColor} onChange={e=>setThemeColor(e.target.value)} className="w-12 h-12 rounded-lg border-2 cursor-pointer dark:border-slate-600"/></div><div className="border-t dark:border-slate-700 pt-4"><div className="grid grid-cols-2 gap-2 mb-2"><button onClick={onExport} className="flex justify-center gap-2 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 border border-blue-200 dark:border-blue-800 py-2 rounded font-bold text-xs"><Icon name="share" size={14}/> EXPORTAR TUDO</button><button onClick={()=>importInputRef.current.click()} className="flex justify-center gap-2 bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400 border border-green-200 dark:border-green-800 py-2 rounded font-bold text-xs"><Icon name="upload" size={14}/> IMPORTAR DADOS</button><input type="file" ref={importInputRef} className="hidden" accept=".json" onChange={handleRestore}/></div><p className="text-[10px] text-slate-400 text-center mb-2">Use exportar para salvar uma cópia local por segurança.</p></div></div></div></div>);

        const AdminDashboard = ({ themeColor }) => {

                        setClients(clientList);
                        setLoading(false);

                        setLoading(false);
                    }
                };
                fetchClients();

                try {
                    await db.collection('coachData').doc(clientId).update({ plan: newPlan });
                    setClients(clients.map(c => c.id === clientId ? { ...c, plan: newPlan } : c));
                    showToast("Plano atualizado!", "#22c55e");

        const WellnessDashboard = ({ players, themeColor, trainingLog, setTrainingLog }) => {

            const [wellnessDate, setWellnessDate] = useState(getTodayStr()); 
            
            const [selectedPlayer, setSelectedPlayer] = useState(0);
            const [localScores, setLocalScores] = useState({sleep:1,stress:1,fatigue:1,soreness:1, mood: 1}); 
            const [localPainZones, setLocalPainZones] = useState([]);
            const bodyParts = ["Cabeça", "Pescoço", "Trapézio", "Ombro", "Peitoral", "Costas Sup.", "Lombar", "Abdômen", "Braço", "Quadril", "Adutor", "Quadríceps", "Posterior Coxa", "Joelho", "Panturrilha", "Tornozelo", "Pé"];

            useEffect(() => { 
                if(mode === 'manual') {
                    const logObj = trainingLog[wellnessDate]?.[selectedPlayer] || {}; 
                    const validW = safeObj(logObj.wellness);
                    setLocalScores(validW.sleep ? validW : {sleep:1,stress:1,fatigue:1,soreness:1, mood: 1}); 
                    setLocalPainZones(Array.isArray(logObj.painZones) ? logObj.painZones : []); 
                }
            }, [wellnessDate, selectedPlayer, trainingLog, mode]);

            const handleScoreChange = (metric, val) => { setLocalScores(prev => ({...prev, [metric]: parseInt(val)})); };
            const togglePainZone = (zone) => { let n = [...localPainZones]; if(n.includes(zone)) n = n.filter(z=>z!==zone); else n.push(zone); setLocalPainZones(n); };
            
            const confirmData = () => { 
                const newLog = {...trainingLog}; 
                if(!newLog[wellnessDate]) newLog[wellnessDate] = {}; 
                if(!newLog[wellnessDate][selectedPlayer]) newLog[wellnessDate][selectedPlayer] = {}; 
                newLog[wellnessDate][selectedPlayer].wellness = localScores; 
                newLog[wellnessDate][selectedPlayer].painZones = localPainZones; 
                setTrainingLog(newLog); 
                showToast("Dados Salvos!"); 
                setMode('dashboard');
            };

            if (mode === 'dashboard') {
                const safePlayers = safeArray(players);
                const filledCount = safePlayers.filter((p,i) => safeObj(trainingLog[wellnessDate]?.[i]?.wellness).sleep).length;
                
                const renderStatusBadge = (log, pain) => {
                    if (!log || !log.sleep) return <span className="bg-slate-200 dark:bg-slate-700 text-slate-500 text-[10px] font-black px-2 py-1 rounded shadow-sm uppercase flex items-center gap-1 whitespace-nowrap"><Icon name="calendar" size={12}/> Pendente</span>;
                    if (Number(log.soreness) >= 5 || pain.length > 0) return <span className="bg-red-500 text-white text-[10px] font-black px-2 py-1 rounded shadow-md uppercase animate-pulse flex items-center gap-1 whitespace-nowrap"><Icon name="alert" size={12}/> RISCO DE LESÃO</span>;
                    const total = getWSum(log);
                    if (total >= 18) return <span className="bg-yellow-400 text-yellow-900 text-[10px] font-black px-2 py-1 rounded shadow-sm uppercase flex items-center gap-1 whitespace-nowrap"><Icon name="alert" size={12}/> ATENÇÃO</span>;
                    return <span className="bg-green-500 text-white text-[10px] font-black px-2 py-1 rounded shadow-sm uppercase flex items-center gap-1 whitespace-nowrap"><Icon name="check" size={12}/> APTO</span>;

                            <div className="space-y-4">{[{id:'sleep',label:'Qualidade do Sono (1=Excelente | 7=Péssimo)'},{id:'stress',label:'Estresse (1=Relaxado | 7=Estressado)'},{id:'fatigue',label:'Fadiga (1=Muita Energia | 7=Exausto)'},{id:'soreness',label:'Dor Muscular (1=Sem Dor | 7=Muita Dor)'}, {id:'mood', label:'Humor (1=Animado | 7=Irritado)'}].map(m=>(<div key={m.id}><div className="flex justify-between text-sm font-bold text-slate-700 dark:text-slate-300 mb-2"><span>{m.label}</span><span className="text-white px-2 rounded font-bold" style={{backgroundColor: themeColor}}>{localScores[m.id]}</span></div><input type="range" min="1" max="7" step="1" value={localScores[m.id]} onChange={(e)=>handleScoreChange(m.id, e.target.value)} className="hooper-slider" style={{background: `linear-gradient(to right, #22c55e, #eab308, #ef4444)`}}/></div>))}</div>
                            <div className="border-t dark:border-slate-700 pt-4"><h4 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase mb-2">Local da Dor</h4><select className="w-full p-2 border dark:border-slate-600 rounded text-xs mb-2 bg-white dark:bg-slate-700 dark:text-white" onChange={(e)=>{if(e.target.value) togglePainZone(e.target.value); e.target.value='';}}><option value="">+ Adicionar Local</option>{bodyParts.map(p=><option key={p} value={p}>{p}</option>)}</select><div className="flex flex-wrap gap-1">{localPainZones.map(z=><span key={z} onClick={()=>togglePainZone(z)} className="bg-red-100 dark:bg-red-900/50 text-red-600 dark:text-red-400 px-2 py-1 rounded text-xs font-bold cursor-pointer hover:bg-red-200 dark:hover:bg-red-800">{z} ×</span>)}</div></div>
                            <div className="flex gap-2 mt-4"><button onClick={confirmData} className="w-full py-4 bg-slate-800 text-white font-bold rounded-xl shadow-lg hover:opacity-90 flex items-center justify-center gap-2"><Icon name="save"/> SALVAR DADOS</button></div>
                        </div>
                    </div>
                </div>
            );
        };

        const PlayerProfileModal = ({ player, playerIndex, logs, onClose, themeColor, setPlayers, players }) => {
            if (!player) return null;
            const today = getTodayStr(); 
            const currentLog = logs[today]?.[playerIndex] || {};
            const wellness = safeObj(currentLog.wellness);
            const dates = getDatesInRange(today, 7).reverse();
            const toggleInjury = () => { const n = [...players]; n[playerIndex].injured = !n[playerIndex].injured; setPlayers(n); };
            
            const getLoad = (d) => { 
                const l = logs[d]?.[playerIndex]; 
                if(!l) return 0;
                const rpeSum = (Number(l.rpe_am)||0)+(Number(l.rpe_pm)||0);
                const dur = Number(l.duration) || 0;
                return dur > 0 ? rpeSum * dur : rpeSum * 60; 
            };

            const todayLoad = getLoad(today);
            const historyDates = getDatesInRange(today, 7).slice(1); 
            let chronicLoad = 0; historyDates.forEach(d => chronicLoad += getLoad(d)); 
            const avgLoad = (chronicLoad + todayLoad) / 7;
            
            let loadMsg = "Carga Equilibrada. Prontidão Alta."; 
            let loadColor = "text-green-500";
            
            if (avgLoad > 0) {
                if (todayLoad > avgLoad * 1.4) { loadMsg = "Risco Agudo! Sobrecarga detectada. Sugestão: Recuperativo imediato."; loadColor = "text-red-500"; } 
                else if (todayLoad < avgLoad * 0.6) { loadMsg = "Carga baixa hoje. Oportunidade para treino de força ou tático intenso."; loadColor = "text-yellow-500"; }
            }

            const HistoryAI = () => {
                const painCounts = {};
                dates.forEach(d => { const l = logs[d]?.[playerIndex] || {}; if(Array.isArray(l.painZones)) l.painZones.forEach(z => { painCounts[z] = (painCounts[z]||0) + 1; }); });
                const chronic = Object.keys(painCounts).find(k => painCounts[k] >= 3);
                if (chronic) return (<div className="bg-red-50 dark:bg-red-900/30 border-l-4 border-red-500 p-3 mb-4 rounded-r-lg shadow-sm"><div className="flex items-center gap-2 mb-1"><Icon name="brain" className="text-red-600 dark:text-red-400" size={18}/><span className="text-xs font-bold text-red-700 dark:text-red-300 uppercase">Fisiologista Virtual</span></div><div className="text-xs text-slate-700 dark:text-slate-300">Atenção: Dor recorrente em <strong>{chronic}</strong> detectada nesta semana. Risco elevado.</div></div>);
                return null;
            };

            const generateShareCard = async () => {
                const el = document.getElementById('export-card-' + playerIndex);
                if(!el) return;
                
                el.style.left = '0'; el.style.top = '0'; el.style.position = 'absolute'; el.style.zIndex = '9999';
                const originalBg = el.style.backgroundColor;
                el.style.backgroundColor = '#0f172a'; 
                
                showToast("Gerando card...");
                
                try {
                    const canvas = await html2canvas(el, {
                        scale: 2, 
                        useCORS: true, 
                        backgroundColor: '#0f172a',
                        logging: false
                    });
                    
                    canvas.toBlob(blob => {
                        smartShare(blob, `card_${player.name.replace(/\s+/g, '_')}.png`, `Status - ${player.name}`);
                        el.style.left = '-9999px'; el.style.top = '-9999px';
                        el.style.backgroundColor = originalBg;
                    });
                } catch(e) {
                    showToast("Erro ao gerar card");
                    el.style.left = '-9999px'; el.style.top = '-9999px';
                    el.style.backgroundColor = originalBg;
                }
            };

            const totalW = getWSum(wellness);
            const wColor = totalW >= 25 ? 'text-red-500' : totalW >= 18 ? 'text-yellow-500' : 'text-green-500';

            return (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                    <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden relative flex flex-col max-h-[90vh]" onClick={e=>e.stopPropagation()}>
                        
                        <div className="p-6 relative text-white flex flex-col items-center shrink-0" style={{background:`linear-gradient(to bottom, ${themeColor}, #1e293b)`}}>
                            <button onClick={onClose} className="absolute top-4 right-4 text-white/70 hover:text-white"><Icon name="x" size={24}/></button>
                            <div className="w-32 h-32 rounded-full border-4 border-white dark:border-slate-700 bg-slate-200 dark:bg-slate-600 shadow-lg mb-2 overflow-hidden">{player.image?<img src={player.image} className="w-full h-full object-cover object-top" onError={(e)=>{e.target.style.display='none'}}/>:<div className="w-full h-full flex items-center justify-center text-slate-400"><Icon name="user" size={40}/></div>}</div>
                            <h2 className="text-2xl font-bold uppercase">{player.name}</h2>
                            <p className="text-white/70 text-sm font-bold">{player.number?`#${player.number} `:''} {player.position||'Atleta'}</p>
                            <div className="flex gap-2 mt-2">
                                <button onClick={toggleInjury} className={`px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 ${player.injured?'bg-red-500 text-white':'bg-green-500 text-white'}`}>{player.injured?<><Icon name="medkit" size={12}/> LESIONADO</>:<><Icon name="check" size={12}/> DISPONÍVEL</>}</button>
                            </div>
                        </div>
                        
                        <div className="p-6 space-y-6 overflow-y-auto flex-1 custom-scroll">
                            
                            <div className="bg-slate-50 dark:bg-slate-700 rounded-xl border border-slate-200 dark:border-slate-600 p-4 shadow-inner">
                                <div className="flex items-center gap-2 mb-2 border-b dark:border-slate-600 pb-2">
                                    <Icon name="brain" className={loadColor} size={18}/>
                                    <span className={`text-[10px] font-black uppercase tracking-wider ${loadColor}`}>Assistente de Prontidão IA</span>
                                </div>
                                <div className="text-sm font-bold text-slate-700 dark:text-slate-200">{loadMsg}</div>
                            </div>

                            <HistoryAI />
                            
                            <div>
                                <h3 className="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase mb-3 flex items-center gap-2"><Icon name="smile"/> Status ({formatDateBR(today)})</h3>
                                <div className="grid grid-cols-2 gap-4">{Object.entries({Sono:wellness.sleep,Estresse:wellness.stress,Fadiga:wellness.fatigue,Dor:wellness.soreness, Humor: wellness.mood}).map(([k,v])=>(<div key={k} className="bg-slate-50 dark:bg-slate-700 p-2 rounded border border-slate-100 dark:border-slate-600"><div className="flex justify-between text-xs font-bold mb-1"><span className="text-slate-500 dark:text-slate-400">{k}</span><span className="dark:text-white">{v||'-'}</span></div><div className="h-2 w-full bg-slate-200 dark:bg-slate-600 rounded-full overflow-hidden"><div className="h-full rounded-full transition-all duration-500" style={{width:`${((Number(v)||0)/7)*100}%`,backgroundColor:(Number(v)||0)>=5?'#ef4444':(Number(v)||0)>=3?'#eab308':'#22c55e'}}></div></div></div>))}</div>
                            </div>
                            <div>
                                <h3 className="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase mb-3 flex items-center gap-2"><Icon name="list"/> Histórico de Dores & Carga (sRPE)</h3>
                                <div className="bg-slate-50 dark:bg-slate-700 rounded-xl border border-slate-100 dark:border-slate-600 overflow-hidden max-h-64 overflow-y-auto custom-scroll"><table className="w-full text-xs"><thead className="bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 sticky top-0"><tr><th className="p-2 text-left">Data</th><th className="p-2 text-center">Local Dor</th><th className="p-2 text-center">Carga sRPE</th></tr></thead><tbody>{dates.map(d=>{const l=logs[d]?.[playerIndex]||{};const t=calcDailyLoad(l);const pz=Array.isArray(l.painZones) && l.painZones.length>0 ? l.painZones : null;return(<tr key={d} className="border-t border-slate-100 dark:border-slate-600"><td className="p-2 font-bold text-slate-600 dark:text-slate-300">{formatDateBR(d)}</td><td className="p-2 text-center">{pz ? <div className="flex flex-wrap gap-1 justify-center">{pz.map(z=><span key={z} className="bg-red-100 dark:bg-red-900/50 text-red-600 dark:text-red-400 px-1.5 py-0.5 rounded text-[9px] font-bold border border-red-200 dark:border-red-800">{z}</span>)}</div> : <span className="text-slate-300 dark:text-slate-500">-</span>}</td><td className="p-2 text-center font-bold text-blue-600 dark:text-blue-400">{t||'-'}</td></tr>)})}</tbody></table></div>
                            </div>
                            <button onClick={generateShareCard} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 shadow-lg"><Icon name="share"/> GERAR CARD (WHATSAPP)</button>
                        </div>
                    </div>

                    <div id={`export-card-${playerIndex}`} className="fixed z-[-1] bg-slate-900" style={{left:'-9999px', top: '-9999px', width: '400px', backgroundColor: '#0f172a'}}>
                        <div className="p-6 rounded-3xl border-4 border-slate-700 text-white flex flex-col items-center relative overflow-hidden" style={{backgroundColor: '#0f172a'}}>
                            <div className="absolute top-0 left-0 w-full h-32 opacity-50" style={{background:`linear-gradient(to bottom, ${themeColor}, transparent)`}}></div>
                            <div className="w-32 h-32 rounded-full border-4 border-slate-800 bg-slate-800 shadow-2xl mb-4 overflow-hidden z-10 relative">
                                {player.image?<img src={player.image} className="w-full h-full object-cover object-top"/>:<div className="w-full h-full flex items-center justify-center text-slate-500"><Icon name="user" size={40}/></div>}
                            </div>
                            <h2 className="text-3xl font-black uppercase z-10 mb-1 text-white">{player.name}</h2>
                            <p className="text-slate-400 font-bold z-10 mb-6 tracking-widest">{player.number?`#${player.number} `:''} {player.position||'Atleta'}</p>
                            
                            <div className="w-full bg-slate-800 rounded-xl p-4 mb-4 border border-slate-700 flex justify-between items-center z-10 shadow-inner" style={{backgroundColor: '#1e293b'}}>
                                <div className="text-center">
                                    <div className="text-[10px] text-slate-400 font-bold uppercase mb-1">Wellness Index</div>
                                    <div className={`text-3xl font-black ${wColor}`}>{totalW > 0 ? totalW : '-'}</div>
                                </div>
                                <div className="h-10 w-px bg-slate-700"></div>
                                <div className="text-center">
                                    <div className="text-[10px] text-slate-400 font-bold uppercase mb-1">Carga Hoje</div>
                                    <div className="text-3xl font-black text-blue-400">{todayLoad || '-'}</div>
                                </div>
                            </div>
                            
                            <div className="w-full bg-slate-800 rounded-xl p-4 border border-slate-700 z-10" style={{backgroundColor: '#1e293b'}}>
                                <div className="flex items-center gap-2 mb-2 border-b border-slate-700 pb-2">
                                    <Icon name="brain" className={loadColor.replace('text-', 'text-')} size={16}/>
                                    <span className="text-[10px] font-bold uppercase tracking-wider" style={{color: loadColor === 'text-red-500' ? '#ef4444' : '#eab308'}}>{loadMsg}</span>
                                </div>
                                <div className="text-sm text-slate-300 leading-snug">
                                    {totalW >= 25 ? "Alerta Crítico: Risco de Burnout ou Lesão." : totalW >= 18 ? "Atenção: Fadiga acumulada. Recuperação sugerida." : "Prontidão Alta: Atleta em boas condições."}
                                    {Array.isArray(currentLog.painZones) && currentLog.painZones.length > 0 && <span className="block mt-1 text-red-400 font-bold text-xs">Dores: {currentLog.painZones.join(', ')}</span>}
                                </div>
                            </div>
                            <div className="mt-4 text-[9px] text-slate-500 font-bold tracking-widest uppercase">Gerado por ProCoach Nuvem</div>
                        </div>
                    </div>
                </div>
            );
        };

        const SquadView = ({ players, setPlayers, themeColor, trainingLog, dmRecords }) => {
            const [viewProfile, setViewProfile] = useState(null);
            const [editPlayer, setEditPlayer] = useState(null); 
            const today = getTodayStr(); 
            const safePlayers = safeArray(players);
            
            const addP = () => setPlayers([...safePlayers, {name: "Novo Atleta", image: null, injured: false, position: 'Atleta', number: ''}]);
            const fileInputRef = useRef(null); const [localData, setLocalData] = useState({});
            
            const getWeeklyLoad = (playerIndex) => { const dates = getDatesInRange(today, 7); let sum = 0; dates.forEach(d => { sum += calcDailyLoad(trainingLog[d]?.[playerIndex]); }); return Math.min(100, sum/2000*100); };
            const getPlayerDMStatus = (playerId) => { const dmRecs = safeArray(dmRecords); return dmRecs.find(r => r && r.playerId == playerId && r.status === 'Active'); };
            
            const Editor = () => { if(editPlayer === null) return null; const p = safePlayers[editPlayer]; if(!p) return null; const handleImg = async (e) => { const f=e.target.files[0]; if(f){ try{const c=await compressImage(f,80,0.4); setLocalData({...localData, image:c});}catch(e){} } }; return (<div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 animate-fade-in" onClick={()=>setEditPlayer(null)}><div className="bg-white dark:bg-slate-800 rounded-xl p-4 w-full max-w-sm space-y-3" onClick={e=>e.stopPropagation()}><h3 className="font-bold dark:text-white">Editar {p.name}</h3><div className="flex justify-center flex-col items-center gap-2"><div onClick={()=>fileInputRef.current.click()} className="w-32 h-32 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden border-2 border-blue-500 cursor-pointer">{localData.image?<img src={localData.image} className="w-full h-full object-cover object-top"/>:<Icon name="user"/>}</div><input type="file" ref={fileInputRef} className="hidden" onChange={async (e) => { const f=e.target.files[0]; if(f){ try{const c=await compressImage(f,80,0.4); setLocalData({...localData, image:c});}catch(err){} } }}/><div className="w-full"><label className="text-[9px] uppercase font-bold text-slate-400">Ou cole URL da Imagem:</label><BufferedInput className="w-full text-xs border dark:border-slate-600 rounded p-1 dark:bg-slate-700 dark:text-white" placeholder="https://..." value={localData.image && localData.image.startsWith('http') ? localData.image : ''} onSave={(val)=>setLocalData({...localData, image:val})} /></div></div><BufferedInput className="w-full border dark:border-slate-600 p-2 rounded dark:bg-slate-700 dark:text-white" value={localData.name} onSave={val=>setLocalData({...localData, name:val})}/><div className="grid grid-cols-2 gap-2"><BufferedInput type="number" className="border dark:border-slate-600 p-2 rounded dark:bg-slate-700 dark:text-white" placeholder="Camisa" value={localData.number} onSave={val=>setLocalData({...localData, number:val})}/><select className="border dark:border-slate-600 p-2 rounded dark:bg-slate-700 dark:text-white" value={localData.position} onChange={e=>setLocalData({...localData, position:e.target.value})}><option value="">-</option>{["Goleiro","Zagueiro","Lateral","Volante","Meia","Ponta","Atacante"].map(x=><option key={x} value={x}>{x}</option>)}</select></div><div className="flex gap-2"><button onClick={()=>{if(confirm('Excluir?')){setPlayers(safePlayers.filter((_,i)=>i!==editPlayer));setEditPlayer(null);}}} className="bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-2 rounded flex-1">Excluir</button><button onClick={()=>{const n=[...safePlayers];n[editPlayer]=localData;setPlayers(n);setEditPlayer(null);}} className="bg-blue-600 text-white p-2 rounded flex-1">Salvar</button></div></div></div>); };
            
            const injuredCount = safePlayers.filter(p=>p && p.injured).length;
            const squadAnalysis = injuredCount > 2 ? `Atenção: ${injuredCount} atletas indisponíveis.` : "Elenco com boa disponibilidade geral.";

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in custom-scroll">
                    <PlayerProfileModal player={safePlayers[viewProfile]} playerIndex={viewProfile} logs={trainingLog} onClose={()=>setViewProfile(null)} themeColor={themeColor} setPlayers={setPlayers} players={safePlayers} />
                    {editPlayer!==null && <Editor/>}
                    <div className="flex justify-between items-end mb-6"><h2 className="text-2xl font-bold flex items-center gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="user"/> Gestão do Elenco</h2><div className="text-xs bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-1.5 rounded-lg shadow-sm flex items-center gap-2 text-slate-600 dark:text-slate-300"><Icon name="brain" size={14} className="text-blue-500"/>{squadAnalysis}</div></div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        {safePlayers.map((p, i) => { 
                            if(!p) return null;
                            const loadPct = getWeeklyLoad(i); 
                            const dailyLog = trainingLog[today]?.[i] || {}; 
                            const wellness = safeObj(dailyLog.wellness); 
                            const soreness = Number(wellness.soreness) || 0; 
                            const sleep = Number(wellness.sleep) || 0; 
                            const isRisk = soreness >= 5; 
                            const dmStatus = p.injured ? getPlayerDMStatus(i) : null; 
                            const inTransition = !p.injured && isPlayerInTransition(i, dmRecords);
                            
                            return (
                                <div key={i} className={`bg-white dark:bg-slate-800 rounded-xl shadow border p-4 flex flex-col items-center gap-3 relative group hover:shadow-lg transition-all cursor-pointer ${isRisk || p.injured ? 'border-red-500 dark:border-red-500 ring-2 ring-red-100 dark:ring-red-900/50' : 'border-slate-100 dark:border-slate-700'}`} onClick={()=>setViewProfile(i)}>
                                    <button onClick={(e)=>{e.stopPropagation();setLocalData(p);setEditPlayer(i);}} className="absolute top-2 right-2 text-slate-300 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 bg-white dark:bg-slate-800 rounded-full p-1"><Icon name="edit" size={16}/></button>
                                    
                                    {isRisk && !p.injured && <div className="absolute top-2 left-2 bg-red-500 text-white text-[9px] font-bold px-2 py-0.5 rounded-full animate-pulse z-10 flex items-center gap-1"><Icon name="alert" size={10} stroke="white"/> RISCO</div>}
                                    {p.injured && <div className="absolute top-2 left-2 bg-slate-800 dark:bg-slate-600 text-white p-1.5 rounded-full z-10"><Icon name="medkit" size={14}/></div>}
                                    {inTransition && !p.injured && <div className="absolute top-2 left-2 bg-orange-500 text-white text-[9px] font-bold px-2 py-0.5 rounded-full z-10 flex items-center gap-1"><Icon name="activity" size={10} stroke="white"/> EM TRANSIÇÃO</div>}
                                    
                                    <div className="w-20 h-20 rounded-full bg-slate-100 dark:bg-slate-700 overflow-hidden relative border-2 shrink-0" style={{borderColor: p.injured ? '#1e293b' : inTransition ? '#f97316' : isRisk ? '#ef4444' : themeColor}}>
                                        {p.image ? <img src={p.image} className="w-full h-full object-cover object-top"/> : <div className="w-full h-full flex items-center justify-center text-slate-300 dark:text-slate-500"><Icon name="user" size={32}/></div>}
                                    </div>
                                    <div className="text-center w-full">
                                        <div className="font-bold text-slate-700 dark:text-slate-200 text-lg truncate">{p.name}</div>
                                        <div className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase mt-1 flex justify-center gap-2">{p.number && <span className="bg-slate-100 dark:bg-slate-700 px-1.5 rounded text-slate-600 dark:text-slate-300">#{p.number}</span>}<span>{p.position || 'Atleta'}</span></div>
                                    </div>
                                    
                                    <div className="border-t dark:border-slate-700 pt-2 w-full flex justify-center items-center gap-2">
                                        {p.injured && dmStatus ? (
                                            <div className="w-full text-center">
                                                <div className="text-[10px] font-black text-red-600 dark:text-red-400 uppercase mb-1">{dmStatus.location}</div>
                                                <div className="text-[9px] font-bold text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700 rounded px-2 py-1">{RTP_PHASES.find(ph=>ph.id==dmStatus.rtpPhase)?.label || 'Em tratamento'}</div>
                                            </div>
                                        ) : (
                                            <><MiniGauge value={loadPct} min={0} max={100} label="Carga 7 Dias" />{sleep >= 5 && <div className="text-red-500 bg-red-50 dark:bg-red-900/30 p-1 rounded-full" title="Sono Ruim"><Icon name="moon" size={12}/></div>}{soreness >= 5 && <div className="text-red-500 bg-red-50 dark:bg-red-900/30 p-1 rounded-full" title="Dor Alta"><Icon name="bolt" size={12}/></div>}</>
                                        )}
                                    </div>
                                </div>
                            ) 
                        })}
                        <button onClick={addP} className="bg-white dark:bg-slate-800 rounded-xl shadow border border-dashed border-slate-300 dark:border-slate-600 p-4 flex flex-col items-center justify-center gap-2 text-slate-400 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 hover:border-blue-500 dark:hover:border-blue-400 transition-all cursor-pointer h-40"><Icon name="plus" size={32}/><span className="font-bold text-sm">Adicionar Atleta</span></button>
                    </div>
                </div>
            );
        };

        const MainApp = ({ user, initialData, forceAthleteView }) => {
            const [tab, setTab] = useState(forceAthleteView ? 'preview' : 'squad'); 
            const [plan, setPlan] = useState(initialData?.plan || 'starter');
            
            const [themeColor, setThemeColor] = useState(initialData?.themeColor || '#1e3a8a');
            const [players, setPlayers] = useState(initialData?.players || []);
            const [trainingLog, setTrainingLog] = useState(initialData?.trainingLog || {});
            const [assessments, setAssessments] = useState(initialData?.assessments || {});
            const [dmRecords, setDmRecords] = useState(initialData?.dmRecords || []);
            const [matchMinutes, setMatchMinutes] = useState(initialData?.matchMinutes || {});
            const [header, setHeader] = useState(initialData?.header || {});
            const [logo, setLogo] = useState(initialData?.logo || null);
            const [darkMode, setDarkMode] = useState(initialData?.darkMode || false);
            const [days, setDays] = useState(safeArray(initialData?.days, DEFAULT_DAYS));
            
            const [exercises, setExercises] = useState(initialData?.exercises || []); 

            const [showSettings, setShowSettings] = useState(false);
            const [showNotifications, setShowNotifications] = useState(false);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [syncStatus, setSyncStatus] = useState(''); 

            const isAdmin = user && user.email === 'crossoccerperformancetraining@gmail.com';

            useEffect(() => {
                if (darkMode || forceAthleteView) document.body.classList.add('dark');
                else document.body.classList.remove('dark');
            }, [darkMode, forceAthleteView]);

            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
            }, []);

            useEffect(() => {
                if(!user || forceAthleteView) return;
                const timeoutId = setTimeout(() => {
                    setSyncStatus('A Guardar...');
                    const dataToSave = { themeColor, players, trainingLog, assessments, dmRecords, matchMinutes, header, logo, darkMode, days, plan, exercises };
                    db.collection('coachData').doc(user.uid).set(dataToSave, { merge: true })
                        .then(() => { setSyncStatus('☁️ Sincronizado'); setTimeout(() => setSyncStatus(''), 3000); })
                        .catch((err) => { setSyncStatus('❌ Erro na Nuvem'); console.error(err); });
                }, 2000); 
                return () => clearTimeout(timeoutId);
            }, [themeColor, players, trainingLog, assessments, dmRecords, matchMinutes, header, logo, darkMode, days, plan, exercises, user]);

            const activeAlerts = useMemo(() => {
                const today = getTodayStr(); let alerts = [];
                safeArray(players).forEach((p, i) => {
                    if(!p) return;
                    const logObj = trainingLog[today]?.[i] || {};
                    const wellness = safeObj(logObj.wellness);
                    if(Number(wellness.soreness) >= 5) alerts.push({ type: 'danger', icon: 'bolt', text: `${p.name} relatou dor aguda (Nível ${wellness.soreness}).`});
                    if(Number(wellness.sleep) >= 5) alerts.push({ type: 'warning', icon: 'moon', text: `${p.name} relatou sono ruim.`});
                    
                    const todayLoad = calcDailyLoad(logObj);
                    if(todayLoad > 0) {
                        const historyDates = getDatesInRange(today, 7).slice(1); let chronicLoad = 0; 
                        historyDates.forEach(d => chronicLoad += calcDailyLoad(trainingLog[d]?.[i])); 
                        const avgLoad = (chronicLoad + todayLoad) / 7;
                        if(avgLoad > 0 && todayLoad > avgLoad * 1.5) alerts.push({ type: 'danger', icon: 'activity', text: `${p.name} com sobrecarga aguda hoje.`});
                    }
                });
                return alerts;
            }, [players, trainingLog, dmRecords, matchMinutes]);

            const downloadCurrentView = async () => {
                const el = document.getElementById('print-area');
                if(!el) return;
                showToast("A gerar imagem do ecrã...");
                const originalBg = el.style.backgroundColor;
                el.style.backgroundColor = document.body.classList.contains('dark') ? '#0f172a' : '#f8fafc';
                try {
                    const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: document.body.classList.contains('dark') ? '#0f172a' : '#f8fafc' });
                    canvas.toBlob(blob => { smartShare(blob, `procoach_view.png`, 'ProCoach Export'); });
                } catch(e) { showToast("Erro ao exportar ecrã"); }
                el.style.backgroundColor = originalBg;
            };

            const handleRefresh = () => { showToast("A atualizar dados..."); setTimeout(() => window.location.reload(), 500); };

            // Se o link for do modo Atleta Independente (Standalone)
            if (forceAthleteView) {
                return <AthleteMobilePortal player={players[0] || {name: 'Atleta Demonstração'}} dmStatus={players[0]?.injured ? 'DM' : 'APTO'} themeColor={themeColor} exercises={exercises} isStandalone={true} />;
            }

            return (
                <div className="flex flex-col h-full bg-slate-100 dark:bg-slate-900 transition-colors duration-300">
                    <SettingsModal show={showSettings} onClose={()=>setShowSettings(false)} themeColor={themeColor} setThemeColor={setThemeColor} header={header} setHeader={setHeader} logo={logo} setLogo={setLogo} onExport={()=>{}} onImport={()=>{}} />
                    {showNotifications && <NotificationCenter alerts={activeAlerts} onClose={()=>setShowNotifications(false)} />}
                    
                    <div className="bg-white dark:bg-slate-800 border-b dark:border-slate-700 p-2 px-4 flex justify-between items-center shadow-sm z-30 shrink-0 no-print transition-colors duration-300">
                        <div className="font-black text-xl italic text-slate-800 dark:text-white flex items-center gap-2">
                            <div><span style={{color: themeColor}}>PRO</span>COACH <span className="text-[9px] not-italic bg-slate-800 dark:bg-slate-200 text-white dark:text-slate-800 px-1.5 py-0.5 rounded ml-1">V144 MAX</span></div>
                            <div className={`flex items-center gap-1 px-2 py-0.5 rounded-full text-[9px] font-bold border ${isOnline ? 'bg-green-50 text-green-600 border-green-200' : 'bg-red-50 text-red-600 border-red-200'}`}><div className={`w-1.5 h-1.5 rounded-full ${isOnline ? 'bg-green-500' : 'bg-red-500'}`}></div>{isOnline ? 'ONLINE' : 'OFFLINE'}</div>
                            {syncStatus && <span className="text-[9px] font-bold text-slate-400 animate-pulse">{syncStatus}</span>}
                        </div>
                        <div className="flex gap-1 items-center">
                            <button onClick={handleRefresh} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 font-bold text-xs flex items-center gap-1" title="Atualizar Dados"><Icon name="refresh" size={20}/></button>
                            <button onClick={()=>setShowNotifications(true)} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 relative"><Icon name="bell" size={20}/>{activeAlerts.length > 0 && <span className="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white dark:border-slate-800"></span>}</button>
                            <button onClick={()=>setDarkMode(!darkMode)} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400">{darkMode ? <Icon name="sun" size={20}/> : <Icon name="moon" size={20}/>}</button>
                            <button onClick={downloadCurrentView} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 font-bold text-xs flex items-center gap-1" title="Baixar Ecrã"><Icon name="download"/></button>
                            <button onClick={()=>setShowSettings(true)} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700" style={{color: themeColor}} title="Definições"><Icon name="settings" size={24}/></button>
                            <button onClick={()=>auth.signOut().then(() => window.location.reload())} className="p-2 rounded hover:bg-red-100 dark:hover:bg-red-900/30 text-red-500" title="Sair"><Icon name="logout" size={20}/></button>
                        </div>
                    </div>
                    
                    <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-lg gap-1 overflow-x-auto shadow-inner no-print w-full custom-scroll">
                        <button onClick={()=>setTab('squad')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='squad'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>ELENCO</button>
                        <button onClick={()=>setTab('micro')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='micro'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>MICROCICLO</button>
                        <button onClick={()=>setTab('wellness')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='wellness'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>WELLNESS</button>
                        <button onClick={()=>setTab('pse')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='pse'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>CARGA/PSE</button>
                        <button onClick={()=>setTab('workout')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='workout'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>PRESCRIÇÃO</button>
                        <button onClick={()=>setTab('match')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='match'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>MATCH</button>
                        <button onClick={()=>setTab('dm')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='dm'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>DM</button>
                        <button onClick={()=>setTab('assessment')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='assessment'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>AVALIAÇÃO</button>

                        <button onClick={()=>setTab('preview')} className={`px-3 py-1.5 rounded text-xs font-black transition-all shrink-0 ml-4 border ${tab==='preview'?'bg-purple-600 text-white border-purple-700 shadow':'text-purple-400 border-purple-200 dark:border-purple-800/30'}`}>📱 VISÃO ATLETA</button>

                        {/* Botão de abrir em nova aba como App */}
                        {tab === 'preview' && (
                            <button onClick={() => window.open(window.location.href + '?atleta=true', '_blank')} className="px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 bg-emerald-600 text-white hover:bg-emerald-700 shadow ml-2">🔗 ABRIR COMO APP REAL</button>
                        )}

                        {isAdmin && (
                            <button onClick={() => setTab('admin')} className={`px-3 py-1.5 rounded text-xs font-black transition-all shrink-0 ml-auto border ${tab==='admin'?'bg-slate-800 text-yellow-400 border-yellow-500 shadow-lg':'text-slate-400 border-transparent hover:text-slate-800 dark:hover:text-white'}`}>👑 ADMIN</button>
                        )}
                    </div>
                    
                    <div className="flex-1 overflow-hidden relative" id="print-area">
                        {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} />}
                        {tab === 'micro' && <MicrocycleView days={days} setDays={setDays} themeColor={themeColor} players={players} trainingLog={trainingLog} />}
                        {tab === 'wellness' && <WellnessDashboard players={players} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} />}
                        {tab === 'pse' && <PSEView players={players} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} />}
                        {tab === 'workout' && <WorkoutBuilderView themeColor={themeColor} exercises={exercises} setExercises={setExercises} />}
                        {tab === 'match' && <PreGameView players={players} setPlayers={setPlayers} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} matchMinutes={matchMinutes} setMatchMinutes={setMatchMinutes} />}
                        {tab === 'dm' && <MedicalView players={players} setPlayers={setPlayers} dmRecords={dmRecords} setDmRecords={setDmRecords} themeColor={themeColor} />}
                        {tab === 'assessment' && <AssessmentView players={players} themeColor={themeColor} assessments={assessments} setAssessments={setAssessments} dmRecords={dmRecords} />}

                        {tab === 'preview' && (
                            <AthleteMobilePortal player={players[0] || {name: 'Atleta Demonstração'}} dmStatus={players[0]?.injured ? 'DM' : 'APTO'} themeColor={themeColor} exercises={exercises} isStandalone={false} />
                        )}

                        {tab === 'admin' && isAdmin && (
                            <AdminDashboard themeColor={themeColor} />
                        )}
                    </div>
                </div>
            );
        };

        const CloudWrapper = ({ user, forceAthleteView }) => {
            const [initialData, setInitialData] = useState(null);
            const [loadingCloud, setLoadingCloud] = useState(true);

            useEffect(() => {
                // Se for o Atleta a abrir (simulação por URL), pega um documento de demonstração ou o primeiro que achar (para visualização)
                if (forceAthleteView) {
                    // Para demonstração sem login, vamos usar dados estáticos ou tentar ler público
                    setInitialData(sanitizeCloudData({}));
                    setLoadingCloud(false);
                    return;
                }

                const unsubscribe = db.collection('coachData').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) { setInitialData(sanitizeCloudData(doc.data())); } 
                    else { setInitialData(sanitizeCloudData({})); }
                    setLoadingCloud(false);
                }, err => {
                    console.error("Cloud fetch error:", err);
                    setInitialData(sanitizeCloudData({}));
                    setLoadingCloud(false);
                });
                return () => unsubscribe();
            }, [user, forceAthleteView]);

            if (loadingCloud) return <div className="flex flex-col h-screen w-screen items-center justify-center bg-slate-900 text-slate-300 font-bold"><Icon name="cloud" size={40} className="animate-bounce text-blue-500 mb-4"/>A sincronizar Módulo Blindado...</div>;
            return <ErrorBoundary><MainApp user={user} initialData={initialData} forceAthleteView={forceAthleteView} /></ErrorBoundary>;
        };

        const RootApp = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            
            // VERIFICA SE A URL TEM O PARÂMETRO "?atleta=true"
            const urlParams = new URLSearchParams(window.location.search);
            const isAthleteMode = urlParams.get('atleta') === 'true';

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                    const loader = document.getElementById('loading-state');
                    if(loader) loader.style.display = 'none';
                });
                return () => unsubscribe();
            }, []);

            if (loading) return null;
            
            // Se não tiver login e NÃO for o modo atleta, mostra o login
            if (!user && !isAthleteMode) return <LoginScreen onLogin={() => {}} />;
            
            // Se for modo atleta, ele passa para o wrapper que exibe tela cheia (mesmo sem login, para efeito de demonstração de visual)
            return <CloudWrapper user={user} forceAthleteView={isAthleteMode} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
