<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProCoach Performance Suite</title>
    
    <link rel="manifest" href="manifest.json?v=19">
    <link rel="apple-touch-icon" href="logo.png?v=19">
    <link rel="icon" type="image/png" href="logo.png?v=19">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', }
    </script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { overscroll-behavior-y: contain; touch-action: pan-x pan-y; background-color: #f8fafc; color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s, color 0.3s; }
        body.dark { background-color: #0f172a; color: #f8fafc; }
        .glass-input { background: rgba(255,255,255,0.15); border-radius: 4px; padding: 2px 4px; color: white; outline: none; width: 100%; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 10px; border-radius: 5px; background: #cbd5e1; outline: none; }
        .dark .hooper-slider { background: #334155; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .micro-header { background-color: #1a4a3e; color: white; }
        .dashed-btn { border: 2px dashed #cbd5e1; color: #94a3b8; font-weight: bold; font-size: 9px; width: 100%; padding: 4px; border-radius: 6px; transition: all 0.2s; }
        .dark .dashed-btn { border-color: #475569; color: #cbd5e1; }
        .dashed-btn:hover { border-color: #1a4a3e; color: #1a4a3e; background-color: #f0fdf4; }
        .dark .dashed-btn:hover { border-color: #10b981; color: #10b981; background-color: rgba(16, 185, 129, 0.1); }
        .gauge-container { width: 220px; height: 110px; overflow: hidden; position: relative; margin: 0 auto; }
        .gauge-needle { width: 4px; height: 100px; background: #475569; position: absolute; left: 108px; top: 10px; transform-origin: bottom center; transition: transform 0.5s cubic-bezier(0.4, 2.08, 0.55, 0.44); border-radius: 2px; z-index: 10; }
        .dark .gauge-needle { background: #e2e8f0; }
        .gauge-center { width: 16px; height: 16px; background: #334155; border-radius: 50%; position: absolute; bottom: -8px; left: 102px; z-index: 11; }
        .dark .gauge-center { background: #cbd5e1; }
        .mini-gauge-container { width: 80px; height: 40px; overflow: hidden; position: relative; }
        .mini-gauge-needle { width: 2px; height: 35px; background: #334155; position: absolute; left: 39px; top: 5px; transform-origin: bottom center; transition: transform 0.5s ease-out; border-radius: 1px; z-index: 10; }
        .dark .mini-gauge-needle { background: #cbd5e1; }
        @media print { .no-print { display: none !important; } .page-break { page-break-inside: avoid; } body { background: white !important; color: black !important; -webkit-print-color-adjust: exact; } * { color: black !important; } #print-area { padding: 0; } .overflow-y-auto { overflow: visible !important; height: auto !important; } }
        #loading-state { display: flex; height: 100vh; width: 100vw; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #64748b; flex-direction: column; gap: 10px; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; z-index: 9999; display: none; font-size: 12px; font-weight: bold; white-space: nowrap; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-badge { position: absolute; top: 10px; right: 10px; background: #dcfce7; color: #166534; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .status-badge.show { opacity: 1; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 10px; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col safe-area-inset">
    <div id="toast"></div>
    <div id="root" class="h-full w-full"><div id="loading-state">A iniciar o ProCoach...</div></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const DEFAULT_DAYS = [
            { id: 1, md: 'MD-4', name: 'SEGUNDA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 2, md: 'MD-3', name: 'TERÇA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 3, md: 'MD-2', name: 'QUARTA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 4, md: 'MD-1', name: 'QUINTA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 5, md: 'JOGO', name: 'SEXTA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 6, md: 'MD+1', name: 'SÁBADO', date:'', plannedMins: '', am: [], pm: [] },
            { id: 7, md: 'MD+2', name: 'DOMINGO', date:'', plannedMins: '', am: [], pm: [] }
        ];

        const RTP_PHASES = [ 
            {id:1, label:"Fase 1: Aguda", desc:"Controle do quadro álgico/inflamatório. Fisioterapia."}, 
            {id:2, label:"Fase 2: Sub-aguda", desc:"Reabilitação do segmento lesado + Fortalecimento não envolvidos. Fisioterapia."}, 
            {id:3, label:"Fase 3: Transição I", desc:"Força segmentada (não envolvidos) + Cardio sem impacto. Fisio + Transição."}, 
            {id:4, label:"Fase 4: Transição II", desc:"Funcionais + cardio sem impacto. Força com restrição. Introdução Pliometria/Corrida."}, 
            {id:5, label:"Fase 5: Transição III", desc:"Força sem restrições funcionais. Cardio com impacto. Fisio + Transição Campo."}, 
            {id:6, label:"Fase 6: Performance I", desc:"Potência na Academia. Aceleração e Pliometria sem restrições."}, 
            {id:7, label:"Fase 7: Performance II", desc:"Potência especifica do esporte. Preparação individual e parcial com grupo."}, 
            {id:8, label:"Fase 8: Performance III", desc:"Retorno ao grupo com minutagem controlada em jogo. Liberado treino com o grupo sem restrições."}, 
            {id:9, label:"Fase 9: Liberação", desc:"Responsabilidade do atleta com cuidados antes e após treinos e jogos."} 
        ];
            const getActiveDocId = (uid) => {
            const team = localStorage.getItem('procoach_active_team') || 'pro';
            return team === 'pro' ? uid : `${uid}_${team}`;
        };

        const getAthletePortalUrl = (docId, playerId = '', preview = false) => {
            const url = new URL('atleta.html', window.location.href);
            url.search = '';
            if (docId) url.searchParams.set('id', docId);
            if (playerId) url.searchParams.set('uid', String(playerId));
            if (preview) url.searchParams.set('view', 'coach');
            return url.toString();
        };

        const AnalysisModal = ({ day, onClose, onUpdate }) => {
            const [analysisData, setAnalysisData] = useState({ 
                timeTarget: day.plannedMins || '', 
                pseTarget: day.pseTarget || '' 
            });
            const isHigh = Number(analysisData.timeTarget) > 120 || Number(analysisData.pseTarget) > 8;

            return (
                <div className="fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4 animate-fade-in" onClick={onClose}>
                    <div className="bg-[#1e293b] rounded-2xl shadow-2xl p-6 w-full max-w-sm border border-slate-700" onClick={e=>e.stopPropagation()}>
                        <h3 className="text-xl font-black text-white uppercase mb-6 flex items-center gap-2">
                            <Icon name="brain" className="text-blue-400"/> Análise {day.name}
                        </h3>
                        <div className="grid grid-cols-2 gap-4 mb-6">
                            <input type="number" className="bg-slate-900 p-4 rounded-xl text-white font-black w-full" value={analysisData.timeTarget} onChange={(e) => setAnalysisData({...analysisData, timeTarget: e.target.value})} placeholder="Tempo (min)" />
                            <input type="number" className={`p-4 rounded-xl font-black w-full bg-slate-900 ${analysisData.pseTarget > 8 ? 'text-red-500' : 'text-white'}`} value={analysisData.pseTarget} onChange={(e) => setAnalysisData({...analysisData, pseTarget: e.target.value})} placeholder="PSE (1-10)" />
                        </div>
                        <div className={`mb-6 p-3 rounded-lg text-[11px] font-bold border ${isHigh ? 'bg-red-500/10 text-red-400 border-red-500/20' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20'}`}>
                            {isHigh ? '⚠️ ALERTA: Carga muito alta!' : '✅ Volume controlado.'}
                        </div>
                        <button onClick={() => { onUpdate(day.id, analysisData); onClose(); }} className="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase hover:bg-blue-700">SALVAR E FECHAR</button>
                    </div>
                </div>
            );
        };
 const MicrocycleView = ({ days, setDays, themeColor, players, trainingLog, library }) => {
    const [modalOpen, setModalOpen] = useState(false);
    const [aiModal, setAiModal] = useState(null);
    const [activeSlot, setActiveSlot] = useState({ dayId: null, period: null });
    
    const [customLabel, setCustomLabel] = useState('');
    const [customColor, setCustomColor] = useState('#2563eb');
    const [isExporting, setIsExporting] = useState(false);
    
    const [startDate, setStartDate] = useState(() => {
        const d = new Date();
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
        const monday = new Date(d.setDate(diff));
        return monday.toISOString().split('T')[0];
    });

    const safeDays = days.map(d => ({...d, plannedMins: d.plannedMins || ''}));

    // CÉREBRO DA IA 1: Calcula a Meta de Tempo (Volume)
    const calcularMetaIA = (md) => {
        if (!md) return 0;
        if (md.includes('MD-5')) return 85;
        if (md.includes('MD-4')) return 75;
        if (md.includes('MD-3')) return 65;
        if (md.includes('MD-2')) return 45;
        if (md.includes('MD-1')) return 35;
        if (md.includes('JOGO')) return 90;
        if (md.includes('MD+1') || md.includes('MD+2')) return 40;
        if (md.includes('Resistência')) return 90;
        if (md.includes('Tático')) return 80;
        if (md.includes('Força')) return 65;
        if (md.includes('Velocidade')) return 45;
        if (md.includes('PRÉ')) return 100;
        if (md.includes('FOLGA')) return 0;
        return 55;
    };

    // CÉREBRO DA IA 2: Calcula a Meta de Intensidade (PSE)
    const calcularPseIA = (md) => {
        if (!md) return 0;
        if (md.includes('MD-5')) return 7;
        if (md.includes('MD-4')) return 7;  // Aquisição Força
        if (md.includes('MD-3')) return 8;  // Pico Tático (Alta Intensidade)
        if (md.includes('MD-2')) return 5;  // Polimento / Velocidade
        if (md.includes('MD-1')) return 3;  // Ativação (Baixa Intensidade)
        if (md.includes('JOGO')) return 10; // Esforço Máximo
        if (md.includes('MD+1') || md.includes('MD+2')) return 3; // Recuperação
        if (md.includes('Resistência')) return 8;
        if (md.includes('Tático')) return 6;
        if (md.includes('Força')) return 7;
        if (md.includes('Velocidade')) return 5;
        if (md.includes('PRÉ')) return 8;
        if (md.includes('FOLGA')) return 0;
        return 5;
    };

    const getDayDate = (index) => {
        const date = new Date(startDate + 'T12:00:00'); 
        date.setDate(date.getDate() + index);
        return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
    };

    const getDayDateStr = (index) => {
        const date = new Date(startDate + 'T12:00:00'); 
        date.setDate(date.getDate() + index);
        return date.toISOString().split('T')[0];
    };

    // LÊ DADOS DA ABA PSE (REAL)
    const getTeamMetricsForDate = (dateStr) => {
        if (!trainingLog || !trainingLog[dateStr]) return { load: 0, dur: 0 };
        const playersLog = Object.values(trainingLog[dateStr]);
        let totalLoad = 0;
        let totalDur = 0;
        let countLoad = 0;
        let countDur = 0;
        
        playersLog.forEach(log => {
            const rpeAm = Number(log.rpe_am) || 0;
            const rpePm = Number(log.rpe_pm) || 0;
            const dur = Number(log.duration) || 0;
            const sRpe = (rpeAm + rpePm) * dur;
            
            if (sRpe > 0) { totalLoad += sRpe; countLoad++; }
            if (dur > 0) { totalDur += dur; countDur++; }
        });
        
        return {
            load: countLoad > 0 ? Math.round(totalLoad / countLoad) : 0,
            dur: countDur > 0 ? Math.round(totalDur / countDur) : 0
        };
    };

    const eventTypes = [ 
        { label: 'JOGO', color: 'bg-[#dc2626]', text: 'text-white', load: 100 }, 
        { label: 'RECUPERAÇÃO', color: 'bg-[#3b82f6]', text: 'text-white', load: 20 }, 
        { label: 'ACADEMIA', color: 'bg-[#eab308]', text: 'text-slate-900', load: 40 }, 
        { label: 'FOLGA', color: 'bg-[#94a3b8]', text: 'text-slate-800', load: 0 },
        { label: 'TREINO FÍSICO', color: 'bg-[#16a34a]', text: 'text-white', load: 60 },
        { label: 'TÉCNICO', color: 'bg-[#2563eb]', text: 'text-white', load: 50 }, 
        { label: 'JOGUINHO', color: 'bg-[#ec4899]', text: 'text-white', load: 60 },
        { label: 'ORG. OFENSIVA', color: 'bg-[#0ea5e9]', text: 'text-white', load: 60 }, 
        { label: 'ORG. DEFENSIVA', color: 'bg-[#f97316]', text: 'text-white', load: 60 }, 
        { label: 'TRANS. OFENSIVA', color: 'bg-[#06b6d4]', text: 'text-white', load: 70 }, 
        { label: 'TRANS. DEFENSIVA', color: 'bg-[#f43f5e]', text: 'text-white', load: 70 }, 
        { label: 'ABP OFENSIVA', color: 'bg-[#8b5cf6]', text: 'text-white', load: 30 }, 
        { label: 'ABP DEFENSIVA', color: 'bg-[#d946ef]', text: 'text-white', load: 30 }, 
        { label: 'TÁTICO GERAL', color: 'bg-[#10b981]', text: 'text-white', load: 60 }, 
        { label: 'PDI', color: 'bg-[#14b8a6]', text: 'text-white', load: 40 }
    ];

    const openModal = (dayId, period) => { setActiveSlot({ dayId, period }); setModalOpen(true); };
    
    const addEvent = (typeObj, isCustom = false) => {
        const newDays = safeDays.map(d => {
            if(d.id === activeSlot.dayId) {
                const currentEvents = Array.isArray(d[activeSlot.period]) ? d[activeSlot.period] : [];
                
                let autoDuration = '';
                let autoPse = '';
                if(isCustom && library) {
                    const treinoSalvo = library.find(item => item.title.toUpperCase() === customLabel.trim().toUpperCase());
                    if(treinoSalvo) {
                        autoDuration = treinoSalvo.duration || '';
                        autoPse = treinoSalvo.pse || '';
                    }
                }

                const newEvent = {
                    id: Date.now(),
                    type: isCustom ? customLabel.toUpperCase() : typeObj.label,
                    colorClass: isCustom ? '' : typeObj.color,
                    textClass: isCustom ? 'text-white' : typeObj.text,
                    customColor: isCustom ? customColor : null,
                    load: isCustom ? 50 : typeObj.load,
                    duration: autoDuration,
                    pse: autoPse
                };
                return { ...d, [activeSlot.period]: [...currentEvents, newEvent] };
            }
            return d;
        });
        
        setDays(newDays);
        setModalOpen(false);
        if(isCustom) setCustomLabel('');

        const user = firebase.auth().currentUser;
        const docId = getActiveDocId ? getActiveDocId(user?.uid) : user?.uid;
        if(user) {
            db.collection('coachData').doc(docId).update({ days: newDays }).catch(err => console.error(err));
        }
    };

    const removeEvent = (dayId, period, eventId) => {
        const newDays = safeDays.map(d => d.id === dayId ? { ...d, [period]: (d[period] || []).filter(e => e.id !== eventId) } : d);
        setDays(newDays);
        const user = firebase.auth().currentUser;
        const docId = getActiveDocId ? getActiveDocId(user?.uid) : user?.uid;
        if(user) db.collection('coachData').doc(docId).update({ days: newDays });
    };

    const updateHeader = (dayId, field, val) => {
        const newDays = safeDays.map(d => d.id === dayId ? { ...d, [field]: val } : d);
        setDays(newDays);
        const user = firebase.auth().currentUser;
        const docId = getActiveDocId ? getActiveDocId(user?.uid) : user?.uid;
        if(user) db.collection('coachData').doc(docId).update({ days: newDays });
    };

    const exportToPNG = () => {
        setIsExporting(true);
        showToast("Preparando planejamento...", "#3b82f6");
        setTimeout(async () => {
            const el = document.getElementById('microcycle-board');
            if(!el) { setIsExporting(false); return; }
            try {
                const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#0f172a', useCORS: true });
                canvas.toBlob(blob => {
                    smartShare(blob, `Microciclo_${startDate}.png`, 'Microciclo da Semana');
                    setIsExporting(false);
                });
            } catch(e) {
                setIsExporting(false);
                showToast("Erro ao gerar imagem.", "#ef4444");
            }
        }, 500);
    };

    const renderAiAnalysis = () => {
        if(!aiModal) return null;
        
        const dayIndex = safeDays.findIndex(d => d.id === aiModal.id);
        const dateStr = getDayDateStr(dayIndex !== -1 ? dayIndex : 0);
        const metrics = getTeamMetricsForDate(dateStr);
        
        const sugeridoTempo = Number(calcularMetaIA(aiModal.md)) || 0;
        const sugeridoPse = Number(calcularPseIA(aiModal.md)) || 0;
        const metaCarga = sugeridoTempo * sugeridoPse;
        const minsReal = metrics.dur;

        let feedback = metrics.load === 0 ? `Aguardando a execução do treino para emitir parecer.` : 
                       metrics.load > metaCarga * 1.15 ? "⚠️ Carga executada está ALTA! Considere reduzir o volume/intensidade no próximo dia." :
                       metrics.load < metaCarga * 0.85 ? "📉 Carga executada está BAIXA em relação ao planejado." :
                       "✅ Treino executado dentro da meta de excelência.";

        return (
            <div className="fixed inset-0 bg-black/80 z-[99999] flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setAiModal(null)}>
                <div className="bg-[#1e293b] p-6 rounded-3xl w-full max-w-sm border border-slate-700 shadow-2xl relative" onClick={e => e.stopPropagation()}>
                    <h3 className="text-xl font-black text-white text-center mb-6">ANÁLISE {aiModal.name} ({aiModal.md})</h3>
                    
                    <div className="grid grid-cols-2 gap-2 mb-6">
                        <div className="bg-slate-900 p-4 rounded-xl text-center border border-blue-500/30">
                            <p className="text-[10px] text-blue-400 font-bold uppercase">Meta de Carga (IA)</p>
                            <div className="text-2xl font-black text-white">{metaCarga} <span className="text-xs">U.A.</span></div>
                            <p className="text-[8px] text-slate-500 mt-1 uppercase">{sugeridoTempo}m x PSE {sugeridoPse}</p>
                        </div>
                        <div className="bg-slate-900 p-4 rounded-xl text-center border border-orange-500/30">
                            <p className="text-[10px] text-orange-400 font-bold uppercase">Carga Real</p>
                            <div className="text-2xl font-black text-white">{metrics.load} <span className="text-xs">U.A.</span></div>
                            <p className="text-[8px] text-slate-500 mt-1 uppercase">{minsReal}m executados</p>
                        </div>
                    </div>

                    <div className="bg-slate-700 p-3 rounded-lg text-xs font-bold text-white mb-4 text-center">
                        {feedback}
                    </div>
                    
                    <button onClick={()=>setAiModal(null)} className="w-full bg-blue-600 py-4 rounded-xl font-black text-white uppercase hover:bg-blue-500 transition-all shadow-lg">Fechar Painel</button>
                </div>
            </div>
        );
    };

    const getThermoColor = (md) => {
        if (!md) return 'bg-[#1a4a3e] text-white';
        if(md.includes('MD-3') || md.includes('Resistência')) return 'bg-red-600 text-white';
        if(md.includes('MD-4') || md.includes('MD-5') || md.includes('Força')) return 'bg-orange-600 text-white';
        if(md.includes('MD-2') || md.includes('Velocidade')) return 'bg-yellow-500 text-slate-900';
        if(md.includes('MD-1') || md.includes('Tático')) return 'bg-emerald-500 text-white';
        if(md.includes('MD+1') || md.includes('MD+2')) return 'bg-blue-500 text-white';
        if(md.includes('JOGO')) return 'bg-slate-950 text-yellow-400 border-b-2 border-yellow-500';
        if(md.includes('PRÉ')) return 'bg-purple-700 text-white';
        if(md.includes('FOLGA')) return 'bg-slate-500 text-white';
        return 'bg-[#1a4a3e] text-white';
    };

    return (
        <div className="h-full bg-slate-900 flex flex-col relative overflow-hidden animate-fade-in">
            {renderAiAnalysis()}
            <div className="bg-[#0f172a] p-4 border-b border-slate-800 flex justify-between items-center shrink-0">
                <div className="flex flex-col">
                    <h2 className="font-black text-lg text-white italic flex gap-2 uppercase">
                        <Icon name="calendar" className="not-italic text-blue-500"/> Planeamento Semanal
                    </h2>
                    <div className="flex items-center gap-2 mt-1">
                        <span className="text-[9px] font-bold text-slate-500 uppercase">Início da Semana:</span>
                        <input type="date" className="bg-slate-800 text-white text-[10px] font-black p-1 rounded border border-slate-700 outline-none" value={startDate} onChange={(e) => setStartDate(e.target.value)} />
                    </div>
                </div>
                <div className="flex gap-2">
                    <button onClick={exportToPNG} disabled={isExporting} className="bg-slate-800 text-white px-3 py-1.5 rounded-lg text-xs font-black flex items-center gap-2 border border-slate-700 hover:bg-slate-700 transition-colors">
                        {isExporting ? <Icon name="refresh" className="animate-spin" size={14}/> : <><Icon name="share" size={14}/> CARD WPP</>}
                    </button>
                </div>
            </div>

        const PSEView = ({ players, themeColor, trainingLog, setTrainingLog }) => {

                });

            const saveToMain = (currentLocal) => { 
                setSaveStatus('A Guardar...'); 
                const newLog = {...trainingLog}; 
                if(!newLog[date]) newLog[date] = {}; 
                safeArray(players).forEach((_, i) => { 
                    if(!newLog[date][i]) newLog[date][i] = {}; 
                    newLog[date][i].rpe_am = currentLocal[i].am; 
                    newLog[date][i].rpe_pm = currentLocal[i].pm; 
                    newLog[date][i].duration = currentLocal[i].dur;
                }); 
                setTrainingLog(newLog); 
                setTimeout(() => setSaveStatus('Salvo'), 500); 
                setTimeout(() => setSaveStatus(''), 2000); 
            };

            const updateRPE = (i, field, val) => { 
                const newValue = parseInt(val) || 0; 
                setLocalRPEs(prev => { 
                    const next = {...prev, [i]: {...(prev[i]||{am:0, pm:0}), [field]: newValue}}; 
                    if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current); 
                    saveTimeoutRef.current = setTimeout(() => { saveToMain(next); }, 1000); 
                    return next; 
                });

            const applyGlobalDur = (val) => {

                const num = parseInt(val) || 0;
                setLocalRPEs(prev => {
                    const next = {};
                    safeArray(players).forEach((_, i) => {
                        next[i] = { ...(prev[i] || {am:0, pm:0}), dur: num };

                    if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
                    saveTimeoutRef.current = setTimeout(() => { saveToMain(next); }, 1000);

     const PreGameView = ({ players, setPlayers, themeColor, trainingLog, dmRecords, matchMinutes, setMatchMinutes, getActiveDocId }) => {
            const [monitorDate, setMonitorDate] = useState(getTodayStr()); 
            const dailyData = safeObj(trainingLog[monitorDate]);
           const safePs = safeArray(players);
            const [showTacticalBoard, setShowTacticalBoard] = useState(false);
            
            const weeklyLoadStats = useMemo(() => {
                const dates = getDatesInRange(monitorDate, 7);
                let currentAccumulatedLoad = 0;

                dates.forEach(d => {
                    safePs.forEach((_, i) => {
                        currentAccumulatedLoad += calcDailyLoad(safeObj(trainingLog[d]?.[i]));
                    });
                });

                const avgLoadPerAtleta = safePs.length > 0 ? currentAccumulatedLoad / safePs.length : 0;
                const limit = 2800;
                const percentage = Math.min(100, (avgLoadPerAtleta / limit) * 100);
                
                let statusColor = "bg-green-500";
                let statusText = "ZONA SEGURA";
                if (percentage > 85) { 
                    statusColor = "bg-red-600 animate-pulse"; 
                    statusText = "ALERTA: SOBRECARGA NO ELENCO"; 
                } else if (percentage > 65) { 
                    statusColor = "bg-yellow-500"; 
                    statusText = "ATENÇÃO: CARGA ACUMULADA"; 
                }

                return { percentage, statusColor, statusText, avgLoadPerAtleta };
            }, [trainingLog, monitorDate, safePs]);

            // INTELIGÊNCIA ACWR: Painel Consolidado do Elenco
          // INTELIGÊNCIA ACWR CORRIGIDA: Painel Consolidado do Elenco
           // INTELIGÊNCIA ACWR CORRIGIDA: Painel Consolidado do Elenco
const acwrGroups = useMemo(() => {
    const groups = { danger: [], optimal: [], under: [] };
    safePs.forEach((p, i) => {
        if(!p || p.injured) return;
        const chronicDates = getDatesInRange(monitorDate, 28);
        let acuteLoad = 0; 
        let chronicLoadTotal = 0;
        let daysWithLoad = 0; // Contador de trava de segurança

        chronicDates.forEach((d, index) => {
            const dailyL = calcDailyLoad(trainingLog[d]?.[i]);
            if(dailyL > 0) { 
                chronicLoadTotal += dailyL; 
                daysWithLoad++; // Conta apenas dias com treino registrado
                if(index < 7) acuteLoad += dailyL; 
            }
        });
        
        // Só calculamos se o atleta tiver ao menos 14 dias de histórico real
        if (daysWithLoad >= 14 && chronicLoadTotal > 0) {

  const LibraryView = ({ themeColor, library, setLibrary, initialData, user }) => {

            const [batchCategory, setBatchCategory] = useState(categories[0]);

            // NOVO V145 MAX: Estado para o Editor de Mídia
            const [editModalItem, setEditModalItem] = useState(null);

            useEffect(() => {
                if(user) db.collection('coachData').doc(getActiveDocId(user.uid)).set({ customCategories: categories }, { merge: true });
            }, [categories, user]);

            const exportFolder = () => {
                if(filter === 'Todas') return alert("Por favor, selecione uma pasta específica para exportar.");
                const folderContent = library.filter(l => l.category === filter);
                if(folderContent.length === 0) return alert("Esta pasta está vazia.");

                const dataToExport = { appName: "ProCoach_V144MAX", category: filter, content: folderContent };
                const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `PASTA_${filter.toUpperCase().replace(/\s/g, '_')}_PROCOACH.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast("Pasta exportada com sucesso!");
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if(!importedData.content) throw new Error();
                        if(!categories.includes(importedData.category)) setCategories([...categories, importedData.category]);
                        const currentUrls = new Set(library.map(i => i.gifUrl || i.videoUrl));
                        const newItems = importedData.content.filter(i => !currentUrls.has(i.gifUrl || i.videoUrl));
                        setLibrary([...newItems, ...library]);
                        showToast(`${newItems.length} análises importadas!`, "#10b981");
                    } catch(err) {
                        alert("Erro ao importar: Arquivo inválido.");
                    }
                };
                reader.readAsText(file);

            if(stats.sleep) { totalFatigue += (Number(stats.fatigue) || 1) + (Number(stats.soreness) || 1); count++; }
        });
        const avg = count > 0 ? totalFatigue / count : 0;
        if (avg >= 10) return "🚨 IA: CRIOTERAPIA OBRIGATÓRIA (FADIGA CRÍTICA)";
        if (avg >= 7) return "⚠️ IA: BANHEIRA DE GELO (FADIGA ALTA)";
        return "✅ IA: RECUPERAÇÃO LIVRE (TIME PRONTO)";
    };

    const addTarget = () => {

    const importFromDate = () => {

            if(doc.exists){
                const pastWorkout = doc.data().exerciseHistory?.[sessionDate];
                if(pastWorkout && pastWorkout.length > 0){ setExercises(pastWorkout); showToast("Treino importado com sucesso!", "#10b981"); } 
                else { showToast("Nenhum treino encontrado nesta data.", "#eab308"); }
            }
        });
    };

    const fixWorkoutForToday = () => {
        db.collection('coachData').doc(getActiveDocId(user.uid)).set({ exerciseHistory: { [sessionDate]: exercises } }, { merge: true }).then(() => {

        });
    };

    const exportarPDF = async () => {
        showToast("Gerando Ficha Padrão Europeu...", "#3b82f6");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const pageWidth = doc.internal.pageSize.getWidth();
        
        const customCoach = document.getElementById('pdfCoachName')?.value || "Adriano Cabeça";
        const customHeaderColor = document.getElementById('pdfHeaderColor')?.value || "#1e293b";
        const customBarColor = document.getElementById('pdfBarColor')?.value || "#047857";
        const teamName = initialData?.header?.teamName || "AC NOVA GERAÇÃO"; 
        const logoUrl = initialData?.logo;
        
        let tempoTotal = 0;
        if (exercises && exercises.length > 0) {
            exercises.forEach(ex => { tempoTotal += parseInt(ex.duration) || 0; });
        }

        doc.setFillColor(customHeaderColor); 
        doc.rect(0, 0, pageWidth, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(20);
        doc.setFont("helvetica", "bold");
        doc.text(teamName, 20, 20);
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        const today = new Date().toLocaleDateString('pt-BR');
        doc.text(`PLANO DE TREINO | DATA: ${today} | DURAÇÃO: ${tempoTotal > 0 ? tempoTotal + ' MIN' : '-'}`, 20, 28);
        doc.text(`TREINADOR: ${customCoach.toUpperCase()}`, 20, 34);

        if (logoUrl) {
            try {
                const imgLogo = new Image();
                imgLogo.crossOrigin = "Anonymous";
                imgLogo.src = logoUrl;
                await new Promise((resolve) => { imgLogo.onload = resolve; imgLogo.onerror = resolve; });
                doc.addImage(imgLogo, 'PNG', pageWidth - 45, 5, 30, 30);
            } catch (e) { console.log("Erro logo PDF", e); }
        }

        let y = 50;

        if (!exercises || exercises.length === 0) {
            doc.setTextColor(0, 0, 0);
            doc.text("Nenhum exercício cadastrado para a sessão.", 20, y);
            doc.save("Plano_de_Treino.pdf");
            return;
        }

        for (let i = 0; i < exercises.length; i++) {
            const ex = exercises[i];
            if (y > 230) { doc.addPage(); y = 20; }

            doc.setDrawColor(200, 200, 200);
            doc.setFillColor(248, 250, 252);
            doc.rect(15, y, pageWidth - 30, 80, 'FD');
            doc.setFillColor(customBarColor); 
            doc.rect(15, y, pageWidth - 30, 10, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            const titulo = ex.target || ex.title || ex.name || "ATIVIDADE SEM NOME";
            const tempo = ex.duration ? `${ex.duration} MIN` : "-";
            doc.text(`${i + 1}. ${titulo.toUpperCase()}`, 20, y + 7);
            doc.text(tempo, pageWidth - 35, y + 7);

            doc.setTextColor(50, 50, 50);
            doc.setFontSize(9);
            doc.setFont("helvetica", "bold");
            doc.text("Estrutura:", 20, y + 18);
            doc.setFont("helvetica", "normal");
            doc.text(`${ex.blocks || ex.sets || '-'} Séries x ${ex.duration || ex.reps || '-'} | Pausa: ${ex.rest || '-'}`, 40, y + 18);

            doc.setFont("helvetica", "bold");
            doc.text("Pontos-Chave e Comportamentos:", 20, y + 26);
            doc.setFont("helvetica", "normal");
            const notas = doc.splitTextToSize(ex.notes || ex.description || ex.objective || "Sem observações detalhadas.", 85);
            doc.text(notas, 20, y + 32);

            if (ex.gifUrl) {
                try {
                    const imgBoard = new Image();
                    imgBoard.crossOrigin = "Anonymous";
                    imgBoard.src = ex.gifUrl;
                    await new Promise((resolve) => { imgBoard.onload = resolve; imgBoard.onerror = resolve; });
                    doc.addImage(imgBoard, 'JPEG', 110, y + 14, 80, 60); 
                } catch (e) {
                    doc.setDrawColor(220); doc.rect(110, y + 14, 80, 60); doc.text("Sem Prancheta", 135, y + 45);
                }
            } else {
                doc.setDrawColor(220); doc.rect(110, y + 14, 80, 60); doc.text("Sem Prancheta", 135, y + 45);
            }
            y += 85; 
        }

        doc.save(`Ficha_de_Treino_${today.replace(/\//g, '-')}.pdf`);
        showToast("Ficha gerada com sucesso!", "#10b981");
    }

                        <button onClick={saveExercise} className={`flex-1 text-white font-black py-4 rounded-xl shadow-md transition-all uppercase tracking-widest ${editId ? 'bg-yellow-500 hover:bg-yellow-400' : trainingType === 'academia' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-emerald-600 hover:bg-emerald-700'}`}>

            <div className="flex justify-between items-center mb-2 px-2 no-print">
               {/* PAINEL DE IMPRESSÃO AVANÇADO */}
                <div className="w-full bg-slate-900/50 p-4 rounded-xl border border-slate-700/50 mb-2 flex flex-col md:flex-row items-center justify-between gap-4">
                    <div className="flex flex-wrap items-center gap-4 w-full md:w-auto">

                                <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">Cor Tarja</label>

                    <button onClick={exportarPDF} className="bg-blue-600 hover:bg-blue-500 transition-colors text-white px-6 py-3 rounded-lg text-xs font-black uppercase flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20 w-full md:w-auto shrink-0">
                        <Icon name="download" size={16}/> GERAR FICHA PDF
                    </button>

            </div>

            <div className="grid grid-cols-1 gap-3">
                {exercises.map((ex, idx) => (
                    <div key={ex.id} className="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 flex flex-col md:flex-row items-start md:items-center justify-between group shadow-sm gap-4">
                        <div className="flex items-start md:items-center gap-4 w-full">
                            <div className="bg-slate-100 dark:bg-slate-700 w-10 h-10 rounded-full flex items-center justify-center font-black text-slate-500 shrink-0">{ex.order || idx + 1}</div>
                            
                            {/* MINIATURA DA IMAGEM NA LISTA */}
                            {(ex.gifUrl || getYouTubeThumb(ex.videoUrl)) && (
                                <div className="w-20 h-16 rounded-lg overflow-hidden shrink-0 border border-slate-200 dark:border-slate-600 shadow-inner bg-slate-100 dark:bg-slate-900">

                            <div className="flex-1">
                                <div className="flex flex-wrap items-center gap-2 mb-1">
                                    <span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded ${ex.period === 'pm' ? 'bg-orange-100 text-orange-600 dark:bg-orange-900/30 dark:text-orange-400' : 'bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400'}`}>
                                        {ex.period === 'pm' ? '⛅ TARDE' : '☀️ MANHÃ'}
                                    </span>
                                    <span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded ${ex.type === 'campo' ? 'bg-emerald-100 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400' : 'bg-purple-100 text-purple-600 dark:bg-purple-900/30 dark:text-purple-400'}`}>
                                        {ex.type === 'campo' ? '⚽ CAMPO' : '🏋️ ACADEMIA'}
                                    </span>
                                    {ex.videoUrl && (
                                        <a href={ex.videoUrl} target="_blank" rel="noopener noreferrer" title="Assistir Vídeo Tático" className="bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400 px-2 py-0.5 rounded flex items-center gap-1 text-[9px] font-black uppercase hover:scale-105 transition-transform">
                                            <Icon name="play" size={10}/> VÍDEO
                                        </a>
                                    )}
                                </div>
                                <div className="font-bold text-slate-800 dark:text-white uppercase leading-tight text-sm">{ex.title} <span className="text-[10px] text-slate-400 font-normal ml-1">({ex.target})</span></div>
                                
                                <div className="flex flex-wrap gap-2 mt-1.5">
                                    <div className="text-[10px] text-slate-500 font-bold bg-slate-100 dark:bg-slate-900 border dark:border-slate-700 px-2 py-0.5 rounded inline-block">

                                    </div>
                                    {(ex.duration || ex.pse) && (
                                        <div className="text-[10px] text-blue-600 dark:text-blue-400 font-bold bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 px-2 py-0.5 rounded inline-block">

                                {ex.description && <div className="text-[10px] text-slate-500 dark:text-slate-400 mt-1.5 bg-slate-50 dark:bg-slate-900/50 p-2 rounded border border-slate-100 dark:border-slate-800 leading-tight"><strong>Ponto Chave: </strong>{ex.description}</div>}
                                {ex.objective && <div className="text-[10px] text-emerald-600 dark:text-emerald-400 mt-1 font-bold"><i className="fa-solid fa-bullseye"></i> Foco: {ex.objective}</div>}

                                <Icon name="trash" size={18}/>

                ))}
                {exercises.length === 0 && (
                    <div className="text-center p-8 text-slate-400 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-xl font-bold mt-2">

                )}

    );
};
       
const TacticalBoardModal = ({ players, onClose, themeColor, opponent, matchDate }) => {
    const safePlayers = Array.isArray(players) ? players.filter(p => p) : [];
    const [fieldPlayers, setFieldPlayers] = useState([]);
    const [bench, setBench] = useState(safePlayers.filter(p => !p.injured).map((p,i)=>({ ...p, idx: `own_${i}`, isOpp: false })));
    
    // Adversários e Escudo
    const [oppLogo, setOppLogo] = useState('');
    const [oppBench, setOppBench] = useState(Array.from({length: 11}, (_, i) => ({
        idx: `opp_${i}`,
        name: `ADV ${i+1}`,
        isOpp: true,
        number: i+1
    })));
    const [activeTab, setActiveTab] = useState('own');

    const [isExporting, setIsExporting] = useState(false);
    const [selectedFieldPlayer, setSelectedFieldPlayer] = useState(null);

    const handleDragStart = (e, p, fromField) => {
        e.dataTransfer.setData('text/plain', JSON.stringify({ ...p, fromField }));
    };

    const handleDropOnField = (e) => {
        e.preventDefault();
        const dataStr = e.dataTransfer.getData('text/plain');
        if(!dataStr) return;
        const data = JSON.parse(dataStr);
        const rect = e.currentTarget.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        if (!data.fromField) {
            if(data.isOpp) setOppBench(b => b.filter(item => item.idx !== data.idx));
            else setBench(b => b.filter(item => item.idx !== data.idx));
        } else {
            setFieldPlayers(f => f.filter(item => item.idx !== data.idx));
        }
        const existingPlayer = fieldPlayers.find(item => item.idx === data.idx);
        setFieldPlayers(f => [...f, { ...(existingPlayer || data), x, y, fromField: true }]);
    };

    const handleDropOnBench = (e) => {
        e.preventDefault();
        const dataStr = e.dataTransfer.getData('text/plain');
        if(!dataStr) return;
        const data = JSON.parse(dataStr);
        if (data.fromField) {
            setFieldPlayers(f => f.filter(item => item.idx !== data.idx));
            if (data.isOpp) setOppBench(b => [...b, data]);
            else setBench(b => [...b, data]);
        }
    };

    const exportBoard = async () => {
        setIsExporting(true);
        setSelectedFieldPlayer(null); 
        const el = document.getElementById('export-pitch-area');
        if(!el) return setIsExporting(false);
        try {
            const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#0f172a' });
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Relatorio_${opponent || 'Adversario'}_${matchDate}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                setIsExporting(false);
            });
        } catch(e) {
            setIsExporting(false);
            alert("Erro ao exportar imagem.");
        }
    };

    const renameOpponent = (idx, newName) => {
        setOppBench(b => b.map(o => o.idx === idx ? { ...o, name: newName } : o));
        setFieldPlayers(f => f.map(o => o.idx === idx ? { ...o, name: newName } : o));
    };

    const updateFieldStats = (idx, stat, val) => {
        setFieldPlayers(f => f.map(p => {
            if(p.idx === idx) {
                if(stat === 'rating') return { ...p, rating: val };
                const newStats = { ...(p.stats || { g:0, a:0, yc:0, rc:0 }) };
                newStats[stat] = val;
                return { ...p, stats: newStats };
            }
            return p;
        }));
    };

    return (
        <div className="fixed inset-0 bg-slate-950/95 z-[99999] flex flex-col xl:flex-row p-4 gap-4 animate-fade-in pointer-events-auto">
            <button onClick={onClose} className="xl:hidden absolute top-4 right-4 bg-slate-800 text-white p-2 rounded-full z-50"><Icon name="x"/></button>

            <div className="flex-1 flex flex-col items-center justify-center overflow-hidden relative">
                <div id="export-pitch-area" className="w-full max-w-5xl bg-slate-900 rounded-3xl border-4 p-5 shadow-2xl relative" style={{borderColor: themeColor}}>
                    
                    <div className="flex justify-between items-center mb-5">
                        <div className="flex items-center gap-4">
                            {!isExporting && (
                                <div className="w-16 h-16 rounded-xl bg-slate-800 border-2 border-slate-700 flex items-center justify-center cursor-pointer overflow-hidden shadow-inner group relative" onClick={() => {const u = prompt('URL do Escudo do Adversário (Imagem):'); if(u) setOppLogo(u);}}>
                                    {oppLogo ? <img src={oppLogo} className="w-full h-full object-contain p-1" /> : <Icon name="image" size={24} className="text-slate-500"/>}
                                    <div className="absolute inset-0 bg-black/50 hidden group-hover:flex items-center justify-center text-[8px] font-black text-white text-center leading-tight">MUDAR<br/>ESCUDO</div>
                                </div>
                            )}
                            {isExporting && oppLogo && (
                                <div className="w-16 h-16 flex items-center justify-center bg-slate-800 rounded-xl p-1"><img src={oppLogo} className="w-full h-full object-contain" /></div>
                            )}
                            <div>
                                <h2 className="text-white font-black text-2xl uppercase italic drop-shadow-md">Match Report</h2>
                                <p className="text-slate-400 text-[11px] font-bold uppercase tracking-widest">vs <span className="text-red-400">{opponent || 'Adversário'}</span> | {formatDateBR(matchDate)}</p>
                            </div>
                        </div>
                        <div className="text-right">
                            <h3 className="font-black text-xl uppercase tracking-widest drop-shadow-md" style={{color: themeColor}}>Starting XI & Stats</h3>
                        </div>
                    </div>

                    {/* CAMPO HORIZONTAL MELHORADO */}
                    <div 
                        onDragOver={e => e.preventDefault()} 
                        onDrop={handleDropOnField} 
                        onClick={(e) => { if(e.target === e.currentTarget) setSelectedFieldPlayer(null); }}
                        className="w-full aspect-[1.6/1] bg-[#228B22] relative overflow-hidden rounded-lg shadow-[inset_0_0_50px_rgba(0,0,0,0.5)] border-2 border-white/20"
                        style={{ backgroundImage: 'repeating-linear-gradient(90deg, transparent, transparent 10%, rgba(0,0,0,0.08) 10%, rgba(0,0,0,0.08) 20%)' }}
                    >
                        <svg className="absolute inset-0 w-full h-full pointer-events-none opacity-80" viewBox="0 0 120 80" preserveAspectRatio="none">
                            <rect x="4" y="4" width="112" height="72" fill="none" stroke="white" strokeWidth="0.5"/>
                            <line x1="60" y1="4" x2="60" y2="76" stroke="white" strokeWidth="0.5"/>
                            <circle cx="60" cy="40" r="10" fill="none" stroke="white" strokeWidth="0.5"/>
                            <circle cx="60" cy="40" r="0.5" fill="white"/>
                            
                            <rect x="4" y="18" width="18" height="44" fill="none" stroke="white" strokeWidth="0.5"/>
                            <rect x="4" y="30" width="6" height="20" fill="none" stroke="white" strokeWidth="0.5"/>
                            <path d="M 22 33 A 10 10 0 0 1 22 47" fill="none" stroke="white" strokeWidth="0.5"/>
                            <circle cx="15" cy="40" r="0.5" fill="white"/>

                            <rect x="98" y="18" width="18" height="44" fill="none" stroke="white" strokeWidth="0.5"/>
                            <rect x="110" y="30" width="6" height="20" fill="none" stroke="white" strokeWidth="0.5"/>
                            <path d="M 98 33 A 10 10 0 0 0 98 47" fill="none" stroke="white" strokeWidth="0.5"/>
                            <circle cx="105" cy="40" r="0.5" fill="white"/>
                        </svg>

                        {fieldPlayers.map(p => {
                            const isSelected = selectedFieldPlayer === p.idx;
                            const g = p.stats?.g || 0;
                            const a = p.stats?.a || 0;
                            const yc = p.stats?.yc || 0;
                            const rc = p.stats?.rc || 0;
                            const rating = p.rating || '';

                            return (
                                <div 
                                    key={p.idx} 
                                    draggable 
                                    onDragStart={(e) => handleDragStart(e, p, true)}
                                    onClick={(e) => { e.stopPropagation(); setSelectedFieldPlayer(isSelected ? null : p.idx); }}
                                    className={`absolute flex flex-col items-center justify-center cursor-grab active:cursor-grabbing z-10 -translate-x-1/2 -translate-y-1/2 transition-transform ${isSelected ? 'scale-125 z-50' : 'hover:scale-110'}`}
                                    style={{ left: `${p.x}%`, top: `${p.y}%` }}
                                >
                                    <div 
                                        className={`w-10 h-10 rounded-full border-[3px] shadow-[0_4px_10px_rgba(0,0,0,0.6)] flex items-center justify-center text-sm font-black text-white overflow-hidden bg-cover bg-center ${p.isOpp ? 'border-red-500' : 'border-white'}`} 
                                        style={{ backgroundColor: p.isOpp ? '#dc2626' : themeColor, backgroundImage: p.image ? `url(${p.image})` : (p.isOpp && oppLogo ? `url(${oppLogo})` : 'none') }}
                                    >
                                        {(!p.image && (!p.isOpp || !oppLogo)) && (p.number || (p.name || 'X').substring(0,2).toUpperCase())}
                                    </div>
                                    
                                    <span className="bg-slate-900/90 backdrop-blur-sm text-white px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider mt-1 z-10 shadow-md border border-slate-700 whitespace-nowrap">
                                        {(p.name || 'Atleta').split(' ')[0]}
                                    </span>

                                    {(g > 0 || a > 0 || yc > 0 || rc > 0 || rating) && (
                                        <div className="absolute top-full mt-5 flex gap-1 bg-black/80 backdrop-blur-md rounded-full px-2 py-1 items-center shadow-lg border border-white/10 whitespace-nowrap">
                                            {g > 0 && <span className="text-[10px] drop-shadow-md">⚽{g > 1 ? g : ''}</span>}
                                            {a > 0 && <span className="text-[10px] drop-shadow-md">👟{a > 1 ? a : ''}</span>}
                                            {yc > 0 && <span className="text-[10px] text-yellow-400 drop-shadow-md">🟨</span>}
                                            {rc > 0 && <span className="text-[10px] text-red-500 drop-shadow-md">🟥</span>}
                                            {rating && <span className="text-[10px] text-emerald-400 font-black ml-1">⭐ {rating}</span>}
                                        </div>
                                    )}

                                    {isSelected && !isExporting && (

                                            <div className="flex justify-between items-center">
                                                <span className="text-xs font-bold text-white flex items-center gap-1">⭐ Nota:</span>
                                                <input type="number" step="0.1" max="10" value={p.rating || ''} onChange={e => updateFieldStats(p.idx, 'rating', e.target.value)} className="w-14 bg-slate-900 border border-slate-600 rounded text-center text-xs text-white font-bold p-1 outline-none focus:border-blue-500"/>
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <span className="text-xs font-bold text-white flex items-center gap-1">⚽ Gols:</span>

                                            </div>
                                            <div className="flex justify-between items-center">
                                                <span className="text-xs font-bold text-white flex items-center gap-1">🟨 Amarelos:</span>
                                                <input type="number" min="0" value={p.stats?.yc || ''} onChange={e => updateFieldStats(p.idx, 'yc', parseInt(e.target.value)||0)} className="w-14 bg-slate-900 border border-slate-600 rounded text-center text-xs text-white font-bold p-1 outline-none focus:border-blue-500"/>
                                            </div>
                                            
                                            <button onClick={() => {
                                                setFieldPlayers(f => f.filter(item => item.idx !== p.idx));

                                                setSelectedFieldPlayer(null);
                                            }} className="mt-2 bg-red-600/20 text-red-400 border border-red-500/30 w-full py-2 rounded text-[10px] font-black uppercase hover:bg-red-600 hover:text-white transition-colors">
                                                Remover do Campo
                                            </button>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>

            {/* PAINEL LATERAL DE JOGADORES COM BOTÃO VOLTAR */}
            <div className="w-full xl:w-80 bg-slate-800 rounded-3xl flex flex-col border border-slate-700 h-64 xl:h-auto shrink-0 shadow-2xl overflow-hidden relative">
                
                <div className="flex w-full bg-slate-900 shrink-0">
                    <button onClick={() => setActiveTab('own')} className={`flex-1 py-4 text-xs font-black uppercase tracking-widest transition-colors border-b-4 ${activeTab === 'own' ? 'border-blue-500 text-white bg-slate-800' : 'border-transparent text-slate-500 hover:text-slate-300'}`}>
                        Meu Elenco
                    </button>
                    <button onClick={() => setActiveTab('opp')} className={`flex-1 py-4 text-xs font-black uppercase tracking-widest transition-colors border-b-4 ${activeTab === 'opp' ? 'border-red-500 text-white bg-slate-800' : 'border-transparent text-slate-500 hover:text-slate-300'}`}>
                        Adversário
                    </button>
                </div>
                
                <div 
                    onDragOver={e => e.preventDefault()} 
                    onDrop={handleDropOnBench}
                    className="flex-1 overflow-y-auto custom-scroll bg-slate-800 p-4 grid grid-cols-5 md:grid-cols-8 xl:grid-cols-3 gap-4 content-start"
                >
                    {activeTab === 'own' ? (
                        <>
                            {bench.map(p => (
                                <div 
                                    key={p.idx} 
                                    draggable 
                                    onDragStart={(e) => handleDragStart(e, p, false)}
                                    className="flex flex-col items-center gap-1 cursor-grab active:cursor-grabbing hover:scale-105 transition-transform"
                                >
                                    <div className="w-10 h-10 rounded-full border-[3px] border-slate-500 bg-slate-700 flex items-center justify-center text-white text-xs font-black shadow-md overflow-hidden">
                                        {p.image ? <img src={p.image} className="w-full h-full object-cover pointer-events-none"/> : (p.number || (p.name || 'X').substring(0,2).toUpperCase())}
                                    </div>
                                    <span className="text-[8px] font-bold text-slate-400 uppercase w-full text-center truncate">{(p.name || 'Atleta').split(' ')[0]}</span>
                                </div>
                            ))}
                            {bench.length === 0 && <div className="col-span-full text-center text-xs text-slate-500 font-bold p-4 mt-10">Todos em campo!</div>}
                        </>
                    ) : (
                        <>
                            {oppBench.map(p => (
                                <div 
                                    key={p.idx} 
                                    draggable 
                                    onDragStart={(e) => handleDragStart(e, p, false)}
                                    className="flex flex-col items-center gap-1 cursor-grab active:cursor-grabbing hover:scale-105 transition-transform group relative"
                                >
                                    <div className="w-10 h-10 rounded-full border-[3px] border-red-500 bg-slate-900 flex items-center justify-center text-white text-xs font-black shadow-md overflow-hidden p-0.5">
                                        {oppLogo ? <img src={oppLogo} className="w-full h-full object-contain pointer-events-none"/> : p.number}
                                    </div>
                                    <BufferedInput 
                                        className="text-[8px] font-bold text-red-400 uppercase w-full text-center bg-transparent border-b border-dashed border-red-400/50 outline-none hover:border-red-400"
                                        value={p.name}
                                        onSave={(val) => renameOpponent(p.idx, val)}
                                    />
                                </div>
                            ))}
                            {oppBench.length === 0 && <div className="col-span-full text-center text-xs text-slate-500 font-bold p-4 mt-10">Time adversário em campo!</div>}
                        </>
                    )}
                </div>

                <div className="p-4 bg-slate-900 shrink-0 flex flex-col gap-2">
                    <button onClick={exportBoard} disabled={isExporting} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-xl flex items-center justify-center gap-2 uppercase tracking-widest shadow-lg active:scale-95 transition-all text-xs">
                        {isExporting ? <Icon name="refresh" className="animate-spin"/> : <Icon name="share"/>}
                        {isExporting ? 'GERANDO MATCH REPORT...' : 'EXPORTAR RELATÓRIO PDF/IMG'}
                    </button>
                    {/* BOTAO RETORNAR */}
                    <button onClick={onClose} className="w-full bg-slate-700 hover:bg-slate-600 text-white font-black py-3 rounded-xl flex items-center justify-center gap-2 uppercase tracking-widest shadow-lg active:scale-95 transition-all text-xs">
                        ← VOLTAR AO PAINEL
                    </button>
                </div>
            </div>
        </div>
    );
};
 const GameDayView = ({ players, setPlayers, themeColor, matchMinutes, setMatchMinutes, user, exercises, library, trainingLog }) => {
    const [matchDate, setMatchDate] = useState(getTodayStr());
    const [opponent, setOpponent] = useState('');
    const [homeScore, setHomeScore] = useState(0);
    const [awayScore, setAwayScore] = useState(0);
    const safePs = safeArray(players);
    const [showTacticalBoard, setShowTacticalBoard] = useState(false);

    // NOVIDADE: Estado para as observações (salva atrelado à data do jogo)
    const currentNotes = matchMinutes[matchDate]?.notes || '';
    
    const updateNotes = (val) => {
        const newMins = {...matchMinutes};
        if(!newMins[matchDate]) newMins[matchDate] = {};
        newMins[matchDate].notes = val;
        setMatchMinutes(newMins);
        const docId = typeof getActiveDocId === 'function' ? getActiveDocId(user?.uid) : user?.uid;
        if(user) db.collection('coachData').doc(docId).update({ matchMinutes: newMins });
    };

    const updateStatDirect = (pIdx, stat, val) => {
        const newPs = [...safePs];
        if (!newPs[pIdx].stats) newPs[pIdx].stats = { g: 0, a: 0, yc: 0, rc: 0 };
        newPs[pIdx].stats[stat] = val === '' ? '' : Math.max(0, parseInt(val) || 0);
        setPlayers(newPs);
    };

    const checkProntidao = (index) => {
        let queixas = 0;
        const hoje = new Date();
        for(let i = 1; i <= 3; i++) {
            let d = new Date();
            d.setDate(hoje.getDate() - i);
            let dataStr = d.toISOString().split('T')[0];
            if(trainingLog && trainingLog[dataStr] && trainingLog[dataStr][index]?.soreness > 6) {
                queixas++;
            }
        }
        return queixas >= 2;
    };

    const updateMins = (pIdx, val) => {
        const newMins = {...matchMinutes};
        if(!newMins[matchDate]) newMins[matchDate] = {};
        newMins[matchDate][pIdx] = { ...newMins[matchDate][pIdx], mins: parseInt(val) || 0 };
        setMatchMinutes(newMins);
        const docId = typeof getActiveDocId === 'function' ? getActiveDocId(user?.uid) : user?.uid;
        if(user) db.collection('coachData').doc(docId).update({ matchMinutes: newMins });
    };

    const updateWeight = (pIdx, field, val) => {
        const newMins = {...matchMinutes};
        if(!newMins[matchDate]) newMins[matchDate] = {};
        newMins[matchDate][pIdx] = { ...newMins[matchDate][pIdx], [field]: val };
        setMatchMinutes(newMins);
        const docId = typeof getActiveDocId === 'function' ? getActiveDocId(user?.uid) : user?.uid;
        if(user) db.collection('coachData').doc(docId).update({ matchMinutes: newMins });
    };

    // NOVIDADE: Relatório de Jogo com Cabeçalho Premium e Observações
    const generateMatchReport = () => {
        showToast("Gerando Relatório Padrão Europeu...", "#3b82f6");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const pageWidth = doc.internal.pageSize.getWidth();
        
        // 1. Cabeçalho Premium
        doc.setFillColor(themeColor); 
        doc.rect(0, 0, pageWidth, 40, 'F');
        
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.setFont("helvetica", "bold");
        doc.text("MATCH REPORT", 20, 20);
        
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text(`ADVERSÁRIO: ${opponent.toUpperCase() || 'NÃO DEFINIDO'} | DATA: ${formatDateBR(matchDate)}`, 20, 28);
        doc.text(`PLACAR FINAL: ${homeScore} x ${awayScore}`, 20, 34);

        let y = 55;

        // 2. Observações Estratégicas
        if (currentNotes) {
            doc.setTextColor(themeColor);
            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.text("OBSERVAÇÕES ESTRATÉGICAS / RESUMO DO JOGO", 20, y);
            
            doc.setTextColor(50, 50, 50);
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            const splitNotes = doc.splitTextToSize(currentNotes, pageWidth - 40);
            doc.text(splitNotes, 20, y + 8);
            y += 15 + (splitNotes.length * 5);
        }

        // 3. Tabela de Atletas
        if (y > 240) { doc.addPage(); y = 20; }
        
        doc.setFillColor(240, 240, 240);
        doc.rect(15, y, pageWidth - 30, 10, 'F');
        doc.setTextColor(50, 50, 50);
        doc.setFontSize(9);
        doc.setFont("helvetica", "bold");
        doc.text("ATLETA", 20, y + 7);
        doc.text("MIN", 90, y + 7);
        doc.text("G/A", 110, y + 7);
        doc.text("CARGA", 135, y + 7);
        doc.text("DESIDR.", 160, y + 7);
        
        y += 16;
        doc.setFont("helvetica", "normal");

        safePs.forEach((p, i) => {
            const mData = matchMinutes[matchDate]?.[i] || {};
            const minJ = parseInt(mData.mins) || 0;
            
            // Só exibe quem jogou ou quem fez gol/assistência
            if (minJ > 0 || (p.stats?.g > 0) || (p.stats?.a > 0)) {
                if (y > 270) { doc.addPage(); y = 20; }
                const stats = p.stats || { g: 0, a: 0 };
                const load = calcDailyLoad(trainingLog[matchDate]?.[i]);
                const wPre = parseFloat(mData.preW) || 0;
                const wPost = parseFloat(mData.postW) || 0;
                const perc = wPre > 0 && wPost > 0 && wPre > wPost ? (((wPre - wPost) / wPre) * 100).toFixed(1) : 0;

                doc.setFont("helvetica", "bold");
                doc.text(p.name.substring(0, 25).toUpperCase(), 20, y);
                doc.setFont("helvetica", "normal");
                
                doc.text(minJ.toString(), 90, y);
                doc.text(`${stats.g || 0}/${stats.a || 0}`, 110, y);
                doc.text(load > 0 ? load.toString() : '-', 135, y);
                
                if (perc > 2) {
                    doc.setTextColor(220, 38, 38);
                    doc.setFont("helvetica", "bold");
                }
                doc.text(perc > 0 ? `-${perc}%` : '-', 160, y);
                doc.setTextColor(50, 50, 50);
                doc.setFont("helvetica", "normal");
                
                doc.setDrawColor(230, 230, 230);
                doc.line(15, y + 4, pageWidth - 15, y + 4);
                y += 10;
            }
        });

        doc.save(`MatchReport_${opponent || 'Jogo'}_${matchDate}.pdf`);
        showToast("Relatório gerado com sucesso!", "#10b981");
    };

    const gerarDossieTatico = async () => {
        if(!opponent) return showToast("Digite o nome do adversário!", "#ef4444");
        showToast("Gerando Dossiê Tático...", "#3b82f6");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(22);
        doc.setTextColor(30, 58, 138); 
        doc.text("DOSSIÊ TÁTICO: PREPARAÇÃO", 14, 20);
        
        doc.setFontSize(12);
        doc.setTextColor(0, 0, 0);
        doc.text(`Adversário: ${opponent}`, 14, 30);
        doc.text(`Data: ${formatDateBR(matchDate)}`, 14, 38);
        doc.line(14, 42, 196, 42);
        
        doc.setFontSize(14);
        doc.setTextColor(2, 132, 199);
        doc.text("Estratégia Recomendada:", 14, 52);
        
        let y = 60;
        const sugestoes = library.filter(l => l.category?.toLowerCase().includes('tático') || l.title?.toLowerCase().includes('saída'));
        
        doc.setFontSize(10);
        doc.setTextColor(50, 50, 50);
        if(sugestoes.length === 0) doc.text("- Nenhuma análise vinculada a este perfil.", 14, y);
        else sugestoes.slice(0, 5).forEach(s => {
            doc.text(`- ${s.title}`, 14, y);
            y += 6;
        });

        y += 10;
        doc.setFontSize(14);
        doc.setTextColor(5, 150, 105);
        doc.text("Plano de Sessão (Sugestão IA):", 14, y);
        y += 8;
        
        doc.setFontSize(10);
        doc.setTextColor(50, 50, 50);
        exercises.forEach(ex => {
            if(y > 270) { doc.addPage(); y = 20; }
            doc.text(`[${ex.period.toUpperCase()}] ${ex.title}: ${ex.sets} séries | Foco: ${ex.target}`, 14, y);
            y += 6;
        });

        doc.save(`Dossie_Tatico_${opponent}.pdf`);
        showToast("Dossiê gerado!", "#10b981");
    };

    return (
        <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in custom-scroll pb-32">
            <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 mb-6">
                {showTacticalBoard && <TacticalBoardModal players={players} onClose={()=>setShowTacticalBoard(false)} themeColor={themeColor} opponent={opponent} matchDate={matchDate} />}
            
                <div className="flex justify-between items-center mb-6 border-b dark:border-slate-700 pb-4">
                    <h2 className="text-2xl font-black uppercase flex items-center gap-2 dark:text-white" style={{color: themeColor}}>
                        <Icon name="target"/> Game Day & Tática
                    </h2>
                    <div className="flex gap-2">
                        <button onClick={() => setShowTacticalBoard(true)} className="bg-emerald-600 hover:bg-emerald-500 text-white font-black px-4 py-2 rounded-xl flex items-center gap-2 shadow-lg uppercase text-[10px]">
                            <Icon name="list" size={14}/> Prancheta
                        </button>
                        <button onClick={gerarDossieTatico} className="bg-blue-600 hover:bg-blue-500 text-white font-black px-4 py-2 rounded-xl flex items-center gap-2 shadow-lg uppercase text-[10px] hidden md:flex">
                            <Icon name="brain" size={14}/> DOSSIÊ PRÉ-JOGO
                        </button>
                        <button onClick={generateMatchReport} className="bg-purple-600 hover:bg-purple-500 text-white font-black px-4 py-2 rounded-xl flex items-center gap-2 shadow-lg uppercase text-[10px]">
                            <Icon name="download" size={14}/> PDF PÓS-JOGO
                        </button>
                    </div>
                </div>
                
                {/* O NOVO LAYOUT DO CABEÇALHO DO JOGO E OBSERVAÇÕES */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-start bg-slate-100 dark:bg-slate-900 p-4 rounded-xl border dark:border-slate-700 mb-6">
                    
                    <div className="md:col-span-1 flex flex-col gap-4">
                        <div className="flex flex-col gap-2">
                            <label className="text-[10px] font-black uppercase text-slate-500">Data da Partida</label>
                            <input type="date" value={matchDate} onChange={e=>setMatchDate(e.target.value)} className="p-3 rounded-lg dark:bg-slate-800 dark:text-white border dark:border-slate-600 outline-none font-bold"/>
                        </div>
                        <div className="flex flex-col gap-2">
                            <label className="text-[10px] font-black uppercase text-slate-500">Adversário</label>
                            <input type="text" placeholder="Nome do Clube..." value={opponent} onChange={e=>setOpponent(e.target.value)} className="p-3 rounded-lg dark:bg-slate-800 dark:text-white border dark:border-slate-600 outline-none font-bold uppercase"/>
                        </div>
                        <div className="flex flex-col gap-2">
                            <label className="text-[10px] font-black uppercase text-slate-500 text-center">Placar Final</label>
                            <div className="flex justify-center items-center gap-4">
                                <div className="flex items-center gap-2">
                                    <button onClick={()=>setHomeScore(Math.max(0, homeScore-1))} className="bg-slate-300 dark:bg-slate-700 w-8 h-8 rounded-full font-black dark:text-white">-</button>
                                    <span className="text-3xl font-black dark:text-white w-8 text-center">{homeScore}</span>
                                    <button onClick={()=>setHomeScore(homeScore+1)} className="bg-slate-300 dark:bg-slate-700 w-8 h-8 rounded-full font-black dark:text-white">+</button>
                                </div>
                                <span className="font-black text-slate-400">X</span>
                                <div className="flex items-center gap-2">
                                    <button onClick={()=>setAwayScore(Math.max(0, awayScore-1))} className="bg-slate-300 dark:bg-slate-700 w-8 h-8 rounded-full font-black dark:text-white">-</button>
                                    <span className="text-3xl font-black dark:text-white w-8 text-center">{awayScore}</span>
                                    <button onClick={()=>setAwayScore(awayScore+1)} className="bg-slate-300 dark:bg-slate-700 w-8 h-8 rounded-full font-black dark:text-white">+</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div className="md:col-span-2 flex flex-col h-full">
                        <label className="text-[10px] font-black uppercase text-slate-500 flex items-center gap-2 mb-2"><Icon name="edit" size={12}/> Observações Táticas & Relatório do Jogo</label>
                        <textarea 
                            className="w-full flex-1 min-h-[180px] bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg p-3 text-sm font-medium dark:text-white outline-none focus:border-blue-500 custom-scroll resize-none"
                            placeholder="Cole aqui o seu relatório. Destaques positivos/negativos, quem foi bem, correções para o próximo treino, esquema tático utilizado..."
                            value={currentNotes}
                            onChange={e => updateNotes(e.target.value)}
                        ></textarea>
                    </div>
                </div>
            </div>

            <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
                <div className="grid grid-cols-12 bg-slate-100 dark:bg-slate-700 p-4 text-[10px] font-black text-slate-500 dark:text-slate-300 uppercase shrink-0">
                    <div className="col-span-3">Atleta</div>
                    <div className="col-span-2 text-center">⚽ / 👟 (G / A)</div>
                    <div className="col-span-2 text-center">🟨 / 🟥 Cartões</div>
                    <div className="col-span-2 text-center">⏱️ Minutos</div>
                    <div className="col-span-3 text-center">💧 Desidratação</div>
                </div>
                <div className="divide-y divide-slate-100 dark:divide-slate-700">
                    {safePs.map((p, i) => {
                        if(!p) return null;
                        const mData = matchMinutes[matchDate]?.[i] || {};
                        const minJ = mData.mins || 0;
                        const wPre = parseFloat(mData.preW) || 0;
                        const wPost = parseFloat(mData.postW) || 0;
                        let perc = wPre > 0 && wPost > 0 && wPre > wPost ? (((wPre - wPost) / wPre) * 100).toFixed(1) : 0;
                        let color = perc >= 2.0 ? "text-red-500" : perc >= 1.0 ? "text-orange-500" : "text-green-500";

                        return (
                            <div key={i} className="grid grid-cols-12 p-3 items-center hover:bg-slate-50 dark:hover:bg-slate-700/50">

                                    <div className="w-10 h-10 rounded-full bg-slate-200 overflow-hidden shrink-0">{p.image ? <img src={p.image} className="w-full h-full object-cover object-top"/> : <Icon name="user" className="m-2 text-slate-400"/>}</div>
                                    <div><div className="font-black text-sm text-slate-800 dark:text-slate-100 uppercase truncate">{p.name}</div><div className="text-[9px] text-slate-400">{p.pos || 'Atleta'}</div></div>
