        if (!firebase.apps.length) firebase.initializeApp({apiKey:"AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco",authDomain:"prosaude-e9130.firebaseapp.com",projectId:"prosaude-e9130",storageBucket:"prosaude-e9130.firebasestorage.app",messagingSenderId:"999318121562",appId:"1:999318121562:web:1f192d4c0f14a64fb57c63"});
        const auth = firebase.auth(); const db = firebase.firestore();

        const showToast = (msg) => { const t = document.getElementById('toast'); if(t){ t.innerText=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); } };
        const getTodayStr = () => { const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const getDatesInRange = (start, days) => { const dates=[]; const end=new Date(start); end.setMinutes(end.getMinutes()-end.getTimezoneOffset()); for(let i=0;i<days;i++){const d=new Date(end); d.setDate(end.getDate()-i); dates.push(d.toISOString().split('T')[0]);} return dates; };

                upload: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
                activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',

                share: '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>',

        const MiniGauge = ({ value }) => { const pct=Math.max(0,Math.min(100,Number(value)||0)); const ang=(pct/100)*180-90; return (<div className="flex flex-col items-center"><div className="w-[80px] h-[40px] overflow-hidden relative"><svg viewBox="0 0 80 40"><path d="M5 40 A35 35 0 0 1 75 40" fill="none" className="stroke-slate-200 dark:stroke-slate-700" strokeWidth="8"/><path d="M5 40 A35 35 0 0 1 28 12" fill="none" stroke="#22c55e" strokeWidth="8"/><path d="M28 12 A35 35 0 0 1 52 12" fill="none" stroke="#eab308" strokeWidth="8"/><path d="M52 12 A35 35 0 0 1 75 40" fill="none" stroke="#ef4444" strokeWidth="8"/></svg><div className="absolute left-[39px] top-[5px] w-[2px] h-[35px] bg-slate-700 dark:bg-slate-300 origin-bottom transition-transform" style={{transform:`rotate(${ang}deg)`}}></div></div><div className="text-[10px] font-black dark:text-white -mt-1">{pct}</div><div className="text-[8px] text-slate-500 uppercase">Carga 7D</div></div>); };

        const SquadView = ({ players, setPlayers, themeColor, trainingLog, dmRecords, playerOfTheWeek, setPlayerOfTheWeek }) => {
            const [viewProfile, setViewProfile] = useState(null); const [editPlayer, setEditPlayer] = useState(null); 
            const today = getTodayStr(); const safePlayers = safeArray(players);
            const addP = () => setPlayers([...safePlayers, {name: "Novo Atleta", image: null, injured: false, position: 'Atleta', number: ''}]);
            const [localData, setLocalData] = useState({});
            
            const getLoad = (pIdx) => { let s=0; getDatesInRange(today,7).forEach(d=>s+=calcDailyLoad(trainingLog[d]?.[pIdx])); return Math.min(100, s/2000*100); };
            const getDM = (pId) => safeArray(dmRecords).find(r=>r&&r.playerId==pId&&r.status==='Active');
            
            const Editor = () => {
                if(editPlayer===null) return null; const p=safePlayers[editPlayer];
                return (<div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4"><div className="bg-slate-800 p-4 rounded-xl w-full max-w-sm"><h3 className="font-bold text-white mb-4">Editar {p.name}</h3><BufferedInput className="w-full bg-slate-700 text-white p-2 rounded mb-2" value={localData.name} onSave={v=>setLocalData({...localData,name:v})}/><div className="flex gap-2"><button onClick={()=>{setPlayers(safePlayers.filter((_,i)=>i!==editPlayer));setEditPlayer(null);}} className="bg-red-900 text-red-300 p-2 rounded flex-1">Excluir</button><button onClick={()=>{const n=[...safePlayers];n[editPlayer]=localData;setPlayers(n);setEditPlayer(null);}} className="bg-blue-600 text-white p-2 rounded flex-1">Salvar</button></div></div></div>);
            };

            return (
                <div className="p-6 bg-slate-900 h-full overflow-y-auto custom-scroll">
                    {editPlayer!==null && <Editor/>}
                    <div className="flex justify-between items-end mb-6"><h2 className="text-2xl font-bold flex items-center gap-2 text-white" style={{color: themeColor}}><Icon name="user"/> Gestão do Elenco</h2></div>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        {safePlayers.map((p, i) => { 
                            if(!p) return null;
                            const loadPct = getLoad(i); const dl = trainingLog[today]?.[i]?.wellness||{};

                                    <button onClick={()=>{setLocalData(p);setEditPlayer(i);}} className="absolute top-2 right-2 text-slate-500 hover:text-white"><Icon name="edit" size={16}/></button>

                                    {isRisk && !inj && <div className="absolute top-2 left-10 bg-red-500 text-white text-[9px] px-1 rounded animate-pulse">RISCO</div>}
                                    <div className="w-16 h-16 rounded-full bg-slate-700 overflow-hidden shrink-0 border-2" style={{borderColor:playerOfTheWeek===i?'#eab308':inj?'#ef4444':trans?'#f97316':themeColor}}>{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="user" className="m-4 text-slate-400"/>}</div>
                                    <div className="text-center"><div className="font-bold text-white text-sm truncate">{p.name}</div><div className="text-[9px] text-slate-400 uppercase">{p.position}</div></div>
                                    <div className="w-full flex justify-center border-t border-slate-700 pt-2"><MiniGauge value={loadPct}/></div>

        const LibraryView = ({ themeColor, library, setLibrary }) => {
            const [form, setForm] = useState({ title: '', gifUrl: '' }); const [editId, setEditId] = useState(null);
            const saveLib = () => { if(editId){setLibrary(library.map(l=>l.id===editId?{...l,...form}:l));setEditId(null);}else{setLibrary([{id:Date.now(),...form},...library]);} setForm({title:'',gifUrl:''}); showToast("Salvo!"); };
            return (

                    <div className="bg-slate-800 p-6 rounded-xl border border-slate-700">

                <div className="p-6 bg-slate-900 h-full overflow-y-auto custom-scroll space-y-6">

                        <div className="flex justify-between mb-4"><h2 className="text-xl font-black text-white flex gap-2"><Icon name="bolt"/> Prescrição Diária</h2><select className="bg-slate-900 text-white text-xs p-2 rounded outline-none border border-blue-800" value={postWorkout} onChange={e=>setPostWorkout(e.target.value)}><option value="IA">🤖 Sugerido pela IA</option><option value="Bota Pneumática (15 min)">Bota Pneumática</option><option value="Banheira de Gelo">Banheira de Gelo</option><option value="Piscina / Soltura Aquática">Piscina / Soltura</option></select></div>
                        <div className="grid grid-cols-12 gap-2 items-end">
                            <div className="col-span-3"><label className="text-[10px] text-purple-400">Puxar da Biblioteca</label><select className="w-full p-2 bg-slate-900 text-white rounded text-xs outline-none" onChange={e=>{const s=library.find(l=>l.id==e.target.value); if(s)setF({...f,title:s.title,gifUrl:s.gifUrl});}}><option value="">Selecione...</option>{library.map(l=><option key={l.id} value={l.id}>{l.title}</option>)}</select></div>
                            <div className="col-span-2"><label className="text-[10px] text-slate-400">Exercício</label><input className="w-full p-2 bg-slate-700 text-white rounded text-xs outline-none" value={f.title} onChange={e=>setF({...f,title:e.target.value})}/></div>
                            <div className="col-span-2"><label className="text-[10px] text-slate-400">Link GIF</label><input className="w-full p-2 bg-slate-700 text-white rounded text-xs outline-none" value={f.gifUrl} onChange={e=>setF({...f,gifUrl:e.target.value})}/></div>
                            <div className="col-span-1"><label className="text-[10px] text-slate-400">Séries</label><input type="number" className="w-full p-2 bg-slate-700 text-white rounded text-xs text-center outline-none" value={f.sets} onChange={e=>setF({...f,sets:e.target.value})}/></div>
                            <div className="col-span-1"><label className="text-[10px] text-slate-400">Reps</label><input type="number" className="w-full p-2 bg-slate-700 text-white rounded text-xs text-center outline-none" value={f.reps} onChange={e=>setF({...f,reps:e.target.value})}/></div>
                            <div className="col-span-2"><label className="text-[10px] text-slate-400">Alvo</label><select className="w-full p-2 bg-slate-700 text-white rounded text-xs outline-none" value={f.type==='activation'?'activation':f.target} onChange={e=>setF({...f,type:e.target.value==='activation'?'activation':'workout',target:e.target.value==='activation'?'Ativação':e.target.value})}><option value="activation">🔥 Ativação</option><option value="Geral">💪 Geral</option><option value="LCA">🛡️ LCA</option><option value="Pubalgia">🛡️ Pubalgia</option><option value="Posterior">🛡️ Posterior</option><option value="Transição (Retorno DM)">🛡️ Transição DM</option></select></div>
                            <div className="col-span-1"><button onClick={saveEx} className="w-full bg-blue-600 text-white p-2 rounded flex justify-center">{editId?'OK':'ADD'}</button></div>
                        </div>
                    </div>
                    <h3 className="font-bold text-orange-500 uppercase flex gap-2"><Icon name="fire"/> 1. Ativação</h3>
                    <div className="grid grid-cols-4 gap-4">{act.map((x,i)=><div key={x.id} className="bg-orange-900/20 border border-orange-800 rounded-xl p-3 relative group"><div className="absolute top-1 right-1 flex opacity-0 group-hover:opacity-100"><button onClick={()=>move(i,-1,act,setAct)} className="text-white bg-slate-800 p-1"><Icon name="arrowUp" size={10}/></button><button onClick={()=>move(i,1,act,setAct)} className="text-white bg-slate-800 p-1"><Icon name="arrowDown" size={10}/></button><button onClick={()=>{setF({...x,type:'activation'});setEditId(x.id);}} className="text-white bg-blue-500 p-1"><Icon name="edit" size={10}/></button><button onClick={()=>setAct(act.filter(z=>z.id!==x.id))} className="text-white bg-red-500 p-1"><Icon name="trash" size={10}/></button></div><div className="text-white text-xs font-bold">{x.title}</div><div className="text-[10px] text-slate-400">{x.sets}x {x.reps}</div></div>)}</div>
                    <h3 className="font-bold text-white uppercase flex gap-2 mt-4 border-t border-slate-700 pt-4"><Icon name="activity"/> 2. Principal & Prevenção</h3>
                    <div className="grid grid-cols-4 gap-4">{exercises.map((x,i)=><div key={x.id} className="bg-slate-800 border border-slate-700 rounded-xl p-3 relative group"><div className="absolute top-1 right-1 flex opacity-0 group-hover:opacity-100"><button onClick={()=>move(i,-1,exercises,setExercises)} className="text-white bg-slate-700 p-1"><Icon name="arrowUp" size={10}/></button><button onClick={()=>move(i,1,exercises,setExercises)} className="text-white bg-slate-700 p-1"><Icon name="arrowDown" size={10}/></button><button onClick={()=>{setF({...x,type:'workout'});setEditId(x.id);}} className="text-white bg-blue-500 p-1"><Icon name="edit" size={10}/></button><button onClick={()=>setExercises(exercises.filter(z=>z.id!==x.id))} className="text-white bg-red-500 p-1"><Icon name="trash" size={10}/></button></div><div className="text-[8px] bg-blue-500 text-white px-1 w-max rounded mb-1">{x.target}</div><div className="text-white text-xs font-bold">{x.title}</div><div className="text-[10px] text-slate-400">{x.sets}x {x.reps}</div></div>)}</div>
                </div>
            );
        };

        const MainApp = ({ user, initialData }) => {
            const [tab, setTab] = useState('squad'); 
            const [themeColor, setThemeColor] = useState(initialData?.themeColor || '#1e3a8a');
            const [players, setPlayers] = useState(initialData?.players || []);
            const [trainingLog, setTrainingLog] = useState(initialData?.trainingLog || {});
            const [dmRecords, setDmRecords] = useState(initialData?.dmRecords || []);
            const [exercises, setExercises] = useState(initialData?.exercises || []); 
            const [act, setAct] = useState(initialData?.activationExercises || []);
            const [library, setLibrary] = useState(initialData?.library || []);
            const [postWorkout, setPostWorkout] = useState(initialData?.postWorkout || 'IA');
            const [playerOfTheWeek, setPlayerOfTheWeek] = useState(initialData?.playerOfTheWeek !== undefined ? initialData.playerOfTheWeek : null);
            const [syncStatus, setSyncStatus] = useState(''); 

            useEffect(() => {
                const timeoutId = setTimeout(() => {
                    setSyncStatus('A Guardar...');
                    db.collection('coachData').doc(user.uid).set({ themeColor, players, trainingLog, dmRecords, exercises, activationExercises: act, library, postWorkout, playerOfTheWeek }, { merge: true }).then(() => { setSyncStatus('☁️ Salvo'); setTimeout(() => setSyncStatus(''), 2000); });
                }, 2000); return () => clearTimeout(timeoutId);
            }, [themeColor, players, trainingLog, dmRecords, exercises, act, library, postWorkout, playerOfTheWeek, user]);

            return (
                <div className="flex flex-col h-full bg-slate-900">
                    <div className="bg-slate-800 p-2 flex justify-between items-center shadow-md z-30 shrink-0 border-b border-slate-700">
                        <div className="font-black text-xl italic text-white flex items-center gap-2"><div><span style={{color: themeColor}}>PRO</span>COACH <span className="text-[9px] bg-slate-200 text-slate-800 px-1.5 py-0.5 rounded ml-1">V144 MAX</span></div>{syncStatus && <span className="text-[9px] text-slate-400">{syncStatus}</span>}</div>
                        <div className="flex gap-2 text-slate-400"><button onClick={()=>window.open(`atleta.html?id=${user.uid}`,'_blank')} className="text-xs bg-blue-600 text-white px-3 py-1 rounded font-bold hover:bg-blue-500">VISÃO ATLETA (PORTAL)</button></div>
                    </div>
                    <div className="flex bg-slate-900 p-1 gap-1 overflow-x-auto shadow-inner w-full custom-scroll shrink-0 border-b border-slate-800">
                        {['squad','workout','library'].map(t=><button key={t} onClick={()=>setTab(t)} className={`px-4 py-2 rounded text-xs font-bold ${tab===t?'bg-slate-700 text-white':'text-slate-500'}`}>{t.toUpperCase()}</button>)}
                    </div>
                    <div className="flex-1 overflow-hidden relative">
                        {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} playerOfTheWeek={playerOfTheWeek} setPlayerOfTheWeek={setPlayerOfTheWeek} />}
                        {tab === 'library' && <LibraryView themeColor={themeColor} library={library} setLibrary={setLibrary} />}
                        {tab === 'workout' && <WorkoutBuilderView themeColor={themeColor} exercises={exercises} setExercises={setExercises} act={act} setAct={setAct} library={library} postWorkout={postWorkout} setPostWorkout={setPostWorkout} />}
                    </div>
                </div>
            );
        };

        const RootApp = () => {
            const [user, setUser] = useState(null); const [loading, setLoading] = useState(true); const [data, setData] = useState({});
            useEffect(() => { const unsub = auth.onAuthStateChanged(u => { setUser(u); if(!u){setLoading(false); document.getElementById('loading-state').style.display='none';} else { db.collection('coachData').doc(u.uid).get().then(doc=>{if(doc.exists) setData(doc.data()); setLoading(false); document.getElementById('loading-state').style.display='none';}) } }); return ()=>unsub(); }, []);
            if (loading) return null; if (!user) return <LoginScreen onLogin={()=>{}} />; return <ErrorBoundary><MainApp user={user} initialData={data}/></ErrorBoundary>;
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<RootApp />);
    </script>
</body>
</html>
