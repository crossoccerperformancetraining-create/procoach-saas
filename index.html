            if (mode === 'dashboard') {
                const safePlayers = safeArray(players); const filledCount = safePlayers.filter((p,i) => safeObj(trainingLog[wellnessDate]?.[i]?.wellness).sleep).length;
                const renderStatusBadge = (log, pain) => { if (!log || !log.sleep) return <span className="bg-slate-200 dark:bg-slate-700 text-slate-500 text-[10px] font-black px-2 py-1 rounded shadow-sm uppercase flex items-center gap-1"><Icon name="calendar" size={12}/> Pendente</span>; if (Number(log.soreness) >= 5 || pain.length > 0) return <span className="bg-red-500 text-white text-[10px] font-black px-2 py-1 rounded shadow-md uppercase animate-pulse flex items-center gap-1"><Icon name="alert" size={12}/> RISCO</span>; if (getWSum(log) >= 18) return <span className="bg-yellow-400 text-yellow-900 text-[10px] font-black px-2 py-1 rounded shadow-sm uppercase flex items-center gap-1"><Icon name="alert" size={12}/> ATENÇÃO</span>; return <span className="bg-green-500 text-white text-[10px] font-black px-2 py-1 rounded shadow-sm uppercase flex items-center gap-1"><Icon name="check" size={12}/> APTO</span>; };
                const MetricBadge = ({ label, val }) => { if(!val) return null; const n = Number(val); let c = "bg-slate-100 text-slate-400 dark:bg-slate-700 dark:text-slate-500"; if(n >= 5) c = "bg-red-100 text-red-600 dark:bg-red-900/50 dark:text-red-400 font-bold"; else if(n === 4) c = "bg-yellow-100 text-yellow-700 dark:bg-yellow-900/50 dark:text-yellow-400"; return (<div className="flex flex-col items-center justify-center min-w-[36px]"><span className="text-[8px] uppercase font-bold text-slate-400 dark:text-slate-500 mb-0.5">{label}</span><span className={`text-xs w-full text-center rounded px-1 py-0.5 ${c}`}>{n}</span></div>); };
                
                return (
                    <div className="p-4 md:p-6 bg-slate-50 dark:bg-slate-900 h-full flex flex-col gap-4 animate-fade-in custom-scroll overflow-y-auto">
                        <div className="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 flex justify-between items-center shrink-0"><div><h2 className="text-lg font-bold flex items-center gap-2 dark:text-white" style={{color: themeColor}}><Icon name="list"/> PRANCHETA (WELLNESS)</h2><p className="text-[10px] text-slate-500 uppercase mt-1 font-bold">{filledCount} de {safePlayers.length} atletas responderam</p></div><input type="date" value={wellnessDate} onChange={e=>setWellnessDate(e.target.value)} className="bg-slate-100 dark:bg-slate-700 dark:text-white font-bold text-xs rounded px-2 py-1 outline-none"/></div>
                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col flex-1">
                            <div className="grid grid-cols-12 bg-slate-100 dark:bg-slate-700 p-3 text-[10px] font-bold text-slate-500 dark:text-slate-300 uppercase shrink-0 hidden lg:grid"><div className="col-span-3">Atleta</div><div className="col-span-3 text-center">Status</div><div className="col-span-4 flex justify-center">Métricas Críticas</div><div className="col-span-2">Dores</div></div>
                            <div className="divide-y divide-slate-100 dark:divide-slate-700 overflow-y-auto flex-1">{safePlayers.map((p, i) => { if(!p) return null; const log = safeObj(trainingLog[wellnessDate]?.[i]?.wellness); const pain = Array.isArray(trainingLog[wellnessDate]?.[i]?.painZones) ? trainingLog[wellnessDate]?.[i]?.painZones : []; const isFilled = !!log.sleep; return (<div key={i} className={`flex flex-col lg:grid lg:grid-cols-12 gap-3 lg:gap-0 items-start lg:items-center p-3 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors ${!isFilled ? 'opacity-60' : ''}`}><div className="col-span-3 flex items-center gap-3 w-full"><div className="w-10 h-10 rounded-full bg-slate-200 overflow-hidden shrink-0 border border-slate-300">{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="user" className="m-2 text-slate-400"/>}</div><span className="font-bold text-sm dark:text-white truncate">{p.name}</span></div><div className="col-span-3 flex justify-start lg:justify-center w-full">{isFilled ? renderStatusBadge(log, pain) : (<button onClick={()=>{setSelectedPlayer(i); setMode('manual');}} className="bg-slate-100 dark:bg-slate-700 text-slate-500 hover:text-blue-500 text-[10px] font-black px-3 py-1.5 rounded shadow-sm uppercase flex items-center gap-2 border border-dashed"><Icon name="calendar" size={12}/> Pendente - Preencher</button>)}</div><div className="col-span-4 flex justify-start lg:justify-center gap-2 md:gap-4 w-full overflow-x-auto">{isFilled ? (<><MetricBadge label="Sono" val={log.sleep} /><MetricBadge label="Estr." val={log.stress} /><MetricBadge label="Fadig." val={log.fatigue} /><MetricBadge label="Dor" val={log.soreness} /><MetricBadge label="Humor" val={log.mood} /></>) : <span className="text-[10px] text-slate-400 italic hidden lg:block">Aguardando envio...</span>}</div><div className="col-span-2 w-full flex justify-start lg:justify-end">{pain.length > 0 ? (<div className="bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 px-2 py-1 rounded text-[9px] font-bold text-red-600 dark:text-red-400 uppercase truncate w-full"><Icon name="alert" size={10} className="inline"/> {pain.join(', ')}</div>) : isFilled ? <span className="text-[10px] text-slate-400">- Sem queixas -</span> : null}</div></div>); })}</div>
                        </div>
                    </div>
                );
            }
            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto flex flex-col gap-6 animate-fade-in"><div className="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 flex justify-between items-center"><h2 className="text-lg font-bold dark:text-white flex items-center gap-2"><Icon name="edit"/> PREENCHIMENTO MANUAL</h2><button onClick={()=>setMode('dashboard')} className="bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2">VOLTAR</button></div><div className="flex flex-col md:flex-row gap-6 flex-1"><div className="w-full md:w-1/3 bg-white dark:bg-slate-800 rounded-xl shadow p-4 border dark:border-slate-700"><h3 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase mb-4">Selecionar Atleta</h3><div className="space-y-2">{safeArray(players).map((p, i) => { if(!p) return null; return (<div key={i} onClick={()=>setSelectedPlayer(i)} className={`flex items-center gap-2 p-2 rounded cursor-pointer border ${selectedPlayer===i?'border-l-4 shadow-sm bg-slate-50 dark:bg-slate-700':'border-transparent hover:bg-slate-50 dark:hover:bg-slate-700'}`} style={{borderLeftColor: selectedPlayer===i?themeColor:'transparent'}}><div className="w-8 h-8 rounded-full bg-slate-200 overflow-hidden">{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="user"/>}</div><div className="font-bold text-sm dark:text-white">{p.name}</div></div>)})}</div></div><div className="flex-1 bg-white dark:bg-slate-800 rounded-xl shadow p-6 border dark:border-slate-700"><h2 className="text-2xl font-bold dark:text-white mb-4 border-b dark:border-slate-700 pb-2">{players[selectedPlayer]?.name}</h2><div className="space-y-4">{[{id:'sleep',l:'Sono (1=Bom | 7=Ruim)'},{id:'stress',l:'Estresse (1=Relax | 7=Tenso)'},{id:'fatigue',l:'Fadiga (1=Energia | 7=Exausto)'},{id:'soreness',l:'Dor (1=Nenhuma | 7=Muita)'},{id:'mood',l:'Humor (1=Feliz | 7=Mal)'}].map(m=>(<div key={m.id}><div className="flex justify-between text-sm font-bold dark:text-white mb-2"><span>{m.l}</span><span className="text-white px-2 rounded" style={{backgroundColor: themeColor}}>{localScores[m.id]}</span></div><input type="range" min="1" max="7" value={localScores[m.id]} onChange={e=>handleScoreChange(m.id, e.target.value)} className="hooper-slider" style={{background:'linear-gradient(to right,#22c55e,#eab308,#ef4444)'}}/></div>))}</div><div className="border-t dark:border-slate-700 pt-4 mt-4"><h4 className="text-sm font-bold text-slate-500 uppercase mb-2">Local da Dor</h4><select className="w-full p-2 border dark:border-slate-600 rounded text-xs mb-2 dark:bg-slate-700 dark:text-white outline-none" onChange={(e)=>{if(e.target.value) togglePainZone(e.target.value); e.target.value='';}}><option value="">+ Adicionar Local</option>{bodyParts.map(p=><option key={p} value={p}>{p}</option>)}</select><div className="flex flex-wrap gap-1">{localPainZones.map(z=><span key={z} onClick={()=>togglePainZone(z)} className="bg-red-100 dark:bg-red-900/50 text-red-600 dark:text-red-400 px-2 py-1 rounded text-xs font-bold cursor-pointer">{z} ×</span>)}</div></div><button onClick={confirmData} className="w-full py-4 bg-slate-800 text-white font-bold rounded-xl mt-4">SALVAR DADOS</button></div></div></div>
            );
        };

        const PSEView = ({ players, themeColor, trainingLog, setTrainingLog }) => {
            const [date, setDate] = useState(getTodayStr()); const [globalDur, setGlobalDur] = useState(''); const [localRPEs, setLocalRPEs] = useState({}); const [saveStatus, setSaveStatus] = useState(''); const saveTimeoutRef = useRef(null);
            useEffect(() => { const c = {}; safeArray(players).forEach((_, i) => { const log = trainingLog[date]?.[i] || {}; c[i] = { am: Number(log.rpe_am) || 0, pm: Number(log.rpe_pm) || 0, dur: Number(log.duration) || 0 }; }); setLocalRPEs(c); }, [date, players, trainingLog]);
            const saveToMain = (curr) => { setSaveStatus('A Guardar...'); const nl = {...trainingLog}; if(!nl[date]) nl[date] = {}; safeArray(players).forEach((_, i) => { if(!nl[date][i]) nl[date][i] = {}; nl[date][i].rpe_am = curr[i].am; nl[date][i].rpe_pm = curr[i].pm; nl[date][i].duration = curr[i].dur; }); setTrainingLog(nl); setTimeout(() => setSaveStatus('Salvo'), 500); setTimeout(() => setSaveStatus(''), 2000); };
            const updateRPE = (i, f, v) => { const val = parseInt(v) || 0; setLocalRPEs(prev => { const n = {...prev, [i]: {...(prev[i]||{am:0, pm:0}), [f]: val}}; if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current); saveTimeoutRef.current = setTimeout(() => { saveToMain(n); }, 1000); return n; }); };
            const applyGlobalDur = (v) => { setGlobalDur(v); const num = parseInt(v) || 0; setLocalRPEs(prev => { const n = {}; safeArray(players).forEach((_, i) => { n[i] = { ...(prev[i] || {am:0, pm:0}), dur: num }; }); if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current); saveTimeoutRef.current = setTimeout(() => { saveToMain(n); }, 1000); return n; }); };

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in custom-scroll flex flex-col">
                    <div className={`status-badge ${saveStatus ? 'show' : ''} z-50`}>{saveStatus === 'Salvo' ? '💾 SALVO' : '⏳ A Guardar...'}</div>
                    <div className="flex flex-col md:flex-row justify-between mb-6 bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 shrink-0 gap-4 items-center">
                        <h2 className="text-xl font-bold dark:text-white flex gap-2"><Icon name="activity"/> CARGA (sRPE)</h2>
                        <div className="flex gap-4 items-center"><div className="flex items-center gap-2"><span className="text-[10px] font-bold text-slate-500 uppercase">Geral:</span><input type="number" placeholder="Min..." value={globalDur} onChange={e=>applyGlobalDur(e.target.value)} className="w-20 p-2 text-xs border dark:border-slate-600 rounded dark:bg-slate-700 dark:text-white outline-none"/></div><button onClick={()=>{if(saveTimeoutRef.current)clearTimeout(saveTimeoutRef.current);saveToMain(localRPEs);showToast("Salvo!");}} className="bg-slate-200 dark:bg-slate-700 p-2 rounded text-slate-600 dark:text-white"><Icon name="save"/></button><input type="date" value={date} onChange={e=>setDate(e.target.value)} className="bg-slate-100 dark:bg-slate-700 dark:text-white font-bold p-2 rounded border dark:border-slate-600 outline-none"/></div>
                    </div>
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-200 dark:border-slate-700 overflow-hidden flex-1 flex flex-col">
                        <div className="grid grid-cols-12 bg-slate-100 dark:bg-slate-700 p-3 text-[10px] font-bold text-slate-500 dark:text-slate-300 uppercase shrink-0"><div className="col-span-4">Atleta</div><div className="col-span-3 text-center">Manhã</div><div className="col-span-3 text-center">Tarde</div><div className="col-span-2 text-center">Dur (min)</div></div>
                        <div className="divide-y divide-slate-100 dark:divide-slate-700 overflow-y-auto flex-1 custom-scroll">
                            {safeArray(players).map((p, i) => { if(!p) return null; const dur = localRPEs[i]?.dur||0; const sRPE = ((localRPEs[i]?.am||0) + (localRPEs[i]?.pm||0)) * (dur > 0 ? dur : 60); return (
                                <div key={i} className="grid grid-cols-12 p-3 items-center hover:bg-slate-50 dark:hover:bg-slate-700/50">
                                    <div className="col-span-4 flex items-center gap-3"><div className="w-8 h-8 rounded-full bg-slate-200 overflow-hidden shrink-0">{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="user"/>}</div><div><span className="font-bold text-sm dark:text-white block truncate">{p.name}</span>{sRPE > 0 && <span className="text-[9px] font-bold text-blue-500">Carga: {sRPE}</span>}</div></div>
                                    <div className="col-span-3 flex justify-center"><input type="range" min="0" max="10" value={localRPEs[i]?.am||0} onChange={e=>updateRPE(i,'am',e.target.value)} className="w-16 md:w-24 mr-2 accent-blue-600"/><span className="font-bold w-4 text-blue-600">{localRPEs[i]?.am}</span></div>
                                    <div className="col-span-3 flex justify-center"><input type="range" min="0" max="10" value={localRPEs[i]?.pm||0} onChange={e=>updateRPE(i,'pm',e.target.value)} className="w-16 md:w-24 mr-2 accent-orange-500"/><span className="font-bold w-4 text-orange-500">{localRPEs[i]?.pm}</span></div>
                                    <div className="col-span-2 flex justify-center"><input type="number" min="0" className="w-12 md:w-16 p-1 text-center text-sm font-bold border dark:border-slate-600 rounded dark:bg-slate-800 dark:text-white outline-none" value={localRPEs[i]?.dur||''} onChange={e=>updateRPE(i,'dur',e.target.value)} /></div>
                                </div>
                            )})}
                        </div>
                    </div>
                </div>
            );
        };

        const TeamCoachAI = ({ pseAvg, dmCount }) => {
            const num = parseFloat(pseAvg) || 0; let t = "Diagnóstico da Equipe"; let s = ""; let c = "bg-slate-800 text-slate-300";
            if (num >= 600) { t = "ALERTA (Sobrecarga)"; s = "Carga Extremamente Alta. RISCO DE LESÃO ELEVADO. Recuperação passiva obrigatória."; c = "bg-red-900 text-red-50"; } else if (num >= 400) { t = "Alta Intensidade"; s = "Treino exigente. Amanhã: Carga baixa/moderada."; c = "bg-orange-800 text-orange-50"; } else if (num >= 200) { t = "Manutenção/Desenvolvimento"; s = "Carga Ideal. Pode manter se não for véspera de jogo."; c = "bg-green-800 text-green-50"; } else if (num > 0) { t = "Regenerativo"; s = "Estímulo leve hoje. Oportunidade de Choque amanhã."; c = "bg-blue-800 text-blue-50"; } else { t = "Sem Dados"; s = "Preencha a aba de PSE para o diagnóstico."; c = "bg-slate-800 text-slate-300"; }
            if(dmCount >= 3) { s += ` ALERTA: ${dmCount} atletas no DM.`; }
            return (<div className={`md:col-span-2 rounded-xl shadow p-5 border border-slate-700 flex flex-col justify-center relative overflow-hidden ${c}`}><div className="absolute top-0 right-0 p-4 opacity-10"><Icon name="brain" size={80}/></div><div className="flex items-center gap-2 mb-2 z-10"><div className="bg-white/20 p-1.5 rounded-full"><Icon name="brain" size={20}/></div><h3 className="font-bold text-sm uppercase tracking-wider opacity-80">Técnico IA</h3></div><div className="z-10"><div className="text-xl font-black mb-1">{t}</div><div className="text-sm opacity-90 leading-snug">{s}</div></div></div>);
        };

        const PreGameView = ({ players, themeColor, trainingLog, dmRecords, matchMinutes, setMatchMinutes, nextGame, setNextGame }) => {
            const [date, setDate] = useState(getTodayStr()); const [vp, setVp] = useState(null); const dLog = safeObj(trainingLog[date]); const sPs = safeArray(players);
            const actIdx = []; sPs.forEach((p, i) => { if(p && safeObj(dLog[i]?.wellness).sleep) actIdx.push(i); });
            const hoop = actIdx.length>0 ? Math.round(actIdx.reduce((a, i) => a + getWSum(dLog[i]?.wellness), 0)/actIdx.length) : 0;
            const rpeIdx = []; sPs.forEach((p, i) => { if(p && calcDailyLoad(dLog[i])>0) rpeIdx.push(i); });
            const pAvg = rpeIdx.length>0 ? Math.round(rpeIdx.reduce((a, i) => a + calcDailyLoad(dLog[i]), 0)/rpeIdx.length) : 0;
            const dmC = sPs.filter(p => p && p.injured).length;
            const wkD = getDatesInRange(date, 7).reverse();
            const wkData = wkD.map(d => { let lS=0, wS=0, cL=0, cW=0; sPs.forEach((p, i) => { if(p) { const l=safeObj(trainingLog[d]?.[i]); const ld=calcDailyLoad(l); if(ld>0){lS+=ld;cL++;} if(safeObj(l.wellness).sleep){wS+=getWSum(l.wellness);cW++;} } }); return { d, aL: cL>0?Math.round(lS/cL):0, aW: cW>0?Math.round(wS/cW):0 }; });

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in custom-scroll">
                    <div className="flex justify-between items-center mb-4 border-b dark:border-slate-700 pb-2"><h2 className="text-2xl font-bold flex items-center gap-2 dark:text-white" style={{color: themeColor}}><Icon name="trophy"/> Performance & Carga</h2><input type="date" value={date} onChange={e=>setDate(e.target.value)} className="bg-transparent dark:text-white font-bold outline-none"/></div>
                    
                    <div className="flex gap-4 items-center bg-white dark:bg-slate-800 p-4 rounded-xl border dark:border-slate-700 mb-6 shadow-sm"><Icon name="clock" className="text-yellow-500" size={28} /><div className="flex-1"><label className="text-[10px] uppercase font-bold text-slate-400 block mb-1">Próximo Adversário</label><input type="text" value={nextGame.opponent||''} onChange={e=>setNextGame({...nextGame, opponent: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-900 border dark:border-slate-600 p-2 rounded text-xs outline-none dark:text-white" placeholder="Ex: Flamengo (Final)" /></div><div><label className="text-[10px] uppercase font-bold text-slate-400 block mb-1">Data</label><input type="date" value={nextGame.date||''} onChange={e=>setNextGame({...nextGame, date: e.target.value})} className="bg-slate-50 dark:bg-slate-900 border dark:border-slate-600 p-2 rounded text-xs outline-none dark:text-white" /></div></div>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <div className="bg-white dark:bg-slate-800 rounded-xl p-4 border dark:border-slate-700 flex justify-center"><SpeedometerGauge value={hoop} /></div>
                        <div className="bg-white dark:bg-slate-800 rounded-xl p-4 border dark:border-slate-700 flex items-center gap-4"><DonutChart value={Math.min(20, Math.round(pAvg/50))} max={20} color={pAvg>=600?'#ef4444':pAvg>=300?'#eab308':'#22c55e'} size={60} /><div><div className="text-xl font-black dark:text-white">{pAvg}</div><div className="text-[10px] text-slate-400 font-bold">sRPE Equipe</div></div></div>
                        <TeamCoachAI activePlayers={actIdx} pseAvg={pAvg} dmCount={dmC} />
                    </div>

                    <div className="bg-white dark:bg-slate-800 rounded-xl p-4 mb-8 border dark:border-slate-700 overflow-x-auto custom-scroll"><h3 className="text-xs font-bold text-slate-400 uppercase mb-3 flex items-center gap-2"><Icon name="barChart"/> Semana</h3><div className="flex gap-2 min-w-max">{wkData.map((d, i) => { const it=d.d===date; return (<div key={i} className={`flex-1 min-w-[60px] flex flex-col items-center p-2 rounded border ${it?'bg-blue-50 dark:bg-blue-900/30 border-blue-200':'bg-slate-50 dark:bg-slate-700 border-transparent'}`}><div className="text-[9px] font-bold text-slate-400 mb-1">{formatDateBR(d.d).slice(0,5)}</div><div className="flex items-end gap-1 h-20 w-full justify-center"><div className="w-3 bg-blue-600 rounded-t" style={{height:`${Math.min(100,(d.aL/1000)*100)}%`}}></div><div className={`w-3 ${d.aW>=20?'bg-red-400':d.aW>=14?'bg-yellow-400':'bg-green-400'} rounded-t`} style={{height:`${Math.min(100,(d.aW/35)*100)}%`}}></div></div><div className="mt-1 text-[9px] font-bold dark:text-white">{d.aL} | {d.aW}</div></div>); })}</div></div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {sPs.map((p, i) => { 
                            if(!p) return null; const l = dLog[i] || {}; const s = Number(safeObj(l.wellness).soreness)||0; const r = s>=5; const inT = !p.injured && isPlayerInTransition(i, dmRecords);
                            let acL=0, chL=0; getDatesInRange(date,28).forEach((dt,idx)=>{const x=calcDailyLoad(trainingLog[dt]?.[i]); if(x>0){chL+=x;if(idx<7)acL+=x;}});
                            const acwr = (chL/4)>0 ? (acL/(chL/4)).toFixed(2) : 0;
                            return (
                                <div key={i} className={`bg-white dark:bg-slate-800 p-4 rounded-xl border flex flex-col gap-3 relative ${r?'border-red-500 border-4':inT?'border-orange-500 border-2':'border-slate-200 dark:border-slate-700'}`}>
                                    {r && <div className="absolute top-0 right-0 bg-red-500 text-white text-[9px] font-bold px-2 py-1 flex items-center gap-1">RISCO</div>}
                                    <div className="flex items-center gap-4"><div className="w-16 h-16 rounded-full bg-slate-100 overflow-hidden shrink-0 border-2 dark:border-slate-600">{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="user"/>}</div><div className="flex-1"><h3 className="font-bold dark:text-white text-lg uppercase truncate">{p.name}</h3><div className="flex flex-wrap gap-2 text-[10px] font-bold mt-2"><span className={`px-2 py-0.5 rounded border ${acwr>=1.5?'bg-red-100 text-red-700 border-red-300 animate-pulse':'bg-blue-50 text-blue-700 border-blue-200'}`}>ACWR: {acwr}</span></div></div><div className="w-20 hidden md:block"><MiniGauge value={getWSum(l.wellness)}/></div></div>
                                    <div className="flex justify-between mt-1 px-2 border-t dark:border-slate-700 pt-2 items-center"><div className="text-[10px] text-slate-400 font-bold">Carga: <span className="dark:text-white text-lg">{calcDailyLoad(l)||'-'}</span></div><div className="flex items-center gap-1"><span className="text-[9px] font-bold text-slate-400">MIN. JOGO:</span><input type="number" className="w-12 p-1 border dark:border-slate-600 rounded text-xs text-center dark:bg-slate-700 dark:text-white outline-none" value={matchMinutes?.[date]?.[i]||''} onChange={e=>{const nm={...matchMinutes}; if(!nm[date])nm[date]={}; nm[date][i]=parseInt(e.target.value)||0; setMatchMinutes(nm);}}/></div></div>
                                </div>
                            ); 
                        })}
                    </div>
                </div>
            );
        };

        const MicrocycleView = ({ days, setDays, themeColor, players, trainingLog }) => {
            const [modalOpen, setModalOpen] = useState(false); const [activeSlot, setActiveSlot] = useState({ dayId: null, period: null }); 
            const safeDays = safeArray(days, DEFAULT_DAYS).map(d => ({...d, plannedMins: d.plannedMins || ''}));
            const eventTypes = [ { label: 'JOGO', color: 'bg-[#dc2626]', text: 'text-white' }, { label: 'RECUPERAÇÃO', color: 'bg-[#3b82f6]', text: 'text-white' }, { label: 'ACADEMIA', color: 'bg-[#eab308]', text: 'text-slate-900' }, { label: 'FOLGA', color: 'bg-[#94a3b8]', text: 'text-slate-800' }, { label: 'TREINO FÍSICO', color: 'bg-[#16a34a]', text: 'text-white' }, { label: 'TÉCNICO', color: 'bg-[#2563eb]', text: 'text-white' }, { label: 'JOGUINHO', color: 'bg-[#ec4899]', text: 'text-white' }, { label: 'TÁTICO', color: 'bg-[#10b981]', text: 'text-white' } ];
            const addEvent = (t) => { setDays(safeDays.map(d => d.id === activeSlot.dayId ? { ...d, [activeSlot.period]: [...(d[activeSlot.period]||[]), { id: Date.now(), type: t.label, colorClass: t.color, textClass: t.text }] } : d)); setModalOpen(false); };
            const updateHeader = (dayId, f, v) => { setDays(safeDays.map(d => d.id === dayId ? { ...d, [f]: v } : d)); };

            return (
                <div className="h-full bg-slate-200 dark:bg-slate-950 flex flex-col relative overflow-hidden animate-fade-in">
                    <div className="bg-white dark:bg-slate-800 p-4 border-b dark:border-slate-700 shadow-sm flex justify-between items-center shrink-0"><h2 className="font-bold text-lg flex gap-2 dark:text-white" style={{color: themeColor}}><Icon name="calendar"/> MICROCICLO</h2></div>
                    <div className="flex-1 overflow-auto p-4 flex gap-3 min-w-max custom-scroll">
                        {safeDays.map(d => (
                            <div key={d.id} className="w-44 flex flex-col bg-slate-100 dark:bg-slate-800/50 rounded-xl overflow-hidden shrink-0 border dark:border-slate-700 shadow-sm">
                                <div className="micro-header p-2 text-center"><BufferedInput className="bg-transparent text-center font-black text-sm w-full outline-none uppercase text-white mb-1" value={d.name} onSave={(v)=>updateHeader(d.id,'name',v)} /><div className="bg-white/10 rounded px-1 py-0.5"><select className="bg-transparent text-center text-[9px] text-white w-full outline-none font-bold uppercase" value={d.md} onChange={(e)=>updateHeader(d.id,'md',e.target.value)}>{['MD-4','MD-3','MD-2','MD-1','JOGO','MD+1','MD+2'].map(o=><option key={o} className="text-black">{o}</option>)}</select></div><div className="flex items-center gap-1 mt-1 bg-white/10 rounded px-1 py-0.5"><Icon name="clock" size={10} className="text-white/70" /><BufferedInput type="number" className="bg-transparent text-center text-[9px] text-white w-full outline-none font-bold" placeholder="Tempo (min)" value={d.plannedMins} onSave={(v)=>updateHeader(d.id,'plannedMins',v)} /></div></div>
                                <div className="flex flex-col p-2 gap-3 pb-4">{['am','pm'].map(per => (<div key={per} className="flex flex-col gap-0 min-h-[160px]"><div className="micro-header text-[8px] font-bold uppercase text-center py-0.5 rounded-t-md opacity-90">{per==='am'?'Manhã':'Tarde'}</div><div className="bg-white dark:bg-slate-800 flex-1 border border-t-0 dark:border-slate-700 rounded-b-md p-1 flex flex-col gap-1 shadow-sm">{(d[per] || []).map(ev => (<div key={ev.id} className={`${ev.colorClass} ${ev.textClass} text-[9px] font-bold py-2 px-1 rounded text-center relative group/item uppercase`}>{ev.type}<button onClick={()=>setDays(safeDays.map(x=>x.id===d.id?{...x,[per]:x[per].filter(e=>e.id!==ev.id)}:x))} className="absolute top-0 right-0 text-white/70 hover:text-white hidden group-hover/item:block"><Icon name="x" size={10}/></button></div>))}<button onClick={()=>{setActiveSlot({dayId:d.id, period:per}); setModalOpen(true);}} className="mt-auto dashed-btn">+ Add</button></div></div>))}</div>
                            </div>
                        ))}
                    </div>
                    {modalOpen && (<div className="absolute inset-0 z-50 bg-black/60 flex items-center justify-center p-4 animate-fade-in"><div className="bg-slate-800 rounded-2xl p-6 w-full max-w-sm flex flex-col"><h3 className="text-center font-bold text-white mb-4">Adicionar Evento</h3><div className="space-y-2 overflow-y-auto max-h-[60vh] pr-2 custom-scroll">{eventTypes.map(t => (<button key={t.label} onClick={()=>addEvent(t)} className={`w-full py-3 rounded-lg font-bold shadow-md ${t.color} ${t.text} text-sm uppercase`}>{t.label}</button>))}</div><button onClick={()=>setModalOpen(false)} className="w-full mt-4 py-3 text-slate-400 font-bold text-xs bg-slate-700 rounded-lg">CANCELAR</button></div></div>)}
                </div>
            );
        };

        const MedicalView = ({ players, setPlayers, dmRecords, setDmRecords, themeColor }) => {
            const [selectedPlayer, setSelectedPlayer] = useState(''); const [injuryType, setInjuryType] = useState('Muscular'); const [location, setLocation] = useState(''); const [dateIn, setDateIn] = useState(getTodayStr()); const [editingId, setEditingId] = useState(null); 
            const records = safeArray(dmRecords); const activeInjuries = records.filter(r => r && r.status === 'Active');
            
            const handleSave = () => { if(selectedPlayer==='') return; if (editingId) { setDmRecords(records.map(r => r.id === editingId ? { ...r, playerId: selectedPlayer, type: injuryType, location, dateIn } : r)); setEditingId(null); showToast('Atualizado'); } else { setDmRecords([{ id: Date.now(), playerId: selectedPlayer, type: injuryType, location, dateIn, dateOut: null, status: 'Active', rtpPhase: 1 }, ...records]); const p=[...players]; if(p[selectedPlayer]) p[selectedPlayer].injured=true; setPlayers(p); showToast('No DM'); } setLocation(''); if(!editingId) setSelectedPlayer(''); };
            const handleEdit = (r) => { setEditingId(r.id); setSelectedPlayer(r.playerId); setInjuryType(r.type); setLocation(r.location); setDateIn(r.dateIn); };
            const dischargePlayer = (rId, pId) => { if(confirm('Dar alta?')) { setDmRecords(records.map(r=>r.id===rId?{...r,status:'Recovered',dateOut:getTodayStr()}:r)); const p=[...players]; if(p[pId])p[pId].injured=false; setPlayers(p); showToast('Liberado!'); } };

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in flex flex-col md:flex-row gap-6 custom-scroll">
                    <div className="w-full md:w-1/3 bg-white dark:bg-slate-800 rounded-xl shadow p-6 border dark:border-slate-700 h-fit">
                        <h2 className="text-xl font-bold flex items-center gap-2 mb-4 text-red-500"><Icon name="medkit"/> {editingId ? 'Editar' : 'Entrada DM'}</h2>
                        <select className="w-full border dark:border-slate-600 rounded p-2 mb-3 text-sm dark:bg-slate-700 dark:text-white" value={selectedPlayer} onChange={e=>setSelectedPlayer(e.target.value)} disabled={!!editingId}><option value="">Atleta...</option>{safeArray(players).map((p,i)=><option key={i} value={i}>{p?.name}</option>)}</select>
                        <select className="w-full border dark:border-slate-600 rounded p-2 mb-3 text-sm dark:bg-slate-700 dark:text-white" value={injuryType} onChange={e=>setInjuryType(e.target.value)}><option>Muscular</option><option>Articular</option><option>Pancada</option><option>Outro</option></select>
                        <input className="w-full border dark:border-slate-600 rounded p-2 mb-3 text-sm dark:bg-slate-700 dark:text-white outline-none" placeholder="Diagnóstico (ex: Estiramento Coxa)" value={location} onChange={e=>setLocation(e.target.value)}/>
                        <input type="date" className="w-full border dark:border-slate-600 rounded p-2 mb-4 text-sm dark:bg-slate-700 dark:text-white outline-none" value={dateIn} onChange={e=>setDateIn(e.target.value)}/>
                        <button onClick={handleSave} className="w-full bg-red-600 text-white font-bold py-3 rounded">SALVAR</button>
                    </div>
                    <div className="flex-1 space-y-4">
                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow border dark:border-slate-700 p-4"><h3 className="text-sm font-bold dark:text-white uppercase mb-4 flex items-center gap-2"><Icon name="activity"/> Em Tratamento</h3>
                            {activeInjuries.map((r,i) => {
                                const p=players[r.playerId]; if(!p)return null;
                                return (
                                    <div key={i} className="p-3 bg-slate-700 border border-slate-600 rounded-lg mb-2 relative">
                                        <div className="flex justify-between mb-2"><div className="flex gap-3"><div className="w-10 h-10 rounded-full bg-slate-100 overflow-hidden">{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="user" className="text-red-300"/>}</div><div><div className="font-bold text-white">{p.name}</div><div className="text-xs text-red-400">{r.location}</div></div></div><button onClick={()=>dischargePlayer(r.id,r.playerId)} className="bg-green-500 text-white px-3 py-1 rounded text-xs font-bold">ALTA</button></div>
                                        <select className="w-full text-xs p-1 bg-slate-800 text-white outline-none" value={r.rtpPhase||1} onChange={e=>setDmRecords(records.map(x=>x.id===r.id?{...x,rtpPhase:e.target.value}:x))}>{RTP_PHASES.map(ph=><option key={ph.id} value={ph.id}>{ph.label}</option>)}</select>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const AssessmentView = ({ players, themeColor, assessments, setAssessments, dmRecords }) => {
            const [selectedPlayer, setSelectedPlayer] = useState(0);
            const [form, setForm] = useState({ anamnese: '', conduta: 'Liberado' });
            useEffect(()=>{ const h = assessments[selectedPlayer]?.[0]; if(h) setForm({anamnese:h.anamnese||'', conduta:h.conduta||'Liberado'}); else setForm({anamnese: '', conduta: 'Liberado'}); },[selectedPlayer, assessments]);
            const saveAss = () => { setAssessments({...assessments, [selectedPlayer]: [{...form, date:getTodayStr()}]}); showToast("Avaliação Salva!"); };
            
            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in flex flex-col lg:flex-row gap-6 custom-scroll">
                    <div className="w-full lg:w-60 bg-white dark:bg-slate-800 rounded-xl p-4 border dark:border-slate-700">
                        <h3 className="text-sm font-bold text-slate-400 uppercase mb-4">Atleta</h3>
                        {safeArray(players).map((p,i)=><div key={i} onClick={()=>setSelectedPlayer(i)} className={`flex items-center gap-2 p-2 rounded cursor-pointer border ${selectedPlayer===i?'border-l-4 bg-slate-700':'border-transparent hover:bg-slate-700'}`} style={{borderLeftColor:selectedPlayer===i?themeColor:'transparent'}}><div className="w-8 h-8 rounded-full bg-slate-200 overflow-hidden">{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="user"/>}</div><div className="font-bold text-sm dark:text-white">{p?.name}</div></div>)}
                    </div>
                    <div className="flex-1 bg-white dark:bg-slate-800 rounded-xl p-6 border dark:border-slate-700">
                        <h2 className="text-2xl font-black dark:text-white uppercase mb-6">{players[selectedPlayer]?.name}</h2>
                        <label className="text-[10px] font-bold text-slate-400 uppercase">Anamnese (Cirurgias/Histórico)</label>
                        <textarea className="w-full border dark:border-slate-600 rounded p-2 text-xs dark:bg-slate-700 dark:text-white h-20 outline-none" value={form.anamnese} onChange={e=>setForm({...form, anamnese: e.target.value})} placeholder="Lesões crônicas, cirurgias prévias..."></textarea>
                        <div className="flex flex-wrap gap-1 mt-1 mb-6">
                            <span onClick={()=>setForm({...form, anamnese: form.anamnese+', Cirurgia LCA prévia'})} className="bg-slate-600 text-[8px] px-1.5 py-0.5 rounded cursor-pointer text-white">LCA</span>
                            <span onClick={()=>setForm({...form, anamnese: form.anamnese+', Histórico de Pubalgia'})} className="bg-slate-600 text-[8px] px-1.5 py-0.5 rounded cursor-pointer text-white">Pubalgia</span>
                            <span onClick={()=>setForm({...form, anamnese: form.anamnese+', Lesão Posterior'})} className="bg-slate-600 text-[8px] px-1.5 py-0.5 rounded cursor-pointer text-white">Posterior</span>
                        </div>
                        <label className="text-[10px] font-bold text-slate-400 uppercase">Conduta Clínica</label>
                        <select className="w-full font-bold text-xs p-2 rounded dark:bg-slate-900 border dark:border-slate-600 outline-none text-white mb-6" value={form.conduta} onChange={e=>setForm({...form, conduta: e.target.value})}><option value="Liberado">🟢 Liberado</option><option value="Restrições">🟡 Com Restrições</option><option value="Não Liberado">🔴 Não Liberado</option></select>
                        <button onClick={saveAss} className="w-full py-4 bg-slate-700 text-white font-black rounded-xl">SALVAR AVALIAÇÃO</button>
                    </div>
                </div>
            );
        };

        const MainApp = ({ user, initialData }) => {
            const [tab, setTab] = useState('squad'); 
            const [themeColor, setThemeColor] = useState(initialData?.themeColor || '#1e3a8a');
            const [players, setPlayers] = useState(initialData?.players || []);
            const [trainingLog, setTrainingLog] = useState(initialData?.trainingLog || {});
            const [assessments, setAssessments] = useState(initialData?.assessments || {});
            const [dmRecords, setDmRecords] = useState(initialData?.dmRecords || []);
            const [matchMinutes, setMatchMinutes] = useState(initialData?.matchMinutes || {});
            const [header, setHeader] = useState(initialData?.header || {});
            const [logo, setLogo] = useState(initialData?.logo || null);
            const [darkMode, setDarkMode] = useState(initialData?.darkMode || true);
            const [days, setDays] = useState(safeArray(initialData?.days, DEFAULT_DAYS));
            
            const [exercises, setExercises] = useState(initialData?.exercises || []); 
            const [act, setAct] = useState(initialData?.activationExercises || []);
            const [library, setLibrary] = useState(initialData?.library || []);
            const [postWorkout, setPostWorkout] = useState(initialData?.postWorkout || 'IA');
            const [playerOfTheWeek, setPlayerOfTheWeek] = useState(initialData?.playerOfTheWeek !== undefined ? initialData.playerOfTheWeek : null);
            const [nextGame, setNextGame] = useState(initialData?.nextGame || {opponent: '', date: ''});

            const [showSettings, setShowSettings] = useState(false);
            const [syncStatus, setSyncStatus] = useState(''); 

            useEffect(() => { if (darkMode) document.body.classList.add('dark'); else document.body.classList.remove('dark'); }, [darkMode]);

            useEffect(() => {
                const tId = setTimeout(() => {
                    setSyncStatus('A Guardar...');
                    db.collection('coachData').doc(user.uid).set({ themeColor, players, trainingLog, assessments, dmRecords, matchMinutes, header, logo, darkMode, days, exercises, activationExercises: act, library, postWorkout, playerOfTheWeek, nextGame }, { merge: true }).then(() => { setSyncStatus('☁️ Salvo'); setTimeout(() => setSyncStatus(''), 2000); });
                }, 2000); return () => clearTimeout(tId);
            }, [themeColor, players, trainingLog, assessments, dmRecords, matchMinutes, header, logo, darkMode, days, exercises, act, library, postWorkout, playerOfTheWeek, nextGame, user]);

            return (
                <div className="flex flex-col h-full bg-slate-900 transition-colors">
                    <SettingsModal show={showSettings} onClose={()=>setShowSettings(false)} themeColor={themeColor} setThemeColor={setThemeColor} header={header} setHeader={setHeader} logo={logo} setLogo={setLogo} onExport={()=>{}} onImport={()=>{}} />
                    <div className="bg-slate-800 p-2 flex justify-between items-center shadow-md z-30 shrink-0 border-b border-slate-700">
                        <div className="font-black text-xl italic text-white flex items-center gap-2"><div><span style={{color: themeColor}}>PRO</span>COACH <span className="text-[9px] bg-slate-200 text-slate-800 px-1.5 py-0.5 rounded ml-1">V144 MAX</span></div>{syncStatus && <span className="text-[9px] text-slate-400">{syncStatus}</span>}</div>
                        <div className="flex gap-2 text-slate-400"><button onClick={()=>window.open(`atleta.html?id=${user.uid}`,'_blank')} className="text-xs bg-blue-600 text-white px-3 py-1 rounded font-bold hover:bg-blue-500">VISÃO ATLETA (PORTAL)</button><button onClick={()=>setShowSettings(true)} className="p-2 hover:text-white"><Icon name="settings"/></button></div>
                    </div>
                    <div className="flex bg-slate-900 p-1 gap-1 overflow-x-auto shadow-inner w-full custom-scroll shrink-0 border-b border-slate-800">
                        {['squad','micro','wellness','pse','workout','match','dm','assessment','library'].map(t=><button key={t} onClick={()=>setTab(t)} className={`px-4 py-2 rounded text-xs font-bold ${tab===t?'bg-slate-700 text-white':'text-slate-500'}`}>{t.toUpperCase()}</button>)}
                    </div>
                    <div className="flex-1 overflow-hidden relative">
                        {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} playerOfTheWeek={playerOfTheWeek} setPlayerOfTheWeek={setPlayerOfTheWeek} />}
                        {tab === 'micro' && <MicrocycleView days={days} setDays={setDays} themeColor={themeColor} players={players} trainingLog={trainingLog} />}
                        {tab === 'wellness' && <WellnessDashboard players={players} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} />}
                        {tab === 'pse' && <PSEView players={players} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} />}
                        {tab === 'workout' && <WorkoutBuilderView themeColor={themeColor} exercises={exercises} setExercises={setExercises} act={act} setAct={setAct} library={library} postWorkout={postWorkout} setPostWorkout={setPostWorkout} />}
                        {tab === 'match' && <PreGameView players={players} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} matchMinutes={matchMinutes} setMatchMinutes={setMatchMinutes} nextGame={nextGame} setNextGame={setNextGame} />}
                        {tab === 'dm' && <MedicalView players={players} setPlayers={setPlayers} dmRecords={dmRecords} setDmRecords={setDmRecords} themeColor={themeColor} />}
                        {tab === 'assessment' && <AssessmentView players={players} themeColor={themeColor} assessments={assessments} setAssessments={setAssessments} dmRecords={dmRecords} />}
                        {tab === 'library' && <LibraryView themeColor={themeColor} library={library} setLibrary={setLibrary} />}
                    </div>
                </div>
            );
        };

        const RootApp = () => {
            const [user, setUser] = useState(null); const [loading, setLoading] = useState(true); const [data, setData] = useState({});
            useEffect(() => { const unsub = auth.onAuthStateChanged(u => { setUser(u); if(!u){setLoading(false); document.getElementById('loading-state').style.display='none';} else { db.collection('coachData').doc(u.uid).get().then(doc=>{if(doc.exists) setData(doc.data()); setLoading(false); document.getElementById('loading-state').style.display='none';}) } }); return ()=>unsub(); }, []);
            if (loading) return null; if (!user) return <LoginScreen onLogin={()=>{}} />; return <ErrorBoundary><MainApp user={user} initialData={data}/></ErrorBoundary>;
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<RootApp />);
    </script>
</body>
</html>
