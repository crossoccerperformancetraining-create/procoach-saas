class ErrorBoundary extends React.Component {
    constructor(props){super(props);this.state={hasError:false,resetting:false};}
    static getDerivedStateFromError(error){return{hasError:true};}
    componentDidCatch(error,info){console.error(error);}
    handleHardReset=async()=>{
        this.setState({resetting:true});localStorage.clear();
        if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();for(let r of regs)r.unregister();}
        const user=firebase.auth().currentUser;
        if(user){await firebase.firestore().collection('coachData').doc(user.uid).set({players:[],trainingLog:{},dmRecords:[],matchMinutes:{},assessments:{},days:DEFAULT_DAYS,themeColor:'#1e3a8a',darkMode:true});}
        window.location.href=window.location.pathname+'?c='+Date.now();
    }
    render(){
        if(this.state.hasError) return (<div className="flex flex-col h-screen w-screen items-center justify-center bg-slate-900 text-white p-6 text-center"><div className="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center mb-4"><span className="text-3xl">⚠️</span></div><h1 className="text-xl font-bold mb-2">Erro de Nuvem Detetado</h1><button onClick={this.handleHardReset} className="bg-blue-600 text-white font-bold py-4 px-8 rounded shadow-lg mt-4">{this.state.resetting?"A FORMATAR...":"FORÇAR CORREÇÃO"}</button></div>);
        return this.props.children;
    }
}

const getDatesInRange=(start,daysBack)=>{const dates=[];const end=new Date(start);end.setMinutes(end.getMinutes()-end.getTimezoneOffset());for(let i=0;i<daysBack;i++){const d=new Date(end);d.setDate(end.getDate()-i);dates.push(d.toISOString().split('T')[0]);}return dates;};

const MicrocycleView = ({ days, setDays, themeColor, players, trainingLog }) => {

    const openM=(d,p)=>{sAS({d,p});sMO(true);};
    const addE=t=>{setDays(sD.map(d=>d.id===aS.d?{...d,[aS.p]:[...(d[aS.p]||[]),{id:Date.now(),type:t.l,colorClass:t.c,textClass:t.t}]}:d));sMO(false);};
    const remE=(id,p,eId)=>setDays(sD.map(d=>d.id===id?{...d,[p]:(d[p]||[]).filter(e=>e.id!==eId)}:d));
    const upH=(id,f,v)=>setDays(sD.map(d=>d.id===id?{...d,[f]:v}:d));
    const yLoad=useMemo(()=>{const y=new Date();y.setDate(y.getDate()-1);y.setMinutes(y.getMinutes()-y.getTimezoneOffset());const yS=y.toISOString().split('T')[0];let tL=0,c=0;safeArray(players).forEach((p,i)=>{if(p&&!p.injured){const l=trainingLog[yS]?.[i];if(l){tL+=calcDailyLoad(l);c++;}}});return c>0?tL/c:0;},[players,trainingLog]);

                        <div className="text-sm mb-4">A inteligência sugere ajuste baseado no cansaço. Carga de ontem: {Math.round(yLoad)}.</div>
                        <button onClick={()=>sAiM(null)} className="w-full bg-blue-600 text-white font-bold py-2 rounded">Fechar</button>

            <div className="bg-white dark:bg-slate-800 p-4 shadow-sm flex justify-between items-center shrink-0">

                    {sD.map(d=>(
                        <div key={d.id} className="w-40 flex flex-col bg-slate-100 dark:bg-slate-800/50 rounded-xl overflow-hidden shrink-0 shadow-sm" style={{maxHeight:'100%'}}>

            <div className="flex-1 overflow-hidden relative">
                {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} />}
                {tab === 'micro' && <MicrocycleView days={days} setDays={setDays} themeColor={themeColor} players={players} trainingLog={trainingLog} />}
                {tab === 'pse' && <PSEView players={players} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} />}
                {tab === 'assessment' && <AssessmentView players={players} themeColor={themeColor} assessments={assessments} setAssessments={setAssessments} dmRecords={dmRecords} />}
                {tab === 'dm' && <MedicalView players={players} setPlayers={setPlayers} dmRecords={dmRecords} setDmRecords={setDmRecords} themeColor={themeColor} />}
            </div>
        </div>
    );
};

const CloudWrapper = ({ user }) => {
    const [init, setInit] = useState(null); const [l, setL] = useState(true);
    useEffect(() => {
        db.collection('coachData').doc(user.uid).onSnapshot(d => {
            setInit(sanitizeCloudData(d.exists ? d.data() : {})); setL(false);
        }, () => { setInit(sanitizeCloudData({})); setL(false); });
    }, [user]);
    if (l) return <div className="flex h-screen items-center justify-center bg-slate-900 text-white">Carregando Nuvem...</div>;
    return <ErrorBoundary><MainApp user={user} initialData={init} /></ErrorBoundary>;
};

const RootApp = () => {
    const [user, setUser] = useState(null); const [loading, setLoading] = useState(true);
    useEffect(() => { auth.onAuthStateChanged(u => { setUser(u); setLoading(false); document.getElementById('loading-state').style.display='none'; }); }, []);
    if (loading) return null;
    if (!user) return <LoginScreen onLogin={()=>{}} />;
    return <CloudWrapper user={user} />;
};
ReactDOM.createRoot(document.getElementById('root')).render(<RootApp />);
</script></body></html>
