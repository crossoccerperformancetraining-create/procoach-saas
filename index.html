        const { useState, useEffect, useRef, useMemo } = React;

            { id: 7, md: 'MD+2', name: 'DOMINGO', date:'', plannedMins: '', am: [], pm: [] }
        ];

        const RTP_PHASES = [ 
            {id:1, label:"Fase 1: Aguda", desc:"Controle do quadro álgico/inflamatório. Fisioterapia."}, 
            {id:2, label:"Fase 2: Sub-aguda", desc:"Reabilitação do segmento lesado + Fortalecimento não envolvidos. Fisioterapia."}, 
            {id:3, label:"Fase 3: Transição I", desc:"Força segmentada (não envolvidos) + Cardio sem impacto. Fisio + Transição."}, 
            {id:4, label:"Fase 4: Transição II", desc:"Funcionais + cardio sem impacto. Força com restrição. Introdução Pliometria/Corrida."}, 
            {id:5, label:"Fase 5: Transição III", desc:"Força sem restrições funcionais. Cardio com impacto. Fisio + Transição Campo."}, 
            {id:6, label:"Fase 6: Performance I", desc:"Potência na Academia. Aceleração e Pliometria sem restrições."}, 
            {id:7, label:"Fase 7: Performance II", desc:"Potência especifica do esporte. Preparação individual e parcial com grupo."}, 
            {id:8, label:"Fase 8: Performance III", desc:"Retorno ao grupo com minutagem controlada em jogo. Liberado treino com o grupo sem restrições."}, 
            {id:9, label:"Fase 9: Liberação", desc:"Responsabilidade do atleta com cuidados antes e após treinos e jogos."} 
        ];
const MicrocycleView = ({ days, setDays, themeColor, players, trainingLog }) => {
            const [modalOpen, setModalOpen] = useState(false);
            const [aiModal, setAiModal] = useState(null);
            const [activeSlot, setActiveSlot] = useState({ dayId: null, period: null });
            
            // Estado para a data de início (Sempre Segunda-Feira)
            const [startDate, setStartDate] = useState(() => {
                const d = new Date();
                const day = d.getDay();
                const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
                const monday = new Date(d.setDate(diff));
                return monday.toISOString().split('T')[0];
            });

            const safeDays = days.map(d => ({...d, plannedMins: d.plannedMins || ''}));

            // 🔥 CORREÇÃO: Função com ajuste de fuso horário para a data bater com o dia
            const getDayDate = (index) => {
                const date = new Date(startDate + 'T12:00:00'); 
                date.setDate(date.getDate() + index);
                return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
            };

            const eventTypes = [ 
                { label: 'JOGO', color: 'bg-[#dc2626]', text: 'text-white', load: 100 }, 
                { label: 'RECUPERAÇÃO', color: 'bg-[#3b82f6]', text: 'text-white', load: 20 }, 
                { label: 'ACADEMIA', color: 'bg-[#eab308]', text: 'text-slate-900', load: 40 }, 
                { label: 'FOLGA', color: 'bg-[#94a3b8]', text: 'text-slate-800', load: 0 },
                { label: 'TREINO FÍSICO', color: 'bg-[#16a34a]', text: 'text-white', load: 60 },
                { label: 'TÉCNICO', color: 'bg-[#2563eb]', text: 'text-white', load: 50 }, 
                { label: 'JOGUINHO', color: 'bg-[#ec4899]', text: 'text-white', load: 60 },
                { label: 'ORG. OFENSIVA', color: 'bg-[#0ea5e9]', text: 'text-white', load: 60 }, 
                { label: 'ORG. DEFENSIVA', color: 'bg-[#f97316]', text: 'text-white', load: 60 }, 
                { label: 'TRANS. OFENSIVA', color: 'bg-[#06b6d4]', text: 'text-white', load: 70 }, 
                { label: 'TRANS. DEFENSIVA', color: 'bg-[#f43f5e]', text: 'text-white', load: 70 }, 
                { label: 'ABP OFENSIVA', color: 'bg-[#8b5cf6]', text: 'text-white', load: 30 }, 
                { label: 'ABP DEFENSIVA', color: 'bg-[#d946ef]', text: 'text-white', load: 30 }, 
                { label: 'TÁTICO GERAL', color: 'bg-[#10b981]', text: 'text-white', load: 60 }, 
                { label: 'PDI', color: 'bg-[#14b8a6]', text: 'text-white', load: 40 }
            ];

            const openModal = (dayId, period) => { setActiveSlot({ dayId, period }); setModalOpen(true); };
            
           // 🔥 FUNÇÃO CORRIGIDA: ADICIONA E SALVA NO FIREBASE
            const addEvent = (typeObj) => {
                const newDays = safeDays.map(d => {
                    if(d.id === activeSlot.dayId) {
                        const currentEvents = Array.isArray(d[activeSlot.period]) ? d[activeSlot.period] : [];
                        const newEvent = { 
                            id: Date.now(), 
                            type: typeObj.label, 
                            colorClass: typeObj.color, 
                            textClass: typeObj.text 
                        };
                        return { ...d, [activeSlot.period]: [...currentEvents, newEvent] };
                    }
                    return d;
                });
                
                setDays(newDays);
                setModalOpen(false);

                // Salva na Nuvem para não sumir
                const user = firebase.auth().currentUser;
                if(user) {
                    db.collection('coachData').doc(user.uid).update({ days: newDays })
                      .then(() => console.log("Microciclo Salvo!"))
                      .catch(err => console.error(err));
                }
            };

            const removeEvent = (dayId, period, eventId) => {
                const newDays = safeDays.map(d => d.id === dayId ? { ...d, [period]: (d[period] || []).filter(e => e.id !== eventId) } : d);
                setDays(newDays);
                const user = firebase.auth().currentUser;
                if(user) db.collection('coachData').doc(user.uid).update({ days: newDays });
            };

            const updateHeader = (dayId, field, val) => {
                const newDays = safeDays.map(d => d.id === dayId ? { ...d, [field]: val } : d);
                setDays(newDays);
                // Salva alteração de nome do dia ou MD
                const user = firebase.auth().currentUser;
                if(user) db.collection('coachData').doc(user.uid).update({ days: newDays });
            };
            const renderAiAnalysis = () => {
                if(!aiModal) return null;
                const md = aiModal.md || "";
                const mins = Number(aiModal.plannedMins) || 0;
                let focus = "", advice = "", timeRange = "", pseRange = "", volStatus = "";
                if(md.includes('MD-4')) { focus = "Aquisição (Força/Resistência)"; advice = "Dia longe do jogo. Ideal para cargas altas."; timeRange = "70 a 90 min"; pseRange = "7 a 8 (Intenso)"; }
                else if(md.includes('MD-3')) { focus = "Específico (Tática/Intensidade)"; advice = "Dia de 'choque'. Intensidade simil jogo."; timeRange = "60 a 75 min"; pseRange = "8 a 9 (Muito Intenso)"; }
                else if(md.includes('MD-2')) { focus = "Velocidade / Polimento"; advice = "O Tapering (polimento) começa aqui. O volume deve cair drasticamente (-40%)."; timeRange = "45 a 60 min"; pseRange = "5 a 6 (Moderado)"; }
                else if(md.includes('MD-1')) { focus = "Ativação / Bola Parada"; advice = "Véspera de jogo. Carga mínima. Apenas ativação neural."; timeRange = "30 a 45 min"; pseRange = "3 a 4 (Fácil)"; }
                else if(md === 'JOGO') { focus = "Competição"; advice = "Foco total na estratégia e hidratação."; timeRange = "90+ min"; pseRange = "10 (Máximo)"; }
                else { focus = "Recuperação / Ajuste"; advice = "Foco em remover metabólitos e soltura."; timeRange = "30 a 45 min"; pseRange = "2 a 3 (Muito Fácil)"; }
                volStatus = mins > 0 ? (mins > 90 ? "Volume ALTO. Risco de fadiga residual." : "Volume dentro dos parâmetros sugeridos.") : "Insira o tempo previsto (min) para receber análise fisiológica de volume sem GPS.";

                return (
                    <div className="fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4 animate-fade-in" onClick={()=>setAiModal(null)}>
                        <div className="bg-[#1e293b] rounded-2xl shadow-2xl p-6 w-full max-w-md border border-slate-700" onClick={e=>e.stopPropagation()}>
                            <div className="flex flex-col items-center mb-6"><div className="bg-blue-500/20 p-3 rounded-full mb-2"><Icon name="brain" size={32} className="text-blue-400"/></div><h3 className="text-xl font-black text-white uppercase">Análise {aiModal.name} <span className="text-blue-400">({md})</span></h3></div>
                            <div className="bg-slate-800/50 p-4 rounded-xl mb-4 border border-slate-700"><div className="text-[10px] font-black text-slate-400 uppercase mb-1">Foco Sugerido</div><div className="text-white font-bold">{focus}</div></div>
                            <p className="text-xs text-slate-300 mb-6 leading-relaxed">{advice}</p>
                            <div className="grid grid-cols-2 gap-4 mb-6"><div className="bg-slate-800 p-3 rounded-xl border border-slate-700 text-center"><div className="text-[9px] font-black text-slate-500 uppercase mb-1">Tempo Alvo Máx</div><div className="text-blue-400 font-black">{timeRange}</div></div><div className="bg-slate-800 p-3 rounded-xl border border-slate-700 text-center"><div className="text-[9px] font-black text-slate-500 uppercase mb-1">PSE Alvo</div><div className="text-orange-400 font-black">{pseRange}</div></div></div>
                            <div className="bg-emerald-500/10 border border-emerald-500/30 p-3 rounded-xl mb-6"><div className="text-[9px] font-black text-emerald-400 uppercase mb-1">Análise de Tempo (Sem GPS)</div><div className="text-xs text-emerald-200 font-bold">{volStatus}</div></div>
                            <button onClick={()=>setAiModal(null)} className="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase hover:bg-blue-700 transition-all">Entendido</button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="h-full bg-slate-900 flex flex-col relative overflow-hidden animate-fade-in">
                    {renderAiAnalysis()}
                    <div className="bg-[#0f172a] p-4 border-b border-slate-800 flex justify-between items-center shrink-0">
                        <div className="flex flex-col">
                            <h2 className="font-black text-lg text-white italic flex gap-2 uppercase">
                                <Icon name="calendar" className="not-italic text-blue-500"/> Planeamento Semanal
                            </h2>
                            <div className="flex items-center gap-2 mt-1">
                                <span className="text-[9px] font-bold text-slate-500 uppercase">Início da Semana:</span>
                                <input type="date" className="bg-slate-800 text-white text-[10px] font-black p-1 rounded border border-slate-700 outline-none" value={startDate} onChange={(e) => setStartDate(e.target.value)} />
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button className="bg-slate-800 text-white px-3 py-1.5 rounded-lg text-xs font-black flex items-center gap-2 border border-slate-700"><Icon name="share" size={14}/> PNG</button>
                            <button className="bg-red-600 text-white px-3 py-1.5 rounded-lg text-xs font-black flex items-center gap-2 shadow-lg"><Icon name="download" size={14}/> PDF</button>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-auto p-2 flex flex-col custom-scroll">
                        <div className="flex gap-3 min-w-max pb-12 items-stretch">
                            {safeDays.map((day, index) => (
                                <div key={day.id} className="w-44 flex flex-col bg-[#1e293b] rounded-2xl overflow-hidden shrink-0 border border-slate-700 shadow-xl">
                                    <div className="bg-[#1a4a3e] p-3 text-center shrink-0 relative">
                                        {/* DATA CORRIGIDA AQUI */}
                                        <div className="text-[9px] font-black text-emerald-400 mb-1 uppercase tracking-tighter">{getDayDate(index)}</div>
                                        <button onClick={()=>setAiModal(day)} className="absolute top-1 right-1 text-white/40 hover:text-white transition-colors"><Icon name="info" size={14}/></button>

                                        <select className="bg-white/10 rounded text-center text-[10px] text-white w-full outline-none font-black uppercase mb-2 border-none" value={day.md || ''} onChange={(e)=>updateHeader(day.id,'md',e.target.value)}>
                                            {['MD-4','MD-3','MD-2','MD-1','JOGO','MD+1','MD+2'].map(o=><option key={o} value={o} className="text-black">{o}</option>)}
                                        </select>

                                        </div>

            const file = new File([blob], filename, { type: blob.type });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try { await navigator.share({ files: [file], title: title }); return; } catch (err) { console.log("Compartilhamento cancelado", err); }
            }
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);

                return dur > 0 ? rpeSum * dur : rpeSum * 60;

            const historyDates = getDatesInRange(today, 7).slice(1);

        const PSEView = ({ players, themeColor, trainingLog, setTrainingLog }) => {
            const [date, setDate] = useState(getTodayStr()); 
            const [globalDur, setGlobalDur] = useState('');
            const [localRPEs, setLocalRPEs] = useState({});
            const [saveStatus, setSaveStatus] = useState('');
            const saveTimeoutRef = useRef(null);

            useEffect(() => { 
                const c = {}; 
                safeArray(players).forEach((_, i) => { 
                    const log = trainingLog[date]?.[i] || {}; 
                    c[i] = { am: Number(log.rpe_am) || 0, pm: Number(log.rpe_pm) || 0, dur: Number(log.duration) || 0 }; 
                }); 
                setLocalRPEs(c); 
            }, [date, players, trainingLog]);

            const saveToMain = (currentLocal) => { 
                setSaveStatus('A Guardar...'); 
                const newLog = {...trainingLog}; 
                if(!newLog[date]) newLog[date] = {}; 
                safeArray(players).forEach((_, i) => { 
                    if(!newLog[date][i]) newLog[date][i] = {}; 
                    newLog[date][i].rpe_am = currentLocal[i].am; 
                    newLog[date][i].rpe_pm = currentLocal[i].pm; 
                    newLog[date][i].duration = currentLocal[i].dur;
                }); 
                setTrainingLog(newLog); 
                setTimeout(() => setSaveStatus('Salvo'), 500); 
                setTimeout(() => setSaveStatus(''), 2000); 
            };

            const updateRPE = (i, field, val) => { 
                const newValue = parseInt(val) || 0; 
                setLocalRPEs(prev => { 
                    const next = {...prev, [i]: {...(prev[i]||{am:0, pm:0}), [field]: newValue}}; 
                    if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current); 
                    saveTimeoutRef.current = setTimeout(() => { saveToMain(next); }, 1000); 
                    return next; 
                }); 
            };

            const applyGlobalDur = (val) => {
                setGlobalDur(val);
                const num = parseInt(val) || 0;
                setLocalRPEs(prev => {
                    const next = {};
                    safeArray(players).forEach((_, i) => {
                        next[i] = { ...(prev[i] || {am:0, pm:0}), dur: num };
                    });
                    if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
                    saveTimeoutRef.current = setTimeout(() => { saveToMain(next); }, 1000);
                    return next;
                });
            };

            const manualSave = () => { if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current); saveToMain(localRPEs); showToast("Salvo manualmente!"); };

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in flex flex-col relative custom-scroll">
                    <div className={`status-badge ${saveStatus ? 'show' : ''} z-50`}>{saveStatus === 'Salvo' ? '💾 SALVO' : '⏳ A Guardar...'}</div>
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 shrink-0 gap-4">
                        <div className="flex items-center gap-2"><h2 className="text-xl font-bold text-slate-700 dark:text-slate-100 flex items-center gap-2"><Icon name="activity"/> CONTROLO DE CARGA (sRPE)</h2></div>
                        
                        <div className="flex flex-wrap items-center gap-4 bg-slate-50 dark:bg-slate-900 p-2 rounded-lg border border-slate-200 dark:border-slate-700 w-full md:w-auto">
                            <div className="flex items-center gap-2 flex-1 md:flex-none">
                                <span className="text-[10px] font-bold text-slate-500 uppercase whitespace-nowrap">Tempo Geral:</span>
                                <input type="number" placeholder="Minutos..." value={globalDur} onChange={e=>applyGlobalDur(e.target.value)} className="w-24 p-2 text-xs font-bold border dark:border-slate-600 rounded bg-white dark:bg-slate-700 dark:text-white outline-none" title="Aplica este tempo para todos os atletas"/>
                            </div>
                            <div className="h-6 w-px bg-slate-300 dark:bg-slate-600 hidden md:block"></div>
                            <div className="flex gap-2 flex-1 md:flex-none justify-end">
                                <button onClick={manualSave} className="bg-slate-200 dark:bg-slate-700 p-2 rounded hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300"><Icon name="save"/></button>
                                <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="bg-slate-100 dark:bg-slate-700 dark:text-white font-bold p-2 rounded border dark:border-slate-600 w-full md:w-auto outline-none"/>
                            </div>
                        </div>
                    </div>
                    
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col flex-1 min-h-0">
                        <div className="grid grid-cols-12 bg-slate-100 dark:bg-slate-700 p-3 text-[10px] font-bold text-slate-500 dark:text-slate-300 uppercase shrink-0">
                            <div className="col-span-4">Atleta</div>
                            <div className="col-span-3 text-center">Manhã (0-10)</div>
                            <div className="col-span-3 text-center">Tarde (0-10)</div>
                            <div className="col-span-2 text-center">Duração (min)</div>
                        </div>
                        <div className="divide-y divide-slate-100 dark:divide-slate-700 overflow-y-auto flex-1 custom-scroll">
                            {safeArray(players).map((p, i) => { 
                                if(!p) return null; 
                                const dur = localRPEs[i]?.dur||0;
                                const sRPE = ((localRPEs[i]?.am||0) + (localRPEs[i]?.pm||0)) * (dur > 0 ? dur : 60);
                                return (
                                    <div key={i} className={`grid grid-cols-12 p-3 items-center hover:bg-slate-50 dark:hover:bg-slate-700/50`}>
                                        <div className="col-span-4">
                                            <div className="flex items-center gap-3">
                                                <div className="w-8 h-8 rounded-full bg-slate-200 overflow-hidden shrink-0">{p.image?<img src={p.image} className="w-full h-full object-cover object-top"/>:<Icon name="user"/>}</div>
                                                <div>
                                                    <span className="font-bold text-sm text-slate-700 dark:text-slate-200 truncate block">{p.name}</span>
                                                    {sRPE > 0 && <span className="text-[9px] font-bold text-blue-500">Carga Real: {sRPE}</span>}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="col-span-3 flex justify-center"><input type="range" min="0" max="10" value={localRPEs[i]?.am||0} onChange={e=>updateRPE(i,'am',e.target.value)} className="w-16 md:w-24 mr-2 accent-blue-600"/><span className="font-bold w-4 text-center text-blue-600 dark:text-blue-400">{localRPEs[i]?.am}</span></div>
                                        <div className="col-span-3 flex justify-center"><input type="range" min="0" max="10" value={localRPEs[i]?.pm||0} onChange={e=>updateRPE(i,'pm',e.target.value)} className="w-16 md:w-24 mr-2 accent-orange-500"/><span className="font-bold w-4 text-center text-orange-500 dark:text-orange-400">{localRPEs[i]?.pm}</span></div>
                                        <div className="col-span-2 flex justify-center"><input type="number" min="0" placeholder="0" className="w-12 md:w-16 p-1 text-center text-sm font-bold border dark:border-slate-600 rounded bg-white dark:bg-slate-800 dark:text-white outline-none" value={localRPEs[i]?.dur||''} onChange={e=>updateRPE(i,'dur',e.target.value)} /></div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const TeamCoachAI = ({ activePlayers, pseAvg, dmCount }) => {
            const numericAvg = parseFloat(pseAvg) || 0;
            let title = "Diagnóstico da Equipe"; let suggestion = ""; let colorClass = "bg-slate-800 text-slate-300";
            if (numericAvg >= 600) { title = "ALERTA VERMELHO (Sobrecarga)"; suggestion = "Carga Extremamente Alta. RISCO DE LESÃO ELEVADO. Amanhã: Recuperação passiva ou folga obrigatória."; colorClass = "bg-red-900 text-red-50"; } 
            else if (numericAvg >= 400) { title = "Zona de Alta Intensidade"; suggestion = "Treino exigente. Amanhã: Carga baixa/moderada (foco tático sem contato) para supercompensação."; colorClass = "bg-orange-800 text-orange-50"; } 
            else if (numericAvg >= 200) { title = "Zona de Manutenção/Desenvolvimento"; suggestion = "Carga Ideal. Amanhã: Pode manter a intensidade se não for véspera de jogo (MD-1)."; colorClass = "bg-green-800 text-green-50"; } 
            else if (numericAvg > 0) { title = "Carga Baixa / Regenerativo"; suggestion = "Estímulo leve hoje. Amanhã: Oportunidade para 'Choque' (Força ou Resistência) se longe do jogo."; colorClass = "bg-blue-800 text-blue-50"; } 
            else { title = "Sem Dados Suficientes"; suggestion = "Aguardando preenchimento de PSE e Duração (min) dos treinos."; colorClass = "bg-slate-800 text-slate-300"; }
            if(dmCount >= 3) { suggestion += ` ALERTA: ${dmCount} atletas no DM. Atenção na rotação.`; }
            return (<div className={`md:col-span-2 rounded-xl shadow p-5 border border-slate-700 flex flex-col justify-center relative overflow-hidden ${colorClass}`}><div className="absolute top-0 right-0 p-4 opacity-10"><Icon name="brain" size={80}/></div><div className="flex items-center gap-2 mb-2 z-10"><div className="bg-white/20 p-1.5 rounded-full"><Icon name="brain" size={20}/></div><h3 className="font-bold text-sm uppercase tracking-wider opacity-80">Técnico Virtual (Equipe)</h3></div><div className="z-10"><div className="text-xl font-black mb-1">{title}</div><div className="text-sm font-medium opacity-90 leading-snug">{suggestion}</div></div></div>);
        };

        const PreGameView = ({ players, setPlayers, themeColor, trainingLog, dmRecords, matchMinutes, setMatchMinutes }) => {
            const [monitorDate, setMonitorDate] = useState(getTodayStr()); 
            const dailyData = safeObj(trainingLog[monitorDate]);
            const safePs = safeArray(players);
            
            // --- CÁLCULO DA BARRA DE CARGA SEMANAL (7 DIAS) ---
            const weeklyLoadStats = useMemo(() => {
                const dates = getDatesInRange(monitorDate, 7);
                let currentAccumulatedLoad = 0;

                dates.forEach(d => {
                    safePs.forEach((_, i) => {
                        currentAccumulatedLoad += calcDailyLoad(safeObj(trainingLog[d]?.[i]));
                    });
                });

                const avgLoadPerAtleta = safePs.length > 0 ? currentAccumulatedLoad / safePs.length : 0;
                const limit = 2800; // Teto de segurança sRPE semanal médio
                const percentage = Math.min(100, (avgLoadPerAtleta / limit) * 100);
                
                let statusColor = "bg-green-500";
                let statusText = "ZONA SEGURA";
                if (percentage > 85) { 
                    statusColor = "bg-red-600 animate-pulse"; 
                    statusText = "ALERTA: SOBRECARGA NO ELENCO"; 
                } else if (percentage > 65) { 
                    statusColor = "bg-yellow-500"; 
                    statusText = "ATENÇÃO: CARGA ACUMULADA"; 
                }

                return { percentage, statusColor, statusText, avgLoadPerAtleta };
            }, [trainingLog, monitorDate, safePs]);

            const activePlayersIndices = [];
            safePs.forEach((p, i) => { if(p && safeObj(dailyData[i]?.wellness).sleep) activePlayersIndices.push(i); });
            
            const teamHooperAvg = activePlayersIndices.length > 0 
                ? Math.round(activePlayersIndices.reduce((acc, i) => acc + getWSum(dailyData[i]?.wellness), 0) / activePlayersIndices.length) 
                : 0;

            const rpePlayersIndices = [];
            safePs.forEach((p, i) => { if(p && calcDailyLoad(dailyData[i]) > 0) rpePlayersIndices.push(i); });
            
            const pseSum = rpePlayersIndices.reduce((acc, i) => acc + calcDailyLoad(dailyData[i]), 0);
            const pseAvgRaw = rpePlayersIndices.length > 0 ? Math.round(pseSum / rpePlayersIndices.length) : 0;
            const pseColor = pseAvgRaw >= 600 ? '#ef4444' : pseAvgRaw >= 300 ? '#eab308' : '#22c55e';
            
            const dmCount = safePs.filter(p => p && p.injured).length;
            
            const weeklyDates = getDatesInRange(monitorDate, 7).reverse();
            const weeklyData = weeklyDates.map(d => {
                const dayLog = safeObj(trainingLog[d]);
                let loadSum = 0, wellnessSum = 0, countLoad = 0, countWell = 0;
                safePs.forEach((p, i) => {
                    if(p) {
                        const l = dayLog[i];
                        if(l) { 
                            const load = calcDailyLoad(l);
                            if(load > 0) { loadSum += load; countLoad++; } 
                            if(safeObj(l.wellness).sleep) { wellnessSum += getWSum(l.wellness); countWell++; } 
                        }
                    }
                });
                return { date: d, avgLoad: countLoad > 0 ? Math.round(loadSum/countLoad) : 0, avgWell: countWell > 0 ? Math.round(wellnessSum/countWell) : 0 };
            });

            const updateMinutes = (pIdx, val) => { 
                const newMins = {...matchMinutes}; 
                if(!newMins[monitorDate]) newMins[monitorDate] = {}; 
                newMins[monitorDate][pIdx] = parseInt(val) || 0; 
                setMatchMinutes(newMins); 
            };

            const [viewProfile, setViewProfile] = useState(null);

            const renderMatchReadinessAI = (pLog, mins, isInjured, inTransition) => {
                if (isInjured) return <div className="text-[9px] font-bold text-red-500 bg-red-900/30 px-2 py-0.5 rounded">Indisponível (DM)</div>;
                if (inTransition) return <div className="text-[9px] font-bold text-orange-500 bg-orange-900/30 px-2 py-0.5 rounded">Transição - Limite: 45min</div>;
                const load = calcDailyLoad(pLog);
                const wellness = getWSum(pLog?.wellness);
                if (mins >= 150) return <div className="text-[9px] font-bold text-red-500 bg-red-900/30 px-2 py-0.5 rounded">Risco - Poupe o Atleta</div>;
                if (load >= 600 || wellness >= 20) return <div className="text-[9px] font-bold text-yellow-500 bg-yellow-900/30 px-2 py-0.5 rounded">Fadigado - Controlar Minutos</div>;
                return <div className="text-[9px] font-bold text-green-500 bg-green-900/30 px-2 py-0.5 rounded">Apto para Jogo</div>;
            };

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in custom-scroll">

        const AssessmentView = ({ players, themeColor, assessments, setAssessments, dmRecords }) => {

                fms_tspu: '', fms_rs_l: '', fms_rs_r: '', fms_total: '',
                lachman: '', mcmurray: '', isocinetica: '', 
                tornozelo_gaveta: '', lunge_test: '',

                const hs = Math.min(getV('fms_hs_l')||0, getV('fms_hs_r')||0);
                const ill = Math.min(getV('fms_ill_l')||0, getV('fms_ill_r')||0);
                const sm = Math.min(getV('fms_sm_l')||0, getV('fms_sm_r')||0);
                const aslr = Math.min(getV('fms_aslr_l')||0, getV('fms_aslr_r')||0);
                const tspu = getV('fms_tspu') || 0;
                const rs = Math.min(getV('fms_rs_l')||0, getV('fms_rs_r')||0);
                return ds + hs + ill + sm + aslr + tspu + rs;
            };

            const calculateBF = () => { const sum = Number(form.chest)+Number(form.axilla)+Number(form.tricep)+Number(form.subscap)+Number(form.abdo)+Number(form.supra)+Number(form.thigh); if(sum===0||!form.age) return 0; const bd = 1.112 - (0.00043499*sum) + (0.00000055*sum*sum) - (0.00028826*form.age); return (((4.95/bd)-4.50)*100).toFixed(1); };
            
            const saveAssessment = () => { 
                const newRec = { ...form, bf: calculateBF(), fms_total: calculateFMS() }; 
                const h = Array.isArray(assessments[selectedPlayer]) ? assessments[selectedPlayer] : [];

            };
            
            const getRankings = (metric) => { 
                const list = safeArray(players).map((p, i) => {

                    if(h.length === 0 || !h[0] || h[0][metric] === undefined) return null;
                    const val = parseFloat(h[0][metric]); 
                    return { name: p.name, val: isNaN(val) ? 0 : val }; 
                }).filter(x => x && x.val > 0); 
                
                if(metric === 'speed30') { list.sort((a,b) => a.val - b.val); } 
                else { list.sort((a,b) => b.val - a.val); } 
                
                return { top5: list.slice(0, 5), bottom5: list.slice(-5).reverse() }; 
            };

       const LibraryView = ({ themeColor, library, setLibrary, initialData, user }) => {
            const [categories, setCategories] = useState(initialData?.customCategories || ['Ativação', 'Mobilidade', 'Força', 'Potência', 'Tático', 'Prevenção']);
            const [form, setForm] = useState({ title: '', gifUrl: '', category: categories[0] });
            const [filter, setFilter] = useState('Todas');
            const importInputRef = useRef(null);

            // Sincroniza categorias com o Firebase
            useEffect(() => {
                if(user) db.collection('coachData').doc(user.uid).set({ customCategories: categories }, { merge: true });
            }, [categories, user]);

            // 🔥 FUNÇÃO DE EXPORTAR PASTA (Para comercializar)
            const exportFolder = () => {
                if(filter === 'Todas') {
                    alert("Por favor, selecione uma pasta específica para exportar.");
                    return;
                }
                const folderContent = library.filter(l => l.category === filter);
                if(folderContent.length === 0) {
                    alert("Esta pasta está vazia.");
                    return;
                }

                const dataToExport = {
                    appName: "ProCoach_AdrianoCabeça",
                    category: filter,
                    content: folderContent
                };

                const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `PASTA_${filter.toUpperCase()}_PROCOACH.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                alert("Pasta exportada com sucesso! Agora você pode enviar este arquivo para outros treinadores.");
            };

            // 🔥 FUNÇÃO DE IMPORTAR PASTA
            const handleImport = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if(!importedData.content) throw new Error();

                        // Mescla os novos GIFs evitando duplicados pelo link
                        const currentUrls = new Set(library.map(i => i.gifUrl));
                        const newGifs = importedData.content.filter(i => !currentUrls.has(i.gifUrl));

                        alert(`${newGifs.length} exercícios importados para a pasta ${importedData.category}!`);
                    } catch(err) {
                        alert("Erro ao importar: Arquivo inválido.");
                    }
                };
                reader.readAsText(file);
            };

                        ))}

            );
        };

// ==========================================
const WorkoutBuilderView = ({ themeColor, exercises, setExercises, library, postWorkout, setPostWorkout, players, trainingLog, initialData, user }) => {
    const [targetOptions, setTargetOptions] = useState(initialData?.customTargets || ['Ativação & Core', 'Treino Funcional', 'Força', 'Geral']);
    const fieldTargets = ['TÉCNICO', 'JOGUINHO', 'ORG. OFENSIVA', 'ORG. DEFENSIVA', 'TRANS. OFENSIVA', 'TRANS. DEFENSIVA', 'ABP OFENSIVA', 'ABP DEFENSIVA', 'TÁTICO GERAL', 'PDI', 'AQUECIMENTO'];
    
    const [trainingType, setTrainingType] = useState('academia');
    const [form, setForm] = useState({ title: '', gifUrl: '', videoUrl: '', sets: '', reps: '', rest: '', target: targetOptions[0], order: '', period: 'am', description: '', type: 'academia' });
    
    const [editId, setEditId] = useState(null);
    const [importDate, setImportDate] = useState('');

    useEffect(() => {
        if(user && targetOptions.length > 0) {
            db.collection('coachData').doc(user.uid).update({ customTargets: targetOptions }).catch(err => {
                if(err.code === 'not-found') db.collection('coachData').doc(user.uid).set({ customTargets: targetOptions }, { merge: true });
            });
        }
    }, [targetOptions, user]);

    const getAiSuggestion = () => {
        const today = getTodayStr(); 
        let totalFatigue = 0, count = 0;
        const safePs = Array.isArray(players) ? players : [];
        safePs.forEach((p, i) => {
            const logForPlayer = trainingLog?.[today]?.[i];
            const stats = safeObj(logForPlayer?.wellness);
            if(stats.sleep) { totalFatigue += (Number(stats.fatigue) || 1) + (Number(stats.soreness) || 1); count++; }
        });
        const avg = count > 0 ? totalFatigue / count : 0;
        if (avg >= 10) return "🚨 IA: CRIOTERAPIA OBRIGATÓRIA (FADIGA CRÍTICA)";
        if (avg >= 7) return "⚠️ IA: BANHEIRA DE GELO (FADIGA ALTA)";
        return "✅ IA: RECUPERAÇÃO LIVRE (TIME PRONTO)";
    };

    const addTarget = () => {
        const name = prompt("Nome do novo Público ou Bloco de Academia (ex: Goleiros):");
        if (name && !targetOptions.includes(name)) {
            setTargetOptions([...targetOptions, name]);
            if(trainingType === 'academia') setForm({...form, target: name});
        }
    };

    const importFromDate = () => {
        if(!importDate) return showToast("Selecione uma data no calendário!", "#ef4444");
        db.collection('coachData').doc(user.uid).get().then(doc => {
            if(doc.exists){
                const pastWorkout = doc.data().exerciseHistory?.[importDate];
                if(pastWorkout && pastWorkout.length > 0){ setExercises(pastWorkout); showToast("Treino importado com sucesso!", "#10b981"); } 
                else { showToast("Nenhum treino encontrado nesta data.", "#eab308"); }
            }
        });
    };

    const fixWorkoutForToday = () => {
        const today = getTodayStr();
        db.collection('coachData').doc(user.uid).set({ exerciseHistory: { [today]: exercises } }, { merge: true }).then(() => {
            showToast("Sessão salva no histórico!", "#10b981");
        });
    };

    // 🔥 FUNÇÃO RESTAURADA: BUSCAR DA BIBLIOTECA
    const handleLibrarySelect = (e) => {
        const libId = e.target.value;
        if (!libId) return;
        const item = library.find(x => x.libId?.toString() === libId || x.id?.toString() === libId);
        if (item) {
            const isField = ['Tático', 'Técnico', 'Coletivo', 'Bola Parada', 'Mini Jogo'].includes(item.method);
            setTrainingType(isField ? 'campo' : 'academia');
            setForm({
                ...form,
                title: item.title || item.name || '',
                gifUrl: item.gifUrl || item.image || '',
                videoUrl: item.videoUrl || item.video || '',
                description: item.description || item.desc || '',
                sets: item.sets || item.time?.toString() || '',
                reps: item.reps || '',
                rest: item.rest || '',
                type: isField ? 'campo' : 'academia',
                target: isField ? fieldTargets[0] : targetOptions[0]
            });
            showToast("Exercício carregado da biblioteca!", "#3b82f6");
        }
    };

    const saveExercise = () => {
        if(!form.title) return showToast("Digite o nome da Atividade/Exercício!", "#ef4444");
        
        const finalForm = { ...form, type: trainingType };
        if (trainingType === 'campo' && !fieldTargets.includes(form.target)) {
            finalForm.target = fieldTargets[0];
        }

        if (editId) {
            setExercises(exercises.map(ex => ex.id === editId ? { ...ex, ...finalForm } : ex));
            setEditId(null);
            showToast("Exercício Atualizado!", "#10b981");
        } else {
            setExercises([{ id: Date.now(), ...finalForm }, ...exercises]);
            showToast("Adicionado à Sessão!", "#10b981");
        }
        
        setForm({ title: '', gifUrl: '', videoUrl: '', sets: '', reps: '', rest: '', target: trainingType === 'academia' ? targetOptions[0] : fieldTargets[0], order: '', period: form.period, description: '', type: trainingType });
    };

    // 🔥 FUNÇÃO RESTAURADA: EDITAR EXERCÍCIO
    const editExercise = (ex) => {
        setTrainingType(ex.type || 'academia');
        setForm({
            title: ex.title || '',
            gifUrl: ex.gifUrl || '',
            videoUrl: ex.videoUrl || '',
            sets: ex.sets || '',
            reps: ex.reps || '',
            rest: ex.rest || '',
            target: ex.target || (ex.type === 'campo' ? fieldTargets[0] : targetOptions[0]),
            order: ex.order || '',
            period: ex.period || 'am',
            description: ex.description || '',
            type: ex.type || 'academia'
        });
        setEditId(ex.id);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    return (
        <div className="p-6 h-full overflow-y-auto animate-fade-in custom-scroll flex flex-col gap-6">
            <div className="flex flex-col md:flex-row items-center justify-between gap-4 bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-xl no-print">
                <div className="flex items-center gap-3">
                    <div className="text-white">
                        <div className="text-[10px] font-black uppercase text-slate-400 mb-1">Repetir Sessão Anterior</div>
                        <div className="flex gap-2">
                            <input type="date" className="bg-slate-700 text-white text-xs p-2 rounded-lg outline-none border border-slate-600 focus:border-blue-500" value={importDate} onChange={e=>setImportDate(e.target.value)} />
                            <button onClick={importFromDate} className="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-black px-4 py-2 rounded-lg flex items-center gap-1 transition-all">
                                <Icon name="refresh" size={14}/> IMPORTAR
                            </button>
                        </div>
                    </div>
                </div>
                <button onClick={fixWorkoutForToday} className="w-full md:w-auto bg-emerald-600 hover:bg-emerald-500 text-white font-black px-6 py-3 rounded-xl flex items-center justify-center gap-2 shadow-lg transition-all text-sm">
                    <Icon name="save" size={20}/> FINALIZAR E ATUALIZAR SESSÃO
                </button>
            </div>

            <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
                <div className="flex flex-col md:flex-row justify-between gap-4 mb-6">
                    <div>
                        <h2 className="text-xl font-black uppercase flex items-center gap-2 text-slate-700 dark:text-white"><Icon name="bolt" className="text-yellow-500"/> Prescrição da Sessão</h2>
                        <div className="text-[10px] font-bold text-blue-500 mt-1 uppercase bg-blue-50 dark:bg-blue-900/20 px-2 py-1 rounded inline-block border border-blue-100 dark:border-blue-800">
                            {getAiSuggestion()}
                        </div>
                    </div>
                    <div className="bg-slate-100 dark:bg-slate-900 p-3 rounded-xl border dark:border-slate-700 md:w-80">
                        <label className="text-[10px] font-black text-slate-500 uppercase mb-1 block">Recuperação Pós-Treino:</label>
                        <select className="w-full rounded p-2 text-xs font-bold dark:bg-slate-800 dark:text-white outline-none border dark:border-slate-600" value={postWorkout} onChange={e=>setPostWorkout(e.target.value)}>
                            <option value="IA">🤖 IA: Sugestão Automática</option>
                            <option value="Livre">Livre (Recuperação Passiva)</option>
                            <option value="Banheira de Gelo (10 min)">Banheira de Gelo (10 min)</option>
                            <option value="Bota Pneumática (15 min)">Bota Pneumática (15 min)</option>
                            <option value="Piscina / Soltura Aquática">Piscina / Soltura Aquática</option>
                        </select>
                    </div>
                </div>

                <div className="flex justify-between items-start mb-6 gap-4 flex-col md:flex-row border-t dark:border-slate-700 pt-6">
                    <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-xl border dark:border-slate-700 w-full max-w-sm">
                        <button onClick={()=>{setTrainingType('academia'); setForm({...form, target: targetOptions[0]});}} className={`flex-1 py-2 text-xs font-black uppercase rounded-lg transition-colors ${trainingType === 'academia' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800'}`}>🏋️ ACADEMIA</button>
                        <button onClick={()=>{setTrainingType('campo'); setForm({...form, target: fieldTargets[0]});}} className={`flex-1 py-2 text-xs font-black uppercase rounded-lg transition-colors ${trainingType === 'campo' ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800'}`}>⚽ CAMPO / TÁTICO</button>
                    </div>
                    
                    {/* 🔥 SELECT DA BIBLIOTECA DE VOLTA */}
                    {library && library.length > 0 && (

                            <select className="w-full border rounded p-2 text-xs font-bold dark:bg-slate-700 dark:text-white outline-none focus:border-blue-500 cursor-pointer" onChange={handleLibrarySelect}>

                                {library.map(l => <option key={l.libId || l.id} value={l.libId || l.id}>{l.category || l.method || ''} | {l.title || l.name}</option>)}
                            </select>
                        </div>
                    )}
                </div>

                <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-start">

                    <div className="md:col-span-2">

                                                                <div className="flex items-center gap-2"><span className="text-[8px] text-slate-500 font-bold w-6 text-right">CARGA</span><div className="flex-1 h-1.5 bg-slate-800 rounded-full overflow-hidden"><div className="h-full bg-blue-500 transition-all duration-500" style={{width: `${h.rpeSub ? Math.min(100, (h.rpe * h.dur)/800*100) : 0}%`}}></div></div><span className="text-[8px] font-black w-6 text-right text-blue-400">{h.rpeSub ? (h.rpe * h.dur) : '-'}</span></div>

                                                        ) : <span className="text-[10px] text-slate-600 italic">Sem Registro</span>}
                                                    </div>
                                                </div>
                                                {expandedDay === h.date && (h.exs.length > 0 || h.skips?.length > 0) && (
                                                    <div className="bg-slate-950 p-3 border-t border-slate-800 animate-fade-in">
                                                        <div className="text-[9px] font-bold text-slate-500 uppercase mb-2">Relatório do Treino:</div>
                                                        <ul className="space-y-1.5">
                                                            {h.exs.map((exName, idxE) => <li key={`d-${idxE}`} className="text-[10px] font-bold text-slate-300 flex items-center gap-2"><Icon name="check" size={10} className="text-green-500 shrink-0"/> {exName}</li>)}
                                                            {h.skips?.map((exName, idxE) => <li key={`s-${idxE}`} className="text-[10px] font-bold text-slate-500 flex items-center gap-2"><Icon name="x" size={10} className="text-yellow-500 shrink-0"/> {exName}</li>)}
                                                        </ul>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    <div id="share-card" className="fixed z-[-1]" style={{left: '-9999px', top: '-9999px', width: '400px', backgroundColor: '#0f172a'}}>
                        <div className="p-8 border-4 border-slate-800 rounded-[40px] flex flex-col items-center relative overflow-hidden" style={{backgroundColor: '#0f172a'}}>
                            <div className="absolute top-0 left-0 w-full h-40 opacity-40" style={{background: `linear-gradient(to bottom, ${data.color}, transparent)`}}></div>
                            
                            <div className="z-10 w-full flex justify-between items-center mb-6">
                                {data.logo ? <img src={data.logo} className="w-12 h-12 object-contain drop-shadow-lg"/> : <div className="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center border-2 border-slate-700"><Icon name="trophy" size={20} className="text-slate-500"/></div>}
                                <div className="text-right">
                                    <div className="text-[10px] font-black text-slate-400 tracking-widest uppercase truncate max-w-[200px]">{data.teamName}</div>

                                </div>
                            </div>

                            <div className="w-40 h-40 rounded-full border-4 overflow-hidden bg-slate-800 shadow-2xl mb-4 z-10 relative" style={{borderColor: data.color}}>

                            </div>
                            
                            <h2 className="text-3xl font-black uppercase text-white mb-1 z-10 text-center leading-tight">{p.name}</h2>
                            <div className="text-sm font-bold text-slate-400 tracking-widest uppercase mb-8 z-10">{p.pos || 'Atleta'} {p.number ? `#${p.number}` : ''} | {streakTitle}</div>

                            <div className="w-full bg-slate-900 rounded-2xl p-4 border border-slate-700 flex justify-between items-center shadow-lg z-10 mb-6">
                                <div className="text-center w-1/2">
                                    <span className="block text-[10px] font-black text-slate-500 uppercase tracking-wider mb-1">Status</span>
                                    <span className="text-xl font-black text-green-500 uppercase">TREINO CONCLUÍDO</span>
                                </div>
                                <div className="h-10 w-px bg-slate-700"></div>
                                <div className="text-center w-1/2">
                                    <span className="block text-[10px] font-black text-slate-500 uppercase tracking-wider mb-1">Duração</span>
                                    <span className="text-2xl font-black text-white">{data.log[getTodayStr()]?.[idx]?.duration || 60}<span className="text-sm text-slate-400">m</span></span>
                                </div>
                            </div>

                            <div className="text-[10px] font-black text-slate-600 tracking-widest uppercase z-10">POWERED BY PROCOACH MAX</div>
                        </div>
                    </div>
                </React.Fragment>
            );
        };
        
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, errorMsg: '' }; }
            static getDerivedStateFromError(error) { return { hasError: true, errorMsg: error.toString() }; }
            render() {
                if (this.state.hasError) return (
                    <div style={{padding: '20px', color: 'white', backgroundColor: '#0f172a', height: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center'}}>
                        <h1 style={{color: '#ef4444', fontSize: '24px', marginBottom: '10px', fontWeight: 'bold'}}>Erro Encontrado</h1>
                        <p style={{fontSize: '12px', opacity: 0.7, marginBottom: '20px'}}>{this.state.errorMsg}</p>
                        <button onClick={()=>window.location.reload()} style={{backgroundColor: '#3b82f6', padding: '10px 20px', borderRadius: '8px', color: 'white', fontWeight: 'bold'}}>Recarregar</button>
                    </div>
                );
                return this.props.children;
            }
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><AthletePortal /></ErrorBoundary>);
    </script>
