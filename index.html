        const smartShare = async (blob, filename, title) => {
            const file = new File([blob], filename, { type: blob.type });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try { await navigator.share({ files: [file], title: title }); return; } catch (err) { console.log(err); }
            }
            const url = URL.createObjectURL(blob); const a = document.createElement('a');
            a.href = url; a.download = filename; document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        };

        const showToast = (msg, color = '#333') => { const t = document.getElementById('toast'); if(t){ t.innerText = msg; t.style.background = color; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); } };
        const compressImage = (file, max=150, q=0.5) => new Promise(res => { const r = new FileReader(); r.readAsDataURL(file); r.onload = e => { const i = new Image(); i.src = e.target.result; i.onload = () => { const c = document.createElement('canvas'); c.width = max; c.height = i.height*(max/i.width); c.getContext('2d').drawImage(i, 0, 0, c.width, c.height); res(c.toDataURL('image/jpeg', q)); }; }; });

        const formatDateBR = (ds) => { if(!ds) return '-'; const [y, m, d] = ds.split('-'); return `${d}/${m}/${y}`; };
        
        const safeObj = (o) => (o && typeof o === 'object' && !Array.isArray(o)) ? o : {};
        const safeArray = (a, f=[]) => (Array.isArray(a) && a.length > 0) ? a : f;
        const getWSum = (w) => w ? Object.values(w).reduce((a, b) => Number(a) + Number(b), 0) : 0;
        const calcDailyLoad = (log) => { if(!log) return 0; const rpe = (Number(log.rpe_am)||0) + (Number(log.rpe_pm)||0); const dur = Number(log.duration) || 0; return rpe * (dur > 0 ? dur : 60); };
        
        const isPlayerInTransition = (pId, dmRecords) => {
            const todayDate = new Date(getTodayStr());
            const records = safeArray(dmRecords).filter(r => r && r.playerId == pId && r.status === 'Recovered' && r.dateOut);
            for(let r of records) {
                const outDate = new Date(r.dateOut);
                if(isNaN(outDate.getTime())) continue;
                const diffTime = Math.abs(todayDate - outDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if(diffDays <= 7) return true; 
            }
            return false;
        };

        const sanitizeCloudData = (data) => {

                    days: safeArray(data.days, DEFAULT_DAYS).map(d => d ? {...d, plannedMins: d.plannedMins || ''} : null).filter(Boolean)

        const NotificationCenter = ({ alerts, onClose }) => {

div></div><div><h3 className="text-sm font-bold text-slate-400 uppercase mb-2">Tema</h3><input type="color" value={themeColor} onChange={e=>setThemeColor(e.target.value)} className="w-12 h-12 rounded-lg border-2 cursor-pointer dark:border-slate-600"/></div><div className="border-t dark:border-slate-700 pt-4"><div className="grid grid-cols-2 gap-2 mb-2"><button onClick={onExport} className="flex justify-center gap-2 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 border border-blue-200 dark:border-blue-800 py-2 rounded font-bold text-xs"><Icon name="share" size={14}/> EXPORTAR TUDO</button><button onClick={()=>importInputRef.current.click()} className="flex justify-center gap-2 bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400 border border-green-200 dark:border-green-800 py-2 rounded font-bold text-xs"><Icon name="upload" size={14}/> IMPORTAR DADOS</button><input type="file" ref={importInputRef} className="hidden" accept=".json" onChange={handleRestore}/></div><p className="text-[10px] text-slate-400 text-center mb-2">Use exportar para salvar uma cópia local por segurança.</p></div></div></div></div>);

        const WellnessDashboard = ({ players, themeColor, trainingLog, setTrainingLog }) => {
            const [mode, setMode] = useState('dashboard');
            const [wellnessDate, setWellnessDate] = useState(getTodayStr());

            useEffect(() => { 
                if(mode === 'manual') {
                    const logObj = trainingLog[wellnessDate]?.[selectedPlayer] || {}; 
                    const validW = safeObj(logObj.wellness);
                    setLocalScores(validW.sleep ? validW : {sleep:1,stress:1,fatigue:1,soreness:1, mood: 1}); 
                    setLocalPainZones(Array.isArray(logObj.painZones) ? logObj.painZones : []); 
                }
            }, [wellnessDate, selectedPlayer, trainingLog, mode]);

            const handleScoreChange = (metric, val) => { setLocalScores(prev => ({...prev, [metric]: parseInt(val)})); };
            const togglePainZone = (zone) => { let n = [...localPainZones]; if(n.includes(zone)) n = n.filter(z=>z!==zone); else n.push(zone); setLocalPainZones(n); };
            
            const confirmData = () => { 
                const newLog = {...trainingLog}; 
                if(!newLog[wellnessDate]) newLog[wellnessDate] = {}; 
                if(!newLog[wellnessDate][selectedPlayer]) newLog[wellnessDate][selectedPlayer] = {}; 
                newLog[wellnessDate][selectedPlayer].wellness = localScores; 
                newLog[wellnessDate][selectedPlayer].painZones = localPainZones; 
                setTrainingLog(newLog); 
                showToast("Dados Salvos!"); 
                setMode('dashboard');
            };

            if (mode === 'dashboard') {
                const safePlayers = safeArray(players);
                const filledCount = safePlayers.filter((p,i) => safeObj(trainingLog[wellnessDate]?.[i]?.wellness).sleep).length;
                
                const renderStatusBadge = (log, pain) => {
                    if (!log || !log.sleep) return <span className="bg-slate-200 dark:bg-slate-700 text-slate-500 text-[10px] font-black px-2 py-1 rounded shadow-sm uppercase flex items-center gap-1 whitespace-nowrap"><Icon name="calendar" size={12}/> Pendente</span>;
                    if (Number(log.soreness) >= 5 || pain.length > 0) return <span className="bg-red-500 text-white text-[10px] font-black px-2 py-1 rounded shadow-md uppercase animate-pulse flex items-center gap-1 whitespace-nowrap"><Icon name="alert" size={12}/> RISCO DE LESÃO</span>;
                    const total = getWSum(log);
                    if (total >= 18) return <span className="bg-yellow-400 text-yellow-900 text-[10px] font-black px-2 py-1 rounded shadow-sm uppercase flex items-center gap-1 whitespace-nowrap"><Icon name="alert" size={12}/> ATENÇÃO</span>;
                    return <span className="bg-green-500 text-white text-[10px] font-black px-2 py-1 rounded shadow-sm uppercase flex items-center gap-1 whitespace-nowrap"><Icon name="check" size={12}/> APTO</span>;
                };

                const MetricBadge = ({ label, val }) => {
                    if(!val) return null;
                    const numVal = Number(val);
                    const isBad = numVal >= 5;
                    const isWarn = numVal === 4;
                    let colorClass = "bg-slate-100 text-slate-400 dark:bg-slate-700 dark:text-slate-500"; 
                    if(isBad) colorClass = "bg-red-100 text-red-600 border border-red-300 dark:bg-red-900/50 dark:text-red-400 dark:border-red-800 font-bold";
                    else if(isWarn) colorClass = "bg-yellow-100 text-yellow-700 dark:bg-yellow-900/50 dark:text-yellow-400";
                    return (
                        <div className="flex flex-col items-center justify-center min-w-[36px]">
                            <span className="text-[8px] uppercase font-bold text-slate-400 dark:text-slate-500 mb-0.5">{label}</span>
                            <span className={`text-xs w-full text-center rounded px-1 py-0.5 ${colorClass}`}>{numVal}</span>
                        </div>
                    );
                };
                
                return (
                    <div className="p-4 md:p-6 bg-slate-50 dark:bg-slate-900 h-full flex flex-col gap-4 animate-fade-in custom-scroll" style={{ WebkitOverflowScrolling: 'touch' }}>
                        <div className="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4 shrink-0">
                            <div>
                                <h2 className="text-lg font-bold flex items-center gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="list"/> PRANCHETA MÉDICA (WELLNESS)</h2>
                                <p className="text-[10px] text-slate-500 uppercase mt-1 font-bold">{filledCount} de {safePlayers.length} atletas responderam hoje</p>
                            </div>
                            <div className="flex gap-2">
                                <input type="date" value={wellnessDate} onChange={e=>setWellnessDate(e.target.value)} className="bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold text-xs rounded px-2 py-1 outline-none border border-slate-200 dark:border-slate-600 cursor-pointer"/>
                            </div>
                        </div>

                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col flex-1">
                            <div className="grid grid-cols-12 bg-slate-100 dark:bg-slate-700 p-3 text-[10px] font-bold text-slate-500 dark:text-slate-300 uppercase shrink-0 hidden lg:grid">
                                <div className="col-span-3">Atleta</div>
                                <div className="col-span-3 text-center">Status Fisiológico</div>
                                <div className="col-span-4 flex justify-center gap-4">Métricas Críticas</div>
                                <div className="col-span-2">Dores Focais</div>
                            </div>
                            
                            <div className="divide-y divide-slate-100 dark:divide-slate-700 overflow-y-auto flex-1 custom-scroll" style={{ WebkitOverflowScrolling: 'touch' }}>
                                {safePlayers.map((p, i) => {
                                    if(!p) return null;
                                    const logObj = trainingLog[wellnessDate]?.[i] || {};
                                    const log = safeObj(logObj.wellness);
                                    const pain = Array.isArray(logObj.painZones) ? logObj.painZones : [];
                                    const isFilled = !!log.sleep;
                                    
                                    return (
                                        <div key={i} className={`flex flex-col lg:grid lg:grid-cols-12 gap-3 lg:gap-0 items-start lg:items-center p-3 md:p-4 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors ${!isFilled ? 'opacity-60' : ''}`}>
                                            <div className="col-span-3 flex items-center gap-3 w-full">
                                                <div className="w-10 h-10 rounded-full bg-slate-200 overflow-hidden shrink-0 border border-slate-300 dark:border-slate-600">
                                                    {p.image?<img src={p.image} className="w-full h-full object-cover object-top"/>:<Icon name="user" size={20} className="m-2 text-slate-400"/>}
                                                </div>
                                                <span className="font-bold text-sm text-slate-800 dark:text-slate-100 truncate">{p.name}</span>
                                            </div>
                                            <div className="col-span-3 flex justify-start lg:justify-center w-full">
                                                {isFilled ? renderStatusBadge(log, pain) : (
                                                    <button onClick={()=>{setSelectedPlayer(i); setMode('manual');}} className="bg-slate-100 dark:bg-slate-700 text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 text-[10px] font-black px-3 py-1.5 rounded shadow-sm uppercase flex items-center gap-2 transition-colors border border-dashed border-slate-300 dark:border-slate-500">
                                                        <Icon name="calendar" size={12}/> Pendente - Preencher
                                                    </button>
                                                )}
                                            </div>
                                            <div className="col-span-4 flex justify-start lg:justify-center gap-2 md:gap-4 w-full overflow-x-auto pb-1 lg:pb-0">
                                                {isFilled ? (
                                                    <>
                                                        <MetricBadge label="Sono" val={log.sleep} />
                                                        <MetricBadge label="Estr." val={log.stress} />
                                                        <MetricBadge label="Fadig." val={log.fatigue} />
                                                        <MetricBadge label="Dor" val={log.soreness} />
                                                        <MetricBadge label="Humor" val={log.mood} />
                                                    </>
                                                ) : <span className="text-[10px] text-slate-400 italic hidden lg:block">Aguardando envio do atleta...</span>}
                                            </div>
                                            <div className="col-span-2 w-full flex justify-start lg:justify-end">
                                                {pain.length > 0 ? (
                                                    <div className="bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 px-2 py-1 rounded text-[9px] font-bold text-red-600 dark:text-red-400 uppercase leading-tight w-full truncate">
                                                        <Icon name="alert" size={10} className="inline mr-1 -mt-0.5"/> {pain.join(', ')}
                                                    </div>
                                                ) : isFilled ? <span className="text-[10px] text-slate-400">- Sem queixas -</span> : null}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto flex flex-col gap-6 animate-fade-in custom-scroll" style={{ WebkitOverflowScrolling: 'touch' }}>
                    <div className="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 flex justify-between items-center gap-4">
                        <h2 className="text-lg font-bold flex items-center gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="edit"/> PREENCHIMENTO MANUAL</h2>
                        <button onClick={()=>setMode('dashboard')} className="bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2 hover:bg-slate-300"><Icon name="x" size={14}/> VOLTAR AO PAINEL</button>
                    </div>
                    <div className="flex flex-col md:flex-row gap-6 flex-1">
                        <div className="w-full md:w-1/3 bg-white dark:bg-slate-800 rounded-xl shadow p-4 border border-slate-200 dark:border-slate-700 flex flex-col"><h3 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase mb-4">Selecionar Atleta</h3><div className="space-y-2 flex-1 overflow-y-auto pr-2 custom-scroll">{safeArray(players).map((p, i) => { if(!p) return null; return (<div key={i} onClick={()=>setSelectedPlayer(i)} className={`flex items-center gap-2 p-2 rounded cursor-pointer border group transition-colors ${selectedPlayer===i?'border-l-4 shadow-sm':'border-transparent hover:bg-slate-50 dark:hover:bg-slate-700'}`} style={{borderLeftColor: selectedPlayer===i?themeColor:'transparent'}}><div className="w-10 h-10 rounded-full bg-slate-200 overflow-hidden relative shrink-0 border border-slate-200 dark:border-slate-600">{p.image?<img src={p.image} className="w-full h-full object-cover object-top"/>:<Icon name="user"/>}</div><div className="font-bold text-sm text-slate-700 dark:text-slate-200">{p.name}</div></div>)})}</div></div>
                        <div className="flex-1 bg-white dark:bg-slate-800 rounded-xl shadow p-6 border border-slate-200 dark:border-slate-700 flex flex-col gap-4 overflow-y-auto relative custom-scroll">
                            <div className="flex justify-between items-center border-b dark:border-slate-700 pb-4"><div><h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100">{players[selectedPlayer]?.name}</h2></div></div>
                            <div className="space-y-4">{[{id:'sleep',label:'Qualidade do Sono (1=Excelente | 7=Péssimo)'},{id:'stress',label:'Estresse (1=Relaxado | 7=Estressado)'},{id:'fatigue',label:'Fadiga (1=Muita Energia | 7=Exausto)'},{id:'soreness',label:'Dor Muscular (1=Sem Dor | 7=Muita Dor)'}, {id:'mood', label:'Humor (1=Animado | 7=Irritado)'}].map(m=>(<div key={m.id}><div className="flex justify-between text-sm font-bold text-slate-700 dark:text-slate-300 mb-2"><span>{m.label}</span><span className="text-white px-2 rounded font-bold" style={{backgroundColor: themeColor}}>{localScores[m.id]}</span></div><input type="range" min="1" max="7" step="1" value={localScores[m.id]} onChange={(e)=>handleScoreChange(m.id, e.target.value)} className="hooper-slider" style={{background: `linear-gradient(to right, #22c55e, #eab308, #ef4444)`}}/></div>))}</div>
                            <div className="border-t dark:border-slate-700 pt-4"><h4 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase mb-2">Local da Dor</h4><select className="w-full p-2 border dark:border-slate-600 rounded text-xs mb-2 bg-white dark:bg-slate-700 dark:text-white" onChange={(e)=>{if(e.target.value) togglePainZone(e.target.value); e.target.value='';}}><option value="">+ Adicionar Local</option>{bodyParts.map(p=><option key={p} value={p}>{p}</option>)}</select><div className="flex flex-wrap gap-1">{localPainZones.map(z=><span key={z} onClick={()=>togglePainZone(z)} className="bg-red-100 dark:bg-red-900/50 text-red-600 dark:text-red-400 px-2 py-1 rounded text-xs font-bold cursor-pointer hover:bg-red-200 dark:hover:bg-red-800">{z} ×</span>)}</div></div>
                            <div className="flex gap-2 mt-4"><button onClick={confirmData} className="w-full py-4 bg-slate-800 text-white font-bold rounded-xl shadow-lg hover:opacity-90 flex items-center justify-center gap-2"><Icon name="save"/> SALVAR DADOS</button></div>
                        </div>
                    </div>
                </div>
            );
        };

        const PlayerProfileModal = ({ player, playerIndex, logs, onClose, themeColor, setPlayers, players }) => {
            if (!player) return null;
            const today = getTodayStr(); 
            const currentLog = logs[today]?.[playerIndex] || {};
            const wellness = safeObj(currentLog.wellness);
            const dates = getDatesInRange(today, 7).reverse();
            const toggleInjury = () => { const n = [...players]; n[playerIndex].injured = !n[playerIndex].injured; setPlayers(n); };
            
            const getLoad = (d) => { const l = logs[d]?.[playerIndex]; if(!l) return 0; const rpeSum = (Number(l.rpe_am)||0)+(Number(l.rpe_pm)||0); const dur = Number(l.duration) || 0; return dur > 0 ? rpeSum * dur : rpeSum * 60; };
            const todayLoad = getLoad(today);
            const historyDates = getDatesInRange(today, 7).slice(1); 
            let chronicLoad = 0; historyDates.forEach(d => chronicLoad += getLoad(d)); 
            const avgLoad = (chronicLoad + todayLoad) / 7;
            
            let loadMsg = "Carga Equilibrada. Prontidão Alta."; let loadColor = "text-green-500";
            if (avgLoad > 0) {
                if (todayLoad > avgLoad * 1.4) { loadMsg = "Risco Agudo! Sobrecarga detectada. Sugestão: Recuperativo imediato."; loadColor = "text-red-500"; } 
                else if (todayLoad < avgLoad * 0.6) { loadMsg = "Carga baixa hoje. Oportunidade para treino de força ou tático intenso."; loadColor = "text-yellow-500"; }
            }

            const HistoryAI = () => {
                const painCounts = {};
                dates.forEach(d => { const l = logs[d]?.[playerIndex] || {}; if(Array.isArray(l.painZones)) l.painZones.forEach(z => { painCounts[z] = (painCounts[z]||0) + 1; }); });
                const chronic = Object.keys(painCounts).find(k => painCounts[k] >= 3);
                if (chronic) return (<div className="bg-red-50 dark:bg-red-900/30 border-l-4 border-red-500 p-3 mb-4 rounded-r-lg shadow-sm"><div className="flex items-center gap-2 mb-1"><Icon name="brain" className="text-red-600 dark:text-red-400" size={18}/><span className="text-xs font-bold text-red-700 dark:text-red-300 uppercase">Fisiologista Virtual</span></div><div className="text-xs text-slate-700 dark:text-slate-300">Atenção: Dor recorrente em <strong>{chronic}</strong> detectada nesta semana. Risco elevado.</div></div>);
                return null;
            };

            const generateShareCard = async () => {
                const el = document.getElementById('export-card-' + playerIndex);
                if(!el) return;
                el.style.left = '0'; el.style.top = '0'; el.style.position = 'absolute'; el.style.zIndex = '9999';
                const originalBg = el.style.backgroundColor;
                el.style.backgroundColor = '#0f172a'; 
                showToast("Gerando card...");
                try {
                    const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#0f172a', logging: false });
                    canvas.toBlob(blob => { smartShare(blob, `card_${player.name.replace(/\s+/g, '_')}.png`, `Status - ${player.name}`); el.style.left = '-9999px'; el.style.top = '-9999px'; el.style.backgroundColor = originalBg; });
                } catch(e) { showToast("Erro ao gerar card"); el.style.left = '-9999px'; el.style.top = '-9999px'; el.style.backgroundColor = originalBg; }
            };

            const totalW = getWSum(wellness);
            const wColor = totalW >= 25 ? 'text-red-500' : totalW >= 18 ? 'text-yellow-500' : 'text-green-500';

            return (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                    <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden relative flex flex-col max-h-[90vh]" onClick={e=>e.stopPropagation()}>
                        
                        <div className="p-6 relative text-white flex flex-col items-center shrink-0" style={{background:`linear-gradient(to bottom, ${themeColor}, #1e293b)`}}>
                            <button onClick={onClose} className="absolute top-4 right-4 text-white/70 hover:text-white"><Icon name="x" size={24}/></button>
                            <div className="w-32 h-32 rounded-full border-4 border-white dark:border-slate-700 bg-slate-200 dark:bg-slate-600 shadow-lg mb-2 overflow-hidden">{player.image?<img src={player.image} className="w-full h-full object-cover object-top" onError={(e)=>{e.target.style.display='none'}}/>:<div className="w-full h-full flex items-center justify-center text-slate-400"><Icon name="user" size={40}/></div>}</div>
                            <h2 className="text-2xl font-bold uppercase">{player.name}</h2>
                            <p className="text-white/70 text-sm font-bold">{player.number?`#${player.number} `:''} {player.position||'Atleta'}</p>
                            <div className="flex gap-2 mt-2">
                                <button onClick={toggleInjury} className={`px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 ${player.injured?'bg-red-500 text-white':'bg-green-500 text-white'}`}>{player.injured?<><Icon name="medkit" size={12}/> LESIONADO</>:<><Icon name="check" size={12}/> DISPONÍVEL</>}</button>
                            </div>
                        </div>
                        
                        <div className="p-6 space-y-6 overflow-y-auto flex-1 custom-scroll" style={{ WebkitOverflowScrolling: 'touch' }}>
                            <div className="bg-slate-50 dark:bg-slate-700 rounded-xl border border-slate-200 dark:border-slate-600 p-4 shadow-inner"><div className="flex items-center gap-2 mb-2 border-b dark:border-slate-600 pb-2"><Icon name="brain" className={loadColor} size={18}/><span className={`text-[10px] font-black uppercase tracking-wider ${loadColor}`}>Assistente de Prontidão IA</span></div><div className="text-sm font-bold text-slate-700 dark:text-slate-200">{loadMsg}</div></div>
                            <HistoryAI />
                            <div><h3 className="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase mb-3 flex items-center gap-2"><Icon name="smile"/> Status ({formatDateBR(today)})</h3><div className="grid grid-cols-2 gap-4">{Object.entries({Sono:wellness.sleep,Estresse:wellness.stress,Fadiga:wellness.fatigue,Dor:wellness.soreness, Humor: wellness.mood}).map(([k,v])=>(<div key={k} className="bg-slate-50 dark:bg-slate-700 p-2 rounded border border-slate-100 dark:border-slate-600"><div className="flex justify-between text-xs font-bold mb-1"><span className="text-slate-500 dark:text-slate-400">{k}</span><span className="dark:text-white">{v||'-'}</span></div><div className="h-2 w-full bg-slate-200 dark:bg-slate-600 rounded-full overflow-hidden"><div className="h-full rounded-full transition-all duration-500" style={{width:`${((Number(v)||0)/7)*100}%`,backgroundColor:(Number(v)||0)>=5?'#ef4444':(Number(v)||0)>=3?'#eab308':'#22c55e'}}></div></div></div>))}</div></div>
                            <div><h3 className="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase mb-3 flex items-center gap-2"><Icon name="list"/> Histórico de Dores & Carga (sRPE)</h3><div className="bg-slate-50 dark:bg-slate-700 rounded-xl border border-slate-100 dark:border-slate-600 overflow-hidden max-h-64 overflow-y-auto custom-scroll"><table className="w-full text-xs"><thead className="bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 sticky top-0"><tr><th className="p-2 text-left">Data</th><th className="p-2 text-center">Local Dor</th><th className="p-2 text-center">Carga sRPE</th></tr></thead><tbody>{dates.map(d=>{const l=logs[d]?.[playerIndex]||{};const t=calcDailyLoad(l);const pz=Array.isArray(l.painZones) && l.painZones.length>0 ? l.painZones : null;return(<tr key={d} className="border-t border-slate-100 dark:border-slate-600"><td className="p-2 font-bold text-slate-600 dark:text-slate-300">{formatDateBR(d)}</td><td className="p-2 text-center">{pz ? <div className="flex flex-wrap gap-1 justify-center">{pz.map(z=><span key={z} className="bg-red-100 dark:bg-red-900/50 text-red-600 dark:text-red-400 px-1.5 py-0.5 rounded text-[9px] font-bold border border-red-200 dark:border-red-800">{z}</span>)}</div> : <span className="text-slate-300 dark:text-slate-500">-</span>}</td><td className="p-2 text-center font-bold text-blue-600 dark:text-blue-400">{t||'-'}</td></tr>)})}</tbody></table></div></div>
                            <button onClick={generateShareCard} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 shadow-lg"><Icon name="share"/> GERAR CARD (WHATSAPP)</button>
                        </div>
                    </div>

                    <div id={`export-card-${playerIndex}`} className="fixed z-[-1] bg-slate-900" style={{left:'-9999px', top: '-9999px', width: '400px', backgroundColor: '#0f172a'}}>
                        <div className="p-6 rounded-3xl border-4 border-slate-700 text-white flex flex-col items-center relative overflow-hidden" style={{backgroundColor: '#0f172a'}}>
                            <div className="absolute top-0 left-0 w-full h-32 opacity-50" style={{background:`linear-gradient(to bottom, ${themeColor}, transparent)`}}></div>
                            <div className="w-32 h-32 rounded-full border-4 border-slate-800 bg-slate-800 shadow-2xl mb-4 overflow-hidden z-10 relative">
                                {player.image?<img src={player.image} className="w-full h-full object-cover object-top"/>:<div className="w-full h-full flex items-center justify-center text-slate-500"><Icon name="user" size={40}/></div>}
                            </div>
                            <h2 className="text-3xl font-black uppercase z-10 mb-1 text-white">{player.name}</h2>
                            <p className="text-slate-400 font-bold z-10 mb-6 tracking-widest">{player.number?`#${player.number} `:''} {player.position||'Atleta'}</p>
                            
                            <div className="w-full bg-slate-800 rounded-xl p-4 mb-4 border border-slate-700 flex justify-between items-center z-10 shadow-inner" style={{backgroundColor: '#1e293b'}}>
                                <div className="text-center"><div className="text-[10px] text-slate-400 font-bold uppercase mb-1">Wellness Index</div><div className={`text-3xl font-black ${wColor}`}>{totalW > 0 ? totalW : '-'}</div></div>
                                <div className="h-10 w-px bg-slate-700"></div>
                                <div className="text-center"><div className="text-[10px] text-slate-400 font-bold uppercase mb-1">Carga Hoje</div><div className="text-3xl font-black text-blue-400">{todayLoad || '-'}</div></div>
                            </div>
                            
                            <div className="w-full bg-slate-800 rounded-xl p-4 border border-slate-700 z-10" style={{backgroundColor: '#1e293b'}}>
                                <div className="flex items-center gap-2 mb-2 border-b border-slate-700 pb-2"><Icon name="brain" className={loadColor.replace('text-', 'text-')} size={16}/><span className="text-[10px] font-bold uppercase tracking-wider" style={{color: loadColor === 'text-red-500' ? '#ef4444' : '#eab308'}}>{loadMsg}</span></div>
                                <div className="text-sm text-slate-300 leading-snug">
                                    {totalW >= 25 ? "Alerta Crítico: Risco de Burnout ou Lesão." : totalW >= 18 ? "Atenção: Fadiga acumulada. Recuperação sugerida." : "Prontidão Alta: Atleta em boas condições."}
                                    {Array.isArray(currentLog.painZones) && currentLog.painZones.length > 0 && <span className="block mt-1 text-red-400 font-bold text-xs">Dores: {currentLog.painZones.join(', ')}</span>}
                                </div>
                            </div>
                            <div className="mt-4 text-[9px] text-slate-500 font-bold tracking-widest uppercase">Gerado por ProCoach Nuvem</div>
                        </div>
                    </div>
                </div>
            );
        };

        const TeamCoachAI = ({ activePlayers, pseAvg, dmCount }) => {
            const numericAvg = parseFloat(pseAvg) || 0;
            let title = "Diagnóstico da Equipe"; let suggestion = ""; let colorClass = "bg-slate-800 text-slate-300";
            if (numericAvg >= 600) { title = "ALERTA VERMELHO (Sobrecarga)"; suggestion = "Carga Extremamente Alta. RISCO DE LESÃO ELEVADO. Amanhã: Recuperação passiva ou folga obrigatória."; colorClass = "bg-red-900 text-red-50"; } 
            else if (numericAvg >= 400) { title = "Zona de Alta Intensidade"; suggestion = "Treino exigente. Amanhã: Carga baixa/moderada (foco tático sem contato) para supercompensação."; colorClass = "bg-orange-800 text-orange-50"; } 
            else if (numericAvg >= 200) { title = "Zona de Manutenção/Desenvolvimento"; suggestion = "Carga Ideal. Amanhã: Pode manter a intensidade se não for véspera de jogo (MD-1)."; colorClass = "bg-green-800 text-green-50"; } 
            else if (numericAvg > 0) { title = "Carga Baixa / Regenerativo"; suggestion = "Estímulo leve hoje. Amanhã: Oportunidade para 'Choque' (Força ou Resistência) se longe do jogo."; colorClass = "bg-blue-800 text-blue-50"; } 
            else { title = "Sem Dados Suficientes"; suggestion = "Aguardando preenchimento de PSE e Duração (min) dos treinos."; colorClass = "bg-slate-800 text-slate-300"; }
            if(dmCount >= 3) { suggestion += ` ALERTA: ${dmCount} atletas no DM. Atenção na rotação.`; }
            return (<div className={`md:col-span-2 rounded-xl shadow p-5 border border-slate-700 flex flex-col justify-center relative overflow-hidden ${colorClass}`}><div className="absolute top-0 right-0 p-4 opacity-10"><Icon name="brain" size={80}/></div><div className="flex items-center gap-2 mb-2 z-10"><div className="bg-white/20 p-1.5 rounded-full"><Icon name="brain" size={20}/></div><h3 className="font-bold text-sm uppercase tracking-wider opacity-80">Técnico Virtual (Equipe)</h3></div><div className="z-10"><div className="text-xl font-black mb-1">{title}</div><div className="text-sm font-medium opacity-90 leading-snug">{suggestion}</div></div></div>);
        };

        const PreGameView = ({ players, setPlayers, themeColor, trainingLog, dmRecords, matchMinutes, setMatchMinutes }) => {
            const [monitorDate, setMonitorDate] = useState(getTodayStr()); 
            const dailyData = safeObj(trainingLog[monitorDate]);
            const safePs = safeArray(players);
            
            const activePlayersIndices = [];
            safePs.forEach((p, i) => { if(p && safeObj(dailyData[i]?.wellness).sleep) activePlayersIndices.push(i); });
            
            const teamHooperAvg = activePlayersIndices.length > 0 
                ? Math.round(activePlayersIndices.reduce((acc, i) => acc + getWSum(dailyData[i]?.wellness), 0) / activePlayersIndices.length) 
                : 0;

            const rpePlayersIndices = [];
            safePs.forEach((p, i) => { if(p && calcDailyLoad(dailyData[i]) > 0) rpePlayersIndices.push(i); });
            
            const pseSum = rpePlayersIndices.reduce((acc, i) => acc + calcDailyLoad(dailyData[i]), 0);
            const pseAvgRaw = rpePlayersIndices.length > 0 ? Math.round(pseSum / rpePlayersIndices.length) : 0;
            const pseColor = pseAvgRaw >= 600 ? '#ef4444' : pseAvgRaw >= 300 ? '#eab308' : '#22c55e';
            
            const dmCount = safePs.filter(p => p && p.injured).length;
            
            const weeklyDates = getDatesInRange(monitorDate, 7).reverse();
            const weeklyData = weeklyDates.map(d => {
                const dayLog = safeObj(trainingLog[d]);
                let loadSum = 0, wellnessSum = 0, countLoad = 0, countWell = 0;
                safePs.forEach((p, i) => {
                    if(p) {
                        const l = dayLog[i];
                        if(l) { 
                            const load = calcDailyLoad(l);
                            if(load > 0) { loadSum += load; countLoad++; } 
                            if(safeObj(l.wellness).sleep) { wellnessSum += getWSum(l.wellness); countWell++; } 
                        }
                    }
                });
                return { date: d, avgLoad: countLoad > 0 ? Math.round(loadSum/countLoad) : 0, avgWell: countWell > 0 ? Math.round(wellnessSum/countWell) : 0 };
            });

            const updateMinutes = (pIdx, val) => { const newMins = {...matchMinutes}; if(!newMins[monitorDate]) newMins[monitorDate] = {}; newMins[monitorDate][pIdx] = parseInt(val) || 0; setMatchMinutes(newMins); };

            const [viewProfile, setViewProfile] = useState(null);

            const renderMatchReadinessAI = (pLog, mins, isInjured, inTransition) => {
                if (isInjured) return <div className="text-[9px] font-bold text-red-500 bg-red-900/30 px-2 py-0.5 rounded">Indisponível (DM)</div>;
                if (inTransition) return <div className="text-[9px] font-bold text-orange-500 bg-orange-900/30 px-2 py-0.5 rounded">Transição - Limite: 30 a 45min</div>;
                
                const load = calcDailyLoad(pLog);
                const wellness = getWSum(pLog?.wellness);
                if (mins >= 150) return <div className="text-[9px] font-bold text-red-500 bg-red-900/30 px-2 py-0.5 rounded">Risco Máximo - POUPE O ATLETA</div>;
                if (load >= 600 || wellness >= 20) return <div className="text-[9px] font-bold text-yellow-500 bg-yellow-900/30 px-2 py-0.5 rounded">Fadigado - Limitar 45 min</div>;
                return <div className="text-[9px] font-bold text-green-500 bg-green-900/30 px-2 py-0.5 rounded">Apto para 90 min</div>;
            };

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in custom-scroll" style={{ WebkitOverflowScrolling: 'touch' }}>
                    <PlayerProfileModal player={safePs[viewProfile]} playerIndex={viewProfile} logs={trainingLog} onClose={()=>setViewProfile(null)} themeColor={themeColor} setPlayers={setPlayers} players={safePs} />
                    
                    <div className="flex justify-between items-center mb-4 border-b dark:border-slate-700 pb-2"><h2 className="text-2xl font-bold flex items-center gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="trophy"/> Performance & Carga</h2><div className="flex gap-2"><div className="flex items-center gap-2 text-xs bg-white dark:bg-slate-700 border dark:border-slate-600 rounded px-3 py-1.5 shadow-sm"><span className="font-bold text-slate-500 dark:text-slate-300 uppercase">Análise:</span><input type="date" value={monitorDate} onChange={e=>setMonitorDate(e.target.value)} className="bg-transparent text-slate-800 dark:text-slate-100 font-bold outline-none"/></div></div></div>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow p-4 border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center col-span-1"><SpeedometerGauge value={teamHooperAvg} /></div>
                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow p-4 border border-slate-100 dark:border-slate-700 flex items-center gap-4">
                            <DonutChart value={Math.min(20, Math.round(pseAvgRaw/50))} max={20} color={pseColor} size={60} />
                            <div><div className="text-xl font-black text-slate-800 dark:text-slate-200">{pseAvgRaw}</div><div className="text-[10px] text-slate-400 font-bold uppercase">sRPE Equipe</div></div>
                        </div>
                        <TeamCoachAI activePlayers={activePlayersIndices} pseAvg={pseAvgRaw} dmCount={dmCount} />
                    </div>
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-100 dark:border-slate-700 p-4 mb-8 overflow-x-auto custom-scroll">
                        <h3 className="text-xs font-bold text-slate-400 uppercase mb-3 flex items-center gap-2"><Icon name="barChart"/> Contexto Semanal (Média Equipe)</h3>
                        <div className="flex gap-2 min-w-max">
                            {weeklyData.map((d, idx) => {
                                if(!d) return null;
                                const isToday = d.date === monitorDate;
                                const wColor = d.avgWell >= 20 ? 'bg-red-400' : d.avgWell >= 14 ? 'bg-yellow-400' : 'bg-green-400';
                                return (
                                    <div key={idx} className={`flex-1 min-w-[60px] flex flex-col items-center p-2 rounded border ${isToday ? 'bg-blue-50 dark:bg-blue-900/30 border-blue-200 dark:border-blue-800' : 'bg-slate-50 dark:bg-slate-700 border-transparent'}`}>
                                        <div className="text-[9px] font-bold text-slate-400 mb-1">{formatDateBR(d.date).slice(0,5)}</div>
                                        <div className="flex items-end gap-1 h-20 w-full justify-center">
                                            <div className="w-3 bg-blue-600 rounded-t" style={{height: `${Math.min(100, (d.avgLoad/1000)*100)}%`}} title={`Carga: ${d.avgLoad}`}></div>
                                            <div className={`w-3 ${wColor} rounded-t`} style={{height: `${Math.min(100, (d.avgWell/35)*100)}%`}} title={`Wellness: ${d.avgWell}`}></div>
                                        </div>
                                        <div className="mt-1 text-[9px] font-bold text-slate-600 dark:text-slate-300">{d.avgLoad} | {d.avgWell}</div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                    <h3 className="text-lg font-bold text-slate-700 dark:text-slate-200 mb-4">Status Individual ({formatDateBR(monitorDate)})</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {safePs.map((p, i) => { 
                            if(!p) return null; 
                            const pLog = dailyData[i] || {}; 
                            const totalHooper = getWSum(pLog.wellness); 
                            const totalDaily = calcDailyLoad(pLog); 
                            const painAlert = (Number(safeObj(pLog.wellness).soreness) || 0) >= 5; 
                            const painZones = Array.isArray(pLog.painZones) ? pLog.painZones : []; 
                            
                            const inTransition = !p.injured && isPlayerInTransition(i, dmRecords);
                            const borderClass = painAlert ? 'border-red-500 animate-pulse border-4' : inTransition ? 'border-orange-500 border-2' : 'border-slate-200 dark:border-slate-700'; 
                            
                            const recentDates = getDatesInRange(monitorDate, 7); 
                            let minsLast7 = 0;
                            recentDates.forEach(d => minsLast7 += (Number(matchMinutes[d]?.[i]) || 0));

                            return (
                                <div key={i} onClick={()=>setViewProfile(i)} className={`bg-white dark:bg-slate-800 p-4 rounded-xl border shadow-sm flex flex-col gap-3 relative overflow-hidden cursor-pointer hover:shadow-lg transition-all ${borderClass}`}>
                                    {painAlert && <div className="absolute top-0 right-0 bg-red-500 text-white text-[9px] font-bold px-2 py-1 flex items-center gap-1"><Icon name="alert" size={10} stroke="white"/> RISCO DE LESÃO</div>}
                                    {inTransition && !painAlert && <div className="absolute top-0 right-0 bg-orange-500 text-white text-[9px] font-bold px-2 py-1 flex items-center gap-1"><Icon name="activity" size={10} stroke="white"/> EM TRANSIÇÃO</div>}
                                    
                                    <div className="flex items-center gap-4">
                                        <div className="w-16 h-16 rounded-full bg-slate-100 dark:bg-slate-700 overflow-hidden shrink-0 border-2 border-slate-200 dark:border-slate-600">
                                            {p.image ? <img src={p.image} className="w-full h-full object-cover object-top"/> : <div className="w-full h-full flex items-center justify-center text-slate-300"><Icon name="user" size={24}/></div>}
                                        </div>
                                        <div className="flex-1">
                                            <h3 className="font-bold text-slate-800 dark:text-slate-100 text-lg uppercase truncate">{p.name}</h3>
                                            <div className="flex gap-2 text-[10px] font-bold mt-1 text-slate-500"><span>SONO: {safeObj(pLog.wellness).sleep || '-'}</span> | <span>FADIGA: {safeObj(pLog.wellness).fatigue || '-'}</span></div>
                                        </div>
                                        <div className="w-20"><MiniGauge value={totalHooper}/></div>
                                    </div>
                                    {painZones.length > 0 && (<div className="bg-red-50 dark:bg-red-900/30 p-1 rounded border border-red-100 dark:border-red-800"><span className="text-[9px] font-bold text-red-600 dark:text-red-400 uppercase flex flex-wrap gap-1 items-center"><Icon name="medkit" size={10}/> DORES: {painZones.join(', ')}</span></div>)}
                                    <div className="flex justify-between mt-1 px-2 border-t dark:border-slate-700 pt-2 items-center">
                                        <div className="text-[10px] text-slate-400 font-bold">CARGA sRPE: <span className="text-slate-700 dark:text-slate-200 text-lg">{totalDaily > 0 ? totalDaily : '-'}</span></div>
                                        
                                        {renderMatchReadinessAI(pLog, minsLast7, p.injured, inTransition)}

                                        <div onClick={(e)=>e.stopPropagation()} className="flex items-center gap-1 z-10"><span className="text-[9px] font-bold text-slate-400">MIN. JOGO:</span><input type="number" className="w-12 p-1 border dark:border-slate-600 rounded text-xs text-center dark:bg-slate-700 dark:text-white" value={matchMinutes?.[monitorDate]?.[i] || ''} onChange={e=>updateMinutes(i, e.target.value)} title="Tempo de partida oficial" outline-none/></div>
                                    </div>
                                </div>
                            ); 
                        })}
                    </div>
                </div>
            );
        };

        // ==========================================
        // RENDERIZAÇÃO PRINCIPAL DO SISTEMA
        // ==========================================
        const RootApp = () => {
            const [user, setUser] = useState(null); 
            const [loading, setLoading] = useState(true);
            
            useEffect(() => { 
                auth.onAuthStateChanged(u => { 
                    setUser(u); 
                    setLoading(false); 
                }); 
            }, []);
            
            if (loading) return <div className="flex h-screen w-screen items-center justify-center bg-slate-900 text-white font-bold text-xl"><svg className="animate-spin h-8 w-8 text-blue-500 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>A verificar credenciais...</div>;
            if (!user) return <LoginScreen onLogin={()=>{}} />;
            return <CloudWrapper user={user} />;
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<RootApp />);
    </script>
</body>
</html>
