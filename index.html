<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach V145 MAX - SaaS Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', }
    </script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { overscroll-behavior-y: contain; background-color: #f8fafc; color: #0f172a; font-family: system-ui; -webkit-tap-highlight-color: transparent; }
        body.dark { background-color: #0f172a; color: #f8fafc; }
        .hooper-slider { -webkit-appearance: none; width: 100%; height: 8px; border-radius: 4px; background: #cbd5e1; outline: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .micro-header { background-color: #1a4a3e; color: white; }
        .dashed-btn { border: 2px dashed #cbd5e1; color: #94a3b8; font-weight: bold; font-size: 10px; width: 100%; padding: 6px; border-radius: 8px; transition: all 0.2s; }
        .dark .dashed-btn { border-color: #475569; color: #cbd5e1; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; z-index: 9999; display: none; font-size: 12px; font-weight: bold; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col">
    <div id="toast"></div>
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco",
            authDomain: "prosaude-e9130.firebaseapp.com",
            projectId: "prosaude-e9130",
            storageBucket: "prosaude-e9130.firebasestorage.app",
            messagingSenderId: "999318121562",
            appId: "1:999318121562:web:1f192d4c0f14a64fb57c63"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- COMPONENTES AUXILIARES ---
        const Icon = ({ name, size=18, className="" }) => {
            const icons = {
                trophy: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-2.34M12 2v12.66"/></svg>,
                edit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8z"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
                up: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="18 15 12 9 6 15"/></svg>,
                down: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>,
                share: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
                bolt: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
                plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
                calendar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
                user: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            };
            return <span>{icons[name] || null}</span>;
        };

        const showToast = (msg) => { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 3000); };
        const getTodayStr = () => new Date().toISOString().split('T')[0];

        // --- VIEW: BIBLIOTECA E PRESCRIÇÃO (COM EDIT E ORDEM) ---
        const WorkoutBuilderView = ({ themeColor, exercises, setExercises, library, setLibrary }) => {
            const [form, setForm] = useState({ id: null, title: '', gifUrl: '', sets: '', reps: '', rest: '', target: '🔥 Ativação Pré-Treino' });
            const [editLibId, setEditLibId] = useState(null);

            const saveExercise = () => {
                if(!form.title) return showToast("Dê um nome!");
                if(form.id) {
                    setExercises(exercises.map(ex => ex.id === form.id ? form : ex));
                    showToast("Atualizado!");
                } else {
                    setExercises([{ ...form, id: Date.now() }, ...exercises]);
                    showToast("Adicionado!");
                }
                setForm({ id: null, title: '', gifUrl: '', sets: '', reps: '', rest: '', target: '🔥 Ativação Pré-Treino' });
            };

            const move = (index, dir) => {
                const newArr = [...exercises];
                const target = index + dir;
                if(target < 0 || target >= newArr.length) return;
                [newArr[index], newArr[target]] = [newArr[target], newArr[index]];
                setExercises(newArr);
            };

            const activationList = exercises.filter(e => e.target === '🔥 Ativação Pré-Treino');
            const workoutList = exercises.filter(e => e.target !== '🔥 Ativação Pré-Treino');

            return (
                <div className="p-6 h-full overflow-y-auto custom-scroll space-y-8 animate-fade-in">
                    <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700">
                        <h2 className="text-xl font-black mb-4 flex items-center gap-2" style={{color: themeColor}}><Icon name="bolt"/> {form.id ? 'EDITAR EXERCÍCIO' : 'NOVA PRESCRIÇÃO'}</h2>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                            <div className="col-span-2">
                                <label className="text-[10px] font-bold uppercase text-slate-400">Nome do Exercício</label>
                                <input className="w-full p-2 border rounded dark:bg-slate-700 dark:border-slate-600" value={form.title} onChange={e=>setForm({...form, title: e.target.value})} />
                            </div>
                            <div className="col-span-2">
                                <label className="text-[10px] font-bold uppercase text-slate-400">Público / Categoria</label>
                                <select className="w-full p-2 border rounded dark:bg-slate-700 dark:border-slate-600" value={form.target} onChange={e=>setForm({...form, target: e.target.value})}>
                                    <option>🔥 Ativação Pré-Treino</option>
                                    <option>💪 Treino Principal</option>
                                    <option>🛡️ Prevenção (LCA/Pubalgia)</option>
                                    <option>🏃 Transição Campo</option>
                                </select>
                            </div>
                            <div>
                                <label className="text-[10px] font-bold uppercase text-slate-400">Sets x Reps</label>
                                <input placeholder="Ex: 3x12" className="w-full p-2 border rounded dark:bg-slate-700 dark:border-slate-600" value={form.sets} onChange={e=>setForm({...form, sets: e.target.value})} />
                            </div>
                            <div className="col-span-2">
                                <label className="text-[10px] font-bold uppercase text-slate-400">GIF URL</label>
                                <input placeholder="https://..." className="w-full p-2 border rounded dark:bg-slate-700 dark:border-slate-600" value={form.gifUrl} onChange={e=>setForm({...form, gifUrl: e.target.value})} />
                            </div>
                            <button onClick={saveExercise} className="bg-blue-600 text-white font-bold p-2.5 rounded shadow-lg hover:bg-blue-700 transition-all uppercase text-xs">
                                {form.id ? 'Atualizar' : 'Adicionar'}
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <section>
                            <h3 className="text-orange-500 font-black uppercase text-sm mb-4 border-b-2 border-orange-500 pb-1 flex items-center gap-2">
                                <Icon name="bolt"/> Lista de Ativação
                            </h3>
                            <div className="space-y-4">
                                {activationList.map((ex, i) => (
                                    <div key={ex.id} className="bg-white dark:bg-slate-800 rounded-xl overflow-hidden shadow-md flex border dark:border-slate-700 group">
                                        <img src={ex.gifUrl} className="w-24 h-24 object-cover bg-slate-200" />
                                        <div className="p-3 flex-1 flex flex-col justify-center">
                                            <div className="font-bold text-sm uppercase">{ex.title}</div>
                                            <div className="text-xs text-slate-500 font-bold">{ex.sets}</div>
                                        </div>
                                        <div className="flex flex-col border-l dark:border-slate-700">
                                            <button onClick={()=>move(exercises.indexOf(ex), -1)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700"><Icon name="up" size={14}/></button>
                                            <button onClick={()=>setForm(ex)} className="p-2 text-blue-500 hover:bg-blue-50"><Icon name="edit" size={14}/></button>
                                            <button onClick={()=>move(exercises.indexOf(ex), 1)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700"><Icon name="down" size={14}/></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section>
                            <h3 className="text-blue-500 font-black uppercase text-sm mb-4 border-b-2 border-blue-500 pb-1 flex items-center gap-2">
                                <Icon name="trophy"/> Treino / Prevenção
                            </h3>
                            <div className="space-y-4">
                                {workoutList.map((ex, i) => (
                                    <div key={ex.id} className="bg-white dark:bg-slate-800 rounded-xl overflow-hidden shadow-md flex border dark:border-slate-700">
                                        <img src={ex.gifUrl} className="w-24 h-24 object-cover bg-slate-200" />
                                        <div className="p-3 flex-1 flex flex-col justify-center">
                                            <div className="font-bold text-sm uppercase">{ex.title}</div>
                                            <div className="text-xs text-slate-500 font-bold">{ex.sets}</div>
                                            <div className="text-[9px] text-blue-400 font-black mt-1">{ex.target}</div>
                                        </div>
                                        <div className="flex flex-col border-l dark:border-slate-700">
                                            <button onClick={()=>move(exercises.indexOf(ex), -1)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700"><Icon name="up" size={14}/></button>
                                            <button onClick={()=>setForm(ex)} className="p-2 text-blue-500 hover:bg-blue-50"><Icon name="edit" size={14}/></button>
                                            <button onClick={()=>move(exercises.indexOf(ex), 1)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700"><Icon name="down" size={14}/></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </div>
                </div>
            );
        };

        // --- VIEW: SQUAD (COM CRAQUE DA SEMANA E LINK WHATSAPP) ---
        const SquadView = ({ players, setPlayers, themeColor }) => {
            const toggleStar = (index) => {
                const newP = players.map((p, i) => ({ ...p, isStar: i === index ? !p.isStar : false }));
                setPlayers(newP);
                showToast("Craque da Semana Atualizado! 🏆");
            };

            const sendWA = (p, index) => {
                const link = `${window.location.origin}${window.location.pathname}?id=${auth.currentUser.uid}&p=${index}`;
                const msg = `Fala ${p.name}! 🚀 Seu portal de performance está atualizado:\n${link}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            };

            return (
                <div className="p-6 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6 animate-fade-in h-full overflow-y-auto custom-scroll">
                    {players.map((p, i) => (
                        <div key={i} className={`bg-white dark:bg-slate-800 rounded-2xl shadow-lg p-5 border-2 transition-all flex flex-col items-center relative ${p.isStar ? 'border-yellow-400 ring-4 ring-yellow-400/20 scale-105' : 'border-transparent'}`}>
                            {p.isStar && <div className="absolute -top-3 bg-yellow-400 text-slate-900 px-3 py-1 rounded-full text-[10px] font-black uppercase shadow-lg">Craque da Semana</div>}
                            
                            <div className="w-20 h-20 rounded-full bg-slate-200 overflow-hidden border-2 mb-3" style={{borderColor: themeColor}}>
                                <img src={p.image || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'} className="w-full h-full object-cover" />
                            </div>
                            
                            <h3 className="font-black uppercase text-center truncate w-full">{p.name}</h3>
                            <div className="text-[10px] text-slate-400 font-bold uppercase mb-4">{p.position || 'Atleta'}</div>
                            
                            <div className="flex gap-2 w-full">
                                <button onClick={()=>toggleStar(i)} className={`flex-1 p-2 rounded-lg border flex justify-center transition-all ${p.isStar ? 'bg-yellow-400 text-white border-yellow-400' : 'text-slate-300 border-slate-200 hover:text-yellow-500'}`}><Icon name="trophy"/></button>
                                <button onClick={()=>sendWA(p, i)} className="flex-1 p-2 rounded-lg bg-green-500 text-white flex justify-center hover:bg-green-600"><Icon name="share"/></button>
                            </div>
                        </div>
                    ))}
                    <button onClick={() => setPlayers([...players, { name: 'Novo Atleta', isStar: false }])} className="dashed-btn h-40 flex flex-col items-center justify-center gap-2">
                        <Icon name="plus" size={30}/> ADICIONAR ATLETA
                    </button>
                </div>
            );
        };

        // --- VIEW: MATCH (CONTAGEM REGRESSIVA) ---
        const MatchView = ({ matchInfo, setMatchInfo }) => {
            const [timeLeft, setTimeLeft] = useState("");

            useEffect(() => {
                const timer = setInterval(() => {
                    if(!matchInfo.date) return;
                    const diff = new Date(matchInfo.date) - new Date();
                    if(diff < 0) { setTimeLeft("JOGO EM ANDAMENTO OU FINALIZADO"); return; }
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                    setTimeLeft(`${days}d ${hours}h para o desafio!`);
                }, 1000);
                return () => clearInterval(timer);
            }, [matchInfo.date]);

            return (
                <div className="p-6 h-full flex flex-col items-center justify-center animate-fade-in">
                    <div className="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-2xl border-2 border-slate-100 dark:border-slate-700 w-full max-w-md text-center">
                        <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Próximo Jogo</div>
                        <input className="text-2xl font-black text-center w-full uppercase bg-transparent outline-none mb-4" placeholder="NOME DO ADVERSÁRIO" value={matchInfo.opponent} onChange={e=>setMatchInfo({...matchInfo, opponent: e.target.value})} />
                        
                        <div className="bg-slate-900 text-yellow-400 p-4 rounded-xl font-mono text-xl mb-6 shadow-inner border border-slate-700">
                            {timeLeft || "DEFINA UMA DATA"}
                        </div>

                        <div className="flex flex-col gap-4 text-left">
                            <div>
                                <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Data e Hora do Jogo</label>
                                <input type="datetime-local" className="w-full p-3 border rounded-xl dark:bg-slate-700" value={matchInfo.date} onChange={e=>setMatchInfo({...matchInfo, date: e.target.value})} />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const MainApp = ({ user, initialData }) => {
            const [tab, setTab] = useState('squad');
            const [players, setPlayers] = useState(initialData.players || []);
            const [exercises, setExercises] = useState(initialData.exercises || []);
            const [matchInfo, setMatchInfo] = useState(initialData.matchInfo || { opponent: '', date: '' });
            const [themeColor, setThemeColor] = useState(initialData.themeColor || '#1e3a8a');
            const [syncing, setSyncing] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setSyncing(true);
                    db.collection('coachData').doc(user.uid).set({ players, exercises, matchInfo, themeColor }, { merge: true })
                        .then(() => setSyncing(false));
                }, 2000);
                return () => clearTimeout(timer);
            }, [players, exercises, matchInfo, themeColor]);

            return (
                <div className="flex flex-col h-full bg-slate-50 dark:bg-slate-900">
                    <header className="p-4 bg-white dark:bg-slate-800 shadow-sm flex justify-between items-center shrink-0">
                        <div className="font-black italic text-lg" style={{color: themeColor}}>PROCOACH <span className="text-[10px] opacity-50 not-italic">V145</span></div>
                        <div className="flex gap-4 items-center">
                            {syncing && <div className="text-[9px] font-black text-slate-400 animate-pulse">SINCRO...</div>}
                            <button onClick={()=>auth.signOut().then(()=>window.location.reload())} className="text-red-500 text-xs font-bold uppercase">Sair</button>
                        </div>
                    </header>

                    <nav className="flex p-2 bg-slate-100 dark:bg-slate-950 overflow-x-auto gap-2">
                        {['squad', 'workout', 'match'].map(t => (
                            <button key={t} onClick={()=>setTab(t)} className={`px-5 py-2 rounded-lg text-xs font-black uppercase transition-all ${tab === t ? 'bg-white shadow text-slate-800' : 'text-slate-500'}`}>
                                {t === 'squad' ? 'Elenco' : t === 'workout' ? 'Prescrição' : 'Match'}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 overflow-hidden">
                        {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} />}
                        {tab === 'workout' && <WorkoutBuilderView themeColor={themeColor} exercises={exercises} setExercises={setExercises} />}
                        {tab === 'match' && <MatchView matchInfo={matchInfo} setMatchInfo={setMatchInfo} />}
                    </main>
                </div>
            );
        };

        // --- AUTH & LOGIN ---
        const LoginScreen = () => {
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const handle = (e) => { e.preventDefault(); auth.signInWithEmailAndPassword(email, pass); };
            return (
                <div className="h-screen flex items-center justify-center bg-slate-900 p-6">
                    <form onSubmit={handle} className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm flex flex-col gap-4">
                        <h1 className="text-2xl font-black italic text-center text-blue-600">PROCOACH ACCESS</h1>
                        <input type="email" placeholder="E-mail" className="p-3 border rounded-xl" onChange={e=>setEmail(e.target.value)} />
                        <input type="password" placeholder="Senha" className="p-3 border rounded-xl" onChange={e=>setPass(e.target.value)} />
                        <button className="bg-blue-600 text-white p-3 rounded-xl font-bold uppercase shadow-lg">Entrar</button>
                    </form>
                </div>
            );
        };

        const RootApp = () => {
            const [user, setUser] = useState(null);
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                auth.onAuthStateChanged(u => {
                    setUser(u);
                    if(u) {
                        db.collection('coachData').doc(u.uid).onSnapshot(doc => {
                            setData(doc.data() || {});
                            setLoading(false);
                        });
                    } else setLoading(false);
                });
            }, []);

            if(loading) return <div className="h-screen flex items-center justify-center font-black animate-pulse">CARREGANDO...</div>;
            return user ? <MainApp user={user} initialData={data} /> : <LoginScreen />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
