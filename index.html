    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const DEFAULT_DAYS = [
            { id: 1, md: 'MD-4', name: 'SEGUNDA', date:'', plannedMins: '', am: [], pm: [] },
            { id: 2, md: 'MD-3', name: 'TERÇA', date:'', plannedMins: '', am: [], pm: [] },

            { id: 7, md: 'MD+2', name: 'DOMINGO', date:'', plannedMins: '', am: [], pm: [] }
        ];

        const RTP_PHASES = [ 
            {id:1, label:"Fase 1: Aguda", desc:"Controle do quadro álgico/inflamatório. Fisioterapia."}, 
            {id:2, label:"Fase 2: Sub-aguda", desc:"Reabilitação do segmento lesado + Fortalecimento não envolvidos. Fisioterapia."}, 
            {id:3, label:"Fase 3: Transição I", desc:"Força segmentada (não envolvidos) + Cardio sem impacto. Fisio + Transição."}, 
            {id:4, label:"Fase 4: Transição II", desc:"Funcionais + cardio sem impacto. Força com restrição. Introdução Pliometria/Corrida."}, 
            {id:5, label:"Fase 5: Transição III", desc:"Força sem restrições funcionais. Cardio com impacto. Fisio + Transição Campo."}, 
            {id:6, label:"Fase 6: Performance I", desc:"Potência na Academia. Aceleração e Pliometria sem restrições."}, 
            {id:7, label:"Fase 7: Performance II", desc:"Potência especifica do esporte. Preparação individual e parcial com grupo."}, 
            {id:8, label:"Fase 8: Performance III", desc:"Retorno ao grupo com minutagem controlada em jogo. Liberado treino com o grupo sem restrições."}, 
            {id:9, label:"Fase 9: Liberação", desc:"Responsabilidade do atleta com cuidados antes e após treinos e jogos."} 
        ];

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, resetting: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            componentDidCatch(error, errorInfo) { console.error("ProCoach Error:", error, errorInfo); }
            handleHardReset = () => {
                this.setState({ resetting: true });
                localStorage.clear();
                if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(regs => { for (let r of regs) r.unregister(); }); }
                const user = firebase.auth().currentUser;
                if (user) {
                    firebase.firestore().collection('coachData').doc(user.uid).set({
                        players: [], trainingLog: {}, dmRecords: [], matchMinutes: {}, assessments: {},
                        days: DEFAULT_DAYS, themeColor: '#1e3a8a', darkMode: true, plan: 'starter', exercises: [], library: [], postWorkout: 'Bota Pneumática (15 min)', matchInfo: { opponent: '', date: '' }
                    });
                }
                setTimeout(() => { window.location.href = window.location.pathname + '?clear=' + Date.now(); }, 1000);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col h-screen w-screen items-center justify-center bg-slate-900 text-white p-6 text-center">
                            <div className="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center mb-4 shadow-lg shadow-red-500/50"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                            <h1 className="text-2xl font-bold mb-2">Erro de Sincronização!</h1>
                            <button onClick={this.handleHardReset} disabled={this.state.resetting} className="bg-blue-600 text-white font-bold py-4 px-8 rounded-xl shadow-xl uppercase transition-all hover:scale-105">{this.state.resetting ? "REINICIANDO..." : "FORMATAR E RECUPERAR"}</button>
                        </div>
                    );
                }
                return this.props.children; 
            }
        }

        const firebaseConfig = {
            apiKey: "AIzaSyDP3yVMqP_4C2CyVRzLW7jTYzCAAMJXIco",
            authDomain: "prosaude-e9130.firebaseapp.com",
            projectId: "prosaude-e9130",
            storageBucket: "prosaude-e9130.firebasestorage.app",
            messagingSenderId: "999318121562",
            appId: "1:999318121562:web:1f192d4c0f14a64fb57c63"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();
        db.enablePersistence().catch((err) => { console.warn("Persistence Error:", err.code); });

        const smartShare = async (blob, filename, title) => {
            const file = new File([blob], filename, { type: blob.type });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try { await navigator.share({ files: [file], title: title }); return; } catch (err) {}
            }
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        };

        const showToast = (msg, color = '#333') => { const t = document.getElementById('toast'); if(t){ t.innerText = msg; t.style.backgroundColor = color; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); } };
        const compressImage = (file, maxWidth=150, quality=0.5) => { return new Promise((resolve) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = (event) => { const img = new Image(); img.src = event.target.result; img.onload = () => { const elem = document.createElement('canvas'); const scaleFactor = maxWidth / img.width; elem.width = maxWidth; elem.height = img.height * scaleFactor; const ctx = elem.getContext('2d'); ctx.drawImage(img, 0, 0, elem.width, elem.height); resolve(elem.toDataURL('image/jpeg', quality)); }; }; }); };
        const getTodayStr = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; };
        const getDatesInRange = (startDate, daysBack) => { const dates = []; const end = new Date(startDate); end.setMinutes(end.getMinutes() - end.getTimezoneOffset()); for (let i = 0; i < daysBack; i++) { const d = new Date(end); d.setDate(end.getDate() - i); dates.push(d.toISOString().split('T')[0]); } return dates; };
        const formatDateBR = (dateString) => { if(!dateString) return '-'; const [y, m, d] = dateString.split('-'); return `${d}/${m}/${y}`; };
        const safeObj = (obj) => (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
        const safeArray = (arr, fallback=[]) => (Array.isArray(arr) && arr.length > 0) ? arr : fallback;
        const getWSum = (w) => (w && typeof w === 'object' && !Array.isArray(w)) ? Object.values(w).reduce((a, b) => Number(a) + Number(b), 0) || 0 : 0;
        const calcDailyLoad = (log) => { if(!log) return 0; const rpe = (Number(log.rpe_am)||0) + (Number(log.rpe_pm)||0); const dur = Number(log.duration) || 0; return rpe * (dur > 0 ? dur : 60); };
        const isPlayerInTransition = (pId, dmRecords) => { const todayDate = new Date(getTodayStr()); const records = safeArray(dmRecords).filter(r => r && r.playerId == pId && r.status === 'Recovered' && r.dateOut); for(let r of records) { const outDate = new Date(r.dateOut); if(isNaN(outDate.getTime())) continue; const diffTime = Math.abs(todayDate - outDate); const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); if(diffDays <= 7) return true; } return false; };

        const sanitizeCloudData = (data) => {
            if (!data || typeof data !== 'object') return {};
            return {
                themeColor: data.themeColor || '#1e3a8a',
                players: safeArray(data.players).map(p => safeObj(p)),
                trainingLog: safeObj(data.trainingLog),
                assessments: safeObj(data.assessments),
                dmRecords: safeArray(data.dmRecords),
                matchMinutes: safeObj(data.matchMinutes),
                header: safeObj(data.header),
                logo: data.logo || null,
                darkMode: !!data.darkMode,
                plan: data.plan || 'starter',
                days: safeArray(data.days, DEFAULT_DAYS).map(d => ({...d, plannedMins: d.plannedMins || ''})),
                exercises: safeArray(data.exercises),
                library: safeArray(data.library),
                postWorkout: data.postWorkout || 'Bota Pneumática (15 min)',
                matchInfo: safeObj(data.matchInfo) // NOVO
            };
        };

        const BufferedInput = ({ value, onSave, className, placeholder, type="text" }) => { const [localVal, setLocalVal] = useState(value); useEffect(() => setLocalVal(value), [value]); return (<input type={type} className={className} value={localVal} placeholder={placeholder} onChange={(e) => setLocalVal(e.target.value)} onBlur={() => { if(localVal !== value) onSave(localVal); }} />); };

        const Icon = ({ name, size=18, className="" }) => {
            const icons = {
                calendar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
                list: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
                smile: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>,
                plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                image: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
                user: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
                alert: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
                trophy: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-2.34M12 2v12.66"/></svg>,
                check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>,
                settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
                medkit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>,
                edit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8z"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
                share: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
                up: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="18 15 12 9 6 15"/></svg>,
                down: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>,
                bolt: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
                logout: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            };
            return <span className={className}>{icons[name] || null}</span>;
        };

        // --- DASHBOARD ADMIN ---
        const AdminDashboard = ({ themeColor }) => {
            const [clients, setClients] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                const fetchClients = async () => {
                    try {
                        const snapshot = await db.collection('coachData').get();
                        const clientList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setClients(clientList); setLoading(false);
                    } catch (err) { showToast("Erro ao carregar clientes."); setLoading(false); }
                };
                fetchClients();
            }, []);
            const updatePlan = async (clientId, newPlan) => {
                try {
                    await db.collection('coachData').doc(clientId).update({ plan: newPlan });
                    setClients(clients.map(c => c.id === clientId ? { ...c, plan: newPlan } : c));
                    showToast("Plano atualizado!", "#22c55e");
                } catch (err) { showToast("Erro."); }
            };
            if (loading) return <div className="p-6 text-center animate-pulse">A carregar...</div>;
            return (
                <div className="p-6 h-full overflow-y-auto animate-fade-in custom-scroll">
                    <div className="bg-slate-900 p-6 rounded-2xl shadow-xl mb-6 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1" style={{ backgroundColor: themeColor }}></div>
                        <h2 className="text-2xl font-black text-white uppercase">👑 Painel Mestre</h2>
                    </div>
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow overflow-hidden">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-slate-100 dark:bg-slate-700 text-[10px] font-black uppercase">
                                <tr><th className="p-4">Equipa</th><th className="p-4 text-center">Plano</th></tr>
                            </thead>
                            <tbody className="divide-y dark:divide-slate-700">
                                {clients.map(c => (
                                    <tr key={c.id}>
                                        <td className="p-4 font-bold dark:text-white">{c.header?.teamName || 'Sem nome'}</td>
                                        <td className="p-4 text-center">
                                            <select className="dark:bg-slate-900 border rounded p-1" value={c.plan||'starter'} onChange={e=>updatePlan(c.id, e.target.value)}>
                                                <option value="starter">Starter</option><option value="pro">PRO</option><option value="elite">Elite</option>
                                            </select>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // --- BIBLIOTECA DE EXERCÍCIOS ---
        const LibraryView = ({ themeColor, library, setLibrary }) => {
            const [form, setForm] = useState({ id: null, title: '', gifUrl: '' });
            const save = () => {
                if(!form.title) return showToast("Digite o nome!");
                if(form.id) {
                    setLibrary(library.map(l => l.id === form.id ? form : l));
                } else {
                    setLibrary([{ id: Date.now(), ...form }, ...library]);
                }
                setForm({ id: null, title: '', gifUrl: '' });
                showToast("Biblioteca Atualizada!");
            };
            const remove = (id) => setLibrary(library.filter(ex => ex.id !== id));
            return (
                <div className="p-6 h-full overflow-y-auto animate-fade-in custom-scroll space-y-6">
                    <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow border dark:border-slate-700">
                        <h2 className="text-xl font-black uppercase mb-4" style={{color: themeColor}}>📚 Biblioteca Global de GIFs</h2>
                        <div className="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                            <div className="md:col-span-5"><label className="text-[10px] font-bold text-slate-400 uppercase">Nome</label><input type="text" className="w-full border rounded p-2 text-xs dark:bg-slate-700 dark:text-white" value={form.title} onChange={e=>setForm({...form, title: e.target.value})} /></div>
                            <div className="md:col-span-5"><label className="text-[10px] font-bold text-slate-400 uppercase">Link GIF</label><input type="text" className="w-full border rounded p-2 text-xs dark:bg-slate-700 dark:text-white" value={form.gifUrl} onChange={e=>setForm({...form, gifUrl: e.target.value})} /></div>
                            <div className="md:col-span-2"><button onClick={save} className="w-full bg-blue-600 text-white font-bold p-2 rounded">{form.id ? 'ATUALIZAR' : 'SALVAR'}</button></div>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        {library.map(ex => (
                            <div key={ex.id} className="bg-white dark:bg-slate-800 rounded-xl overflow-hidden border dark:border-slate-700 relative group">
                                <div className="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onClick={()=>setForm(ex)} className="bg-blue-500 text-white p-1 rounded-full"><Icon name="edit" size={12}/></button>
                                    <button onClick={()=>remove(ex.id)} className="bg-red-500 text-white p-1 rounded-full"><Icon name="trash" size={12}/></button>
                                </div>
                                <img src={ex.gifUrl} className="w-full h-24 object-cover" />
                                <div className="p-2 font-bold text-xs uppercase truncate dark:text-white">{ex.title}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- PRESCRIÇÃO DIÁRIA (REORDENAÇÃO E EDIÇÃO) ---
        const WorkoutBuilderView = ({ themeColor, exercises, setExercises, library, postWorkout, setPostWorkout }) => {
            const [form, setForm] = useState({ id: null, title: '', gifUrl: '', sets: '', reps: '', rest: '', target: 'Geral' });
            const save = () => {
                if(!form.title) return showToast("Digite o nome!");
                if(form.id) {
                    setExercises(exercises.map(ex => ex.id === form.id ? form : ex));
                    showToast("Atualizado!");
                } else {
                    setExercises([{ ...form, id: Date.now() }, ...exercises]);
                    showToast("Adicionado!");
                }
                setForm({ id: null, title: '', gifUrl: '', sets: '', reps: '', rest: '', target: 'Geral' });
            };
            const move = (idx, dir) => {
                const newArr = [...exercises]; const target = idx + dir;
                if(target < 0 || target >= newArr.length) return;
                [newArr[idx], newArr[target]] = [newArr[target], newArr[idx]];
                setExercises(newArr);
            };
            const edit = (ex) => { setForm(ex); window.scrollTo({top: 0, behavior: 'smooth'}); };
            const load = (id) => { const s = library.find(l => l.id == id); if(s) setForm({...form, title: s.title, gifUrl: s.gifUrl}); };

            const listAtiv = exercises.filter(e => e.target === '🔥 Ativação Pré-Treino');
            const listGeral = exercises.filter(e => e.target !== '🔥 Ativação Pré-Treino');

            return (
                <div className="p-6 h-full overflow-y-auto animate-fade-in custom-scroll flex flex-col gap-6">
                    <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border dark:border-slate-700">
                        <h2 className="text-xl font-black uppercase mb-4" style={{color: themeColor}}><Icon name="bolt"/> {form.id ? 'Editar Exercício' : 'Prescrição do Dia'}</h2>
                        <div className="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                            <div className="md:col-span-3"><label className="text-[10px] font-bold text-slate-400 uppercase">Biblioteca</label><select className="w-full border rounded p-2 text-xs dark:bg-slate-700 dark:text-white" onChange={e=>load(e.target.value)}><option value="">Puxar GIF...</option>{library.map(l=><option key={l.id} value={l.id}>{l.title}</option>)}</select></div>
                            <div className="md:col-span-3"><label className="text-[10px] font-bold text-slate-400 uppercase">Nome</label><input type="text" className="w-full border rounded p-2 text-xs dark:bg-slate-700 dark:text-white" value={form.title} onChange={e=>setForm({...form, title: e.target.value})} /></div>
                            <div className="md:col-span-2"><label className="text-[10px] font-bold text-slate-400 uppercase">Público</label>
                                <select className="w-full border rounded p-2 text-xs dark:bg-slate-700 dark:text-white" value={form.target} onChange={e=>setForm({...form, target: e.target.value})}>
                                    <option value="Geral">Elenco Geral</option><option value="🔥 Ativação Pré-Treino">🔥 Ativação Pré-Treino</option><option value="LCA">Prevenção LCA</option><option value="Pubalgia">Pubalgia</option><option value="Transição">Transição</option>
                                </select>
                            </div>
                            <div className="md:col-span-1"><label className="text-[10px] font-bold text-slate-400 uppercase">Sets</label><input type="text" className="w-full border rounded p-2 text-xs text-center dark:bg-slate-700 dark:text-white" value={form.sets} onChange={e=>setForm({...form, sets: e.target.value})} /></div>
                            <div className="md:col-span-2"><label className="text-[10px] font-bold text-slate-400 uppercase">Link</label><input type="text" className="w-full border rounded p-2 text-xs dark:bg-slate-700 dark:text-white" value={form.gifUrl} onChange={e=>setForm({...form, gifUrl: e.target.value})} /></div>
                            <div className="md:col-span-1"><button onClick={save} className="w-full bg-blue-600 text-white font-bold p-2.5 rounded text-[10px]">{form.id ? 'OK' : 'ADD'}</button></div>
                        </div>
                    </div>

                    <div className="space-y-6 pb-12">
                        <h3 className="text-orange-500 font-black uppercase text-sm border-l-4 border-orange-500 pl-2 flex items-center gap-2">🔥 Bloco de Ativação</h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {listAtiv.map((ex, i) => (
                                <div key={ex.id} className="bg-white dark:bg-slate-800 rounded-xl overflow-hidden border-2 border-orange-100 dark:border-orange-900 shadow-sm relative group">
                                    <div className="absolute top-2 right-2 flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                        <button onClick={()=>move(exercises.indexOf(ex), -1)} className="bg-white dark:bg-slate-700 p-1.5 rounded-full shadow"><Icon name="up" size={12}/></button>
                                        <button onClick={()=>edit(ex)} className="bg-blue-500 text-white p-1.5 rounded-full shadow"><Icon name="edit" size={12}/></button>
                                        <button onClick={()=>move(exercises.indexOf(ex), 1)} className="bg-white dark:bg-slate-700 p-1.5 rounded-full shadow"><Icon name="down" size={12}/></button>
                                        <button onClick={()=>setExercises(exercises.filter(x=>x.id!==ex.id))} className="bg-red-500 text-white p-1.5 rounded-full shadow"><Icon name="trash" size={12}/></button>
                                    </div>
                                    <img src={ex.gifUrl} className="w-full h-32 object-cover" />
                                    <div className="p-3"><h4 className="font-bold text-sm uppercase dark:text-white truncate">{ex.title}</h4><p className="text-[10px] font-bold text-slate-500 uppercase">{ex.sets}</p></div>
                                </div>
                            ))}
                        </div>

                        <h3 className="text-blue-500 font-black uppercase text-sm border-l-4 border-blue-500 pl-2 flex items-center gap-2">💪 Bloco Geral / Treino</h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {listGeral.map((ex, i) => (
                                <div key={ex.id} className="bg-white dark:bg-slate-800 rounded-xl overflow-hidden border dark:border-slate-700 shadow-sm relative group">
                                    <div className="absolute top-2 right-2 flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                        <button onClick={()=>move(exercises.indexOf(ex), -1)} className="bg-white dark:bg-slate-700 p-1.5 rounded-full shadow"><Icon name="up" size={12}/></button>
                                        <button onClick={()=>edit(ex)} className="bg-blue-500 text-white p-1.5 rounded-full shadow"><Icon name="edit" size={12}/></button>
                                        <button onClick={()=>move(exercises.indexOf(ex), 1)} className="bg-white dark:bg-slate-700 p-1.5 rounded-full shadow"><Icon name="down" size={12}/></button>
                                        <button onClick={()=>setExercises(exercises.filter(x=>x.id!==ex.id))} className="bg-red-500 text-white p-1.5 rounded-full shadow"><Icon name="trash" size={12}/></button>
                                    </div>
                                    <img src={ex.gifUrl} className="w-full h-32 object-cover" />
                                    <div className="p-3"><h4 className="font-bold text-sm uppercase dark:text-white truncate">{ex.title}</h4><p className="text-[10px] font-bold text-slate-500 uppercase">{ex.sets} | {ex.target}</p></div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- ABA MATCH (CONTAGEM REGRESSIVA) ---
        const PreGameView = ({ players, themeColor, trainingLog, dmRecords, matchMinutes, setMatchMinutes, matchInfo, setMatchInfo }) => {
            const [monitorDate, setMonitorDate] = useState(getTodayStr());
            const [timer, setTimer] = useState({d:0,h:0,m:0});

            useEffect(() => {
                const interval = setInterval(() => {
                    if(!matchInfo.date) return;
                    const diff = new Date(matchInfo.date) - new Date();
                    if(diff <= 0) return setTimer({d:0,h:0,m:0});
                    setTimer({
                        d: Math.floor(diff / (1000 * 60 * 60 * 24)),
                        h: Math.floor((diff / (1000 * 60 * 60)) % 24),
                        m: Math.floor((diff / (1000 * 60)) % 60)
                    });
                }, 1000);
                return () => clearInterval(interval);
            }, [matchInfo.date]);

            return (
                <div className="p-6 h-full overflow-y-auto animate-fade-in custom-scroll space-y-6">
                    <div className="bg-slate-900 p-8 rounded-3xl shadow-2xl relative overflow-hidden text-center md:text-left flex flex-col md:flex-row items-center justify-between gap-6">
                        <div className="absolute top-0 right-0 p-10 opacity-10"><Icon name="trophy" size={140}/></div>
                        <div className="z-10">
                            <h3 className="text-blue-400 font-black uppercase text-[10px] tracking-widest mb-1">Mural do Coach: Próximo Desafio</h3>
                            <BufferedInput className="bg-transparent border-b border-slate-700 text-3xl font-black text-white uppercase outline-none mb-2 w-full" placeholder="NOME DO ADVERSÁRIO" value={matchInfo.opponent} onSave={val=>setMatchInfo({...matchInfo, opponent:val})}/>
                            <div className="flex gap-4 text-white font-mono text-xl mt-2">
                                <div className="bg-slate-800 px-3 py-1 rounded border border-slate-700"><span>{timer.d}</span><span className="text-[8px] uppercase block">Dias</span></div>
                                <div className="bg-slate-800 px-3 py-1 rounded border border-slate-700"><span>{timer.h}</span><span className="text-[8px] uppercase block">Horas</span></div>
                                <div className="bg-slate-800 px-3 py-1 rounded border border-slate-700"><span>{timer.m}</span><span className="text-[8px] uppercase block">Mins</span></div>
                            </div>
                        </div>
                        <div className="z-10 bg-slate-800 p-4 rounded-2xl border border-slate-700">
                            <label className="text-[9px] font-black text-slate-500 uppercase block mb-1">Data e Hora do Jogo</label>
                            <input type="datetime-local" className="bg-slate-900 text-white rounded p-2 text-xs font-bold outline-none" value={matchInfo.date} onChange={e=>setMatchInfo({...matchInfo, date: e.target.value})}/>
                        </div>
                    </div>
                    {/* Resto da Aba Match Original */}
                    <div className="flex justify-between items-center mb-4"><h2 className="text-2xl font-bold flex items-center gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="trophy"/> Performance & Carga</h2></div>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow p-4 border dark:border-slate-700 flex flex-col items-center justify-center col-span-1"><SpeedometerGauge value={18} /></div>
                    </div>
                </div>
            );
        };

        // --- ABA ELENCO (CRAQUE E WHATSAPP) ---
        const SquadView = ({ players, setPlayers, themeColor, trainingLog, dmRecords }) => {
            const [viewProfile, setViewProfile] = useState(null);
            const safePs = safeArray(players);
            const toggleStar = (idx) => {
                const n = safePs.map((p, i) => ({ ...p, isCraque: i === idx ? !p.isCraque : false }));
                setPlayers(n); showToast(n[idx].isCraque ? "🏆 CRAQUE DA SEMANA DEFINIDO!" : "Removido");
            };
            const sendLink = (p, i) => {
                const link = `${window.location.origin}${window.location.pathname}?id=${auth.currentUser.uid}&p=${i}`;
                const msg = `Fala ${p.name}! 🚀 Seu portal de performance ProCoach está pronto: ${link}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            };
            return (
                <div className="p-6 h-full overflow-y-auto animate-fade-in custom-scroll">
                    <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        {safePs.map((p, i) => (
                            <div key={i} className={`bg-white dark:bg-slate-800 rounded-2xl shadow p-5 border-2 transition-all flex flex-col items-center relative ${p.isCraque ? 'border-yellow-400 scale-105 shadow-yellow-500/20' : 'border-transparent'}`}>
                                {p.isCraque && <div className="absolute -top-3 bg-yellow-400 text-slate-900 px-3 py-1 rounded-full text-[10px] font-black uppercase shadow-lg z-10">Craque da Semana</div>}
                                <div className="absolute top-2 right-2 flex gap-1">
                                    <button onClick={()=>toggleStar(i)} className={`p-1.5 rounded-full shadow-sm transition-all ${p.isCraque ? 'bg-yellow-400 text-white' : 'bg-slate-100 dark:bg-slate-700 text-slate-300'}`}><Icon name="trophy" size={14}/></button>
                                </div>
                                <div className="w-24 h-24 rounded-full bg-slate-100 overflow-hidden mb-3 border-2" style={{borderColor: p.isCraque ? '#fbbf24' : themeColor}}>
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user" size={40} className="m-7 text-slate-300"/>}
                                </div>
                                <h3 className="font-black text-slate-800 dark:text-white uppercase truncate w-full text-center">{p.name}</h3>
                                <p className="text-[10px] font-bold text-slate-400 uppercase mb-4">{p.position || 'Atleta'}</p>
                                <div className="grid grid-cols-2 gap-2 w-full">
                                    <button onClick={()=>setViewProfile(i)} className="p-2 rounded-lg bg-slate-100 dark:bg-slate-700 text-[10px] font-black uppercase dark:text-white">Perfil</button>
                                    <button onClick={()=>sendLink(p, i)} className="p-2 rounded-lg bg-green-500 text-white text-[10px] font-black uppercase flex items-center justify-center gap-1"><Icon name="share" size={10}/> Link</button>
                                </div>
                            </div>
                        ))}
                        <button onClick={()=>setPlayers([...safePs, {name: 'Novo Atleta', isCraque: false}])} className="dashed-btn h-48 flex flex-col items-center justify-center gap-2"><Icon name="plus" size={32}/> ADICIONAR ATLETA</button>
                    </div>
                </div>
            );
        };

        // --- MANTENDO MAIN APP E ESTRUTURA ORIGINAL ---
        const MainApp = ({ user, initialData }) => {
            const [tab, setTab] = useState('squad'); 
            const [players, setPlayers] = useState(initialData.players || []);
            const [trainingLog, setTrainingLog] = useState(initialData.trainingLog || {});
            const [exercises, setExercises] = useState(initialData.exercises || []);
            const [library, setLibrary] = useState(initialData.library || []);
            const [matchInfo, setMatchInfo] = useState(initialData.matchInfo || { opponent: '', date: '' });
            const [postWorkout, setPostWorkout] = useState(initialData.postWorkout || 'Bota Pneumática (15 min)');
            const [dmRecords, setDmRecords] = useState(initialData.dmRecords || []);
            const [themeColor, setThemeColor] = useState(initialData.themeColor || '#1e3a8a');
            const [darkMode, setDarkMode] = useState(initialData.darkMode || false);
            const [syncStatus, setSyncStatus] = useState('');

            useEffect(() => {
                const timeoutId = setTimeout(() => {
                    setSyncStatus('SINC...');
                    db.collection('coachData').doc(user.uid).set({ 
                        ...initialData, players, trainingLog, exercises, library, matchInfo, postWorkout, dmRecords, themeColor, darkMode 
                    }, { merge: true }).then(() => { setSyncStatus('☁️ OK'); setTimeout(()=>setSyncStatus(''), 2000); });
                }, 2000);
                return () => clearTimeout(timeoutId);
            }, [players, trainingLog, exercises, library, matchInfo, postWorkout, dmRecords, themeColor, darkMode]);

            return (
                <div className={`flex flex-col h-full ${darkMode ? 'dark' : ''}`}>
                    <header className="p-3 px-6 bg-white dark:bg-slate-800 shadow-sm border-b dark:border-slate-700 flex justify-between items-center shrink-0">
                        <div className="font-black italic text-xl dark:text-white" style={{color: themeColor}}>PROCOACH <span className="text-[10px] opacity-50 not-italic">V145 MAX</span></div>
                        <div className="flex gap-4 items-center">
                            <span className="text-[9px] font-black text-slate-400">{syncStatus}</span>
                            <button onClick={()=>setDarkMode(!darkMode)} className="dark:text-white"><Icon name={darkMode?"sun":"moon"}/></button>
                            <button onClick={()=>auth.signOut().then(()=>window.location.reload())} className="text-red-500"><Icon name="logout"/></button>
                        </div>
                    </header>
                    <nav className="flex p-2 bg-slate-100 dark:bg-slate-900 gap-1 overflow-x-auto shadow-inner">
                        {['squad','workout','wellness','match','dm','library'].map(t => (
                            <button key={t} onClick={()=>setTab(t)} className={`px-4 py-2 rounded-lg text-xs font-black uppercase transition-all ${tab===t?'bg-white shadow text-slate-800':'text-slate-400'}`}>
                                {t === 'squad' ? 'Elenco' : t === 'workout' ? 'Treino' : t}
                            </button>
                        ))}
                    </nav>
                    <main className="flex-1 overflow-hidden">
                        {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} />}
                        {tab === 'workout' && <WorkoutBuilderView themeColor={themeColor} exercises={exercises} setExercises={setExercises} library={library} postWorkout={postWorkout} setPostWorkout={setPostWorkout} />}
                        {tab === 'library' && <LibraryView themeColor={themeColor} library={library} setLibrary={setLibrary} />}
                        {tab === 'match' && <PreGameView players={players} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} matchInfo={matchInfo} setMatchInfo={setMatchInfo} />}
                        {/* Outras abas originais seriam renderizadas aqui seguindo o mesmo padrão */}
                    </main>
                </div>
            );
        };

        const RootApp = () => {
            const [user, setUser] = useState(null);
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                auth.onAuthStateChanged(u => {
                    setUser(u);
                    if(u) {
                        db.collection('coachData').doc(u.uid).onSnapshot(doc => {
                            setData(sanitizeCloudData(doc.data()));
                            setLoading(false);
                            const l = document.getElementById('loading-state'); if(l) l.style.display='none';
                        });
                    } else { setLoading(false); const l = document.getElementById('loading-state'); if(l) l.style.display='none'; }
                });
            }, []);
            if(loading) return null;
            return user ? <ErrorBoundary><MainApp user={user} initialData={data} /></ErrorBoundary> : <LoginScreen onLogin={()=>{}} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
